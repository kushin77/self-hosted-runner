---
apiVersion: v1
kind: Namespace
metadata:
  name: nexus-discovery
  labels:
    phase: phase1
    automation: nexus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-config
  namespace: nexus-discovery
data:
  webhook.yaml: |
    server:
      port: 8080
      timeout: 30s
    
    normalizers:
      jenkins:
        enabled: true
        timeout: 5s
      bitbucket:
        enabled: true
        timeout: 5s
      gitlab:
        enabled: true
        timeout: 5s
    
    logging:
      level: info
      format: json
    
    metrics:
      enabled: true
      port: 9090
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexus-discovery
  namespace: nexus-discovery
  annotations:
    iam.gke.io/gcp-service-account: nexus-webhook-sa@nexusshield-prod.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-discovery
  namespace: nexus-discovery
  labels:
    app: nexus-discovery
    phase: phase1
    version: 1.0.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: nexus-discovery
  template:
    metadata:
      labels:
        app: nexus-discovery
        phase: phase1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: nexus-discovery
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        fsGroup: 3000
        seccompProfile:
          type: RuntimeDefault
      
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - nexus-discovery
              topologyKey: kubernetes.io/hostname
      
      containers:
      - name: nexus-discovery
        image: IMAGE_PLACEHOLDER
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        env:
        - name: PORT
          value: "8080"
        - name: METRICS_PORT
          value: "9090"
        - name: PROJECT_ID
          value: "nexusshield-prod"
        - name: NAMESPACE
          value: "nexus-discovery"
        - name: LOG_LEVEL
          value: "info"
        - name: ENABLE_METRICS
          value: "true"
        
        volumeMounts:
        - name: config
          mountPath: /etc/nexus
          readOnly: true
        - name: tmp
          mountPath: /tmp
        
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        startupProbe:
          httpGet:
            path: /health/startup
            port: http
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 1
          timeoutSeconds: 3
          failureThreshold: 30
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 100
          capabilities:
            drop:
            - ALL
      
      volumes:
      - name: config
        configMap:
          name: nexus-config
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-discovery
  namespace: nexus-discovery
  labels:
    app: nexus-discovery
    phase: phase1
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: nexus-discovery
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexus-discovery-hpa
  namespace: nexus-discovery
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexus-discovery
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nexus-discovery-pdb
  namespace: nexus-discovery
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: nexus-discovery
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nexus-discovery
  namespace: nexus-discovery
  labels:
    app: nexus-discovery
    phase: phase1
spec:
  selector:
    matchLabels:
      app: nexus-discovery
  endpoints:
  - name: metrics
    port: metrics
    interval: 30s
    path: /metrics
