version: '3.9'

services:
  portal-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      PORT: 5000
      BIND_HOST: "0.0.0.0"  # Listen on all interfaces on .42
    volumes:
      - ./packages/api/src:/app/packages/api/src
      - ./packages/core/src:/app/packages/core/src
      - ./packages/api/package.json:/app/packages/api/package.json
    command: pnpm --filter @nexus/api dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    # On-premises deployment on 192.168.168.42
    networks:
      - nexus-onprem

  portal-frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      VITE_API_URL: ${VITE_API_URL:-http://192.168.168.42:5000}  # On-prem .42 target
      VITE_LOG_LEVEL: info
      BIND_HOST: "0.0.0.0"  # Listen on all interfaces on .42
    volumes:
      - ./packages/frontend/src:/app/packages/frontend/src
      - ./packages/frontend/package.json:/app/packages/frontend/package.json
      - ./packages/frontend/index.html:/app/packages/frontend/index.html
      - ./packages/frontend/tsconfig.app.json:/app/packages/frontend/tsconfig.app.json
      - ./packages/frontend/vite.config.ts:/app/packages/frontend/vite.config.ts
    command: pnpm --filter @nexus/frontend dev --host 0.0.0.0
    depends_on:
      - portal-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - nexus-onprem

  # Optional: Add PostgreSQL for future data persistence
  # postgres:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: portal
  #     POSTGRES_USER: portal
  #     POSTGRES_PASSWORD: dev-password

networks:
  nexus-onprem:
    driver: bridge
