version: '3.9'

services:
  portal-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      PORT: 5000
    volumes:
      - ../packages/api/src:/app/packages/api/src
      - ../packages/core/src:/app/packages/core/src
    command: pnpm -C packages/api dev

  portal-frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_LOG_LEVEL: debug
    volumes:
      - ../packages/frontend/src:/app/packages/frontend/src
    command: pnpm -C packages/frontend dev
    depends_on:
      - portal-api

