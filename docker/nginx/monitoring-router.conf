user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Enable logging for monitoring
    log_format monitoring '$remote_addr - [$time_local] "$request" $status $body_bytes_sent "$http_referer"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint
    server {
        listen 80;
        server_name localhost;
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }

    # Monitoring Stack
    upstream prometheus_backend {
        server prometheus:9090;
        keepalive 32;
    }

    upstream grafana_backend {
        server grafana:3000;
        keepalive 32;
    }

    upstream alertmanager_backend {
        server alertmanager:9093;
        keepalive 32;
    }

    upstream node_exporter_backend {
        server node-exporter:9100;
        keepalive 32;
    }

    # Enforce OAuth authentication headers (from OAuth2-Proxy)
    # All locations MUST have X-Auth-Request or request is rejected
    location / {
        # Require OAuth authentication header from OAuth2-Proxy
        if ($http_authorization = "") {
            if ($http_x_auth_request_user = "") {
                return 401 '{"error":"Unauthorized - OAuth authentication required"}';
            }
        }
        
        return 200 "Monitoring Stack (OAuth Protected)\n";
        add_header Content-Type text/plain;
    }

    # Grafana - OAuth EXCLUSIVE
    location ~ ^/grafana(/|$) {
        # Enforce OAuth header
        if ($http_x_auth_request_user = "") {
            return 401 '{"error":"Unauthorized - OAuth required for Grafana"}';
        }
        
        proxy_pass http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        # Pass OAuth user info to Grafana
        proxy_set_header Remote-User $http_x_auth_request_user;
        proxy_read_timeout 90;
    }

    # Prometheus - OAuth EXCLUSIVE
    location ~ ^/prometheus(/|$) {
        # Enforce OAuth header
        if ($http_x_auth_request_user = "") {
            return 401 '{"error":"Unauthorized - OAuth required for Prometheus"}';
        }
        
        proxy_pass http://prometheus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Remote-User $http_x_auth_request_user;
        proxy_read_timeout 90;
    }

    # Alertmanager - OAuth EXCLUSIVE
    location ~ ^/alertmanager(/|$) {
        # Enforce OAuth header
        if ($http_x_auth_request_user = "") {
            return 401 '{"error":"Unauthorized - OAuth required for Alertmanager"}';
        }
        
        proxy_pass http://alertmanager_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Remote-User $http_x_auth_request_user;
        proxy_read_timeout 90;
    }

    # Node Exporter - OAuth EXCLUSIVE
    location ~ ^/node-exporter(/|$) {
        # Enforce OAuth header
        if ($http_x_auth_request_user = "") {
            return 401 '{"error":"Unauthorized - OAuth required"}';
        }
        
        proxy_pass http://node_exporter_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Remote-User $http_x_auth_request_user;
    }

    # API endpoints - OAuth EXCLUSIVE
    location ~ ^/api/v1(/|$) {
        # Enforce OAuth header
        if ($http_x_auth_request_user = "") {
            return 401 '{"error":"Unauthorized - OAuth required"}';
        }
        
        proxy_pass http://prometheus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Remote-User $http_x_auth_request_user;
    }

    # WebSocket support
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
}
