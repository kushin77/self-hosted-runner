steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'fetch-signing-key'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        echo 'Fetching signing key from Secret Manager...'
        gcloud secrets versions access latest --secret="${_SIGNING_SECRET_NAME}" > signing_key.pem
        chmod 600 signing_key.pem

  - name: 'gcr.io/cloud-builders/docker'
    id: 'run-sign'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        chmod +x scripts/signing/sign_artifact.sh
        ./scripts/signing/sign_artifact.sh signing_key.pem "${_ARTIFACT_PATH}"

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'verify-signature'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        echo 'Deriving public key and verifying signature (ssh-keygen preferred)...'
        if command -v ssh-keygen >/dev/null 2>&1; then
          ssh-keygen -y -f signing_key.pem > signing_key.pub
          ssh-keygen -Y verify -f signing_key.pub -s "${_ARTIFACT_PATH}.sig" -n artifact < "${_ARTIFACT_PATH}" || { echo 'Signature verification failed'; exit 5; }
          echo 'Signature verified with ssh-keygen'
        else
          echo 'ssh-keygen not available in this step; skipping verify'
        fi

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'upload-sig'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo 'Uploading signature to GCS...'
        gsutil cp "${_ARTIFACT_PATH}.sig" gs://${_SIGNATURE_BUCKET}/

substitutions:
  _SIGNING_SECRET_NAME: 'terraform-signing-key'
  _ARTIFACT_PATH: 'build/output/terraform-plan.zip'
  _SIGNATURE_BUCKET: 'my-signatures-bucket'

options:
  machineType: 'E2_HIGHCPU_8'
