version: "3.9"

services:
  github-runner:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUNNER_VERSION: "2.317.0"
    container_name: elevatediq-github-runner
    hostname: github-runner-42
    environment:
      # GitHub Runner Configuration
      RUNNER_NAME: "elevatediq-runner-42"
      RUNNER_LABELS: "self-hosted,linux,x64,docker,elevatediq"
      RUNNER_WORKDIR: "./_work"
      GITHUB_URL: "${GITHUB_URL:-https://github.com/kushin77/ElevatedIQ-Mono-Repo}"
      # Must be set at runtime: RUNNER_TOKEN=ghp_xxx
      RUNNER_TOKEN: "${RUNNER_TOKEN:-}"

      # Docker socket passthrough (for running docker commands in jobs)
      DOCKER_HOST: "unix:///var/run/docker.sock"

    # Network: connect to docker bridge so jobs can access other services
    networks:
      - github-runner-net

    # Volume mounts
    volumes:
      # Docker socket for running Docker in Docker (DinD)
      - /var/run/docker.sock:/var/run/docker.sock:rw

      # Runner data persistence
      - runner-data:/runner
      - runner-work:/runner/_work

      # Allow runner to access itself in jobs
      - /etc/hostname:/etc/hostname:ro

    # Restart policy
    restart: unless-stopped

    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G

    # Health check
    healthcheck:
      test: [ "CMD", "pgrep", "-f", "Runner.Listener" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Allow privileged mode for Docker operations
    privileged: false
    security_opt:
      - apparmor=unconfined

volumes:
  runner-data:
    driver: local
  runner-work:
    driver: local

networks:
  github-runner-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
