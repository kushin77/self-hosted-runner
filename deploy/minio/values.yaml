replicaCount: 1

image:
  repository: minio/minio
  tag: RELEASE.2026-01-01
  pullPolicy: IfNotPresent
  
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 100Gi

service:
  type: ClusterIP
  port: 9000

resources: {}

securityContext: {}

# Credentials and TLS
accessKeySecretName: "minio-credentials"
accessKeySecretKey: "accesskey"
secretKeySecretName: "minio-credentials"
secretKeySecretKey: "secretkey"

tls:
  enabled: false
  secretName: "minio-tls"

prometheus:
  enabled: false

