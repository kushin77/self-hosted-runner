apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "https://vault.example.internal:8200"
      path: "secret"
      version: "v2"
      auth:
        appRole:
          # For security, do NOT store the secretId in git. The ClusterSecretStore
          # can reference a Kubernetes Secret that contains the secretId value.
          roleId: "<VAULT_ROLE_ID_PLACEHOLDER>"
          secretRef:
            name: vault-approle-secret
            key: secretId
      # Optional TLS settings; prefer using the cluster CA bundle or Vault-issued certs
      tls:
        caBundle: ""
