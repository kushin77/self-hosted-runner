apiVersion: v1
kind: Namespace
metadata:
  name: gitops
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: repo-bootstrap
  namespace: gitops
spec:
  project: default
  source:
    repoURL: https://github.com/kushin77/self-hosted-runner
    path: deploy/gitops
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
