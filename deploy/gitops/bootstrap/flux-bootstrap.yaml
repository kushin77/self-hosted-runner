apiVersion: source.toolkit.fluxcd.io/v1beta1
kind: GitRepository
metadata:
  name: self-hosted-runner-repo
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/kushin77/self-hosted-runner
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta1
kind: Kustomization
metadata:
  name: gitops
  namespace: flux-system
spec:
  interval: 5m
  path: "./deploy/gitops"
  prune: true
  sourceRef:
    kind: GitRepository
    name: self-hosted-runner-repo
  validation: client
  suspend: false
