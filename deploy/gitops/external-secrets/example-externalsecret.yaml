apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: gitops
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: minio-credentials
    creationPolicy: Owner
  data:
    - secretKey: accesskey
      remoteRef:
        key: secret/data/minio/ci
        property: accesskey
    - secretKey: secretkey
      remoteRef:
        key: secret/data/minio/ci
        property: secretkey
