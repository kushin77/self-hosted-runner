apiVersion: v1
kind: Secret
metadata:
  # This secret name should match `database.passwordSecret` in `values.yaml`.
  # The Terraform provisioning module (`terraform/provision/postgres`) will
  # create this secret automatically when used (default: "harbor-db-password").
  name: harbor-db-password
type: Opaque
stringData:
  # Replace with the generated/desired password if creating manually.
  password: "REPLACE_WITH_STRONG_PASSWORD"
