apiVersion: v1
kind: Secret
metadata:
  # This secret name should match any value you configure for Redis in `values.yaml`.
  # The Terraform provisioning module (`terraform/provision/redis`) will create
  # a secret named `harbor-redis-password` by default in the Redis namespace.
  name: harbor-redis-secret
type: Opaque
stringData:
  # Replace with the generated/desired password if creating manually.
  redis-password: "REPLACE_WITH_REDIS_PASSWORD"
