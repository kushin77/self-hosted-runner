apiVersion: v1
kind: Service
metadata:
  name: {{ include "harbor.fullname" . | default (printf "%s-harbor" .Release.Name) }}
  labels:
    app: harbor
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.corePort }}
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: harbor
