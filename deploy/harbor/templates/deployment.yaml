apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "harbor.fullname" . | default (printf "%s-harbor" .Release.Name) }}
  labels:
    app: harbor
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: harbor
  template:
    metadata:
      labels:
        app: harbor
    spec:
      containers:
        - name: harbor-core
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
          resources: {{ toYaml .Values.resources | nindent 12 }}
