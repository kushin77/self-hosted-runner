global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'portal'
    static_configs:
      - targets: ['host.docker.internal:4000']

  - job_name: 'pushgateway'
    static_configs:
      - targets: ['pushgateway:9091']
 
rule_files:
  - /etc/prometheus/rules/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
