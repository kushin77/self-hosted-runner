global:
  resolve_timeout: 5m

route:
  receiver: 'slack-notifications'

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK}'
        channel: '#alerts'
        text: "[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}\n{{ range .Alerts }} - {{ .Annotations.description }}\n{{ end }}"
