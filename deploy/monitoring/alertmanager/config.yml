global:
  resolve_timeout: 5m

route:
  receiver: 'slack'
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: 'slack'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK}'
        channel: '#alerts'
        title: '{{ template "alertname" . }}'
        text: '{{ range .Alerts }}*{{ .Annotations.summary }}*\n{{ .Annotations.description }}\n{{ end }}'

templates: []
global:
  resolve_timeout: 5m

route:
  receiver: 'slack-notifications'

receivers:
  - name: 'slack-notifications'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK}'
        channel: '#alerts'
        text: "[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}\n{{ range .Alerts }} - {{ .Annotations.description }}\n{{ end }}"
