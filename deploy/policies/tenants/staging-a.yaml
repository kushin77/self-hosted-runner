apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: runner-tenant-staging-a
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-trusted
  namespace: runner-tenant-staging-a
spec:
  podSelector: {}
  ingress:
  - from:
    - ipBlock:
        cidr: 10.30.0.0/16
    ports:
    - protocol: TCP
      port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-to-registries
  namespace: runner-tenant-staging-a
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 10.30.0.0/16
    ports:
    - protocol: TCP
      port: 443
  - to:
    - ipBlock:
        cidr: 199.232.0.0/16
    ports:
    - protocol: TCP
      port: 443
