apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: github-runner-scaledobject
  namespace: runners
spec:
  scaleTargetRef:
    name: github-runner-deployment
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.runners.svc:9090
        metricName: github_runner_queue_length
        threshold: '5'
        query: |
          sum(rate(github_runner_jobs_queued[2m]))
