apiVersion: v1
kind: Namespace
metadata:
  name: tekton-pipelines
---
# Minimal Tekton control plane bootstrap (use official operator for production)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tekton-controller
  namespace: tekton-pipelines
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tekton-controller
  template:
    metadata:
      labels:
        app: tekton-controller
    spec:
      containers:
        - name: tekton-controller
          image: gcr.io/tekton-releases/github.com/tektoncd/pipeline/cmd/controller:v0.40.0
