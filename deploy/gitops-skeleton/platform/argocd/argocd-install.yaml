apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
# Minimal ArgoCD installation (operator or full manifests preferred for production)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argocd-server
  template:
    metadata:
      labels:
        app: argocd-server
    spec:
      containers:
        - name: argocd-server
          image: argoproj/argocd:v2.6.5
          ports:
            - containerPort: 8080
