apiVersion: v1
kind: Namespace
metadata:
  name: gatekeeper-system
---
# Minimal Gatekeeper deployment (production: use operator and constraints library)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeeper-controller
  namespace: gatekeeper-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatekeeper
  template:
    metadata:
      labels:
        app: gatekeeper
    spec:
      containers:
        - name: gatekeeper
          image: openpolicyagent/gatekeeper:v3.9.0
