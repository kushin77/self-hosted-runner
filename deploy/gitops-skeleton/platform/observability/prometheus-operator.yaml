apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
# Minimal Prometheus operator placeholder; production should use kube-prometheus-stack or Cortex
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-operator
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-operator
  template:
    metadata:
      labels:
        app: prometheus-operator
    spec:
      containers:
        - name: prometheus-operator
          image: quay.io/prometheus-operator/prometheus-operator:v0.78.0
