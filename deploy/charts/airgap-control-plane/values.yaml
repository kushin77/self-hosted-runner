collector:
  enabled: false
  image: otel/opentelemetry-collector-contrib
  tag: "0.79.0"
  resources: {}

networkPolicy:
  enabled: true
# default values for airgap-control-plane
namespace: runnercloud
replicaCount: 1
image:
  repository: runnercloud/control-plane
  tag: latest
  pullPolicy: IfNotPresent

# egress whitelist CIDRs
egress:
  enable: true
  cidrs:
    - "0.0.0.0/0" # replace with GitHub, AWS, etc
