apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observability.fullname" . | default (printf "%s-loki" .Release.Name) }}
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.6.1
          ports:
            - containerPort: 3100
          resources: {{ toYaml .Values.loki.resources | nindent 12 }}
