---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trivy-webhook
  namespace: trivy-system
  labels:
    app.kubernetes.io/name: trivy-webhook

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trivy-webhook
  namespace: trivy-system
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trivy-webhook
  namespace: trivy-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: trivy-webhook
subjects:
  - kind: ServiceAccount
    name: trivy-webhook
    namespace: trivy-system

---
apiVersion: v1
kind: Namespace
metadata:
  name: trivy-system
  labels:
    app.kubernetes.io/name: trivy-webhook

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy-webhook
  namespace: trivy-system
  labels:
    app.kubernetes.io/name: trivy-webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trivy-webhook
  template:
    metadata:
      labels:
        app: trivy-webhook
      annotations:
        # Vault agent annotations for automatic secret injection
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/trivy-webhook/config"
        vault.hashicorp.com/role: "trivy-webhook-role"
    spec:
      # Schedule pods specifically onto the worker node with IP 192.168.168.42
      nodeName: "192.168.168.42"
      serviceAccountName: trivy-webhook
      automountServiceAccountToken: true
      containers:
        - name: trivy-webhook
          image: ghcr.io/kushin77/trivy-webhook:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TRIVY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: trivy-webhook-secret
                  key: secret
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: trivy-webhook
  namespace: trivy-system
  labels:
    app.kubernetes.io/name: trivy-webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trivy-webhook
  template:
    metadata:
      labels:
        app: trivy-webhook
      annotations:
        # Vault agent annotations for automatic secret injection
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/trivy-webhook/config"
        vault.hashicorp.com/role: "trivy-webhook-role"
    spec:
      # Schedule pods specifically onto the worker node with IP 192.168.168.42
      nodeName: "192.168.168.42"
      serviceAccountName: trivy-webhook
      automountServiceAccountToken: true
      containers:
        - name: trivy-webhook
          image: ghcr.io/kushin77/trivy-webhook:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TRIVY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: trivy-webhook-secret
                  key: secret
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

---
apiVersion: v1
kind: Service
metadata:
  name: trivy-webhook
  namespace: trivy-system
spec:
  selector:
    app: trivy-webhook
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP

---
# Optional Ingress example (adjust for your cluster)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: trivy-webhook
  namespace: trivy-system
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - http:
        paths:
          - path: /trivy-webhook
            pathType: Prefix
            backend:
              service:
                name: trivy-webhook
                port:
                  number: 80
