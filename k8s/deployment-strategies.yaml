# DEPLOYMENT STRATEGIES - Elite MSP Operations (On-Premises Only)
# Advanced deployment patterns for zero-downtime, safe releases
# MANDATORY: All deployments on 192.168.168.42 worker nodes only

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: deployment-strategy-blue-green
  namespace: default
data:
  description: "Blue-Green Deployment - Zero-downtime switching"
  reference: "deployment-strategies/blue-green.yaml"

---
# BLUE-GREEN DEPLOYMENT PATTERN
# Two identical production environments (blue=current, green=new)
# Switch traffic after green proves healthy

apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-blue
  namespace: production
  labels:
    variant: blue
    app: myapp
spec:
  replicas: 3
  strategy:
    type: Recreate  # Don't use RollingUpdate in blue-green
  selector:
    matchLabels:
      variant: blue
      app: myapp
  template:
    metadata:
      labels:
        variant: blue
        app: myapp
      annotations:
        deployment.strategy: "blue-green"
        deployment.version: "1.2.3"
    spec:
      # Security context
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      
      # Pod anti-affinity for distribution
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - myapp
                topologyKey: kubernetes.io/hostname
      
      containers:
        - name: app
          image: registry.company.com/myapp:1.2.3  # Pinned version
          imagePullPolicy: IfNotPresent
          
          # Resource management
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          
          # Health checks
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          # Startup probe (for slow-starting apps)
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          
          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          
          # Ports
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          
          # Environment variables
          env:
            - name: APP_VERSION
              value: "1.2.3"
            - name: DEPLOYMENT_VARIANT
              value: "blue"
            - name: LOG_LEVEL
              value: "INFO"
            - name: ENVIRONMENT
              value: "production"
          
          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/cache
      
      # Volumes
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: cache
          emptyDir:
            sizeLimit: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-green
  namespace: production
  labels:
    variant: green
    app: myapp
spec:
  replicas: 0  # Initially zero - activated during deploy:green stage
  template:
    metadata:
      labels:
        variant: green
        app: myapp
    spec:
      # (Same spec as blue, just different image version)
      securityContext:
        fsGroup: 1000
      containers:
        - name: app
          image: registry.company.com/myapp:1.3.0  # New version
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000

---
apiVersion: v1
kind: Service
metadata:
  name: myapp
  namespace: production
  labels:
    app: myapp
spec:
  type: ClusterIP
  selector:
    variant: blue  # Initially routes to blue
    app: myapp
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-blue
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: app-pdb
  namespace: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: myapp

---

# BLUE-GREEN DEPLOYMENT PROCEDURE
# 1. Scale green deployment to desired replicas
# 2. Wait for readiness probes to pass
# 3. Run smoke tests against green
# 4. Switch service selector from blue to green
# 5. Monitor error rates (should stay < 0.1%)
# 6. Keep blue running for 1 hour as rollback point
# 7. Scale down blue after validation period

apiVersion: v1
kind: ConfigMap
metadata:
  name: blue-green-procedure
  namespace: production
data:
  switch-traffic.sh: |
    #!/bin/bash
    set -euo pipefail
    
    echo "Blue-Green Deployment: Switching Traffic"
    
    # Phase 1: Activate Green
    echo "1. Scaling up green deployment..."
    kubectl scale deployment app-green -n production --replicas=3
    kubectl rollout status deployment/app-green -n production --timeout=5m
    
    # Phase 2: Health Check
    echo "2. Verifying green deployment health..."
    GREEN_REPLICAS=$(kubectl get deployment app-green -n production -o jsonpath='{.status.readyReplicas}')
    if [ "${GREEN_REPLICAS}" -ne 3 ]; then
      echo "✗ Green deployment failed health check (${GREEN_REPLICAS}/3 ready)"
      exit 1
    fi
    echo "✓ Green deployment is healthy"
    
    # Phase 3: Smoke Tests
    echo "3. Running smoke tests against green..."
    ENV=production VERSION=green bash tests/smoke-test.sh || {
      echo "✗ Smoke tests failed"
      kubectl scale deployment app-green -n production --replicas=0
      exit 1
    }
    echo "✓ Smoke tests passed"
    
    # Phase 4: Switch Traffic
    echo "4. Switching traffic from blue to green..."
    kubectl patch service myapp -n production -p '{"spec":{"selector":{"variant":"green"}}}'
    echo "✓ Traffic switched to green"
    
    # Phase 5: Monitor
    echo "5. Monitoring error rates for 2 minutes..."
    for i in {1..12}; do
      sleep 10
      ERROR_RATE=$(kubectl exec -n production -it deployment/app-green -- \
        curl -s http://localhost:8080/metrics | grep http_requests_errors | awk '{print $2}')
      echo "  Sample $i: Error rate = ${ERROR_RATE}%"
      if (( $(echo "$ERROR_RATE > 1.0" | bc -l) )); then
        echo "✗ Error rate exceeded threshold. Rolling back..."
        kubectl patch service myapp -n production -p '{"spec":{"selector":{"variant":"blue"}}}'
        echo "✓ Rolled back to blue"
        exit 1
      fi
    done
    
    # Phase 6: Verify & Cleanup
    echo "6. Verifying steady state..."
    sleep 30
    kubectl get deployment app-blue,app-green -n production
    
    echo "✓ Blue-Green deployment completed successfully"
    echo "  Blue (old): scaled down after 1-hour retention"
    echo "  Green (new): now serving traffic"

---
# CANARY DEPLOYMENT PATTERN
# Gradually shift traffic from old to new version

apiVersion: v1
kind: ConfigMap
metadata:
  name: deployment-strategy-canary
  namespace: default
data:
  description: "Canary Deployment - Progressive traffic shifting"
  reference: "https://istio.io/latest/docs/tasks/traffic-management/traffic-shifting/"

# Note: Requires Istio/Flagger for production canary deployments
# This is a simplified manual approach

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: canary-procedure
  namespace: production
data:
  canary-deploy.sh: |
    #!/bin/bash
    set -euo pipefail
    
    echo "Canary Deployment: Progressive Traffic Shifting"
    
    CANARY_WEIGHT_STEPS=(5 10 25 50 75 100)
    
    for WEIGHT in "${CANARY_WEIGHT_STEPS[@]}"; do
      echo "Shifting ${WEIGHT}% traffic to canary..."
      
      # Update traffic split
      kubectl patch service myapp-canary -n production -p \
        '{
          "spec": {
            "trafficPolicy": {
              "loadBalancer": {
                "canary": {
                  "weight": '${WEIGHT}'
                }
              }
            }
          }
        }'
      
      # Monitor for 5 minutes
      echo "Monitoring canary at ${WEIGHT}% traffic for 5 minutes..."
      for minute in {1..5}; do
        sleep 60
        ERROR_RATE=$(kubectl exec -n production -it deployment/app-canary -- \
          curl -s http://localhost:8080/metrics | grep http_requests_errors | awk '{print $2}')
        P99_LATENCY=$(kubectl exec -n production -it deployment/app-canary -- \
          curl -s http://localhost:8080/metrics | grep http_request_duration_seconds_bucket | tail -1 | awk '{print $2}')
        
        echo "  Minute $minute: Error=${ERROR_RATE}%, P99=${P99_LATENCY}ms"
        
        # Rollback if thresholds exceeded
        if (( $(echo "$ERROR_RATE > 0.5" | bc -l) )); then
          echo "✗ Error rate exceeded. Rolling back canary..."
          kubectl patch service myapp -n production -p \
            '{"spec":{"trafficPolicy":{"canary":{"weight":0}}}}'
          exit 1
        fi
      done
    done
    
    echo "✓ Canary deployment completed successfully"

---
# ROLLING UPDATE PATTERN
# Controlled, sequential replacement of pods

apiVersion: v1
kind: ConfigMap
metadata:
  name: deployment-strategy-rolling
  namespace: default
data:
  description: "Rolling Update - Sequential pod replacement"

# This is the default Kubernetes strategy - example config:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-rolling
  namespace: production
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # One extra pod during update
      maxUnavailable: 0  # Never have unavailable pods
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      terminationGracePeriodSeconds: 30  # Allow graceful shutdown
      containers:
        - name: app
          image: registry.company.com/myapp:1.2.3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]  # Wait for LB to remove

---

# DELETION/GUARDRAILS STRATEGIES
# Ensure safe removal of old versions

apiVersion: v1
kind: ConfigMap
metadata:
  name: cleanup-strategy
  namespace: production
data:
  retention-policy: |
    Image Retention:
      - Last 10 released versions: Keep indefinitely
      - RC/Beta versions: Keep 30 days
      - Dev/Branch versions: Keep 7 days
    
    Deployment Retention:
      - Blue variant: Keep 1 hour after green activation
      - Canary variant: Keep until stable for 24 hours
      - Old versions: Archive to cold storage after 90 days
    
    Automatic Cleanup:
      - Registry: Runs weekly
      - Deployments: Runs on successful deployment
      - Artifacts: Runs on successful release
