apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: gsm-normalizer-secrets
  namespace: nexus-engine
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/nexusshield-prod/secrets/normalizer-api-key"
        secretName: "NORMALIZER_API_KEY"
      - resourceName: "projects/nexusshield-prod/secrets/normalizer-db-pass"
        secretName: "NORMALIZER_DB_PASS"
