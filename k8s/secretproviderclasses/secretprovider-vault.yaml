apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: spc-vault-gh-token
  namespace: ops
spec:
  provider: vault
  parameters:
    # Vault address and auth config should be provided via environment or CSI provider configuration
    vaultAddress: "https://vault.example.internal:8200"
    roleName: "k8s-milestone-organizer-role"
    objects: |
      - objectName: "secret/data/github"
        objectType: "kv"
        # file name inside mount
        fileName: "gh_token"
