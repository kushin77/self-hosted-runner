apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: spc-gsm-gh-token
  namespace: ops
spec:
  provider: gcp
  parameters:
    # 'secrets' is a newline-separated list of secret mappings in the form:
    # resourceName: "projects/<PROJECT>/secrets/<SECRET>/versions/latest", path: "gh_token"
    secrets: |
      - resourceName: "projects/nexusshield-prod/secrets/gh-token/versions/latest"
        path: "gh_token"
