apiVersion: v1
kind: Namespace
metadata:
  name: nexus-engine
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: normalizer-sa
  namespace: nexus-engine
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: normalizer-config
  namespace: nexus-engine
data:
  KAFKA_BROKERS: "kafka:9092"
  KAFKA_INPUT_TOPIC: "raw-events"
  KAFKA_OUTPUT_TOPIC: "normalized-events"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "nexus"
  POSTGRES_USER: "nexus_user"
  LOG_LEVEL: "info"
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: gsm-normalizer-secrets
  namespace: nexus-engine
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/nexusshield-prod/secrets/normalizer-api-key"
        secretName: "NORMALIZER_API_KEY"
      - resourceName: "projects/nexusshield-prod/secrets/normalizer-db-pass"
        secretName: "NORMALIZER_DB_PASS"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: normalizer
  namespace: nexus-engine
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        metadata:
          labels:
            app: normalizer
            component: ingestion
        spec:
          serviceAccountName: normalizer-sa
          restartPolicy: OnFailure
          containers:
            - name: normalizer
              image: REPLACE_WITH_REGISTRY/nexus-normalizer:REPLACE_TAG
              imagePullPolicy: IfNotPresent
              envFrom:
                - configMapRef:
                    name: normalizer-config
              env:
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              volumeMounts:
                - name: secrets-store-inline
                  mountPath: /mnt/secrets-store
                  readOnly: true
                - name: log-volume
                  mountPath: /var/log/normalizer
          volumes:
            - name: secrets-store-inline
              csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: "gsm-normalizer-secrets"
            - name: log-volume
              emptyDir: {}
          nodeSelector: {}
          affinity: {}
          tolerations: []
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: nexus-engine
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: nexus-engine
spec:
  ports:
    - port: 9092
      targetPort: 9092
  selector:
    app: kafka
