apiVersion: v1
kind: ServiceAccount
metadata:
  name: milestone-organizer-sa
  namespace: ops
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::830916170067:role/milestone-organizer-irsa
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: milestone-organizer
  namespace: ops
spec:
  schedule: "0 2 * * *" # daily at 02:00 UTC
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: milestone-organizer-sa
          restartPolicy: OnFailure
          initContainers:
            - name: fetch-gh-token
              image: alpine:3.18
              command: ["/bin/sh","-c"]
              args:
                - |
                  set -euo pipefail
                  # Prefer mounted k8s Secret at /var/run/gh/gh_token if present
                  if [ -f /var/run/gh/gh_token ] && [ ! -f /var/run/secrets/gh_token ]; then
                    cp /var/run/gh/gh_token /var/run/secrets/gh_token || true
                    chmod 600 /var/run/secrets/gh_token || true
                  fi
                  # Fallback: attempt GSM/Vault fetch scripts if they exist in repo
                  if [ -x /workspace/repo/scripts/utilities/gsm_fetch_token.sh ]; then
                    /workspace/repo/scripts/utilities/gsm_fetch_token.sh "projects/PROJECT/secrets/GH_TOKEN" /var/run/secrets/gh_token || true
                  fi
                  if [ -x /workspace/repo/scripts/utilities/vault_fetch_token.sh ]; then
                    /workspace/repo/scripts/utilities/vault_fetch_token.sh "secret/data/gh_token" /var/run/secrets/gh_token || true
                  fi
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
                - name: gh-secret
                  mountPath: /var/run/secrets
          containers:
            - name: organizer
              # Using public alpine image for bootstrap (install deps at runtime).
              # Replace with hardened private image once registry pull access is configured.
              image: alpine:3.18
              command: ["/bin/sh","-c"]
              args:
                - |
                  set -euo pipefail
                  apk add --no-cache curl git bash jq python3 py3-pip
                  cd /workspace || true
                  if [ ! -d repo ]; then
                    git clone https://github.com/kushin77/self-hosted-runner.git repo
                  fi
                  cd repo
                  # If a k8s Secret is mounted at /var/run/gh, copy into expected path
                  if [ -f /var/run/gh/gh_token ] && [ ! -f /var/run/secrets/gh_token ]; then
                    cp /var/run/gh/gh_token /var/run/secrets/gh_token || true
                    chmod 600 /var/run/secrets/gh_token || true
                  fi
                  if [ -f /var/run/secrets/gh_token ]; then
                    export GH_TOKEN=$(cat /var/run/secrets/gh_token)
                    echo "$GH_TOKEN" | gh auth login --with-token || true
                  fi
                  ./scripts/automation/run_milestone_organizer.sh
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
                - name: gh-secret
                  mountPath: /var/run/secrets
          # Enforce pod and container security context
          # Running as root temporarily to allow in-pod package installs and
          # image pulls during bootstrap. Replace with non-root and least
          # privilege settings after provider and image registry access are
          # confirmed.
          securityContext:
            runAsUser: 0
            fsGroup: 0
          volumes:
            - name: workspace
              emptyDir: {}
            # CSI volume removed temporarily as provider plugin unavailable.
            # Once the AWS provider is installed, restore the CSI volume block
            # above to enable in-cluster secret injection via SecretProviderClass.
            - name: gh-secret
              secret:
                secretName: github-token
                optional: true
          # Secrets Store CSI will inject secrets at /var/run/secrets

