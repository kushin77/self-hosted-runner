# Drift Detection Configuration - System Capabilities
# Defines expected packages, tools, and system capabilities
# Located in Git repo at: .runner-config/capabilities.yaml

packages:
  # Container runtime
  - docker.io
  - docker-compose
  
  # Git and version control
  - git
  - git-lfs
  
  # Build tools
  - build-essential
  - cmake
  - python3-dev
  
  # CI/CD utilities
  - jq
  - yq
  - curl
  - wget
  - unzip
  
  # Languages
  - python3
  - nodejs
  - golang-go
  - rustc
  
  # Container-related
  - containerd.io

directories:
  - /home/runner                 # Runner home directory
  - /home/runner/work            # Job work directory
  - /home/runner/.ssh            # SSH keys directory
  - /var/log/runner              # Log directory
  - /var/lib/runner              # State directory
  - /opt/runner-config           # Configuration directory
  - /mnt/ephemeral               # Ephemeral workspace mount

tools:
  # GitHub Actions runner CLI
  - name: runner-cli
    expected_path: /home/runner/runner
    required: true
  
  # Prometheus exporter
  - name: node-exporter
    expected_path: /usr/local/bin/node_exporter
    required: true
  
  # Packer (for immutable images)
  - name: packer
    expected_path: /usr/local/bin/packer
    required: false
  
  # Terraform (for drift detection)
  - name: terraform
    expected_path: /usr/local/bin/terraform
    required: false

minimum_disk_space_gb: 20
minimum_free_memory_gb: 2
