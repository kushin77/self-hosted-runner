global:
  resolve_timeout: 5m
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

# Email configuration
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@elevatediq.local'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Routing tree
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'job', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

  # Critical alerts to PagerDuty
  routes:
    - match:
        severity: critical
      receiver: 'pagerduty-critical'
      group_wait: 10s
      repeat_interval: 1h

    # Warnings to Slack
    - match:
        severity: warning
      receiver: 'slack-warnings'
      group_wait: 1m
      repeat_interval: 4h

    # Info to default
    - match:
        severity: info
      receiver: 'default'

# Receivers
receivers:
  - name: 'default'
    # Slack receiver temporarily removed; re-enable by setting SLACK_WEBHOOK_URL
    # and restoring slack_configs below.

  - name: 'slack-warnings'
    # slack-warnings removed until Slack webhook is provided

  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_SERVICE_KEY}'
        description: '{{ .GroupLabels.alertname }}: {{ (index .Alerts 0).Annotations.summary }}'
        severity: 'critical'

# Inhibition rules (suppress alerts when certain conditions are met)
inhibit_rules:
  # Don't send warnings if the instance is down
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance', 'job']

  # Don't send info if warning exists
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'instance']
