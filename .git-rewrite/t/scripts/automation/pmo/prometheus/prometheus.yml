global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: 'elevatediq'
    environment: 'production'
    alertmanager: 'primary'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules for alerts
rule_files:
  - 'alerts.yml'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # GitHub Actions Runners - Metrics Exporter
  - job_name: 'runners-metrics'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - 'runner-metrics-exporter:8081'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Runner Health Monitor
  - job_name: 'runner-health'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'localhost:9100'  # Node Exporter on health monitor workstation
    relabel_configs:
      - source_labels: [__address__]
        target_label: runner_monitor

  # Alertmanager
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  # Spot Instance Handler (if available)
  - job_name: 'spot-handler'
    static_configs:
      - targets: ['localhost:9102']
    relabel_configs:
      - source_labels: [__address__]
        target_label: handler_type
        replacement: 'spot-interruption'
