# GitLab CI — Python Test Pipeline Parity Template
# Covers: pytest, coverage, mypy, ruff — mirrors GitHub Actions Python workflows
# Include via: include: - local: '.gitlab/ci-includes/python-test.gitlab-ci.yml'
# NIST Controls: SA-10, SA-11

variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "${CI_PROJECT_DIR}/.pip-cache"
  COVERAGE_MIN: "70"

# ---------------------------------------------------------------------------
# Hidden job templates — extend with `extends:`
# ---------------------------------------------------------------------------
.python_base:
  image: "python:${PYTHON_VERSION}-slim"
  cache:
    key: "pip-${CI_COMMIT_REF_SLUG}-${PYTHON_VERSION}"
    paths:
      - .pip-cache
      - .venv
  before_script:
    - python -m venv .venv
    - source .venv/bin/activate
    - pip install --upgrade pip --quiet
    - |
      if [[ -f requirements.txt ]]; then pip install -r requirements.txt --quiet; fi
      if [[ -f pyproject.toml ]]; then pip install -e ".[dev,test]" --quiet; fi

.python_lint:
  extends: .python_base
  stage: test
  script:
    - pip install ruff mypy --quiet
    - ruff check . --output-format=github
    - mypy . --ignore-missing-imports --no-error-summary || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

.python_test:
  extends: .python_base
  stage: test
  script:
    - pip install pytest pytest-cov --quiet
    - |
      pytest \
        --cov=. \
        --cov-report=xml:coverage.xml \
        --cov-report=term-missing \
        --cov-fail-under="${COVERAGE_MIN}" \
        --junit-xml=junit-report.xml \
        -v
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    expire_in: 30 days
    reports:
      junit: junit-report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

.python_security:
  extends: .python_base
  stage: test
  script:
    - pip install bandit safety --quiet
    - bandit -r . -ll -f json -o bandit-report.json || true
    - safety check --json > safety-report.json || true
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - bandit-report.json
      - safety-report.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

.python_build_wheel:
  extends: .python_base
  stage: build
  script:
    - pip install build --quiet
    - python -m build --wheel
  artifacts:
    name: "wheel-${CI_COMMIT_SHORT_SHA}"
    paths:
      - dist/*.whl
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+/'
