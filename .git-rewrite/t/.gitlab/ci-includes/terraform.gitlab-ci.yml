# GitLab CI — Terraform Pipeline Parity Template
# Covers: phase11-terraform.yml, phase26-terraform.yml, terraform-dry-run.yml,
#         terraform-sandbox-deploy.yml, terraform-validate-global.yml (5 GitHub workflows)
# Include via: include: - local: '.gitlab/ci-includes/terraform.gitlab-ci.yml'
# NIST Controls: CM-3, CM-6, SA-10

variables:
  TF_VERSION: "1.7.0"
  TF_ROOT: "${CI_PROJECT_DIR}/infrastructure/terraform"
  TF_CACHE_KEY: "${CI_COMMIT_REF_SLUG}"

# ---------------------------------------------------------------------------
# Hidden job templates — extend with `extends:`
# ---------------------------------------------------------------------------
.terraform_base:
  image: "hashicorp/terraform:${TF_VERSION}"
  cache:
    key: "tf-${TF_CACHE_KEY}"
    paths:
      - "${TF_ROOT}/**/.terraform"
  before_script:
    - |
      # Authenticate to AWS via OIDC (GAP-001 resolved)
      # Requires .aws_oidc_auth to be extended BEFORE this template
      export TF_CLI_ARGS_init="-backend-config=region=${AWS_REGION:-us-east-1}"
      cd "${TF_WORKDIR:-${TF_ROOT}/environments/cicd}"
      terraform init -input=false

.terraform_validate:
  extends: .terraform_base
  stage: validate
  script:
    - terraform validate
    - terraform fmt -check -recursive
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

.terraform_plan:
  extends:
    - .terraform_base
    - .aws_oidc_auth
  stage: plan
  script:
    - terraform plan -out=tfplan -input=false -lock-timeout=300s
    - terraform show -json tfplan > tfplan.json
  artifacts:
    name: "tfplan-${CI_COMMIT_SHORT_SHA}"
    when: always
    expire_in: 7 days
    paths:
      - "${TF_WORKDIR:-infrastructure/terraform/environments/cicd}/tfplan"
      - "${TF_WORKDIR:-infrastructure/terraform/environments/cicd}/tfplan.json"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

.terraform_apply:
  extends:
    - .terraform_base
    - .aws_oidc_auth
  stage: deploy
  environment:
    name: production
    url: https://console.aws.amazon.com/
  script:
    - terraform apply -input=false -auto-approve tfplan
  when: manual    # Require explicit trigger for apply (NIST CM-3: change control)
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

.terraform_destroy_dry_run:
  extends:
    - .terraform_base
    - .aws_oidc_auth
  stage: test
  script:
    - terraform plan -destroy -out=destroy-plan -input=false
    - terraform show destroy-plan
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ---------------------------------------------------------------------------
# Security scan — tfsec + trivy on all TF code
# ---------------------------------------------------------------------------
.terraform_security_scan:
  image: aquasec/trivy:latest
  stage: test
  script:
    - trivy config --severity HIGH,CRITICAL --exit-code 1 "${TF_ROOT}/"
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  artifacts:
    when: always
    reports:
      junit: gl-sast-report.xml
