name: CI - Airgap Image Validation

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  validate-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install docker
        uses: docker/setup-buildx-action@v2

      - name: Generate manifest
        run: |
          mkdir -p build
          ./scripts/airgap/generate_image_manifest.sh > /tmp/airgap-manifest.yml

      - name: Pull images (light check)
        run: |
          set -euo pipefail
          imgs=$(grep -E "^\s*image:\s*" -h /tmp/airgap-manifest.yml | sed -E 's/^[[:space:]]*image:[[:space:]]*//')
          for img in $imgs; do
            echo "Pulling $img"
            docker pull "$img" || (echo "Failed to pull $img"; exit 1)
          done

      - name: Save first image to tar (sanity)
        run: |
          first=$(grep -E "^\s*image:\s*" -h /tmp/airgap-manifest.yml | sed -E 's/^[[:space:]]*image:[[:space:]]*//' | head -n1)
          if [ -n "$first" ]; then
            docker save -o build/first_image.tar "$first"
            ls -lh build/first_image.tar
          fi

      - name: Generate checksummed manifest
        run: |
          ./scripts/airgap/generate_manifest_checksums.sh /tmp/airgap-manifest.yml /tmp/airgap-manifest-checked.yml
          echo "Manifest with checksums:" && cat /tmp/airgap-manifest-checked.yml

      - name: Sign images with cosign (optional)
        if: ${{ secrets.COSIGN_KEY != '' }}
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
        run: |
          # Write key to file and sign images (COSIGN_KEY expected base64 encoded private key)
          echo "$COSIGN_KEY" | base64 -d > /tmp/cosign.key
          chmod 600 /tmp/cosign.key
          ./scripts/airgap/sign_images_cosign.sh /tmp/airgap-manifest-checked.yml /tmp/cosign.key

      - name: Verify image signatures with cosign (optional)
        if: ${{ secrets.COSIGN_PUB_KEY != '' }}
        env:
          COSIGN_PUB_KEY: ${{ secrets.COSIGN_PUB_KEY }}
        run: |
          echo "$COSIGN_PUB_KEY" | base64 -d > /tmp/cosign.pub
          chmod 644 /tmp/cosign.pub
          ./scripts/airgap/verify_signatures_cosign.sh /tmp/airgap-manifest-checked.yml /tmp/cosign.pub
