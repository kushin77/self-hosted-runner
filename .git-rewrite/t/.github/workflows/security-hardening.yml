name: Security Audit & Hardened CI

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1' # Weekly at midnight Monday

# Permissions for OIDC (Workload Identity)
permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  audit:
    name: Security Scan (SCA & Secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (Secrets Scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true # Don't block build if historical leaks exist, but report them

      - name: Run Trivy (SCA & Secrets)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  deploy-vault-oidc:
    name: Vault OIDC Auth (Hardened)
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' # Only on trusted branches
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP/KMS (Auto-Unseal)
        id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          # Workload Identity Provider and Service Account (populated by ops)
          workload_identity_provider: '${{ secrets.GCP_WIF_PROVIDER }}'
          service_account: '${{ secrets.GCP_WIF_SA }}'

      - name: 'Setup GCloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      # Example: Use OIDC to get Vault Token instead of static RoleID/SecretID
      - name: Import Vault Secrets (OIDC)
        uses: hashicorp/vault-action@v2
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: jwt
          path: jwt
          role: github-actions-role
          secrets: |
            secret/data/ci/registry-creds token | REGISTRY_TOKEN ;
            secret/data/ci/redis-password password | PROVISIONER_REDIS_PASS
