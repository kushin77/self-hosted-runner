name: Auto-close Phase P3 after Terraform Apply

on:
  workflow_run:
    workflows:
      - "Terraform Plan/Apply (safe)"
    types:
      - completed

permissions:
  issues: write
  contents: read

jobs:
  close-on-success:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Close Phase P3 issues (automated)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run = context.payload.workflow_run || {};
            const runUrl = run.html_url || '';
            const commentBody = `Automated: Terraform Plan/Apply workflow succeeded (${runUrl}). Closing Phase P3 master tracker and Ops action items.`;

            // Close master tracker (#240)
            await github.issues.createComment({ owner, repo, issue_number: 240, body: commentBody });
            await github.issues.update({ owner, repo, issue_number: 240, state: 'closed' });

            // Close Ops action (#245) if it exists
            try {
              await github.issues.createComment({ owner, repo, issue_number: 245, body: 'Automated: production apply succeeded; closing this Ops action.' });
              await github.issues.update({ owner, repo, issue_number: 245, state: 'closed' });
            } catch (err) {
              core.info('Ops action #245 not found or already closed.');
            }

            // Optional follow-ups: create a short release-complete comment
            await github.issues.createComment({ owner, repo, issue_number: 243, body: 'Note: Phase P3 production rollout complete. Consider scheduling Phase P4 backlog grooming.' }).catch(() => {});
