---
# RUNNER MACHINE AUTOSCALING CONFIGURATION (GitLab Runner on AWS/Google Cloud)
machine_autoscaling:
  name: "autoscale-runner-pool"
  url: "https://gitlab.com/"
  token: "${GITLAB_RUNNER_TOKEN_5}"
  executor: "machine"
  
  # AWS EC2 configuration for autoscaling
  machine:
    image: "ubuntu-focal"
    machine_type: "n2-standard-4"
    
    # Autoscaling configuration
    IdleCount: 1
    IdleTime: 600
    MaxBuilds: 100
    TimeToLive: 3600
    MachineName: "gitlab-runner-%s"
    MachineDriver: "google"
    
    # Google Cloud configuration
    google:
      username: "centos"
      project: "${GCP_PROJECT_ID}"
      zone: "us-central1-a"
      machine_type: "n2-standard-4"
      preemptible: true
      image_family: "centos-7"
      tags:
        - "gitlab-runner"
        - "ci-cd"
        - "managed"
      metadata:
        ci_runner_id: "autoscale-5"
      use_internal_ip: false
      network: "default"
      subnetwork: ""
      disk_size: 100
      disk_type: "pd-standard"
  
  tags:
    - "autoscale"
    - "compute"
  
  run_untagged: false
  locked: false

---
# GITLAB RUNNER INSTALLATION & SETUP SCRIPT
# Usage: source this file to install and configure runners

install_gitlab_runner() {
  local OS=$(uname -s)
  local ARCH=$(uname -m)
  
  echo "Installing GitLab Runner on ${OS} ${ARCH}..."
  
  if [[ "$OS" == "Linux" ]]; then
    # Debian/Ubuntu
    if command -v apt-get &>/dev/null; then
      curl -L https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.deb.sh | sudo bash
      sudo apt-get install -y gitlab-runner
    # RHEL/CentOS
    elif command -v yum &>/dev/null; then
      curl -L https://packages.gitlab.com/install/repositories/runner/gitlab-runner/script.rpm.sh | sudo bash
      sudo yum install -y gitlab-runner
    fi
  elif [[ "$OS" == "Darwin" ]]; then
    brew install gitlab-runner
  fi
  
  echo "✓ GitLab Runner installed"
  gitlab-runner --version
}

register_runner() {
  local RUNNER_NAME=$1
  local RUNNER_TOKEN=$2
  local RUNNER_TAGS=$3
  local EXECUTOR=$4
  
  echo "Registering runner: ${RUNNER_NAME}"
  
  sudo gitlab-runner register \
    --non-interactive \
    --url "https://gitlab.com/" \
    --registration-token "${RUNNER_TOKEN}" \
    --executor "${EXECUTOR}" \
    --description "${RUNNER_NAME}" \
    --tag-list "${RUNNER_TAGS}" \
    --run-untagged "false" \
    --locked "false"
  
  echo "✓ Runner registered"
  sudo gitlab-runner verify
}

start_runner_service() {
  echo "Starting GitLab Runner service..."
  
  if [[ "$OS" == "Linux" ]]; then
    sudo systemctl enable --now gitlab-runner
    sudo systemctl status gitlab-runner
  elif [[ "$OS" == "Darwin" ]]; then
    brew services start gitlab-runner
  fi
  
  echo "✓ GitLab Runner service started"
}

verify_runner() {
  echo "Verifying runner configuration..."
  sudo gitlab-runner verify --delete
  sudo gitlab-runner list
}

# Export functions for external use
export -f install_gitlab_runner
export -f register_runner
export -f start_runner_service
export -f verify_runner
