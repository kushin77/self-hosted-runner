# 🔐 Secrets Classification & Inventory Framework

# This is the SINGLE SOURCE OF TRUTH for all repository secrets.
# Every operation (validation, rotation, access, audit) references this registry.
# Format: YAML for machine-parsing + CI/CD automation

version: "1.0"
last_updated: "2026-03-07"
owner: "CI/CD Security"

# ============================================================================
# TIER 1: INFRASTRUCTURE AUTHENTICATION
# Criticality: 🔴 CRITICAL | Rotation: Every 90 days | Access: Bot-only
# ============================================================================

secrets:
  
  # --- GCP DISASTER RECOVERY & MULTI-CLOUD (Linked Set) ---
  - name: GCP_SERVICE_ACCOUNT_KEY
    tier: "infrastructure"
    criticality: "critical"
    type: "service-account-json"
    rotation_days: 90
    last_rotated: "2026-03-07"
    next_rotation_due: "2026-06-05"
    status: "⚠️ INVALID (truncated/malformed JSON)"
    
    # Access control
    access_pattern: "github-actions-only"
    used_by_workflows:
      - "docker-hub-weekly-dr-testing.yml"
      - "multi-region-backup-verify.yml"
      - "terraform-plan-ami.yml"
      - "autonomous-health-check.yml"
    
    # Validation rules (auto-checked daily)
    validation:
      format: "JSON service account"
      required_fields: ["type", "project_id", "private_key", "client_email"]
      is_valid_json: false  # FLAG FOR OPS
      expected_key_type: "service_account"
      project_match_expected: "self-hosted-runner"
    
    # Incident response
    if_invalid: |
      1. Open blocking issue immediately
      2. Run SECRETS_EMERGENCY.md playbook #1 (GCP Credential Restore)
      3. Notify ops@elevatediq.com
      4. Disable affected workflows (add skip condition)
    
    # Procurement source
    provisioning:
      service: "Google Cloud IAM"
      method: "gcloud iam service-accounts keys create"
      scopes_required:
        - "compute:admin"
        - "storage:admin"
        - "container:admin"
      docs: "https://cloud.google.com/docs/authentication/getting-started"

  - name: GCP_PROJECT_ID
    tier: "infrastructure"
    criticality: "critical"
    type: "string"
    rotation_days: "never" # Project ID never rotates
    last_set: "2026-02-15"
    status: "✅ VALID"
    
    access_pattern: "public-in-code"  # Can be in repo docs
    example_value: "self-hosted-runner-prod"
    validation:
      format: "GCP project ID (lowercase alphanumeric+dash)"
      pattern: "^[a-z0-9][a-z0-9-]{4,28}[a-z0-9]$"
      must_match: "service account project_id field"

  - name: GCP_SERVICE_ACCOUNT_EMAIL
    tier: "infrastructure"
    criticality: "high"
    type: "email"
    rotation_days: "never" # Email derived from account
    last_set: "2026-02-15"
    status: "✅ VALID"
    
    example_value: "self-hosted-runner@self-hosted-runner.iam.gserviceaccount.com"
    validation:
      format: "GCP service account email"
      pattern: "^[a-z0-9][-a-z0-9]*@[a-z0-9][-a-z0-9]*\\.iam\\.gserviceaccount\\.com$"

  - name: GCP_WORKLOAD_IDENTITY_PROVIDER
    tier: "infrastructure"
    criticality: "high"
    type: "string"
    rotation_days: "never"
    last_set: "2026-02-15"
    status: "✅ VALID"
    
    used_by_workflows: ["autonomous-health-check.yml"]
    validation:
      format: "GCP WIF provider resource name"
      example: "projects/123456789/locations/global/workloadIdentityPools/github/providers/github-oid"

  # --- GITHUB RUNTIME AUTOMATION (Deployment PAT) ---
  - name: RUNNER_MGMT_TOKEN
    tier: "infrastructure"
    criticality: "critical"
    type: "github-pat"
    rotation_days: 90
    last_rotated: "2026-03-05"
    next_rotation_due: "2026-06-03"
    status: "✅ VALID (expires 2026-06-03 15:30:00Z)"
    
    access_pattern: "github-actions-only"
    used_by_workflows:
      - "runner-self-heal.yml"
      - "ephemeral-runner-lifecycle.yml"
      - "auto-bootstrap-vault-secrets.yml"
      - "dr-secret-monitor-and-trigger.yml"
    
    validation:
      format: "GitHub Personal Access Token"
      prefix: "ghp_"  # Optional: check token prefix if exposed in logs
      required_scopes: ["repo", "admin:repo_hook", "admin:org_hook"]
      token_expiration: "2026-06-03T15:30:00Z"
    
    provisioning:
      service: "GitHub Personal Settings"
      method: "Settings > Developer settings > Personal access tokens > Tokens (classic) > Generate new token"
      docs: "https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens"

  # --- SSH DEPLOYMENT KEYS (Runner Host Access) ---
  - name: DEPLOY_SSH_KEY
    tier: "infrastructure"
    criticality: "critical"
    type: "ssh-private-key-ed25519"
    rotation_days: 90
    last_rotated: "2026-03-06"
    next_rotation_due: "2026-06-04"
    status: "✅ VALID"
    
    access_pattern: "github-actions-only"
    used_by_workflows:
      - "deploy-rotation-staging.yml"
      - "runner-self-heal.yml"
      - "ansible-provisioning.yml"
    
    validation:
      format: "ED25519 SSH Private Key (PEM)"
      must_contain: ["-----BEGIN OPENSSH PRIVATE KEY-----", "-----END OPENSSH PRIVATE KEY-----"]
      no_passphrase: true  # GitHub can't handle interactive prompts
    
    associated_public_key: |
      ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIG... runner-deploy-automation
      (Installed on runner hosts: .ssh/authorized_keys)
    
    provisioning:
      service: "Local ssh-keygen"
      method: "ssh-keygen -t ed25519 -f ~/.ssh/runner_deploy -N ''"
      docs: "https://man.openbsd.org/ssh-keygen"

  # --- TERRAFORM INFRASTRUCTURE-AS-CODE (GCP Credentials) ---
  - name: TF_VAR_SERVICE_ACCOUNT_KEY
    tier: "infrastructure"
    criticality: "critical"
    type: "service-account-json" # Duplicate of GCP key for Terraform
    rotation_days: 90
    last_rotated: "2026-03-07"
    next_rotation_due: "2026-06-05"
    status: "⚠️ SYNCED WITH GCP_SERVICE_ACCOUNT_KEY"
    
    note: "MUST match GCP_SERVICE_ACCOUNT_KEY exactly (automated sync required)"
    used_by_workflows:
      - "terraform-plan-ami.yml"
      - "terraform-apply.yml"
      - "terraform-dns-apply.yml"
    
    validation:
      format: "GCP Service Account JSON"
      must_sync_with: "GCP_SERVICE_ACCOUNT_KEY"
      sync_frequency: "On every rotation"

# ============================================================================
# TIER 2: CONTAINER REGISTRY ACCESS
# Criticality: 🟠 HIGH | Rotation: Every 60 days | Access: CI/CD only
# ============================================================================

  # --- DOCKER HUB AUTHENTICATION ---
  - name: DOCKER_HUB_USERNAME
    tier: "registry"
    criticality: "high"
    type: "string"
    rotation_days: "never" # Username doesn't rotate
    last_set: "2026-02-15"
    status: "✅ VALID"
    
    used_by_workflows: ["docker-hub-auto-secret-rotation.yml", "ci-images.yml"]
    example_value: "kushin77-bot"
    
    provisioning:
      service: "Docker Hub Account Management"
      docs: "https://hub.docker.com/account/settings"

  - name: DOCKER_HUB_PAT
    tier: "registry"
    criticality: "high"
    type: "docker-hub-pat"
    rotation_days: 60
    last_rotated: "2026-02-28"
    next_rotation_due: "2026-04-28"
    status: "✅ VALID"
    
    used_by_workflows:
      - "ci-images.yml"
      - "multi-registry-backup-verify.yml"
      - "publish-portal-image.yml"
    
    validation:
      format: "Docker Hub Personal Access Token"
      scopes: ["read:repos", "write:repos", "delete:repos"]
      expiration: "never"  # Docker Hub PATs don't expire by default
    
    provisioning:
      service: "Docker Hub Settings > Security > Personal Access Tokens"
      docs: "https://docs.docker.com/docker-hub/access-tokens/"

# ============================================================================
# TIER 3: SECRETS MANAGEMENT (Vault, MinIO)
# Criticality: 🟠 HIGH | Rotation: Quarterly (90 days) | Access: Bot-only
# ============================================================================

  # --- HASHICORP VAULT AUTHENTICATION (AppRole) ---
  - name: VAULT_ADDR
    tier: "secrets-mgmt"
    criticality: "high"
    type: "url"
    rotation_days: "never" # URL doesn't rotate
    last_set: "2026-02-15"
    status: "✅ VALID"
    
    example_value: "https://vault.internal.elevatediq.com"
    validation:
      format: "HTTPS URL"
      pattern: "^https://"

  - name: VAULT_NAMESPACE
    tier: "secrets-mgmt"
    criticality: "high"
    type: "string"
    rotation_days: "never"
    last_set: "2026-02-15"
    status: "✅ VALID"
    
    example_value: "ci-automation"
    validation:
      format: "Vault namespace path"

  - name: VAULT_ROLE_ID
    tier: "secrets-mgmt"
    criticality: "critical"
    type: "vault-role-id"
    rotation_days: 90
    last_rotated: "2026-03-01"
    next_rotation_due: "2026-05-30"
    status: "✅ VALID"
    
    validation:
      format: "UUID"
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
    
    provisioning:
      service: "HashiCorp Vault AppRole"
      method: "vault write auth/approle/role/ci-automation role_id=..."
      docs: "https://www.vaultproject.io/docs/auth/approle"

  - name: VAULT_SECRET_ID
    tier: "secrets-mgmt"
    criticality: "critical"
    type: "vault-secret-id"
    rotation_days: 90
    last_rotated: "2026-03-01"
    next_rotation_due: "2026-05-30"
    status: "✅ VALID"
    
    note: "SecretID is ephemeral by design (wrapped TTL 1 hour)"
    validation:
      format: "UUID or wrapped response"
      wrapped_ttl: "1h"
    
    provisioning:
      service: "HashiCorp Vault AppRole"
      method: "vault write -f auth/approle/role/ci-automation/secret-id"
      docs: "https://www.vaultproject.io/docs/auth/approle"

  # --- MINIO S3-COMPATIBLE STORAGE ---
  - name: MINIO_ENDPOINT
    tier: "secrets-mgmt"
    criticality: "high"
    type: "url"
    rotation_days: "never"
    last_set: "2026-02-15"
    status: "✅ VALID"
    
    example_value: "https://minio.internal.elevatediq.com:9000"
    validation:
      format: "https://host:port"

  - name: MINIO_ACCESS_KEY
    tier: "secrets-mgmt"
    criticality: "high"
    type: "minio-access-key"
    rotation_days: 60
    last_rotated: "2026-02-28"
    next_rotation_due: "2026-04-28"
    status: "✅ VALID"
    
    validation:
      format: "MinIO Access Key (alphanumeric, 3-20 chars)"
      pattern: "^[a-zA-Z0-9]{3,20}$"
    
    provisioning:
      service: "MinIO Admin Console"
      method: "mcli admin user add minio access-key secret-key"
      docs: "https://min.io/docs/minio/linux/reference/minio-mc-admin/mc-admin-user.html"

  - name: MINIO_SECRET_KEY
    tier: "secrets-mgmt"
    criticality: "high"
    type: "minio-secret-key"
    rotation_days: 60
    last_rotated: "2026-02-28"
    next_rotation_due: "2026-04-28"
    status: "✅ VALID"
    
    validation:
      format: "MinIO Secret Key (URL-safe base64)"
      min_length: 40

  - name: MINIO_BUCKET
    tier: "secrets-mgmt"
    criticality: "high"
    type: "string"
    rotation_days: "never"
    last_set: "2026-02-15"
    status: "✅ VALID"
    
    example_value: "ci-runners-artifacts"
    validation:
      format: "S3 bucket name (lowercase alphanumeric + dash)"
      pattern: "^[a-z0-9][a-z0-9-]{2,61}[a-z0-9]$"

# ============================================================================
# TIER 4: NOTIFICATION & EXTERNAL INTEGRATIONS
# Criticality: 🟡 MEDIUM | Rotation: Every 6 months | Access: Specific workflows
# ============================================================================

  - name: SLACK_WEBHOOK_URL
    tier: "integration"
    criticality: "medium"
    type: "webhook-url"
    rotation_days: 180
    last_rotated: "2025-09-07"
    next_rotation_due: "2026-09-07"
    status: "✅ VALID"
    
    used_by_workflows:
      - "dr-reconciliation-auto-remediate.yml"
      - "security-audit.yml"
      - "workflow failure notifications"
    
    validation:
      format: "Slack Incoming Webhook URL"
      pattern: "^https://hooks\\.slack\\.com/services/"
      no_exposure: "Never log this URL"
    
    provisioning:
      service: "Slack Workspace > App Integrations > Custom Integrations > Incoming Webhooks"
      docs: "https://api.slack.com/messaging/webhooks"

# ============================================================================
# TIER 5: KUBERNETES & INFRASTRUCTURE CONFIG
# Criticality: 🟠 HIGH | Rotation: On-demand | Access: Deployment workflows only
# ============================================================================

  - name: STAGING_KUBECONFIG
    tier: "infrastructure"
    criticality: "high"
    type: "kubeconfig-yaml"
    rotation_days: "never" # Rotates when cluster updated
    last_set: "2026-02-15"
    status: "✅ VALID"
    
    used_by_workflows:
      - "e2e-validate-hands-off-deploy.yml"
      - "helm-chart-smoke-tests.yml"
      - "portal-sync-validate.yml"
    
    validation:
      format: "Kubernetes kubeconfig YAML"
      required_fields: ["apiVersion: v1", "kind: Config", "clusters", "contexts", "users"]
      certificate_expiry_check: "must expire within 1 year"
    
    provisioning:
      service: "Kubernetes cluster (EKS, GKE, or on-prem)"
      note: "Typically generated during cluster provisioning"

# ============================================================================
# ROTATION SCHEDULE MATRIX (Automated)
# ============================================================================

rotation_schedule:
  
  every_60_days:
    - DOCKER_HUB_PAT
    - MINIO_ACCESS_KEY
    - MINIO_SECRET_KEY
  
  every_90_days:
    - GCP_SERVICE_ACCOUNT_KEY
    - RUNNER_MGMT_TOKEN
    - DEPLOY_SSH_KEY
    - VAULT_ROLE_ID
    - VAULT_SECRET_ID
    - TF_VAR_SERVICE_ACCOUNT_KEY
  
  every_180_days:
    - SLACK_WEBHOOK_URL
  
  never_rotate:
    - GCP_PROJECT_ID
    - GCP_SERVICE_ACCOUNT_EMAIL
    - GCP_WORKLOAD_IDENTITY_PROVIDER
    - VAULT_ADDR
    - VAULT_NAMESPACE
    - MINIO_ENDPOINT
    - MINIO_BUCKET
    - DOCKER_HUB_USERNAME
    - STAGING_KUBECONFIG

# ============================================================================
# VALIDATION RULES (Enforced Daily)
# ============================================================================

validation_rules:
  
  critical_secrets:
    - Must be non-empty (checked daily)
    - JSON secrets must parse (checked daily)
    - Expiration must be > 30 days away (checked daily)
    - If invalid: Auto-create blocking GitHub issue
    - If expiration < 14 days: Yellow warning, escalation to ops
    - If expiration < 7 days: Red alert + email + Slack

  rotation_enforcement:
    - Overdue rotations trigger automated PR creation
    - Rotation PRs require manual review and approval
    - Successful rotation updates last_rotated timestamp
    - Failed rotation triggers incident response playbook

# ============================================================================
# COMPLIANCE & AUDIT REQUIREMENTS
# ============================================================================

compliance:
  soc2:
    requirement: "All secrets must be rotated per schedule"
    frequency: "Verify monthly"
    audit_trail: "All rotations logged to ROTATION_LOG.md"
  
  pci_dss:
    requirement: "Secrets used in payment systems must rotate every 90 days"
    scope: "N/A (no payment secrets currently)"
  
  iso_27001:
    requirement: "Access to secrets must be logged and auditable"
    implementation: "GitHub Actions audit logs + custom logging in workflows"

# ============================================================================
# INCIDENT & EMERGENCY PROCEDURES
# ============================================================================

emergency_procedures:
  
  if_secret_exposed:
    step_1: "Open emergency issue with [SECURITY INCIDENT] tag"
    step_2: "Immediately rotate the exposed secret"
    step_3: "Audit all workflows that used the exposed secret"
    step_4: "Re-run affected workflows with new secret"
    step_5: "Update ROTATION_LOG.md with incident details"
    step_6: "Schedule 24-hour incident review"
  
  if_rotation_fails:
    step_1: "Workflow will retry 3 times (exponential backoff)"
    step_2: "If all retries fail, create blocking issue"
    step_3: "Page on-call engineer (Slack + email)"
    step_4: "Follow SECRETS_EMERGENCY.md playbook"

# ============================================================================
# GOVERNANCE & POLICY
# ============================================================================

policies:
  
  access_control:
    rule: "Secrets are accessed only by GitHub Actions workflows"
    enforcement: "Branch protection prevents adding secrets outside CI/CD"
    audit: "All secret access is logged by GitHub"
  
  naming_convention:
    rule: "Secrets use UPPER_SNAKE_CASE + tier prefix where applicable"
    examples:
      - "GCP_SERVICE_ACCOUNT_KEY (tier: infrastructure)"
      - "DOCKER_HUB_PAT (tier: registry)"
      - "VAULT_ROLE_ID (tier: secrets-mgmt)"
  
  documentation:
    rule: "Every secret MUST have entry in SECRETS_CLASSIFICATION.yml"
    rule: "Every secret MUST link to provisioning documentation"
    rule: "Every secret MUST have validation rules"
    rule: "Every secret rotation MUST be logged"

# ============================================================================
# FUTURE ENHANCEMENTS (Roadmap for 2026)
# ============================================================================

roadmap:
  
  q2_2026:
