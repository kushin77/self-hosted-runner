name: Publish Normalizer Image

on:
  workflow_dispatch:
    inputs:
     
image_tag:
        description: 'Image tag'
        required: false
        default:
'20260312'
  push:
    branches:
      - main

permissions:
  contents: read
 
packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
  
   - uses: actions/checkout@v4
      - name: Set up QEMU
        uses:
docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses:
docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses:
docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{
github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name:
Build and push
        uses: docker/build-push-action@v4
        ...
...
        with:
         
context: nexus-engine
          file: nexus-engine/Dockerfile.normalizer
       
  push: true
          tags: ghcr.io/${{ github.repository_owner
}}/nexus-normalizer:${{ github.event.inputs.image_tag || github.run_number }}