name: Admin Merge (secure)

on:
  workflow_dispatch:
    inputs:
     
pr_numbers:
        description: 'Space-separated PR numbers to merge (e.g. "2745
2746")'
        required: false
        default: '2745 2746'

permissions:
  contents:
write
  pull-requests: write

jobs:
  admin-merge:
    name: Run secure
merge
    runs-on: ubuntu-latest
    environment: production
    steps:
      -
name: Checkout
        uses: actions/checkout@v4

      - name: Prepare inputs
   
    id: prepare
        run: |
          PRS="${{
github.event.inputs.pr_numbers }}"
          echo "prs=$PRS" >> $GITHUB_OUTPUT

      - name: Make merge
script executable
        run: |
          chmod +x
./scripts/ops/merge_day3_prs_secure.sh

      - name: Run secure merge
        env:
        ...
...
          GH_ADMIN_TOKEN:
${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          set -euo pipefail
         
PRS=${{ steps.prepare.outputs.prs }}
          echo "Running admin merge for
PRs: $PRS"
          # The merge script will not echo the token and avoids writing
secrets to disk.
          ./scripts/ops/merge_day3_prs_secure.sh $PRS

      -
name: Post merge summary
        run: |
          echo "Admin merge job
completed. Check PR statuses on GitHub." 