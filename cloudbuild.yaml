steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build','-f','backend/Dockerfile.prod','-t','us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:$SHORT_SHA','backend/']

# Build frontend assets first (install then build)
- name: 'node:18-alpine'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    echo "Installing frontend dependencies..."
    cd frontend
    # Use npm ci for deterministic, reproducible installs when lockfile exists
    if [ -f package-lock.json ]; then
      npm ci --prefer-offline --no-audit
    else
      npm install --no-audit
    fi
    echo "Building frontend assets..."
    npm run build
    cd ..

# Then build frontend Docker image with built assets
- name: 'gcr.io/cloud-builders/docker'
  args: ['build','-f','frontend/Dockerfile','-t','us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:$SHORT_SHA','frontend/']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push','us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:$SHORT_SHA']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push','us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:$SHORT_SHA']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    gcloud run deploy nexus-shield-portal-backend --image=us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:$SHORT_SHA --region=us-central1 --project=$PROJECT_ID --platform=managed --quiet
    gcloud run deploy nexus-shield-portal-frontend --image=us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:$SHORT_SHA --region=us-central1 --project=$PROJECT_ID --platform=managed --quiet
images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:$SHORT_SHA'
- 'us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:$SHORT_SHA'
options:
  substitution_option: ALLOW_LOOSE
substitutions:
  _TAG: 'latest'
timeout: '1200s'
