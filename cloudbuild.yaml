steps:
# Run backend lint only (tests run in dev; production build is fast and deterministic)
- name: 'node:18-alpine'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    echo "Running backend lint..."
    cd backend
    if [ -f package-lock.json ]; then
      npm ci --silent
    else
      npm install --silent
    fi
    npm run lint

- name: 'gcr.io/cloud-builders/docker'
  args: ['build','-f','backend/Dockerfile.prod','-t','us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:${_SHORT_SHA}','backend/']

# Generate SBOM for backend image and scan for vulnerabilities (fail on HIGH/CRITICAL)
- name: 'anchore/syft:0.69.0'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    echo "Generating SBOM for backend image"
    syft packages us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:${_SHORT_SHA} -o json > sbom-backend-${_SHORT_SHA}.json || true
    # Also emit CycloneDX for consumers that expect SBOM standards
    syft packages us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:${_SHORT_SHA} -o cyclonedx > sbom-backend-${_SHORT_SHA}.cyclonedx.json || true

- name: 'gcr.io/cloud-builders/gsutil'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    if [ -n "${_SBOM_BUCKET:-}" ]; then
      echo "Uploading backend SBOM to ${_SBOM_BUCKET}"
      gsutil cp sbom-backend-${_SHORT_SHA}.json ${_SBOM_BUCKET}/sbom-backend-${_SHORT_SHA}.json || true
      gsutil cp sbom-backend-${_SHORT_SHA}.cyclonedx.json ${_SBOM_BUCKET}/sbom-backend-${_SHORT_SHA}.cyclonedx.json || true
    else
      echo "No _SBOM_BUCKET provided; skipping SBOM upload"
    fi

- name: 'aquasec/trivy:0.43.2'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    echo "Updating Trivy DB"
    trivy --download-db-only || true
    echo "Scanning backend image for HIGH/CRITICAL vulnerabilities"
    trivy image --severity CRITICAL,HIGH --exit-code 1 --format json -o trivy-backend-${_SHORT_SHA}.json us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:${_SHORT_SHA} || (echo "Vulnerabilities found in backend image" && exit 1)
    # upload trivy report if bucket provided
    if [ -n "${_SBOM_BUCKET:-}" ]; then
      gsutil cp trivy-backend-${_SHORT_SHA}.json ${_SBOM_BUCKET}/trivy-backend-${_SHORT_SHA}.json || true
    fi

# Build frontend assets first (install then build)
- name: 'node:18-alpine'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    echo "Installing frontend dependencies..."
    cd frontend
    # Use npm ci for deterministic, reproducible installs when lockfile exists
    if [ -f package-lock.json ]; then
      npm ci --prefer-offline --no-audit
    else
      npm install --no-audit
    fi
    echo "Building frontend assets..."
    npm run build
    cd ..

# Then build frontend Docker image with built assets
- name: 'gcr.io/cloud-builders/docker'
  args: ['build','-f','frontend/Dockerfile','-t','us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:${_SHORT_SHA}','frontend/']

# Generate SBOM for frontend image and scan for vulnerabilities (fail on HIGH/CRITICAL)
- name: 'anchore/syft:0.69.0'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    echo "Generating SBOM for frontend image"
    syft packages us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:${_SHORT_SHA} -o json > sbom-frontend-${_SHORT_SHA}.json || true
    syft packages us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:${_SHORT_SHA} -o cyclonedx > sbom-frontend-${_SHORT_SHA}.cyclonedx.json || true

- name: 'gcr.io/cloud-builders/gsutil'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    if [ -n "${_SBOM_BUCKET:-}" ]; then
      echo "Uploading frontend SBOM to ${_SBOM_BUCKET}"
      gsutil cp sbom-frontend-${_SHORT_SHA}.json ${_SBOM_BUCKET}/sbom-frontend-${_SHORT_SHA}.json || true
      gsutil cp sbom-frontend-${_SHORT_SHA}.cyclonedx.json ${_SBOM_BUCKET}/sbom-frontend-${_SHORT_SHA}.cyclonedx.json || true
    else
      echo "No _SBOM_BUCKET provided; skipping SBOM upload"
    fi

- name: 'aquasec/trivy:0.43.2'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    echo "Updating Trivy DB"
    trivy --download-db-only || true
    echo "Scanning frontend image for HIGH/CRITICAL vulnerabilities"
    trivy image --severity CRITICAL,HIGH --exit-code 1 --format json -o trivy-frontend-${_SHORT_SHA}.json us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:${_SHORT_SHA} || (echo "Vulnerabilities found in frontend image" && exit 1)
    if [ -n "${_SBOM_BUCKET:-}" ]; then
      gsutil cp trivy-frontend-${_SHORT_SHA}.json ${_SBOM_BUCKET}/trivy-frontend-${_SHORT_SHA}.json || true
    fi

- name: 'gcr.io/cloud-builders/docker'
  args: ['push','us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:${_SHORT_SHA}']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push','us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:${_SHORT_SHA}']
# Optional: Sign images with cosign when _COSIGN_KMS_URI is provided
- name: 'gcr.io/sigstore/cosign/cosign:2.1.0'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    if [ -n "${_COSIGN_KMS_URI:-}" ]; then
      echo "Signing backend image with cosign using KMS: ${_COSIGN_KMS_URI}"
      cosign sign --key "${_COSIGN_KMS_URI}" us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:${_SHORT_SHA}
      echo "Signing frontend image with cosign using KMS: ${_COSIGN_KMS_URI}"
      cosign sign --key "${_COSIGN_KMS_URI}" us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:${_SHORT_SHA}
    else
      echo "No _COSIGN_KMS_URI provided; skipping image signing"
    fi

# Optional: verify signatures before deploy when _COSIGN_KMS_URI is provided
- name: 'gcr.io/sigstore/cosign/cosign:2.1.0'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    if [ -n "${_COSIGN_KMS_URI:-}" ]; then
      echo "Verifying backend image signature using KMS (public key via KMS URI): ${_COSIGN_KMS_URI}"
      cosign verify --key "${_COSIGN_KMS_URI}" us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:${_SHORT_SHA} || (echo "Backend image signature verification failed" && exit 1)
      echo "Verifying frontend image signature"
      cosign verify --key "${_COSIGN_KMS_URI}" us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:${_SHORT_SHA} || (echo "Frontend image signature verification failed" && exit 1)
    else
      echo "No _COSIGN_KMS_URI provided; skipping signature verification"
    fi
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -euo pipefail
    # Ensure deployment secrets are available - prefer Secret Manager/GSM
    if [ -n "${_GITHUB_TOKEN_SECRET:-}" ]; then
      echo "Fetching GITHUB_TOKEN from Secret Manager"
      export GITHUB_TOKEN=$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}" --project="$PROJECT_ID")
    fi
    if [ -n "${_GRAFANA_API_KEY_SECRET:-}" ]; then
      echo "Fetching GRAFANA_API_KEY from Secret Manager"
      export GRAFANA_API_KEY=$(gcloud secrets versions access latest --secret="${_GRAFANA_API_KEY_SECRET}" --project="$PROJECT_ID")
    fi
    if [ -z "${GITHUB_TOKEN:-}" ]; then
      echo "GITHUB_TOKEN is required for post-deploy verification but not provided; failing build"
      exit 1
    fi
    gcloud run deploy nexus-shield-portal-backend --image=us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:${_SHORT_SHA} --region=us-central1 --project=$PROJECT_ID --platform=managed --port=8080 --quiet
    gcloud run deploy nexus-shield-portal-frontend --image=us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:${_SHORT_SHA} --region=us-central1 --project=$PROJECT_ID --platform=managed --port=8080 --quiet
    
# Post-deploy verification: run the post-deploy hook which will run the verify script.
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -euo pipefail
    # If GITHUB_TOKEN is available in the build environment (preferred), use it.
    if [ -n "${GITHUB_TOKEN:-}" ]; then
      echo "Using GITHUB_TOKEN from environment for post-deploy verification"
      export GITHUB_TOKEN
    elif [ -n "${_GITHUB_TOKEN_SECRET:-}" ]; then
      echo "Fetching GITHUB_TOKEN from Secret Manager: ${_GITHUB_TOKEN_SECRET}"
      GITHUB_TOKEN=$(gcloud secrets versions access latest --secret="${_GITHUB_TOKEN_SECRET}" --project="$PROJECT_ID")
      export GITHUB_TOKEN
    else
      echo "No GITHUB_TOKEN available; skipping post-deploy verification"
      exit 0
    fi
    chmod +x tools/post-deploy-verify.sh
    ./tools/post-deploy-verify.sh
    # If Grafana secret is provided, import the compliance dashboard (idempotent)
    if [ -n "${_GRAFANA_API_KEY_SECRET:-}" ]; then
      echo "Fetching Grafana API key from Secret Manager: ${_GRAFANA_API_KEY_SECRET}"
      GRAFANA_API_KEY=$(gcloud secrets versions access latest --secret="${_GRAFANA_API_KEY_SECRET}" --project="$PROJECT_ID")
      export GRAFANA_API_KEY
      # GRAFANA_URL can be provided as a substitution or env var; default to internal Grafana if set
      GRAFANA_URL="${GRAFANA_URL:-http://grafana:3000}"
      export GRAFANA_URL
      chmod +x scripts/monitoring/ensure_grafana_dashboard.sh
      ./scripts/monitoring/ensure_grafana_dashboard.sh
    else
      echo "No Grafana secret substitution provided; skipping dashboard import"
    fi
images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-backend:${_SHORT_SHA}'
- 'us-central1-docker.pkg.dev/$PROJECT_ID/production-portal-docker/nexus-shield-portal-frontend:${_SHORT_SHA}'
options:
  substitution_option: ALLOW_LOOSE
substitutions:
  _TAG: 'latest'
  _GITHUB_TOKEN_SECRET: ''
  _GRAFANA_API_KEY_SECRET: ''
  _SHORT_SHA: 'manual'
  _SBOM_BUCKET: 'gs://nexusshield-dev-sbom-archive'
timeout: '1200s'
