# P2 Safety: Pytest Configuration
# Python test framework with 80%+ coverage gates
# Auto-generated as part of 10X Enhancement Phase 2 deployment
# Idempotent: Safe to regenerate multiple times

[pytest]
minversion = 7.0
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
testpaths = tests
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing:skip-covered
    --cov-report=html:test-results/coverage-python
    --cov-report=json:test-results/coverage-python.json
    --cov-report=lcov:test-results/coverage.lcov
    --cov-fail-under=80
    --cov-branch
    --junit-xml=test-results/junit-pytest.xml
    --maxfail=0

markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    smoke: Smoke tests
    slow: Slow tests (deselect with '-m "not slow"')
    security: Security-related tests
    compliance: Compliance verification tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

timeout = 300
timeout_method = thread

asyncio_mode = auto
