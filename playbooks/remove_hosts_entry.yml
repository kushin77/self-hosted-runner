---
- name: Remove temporary hosts entry for GitLab
  hosts: runners
  become: true
  tasks:
    - name: Remove gitlab.internal.elevatediq.com from /etc/hosts
      lineinfile:
        path: /etc/hosts
        regexp: '^\s*\d+\.\d+\.\d+\.\d+\s+gitlab\.internal\.elevatediq\.com\b'
        state: absent

    - name: Ensure /etc/hosts backup exists
      copy:
        src: /etc/hosts
        dest: /var/backups/hosts-{{ ansible_date_time.iso8601 }}
        remote_src: yes
        when: false
