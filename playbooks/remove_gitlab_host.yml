---
- name: Remove temporary GitLab hosts entry
  hosts: runners
  become: true
  gather_facts: no
  tasks:
    - name: Remove gitlab host entry from /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "^\s*.*\s+{{ gitlab_host_name }}$"
        state: absent
        backup: yes
      when: gitlab_host_ip is defined and gitlab_host_ip | length > 0

# Usage: ansible-playbook playbooks/remove_gitlab_host.yml -e "gitlab_host_ip=10.0.0.42"
