- hosts: runners
  gather_facts: no
  become: yes
  tasks:
    - name: Remove ANSIBLE GITLAB BLOCK from Caddyfile
      blockinfile:
        path: /etc/caddy/Caddyfile.portal.elevatediq
        marker: "# {mark} ANSIBLE GITLAB BLOCK"
        state: absent
      become: yes

    - name: Restart eiq-caddy
      become: yes
      command: docker restart eiq-caddy
      changed_when: false
