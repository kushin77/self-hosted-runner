---
# Allow provisioner-worker to communicate with Redis only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: provisioner-worker-egress-redis
  namespace: provisioner-system
spec:
  podSelector:
    matchLabels:
      app: provisioner-worker
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - to:
      - namespaceSelector: {}
      ports:
      - protocol: UDP
        port: 53
    # Allow Redis access (internal)
    - to:
      - podSelector:
          matchLabels:
            app: redis
      ports:
      - protocol: TCP
        port: 6379
    # Allow Vault access (external)
    - to:
      - namespaceSelector:
          matchLabels:
            name: vault
      ports:
      - protocol: TCP
        port: 8200

---
# Deny all ingress into provisioner-worker by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: provisioner-worker-deny-ingress
  namespace: provisioner-system
spec:
  podSelector:
    matchLabels:
      app: provisioner-worker
  policyTypes:
    - Ingress
  ingress:
    # Allow metrics scraping from Prometheus only
    - from:
      - podSelector:
          matchLabels:
            app: prometheus
      ports:
      - protocol: TCP
        port: 9090

---
# Allow managed-auth to communicate with Vault and provisioner-worker
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: managed-auth-egress
  namespace: provisioner-system
spec:
  podSelector:
    matchLabels:
      app: managed-auth
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - to:
      - namespaceSelector: {}
      ports:
      - protocol: UDP
        port: 53
    # Allow Vault access
    - to:
      - namespaceSelector:
          matchLabels:
            name: vault
      ports:
      - protocol: TCP
        port: 8200
    # Allow provisioner-worker access (internal job queueing)
    - to:
      - podSelector:
          matchLabels:
            app: provisioner-worker
      ports:
      - protocol: TCP
        port: 3000

---
# Deny all ingress into managed-auth (API should use service mesh or ALB)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: managed-auth-deny-ingress
  namespace: provisioner-system
spec:
  podSelector:
    matchLabels:
      app: managed-auth
  policyTypes:
    - Ingress
  ingress:
    # Allow from ingress controller only
    - from:
      - namespaceSelector:
          matchLabels:
            name: ingress-nginx
      ports:
      - protocol: TCP
        port: 3000

---
# Allow Redis internal communication only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-internal-only
  namespace: provisioner-system
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
      - podSelector:
          matchLabels:
            app: provisioner-worker
      - podSelector:
          matchLabels:
            app: managed-auth
      ports:
      - protocol: TCP
        port: 6379
