---
# Log all API requests related to secrets
apiVersion: audit.k8s.io/v1
kind: Policy
rules:
  # Log all requests at RequestResponse level
  - level: RequestResponse
    resources:
    - group: ""
      resources: ["secrets"]
    verbs: ["create", "update", "delete"]

  # Log Vault auth events
  - level: RequestResponse
    resources:
    - group: "auth.vault.io"
      resources: ["vaultauths"]

  # Default log rule
  - level: Metadata
