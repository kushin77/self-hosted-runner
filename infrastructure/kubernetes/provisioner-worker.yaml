apiVersion: v1
kind: Namespace
metadata:
  name: provisioner-system

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: provisioner-worker-config
  namespace: provisioner-system
data:
  USE_TERRAFORM_CLI: "1"
  JOBSTORE_PERSIST: "1"
  JOBSTORE_FILE: "/var/lib/provisioner-worker/jobstore.json"

---
apiVersion: v1
kind: Secret
metadata:
  name: provisioner-vault-credentials
  namespace: provisioner-system
type: Opaque
stringData:
  VAULT_ROLE_ID: "${VAULT_ROLE_ID}"
  VAULT_SECRET_ID: "${VAULT_SECRET_ID}"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: provisioner-worker-jobstore
  namespace: provisioner-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provisioner-worker
  namespace: provisioner-system
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: provisioner-worker
  template:
    metadata:
      labels:
        app: provisioner-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: provisioner-worker
      securityContext:
        fsGroup: 1000
      containers:
      - name: worker
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: IfNotPresent
        ports:
        - name: metrics
          containerPort: 9090
          protocol: TCP
        envFrom:
        - configMapRef:
            name: provisioner-worker-config
        - secretRef:
            name: provisioner-vault-credentials
        env:
        - name: VAULT_ADDR
          value: "https://vault.default.svc.cluster.local:8200"
        - name: PROVISIONER_REDIS_URL
          value: "redis://redis.default.svc.cluster.local:6379"
        volumeMounts:
        - name: jobstore
          mountPath: /var/lib/provisioner-worker
        livenessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: jobstore
        persistentVolumeClaim:
          claimName: provisioner-worker-jobstore

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provisioner-worker
  namespace: provisioner-system

---
apiVersion: v1
kind: Service
metadata:
  name: provisioner-worker
  namespace: provisioner-system
spec:
  selector:
    app: provisioner-worker
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
  type: ClusterIP
