---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-config
  namespace: oauth2-proxy
data:
  oauth2-proxy.cfg: |
    http_address = "0.0.0.0:4180"
    metrics_address = "0.0.0.0:8080"
    
    provider = "oidc"
    oidc_issuer_url = "https://keycloak.nexus.local/realms/nexusshield-prod"
    client_id = "oauth2-proxy"
    oidc_claim_groups = "groups"
    
    email_domains = [ "*" ]
    upstreams = [ "http://localhost:80" ]
    
    cookie_secure = "false"
    cookie_httponly = "true"
    cookie_samesite = "lax"
    cookie_path = "/"
    cookie_domain = ".nexus.local"
    
    session_store_type = "redis"
    redis_connection_url = "redis://redis-cache:6379"
    
    skip_provider_button = "false"
    skip_auth_prefixes = "/health,/metrics"
    
    logging_level = "info"
    log_requests = "true"
    
    request_logging = "true"
    request_id_header = "X-Request-ID"
    
    pass_access_token = "true"
    pass_authorization_header = "true"
    pass_user_headers = "true"
    prefer_email_to_user = "true"
    
    set_xauthrequest = "true"
    auth_logging = "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
  labels:
    app: oauth2-proxy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - oauth2-proxy
              topologyKey: kubernetes.io/hostname
      containers:
      - name: oauth2-proxy
        image: quay.io/oauth2-proxy/oauth2-proxy:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 4180
        - name: metrics
          containerPort: 8080
        args:
        - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
        env:
        - name: OAUTH2_PROXY_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-secrets
              key: client_secret
        - name: OAUTH2_PROXY_COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: oauth2-proxy-secrets
              key: cookie_secret
        volumeMounts:
        - name: config
          mountPath: /etc/oauth2-proxy
        livenessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ping
            port: 4180
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: oauth2-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: oauth2-proxy
  labels:
    app: oauth2-proxy
spec:
  type: ClusterIP
  selector:
    app: oauth2-proxy
  ports:
  - name: http
    port: 4180
    targetPort: 4180
  - name: metrics
    port: 8080
    targetPort: 8080
