---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-overrides
  namespace: monitoring
data:
  overrides.yaml: |
    overrides:
      max_bytes_per_trace: 5000000
      max_spans_per_trace: 10000
      rate_limit_bytes: 0
      rate_limit_spans: 0
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: monitoring
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      serviceAccountName: tempo
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - tempo
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: tempo
        image: grafana/tempo:2.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: otlp-grpc
          containerPort: 4317
          protocol: TCP
        - name: otlp-http
          containerPort: 4318
          protocol: TCP
        - name: tempo-http
          containerPort: 3200
          protocol: TCP
        - name: tempo-grpc
          containerPort: 3100
          protocol: TCP
        env:
        - name: GOGC
          value: "80"
        args:
        - -config.file=/etc/tempo/tempo.yaml
        livenessProbe:
          httpGet:
            path: /api/status/buildinfo
            port: tempo-http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/status/buildinfo
            port: tempo-http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2"
        volumeMounts:
        - name: tempo-config
          mountPath: /etc/tempo/
        - name: tempo-data
          mountPath: /var/tempo
      volumes:
      - name: tempo-config
        configMap:
          name: tempo-config
      - name: tempo-data
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitoring
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 3100
    
    distributor:
      rate_limit_bytes: 0
      rate_limit_spans: 0
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    
    ingester:
      lifecycler:
        ring:
          replication_factor: 3
          kvstore:
            store: inmemory
      chunk_encoding: gzip
      max_chunk_age: 2m
      chunk_idle_period: 200ms
    
    compactor:
      compaction:
        block_retention: 168h
        compacted_block_retention: 24h
        compaction_window: 1h
        max_block_bytes: 107374182
        retention_enabled: true
        trace_idle_period: 10m
        compaction_cycle: 30s
    
    storage:
      trace:
        backend: local
        block:
          format: vParquet2
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal
          checkpoint_duration: 5m
          block_retention: 5m
          flush_on_shutdown: true
    
    metrics_generator:
      registry:
        external_labels:
          cluster: nexus-prod-gke
          namespace: monitoring
      storage:
        path: /var/tempo/metrics-generator
      processor:
        count: 5000
      traces_per_second: 10000
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: monitoring
  labels:
    app: tempo
spec:
  clusterIP: None
  selector:
    app: tempo
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
  - name: tempo-http
    port: 3200
    targetPort: 3200
  - name: tempo-grpc
    port: 3100
    targetPort: 3100
---
apiVersion: v1
kind: Service
metadata:
  name: tempo-lb
  namespace: monitoring
  labels:
    app: tempo
spec:
  type: ClusterIP
  selector:
    app: tempo
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP
  - name: tempo-http
    port: 3200
    targetPort: 3200
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tempo
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tempo
  namespace: monitoring
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - services
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tempo
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tempo
subjects:
- kind: ServiceAccount
  name: tempo
  namespace: monitoring
