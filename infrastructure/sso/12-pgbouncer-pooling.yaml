---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  namespace: keycloak
data:
  pgbouncer.ini: |
    [databases]
    keycloak = host=keycloak-postgres.keycloak.svc.cluster.local port=5432 dbname=keycloak
    
    [pgbouncer]
    listen_port = 6432
    listen_addr = 0.0.0.0
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    auth_query = SELECT usename, passwd FROM pg_user WHERE usename=$1
    
    # Pool configuration
    pool_mode = transaction
    max_client_conn = 1000
    default_pool_size = 25
    min_pool_size = 10
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    max_db_connections = 100
    max_user_connections = 100
    
    # Connection timeouts
    server_lifetime = 3600
    server_idle_timeout = 600
    server_connect_timeout = 15
    server_login_retry = 15
    query_timeout = 0
    query_wait_timeout = 120
    client_idle_timeout = 900
    client_login_timeout = 60
    idle_in_transaction_session_timeout = 0
    
    # Logging
    log_connections = 1
    log_disconnections = 1
    log_pooler_errors = 1
    syslog = 0
    
    # Performance
    server_round_robin = 0
    connection_lifetime = 1800
    tcp_keepalives = 1
    tcp_keepidles = 1
    tcp_keepintvls = 1
    tcp_keepcnt = 5
    
    # PgBouncer management
    admin_users = admin
    stats_users = stats
---
apiVersion: v1
kind: Secret
metadata:
  name: pgbouncer-auth
  namespace: keycloak
type: Opaque
data:
  userlist.txt: |
    "keycloak" "scram-sha-256$10000:Yw/2W14TA3JYVfJZ1l8CaQ==$4t7YqvZhN7qG9xN2P3qR7S8T9U0V1W2X3Y4Z5A=:ZqB+L0S8T9U0V1W2X3Y4Z5A6B7C8D9E0F1G="
    "admin" "scram-sha-256$10000:Yw/2W14TA3JYVfJZ1l8CaQ==$4t7YqvZhN7qG9xN2P3qR7S8T9U0V1W2X3Y4Z5A=:ZqB+L0S8T9U0V1W2X3Y4Z5A6B7C8D9E0F1G="
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: keycloak
  labels:
    app: pgbouncer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - pgbouncer
              topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: pgbouncer
        image: pgbouncer:1.21-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6432
          name: pgbouncer
        env:
        - name: DATABASES_HOST
          value: keycloak-postgres.keycloak.svc.cluster.local
        - name: DATABASES_PORT
          value: "5432"
        - name: DATABASES_USER
          valueFrom:
            secretKeyRef:
              name: keycloak-postgres
              key: username
        - name: DATABASES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: keycloak-postgres
              key: password
        - name: PGBOUNCER_POOL_MODE
          value: transaction
        - name: PGBOUNCER_MAX_CLIENT_CONN
          value: "1000"
        - name: PGBOUNCER_DEFAULT_POOL_SIZE
          value: "25"
        livenessProbe:
          tcpSocket:
            port: pgbouncer
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - sh
            - -c
            - "psql -h localhost -p 6432 -U keycloak -d keycloak -c 'SELECT 1' || psql -h localhost -p 6432 -U stats -d pgbouncer -c 'SHOW VERSION'"
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: pgbouncer-config
          mountPath: /etc/pgbouncer
        - name: pgbouncer-auth
          mountPath: /etc/pgbouncer/userlist.txt
          subPath: userlist.txt
      volumes:
      - name: pgbouncer-config
        configMap:
          name: pgbouncer-config
      - name: pgbouncer-auth
        secret:
          secretName: pgbouncer-auth
          defaultMode: 0600
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: keycloak
  labels:
    app: pgbouncer
spec:
  type: ClusterIP
  selector:
    app: pgbouncer
  ports:
  - port: 6432
    targetPort: 6432
    protocol: TCP
    name: pgbouncer
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pgbouncer-pdb
  namespace: keycloak
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: pgbouncer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pgbouncer-hpa
  namespace: keycloak
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pgbouncer
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
