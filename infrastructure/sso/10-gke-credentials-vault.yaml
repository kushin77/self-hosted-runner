---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gke-workload-identity-keycloak
  namespace: keycloak
  annotations:
    iam.gke.io/gcp-service-account: sso-keycloak@nexus-prod.iam.gserviceaccount.com
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gke-workload-identity-oauth2-proxy
  namespace: oauth2-proxy
  annotations:
    iam.gke.io/gcp-service-account: sso-oauth2-proxy@nexus-prod.iam.gserviceaccount.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gke-secret-provider-config
  namespace: keycloak
data:
  config.yaml: |
    apiVersion: secrets-store.csi.x-k8s.io/v1
    kind: SecretProviderClass
    metadata:
      name: gke-secret-manager
      namespace: keycloak
    spec:
      provider: gcp
      parameters:
        secrets: |
          - resourceName: "projects/nexus-prod/secrets/keycloak-db-username/versions/latest"
            path: "db-username"
          - resourceName: "projects/nexus-prod/secrets/keycloak-db-password/versions/latest"
            path: "db-password"
          - resourceName: "projects/nexus-prod/secrets/keycloak-admin-username/versions/latest"
            path: "keycloak-admin-username"
          - resourceName: "projects/nexus-prod/secrets/keycloak-admin-password/versions/latest"
            path: "keycloak-admin-password"
          - resourceName: "projects/nexus-prod/secrets/google-oauth-client-id/versions/latest"
            path: "google-oauth-client-id"
          - resourceName: "projects/nexus-prod/secrets/google-oauth-client-secret/versions/latest"
            path: "google-oauth-client-secret"
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: gke-secret-manager
  namespace: keycloak
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/nexus-prod/secrets/keycloak-db-username/versions/latest"
        path: "db-username"
      - resourceName: "projects/nexus-prod/secrets/keycloak-db-password/versions/latest"
        path: "db-password"
      - resourceName: "projects/nexus-prod/secrets/keycloak-admin-username/versions/latest"
        path: "keycloak-admin-username"
      - resourceName: "projects/nexus-prod/secrets/keycloak-admin-password/versions/latest"
        path: "keycloak-admin-password"
      - resourceName: "projects/nexus-prod/secrets/google-oauth-client-id/versions/latest"
        path: "google-oauth-client-id"
      - resourceName: "projects/nexus-prod/secrets/google-oauth-client-secret/versions/latest"
        path: "google-oauth-client-secret"
  secretObjects:
  - secretKey: username
    objectName: "db-username"
  - secretKey: password
    objectName: "db-password"
  - secretKey: keycloak-admin-username
    objectName: "keycloak-admin-username"
  - secretKey: keycloak-admin-password
    objectName: "keycloak-admin-password"
  - secretKey: google-oauth-client-id
    objectName: "google-oauth-client-id"
  - secretKey: google-oauth-client-secret
    objectName: "google-oauth-client-secret"
  objects: |
    - objectName: "keycloak-secrets"
      objectAlias: "keycloak-secrets"
      objectType: "secretmanager"
      objectProperties:
      - name: "keycloak-db-username"
        objectName: "db-username"
      - name: "keycloak-db-password"
        objectName: "db-password"
---
# NOTE: Secrets are managed via Google Secret Manager (GSM) and injected at runtime
# NO HARDCODED SECRETS IN THIS FILE - All credentials sourced from GSM via CSI driver
# See: scripts/sso/setup-gsm-integration.sh for credential initialization
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gsm-bootstrap
  namespace: keycloak
data:
  setup-gsm.sh: |
    #!/bin/bash
    set -e
    
    PROJECT_ID="nexus-prod"
    
    # Create KMS keyring if not exists
    gcloud kms keyrings create sso-keyring \
      --location us-central1 \
      --project=$PROJECT_ID || true
    
    # Create KMS key
    gcloud kms keys create sso-key \
      --location us-central1 \
      --keyring sso-keyring \
      --purpose encryption \
      --project=$PROJECT_ID || true
    
    # Create secrets in Google Secret Manager
    echo -n "keycloak" | gcloud secrets create keycloak-db-username \
      --replication-policy="automatic" \
      --data-file=- \
      --project=$PROJECT_ID || true
    
    echo -n "keycloak-password" | gcloud secrets create keycloak-db-password \
      --replication-policy="automatic" \
      --data-file=- \
      --project=$PROJECT_ID || true
    
    echo -n "admin" | gcloud secrets create keycloak-admin-username \
      --replication-policy="automatic" \
      --data-file=- \
      --project=$PROJECT_ID || true
    
    echo -n "admin-password" | gcloud secrets create keycloak-admin-password \
      --replication-policy="automatic" \
      --data-file=- \
      --project=$PROJECT_ID || true
    
    # Grant Workload Identity permissions
    gcloud projects add-iam-policy-binding $PROJECT_ID \
      --member="serviceAccount:sso-keycloak@nexus-prod.iam.gserviceaccount.com" \
      --role="roles/secretmanager.secretAccessor" \
      || true
    
    gcloud projects add-iam-policy-binding $PROJECT_ID \
      --member="serviceAccount:sso-oauth2-proxy@nexus-prod.iam.gserviceaccount.com" \
      --role="roles/secretmanager.secretAccessor" \
      || true
    
    gcloud projects add-iam-policy-binding $PROJECT_ID \
      --member="serviceAccount:sso-keycloak@nexus-prod.iam.gserviceaccount.com" \
      --role="roles/cloudkms.cryptoKeyEncrypterDecrypter" \
      || true
    
    gcloud projects add-iam-policy-binding $PROJECT_ID \
      --member="serviceAccount:sso-oauth2-proxy@nexus-prod.iam.gserviceaccount.com" \
      --role="roles/cloudkms.cryptoKeyEncrypterDecrypter" \
      || true
    
    echo "GSM and KMS setup complete"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gsm-setup
  namespace: keycloak
spec:
  restartPolicy: Never
  serviceAccountName: gke-workload-identity-keycloak
  containers:
  - name: gsm-setup
    image: google/cloud-sdk:latest
    command:
    - /bin/bash
    - -c
    - |
      gcloud auth application-default print-access-token
      gsutil version -l
      echo "GSM setup preparation complete"
    env:
    - name: GOOGLE_APPLICATION_CREDENTIALS
      value: /var/secrets/google/key.json
