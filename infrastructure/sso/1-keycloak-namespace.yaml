---
apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
  labels:
    app: keycloak
    component: sso
---
apiVersion: v1
kind: Namespace
metadata:
  name: oauth2-proxy
  labels:
    app: oauth2-proxy
    component: sso
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: keycloak
data:
  KC_DB: "postgres"
  KC_DB_URL: "jdbc:postgresql://keycloak-postgres:5432/keycloak"
  KC_DB_URL_HOST: "keycloak-postgres"
  KC_DB_URL_PORT: "5432"
  KC_DB_URL_DATABASE: "keycloak"
  KC_DB_USERNAME: "keycloak"
  KC_HOSTNAME: "keycloak.nexus.local"
  KC_PROXY: "edge"
  KC_HTTP_ENABLED: "true"
  KEYCLOAK_ADMIN: "admin"
  LOG_LEVEL: "INFO"
  KC_LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-password
  namespace: keycloak
type: Opaque
stringData:
  password: "changeme"
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin
  namespace: keycloak
type: Opaque
stringData:
  username: "admin"
  password: "changeme"
