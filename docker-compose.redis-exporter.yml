version: '3.8'

services:
  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: nexusshield-redis-exporter
    environment:
      REDIS_ADDR: "cache:6379"
    ports:
      - "9121:9121"
    networks:
      - self-hosted-runner_nexusshield
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:9121/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  self-hosted-runner_nexusshield:
    external: true
