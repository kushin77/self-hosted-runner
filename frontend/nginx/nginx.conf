upstream nexusshield_dashboard {
  # Load balancing strategy: round-robin (default)
  # Alternatives: ip_hash, least_conn, random, etc.
  
  server dashboard-primary:3000 weight=3;      # 60% traffic
  server dashboard-secondary:3000 weight=2;    # 40% traffic (backup)
  server dashboard-tertiary:3000 backup;       # Failover only
  
  # Connection pooling
  keepalive 32;
}

# HTTP server (redirect to HTTPS in production)
server {
  listen 80 default_server;
  server_name _;
  
  # Health check endpoint (no redirect)
  location /health {
    proxy_pass http://nexusshield_dashboard;
    proxy_http_version 1.1;
    proxy_connection_close;
    
    access_log off;
    expires max;
  }
  
  # Redirect all other traffic to HTTPS
  location / {
    if ($server_protocol != "HTTPS") {
      return 301 https://$server_name$request_uri;
    }
  }
  
  # Metrics endpoint (internal only)
  location /nginx_status {
    stub_status on;
    access_log off;
    allow 127.0.0.1;
    allow 172.28.0.0/16;    # Internal network
    deny all;
  }
}

# HTTPS server (production)
server {
  listen 443 ssl http2 default_server;
  server_name dashboard.example.com;
  
  # SSL certificates
  ssl_certificate /etc/nginx/ssl/dashboard.crt;
  ssl_certificate_key /etc/nginx/ssl/dashboard.key;
  
  # SSL configuration (strong)
  ssl_protocols TLSv1.3 TLSv1.2;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  
  # HSTS (force HTTPS on subsequent visits)
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  
  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  
  # Performance
  gzip on;
  gzip_types text/plain text/css text/javascript application/json;
  gzip_min_length 1000;
  
  # Main application
  location / {
    proxy_pass http://nexusshield_dashboard;
    proxy_http_version 1.1;
    
    # Headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # WebSocket support (if needed)
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    
    # Keep connection alive
    proxy_set_header Connection "";
  }
  
  # API pass-through (if backend API is not directly accessible)
  location /api/ {
    proxy_pass http://api-backend:8080/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # Rate limiting (prevent abuse)
    limit_req zone=api burst=100 nodelay;
  }
  
  # Static assets (cache aggressively)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    proxy_pass http://nexusshield_dashboard;
    proxy_http_version 1.1;
    
    # Long-lived cache (1 year)
    expires 365d;
    add_header Cache-Control "public, immutable";
  }
  
  # Health check endpoint
  location /health {
    proxy_pass http://nexusshield_dashboard;
    proxy_http_version 1.1;
    access_log off;
    expires max;
  }
  
  # Detailed health/status (internal only)
  location /health/status {
    proxy_pass http://nexusshield_dashboard;
    allow 127.0.0.1;
    allow 172.28.0.0/16;
    deny all;
    access_log off;
  }
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Request logging
access_log /var/log/nginx/access.log combined buffer=32k flush=5s;
error_log /var/log/nginx/error.log warn;

# Increase default buffer sizes
client_body_buffer_size 128k;
client_max_body_size 50m;

# Performance
worker_processes auto;
worker_connections 1024;

# Hide Nginx version
server_tokens off;

# Upstream monitoring
upstream_fail_timeout 60s;
upstream_max_fails 3;
