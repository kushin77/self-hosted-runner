apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-runner-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        5
        Daemon       Off
        Log_Level    info

    [INPUT]
        Name              systemd
        Tag               runner.*
        Read_From_Tail    On
        Strip_Underscores On

    [INPUT]
        Name              tail
        Path              /var/log/actions-runner.log
        Tag               runner.actions
        Refresh_Interval  5

    [FILTER]
        Name                parser
        Match               runner.*
        Key_Name            message
        Parser              json
        Parser              syslog

    [OUTPUT]
        Name   opensearch
        Match  runner.*
        Host   opensearch.logging.svc.cluster.local
        Port   9200
        Index  runner-${HOSTNAME}-%Y.%m.%d
        Type   _doc

---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: logging
spec:
  ports:
    - port: 3100
      targetPort: 3100
  selector:
    app: loki

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      hostNetwork: true
      hostPID: true
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:2.0.0
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: fluent-bit-runner-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
