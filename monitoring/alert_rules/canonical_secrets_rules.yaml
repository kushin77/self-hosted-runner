groups:
- name: canonical-secrets.rules
  interval: 30s
  rules:
  - alert: CanonicalSecretsAPIDown
    expr: up{job="canonical-secrets-api"} == 0
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "Canonical Secrets API is down"
      description: "No instances of canonical-secrets-api are up for >2m."

  - alert: CanonicalSecretsHighErrorRate
    expr: |
      (sum(rate(canonical_secrets_api_requests_total{status=~"5.."}[5m]))
       / sum(rate(canonical_secrets_api_requests_total[5m]))) > 0.05
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High 5xx error rate for Canonical Secrets API"
      description: "More than 5% of requests are returning 5xx over 5m."

  - alert: CanonicalSecretsHighLatencyP95
    expr: histogram_quantile(0.95, canonical_secrets_api_response_time_ms_bucket) > 1000
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "High P95 latency on Canonical Secrets API"
      description: "P95 latency exceeds 1000ms."

  - alert: ProviderFailoverDetected
    expr: increase(canonical_secrets_provider_failover_total[30m]) > 0
    for: 0m
    labels:
      severity: info
    annotations:
      summary: "Provider failover detected"
      description: "A provider failover occurred in the last 30 minutes."
