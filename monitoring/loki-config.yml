auth_enabled: false

ingester:
  chunk_idle_period: 3m
  chunk_retain_period: 1m
  max_chunk_age: 1h
  chunk_encode_gzip: true
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    num_tokens: 128
    heartbeat_timeout: 9m

limits_config:
  default_limits:
    streams_limit_per_user: 10000
    max_bytes_limit_per_logs_stream: 10485760  # 10MB
    retention_period: 30d
  enforce_metric_name: false
  reject_old_samples: true
  reject_old_samples_max_age: 168h

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

server:
  http_listen_port: 3100
  log_level: info
  log_format: json
  grpc_listen_port: 9096

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    cache_location: /loki/boltdb-shipper-cache
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

chunk_store_config:
  max_look_back_period: 0s
  cache_config:
    enable_fifocache: true
    default_validity: 5m
    background:
      writeback_goroutines: 10
      writeback_chan_size: 10000

table_manager:
  retention_deletes_enabled: true
  retention_period: 720h  # 30 days
  poll_interval: 10m
  creation_grace_period: 10m

querier:
  max_concurrent: 20
  query_timeout: 5m
  cache_results: true

# Log format configuration
log:
  level: info
  format: json

# Datasource configuration
datasource:
  type: loki
  url: http://loki:3100
