auth_enabled: false

# Minimal, compatible Loki configuration (trimmed of deprecated/unknown keys)
server:
  http_listen_port: 3100
  log_level: info

distributor:
  ring:
    kvstore:
      store: inmemory

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
  chunk_idle_period: 5m
  chunk_retain_period: 30s
  max_chunk_age: 1h

schema_config:
  configs:
    - from: 2020-10-15
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    cache_location: /loki/boltdb-shipper-cache
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

limits_config:
  enforce_metric_name: false

querier:
  query_timeout: 1m
  cache_config:
    enable_fifocache: true
    default_validity: 5m
    background:
      writeback_goroutines: 10
      writeback_chan_size: 10000

table_manager:
  retention_deletes_enabled: true
  retention_period: 720h  # 30 days
  poll_interval: 10m
  creation_grace_period: 10m

querier:
  max_concurrent: 20
  query_timeout: 5m
  cache_results: true

# Log format configuration
log:
  level: info
  format: json

# Datasource configuration
datasource:
  type: loki
  url: http://loki:3100
