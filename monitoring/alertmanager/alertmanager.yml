global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.example.com:587'
  smtp_from: 'alertmanager@example.com'
  # slack_api_url should be provided via secrets/Ansible vault on deploy

route:
  receiver: 'team-default'
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
  - match:
      severity: critical
    receiver: 'slack-critical'
    continue: false
  - match:
      severity: warning
    receiver: 'email-team'
    continue: false

receivers:
  - name: 'team-default'
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        api_url: '{{ slack_webhook | default("https://hooks.slack.com/services/XXX/YYY/ZZZ") }}'
  - name: 'slack-critical'
    slack_configs:
      - channel: '#alerts-critical'
        send_resolved: true
        api_url: '{{ slack_webhook | default("https://hooks.slack.com/services/XXX/YYY/ZZZ") }}'
  - name: 'email-team'
    email_configs:
      - to: 'oncall@example.com'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: [alertname, cluster, service]