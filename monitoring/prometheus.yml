global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'nexusshield-dev'
    namespace: 'phase-6'
    environment: 'development'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "/etc/prometheus/rules.yml"

scrape_configs:
  # ==================== Prometheus Self ====================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'prometheus'

  # ==================== Frontend ====================
  - job_name: 'frontend'
    static_configs:
      - targets: ['frontend:3000']
        labels:
          service: 'nexusshield-frontend'
          env: 'development'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== Backend API ====================
  - job_name: 'api'
    static_configs:
      - targets: ['api:8080']
        labels:
          service: 'nexusshield-api'
          env: 'development'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-server'

  # ==================== PostgreSQL ====================
  # Disabled: scraping Postgres directly on 5432 sends HTTP probes to the
  # PostgreSQL wire protocol and causes "invalid length of startup packet"
  # If a postgres_exporter is deployed, re-enable and point to its HTTP port.

  # ==================== Redis ====================
  - job_name: 'redis'
    static_configs:
      - targets: ['cache:6379']
        labels:
          service: 'redis'
          env: 'development'
    # Note: requires redis_exporter if available
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== RabbitMQ ====================
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['message-queue:15672']
        labels:
          service: 'rabbitmq'
          env: 'development'
    metrics_path: '/api/metrics'
    basic_auth:
      username: 'guest'
      password: 'guest'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== Jaeger ====================
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14268']
        labels:
          service: 'jaeger'
          env: 'development'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== Postgres Exporter ====================
  - job_name: 'postgres_exporter'
    static_configs:
      - targets: ['postgres_exporter:9187']
        labels:
          service: 'postgres_exporter'
          env: 'development'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== Loki ====================
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: 'loki'
          env: 'development'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== Node Exporter (if running) ====================
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          service: 'node'
          env: 'development'
    scrape_interval: 30s
    scrape_timeout: 10s
    relabel_configs:
      - action: keep
        source_labels: [__param_target]
        regex: 'localhost:9100'

# ==================== RECORDING RULES ====================
# These calculate pre-aggregated metrics for faster queries
# Stored in /etc/prometheus/rules.yml
