global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'nexusshield-onprem'  # On-premises cluster (192.168.168.42)
    namespace: 'production'
    environment: 'production'  # MANDATORY: On-prem production

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "/etc/prometheus/rules/*.yaml"

scrape_configs:
  # ==================== Prometheus Self ====================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'prometheus'

  # ==================== Frontend ====================
  - job_name: 'frontend'
    static_configs:
      - targets: ['frontend:3000']
        labels:
          service: 'nexusshield-frontend'
          env: 'production'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== Backend API ====================
  - job_name: 'api'
    static_configs:
      - targets: ['api:8080']
        labels:
          service: 'nexusshield-api'
          env: 'production'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'api-server'

  # ==================== PostgreSQL ====================
  # Disabled: scraping Postgres directly on 5432 sends HTTP probes to the
  # PostgreSQL wire protocol and causes "invalid length of startup packet"
  # If a postgres_exporter is deployed, re-enable and point to its HTTP port.

  # ==================== Redis ====================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']
        labels:
          service: 'redis'
          env: 'production'
    # Note: requires redis_exporter if available
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== RabbitMQ ====================
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq_exporter:9419']
        labels:
          service: 'rabbitmq'
          env: 'production'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== Jaeger ====================
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14268']
        labels:
          service: 'jaeger'
          env: 'production'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== Loki ====================
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: 'loki'
          env: 'production'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== Postgres Exporter ====================
  - job_name: 'postgres_exporter'
    static_configs:
      - targets: ['postgres_exporter:9187']
        labels:
          service: 'postgres'
          env: 'production'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== Node Exporter (if running) ====================
  - job_name: 'node'
    static_configs:
      - targets: ['192.168.168.42:9100']
        labels:
          service: 'node'
          env: 'production'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ==================== NAS HOST (eiq-nas) MONITORING ====================
  # NAS metrics ingestion for development infrastructure-as-code storage host
  - job_name: 'eiq-nas-node-metrics'
    static_configs:
      - targets: ['eiq-nas:9100']
        labels:
          instance: 'eiq-nas'
          service_type: 'node-exporter'
          criticality: 'high'
    scrape_interval: 15s
    scrape_timeout: 10s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'node_(cpu|memory|disk|network|filesystem|load|context).*'
        action: 'keep'
      - source_labels: [__name__]
        target_label: instance
        replacement: 'eiq-nas'

  - job_name: 'eiq-nas-storage-metrics'
    static_configs:
      - targets: ['eiq-nas:9100']
        labels:
          instance: 'eiq-nas'
          service_type: 'storage'
          criticality: 'critical'
    scrape_interval: 30s
    scrape_timeout: 10s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'node_filesystem_(avail|size|files|inodes|free|used).*'
        action: 'keep'
      - source_labels: [__name__]
        target_label: instance
        replacement: 'eiq-nas'

  - job_name: 'eiq-nas-network-metrics'
    static_configs:
      - targets: ['eiq-nas:9100']
        labels:
          instance: 'eiq-nas'
          service_type: 'network'
          criticality: 'high'
    scrape_interval: 15s
    scrape_timeout: 10s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'node_network_(transmit|receive|up).*'
        action: 'keep'
      - source_labels: [__name__]
        target_label: instance
        replacement: 'eiq-nas'
      - source_labels: [device]
        regex: 'lo|docker.*'
        action: 'drop'

  - job_name: 'eiq-nas-process-metrics'
    static_configs:
      - targets: ['eiq-nas:9100']
        labels:
          instance: 'eiq-nas'
          service_type: 'processes'
          criticality: 'medium'
    scrape_interval: 30s
    scrape_timeout: 10s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'node_procs_(running|blocked|total).*'
        action: 'keep'
      - source_labels: [__name__]
        target_label: instance
        replacement: 'eiq-nas'

  - job_name: 'eiq-nas-custom-metrics'
    static_configs:
      - targets: ['eiq-nas:9101']
        labels:
          instance: 'eiq-nas'
          service_type: 'custom'
          criticality: 'medium'
    scrape_interval: 60s
    scrape_timeout: 10s
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'eiq_.*'
        action: 'keep'
      - source_labels: [__name__]
        target_label: instance
        replacement: 'eiq-nas'

# ==================== RECORDING RULES ====================
# These calculate pre-aggregated metrics for faster queries
# Stored in /etc/prometheus/rules/*.yaml
# Additional NAS-specific rules are in /etc/prometheus/rules/nas-*.yaml
