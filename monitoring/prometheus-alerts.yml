groups:
  - name: NexusShield Phase 6 Alerts
    interval: 30s
    rules:
      # ==================== SERVICE HEALTH ====================
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
          component: "{{ $labels.job }}"
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Service {{ $labels.job }} (instance {{ $labels.instance }}) has been unavailable for more than 2 minutes."

      # ==================== DATABASE ====================
      - alert: PostgresDown
        expr: pg_up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: PostgreSQL database is down
          description: "PostgreSQL (instance {{ $labels.instance }}) is not responding."

      - alert: PostgresHighConnections
        expr: pg_stat_activity_count{job="postgres"} > 50
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "PostgreSQL has {{ $value }} active connections"
          description: "High number of active connections to PostgreSQL detected."

      # ==================== REDIS ====================
      - alert: RedisDiskSpaceLow
        expr: redis_memory_used_bytes{job="redis"} / redis_memory_max_bytes{job="redis"} > 0.9
        for: 5m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: Redis memory usage is high ({{ $value | humanizePercentage }})
          description: "Redis cache is using {{ $value | humanizePercentage }} of allocated memory."

  - name: infrastructure.rules
    rules:
      - alert: NodeDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Instance down"
          description: "Instance {{ $labels.instance }} has no up metric for 5 minutes."

      - alert: DeploymentFailureRate
        expr: |
          sum(increase(deployment_failure_total[15m]))
            / sum(increase(deployment_total[15m])) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High deployment failure rate"
          description: "Deployment failure rate >20% over 15m."

      - alert: FilebeatDown
        expr: up{job="filebeat"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Filebeat target down"
          description: "Filebeat job is not reporting metrics."

      - alert: VaultSealed
        expr: vault_sealed == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Vault instance sealed"
          description: "HashiCorp Vault reports sealed state."

      - alert: RedisEvictions
        expr: increase(redis_evicted_keys_total{job="redis"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
          component: cache
        annotations:
          summary: Redis evictions detected
          description: "Redis is evicting keys due to memory pressure. Check memory allocation."

      # ==================== API ====================
      - alert: APIHighErrorRate
        expr: increase(http_requests_total{status=~"5..", job="api"}[5m]) / increase(http_requests_total{job="api"}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "API error rate high ({{ $value | humanizePercentage }})"
          description: "API is returning {{ $value | humanizePercentage }} 5xx errors in the last 5 minutes."

      - alert: APIHighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="api"}[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "API p95 latency high ({{ $value }}s)"
          description: "API 95th percentile latency is {{ $value }}s."

      # ==================== FRONTEND ====================
      - alert: FrontendUnhealthy
        expr: up{job="frontend"} == 0
        for: 2m
        labels:
          severity: critical
          component: frontend
        annotations:
          summary: Frontend web server is down
          description: "Frontend (nginx) is not responding on port 80."

      # ==================== PROMETHEUS ====================
      - alert: PrometheusRuleFailures
        expr: increase(prometheus_rule_evaluation_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          component: monitoring
        annotations:
          summary: Prometheus rule evaluation failed
          description: "Prometheus has failed to evaluate {{ $value }} rule(s) in the last 5 minutes."

      # ==================== LOKI ====================
      - alert: LokiDown
        expr: up{job="loki"} == 0
        for: 1m
        labels:
          severity: warning
          component: logs
        annotations:
          summary: Loki log aggregator is down
          description: "Loki (instance {{ $labels.instance }}) is not responding."

      # ==================== JAEGER ====================
      - alert: JaegerDown
        expr: up{job="jaeger"} == 0
        for: 2m
        labels:
          severity: warning
          component: tracing
        annotations:
          summary: Jaeger tracing UI is down
          description: "Jaeger (instance {{ $labels.instance }}) is not responding."

      # ==================== MESSAGE QUEUE ====================
      - alert: RabbitMQDown
        expr: up{job="rabbitmq"} == 0
        for: 1m
        labels:
          severity: critical
          component: messaging
        annotations:
          summary: RabbitMQ message broker is down
          description: "RabbitMQ (instance {{ $labels.instance }}) is not responding."

      - alert: RabbitMQQueueBackup
        expr: rabbitmq_queue_messages{job="rabbitmq"} > 10000
        for: 5m
        labels:
          severity: warning
          component: messaging
        annotations:
          summary: "RabbitMQ queue {{ $labels.queue }} has {{ $value }} messages"
          description: "Queue {{ $labels.queue }} backlog is growing. Check consumers."
