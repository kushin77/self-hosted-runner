apiVersion: v1
kind: ServiceAccount
metadata:
  name: milestone-organizer
  namespace: cron-jobs
  annotations:
    eks.amazonaws.com/role-arn: ${IRSA_ROLE_ARN}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: milestone-organizer
  namespace: cron-jobs
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: milestone-organizer
            version: v1
        spec:
          serviceAccountName: milestone-organizer
          restartPolicy: OnFailure
          securityContext:
            fsGroup: 65534
            runAsNonRoot: true
            runAsUser: 65534
          containers:
          - name: milestone-organizer
            image: ${CONTAINER_IMAGE}
            imagePullPolicy: IfNotPresent
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
              readOnlyRootFilesystem: true
            env:
            - name: AWS_REGION
              value: ${AWS_REGION}
            - name: AWS_ROLE_ARN
              value: ${IRSA_ROLE_ARN}
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: /var/run/secrets/eks.amazonaws.com/serviceaccount/token
            volumeMounts:
            - name: secrets-vault
              mountPath: /mnt/secrets-vault
              readOnly: true
            - name: secrets-gsm
              mountPath: /mnt/secrets-gsm
              readOnly: true
            - name: tmp
              mountPath: /tmp
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
          volumes:
          - name: secrets-vault
            csi:
              driver: secrets-store.csi.k8s.io
              readOnly: true
              volumeAttributes:
                secretProviderClass: vault-database-secrets
          - name: secrets-gsm
            csi:
              driver: secrets-store.csi.k8s.io
              readOnly: true
              volumeAttributes:
                secretProviderClass: gsm-database-secrets
          - name: tmp
            emptyDir:
              medium: Memory
              sizeLimit: 256Mi
