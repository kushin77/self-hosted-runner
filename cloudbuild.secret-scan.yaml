
# Secret sprawl detection for Cloud Build CI pipeline
# Run on every commit to prevent credential leaks in source code

steps:
  # Step 1: Install dependencies
  - name: 'python:3.11'
    id: install-deps
    entrypoint: pip
    args: ['install', '-r', 'requirements.txt', 'detect-secrets', 'gitleaks', 'pip-audit', 'bandit[toml]']
    waitFor: ['-']

  # Step 2: Run comprehensive secret sprawl detection
  - name: 'python:3.11'
    id: detect-secrets-scan
    entrypoint: bash
    args: ['scripts/security/secret-sprawl-detection.sh']
    waitFor: ['install-deps']
    env:
      - 'GITHUB_REPOSITORY=${_GITHUB_REPOSITORY}'
      - 'BUILD_ID=${BUILD_ID}'

  # Step 3: Report findings to GitHub
  - name: 'gcr.io/cloud-builders/gcloud'
    id: report-to-github
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ -d ".security/secret-scan-reports" ]; then
          echo "📋 Secret scan reports available:"
          ls -lah .security/secret-scan-reports/
          
          # Generate comment with findings summary
          SUMMARY_FILE=".security/secret-scan-reports/summary-$(date +%Y%m%d)*.json"
          if [ -f "$SUMMARY_FILE" ]; then
            echo "📊 Posting scan summary to GitHub PR..."
          fi
        fi
    waitFor: ['detect-secrets-scan']

  # Step 4: Store reports in Cloud Storage for audit trail
  - name: 'gcr.io/cloud-builders/gsutil'
    id: archive-reports
    args:
      - '-m'
      - 'cp'
      - '-r'
      - '.security/secret-scan-reports/*'
      - 'gs://${_SECURITY_REPORTS_BUCKET}/secret-scans/${BUILD_ID}/'
    waitFor: ['detect-secrets-scan']
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_GCP_REGION}'

# Configuration
substitutions:
  _GITHUB_REPOSITORY: 'kushin77/self-hosted-runner'
  _SECURITY_REPORTS_BUCKET: 'nexusshield-security-reports'
  _GCP_REGION: 'us-central1'

options:
  machineType: 'N1_HIGHCPU_8'
  substitutionOption: 'ALLOW_UNDEFINED'

timeout: '600s'

# Artifacts to retain for analysis
artifacts:
  objects:
    location: 'gs://${_SECURITY_REPORTS_BUCKET}/secret-scans/${BUILD_ID}'
    paths: ['.security/secret-scan-reports/**/*']
