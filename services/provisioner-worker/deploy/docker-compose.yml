version: '3.8'
services:
  provisioner-worker:
    image: node:18-alpine
    container_name: provisioner-worker
    working_dir: /workspace
    volumes:
      - ..:/workspace:rw
    environment:
      - USE_TERRAFORM_CLI=1
      - JOBSTORE_PERSIST=1
      - JOBSTORE_FILE=/workspace/services/provisioner-worker/data/jobstore.json
    command: ["node", "services/provisioner-worker/worker.js"]
    restart: unless-stopped
