# GitHub Secret Scanning Patterns
# Custom patterns for detecting secrets in pull requests
#
# Available on GitHub Enterprise Server 3.2+
# Reference: https://docs.github.com/en/code-security/secret-scanning/defining-custom-patterns-for-secret-scanning

patterns:
  # Service Account Keys (GCP)
  - name: "GCP Service Account Key (Private Key)"
    pattern: '-----BEGIN RSA PRIVATE KEY-----'
    confidence: HIGH
    
  - name: "GCP Service Account JSON"
    pattern: '"type"\s*:\s*"service_account"'
    confidence: HIGH
  
  # AWS Credentials
  - name: "AWS Access Key ID"
    pattern: 'AKIA[0-9A-Z]{16}'
    confidence: HIGH
    
  - name: "AWS Secret Access Key"
    pattern: 'aws_secret_access_key\s*=\s*[A-Za-z0-9/+=]{40}'
    confidence: HIGH
    
  # GitHub Tokens
  - name: "GitHub Personal Access Token (ghp_)"
    pattern: 'ghp_[a-zA-Z0-9_]{36,255}'
    confidence: HIGH
    
  - name: "GitHub OAuth Token (ghu_)"
    pattern: 'ghu_[a-zA-Z0-9_]{36,255}'
    confidence: HIGH
    
  - name: "GitHub App Installation Token (ghs_)"
    pattern: 'ghs_[a-zA-Z0-9_]{36,255}'
    confidence: HIGH
    
  # Terraform Variables
  - name: "Terraform Variable with apikey/secret"
    pattern: 'variable.*?["\']?(apikey|secret|password|token)["\']?\s*=\s*["\'][^"\']*["\']'
    confidence: MEDIUM
    
  # Private Keys (Generic)
  - name: "Generic Private Key (PEM Format)"
    pattern: '-----BEGIN (RSA |DSA |EC |OPENSSH |ENCRYPTED )?PRIVATE KEY(?: BLOCK)?-----'
    confidence: HIGH
    
  # Database Credentials
  - name: "Database Connection String"
    pattern: '(mysql|postgres|mongodb)://[a-zA-Z0-9:_@.-]+'
    confidence: MEDIUM
    
  # API Keys (Generic Patterns)
  - name: "Generic API Key Pattern"
    pattern: '["\']?(api_?key|apikey|api_?secret)["\']?\s*[:=]\s*["\'][a-zA-Z0-9_\-]{20,}["\']'
    confidence: MEDIUM
    
  # Google Cloud API Keys
  - name: "Google Cloud API Key"
    pattern: 'AIza[0-9A-Za-z\\-_]{35}'
    confidence: HIGH
    
  # Slack Tokens
  - name: "Slack Bot Token"
    pattern: 'xoxb-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9_-]{24,34}'
    confidence: HIGH
    
  - name: "Slack User Token"
    pattern: 'xoxp-[0-9]{10,13}-[0-9]{10,13}-[a-zA-Z0-9_-]{24,34}'
    confidence: HIGH
    
  # Vault Tokens
  - name: "Vault Token (s.)"
    pattern: 's\.[0-9a-zA-Z]{20,}'
    confidence: HIGH
    
  # PagerDuty API Keys
  - name: "PagerDuty API Key"
    pattern: '["\']?[a-zA-Z0-9]{20}["\']?'
    confidence: MEDIUM
    
  # JWT Tokens (Basic Pattern)
  - name: "JWT Token"
    pattern: 'eyJ[a-zA-Z0-9_-]{10,}\.eyJ[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}'
    confidence: MEDIUM
    
  # SSL/TLS Certificates
  - name: "SSL Certificate (PEM)"
    pattern: '-----BEGIN CERTIFICATE-----'
    confidence: HIGH

# Exceptions (files/patterns to skip)
exceptions:
  # Documentation and examples
  - path: 'docs/**'
  - path: 'examples/**'
  - path: 'README.md'
  # Test files with dummy credentials
  - path: 'tests/**/*.tf'
  - path: 'tests/**/fixtures/**'
  # Terraform lock files (safe)
  - path: '.terraform.lock.hcl'

# Alert Configuration
alerts:
  # Where to send alerts
  channels:
    - slack  # If configured in GitHub
    - email  # To repository admins
    
  # Do not alert on these patterns (allowlist)
  allowlist:
    - 'example.com'  # Documentation domains
    - 'test@test.com'  # Test emails
    - '0000000000000000'  # Dummy values in tests
