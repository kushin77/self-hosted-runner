name: GCP GSM Credential Rotation

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rotation of all secrets'
        required: 'false'
        default: 'false'
        type: boolean

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  rotate:
    name: Rotate GSM Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch Ephemeral Credentials
        uses: kushin77/get-ephemeral-credential@v1
        id: creds
        with:
          credential-names: |
            GCP_PROJECT_ID
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT_EMAIL
          retrieve-from: 'auto'
          audit-log: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.creds.outputs.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ steps.creds.outputs.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Audit and Rotate Secrets
        id: rotation
        env:
          GCP_PROJECT: ${{ steps.creds.outputs.GCP_PROJECT_ID }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          echo "Starting GSM secret rotation audit..."
          SUMMARY=$(gcloud secrets list --project="$GCP_PROJECT" --format="table(name, createTime, labels)")
          echo "summary<<ENS" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "ENS" >> $GITHUB_OUTPUT

          # Rotation logic here
          echo "Rotation audit complete."

      - name: Create Rotation Issue
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
              const summary = `${{ steps.rotation.outputs.summary }}`;

              try {
                const { data: issue } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: '🔄 [Automated] GCP GSM Credential Rotation Due',
                  body: `**Automated Rotation Check**

                  Credentials are reaching their rotation threshold.

                  \`\`\`
                  ${summary}
                  \`\`\`

                  **Required Actions**:
                  1. Review rotation audit report
                  2. Generate new credentials in source system (AWS/GCP/Vault)
                  3. Update GitHub secrets: \`gh secret set SECRET_NAME\`
                  4. Confirm rotation completion

                  **System Response**: Automated via \`.github/workflows/gcp-gsm-rotation.yml\` (daily at 2 AM UTC)`,
                  labels: ['ops', 'gcp-gsm', 'credential-rotation']
                });

                console.log(`Created rotation issue: ${issue.html_url}`);
              } catch (e) {
                console.error(`Failed to create issue: ${e.message}`);
              }
