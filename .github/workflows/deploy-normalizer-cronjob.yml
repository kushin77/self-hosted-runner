name: Deploy Normalizer CronJob

on:
  push:
    branches:
      - main

jobs:
  deploy-cronjob:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Decode kubeconfig (with fallback)
        env:
          KUBECONFIG_BASE64: ${{ secrets.KUBECONFIG_BASE64 }}
          STAGING_KUBECONFIG: ${{ secrets.STAGING_KUBECONFIG }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"
          if [ -n "${KUBECONFIG_BASE64:-}" ]; then
            echo "$KUBECONFIG_BASE64" | base64 --decode > "$HOME/.kube/config"
            echo "Using KUBECONFIG_BASE64 from secrets"
          elif [ -n "${STAGING_KUBECONFIG:-}" ]; then
            echo "$STAGING_KUBECONFIG" | base64 --decode > "$HOME/.kube/config"
            echo "Using STAGING_KUBECONFIG fallback"
          else
            echo "No kubeconfig secret provided (KUBECONFIG_BASE64 or STAGING_KUBECONFIG)" >&2
            exit 1
          fi

      - name: Apply normalizer CronJob
        run: |
          kubectl apply -f k8s/normalizer-cronjob.yaml

      - name: Rollout status
        run: |
          kubectl get cronjob normalizer -n nexus-engine -o wide
