name: Pre-commit CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  precommit:
    name: Run pre-commit checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --user pre-commit
          echo "Installing gitleaks..."
          curl -sSfL https://raw.githubusercontent.com/zricethezav/gitleaks/master/install.sh | bash -s -- -b /usr/local/bin v8.17.0 || true
          export PATH="$HOME/.local/bin:$PATH"

      - name: Run pre-commit
        env:
          PATH: ${{ runner.temp }}/_bazel/bin:$HOME/.local/bin:/usr/local/bin:$PATH
        run: |
          ~/.local/bin/pre-commit run --all-files
