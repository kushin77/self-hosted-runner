name: Phase 2 - Validate OIDC/WIF Setup

on:
  workflow_dispatch:
    inputs:
      detailed-validation:
        description: Run detailed validation tests
        required: false
        type: boolean
        default: false
      
      test-gcp:
        description: Test GCP OIDC authentication
        required: false
        type: boolean
        default: false
      
      test-aws:
        description: Test AWS OIDC authentication
        required: false
        type: boolean
        default: false
      
      test-vault:
        description: Test Vault JWT authentication
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  VALIDATION_LOG_DIR: .validation-logs

jobs:
  
  validate-setup:
    name: "Validate Phase 2 Setup"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create validation directory
        run: mkdir -p ${{ env.VALIDATION_LOG_DIR }}
      
      - name: Make validation script executable
        run: chmod +x .github/scripts/validate-phase2-setup.sh
      
      - name: Run Phase 2 validation
        run: |
          bash .github/scripts/validate-phase2-setup.sh \
            "${{ env.VALIDATION_LOG_DIR }}/phase2-validation.log" \
            "${{ env.VALIDATION_LOG_DIR }}/discovered-credentials.json" \
            "${{ env.VALIDATION_LOG_DIR }}/setup-providers.json"
        continue-on-error: true
      
      - name: Check GitHub Secrets
        run: |
          echo "=== GitHub Actions Secrets ===" 
          echo "These secrets should be configured after Phase 2:"
          echo ""
          
          required_secrets=(
            "GCP_WORKLOAD_IDENTITY_PROVIDER"
            "GCP_SERVICE_ACCOUNT"
            "AWS_ROLE_ARN"
            "VAULT_ADDR"
            "VAULT_NAMESPACE"
            "VAULT_AUTH_ROLE"
          )
          
          for secret in "${required_secrets[@]}"; do
            if gh secret list 2>/dev/null | grep -q "^${secret}"; then
              echo "✓ $secret"
            else
              echo "⚠ $secret (not yet configured)"
            fi
          done
        env:
          GH_TOKEN: ${{ github.token }}
      
      - name: Validate GCP OIDC Token (if secret exists)
        if: inputs.test-gcp || false
        run: |
          if [[ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]]; then
            echo "ℹ GCP_WORKLOAD_IDENTITY_PROVIDER not configured - skipping"
            exit 0
          fi
          
          echo "Testing GCP OIDC token generation..."
          # This test would generate a GitHub OIDC token and test GCP authentication
          # Implementation details available in DEPLOYMENT_GUIDE.md
      
      - name: Validate AWS OIDC Token (if secret exists)
        if: inputs.test-aws || false
        run: |
          if [[ -z "${{ secrets.AWS_ROLE_ARN }}" ]]; then
            echo "ℹ AWS_ROLE_ARN not configured - skipping"
            exit 0
          fi
          
          echo "Testing AWS OIDC token generation..."
          # This test would generate a GitHub OIDC token and test AWS authentication
          # Implementation details available in DEPLOYMENT_GUIDE.md
      
      - name: Validate Vault JWT Auth (if secret exists)
        if: inputs.test-vault || false
        run: |
          if [[ -z "${{ secrets.VAULT_ADDR }}" ]]; then
            echo "ℹ VAULT_ADDR not configured - skipping"
            exit 0
          fi
          
          echo "Testing Vault JWT authentication..."
          # This test would generate a GitHub OIDC token and test Vault JWT auth
          # Implementation details available in DEPLOYMENT_GUIDE.md
      
      - name: Create validation summary
        if: always()
        run: |
          echo "## Phase 2 Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Setup Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| GCP WIF Setup | $([ -n \"${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}\" ] && echo '✓ Configured' || echo '⚠ Pending') |" >> $GITHUB_STEP_SUMMARY
          echo "| AWS OIDC Setup | $([ -n \"${{ secrets.AWS_ROLE_ARN }}\" ] && echo '✓ Configured' || echo '⚠ Pending') |" >> $GITHUB_STEP_SUMMARY
          echo "| Vault JWT Setup | $([ -n \"${{ secrets.VAULT_ADDR }}\" ] && echo '✓ Configured' || echo '⚠ Pending') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. If any components show '⚠ Pending', complete Phase 2 setup first" >> $GITHUB_STEP_SUMMARY
          echo "2. Run rotation workflow to test OIDC authentication" >> $GITHUB_STEP_SUMMARY
          echo "3. Proceed to Phase 3 (Issue #1950)" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-validation-logs-${{ github.run_id }}
          path: ${{ env.VALIDATION_LOG_DIR }}/
          retention-days: 365

  test-credential-retrieval:
    name: "Test Credential Retrieval"
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Test GCP Credential Retrieval (if GCP secret exists)
        if: secrets.GCP_SERVICE_ACCOUNT != ''
        run: |
          echo "Testing GCP service account recognition..."
          echo "Service Account: ${{ secrets.GCP_SERVICE_ACCOUNT }}"
          # Actual credential retrieval tested in rotation workflow
      
      - name: Test AWS Role Access (if AWS secret exists)
        if: secrets.AWS_ROLE_ARN != ''
        run: |
          echo "Testing AWS role ARN format..."
          echo "Role ARN: ${{ secrets.AWS_ROLE_ARN }}"
          # Format validation
          if [[ "${{ secrets.AWS_ROLE_ARN }}" =~ ^arn:aws:iam::[0-9]{12}:role/ ]]; then
            echo "✓ AWS Role ARN format is valid"
          else
            echo "❌ AWS Role ARN format is invalid"
            exit 1
          fi
      
      - name: Test Vault Configuration (if Vault secrets exist)
        if: secrets.VAULT_ADDR != ''
        run: |
          echo "Testing Vault configuration..."
          echo "Vault Address: ${{ secrets.VAULT_ADDR }}"
          echo "Vault Namespace: ${{ secrets.VAULT_NAMESPACE }}"
          echo "Vault Auth Role: ${{ secrets.VAULT_AUTH_ROLE }}"
          # Full Vault test in rotation workflow

  summary:
    name: "🎉 Phase 2 Validation Complete"
    runs-on: ubuntu-latest
    needs: [validate-setup, test-credential-retrieval]
    if: always()
    
    steps:
      - name: Generate final summary
        run: |
          echo "## Phase 2 Validation Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### What's Next?" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### If All Secrets Are Configured:" >> $GITHUB_STEP_SUMMARY
          echo "1. Run the **rotation** workflow to test OIDC in action" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify credentials are retrieved via OIDC (check logs)" >> $GITHUB_STEP_SUMMARY
          echo "3. Proceed to Phase 3 (Issue #1950 - Key Revocation)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### If Secrets Are Not Yet Configured:" >> $GITHUB_STEP_SUMMARY
          echo "1. Complete Phase 2 auto-discovery setup first (Issue #1947)" >> $GITHUB_STEP_SUMMARY
          echo "2. Add 6 secrets to GitHub Actions from setup artifacts" >> $GITHUB_STEP_SUMMARY
          echo "3. Re-run this validation workflow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**See:** PHASE_2_ACTIVATION_AUTO_DISCOVERY.md for detailed instructions" >> $GITHUB_STEP_SUMMARY
