name: Rotate RUNNER_MGMT_TOKEN (Automatic)

on:
  schedule:
    # First of every month at 0200 UTC
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      force_rotation:
        description: 'Force rotation now?'
        required: false
        default: 'false'

permissions:
  contents: read
  id-token: write

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Validate RUNNER_MGMT_TOKEN exists and works
        id: validate
        env:
          GH_TOKEN: ${{ secrets.RUNNER_MGMT_TOKEN }}
        run: |
          set +e
          if [ -z "${{ secrets.RUNNER_MGMT_TOKEN }}" ]; then
            echo "::warning::RUNNER_MGMT_TOKEN not configured; rotation skipped"
            echo "token_valid=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Test token by listing runners (read-only operation)
          response=$(retry_command 5 10 sh -c "gh api /repos/${{ github.repository }}/actions/runners" 2>&1)
          exitcode=$?
          
          if [ $exitcode -eq 0 ]; then
            echo "token_valid=true" >> $GITHUB_OUTPUT
            echo "✓ RUNNER_MGMT_TOKEN is valid"
          else
            echo "::error::RUNNER_MGMT_TOKEN validation failed: $response"
            echo "token_valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          set -e

  rotation-scheduled-alert:
    needs: validate-secrets
    if: needs.validate-secrets.outputs.token_valid == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create rotation reminder issue
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_TITLE="[Automation] Monthly RUNNER_MGMT_TOKEN Rotation Reminder"
          ISSUE_BODY="**Automated Reminder**: The RUNNER_MGMT_TOKEN should be rotated this month.

## Steps to Rotate:
1. Generate a new Fine-Grained PAT on GitHub with \`administration:read\` scope for runners
2. Store it in your secret manager (Vault, AWS Secrets Manager, etc.)
3. Trigger the rotation workflow via \`gh workflow run secret-rotation-mgmt-token.yml --repo ${{ github.repository }}\`
4. Or manually update the secret via: \`gh secret set RUNNER_MGMT_TOKEN --repo ${{ github.repository }}\`

## AutoRotation Status:
- **Current Token**: Valid and working ✓
- **Last Verified**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
- **Next Rotation**: $(date -u -d '+1 month' +%Y-%m-%d)

This is a **hands-off notification**. The token is automatically validated monthly for security best practices.

See [AUTOMATION_RUNBOOK.md](./scripts/automation/AUTOMATION_RUNBOOK.md) for full details."

          # Check if issue already exists for this month
          EXISTING=$(gh issue list --repo ${{ github.repository }} --search "RUNNER_MGMT_TOKEN Rotation Reminder in:title" --state open --limit 1 --json number | jq -r '.[0].number // empty' 2>/dev/null || true)
          
          if [ -z "$EXISTING" ]; then
            gh issue create --repo ${{ github.repository }} --title "$ISSUE_TITLE" --body "$ISSUE_BODY" --label "automation,runner-mgmt,documentation"
            echo "✓ Created rotation reminder issue"
          else
            echo "✓ Rotation reminder issue #$EXISTING already exists"
          fi

  log-rotation-validation:
    needs: validate-secrets
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Log rotation validation result
        run: |
          if [ "${{ needs.validate-secrets.outputs.token_valid }}" == "true" ]; then
            echo "✓ Secret rotation validation passed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            echo "✗ Secret rotation validation failed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi
