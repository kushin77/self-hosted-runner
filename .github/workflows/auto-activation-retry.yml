name: Auto: Activation Retry and Reminder

on:
  schedule:
    - cron: '*/15 * * * *' # every 15 minutes
  workflow_dispatch:

permissions:
  issues: write
  actions: read
  contents: read

concurrency:
  group: auto-activation-retry
  cancel-in-progress: false

jobs:
  retry-activation:
    runs-on: ubuntu-latest
    steps:
      - name: Check operator trigger issue
        uses: actions/github-script@v7
        id: check
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = 1239;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
            
            const isOpen = issue.data.state === 'open';
            if (!isOpen) {
              return { proceed: false, reason: 'issue_closed' };
            }

            // Get latest verify-secrets-and-diagnose run
            const wf = await github.rest.actions.listWorkflowRuns({ owner, repo, workflow_id: 'verify-secrets-and-diagnose.yml', per_page: 1 });
            const latest = wf.data.workflow_runs[0];
            const conclusion = latest ? latest.conclusion : null;

            return { proceed: true, conclusion: conclusion };

      - name: Act on status (remind + re-dispatch)
        if: steps.check.outputs.proceed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = 1239;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const conclusion = '${{ steps.check.outputs.conclusion }}';

            // If last run was success, post success note and stop
            if (conclusion === 'success') {
              await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: `✅ Verification successful (latest conclusion: ${conclusion}). No retry needed.` });
              return;
            }

            // Post gentle reminder to operator with steps
            const reminder = `Automated reminder: verification workflow has not yet passed (latest conclusion: ${conclusion || 'none'}).\n\nPlease ensure the \`GCP_SERVICE_ACCOUNT_KEY\` secret contains valid JSON including \`"type": "service_account"\`.\n\nIf you have updated the secret, this workflow will attempt a safe re-dispatch of verification now.`;
            await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: reminder });
            
            // Attempt safe re-dispatch (best-effort) of verification workflow
            try {
              await github.request('POST /repos/{owner}/{repo}/actions/workflows/{workflow_id}/dispatches', {
                owner, repo, workflow_id: 'verify-secrets-and-diagnose.yml', ref: 'main'
              });
              await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: '🔁 Re-dispatched `verify-secrets-and-diagnose.yml` (best-effort). Monitoring for completion.' });
            } catch (err) {
              await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body: `⚠️ Failed to dispatch verification workflow: ${err.message}` });
            }
