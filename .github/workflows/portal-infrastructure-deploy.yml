name: NexusShield Portal — Terraform Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "terraform/portal-infrastructure.tf"
      - "terraform/terraform.tfvars.*"
      - ".github/workflows/portal-infrastructure-deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/portal-infrastructure.tf"
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Target environment"
        options:
          - staging
          - production
        required: true
      apply_terraform:
        type: boolean
        description: "Run terraform apply (else only plan)"
        default: false

env:
  TERRAFORM_VERSION: "1.5.0"
  TF_LOG: INFO

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [staging, production]
      max-parallel: 2
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Test Terraform syntax
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          echo "✅ Terraform format verified"

      - name: Initialize Terraform (staging)
        working-directory: terraform
        if: matrix.environment == 'staging'
        run: |
          terraform init \
            -backend-config=backend.conf.staging \
            -reconfigure

      - name: Initialize Terraform (production)
        working-directory: terraform
        if: matrix.environment == 'production'
        run: |
          terraform init \
            -backend-config=backend.conf.production \
            -reconfigure

      - name: Validate Terraform configuration
        working-directory: terraform
        run: terraform validate

      - name: Plan Terraform changes (staging)
        if: matrix.environment == 'staging'
        working-directory: terraform
        run: |
          terraform plan \
            -var-file=terraform.tfvars.staging \
            -out=tfplan.staging \
            -json > tfplan.json
          
          # Extract plan summary
          RESOURCE_COUNT=$(jq '.resource_changes | length' tfplan.json)
          echo "PLAN_RESOURCES=$RESOURCE_COUNT" >> $GITHUB_ENV

      - name: Plan Terraform changes (production)
        if: matrix.environment == 'production'
        working-directory: terraform
        run: |
          terraform plan \
            -var-file=terraform.tfvars.production \
            -out=tfplan.production \
            -json > tfplan.json
          
          # Extract plan summary
          RESOURCE_COUNT=$(jq '.resource_changes | length' tfplan.json)
          echo "PLAN_RESOURCES=$RESOURCE_COUNT" >> $GITHUB_ENV

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const environment = "${{ matrix.environment }}";
            const resourceCount = process.env.PLAN_RESOURCES || "unknown";
            
            const comment = `## 🔧 Terraform Plan — ${environment.toUpperCase()}
            
            **Resources to modify:** ${resourceCount}
            
            \`\`\`terraform
            terraform plan -var-file=terraform.tfvars.${environment}
            \`\`\`
            
            ✅ Plan available in GitHub Actions artifacts
            
            **Next Steps:**
            1. Review plan above
            2. Ensure no critical resources are being destroyed
            3. Approve PR for staging deployment
            4. Manual approval required for production`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload plan artifact
        uses: actions/upload-artifact@v3
        with:
          name: tfplan-${{ matrix.environment }}
          path: terraform/tfplan.${{ matrix.environment }}
          retention-days: 5

  apply-staging:
    name: Apply to Staging (Automatic)
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v3
        with:
          name: tfplan-staging
          path: terraform/

      - name: Authenticate to Google Cloud (staging)
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_STAGING }}
          token_format: "access_token"
          access_token_lifetime: "1h"

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Initialize Terraform
        working-directory: terraform
        run: |
          terraform init \
            -backend-config=backend.conf.staging \
            -reconfigure

      - name: Apply Terraform (staging)
        working-directory: terraform
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            tfplan.staging
          
          # Capture outputs
          terraform output -json > /tmp/tf-outputs.json

      - name: Export outputs as GitHub secrets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const outputs = JSON.parse(fs.readFileSync('/tmp/tf-outputs.json', 'utf8'));
            
            // Extracted values needed for CI/CD
            const apiServiceUrl = outputs.api_service_url.value;
            const databaseUrl = outputs.database_connection_name.value;
            
            console.log(`API URL: ${apiServiceUrl}`);
            console.log(`Database: ${databaseUrl}`);

      - name: Log deployment to JSONL audit trail
        run: |
          cat >> logs/portal-infrastructure-deployment.jsonl << EOF
          {
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "event": "terraform_apply",
            "environment": "staging",
            "status": "success",
            "triggered_by": "github-actions",
            "git_sha": "${{ github.sha }}",
            "git_ref": "${{ github.ref }}",
            "workflow": "portal-infrastructure-deploy",
            "changes": {
              "resources": "see terraform state"
            }
          }
          EOF
          
          git add logs/portal-infrastructure-deployment.jsonl
          git commit -m "audit: Portal infrastructure deployed to staging (terraform apply)"

      - name: Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ NexusShield Portal infrastructure deployed to staging",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Portal Infrastructure Deployed to Staging*\n*Commit:* ${{ github.sha }}\n*Environment:* staging\n*Status:* ✅ success"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}

  apply-production:
    name: Apply to Production (Manual Approval)
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      approval-required: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v3
        with:
          name: tfplan-production
          path: terraform/

      - name: Authenticate to Google Cloud (production)
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_PRODUCTION }}
          token_format: "access_token"
          access_token_lifetime: "1h"

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Initialize Terraform
        working-directory: terraform
        run: |
          terraform init \
            -backend-config=backend.conf.production \
            -reconfigure

      - name: Apply Terraform (production)
        working-directory: terraform
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            tfplan.production

      - name: Log deployment to JSONL audit trail
        run: |
          cat >> logs/portal-infrastructure-deployment.jsonl << EOF
          {
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "event": "terraform_apply",
            "environment": "production",
            "status": "success",
            "triggered_by": "${{ github.actor }}",
            "approval_required": true,
            "git_sha": "${{ github.sha }}",
            "git_ref": "${{ github.ref }}",
            "workflow": "portal-infrastructure-deploy",
            "changes": {
              "resources": "see terraform state"
            }
          }
          EOF
          
          git add logs/portal-infrastructure-deployment.jsonl
          git commit -m "audit: Portal infrastructure deployed to PRODUCTION (terraform apply, manual approval)"

      - name: Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ NexusShield Portal infrastructure deployed to PRODUCTION",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🚀 Portal Infrastructure Deployed to PRODUCTION*\n*Approver:* ${{ github.actor }}\n*Commit:* ${{ github.sha }}\n*Status:* ✅ success"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DEPLOYMENTS }}

      - name: Create deployment tracking issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: 2170,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 **Production Deployment Completed**\n\n**Date:** ${new Date().toISOString()}\n**Approver:** ${{ github.actor }}\n**Commit:** ${{ github.sha }}\n**Environment:** production\n**Status:** ✅ infrastructure live`
            });
