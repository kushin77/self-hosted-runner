name: Credential Rotation (Daily)
# Purpose: Regenerate all credentials daily
# Triggered: Scheduled at 2 0 * * * (2 AM UTC daily)

on:
  schedule:
    - cron: '2 0 * * *'  # 2 AM UTC daily
  workflow_dispatch:  # Allow manual trigger for emergency rotation

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  daily-rotation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Bash Environment
        run: |
          echo "SCRIPT_DIR=$PWD/scripts/rotation" >> $GITHUB_ENV
      
      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_lifetime: '1800s'
          create_credentials_file: true
      
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'kubectl'
      
      - name: Setup Vault CLI
        run: |
          VAULT_VERSION="1.15.0"
          URL="https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_linux_amd64.zip"
          curl -sL "$URL" -o /tmp/vault.zip
          unzip -o /tmp/vault.zip -d /usr/local/bin
          chmod +x /usr/local/bin/vault
          vault version
      
      - name: Setup AWS CLI
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Run Daily Credential Rotation
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          bash "${SCRIPT_DIR}/daily-rotation.sh"
      
      - name: Upload Rotation Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-rotation-logs-${{ github.run_id }}
          path: scripts/audit/daily-rotation-*.log
          retention-days: 365
          if-no-files-found: ignore
      
      - name: Archive Audit Logs
        if: success()
        run: |
          mkdir -p scripts/audit/archive/$(date +%Y/%m)
          cp scripts/audit/daily-rotation-*.log scripts/audit/archive/$(date +%Y/%m)/ 2>/dev/null || true
      
      - name: Upload Archive
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: audit-archive-${{ github.run_id }}
          path: scripts/audit/archive/
          retention-days: 1095  # 3 years for compliance
          if-no-files-found: ignore
      
      - name: Generate Rotation Report
        if: always()
        run: |
          echo "### Daily Credential Rotation Report $(date -u +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "scripts/audit/daily-rotation-$(date +%Y%m%d).log" ]; then
            echo "**Status**: ✅ Rotation successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Summary**:" >> $GITHUB_STEP_SUMMARY
            tail -30 "scripts/audit/daily-rotation-$(date +%Y%m%d).log" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status**: ❌ Rotation failed" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Create Failure Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Daily Credential Rotation Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `
            Daily credential rotation encountered an error and did not complete successfully.
            
            - Run ID: ${{ github.run_id }}
            - Workflow: credential-rotation-daily.yml
            - Date: ${new Date().toISOString().split('T')[0]}
            - Time: ${new Date().toISOString()}
            
            **Impact**: New credentials were NOT regenerated. Fallback to previous credential versions.
            
            **Action Required**:
            1. Check audit logs immediately
            2. Verify GSM/Vault/KMS connectivity
            3. Manually trigger rotation if needed
            4. Update all active runners with patched credentials
            
            See workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
              `,
              assignees: ['@ops-team'],
              labels: ['critical', 'credential-rotation', 'automation', 'requires:manual-intervention']
            })
