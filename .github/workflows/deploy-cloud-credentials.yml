name: deploy-cloud-credentials

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, run in DRY_RUN mode (no destructive apply)'
        required: false
        default: 'true'

jobs:
  provision:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      issues: write
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Make scripts executable
        run: |
          chmod +x scripts/auto_provision_cloud_credentials.sh || true

      - name: Run auto-provision (DRY_RUN=${{ github.event.inputs.dry_run }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ./scripts/auto_provision_cloud_credentials.sh "${{ github.event.inputs.dry_run }}"

      - name: Create/Update issue 'Auto-provision started'
        if: success()
        run: |
          gh issue create --title "Auto-provision: started cloud credential provisioning" \
            --body "Auto-provision workflow executed in repository. Dry run = ${{ github.event.inputs.dry_run }}. See workflow run: ${{ github.run_id }}" \
            --label "automation,operator-action" || true
