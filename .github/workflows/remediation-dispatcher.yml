name: Remediation Dispatcher (fallback)

on:
  # Converted to event-driven. Replace frequent polling with repository_dispatch.
  workflow_dispatch:
    inputs:
      scope:
        description: "Scope to remediate (all, ci, infra, secrets)"
        required: false
        default: "all"
  repository_dispatch:
    types: [remediation-request, remediation-fallback]

permissions:
  id-token: write
  contents: read
  actions: write
  issues: write

permissions:
  id-token: write
  issues: write
  actions: write
  contents: read
  id-token: write

concurrency:
  group: remediation-dispatcher-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  dispatch-and-remediate:
    name: Dispatch & Remediate
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GH CLI
        run: |
          set -euo pipefail
          command -v gh || (echo "gh CLI is required" && exit 2)

      - name: Gather recent failed runs
        id: gather
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          echo "Gathering failed workflow runs for ${REPO}"
          # list latest failed runs (limit 50) and produce newline-separated ids
          gh run list --repo "${REPO}" --limit 50 --json databaseId,name,conclusion,headBranch --jq '.[] | select(.conclusion=="failure") | .databaseId' > /tmp/failed_runs || true
          if [ -s /tmp/failed_runs ]; then
            echo "failed_runs=$(cat /tmp/failed_runs | tr '\n' ' ')" >> $GITHUB_OUTPUT
          else
            echo "failed_runs=" >> $GITHUB_OUTPUT
          fi

      - name: Rerun failed workflows (idempotent)
        if: steps.gather.outputs.failed_runs != ''
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Rerunning recent failed workflow runs"
          FAILED_RUNS="${{ steps.gather.outputs.failed_runs }}"
          for id in $FAILED_RUNS; do
            # Ensure id is numeric
            if [[ "$id" =~ ^[0-9]+$ ]]; then
              echo "Attempting rerun for run $id"
              gh api -X POST "/repos/${REPO}/actions/runs/${id}/rerun" || echo "rerun failed for ${id}"
              sleep 1
            fi
          done

      - name: Re-check repository secrets and update issue
        id: secrets
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          REQUIRED=("DEPLOY_SSH_KEY" "PAGERDUTY_TOKEN" "COSIGN_PRIVATE_KEY" "VAULT_ROLE_ID" "VAULT_SECRET_ID")
          present=()
          missing=()
          secrets_list=$(gh api repos/${REPO}/actions/secrets --jq '.secrets[].name' 2>/dev/null || true)
          for req in "${REQUIRED[@]}"; do
            if echo "$secrets_list" | grep -q "\b${req}\b"; then
              present+=($req)
            else
              missing+=($req)
            fi
          done

          ALL_PRESENT=false
          if [ ${#missing[@]} -eq 0 ]; then
            ALL_PRESENT=true
          fi

          echo "present=${present[*]}" >> $GITHUB_OUTPUT
          echo "missing=${missing[*]}" >> $GITHUB_OUTPUT
          echo "all_present=${ALL_PRESENT}" >> $GITHUB_OUTPUT

          # Idempotently manage issue #1343 based on secrets state
          if [ "$ALL_PRESENT" = true ]; then
            # Close issue #1343 if it exists and is open (idempotent)
            if gh issue view 1343 --repo ${REPO} >/dev/null 2>&1; then
              state=$(gh issue view 1343 --repo ${REPO} --json state --jq '.state' 2>/dev/null || echo "OPEN")
              if [ "$state" = "OPEN" ]; then
                gh issue update 1343 --repo ${REPO} --state closed --state_reason completed || true
              fi
            fi
            # Idempotent comment on tracking issue 1064 (edit if exists, create if not)
            TRACK_BODY="Automated: required secrets are now present; closed #1343 and re-checking workflows."
            EXISTING=$(gh api "/repos/${REPO}/issues/1064/comments" --jq ".[] | select(.body | contains(\"required secrets are now present\")) | .id" 2>/dev/null | head -1 || true)
            if [ -n "$EXISTING" ]; then
              gh api "/repos/${REPO}/issues/comments/${EXISTING}" -X PATCH -f body="$TRACK_BODY" || true
            else
              gh issue comment 1064 --repo ${REPO} --body "$TRACK_BODY" || true
            fi
          else
            # Post idempotent status update on issue #1343 (create if missing)
            if ! gh issue view 1343 --repo ${REPO} >/dev/null 2>&1; then
              gh issue create --repo ${REPO} --title "Missing required secrets for automation" --body "The following required secrets are missing and prevent automation: ${missing[*]}" --label "missing-secrets" --json number --jq .number >/dev/null 2>&1 || true
            else
              BODY="Automated re-check: missing secrets: ${missing[*]}. System will retry provisioning or await operator action."
              EXISTING_COMMENT=$(gh api "/repos/${REPO}/issues/1343/comments" --jq ".[] | select(.body | contains(\"Automated re-check\")) | .id" 2>/dev/null | head -1 || true)
              if [ -n "$EXISTING_COMMENT" ]; then
                gh api "/repos/${REPO}/issues/comments/${EXISTING_COMMENT}" -X PATCH -f body="$BODY" || true
              else
                gh issue comment 1343 --repo ${REPO} --body "$BODY" || true
              fi
            fi
          fi

      - name: Post remediation summary to incident (idempotent)
        env:
          REPO: ${{ github.repository }}
          FAILED_RUNS: ${{ steps.gather.outputs.failed_runs }}
          MISSING_SECRETS: ${{ steps.secrets.outputs.missing }}
        run: |
          set -euo pipefail
          SUMMARY="Remediation Dispatcher run: triggered at $(date -u +'%Y-%m-%dT%H:%M:%SZ')\n"
          SUMMARY+="Failed runs attempted rerun: ${FAILED_RUNS:-none}\n"
          SUMMARY+="Missing secrets: ${MISSING_SECRETS:-none}\n"

          # Idempotent comment posting (edit if exists, create if missing)
          if gh issue view 1348 --repo ${REPO} >/dev/null 2>&1; then
            EXISTING=$(gh api "/repos/${REPO}/issues/1348/comments" --jq ".[] | select(.body | contains(\"Remediation Dispatcher run\")) | .id" 2>/dev/null | head -1 || true)
            if [ -n "$EXISTING" ]; then
              gh api "/repos/${REPO}/issues/comments/${EXISTING}" -X PATCH -f body="$SUMMARY" || true
            else
              gh issue comment 1348 --repo ${REPO} --body "$SUMMARY" || true
            fi
          fi
