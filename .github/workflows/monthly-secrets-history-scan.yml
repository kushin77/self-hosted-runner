name: Monthly Secrets History Scan

on:
  schedule:
    - cron: '0 4 1 * *' # 04:00 UTC on the 1st of every month
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  history-scan:
    name: Full history gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/zricethezav/gitleaks/master/install.sh | bash -s -- -b /usr/local/bin v8.17.0

      - name: Run gitleaks full history
        run: |
          /usr/local/bin/gitleaks detect --report-path gitleaks-history-report.json --redact

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-history-report
          path: gitleaks-history-report.json

      - name: Create issue if findings
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const report = JSON.parse(fs.readFileSync('gitleaks-history-report.json','utf8'))
            if (report && report.length > 0) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Security: gitleaks historical findings',
                body: `gitleaks detected ${report.length} issues in historical scan. See artifact: gitleaks-history-report.json`
              })
            } else {
              console.log('No historical findings')
            }
