name: Credential Operations Audit Trail Logger
description: Log all credential operations (rotation, access, violations) to immutable audit trail

on:
  workflow_call:
    inputs:
      operation:
        description: 'Operation type: rotation, access, violation, remediation, compliance-check'
        required: 'true'
        type: string

      credential-type:
        description: 'Type of credential: gsm, vault, kms, aws-secrets, docker, github-pat, ssh-key'
        required: 'true'
        type: string

      credential-id:
        description: 'Name/ID of the credential (e.g., github-pat-core, docker-hub-password)'
        required: 'true'
        type: string

      status:
        description: 'Operation status: success, failure, pending'
        required: 'true'
        type: string

      details:
        description: 'Additional details (JSON string)'
        required: 'false'
        type: string

      old-version:
        description: 'Previous version/revision number'
        required: 'false'
        type: string

      new-version:
        description: 'New version/revision number (for rotation logs)'
        required: 'false'
        type: string

jobs:
  log-credential-operation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate audit entry
        id: audit
        shell: bash
        run: |
          # Create comprehensive audit entry
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          WORKFLOW_RUN_ID=${{ github.run_id }}
          WORKFLOW_NAME="${{ github.workflow }}"
          ACTOR="${{ github.actor }}"

          # Generate entry hash for tampering detection
          ENTRY_HASH=$(echo "$TIMESTAMP|${{ inputs.operation }}|${{ inputs.credential-id }}|${{ inputs.status }}" | sha256sum | cut -d' ' -f1)

          # Create JSON log entry
          cat > /tmp/audit-entry.json <<'ENTRY_EOF'
          {
            "timestamp": "$TIMESTAMP",
            "operation": "${{ inputs.operation }}",
            "credential_type": "${{ inputs.credential-type }}",
            "credential_id": "${{ inputs.credential-id }}",
            "status": "${{ inputs.status }}",
            "old_version": "${{ inputs.old-version || 'N/A' }}",
            "new_version": "${{ inputs.new-version || 'N/A' }}",
            "actor": "$ACTOR",
            "workflow": "$WORKFLOW_NAME",
            "workflow_run_id": "$WORKFLOW_RUN_ID",
            "repository": "${{ github.repository }}",
            "ref": "${{ github.ref }}",
            "details": ${{ inputs.details || 'null' }},
            "entry_hash": "$ENTRY_HASH"
          }
          ENTRY_EOF

          # Convert to single-line JSON for append
          ENTRY_JSON=$(cat /tmp/audit-entry.json | jq -c .)

          echo "entry=$ENTRY_JSON" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Append to credential audit trail
        shell: bash
        run: |
          # Ensure audit-trail directory exists
          mkdir -p .audit-trail

          # Append to credential operations log
          echo "${{ steps.audit.outputs.entry }}" >> .audit-trail/credential-operations.log

          # Also append summary to main operations log for quick reference
          echo "[${{ steps.audit.outputs.timestamp }}] ${{ inputs.operation }} - ${{ inputs.credential-type }}::${{ inputs.credential-id }} - Status: ${{ inputs.status }}" >> .audit-trail/credential-operations-summary.txt

      - name: Create verification signature
        shell: bash
        run: |
          # Create HMAC signature of the log file for integrity verification
          # Using the entry hash for additional layer of protection
          if [[-f .audit-trail/credential-operations.log]]; then
            LOG_HASH=$(sha256sum .audit-trail/credential-operations.log | cut -d' ' -f1)
            echo "Audit trail hash: $LOG_HASH"
          fi

      - name: Commit audit trail (append-only)
        shell: bash
        run: |
          git config user.name "Credential Audit Logger"
          git config user.email "audit@github.actions"

          # Add only the audit trail files (not entire repo state)
          git add .audit-trail/credential-operations.log .audit-trail/credential-operations-summary.txt 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No audit trail changes to commit"
          else
            git commit -m "audit: credential-${{ inputs.operation }}-${{ inputs.credential-type }}" \
              --allow-empty \
              -m "credentials: ${{ inputs.credential-id }} (${{ inputs.status }})" \
              -m "timestamp: ${{ steps.audit.outputs.timestamp }}"

            git push origin ${{ github.ref }} || true
          fi

      - name: Report audit entry
        if: success()
        shell: bash
        run: |
          cat > /tmp/audit-report.txt <<'EOF'
          ✅ CREDENTIAL AUDIT LOGGED

          Operation: ${{ inputs.operation }}
          Credential Type: ${{ inputs.credential-type }}
          Credential ID: ${{ inputs.credential-id }}
          Status: ${{ inputs.status }}

          Timestamp: ${{ steps.audit.outputs.timestamp }}
          Workflow: ${{ github.workflow }} (Run: ${{ github.run_id }})

          Audit Trail: .audit-trail/credential-operations.log
          EOF

          cat /tmp/audit-report.txt

  # Optional: Push audit metrics to compliance dashboard
  update-compliance-metrics:
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update compliance metrics
        shell: bash
        run: |
          # Count credential operations by type
          mkdir -p .compliance-reports

          if [[-f .audit-trail/credential-operations.log]]; then
            # Generate metrics
            TOTAL_OPS=$(wc -l < .audit-trail/credential-operations.log)
            SUCCESS_OPS=$(grep -c '"status": "success"' .audit-trail/credential-operations.log || echo 0)
            FAILURE_OPS=$(grep -c '"status": "failure"' .audit-trail/credential-operations.log || echo 0)

            # Create metrics file
            cat > .compliance-reports/credential-metrics.txt <<EOF
          Credential Operations Metrics
          ==============================

          Total Operations: $TOTAL_OPS
          Successful: $SUCCESS_OPS ($(( SUCCESS_OPS * 100 / (TOTAL_OPS + 1) ))%)
          Failed: $FAILURE_OPS

          Last Updated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EOF
          fi
