name: Security Findings Tracker & Closure
# Tracks remediation PRs and closes issues when vulnerabilities are fixed

on:
  pull_request:
    types: [opened, synchronize, closed]
    paths:
      - 'package*.json'
  issues:
    types: [opened]
  schedule:
    - cron: '0 * * * *'  # Hourly
  workflow_call: {}

concurrency:
  group: security-tracker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  track-remediation:
    name: Track & Update Remediation Status
    runs-on: ubuntu-latest
    
    steps:
            - name: Load resilience helpers
              run: |
                set -euo pipefail
                source .github/scripts/resilience.sh || true
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Find open security issues
        id: find-issues
        run: |
          # Find all open [SECURITY] issues
          ISSUES=$(gh issue list \
            --repo ${{ github.repository }} \
            --state open \
            --label "security" \
            --json number,title \
            --jq '.[] | "\(.number):\(.title)"')
          
          echo "Found security issues:"
          echo "$ISSUES" | while read issue; do
            echo "  - $issue"
          done
          
          echo "issues<<EOF" >> $GITHUB_OUTPUT
          echo "$ISSUES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Find open remediation PRs
        id: find-prs
        run: |
          # Find all open remediation PRs
          PRS=$(gh pr list \
            --repo ${{ github.repository }} \
            --state open \
            --label "remediation-auto" \
            --json number,title,mergeStateStatus \
            --jq '.[] | "\(.number):\(.title):\(.mergeStateStatus)"')
          
          echo "Found remediation PRs:"
          echo "$PRS" | while read pr; do
            echo "  - $pr"
          done
          
          echo "prs<<EOF" >> $GITHUB_OUTPUT
          echo "$PRS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Update security issues with PR links
        run: |
          # For each security issue, add comment with open remediation PRs
          while IFS= read -r issue; do
            ISSUE_NUM="${issue%%:*}"
            
            PRS_BODY=""
            echo "${{ steps.find-prs.outputs.prs }}" | while IFS=: read -r pr_num pr_title pr_status; do
              PRS_BODY+="- [PR #$pr_num](${{ github.server_url }}/${{ github.repository }}/pull/$pr_num): $pr_title ($pr_status)\n"
            done
            
            if [ -n "$PRS_BODY" ]; then
              gh issue comment "$ISSUE_NUM" \
                --repo ${{ github.repository }} \
                --body "## 🔧 Remediation PRs

$PRS_BODY" || true
            fi
          done <<< "${{ steps.find-issues.outputs.issues }}"
      
      - name: Check if remediation is complete
        id: check-complete
        run: |
          # Check if all remediation PRs are merged or closed
          OPEN_PRS=$(echo "${{ steps.find-prs.outputs.prs }}" | grep -c ":" || echo 0)
          
          if [ "$OPEN_PRS" -eq 0 ]; then
            echo "All remediation PRs completed!"
            echo "all_fixed=true" >> $GITHUB_OUTPUT
          else
            echo "Still awaiting remediation PRs to merge..."
            echo "all_fixed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Close security issues when fixed
        if: steps.check-complete.outputs.all_fixed == 'true'
        run: |
          # Close issues that have all remediations merged
          while IFS= read -r issue; do
            ISSUE_NUM="${issue%%:*}"
            
            echo "✅ Closing security issue #$ISSUE_NUM (all remediations complete)"
            
            gh issue close "$ISSUE_NUM" \
              --repo ${{ github.repository }} \
              --reason "completed" || true
            
            gh issue comment "$ISSUE_NUM" \
              --repo ${{ github.repository }} \
              --body "## ✅ Remediation Complete

All identified vulnerabilities have been patched and remediation PRs merged to main.

**Closure Time**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')  
**Automation**: github-actions" || true
          done <<< "${{ steps.find-issues.outputs.issues }}"
      
      - name: Report summary to job summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 📊 Security Findings Tracker
          
          ### Open Security Issues
          EOF
          
          if [ -z "${{ steps.find-issues.outputs.issues }}" ]; then
            echo "✅ No open security issues" >> $GITHUB_STEP_SUMMARY
          else
            echo "${{ steps.find-issues.outputs.issues }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          
          ### Open Remediation PRs
          EOF
          
          if [ -z "${{ steps.find-prs.outputs.prs }}" ]; then
            echo "✅ No open remediation PRs" >> $GITHUB_STEP_SUMMARY
          else
            echo "${{ steps.find-prs.outputs.prs }}" >> $GITHUB_STEP_SUMMARY
          fi
