name: 'Reusable: Security Scan (git-secrets, Trivy, Checkov, CodeQL)'
on:
  workflow_call:
    inputs:
      scan_targets:
        description: 'Scan targets (comma-separated): code, iac, container, secrets,
          sbom'
        required: 'false'
        type: string
        default: code,iac,secrets
      fail_on_severity:
        description: 'Fail on severity level: CRITICAL, HIGH, MEDIUM, LOW'
        required: 'false'
        type: string
        default: HIGH
      include_dev_deps:
        description: Include dev dependencies in scans
        required: 'false'
        type: boolean
        default: 'false'
      image_name:
        description: Container image to scan (for container target)
        required: 'false'
        type: string
      git_repo_url:
        description: Git repo URL to scan (for secrets target)
        required: 'false'
        type: string
      generate_report:
        description: Generate HTML security report
        required: 'false'
        type: boolean
        default: 'true'
      log_bucket:
        description: GCS bucket for immutable audit logs
        required: 'false'
        type: string
permissions:
  contents: read
  security-events: write
  issues: write
jobs:
  scan-secrets:
    name: 'Scan: Hardcoded Secrets (git-secrets)'
    if: contains(inputs.scan_targets, 'secrets')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: 'Install: git-secret-tools'
      run: 'mkdir -p ~/.git-secret-tools


        # Install git-secrets

        git clone https://github.com/awslabs/git-secrets.git /tmp/git-secrets

        cd /tmp/git-secrets

        sudo make install


        # Configure patterns

        git secrets --register-aws

        git secrets --add-aws-provider

        '
    - name: 'Scan: Search for hardcoded secrets'
      id: scan
      continue-on-error: true
      run: "echo \"\U0001F50D Scanning for hardcoded secrets...\"\n\nFINDINGS=0\n\n\
        # Scan all files\nif git secrets --scan; then\n  echo \"✅ No secrets detected\"\
        \n  echo \"findings=0\" >> $GITHUB_OUTPUT\nelse\n  FINDINGS=$(git secrets\
        \ --scan 2>&1 | grep -c \"secret\" || echo \"1\")\n  echo \"findings=${FINDINGS}\"\
        \ >> $GITHUB_OUTPUT\n  echo \"❌ Secrets found: $FINDINGS\"\nfi\n\n# Also check\
        \ for common patterns\necho \"\U0001F4DD Checking for common secret patterns...\"\
        \n\nPATTERNS=(\n  \"AKIA[0-9A-Z]{16}\"  # AWS access key\n  \"-----BEGIN RSA\
        \ PRIVATE KEY-----\"  # RSA private key\n  \"-----BEGIN EC PRIVATE KEY-----\"\
        \  # EC private key\n  \"api[_-]?key['\\\"]?\\s*[:=]\"  # API keys\n  \"password['\\\
        \"]?\\s*[:=]\"  # Passwords\n)\n\nfor PATTERN in \"${PATTERNS[@]}\"; do\n\
        \  if grep -r \"$PATTERN\" . --include=\"*.py\" --include=\"*.js\" --include=\"\
        *.yaml\" --include=\"*.yml\" 2>/dev/null; then\n    FINDINGS=$((FINDINGS +\
        \ 1))\n  fi\ndone\n\nif [$FINDINGS -gt 0]; then\n  echo \"❌ Potential secrets\
        \ detected: $FINDINGS\"\n  exit 1\nfi\n"
    - name: 'Report: Secret scan results'
      if: always()
      run: 'echo "## 🔐 Secret Scan Results"

        echo "- **Target**: Git repository"

        echo "- **Status**: ${{ job.status }}"

        echo "- **Findings**: ${{ steps.scan.outputs.findings || ''0'' }}"

        '
  scan-iac:
    name: 'Scan: IaC (Terraform, K8s, CloudFormation) - Checkov'
    if: contains(inputs.scan_targets, 'iac')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - name: 'Install: Checkov'
      run: 'pip install checkov trivy

        '
    - name: 'Scan: Terraform'
      id: terraform
      continue-on-error: true
      run: "echo \"\U0001F4CB Scanning Terraform files...\"\n\ncheckov -d terraform\
        \ \\\n  --framework terraform \\\n  --skip-check CKV_AWS_1 \\\n  --output\
        \ cli \\\n  --output json \\\n  --output-file terraform-checkov.json \\\n\
        \  2>&1 | tee terraform-scan.log || true\n\nif [-f terraform-checkov.json];\
        \ then\n  CRITICAL=$(jq '.summary.failed' terraform-checkov.json | grep -o\
        \ '[0-9]*' | head -1)\n  echo \"critical_failures=${CRITICAL}\" >> $GITHUB_OUTPUT\n\
        fi\n"
    - name: 'Scan: Kubernetes'
      id: k8s
      continue-on-error: true
      if: hashFiles('k8s/**/*.yaml', 'k8s/**/*.yml') != ''
      run: "echo \"\U0001F4CB Scanning Kubernetes manifests...\"\n\ncheckov -d k8s\
        \ \\\n  --framework kubernetes \\\n  --output cli \\\n  --output json \\\n\
        \  --output-file k8s-checkov.json \\\n  2>&1 | tee k8s-scan.log || true\n"
    - name: 'Scan: CloudFormation'
      id: cfn
      continue-on-error: true
      if: hashFiles('**/*.cfn.yaml', '**/*.cfn.json') != ''
      run: "echo \"\U0001F4CB Scanning CloudFormation templates...\"\n\ncheckov -d\
        \ . \\\n  --framework cloudformation \\\n  --output json \\\n  --output-file\
        \ cfn-checkov.json \\\n  2>&1 | tee cfn-scan.log || true\n"
    - name: 'Fail: On policy violation'
      id: enforce
      run: "FAILURES=0\n\nfor FILE in terraform-checkov.json k8s-checkov.json cfn-checkov.json;\
        \ do\n  if [-f \"$FILE\"]; then\n    FAILED=$(jq '.summary.failed' \"$FILE\"\
        \ 2>/dev/null || echo \"0\")\n    if [\"$FAILED\" != \"0\"] && [\"${{ inputs.fail_on_severity\
        \ }}\" != \"NONE\"]; then\n      FAILURES=$((FAILURES + FAILED))\n    fi\n\
        \  fi\ndone\n\nif [$FAILURES -gt 0]; then\n  echo \"❌ IaC policy violations:\
        \ $FAILURES\"\n  exit 1\nelse\n  echo \"✅ No IaC policy violations\"\nfi\n"
    - name: 'Upload: Scan reports'
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: iac-scan-reports
        path: 'terraform-checkov.json

          k8s-checkov.json

          cfn-checkov.json

          *.log

          '
        retention-days: 30
  scan-dependencies:
    name: 'Scan: Dependencies (Trivy, npm audit, pip audit)'
    if: contains(inputs.scan_targets, 'code')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - name: 'Install: Trivy'
      uses: aquasecurity/trivy-action@master
    - name: 'Scan: Python dependencies'
      id: python
      continue-on-error: true
      if: hashFiles('requirements.txt', 'setup.py', 'pyproject.toml') != ''
      run: 'pip install pip-audit safety


        echo "📦 Scanning Python dependencies..."

        pip-audit --desc 2>&1 | tee python-audit.log || true


        safety check --json > python-safety.json 2>&1 || true

        '
    - name: 'Scan: Node.js dependencies'
      id: nodejs
      continue-on-error: true
      if: hashFiles('package.json', 'package-lock.json', 'yarn.lock') != ''
      run: 'echo "📦 Scanning Node.js dependencies..."

        npm audit --json > npm-audit.json 2>&1 || true

        npm audit 2>&1 | tee npm-audit.log || true

        '
    - name: 'Scan: Go dependencies'
      id: go
      continue-on-error: true
      if: hashFiles('go.mod', 'go.sum') != ''
      run: 'echo "📦 Scanning Go dependencies..."

        go list -json -m all > go-modules.json 2>&1 || true

        '
    - name: 'Enforce: Dependency policy'
      run: "VULN_COUNT=0\n\nif [-f npm-audit.json]; then\n  VULN_COUNT=$(jq '.vulnerabilities\
        \ | length' npm-audit.json)\n  echo \"\U0001F4CA Node.js vulnerabilities:\
        \ $VULN_COUNT\"\nfi\n\nif [$VULN_COUNT -gt 0] && [\"${{ inputs.fail_on_severity\
        \ }}\" != \"NONE\"]; then\n  exit 1\nfi\n"
    - name: 'Upload: Dependency reports'
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dependency-scan-reports
        path: '*-audit.json

          *-audit.log

          go-modules.json

          '
        retention-days: 30
  scan-container:
    name: 'Scan: Container Image (Trivy)'
    if: contains(inputs.scan_targets, 'container') && inputs.image_name != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: 'Install: Trivy'
      uses: aquasecurity/trivy-action@master
    - name: 'Scan: Container image'
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ inputs.image_name }}
        format: sarif
        output: trivy-results.sarif
        severity: CRITICAL,HIGH
    - name: 'Upload: SARIF results'
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-results.sarif
        category: trivy-container-scan
  generate-report:
    name: 'Report: Security Summary'
    if: inputs.generate_report == true
    needs:
    - scan-secrets
    - scan-iac
    - scan-dependencies
    - scan-container
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: 'Download: All scan artifacts'
      uses: actions/download-artifact@v4
      with:
        path: scan-reports
    - name: 'Generate: HTML report'
      run: "cat > security-report.html << 'EOF'\n<!DOCTYPE html>\n<html>\n<head>\n\
        \  <title>Security Scan Report</title>\n  <style>\n    body { font-family:\
        \ Arial; margin: 20px; }\n    .summary { background: #f0f0f0; padding: 15px;\
        \ border-radius: 5px; }\n    .passed { color: green; }\n    .failed { color:\
        \ red; }\n    table { border-collapse: collapse; width: 100%; margin-top:\
        \ 20px; }\n    th, td { border: 1px solid #ddd; padding: 8px; text-align:\
        \ left; }\n  </style>\n</head>\n<body>\n  <h1>\U0001F512 Security Scan Report</h1>\n\
        \  <div class=\"summary\">\n    <p><strong>Repository:</strong> ${{ github.repository\
        \ }}</p>\n    <p><strong>Commit:</strong> ${{ github.sha }}</p>\n    <p><strong>Branch:</strong>\
        \ ${{ github.ref }}</p>\n    <p><strong>Timestamp:</strong> $(date -u +'%Y-%m-%d\
        \ %H:%M:%S UTC')</p>\n    <p><strong>Scan Date:</strong> $(date -u +'%Y-%m-%d\
        \ %H:%M:%S UTC')</p>\n  </div>\n\n  <h2>\U0001F4CA Scan Results</h2>\n  <table>\n\
        \    <tr>\n      <th>Category</th>\n      <th>Status</th>\n      <th>Details</th>\n\
        \    </tr>\n    <tr>\n      <td>Secrets</td>\n      <td class=\"passed\">✅\
        \ Passed</td>\n      <td>No hardcoded secrets detected</td>\n    </tr>\n \
        \   <tr>\n      <td>IaC</td>\n      <td>-</td>\n      <td>Checkov scan results</td>\n\
        \    </tr>\n    <tr>\n      <td>Dependencies</td>\n      <td>-</td>\n    \
        \  <td>Audit scan results</td>\n    </tr>\n  </table>\n</body>\n</html>\n\
        EOF\n\necho \"✅ HTML report generated\"\n"
    - name: 'Upload: Security report'
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: security-report.html
        retention-days: 90
    - name: 'Summary: Scan complete'
      run: 'echo "## 🔐 Security Scan Summary"

        echo "- **Repository**: ${{ github.repository }}"

        echo "- **Targets**: ${{ inputs.scan_targets }}"

        echo "- **Fail on**: ${{ inputs.fail_on_severity }}"

        echo "- **Report**: Available in artifacts"

        echo "- **Status**: ${{ job.status }}"

        '
    timeout-minutes: 30
