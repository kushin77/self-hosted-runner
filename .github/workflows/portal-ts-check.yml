name: Portal TypeScript/Lint Check

on:
  pull_request:
    paths:
      - 'apps/portal/**'
  push:
    branches:
      - main
    paths:
      - 'apps/portal/**'

jobs:
  lint-typecheck:
    name: ESLint & TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm ci
      - name: Run ESLint
        run: npm run lint
      - name: Type-check
        run: npm run type-check
