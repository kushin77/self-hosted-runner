name: Auto-Remediate Security Findings
# Triggered by security-audit.yml issues to create dependency-bump PRs

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to remediate (leave empty for latest)'
        required: false
  workflow_call: {}

concurrency:
  group: security-findings-remediation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  parse-findings:
    name: Parse Security Findings & Create Remediation PRs
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
       (contains(github.event.issue.title, '[SECURITY]') &&
        (contains(github.event.issue.title, 'Trivy') ||
         contains(github.event.issue.title, 'Gitleaks'))))

    outputs:
      remediation_count: ${{ steps.remediate.outputs.pr_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Setup Node.js (for npm audit fix)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Get latest security audit run
        id: get-run
        run: |
          source .github/scripts/resilience.sh || true
          # Get the most recent completed security-audit workflow run
          RUN_ID=$(retry_command 5 10 sh -c "gh run list --workflow security-audit.yml --repo ${{ github.repository }} --status completed --limit 1 --json databaseId --jq '.[0].databaseId'" || true)
          if [[ -z "$RUN_ID" ]]; then
            echo "⚠️  No completed security-audit runs found"
            echo "run_id=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "✅ Found security-audit run: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Download trivy report
        id: download-trivy
        if: steps.get-run.outputs.run_id != ''
        continue-on-error: true
        run: |
          RUN_ID="${{ steps.get-run.outputs.run_id }}"
          echo "Downloading artifacts from run $RUN_ID..."
          retry_command 5 10 sh -c "gh run download \"$RUN_ID\" --repo ${{ github.repository }} --pattern \"trivy-report\" --dir /tmp/artifacts" || true

          if [ -f "/tmp/artifacts/trivy-report/trivy-report.json" ]; then
            echo "✅ Trivy report found"
            cat /tmp/artifacts/trivy-report/trivy-report.json > /tmp/trivy-report.json
            echo "report_found=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Trivy report not found"
            echo "report_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Download gitleaks report
        id: download-gitleaks
        if: steps.get-run.outputs.run_id != ''
        continue-on-error: true
        run: |
          RUN_ID="${{ steps.get-run.outputs.run_id }}"
          retry_command 5 10 sh -c "gh run download \"$RUN_ID\" --repo ${{ github.repository }} --pattern \"gitleaks-report\" --dir /tmp/artifacts" || true

          if [ -f "/tmp/artifacts/gitleaks-report/gitleaks-report.json" ]; then
            echo "✅ Gitleaks report found"
            cat /tmp/artifacts/gitleaks-report/gitleaks-report.json > /tmp/gitleaks-report.json
            echo "report_found=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Gitleaks report not found"
            echo "report_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Parse Trivy findings and create remediation branch
        id: remediate
        if: steps.download-trivy.outputs.report_found == 'true'
        run: |
          set -euo pipefail

          echo "📦 Parsing Trivy findings..."

          # Extract vulnerable packages
          if [ -f /tmp/trivy-report.json ]; then
            VULNS=$(jq -r '.Results[]? | select(.Vulnerabilities) |
              .Vulnerabilities[] | select(.Severity == "CRITICAL" or .Severity == "HIGH") |
              [.Type, .Title, .VulnerabilityID, .Severity] | @csv' /tmp/trivy-report.json)

            VULN_COUNT=$(echo "$VULNS" | grep -c "^" || echo 0)
            echo "Found $VULN_COUNT high/critical vulnerabilities"

            if [ "$VULN_COUNT" -eq 0 ]; then
              echo "No vulnerabilities to remediate"
              echo "pr_count=0" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Check for npm vulnerabilities (most common)
            NPM_VULNS=$(jq -r '.Results[]? | select(.Type == "npm") |
              .Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH") |
              .Title' /tmp/trivy-report.json | sort | uniq || echo "")

            if [ -n "$NPM_VULNS" ]; then
              echo "🔧 Running npm audit fix..."

              cd package.json && npm audit fix --production --audit-level=high || true

              # Check if there were changes
              if git diff --quiet package*.json; then
                echo "No npm changes needed"
              else
                echo "✅ npm dependencies updated"
                git config user.name "copilot-automation"
                git config user.email "copilot@github.com"

                BRANCH_NAME="automation/security-remediation-npm-$(date +%s)"
                git checkout -b "$BRANCH_NAME"
                git add package*.json
                git commit -m "chore(security): remediate high/critical npm vulnerabilities"
                git push origin "$BRANCH_NAME"

                # Create PR
                gh pr create \
                  --title "🔒 Security: Remediate high/critical npm vulnerabilities" \
                  --body "Automated remediation PR for npm audit findings.

**Vulnerable Packages Fixed**:
$(npm audit --json 2>/dev/null | jq -r '.vulnerabilities[]? | .name' | sort | uniq | sed 's/^/- /' || echo 'npm audit details unavailable')

**SLA**: High/critical vulnerabilities should be merged within 24 hours.
**Auto-Merge**: Enabled - will merge when CI checks pass." \
                  --label "security,remediation-auto" \
                  --base main \
                  --head "$BRANCH_NAME" || true

                echo "pr_count=1" >> $GITHUB_OUTPUT
              fi
            fi
          else
            echo "Trivy report not readable"
            echo "pr_count=0" >> $GITHUB_OUTPUT
          fi

      - name: Enable auto-merge on remediation PRs
        if: steps.remediate.outputs.pr_count != ''
        continue-on-error: true
        run: |
          # Find the most recent PR with the security,remediation-auto labels
          PR_NUMBER=$(gh pr list \
            --repo ${{ github.repository }} \
            --label "security,remediation-auto" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number' || echo "")

          if [ -n "$PR_NUMBER" ]; then
            echo "🔄 Enabling auto-merge for PR #$PR_NUMBER..."
            gh pr merge "$PR_NUMBER" \
              --auto \
              --squash \
              --repo ${{ github.repository }} || true
          fi

      - name: Report status to GitHub Issue
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "security" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number')

          if [ -z "$ISSUE_NUMBER" ]; then
            exit 0
          fi

          PR_COUNT="${{ steps.remediate.outputs.pr_count || '0' }}"

          gh issue comment "$ISSUE_NUMBER" \
            --body "## 🤖 Auto-Remediation Status

**Run**: [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
**Time**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
**Remediation PRs Created**: $PR_COUNT

$(if [ "$PR_COUNT" -gt 0 ]; then echo "✅ Dependency-bump PRs created and auto-merge enabled"; else echo "ℹ️  No new remediations needed (existing PRs still pending)"; fi)" || true
