name: 🚀 Phase 3 Production Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
      auto_approve:
        description: 'Auto-approve terraform'
        required: false
        default: 'true'

permissions:
  id-token: write
  contents: read
  actions: write
  issues: write

jobs:
  deploy:
    name: Phase 3 GCP Infrastructure
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    outputs:
      status: ${{ steps.result.outputs.status }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.6'

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: 'access_token'
          access_token_lifetime: '1200s'

      - uses: google-github-actions/setup-gcloud@v2

      - name: Verify GCP Access
        run: |
          echo "🔐 Verifying ephemeral OIDC access..."
          gcloud config get-value project
          echo "✅ OIDC authentication successful"

      - name: Terraform Init
        working-directory: ./infra/phase3-clean
        run: terraform init

      - name: Terraform Plan
        working-directory: ./infra/phase3-clean
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        id: result
        working-directory: ./infra/phase3-clean
        run: |
          if [[ "${{ github.event.inputs.auto_approve }}" == "true" ]]; then
            terraform apply -auto-approve tfplan
            echo "status=deployed" >> $GITHUB_OUTPUT
          else
            terraform apply tfplan
            echo "status=deployed" >> $GITHUB_OUTPUT
          fi
          echo "✅ Phase 3 deployment complete"

      - name: Report Success
        if: success()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1816,
              body: '✅ Phase 3 DEPLOYED\nWorkflow Run: ${{ github.run_number }}'
            }).catch(() => {});
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1824,
              state: 'closed'
            }).catch(() => {});
