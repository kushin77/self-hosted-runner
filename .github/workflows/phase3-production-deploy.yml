name: 🚀 Phase 3 Production Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: false
        default: 'production'
      auto_approve:
        description: 'Auto-approve terraform'
        required: false
        default: 'true'

permissions:
  id-token: write
  contents: read
  actions: write
  issues: write

jobs:
  deploy:
    name: Phase 3 GCP Infrastructure
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    outputs:
      status: ${{ steps.result.outputs.status }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.14.6'

      - name: Authenticate to Google Cloud
        shell: bash
        run: |
          set -euo pipefail
          echo "🔐 Attempting authentication methods..."

          OIDC_SUCCESS="false"

          # Try ephemeral OIDC first (preferred)
          if [ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "📝 Using ephemeral OIDC authentication..."
            if gcloud iam service-accounts get-id-token --audiences="${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" --include-email 2>/dev/null; then
              OIDC_SUCCESS="true"
            fi
          fi

          # Fallback to service account key if OIDC fails
          if [ "$OIDC_SUCCESS" != "true" ]; then
            echo "⚠️  OIDC not available, attempting service account key fallback..."

            # Write the secret reliably using printf (handles newlines safely)
            if [ -n "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]; then
              printf '%s' "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" > /tmp/gcp-sa-key.json || true

              # Ensure file has content and valid JSON start
              if [ -s /tmp/gcp-sa-key.json ]; then
                head -c 2 /tmp/gcp-sa-key.json | grep -q '{' || true
                gcloud auth activate-service-account --key-file=/tmp/gcp-sa-key.json
                rm -f /tmp/gcp-sa-key.json
                echo "✅ Service account authentication successful"
              else
                echo "❌ Failed to write service account key file (empty)"
                exit 1
              fi
            else
              echo "❌ No GCP service account key found in secrets"
              exit 1
            fi
          else
            echo "✅ OIDC authentication successful"
          fi

          gcloud config set project "${{ secrets.GCP_PROJECT_ID }}"
          gcloud auth application-default print-access-token > /dev/null
          echo "✅ GCP access verified"

      - uses: google-github-actions/setup-gcloud@v2

      - name: Terraform Init
        working-directory: ./infra/phase3-clean
        run: terraform init

      - name: Terraform Plan
        working-directory: ./infra/phase3-clean
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        id: result
        working-directory: ./infra/phase3-clean
        run: |
          if [[ "${{ github.event.inputs.auto_approve }}" == "true" ]]; then
            terraform apply -auto-approve tfplan
            echo "status=deployed" >> $GITHUB_OUTPUT
          else
            terraform apply tfplan
            echo "status=deployed" >> $GITHUB_OUTPUT
          fi
          echo "✅ Phase 3 deployment complete"

      - name: Report Success
        if: success()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1816,
              body: '✅ Phase 3 DEPLOYED\nWorkflow Run: ${{ github.run_number }}'
            }).catch(() => {});
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1824,
              state: 'closed'
            }).catch(() => {});
