name: Manual — Dry-Run Debug Trigger

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug diagnostics'
        required: false
        default: 'true'

  workflow_call: {}

concurrency:
  group: manual-dryrun-debug-trigger-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  collect-diagnostics:
    name: Collect Debug Diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Load resilience helpers
      run: |
        set -euo pipefail
        source .github/scripts/resilience.sh || true
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare diagnostics dir
        run: |
          mkdir -p diagnostics

      - name: Capture runner info
        run: |
          echo "=== Runner Info ===" > diagnostics/debug.txt
          uname -a >> diagnostics/debug.txt || true
          echo "OS Release:" >> diagnostics/debug.txt
          (lsb_release -ds 2>/dev/null || cat /etc/os-release 2>/dev/null) >> diagnostics/debug.txt || true
          echo "Environment (partial):" >> diagnostics/debug.txt
          env | sort | sed -n '1,200p' >> diagnostics/debug.txt || true

      - name: Network connectivity checks
        run: |
          echo "=== Connectivity ===" > diagnostics/connectivity.txt
          if [ -n "${{ secrets.VAULT_ADDR }}" ]; then
            echo "VAULT_ADDR=${{ secrets.VAULT_ADDR }}" >> diagnostics/connectivity.txt
            timeout 8 curl -v --connect-timeout 6 "${{ secrets.VAULT_ADDR }}/v1/sys/health" 2>&1 | tee diagnostics/vault_connectivity.log || true
          else
            echo "VAULT_ADDR not set" >> diagnostics/connectivity.txt
          fi

      - name: Collect GitHub context
        run: |
          echo "run_id=${{ github.run_id }}" > diagnostics/metadata.txt
          echo "run_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> diagnostics/metadata.txt
          echo "repository=${{ github.repository }}" >> diagnostics/metadata.txt

      - name: Upload diagnostics artifact
        uses: actions/upload-artifact@v4
        with:
          name: manual-dryrun-debug-${{ github.run_id }}
          path: diagnostics/**
