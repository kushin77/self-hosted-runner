name: Canary Deployment
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: 'Ansible playbook path (relative)'
        required: true
        default: 'ansible/playbooks/deploy-rotation.yml'
      inventory:
        description: 'Ansible inventory path'
        required: true
        default: 'ansible/inventory/canary'
      canary_limit:
        description: 'Canary hosts limit (Ansible --limit expression)'
        required: false
        default: 'canary'
      health_endpoint:
        description: 'Health check endpoint (http://host:port/health)'
        required: false
        default: 'http://localhost:9093/-/healthy'
      rollback_playbook:
        description: 'Rollback playbook (optional)'
        required: false
        default: 'ansible/playbooks/rollback.yml'

jobs:
  call:
    uses: ./.github/workflows/reusable/canary-deployment-run.yml
    with:
      playbook: ${{ github.event.inputs.playbook }}
      inventory: ${{ github.event.inputs.inventory }}
      canary_limit: ${{ github.event.inputs.canary_limit }}
      health_endpoint: ${{ github.event.inputs.health_endpoint }}
      rollback_playbook: ${{ github.event.inputs.rollback_playbook }}
    secrets: inherit