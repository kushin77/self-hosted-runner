name: Canary Deployment

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: 'Ansible playbook path (relative)'
        required: true
        default: 'ansible/playbooks/deploy-rotation.yml'
      inventory:
        description: 'Ansible inventory path'
        required: true
        default: 'ansible/inventory/canary'
      canary_limit:
        description: 'Canary hosts limit (Ansible --limit expression)'
        required: false
        default: 'canary'
      health_endpoint:
        description: 'Health check endpoint (http://host:port/health)'
        required: false
        default: 'http://localhost:9093/-/healthy'
      rollback_playbook:
        description: 'Rollback playbook (optional)'
        required: false
        default: 'ansible/playbooks/rollback.yml'

concurrency:
  group: canary-deployment
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  canary:
    if: secrets.DEPLOY_SSH_KEY != ''
    name: Canary deploy + verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python and Ansible
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible jinja2 pyyaml

      - name: Write SSH key (from secret)
        if: secrets.DEPLOY_SSH_KEY != ''
        run: |
          mkdir -p /tmp/ansible
          echo "$DEPLOY_SSH_KEY" > /tmp/ansible/deploy_id_rsa
          chmod 600 /tmp/ansible/deploy_id_rsa

      - name: Pre-deployment: verify artifact signature (cosign)
        run: |
          echo "Skipping signature verification in canary run by default (optional step)"

      - name: Ansible syntax check
        run: ansible-playbook --syntax-check ${{ github.event.inputs.playbook }} || true

      - name: Run canary deployment (first pass)
        env:
          ANSIBLE_SSH_KEY_PATH: /tmp/ansible/deploy_id_rsa
        run: |
          set -euo pipefail
          PLAYBOOK=${{ github.event.inputs.playbook }}
          INVENTORY=${{ github.event.inputs.inventory }}
          LIMIT=${{ github.event.inputs.canary_limit }}
          echo "Running canary playbook: $PLAYBOOK against $INVENTORY --limit $LIMIT"
          ansible-playbook -i "$INVENTORY" "$PLAYBOOK" --limit "$LIMIT" \
            ${ANSIBLE_SSH_KEY_PATH:+--private-key=$ANSIBLE_SSH_KEY_PATH} || (echo "Canary deploy failed" && exit 20)

      - name: Wait for canary to stabilize
        run: sleep 30

      - name: Canary health check
        id: health
        run: |
          set -e
          ENDPOINT="${{ github.event.inputs.health_endpoint }}"
          echo "Checking health endpoint: $ENDPOINT"
          if curl -fsS "$ENDPOINT" | grep -qi 'ok\|true\|"healthy"\|200'; then
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
          fi

      - name: Decision: rollback if unhealthy
        if: steps.health.outputs.healthy == 'false'
        run: |
          echo "Canary health failed; running rollback"
          ROLLBACK_PLAYBOOK=${{ github.event.inputs.rollback_playbook }}
          INVENTORY=${{ github.event.inputs.inventory }}
          ANSIBLE_SSH_KEY_PATH=/tmp/ansible/deploy_id_rsa
          if [ -f "$ROLLBACK_PLAYBOOK" ]; then
            ansible-playbook -i "$INVENTORY" "$ROLLBACK_PLAYBOOK" --limit "${{ github.event.inputs.canary_limit }}" --private-key=$ANSIBLE_SSH_KEY_PATH || true
          fi
          gh issue create --title "P1: Canary deployment failed" --body "Canary deployment failed during ${GITHUB_REPOSITORY} run ${GITHUB_RUN_ID}. Rollback executed." --label P1 --repo $GITHUB_REPOSITORY || echo "failed to create issue"
          exit 1

      - name: Post canary success report
        run: |
          echo "Canary deployment succeeded for run $GITHUB_RUN_ID"
          gh issue comment --repo $GITHUB_REPOSITORY --issue 1313 --body "Canary deployment successful (run: $GITHUB_RUN_ID)." || true

  simulate_canary:
    name: Simulated Canary (no secrets)
    runs-on: ubuntu-latest
    if: secrets.DEPLOY_SSH_KEY == ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run local canary simulator
        run: |
          python -m pip install --upgrade pip || true
          python scripts/simulate_canary.py || true

      - name: Create simulation issue (log)
        run: |
          gh issue create --title "Simulated Canary run (no SSH key)" --body "A simulated canary run was executed because DEPLOY_SSH_KEY is not configured. Repository: $GITHUB_REPOSITORY, Run: $GITHUB_RUN_ID" --label automation || true
