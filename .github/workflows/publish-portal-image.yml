name: Publish Portal Image

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/portal/**'

  workflow_call: {}

concurrency:
  group: publish-portal-image-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
      - name: Get Credential [GHCR_PAT]
        id: cred_ghcr_pat
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GHCR_PAT
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ steps.cred_ghcr_pat.outputs.credential }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/portal
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/portal:latest

      - name: Image info
        run: echo "Published ghcr.io/${{ github.repository_owner }}/portal:latest"
