name: Publish Portal Image

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/portal/**'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: apps/portal
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/portal:latest

      - name: Image info
        run: echo "Published ghcr.io/${{ github.repository_owner }}/portal:latest"
