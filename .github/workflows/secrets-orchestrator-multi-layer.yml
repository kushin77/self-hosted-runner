name: 🔐 Secrets Orchestrator - Multi-Layer Primary

# Event-driven secret management replacing all polling
# Layers: Primary (GSM) → Secondary (Vault) → Tertiary (KMS)
# Principle: Ephemeral, immutable, idempotent, hands-off, event-driven

on:
  # Trigger only on real secret changes in GSM
  workflow_dispatch:
    inputs:
      rotation_trigger:
        description: 'Trigger source: manual, schedule, gsm-change, vault-change'
        required: false
        default: 'manual'

  # Don't use polling - use repository_dispatch for events
  repository_dispatch:
    types:
      - secret-rotation-required
      - gsm-change-detected
      - vault-update-needed
      - kms-key-rotation

permissions:
  contents: read
  id-token: write
  issues: write
  actions: write

env:
  # Primary layer: Google Secret Manager
  GCP_PROJECT_ID: ${{ steps.cred_gcp_project_id.outputs.credential }}
  GCP_SERVICE_ACCOUNT_EMAIL: ${{ steps.cred_gcp_service_account_email.outputs.credential }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ steps.cred_gcp_workload_identity_provider.outputs.credential }}

  # Secondary layer: HashiCorp Vault
  VAULT_ADDR: ${{ secrets.VAULT_ADDR || 'https://vault.example.com' }}
  VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE || 'admin' }}

  # Tertiary layer: AWS KMS
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  AWS_KMS_KEY_ID: ${{ steps.cred_aws_kms_key_id.outputs.credential }}

jobs:
  orchestrate:
    name: Multi-Layer Secret Orchestration
    runs-on: ubuntu-latest
    timeout-minutes: 30

    outputs:
      orchestration_id: ${{ steps.init.outputs.orchestration_id }}
      layers_synced: ${{ steps.validate.outputs.layers_synced }}
      status: ${{ steps.finalize.outputs.status }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize orchestration context
        id: init
      - name: Get Credential [AWS_KMS_KEY_ID]
        id: cred_aws_kms_key_id
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: AWS_KMS_KEY_ID
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [AWS_ROLE_TO_ASSUME]
        id: cred_aws_role_to_assume
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: AWS_ROLE_TO_ASSUME
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_PROJECT_ID]
        id: cred_gcp_project_id
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_PROJECT_ID
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_SERVICE_ACCOUNT_EMAIL]
        id: cred_gcp_service_account_email
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_SERVICE_ACCOUNT_EMAIL
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_WORKLOAD_IDENTITY_PROVIDER]
        id: cred_gcp_workload_identity_provider
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_WORKLOAD_IDENTITY_PROVIDER
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

        run: |
          set -euo pipefail
          ORCH_ID="orch-$(date -u +%s)-${RANDOM}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "orchestration_id=$ORCH_ID" >> "$GITHUB_OUTPUT"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"

          echo "🔐 Secrets Orchestrator Starting"
          echo "  ID: $ORCH_ID"
          echo "  Timestamp: $TIMESTAMP"
          echo "  Trigger: ${{ github.event.inputs.rotation_trigger || 'dispatch' }}"

      - name: Authenticate to Google Cloud (Layer 1 - Primary)
        id: gcp_auth
        run: |
          set -euo pipefail

          if [[ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]]; then
            echo "⚠️ GCP_WORKLOAD_IDENTITY_PROVIDER not set, skipping GSM (Layer 1)"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "🔐 Authenticating to GCP (Layer 1 - Primary)..."

          # Create short-lived credential via Workload Identity Federation
          gcloud auth login --cred-file=/tmp/gcp_cred.json 2>&1 || true

          # Generate OIDC token from GitHub
          OIDC_TOKEN=$(curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}?audience=https://iamcredentials.googleapis.com" \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            | jq -r '.token' 2>/dev/null || echo "")

          if [[ -z "$OIDC_TOKEN" ]]; then
            echo "❌ Failed to generate OIDC token"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "✅ GCP authentication successful (ephemeral OIDC token)"
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Sync Layer 1 (GSM) secrets
        id: layer1_gsm
        if: steps.gcp_auth.outputs.available == 'true'
        run: |
          set -euo pipefail

          echo "📦 Layer 1: Google Secret Manager (Primary)"

          # List all secrets in GSM
          gcloud secrets list --project="$GCP_PROJECT_ID" --format=json > /tmp/gsm_secrets.json 2>&1 || {
            echo "⚠️ Cannot access GSM, failover to Layer 2"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 0
          }

          SECRETS_COUNT=$(jq 'length' /tmp/gsm_secrets.json)
          echo "  Found $SECRETS_COUNT secrets in GSM"

          # For each secret, fetch latest version and verify integrity
          SYNCED=0
          FAILED=0

          jq -r '.[].name' /tmp/gsm_secrets.json | while read SECRET_NAME; do
            # Fetch secret value
            SECRET_VALUE=$(gcloud secrets versions access latest \
              --secret="$SECRET_NAME" \
              --project="$GCP_PROJECT_ID" 2>/dev/null || echo "")

            if [[ -z "$SECRET_VALUE" ]]; then
              echo "    ⚠️  Failed to fetch $SECRET_NAME"
              ((FAILED++))
              continue
            fi

            # Store in temp secure location (ephemeral)
            echo "$SECRET_VALUE" > "/tmp/secret_${SECRET_NAME}"
            chmod 600 "/tmp/secret_${SECRET_NAME}"

            echo "    ✅ $SECRET_NAME (ephemeral, auto-cleanup)"
            ((SYNCED++))
          done

          echo "  Result: $SYNCED synced, $FAILED failed"
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "synced=$SYNCED" >> "$GITHUB_OUTPUT"

      - name: Sync Layer 2 (Vault) secrets
        id: layer2_vault
        if: env.VAULT_ADDR != 'https://vault.example.com'
        run: |
          set -euo pipefail

          echo "🔓 Layer 2: HashiCorp Vault (Secondary/Failover)"

          # Verify Vault is accessible
          VAULT_HEALTH=$(curl -sf "$VAULT_ADDR/v1/sys/health" 2>&1 || echo "")

          if [[ -z "$VAULT_HEALTH" ]]; then
            echo "  ⚠️  Vault not accessible, trying Layer 3"
            echo "status=unavailable" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "  ✅ Vault accessible"

          # Authenticate via GitHub OIDC to Vault
          JWT_TOKEN=$(curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}?audience=vault.example.com" \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            | jq -r '.token' 2>/dev/null || echo "")

          if [[ -z "$JWT_TOKEN" ]]; then
            echo "  ⚠️  Cannot generate Vault JWT"
            echo "status=auth_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Login to Vault
          VAULT_LOGIN=$(curl -sf -X POST "$VAULT_ADDR/v1/auth/jwt/login" \
            -d "{\"role\":\"github-actions\",\"jwt\":\"$JWT_TOKEN\"}" 2>&1 || echo "")

          if [[ -z "$VAULT_LOGIN" ]]; then
            echo "  ⚠️  Vault login failed"
            echo "status=login_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VAULT_TOKEN=$(echo "$VAULT_LOGIN" | jq -r '.auth.client_token // empty')

          if [[ -z "$VAULT_TOKEN" ]]; then
            echo "  ⚠️  No token from Vault"
            echo "status=no_token" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "  ✅ Authenticated to Vault (ephemeral JWT, auto-revoke)"
          echo "status=success" >> "$GITHUB_OUTPUT"
          echo "token_acquired=true" >> "$GITHUB_OUTPUT"

      - name: Sync Layer 3 (AWS KMS) secrets
        id: layer3_kms
        run: |
          set -euo pipefail

          echo "🔑 Layer 3: AWS KMS (Tertiary/Backup Encryption)"

          if [[ -z "$AWS_KMS_KEY_ID" ]]; then
            echo "  ⚠️  AWS_KMS_KEY_ID not configured"
            echo "status=not_configured" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Verify AWS credentials via OIDC
          CREDENTIALS=$(aws sts assume-role-with-web-identity \
            --role-arn "$(echo ${{ steps.cred_aws_role_to_assume.outputs.credential }} | cut -d' ' -f1)" \
            --role-session-name "github-secrets-orch-$$" \
            --web-identity-token "$(curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}?audience=https://iam.amazonaws.com/" \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              | jq -r '.token')" \
            2>&1 || echo "")

          if [[ -z "$CREDENTIALS" ]]; then
            echo "  ⚠️  AWS authentication failed"
            echo "status=auth_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "  ✅ AWS KMS accessible (ephemeral STS credentials)"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Validate layer sync consensus
        id: validate
        run: |
          set -euo pipefail

          echo "✅ Validating Multi-Layer Consensus"

          LAYER1_STATUS="${{ steps.layer1_gsm.outputs.status }}"
          LAYER2_STATUS="${{ steps.layer2_vault.outputs.status }}"
          LAYER3_STATUS="${{ steps.layer3_kms.outputs.status }}"

          if [[ "$LAYER1_STATUS" == "success" ]]; then
            echo "  ✅ Layer 1 (GSM) - PRIMARY active"
            PRIMARY="GSM"
          elif [[ "$LAYER2_STATUS" == "success" ]]; then
            echo "  ⚠️  Layer 2 (Vault) - Secondary active (Layer 1 down)"
            PRIMARY="Vault"
          elif [[ "$LAYER3_STATUS" == "success" ]]; then
            echo "  ⚠️  Layer 3 (KMS) - Tertiary active (Layers 1-2 down)"
            PRIMARY="KMS"
          else
            echo "  ❌ All layers unavailable"
            PRIMARY="NONE"
            exit 1
          fi

          echo "layers_synced=$PRIMARY" >> "$GITHUB_OUTPUT"
          echo "consensus=active" >> "$GITHUB_OUTPUT"

      - name: Sync GitHub Actions Secrets (ephemeral only)
        id: github_sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "📤 Syncing to GitHub Actions Repository Secrets"
          echo "  Note: These are ephemeral and only live for workflow execution"

          # Don't actually set secrets yet - just verify capability
          # In production, this would conditionally set based on Layer 1-3 status

          REPO="${{ github.repository }}"
          echo "  Repository: $REPO"
          echo "  Synced: 0 (validation only)"
          echo "status=validated" >> "$GITHUB_OUTPUT"

      - name: Create immutable audit record (GitHub Issue)
        id: audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: always()
        run: |
          set -euo pipefail

          ORCH_ID="${{ steps.init.outputs.orchestration_id }}"
          TIMESTAMP="${{ steps.init.outputs.timestamp }}"
          STATUS="${{ job.status }}"

          # Create immutable audit issue (simple format to avoid YAML parsing issues)
          BODY="Secrets Orchestration Audit: orchestration_id=${ORCH_ID}, timestamp=${TIMESTAMP}, status=${STATUS}"

          # Create issue label if needed
          gh label create "audit/secrets-orchestration" \
            --repo "${{ github.repository }}" \
            --description "Immutable audit trail for secret rotations" \
            --color "FF0000" 2>/dev/null || true

          # Create the audit issue (immutable record)
          ISSUE_NUM=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "🔐 Audit: Secrets Orchestration $ORCH_ID" \
            --body "$BODY" \
            --label "audit/secrets-orchestration" \
            --label "security" \
            --label "automation" \
            --json number \
            -q '.number' 2>/dev/null || echo "0")

          echo "audit_issue=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
          echo "  Immutable audit record: Issue #$ISSUE_NUM"

      - name: Finalize orchestration
        id: finalize
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          LAYERS_STATUS="${{ steps.validate.outputs.layers_synced }}"
          AUDIT_ISSUE="${{ steps.audit.outputs.audit_issue }}"

          # Clean up any temp files (ephemeral principle)
          rm -f /tmp/secret_* /tmp/gsm_secrets.json /tmp/gcp_cred.json 2>/dev/null || true

          # Unset any sensitive env vars

          if [[ "$LAYERS_STATUS" != "NONE" ]]; then
            echo "✅ Orchestration Complete"
            echo "  Primary Layer: $LAYERS_STATUS"
            echo "  Audit Issue: #$AUDIT_ISSUE"
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "❌ Orchestration Failed - All Layers Unavailable"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  # Notify about orchestration result
  notify-orchestration:
    name: Notify Orchestration Result
    needs: orchestrate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report Status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS="${{ needs.orchestrate.result }}"
          ORCH_ID="${{ needs.orchestrate.outputs.orchestration_id }}"
          LAYERS="${{ needs.orchestrate.outputs.layers_synced }}"

          if [[ "$STATUS" == "success" ]]; then
            echo "✅ Multi-Layer Secrets Orchestration Succeeded"
            echo "  ID: $ORCH_ID"
            echo "  Primary: $LAYERS"
          else
            echo "❌ Multi-Layer Secrets Orchestration Failed"
            echo "  ID: $ORCH_ID"
            # Create incident issue for failed orchestration
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "🚨 Secrets Orchestration Failure: $ORCH_ID" \
              --body "Secrets orchestration failed. See run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --label "security" \
              --label "incident" 2>/dev/null || true
          fi
