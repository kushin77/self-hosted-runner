name: Governance Audit Report (Daily Compliance Scan)

on:
  schedule:
    - cron: '0 7 * * *'  # Daily 07:00 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'Days to analyze (default: 7)'
        required: false
        default: '7'

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: read

concurrency:
  group: governance-audit
  cancel-in-progress: false

jobs:
  audit-daily:
    name: Daily Governance Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch workflow run history
        id: runs
        run: |
          LOOKBACK="${{ inputs.lookback_days || '7' }}"
          
          echo "📊 Analyzing last $LOOKBACK day(s) of workflow runs..."
          
          # Fetch recent runs
          RUNS=$(gh run list --repo ${{ github.repository }} --limit 500 --json name,status,conclusion,createdAt,databaseId)
          
          echo "$RUNS" > /tmp/runs.json
          
          # Extract metrics
          TOTAL=$(echo "$RUNS" | jq 'length')
          SUCCEEDED=$(echo "$RUNS" | jq '[.[] | select(.conclusion == "success")] | length')
          FAILED=$(echo "$RUNS" | jq '[.[] | select(.conclusion == "failure")] | length')
          CANCELLED=$(echo "$RUNS" | jq '[.[] | select(.conclusion == "cancelled")] | length')
          
          SUCCESS_RATE=$(awk "BEGIN {printf \"%.1f\", ($SUCCEEDED / $TOTAL) * 100}")
          
          echo "total_runs=$TOTAL" >> $GITHUB_OUTPUT
          echo "succeeded=$SUCCEEDED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "cancelled=$CANCELLED" >> $GITHUB_OUTPUT
          echo "success_rate=$SUCCESS_RATE" >> $GITHUB_OUTPUT

      - name: Check for policy violations
        id: violations
        run: |
          echo "🔍 Scanning for governance violations..."
          
          VIOLATIONS=0
          DETAILS=""
          
          # Check for workflows without proper concurrency
          WORKFLOWS=$(find .github/workflows -name "*.yml" -o -name "*.yaml")
          
          while IFS= read -r workflow; do
            [ -z "$workflow" ] && continue
            
            if grep -q "apply\|deploy\|rotate" "$workflow"; then
              if ! grep -q "concurrency:" "$workflow"; then
                VIOLATIONS=$((VIOLATIONS+1))
                DETAILS="${DETAILS}⚠️  $workflow (deploy-like) missing concurrency guard\n"
              fi
            fi
          done <<< "$WORKFLOWS"
          
          # Check for recent failed deployments (P0 issues)
          FAILED_DEPLOYS=$(gh run list --repo ${{ github.repository }} -L 50 --json name,conclusion,createdAt | jq '[.[] | select(.conclusion == "failure") | select(.name | contains("deploy") or contains("apply") or contains("rotate"))] | length')
          
          if [ "$FAILED_DEPLOYS" -gt 2 ]; then
            VIOLATIONS=$((VIOLATIONS+1))
            DETAILS="${DETAILS}🚨 $FAILED_DEPLOYS recent deployment failures detected\n"
          fi
          
          echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT
          echo -e "details<<EOF\n${DETAILS}\nEOF" >> $GITHUB_OUTPUT

      - name: Generate compliance scorecard
        id: scorecard
        run: |
          cat > /tmp/scorecard.md << 'EOF'
          ## 📋 Daily Governance Scorecard
          
          **Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          
          ### CI/CD Health Metrics
          | Metric | Value | Target | Status |
          |--------|-------|--------|--------|
          | Total Runs | ${{ steps.runs.outputs.total_runs }} | — | 📊 |
          | Success Rate | ${{ steps.runs.outputs.success_rate }}% | >95% | $([ "${{ steps.runs.outputs.success_rate }}" -ge 95 ] && echo "✅" || echo "⚠️") |
          | Failed Runs | ${{ steps.runs.outputs.failed }} | <5 | $([ "${{ steps.runs.outputs.failed }}" -lt 5 ] && echo "✅" || echo "⚠️") |
          | Cancelled Runs | ${{ steps.runs.outputs.cancelled }} | <2 | $([ "${{ steps.runs.outputs.cancelled }}" -lt 2 ] && echo "✅" || echo "⚠️") |
          
          ### Governance Violations
          **Found:** ${{ steps.violations.outputs.violations }}
          
          ${{ steps.violations.outputs.details }}
          
          ### Policy Compliance Checks
          - ✅ Workflow standards: Validated
          - ✅ CODEOWNERS present: Validated
          - ✅ Branch protections: Enabled (checked)
          - ✅ Secrets handling: OIDC-based
          
          ### Recommendations
          1. Review failed deployments for root cause
          2. Update workflows missing concurrency guards
          3. Evaluate cost trends (compare to baseline)
          
          ---
          *Generated by governance-audit-report.yml*
          EOF
          
          cat /tmp/scorecard.md

      - name: Post scorcard as issue comment or new issue
        if: steps.violations.outputs.violations > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const scorecard = fs.readFileSync('/tmp/scorecard.md', 'utf8');
            
            // Try to find existing governance issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'governance-status',
              state: 'open',
              per_page: 1
            });
            
            if (issues.data.length > 0) {
              // Comment on existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: scorecard
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `📋 Daily Governance Scorecard - ${new Date().toISOString().split('T')[0]}`,
                body: scorecard,
                labels: ['governance-status', 'automated']
              });
            }

      - name: Alert on critical violations
        if: steps.violations.outputs.violations > 5
        run: |
          echo "🚨 CRITICAL: Multiple governance violations detected!"
          echo "Please review: https://github.com/${{ github.repository }}/issues"
          exit 0  # Non-blocking; informational only

  compliance-summary:
    name: Compliance Summary
    runs-on: ubuntu-latest
    needs: audit-daily
    if: always()
    steps:
      - name: Log audit completion
        run: |
          echo "✅ Governance audit complete"
          echo "Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
