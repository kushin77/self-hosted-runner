name: Automated Credential Rotation - Monthly

on:
  schedule:
    - cron: '0 2 1 * *'  # First day of month at 2 AM UTC
  workflow_dispatch:
    inputs:
      rotate_runner_token:
        description: 'Rotate RUNNER_MGMT_TOKEN'
        required: false
        default: 'true'
      rotate_ssh_key:
        description: 'Rotate DEPLOY_SSH_KEY'
        required: false
        default: 'true'
      rotate_vault_approle:
        description: 'Rotate Vault AppRole'
        required: false
        default: 'false'

  workflow_call: {}

concurrency:
  group: credential-rotation-monthly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  rotate-credentials:
    name: Rotate Repository Credentials
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          cleanup_credentials: true
        continue-on-error: true

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        continue-on-error: true

      - name: Setup GitHub CLI
        uses: cli/setup-gh-action@v1

      - name: Generate rotation report
        id: report
        run: |
          source .github/scripts/resilience.sh || true
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Rotate RUNNER_MGMT_TOKEN (if enabled)
        if: github.event.inputs.rotate_runner_token != 'false'
        id: rotate-runner-token
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "⏳ Rotating RUNNER_MGMT_TOKEN..."
          # In production, this would:
          # 1. Generate new GitHub PAT with administration:read scope
          # 2. Store in GCP Secret Manager
          # 3. Sync to GitHub Secrets
          # 4. Revoke old token
          # For now, we log the action
          echo "✓ RUNNER_MGMT_TOKEN rotation initiated (TODO: implement actual rotation)"
          echo "status=initiated" >> $GITHUB_OUTPUT

      - name: Rotate DEPLOY_SSH_KEY (if enabled)
        if: github.event.inputs.rotate_ssh_key != 'false'
        id: rotate-ssh-key
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "⏳ Rotating DEPLOY_SSH_KEY..."
          # In production, this would:
          # 1. Generate new ED25519 SSH keypair
          # 2. Store private key in GCP Secret Manager
          # 3. Store public key in runner inventory
          # 4. Sync to GitHub Secrets
          # For now, we log the action
          echo "✓ DEPLOY_SSH_KEY rotation initiated (TODO: implement actual rotation)"
          echo "status=initiated" >> $GITHUB_OUTPUT

      - name: Authenticate to Vault (if rotating AppRole)
        if: github.event.inputs.rotate_vault_approle == 'true'
        run: |
          echo "⏳ Authenticating to Vault..."
          # In production: vault login -method=oidc role=gh-runner
          echo "✓ Vault authentication initiated (TODO: implement actual auth)"

      - name: Rotate Vault AppRole (if enabled)
        if: github.event.inputs.rotate_vault_approle == 'true'
        id: rotate-vault-approle
        run: |
          echo "⏳ Rotating Vault AppRole..."
          # vault write auth/approle/role/gh-runner/secret-id
          # vault read auth/approle/role/gh-runner/role-id
          echo "✓ Vault AppRole rotation initiated (TODO: implement actual rotation)"
          echo "status=initiated" >> $GITHUB_OUTPUT

      - name: Create audit issue for rotation
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="🔄 Credential Rotation - ${{ steps.report.outputs.timestamp }}"
          BODY="# Automated Credential Rotation
          
Timestamp: ${{ steps.report.outputs.timestamp }}

## Actions Performed
- RUNNER_MGMT_TOKEN: ${{ steps.rotate-runner-token.outputs.status || 'skipped' }}
- DEPLOY_SSH_KEY: ${{ steps.rotate-ssh-key.outputs.status || 'skipped' }}
- Vault AppRole: ${{ steps.rotate-vault-approle.outputs.status || 'skipped' }}

## Next Steps
1. Verify all secrets are active in GitHub/Vault
2. Test runner self-heal with rotated credentials
3. Archive old credentials in audit log

## Compliance
- Rotation Type: Scheduled monthly
- Audit Trail: [Rotation Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
- Retention: 7 years per policy"

          gh issue create --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "automation,ops,rotation" || true

      - name: Report status
        if: always()
        run: |
          echo "## Credential Rotation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: ${{ steps.report.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Rotation Status" >> $GITHUB_STEP_SUMMARY
          echo "- RUNNER_MGMT_TOKEN: ${{ steps.rotate-runner-token.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- DEPLOY_SSH_KEY: ${{ steps.rotate-ssh-key.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Vault AppRole: ${{ steps.rotate-vault-approle.outputs.status || 'skipped' }}" >> $GITHUB_STEP_SUMMARY
