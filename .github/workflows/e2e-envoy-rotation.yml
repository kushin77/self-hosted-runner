name: E2E — Envoy cert rotation smoke test

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Kind
        uses: engineerd/setup-kind@v0.9.0
      - name: Load manifests
        run: |
          kubectl apply -f control-plane/envoy/deploy/vault-configmap.yaml
          kubectl apply -f control-plane/envoy/deploy/reload-configmap.yaml
          kubectl apply -f control-plane/envoy/deploy/envoy-deployment.yaml
      - name: Wait for envoy pod
        run: |
          kubectl wait --for=condition=available deployment/control-plane-envoy --timeout=120s || true
      - name: Smoke test TLS (placeholder)
        run: |
          POD=$(kubectl get pods -l app=control-plane-envoy -o jsonpath='{.items[0].metadata.name}')
          kubectl exec "$POD" -- curl -sS http://127.0.0.1:9901/ready || true
      - name: Simulate cert refresh
        run: |
          POD=$(kubectl get pods -l app=control-plane-envoy -o jsonpath='{.items[0].metadata.name}')
          kubectl exec "$POD" -- sh -c "date > /etc/envoy/tls/server.crt"
          sleep 5
      - name: Verify reload triggered
        run: |
          # This is a basic check; more robust validations should be added in follow-ups
          echo "Check logs for envoy reload events"
          kubectl logs -l app=control-plane-envoy --tail=50 || true
