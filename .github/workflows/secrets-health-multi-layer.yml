name: 🏥 Secrets Multi-Layer Health Check

# Replaces all polling-based health checks
# Verifies all three layers (GSM, Vault, KMS) are operational
# Auto-triggers orchestration if health check fails
# Principle: Event-driven remediation

on:
  schedule:
    # Single health check replaces multiple polling workflows
    - cron: '*/15 * * * *'  # Every 15 minutes
  
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Verbose logging'
        required: false
        default: 'false'

permissions:
  id-token: write
  issues: write
  actions: write

concurrency:
  group: secrets-health-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  AWS_KMS_KEY_ID: ${{ secrets.AWS_KMS_KEY_ID }}

jobs:
  health-check:
    name: Multi-Layer Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    outputs:
      health_status: ${{ steps.summary.outputs.health_status }}
      layers_healthy: ${{ steps.summary.outputs.layers_healthy }}
      primary_layer: ${{ steps.summary.outputs.primary_layer }}
    
    steps:
      - name: Initialize
        id: init
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          echo "🏥 Health Check: $TIMESTAMP"

      - name: Layer 1 (GSM) - Primary Health Check
        id: layer1_health
        run: |
          set -euo pipefail
          
          echo "Checking Layer 1: Google Secret Manager (Primary)"
          
          if [[ -z "$GCP_PROJECT_ID" || -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]]; then
            echo "  ⚠️  GCP not configured"
            echo "status=not_configured" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # Attempt ephemeral OIDC auth first (recommended)
          OIDC_TOKEN=""
          OIDC_AVAILABLE=false
          
          for i in 1 2 3; do
            RESP=$(curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}?audience=https://iamcredentials.googleapis.com" \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" 2>/dev/null || true)
            if [[ -n "$RESP" ]]; then
              TOK=$(echo "$RESP" | jq -r '.token // empty' 2>/dev/null || echo "")
              if [[ -n "$TOK" ]]; then
                OIDC_TOKEN="$TOK"
                OIDC_AVAILABLE=true
                echo "  ✅ OIDC id-token obtained (ephemeral)"
                break
              fi
            fi
            sleep $((i * 2))
          done
          
          if [[ "$OIDC_AVAILABLE" == "false" ]]; then
            echo "  ⚠️  OIDC id-token not available; attempting fallback to ADC"
          fi
          
          # Quick GSM connectivity check (try both ephemeral OIDC and ADC fallback)
          if [[ "$OIDC_AVAILABLE" == "true" ]]; then
            gcloud auth login --cred-file=/tmp/wif_cred.json 2>&1 || {
              echo "  ❌ GCP OIDC authentication failed"
              echo "status=auth_failed" >> "$GITHUB_OUTPUT"
              exit 0
            }
          else
            # Try ADC (Application Default Credentials) if available
            gcloud auth application-default print-access-token >/dev/null 2>&1 || {
              echo "  ❌ GCP authentication not available (no ADC, no OIDC)"
              echo "status=auth_failed" >> "$GITHUB_OUTPUT"
              exit 0
            }
          fi
          
          # List secrets to verify access
          SECRETS=$(gcloud secrets list --project="$GCP_PROJECT_ID" --limit=1 2>&1)
          
          if [[ $? -eq 0 ]]; then
            echo "  ✅ GSM Healthy (Primary)"
            echo "status=healthy" >> "$GITHUB_OUTPUT"
          else
            echo "  ❌ GSM access failed"
            echo "status=unhealthy" >> "$GITHUB_OUTPUT"
          fi

      - name: Layer 2 (Vault) - Secondary Health Check
        id: layer2_health
        run: |
          set -euo pipefail
          
          echo "Checking Layer 2: HashiCorp Vault (Secondary)"
          
          if [[ -z "$VAULT_ADDR" ]]; then
            echo "  ⚠️  Vault not configured"
            echo "status=not_configured" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # Check Vault health endpoint (no auth required)
          # Defensive Vault health check with parse guard and retries
          VAULT_HEALTH=""
          for i in 1 2 3; do
            VAULT_HEALTH=$(curl -sf "$VAULT_ADDR/v1/sys/health" 2>/dev/null || true)
            if [[ -n "$VAULT_HEALTH" ]]; then
              # confirm it's valid JSON before jq
              echo "$VAULT_HEALTH" | jq . >/dev/null 2>&1 && break || VAULT_HEALTH=""
            fi
            sleep $((i * 2))
          done

          if [[ -n "$VAULT_HEALTH" ]]; then
            SEALED=$(echo "$VAULT_HEALTH" | jq -r '.sealed // true')
            if [[ "$SEALED" == "false" ]]; then
              echo "  ✅ Vault Healthy (Secondary, unsealed)"
              echo "status=healthy" >> "$GITHUB_OUTPUT"
            else
              echo "  ⚠️  Vault sealed (requires unsealing)"
              echo "status=sealed" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "  ❌ Vault unavailable or returned non-JSON"
            echo "status=unavailable" >> "$GITHUB_OUTPUT"
          fi

      - name: Layer 3 (KMS) - Tertiary Health Check
        id: layer3_health
        run: |
          set -euo pipefail
          
          echo "Checking Layer 3: AWS KMS (Tertiary)"
          
          if [[ -z "$AWS_KMS_KEY_ID" ]]; then
            echo "  ⚠️  KMS not configured"
            echo "status=not_configured" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # Attempt ephemeral OIDC-based AWS auth first (recommended)
          # If OIDC not available, fall back to environment AWS credentials
          AWS_CALLER=""
          OIDC_AWS_AVAILABLE=false
          
          # Try OIDC-based AWS auth via web identity token exchange (if OIDC available)
          if [[ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]]; then
            OIDC_RESP=$(curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}?audience=https://sts.amazonaws.com" \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" 2>/dev/null || true)
            OIDC_TOKEN=$(echo "$OIDC_RESP" | jq -r '.token // empty' 2>/dev/null || echo "")
            
            if [[ -n "$OIDC_TOKEN" ]]; then
              OIDC_AWS_AVAILABLE=true
              echo "  ✅ AWS OIDC id-token obtained"
            fi
          fi
          
          # Try to get AWS caller identity (via OIDC or environment credentials)
          for i in 1 2 3; do
            RESP=$(aws sts get-caller-identity --output json 2>/dev/null || true)
            if [[ -n "$RESP" ]]; then
              ARN=$(echo "$RESP" | jq -r '.Arn // empty' 2>/dev/null || echo "")
              if [[ -n "$ARN" ]]; then
                AWS_CALLER="$ARN"
                AUTH_METHOD="environment"
                if [[ "$OIDC_AWS_AVAILABLE" == "true" ]]; then
                  AUTH_METHOD="OIDC"
                fi
                echo "  ✅ AWS auth successful ($AUTH_METHOD)"
                break
              fi
            fi
            sleep $((i * 2))
          done

          if [[ -n "$AWS_CALLER" ]]; then
            echo "  ✅ KMS Healthy (Tertiary)"
            echo "status=healthy" >> "$GITHUB_OUTPUT"
          else
            echo "  ❌ KMS access failed or returned non-JSON"
            echo "status=unhealthy" >> "$GITHUB_OUTPUT"
          fi

      - name: Analyze health status
        id: summary
        run: |
          set -euo pipefail
          
          LAYER1="${{ steps.layer1_health.outputs.status }}"
          LAYER2="${{ steps.layer2_health.outputs.status }}"
          LAYER3="${{ steps.layer3_health.outputs.status }}"
          
          echo "📊 Health Summary:"
          echo "  Layer 1 (GSM): $LAYER1"
          echo "  Layer 2 (Vault): $LAYER2"
          echo "  Layer 3 (KMS): $LAYER3"
          
          # Determine primary layer using only configured layers
          PRIMARY="NONE"
          HEALTH="unhealthy"

          # Count configured layers and unhealthy configured layers
          CONFIGURED=0
          UNHEALTHY_CONFIGURED=0

          if [[ "$LAYER1" != "not_configured" ]]; then
            CONFIGURED=$((CONFIGURED + 1))
            if [[ "$LAYER1" == "healthy" ]]; then
              PRIMARY="GSM"
              HEALTH="healthy"
            else
              UNHEALTHY_CONFIGURED=$((UNHEALTHY_CONFIGURED + 1))
            fi
          fi

          if [[ "$LAYER2" != "not_configured" ]]; then
            CONFIGURED=$((CONFIGURED + 1))
            if [[ "$LAYER2" == "healthy" && "$PRIMARY" == "NONE" ]]; then
              PRIMARY="Vault"
              HEALTH="degraded"
            elif [[ "$LAYER2" != "healthy" ]]; then
              UNHEALTHY_CONFIGURED=$((UNHEALTHY_CONFIGURED + 1))
            fi
          fi

          if [[ "$LAYER3" != "not_configured" ]]; then
            CONFIGURED=$((CONFIGURED + 1))
            if [[ "$LAYER3" == "healthy" && "$PRIMARY" == "NONE" ]]; then
              PRIMARY="KMS"
              HEALTH="critically-degraded"
            elif [[ "$LAYER3" != "healthy" ]]; then
              UNHEALTHY_CONFIGURED=$((UNHEALTHY_CONFIGURED + 1))
            fi
          fi

          # If no layers configured, consider health as healthy (no-op environment)
          if [[ $CONFIGURED -eq 0 ]]; then
            PRIMARY="NONE"
            HEALTH="healthy"
          else
            if [[ $UNHEALTHY_CONFIGURED -eq 0 ]]; then
              # at least one configured layer healthy
              :
            elif [[ $UNHEALTHY_CONFIGURED -eq $CONFIGURED ]]; then
              HEALTH="unhealthy"
            else
              HEALTH="degraded"
            fi
          fi
          
          echo "  Primary: $PRIMARY"
          echo "  Health: $HEALTH"
          
          echo "health_status=$HEALTH" >> "$GITHUB_OUTPUT"
          echo "layers_healthy=$PRIMARY" >> "$GITHUB_OUTPUT"
          echo "primary_layer=$PRIMARY" >> "$GITHUB_OUTPUT"

      - name: Trigger remediation if unhealthy
        id: remediation
        if: steps.summary.outputs.health_status != 'healthy'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          HEALTH="${{ steps.summary.outputs.health_status }}"
          
          if [[ "$HEALTH" == "unhealthy" ]]; then
            echo "🚨 CRITICAL: All layers unhealthy"
            
            # Create incident issue
            gh issue create \
              --repo "${{ github.repository }}" \
              --title "🚨 CRITICAL: All Secret Layers Unhealthy" \
              --body "All three secret management layers (GSM, Vault, KMS) are unavailable. Immediate action required. See: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --label "security" \
              --label "incident" \
              --label "critical" 2>/dev/null || true
            
            exit 1
          else
            echo "⚠️  Degraded health detected, triggering orchestration"
            
            # Trigger orchestration to sync and validate
            gh workflow run secrets-event-dispatcher.yml \
              --repo "${{ github.repository }}" \
              --ref main \
              -f event_type="health-check:$HEALTH" \
              2>/dev/null || true
          fi

      - name: Generate operator documentation (à la carte)
        id: docs_gen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          HEALTH="${{ steps.summary.outputs.health_status }}"
          PRIMARY="${{ steps.summary.outputs.primary_layer }}"
          LAYER1="${{ steps.layer1_health.outputs.status }}"
          LAYER2="${{ steps.layer2_health.outputs.status }}"
          LAYER3="${{ steps.layer3_health.outputs.status }}"
          TIMESTAMP="${{ steps.init.outputs.timestamp }}"
          RUN_ID="${{ github.run_id }}"
          
          # Generate dynamically formatted operator guide based on health status
          cat > /tmp/operator_guide.md << 'GUIDE_EOF'
          # 📋 Operator Quick Reference — Auto-Generated
          
          **Generated**: '$TIMESTAMP'  
          **Run**: https://github.com/${{ github.repository }}/actions/runs/$RUN_ID  
          **Health Status**: **$HEALTH**  
          **Primary Layer**: **$PRIMARY**
          
          ## 🏥 Health Check Summary
          
          | Layer | Status | Details |
          |-------|--------|---------|
          | Layer 1 (GSM) | $LAYER1 | Google Secret Manager (Primary) |
          | Layer 2 (Vault) | $LAYER2 | HashiCorp Vault (Secondary) |
          | Layer 3 (KMS) | $LAYER3 | AWS KMS (Tertiary) |
          
          ## 🎯 Recommended Actions
          
          GUIDE_EOF
          
          # Append action recommendations based on health status
          if [[ "$HEALTH" == "healthy" ]]; then
            cat >> /tmp/operator_guide.md << 'GUIDE_EOF'
          ✅ **All Systems Operational**
          
          - System is functioning normally
          - All configured layers are accessible
          - No immediate action required
          - Continue monitoring via scheduled health checks
          
          **Next Steps**:
          1. Review detailed logs: https://github.com/${{ github.repository }}/actions/runs/$RUN_ID
          2. Monitor for any degradation
          3. Check incident issues (should auto-close)
          
          GUIDE_EOF
          elif [[ "$HEALTH" == "degraded" ]]; then
            cat >> /tmp/operator_guide.md << 'GUIDE_EOF'
          ⚠️ **Partial Service Degradation**
          
          - At least one layer is functional
          - Some redundancy lost
          - System continues operating on primary layer
          - Investigate non-functional layers
          
          **Next Steps**:
          1. Review failing layer diagnostics below
          2. Check cloud provider dashboards
          3. Verify credentials still valid
          4. Run: \`bash scripts/remediate-secrets-interactive.sh\`
          5. View full logs: https://github.com/${{ github.repository }}/actions/runs/$RUN_ID
          
          GUIDE_EOF
          else
            cat >> /tmp/operator_guide.md << 'GUIDE_EOF'
          🚨 **Critical System Failure**
          
          - All secret layers unavailable
          - System cannot authenticate
          - **Immediate action required**
          
          **Urgent Steps**:
          1. **Check credentials** — Verify all cloud provider credentials are set:
             - GCP_PROJECT_ID
             - GCP_WORKLOAD_IDENTITY_PROVIDER
             - VAULT_ADDR (if Vault enabled)
             - AWS_KMS_KEY_ID (if KMS enabled)
          2. **Verify cloud services** — Check if GCP, Vault, AWS are operational
          3. **Run diagnostics** — \`bash scripts/remediate-secrets-interactive.sh\`
          4. **Contact on-call** — Escalate if services are down
          5. See full logs: https://github.com/${{ github.repository }}/actions/runs/$RUN_ID
          
          GUIDE_EOF
          fi
          
          # Add layer-specific diagnostics
          cat >> /tmp/operator_guide.md << 'GUIDE_EOF'
          
          ## 🔍 Layer-Specific Diagnostics
          
          ### Layer 1: Google Secret Manager (Primary)
          GUIDE_EOF
          
          if [[ "$LAYER1" == "not_configured" ]]; then
            echo "- **Status**: Not Configured" >> /tmp/operator_guide.md
            echo "- **Action**: Set GCP_PROJECT_ID and GCP_WORKLOAD_IDENTITY_PROVIDER secrets" >> /tmp/operator_guide.md
          elif [[ "$LAYER1" == "healthy" ]]; then
            echo "- **Status**: ✅ Healthy" >> /tmp/operator_guide.md
            echo "- **Details**: OIDC or ADC authentication successful, Secret Manager accessible" >> /tmp/operator_guide.md
          else
            echo "- **Status**: ❌ $LAYER1" >> /tmp/operator_guide.md
            echo "- **Action**: Verify GCP credentials, check OIDC provider, review ADC setup" >> /tmp/operator_guide.md
          fi
          
          cat >> /tmp/operator_guide.md << 'GUIDE_EOF'
          
          ### Layer 2: HashiCorp Vault (Secondary)
          GUIDE_EOF
          
          if [[ "$LAYER2" == "not_configured" ]]; then
            echo "- **Status**: Not Configured (optional)" >> /tmp/operator_guide.md
            echo "- **Action**: To enable, set VAULT_ADDR secret" >> /tmp/operator_guide.md
          elif [[ "$LAYER2" == "healthy" ]]; then
            echo "- **Status**: ✅ Healthy (Unsealed)" >> /tmp/operator_guide.md
            echo "- **Details**: Vault is accessible and unsealed" >> /tmp/operator_guide.md
          elif [[ "$LAYER2" == "sealed" ]]; then
            echo "- **Status**: ⚠️ Sealed" >> /tmp/operator_guide.md
            echo "- **Action**: Unseal Vault using unseal keys" >> /tmp/operator_guide.md
          else
            echo "- **Status**: ❌ $LAYER2" >> /tmp/operator_guide.md
            echo "- **Action**: Verify VAULT_ADDR is correct, check network connectivity, verify Vault is running" >> /tmp/operator_guide.md
          fi
          
          cat >> /tmp/operator_guide.md << 'GUIDE_EOF'
          
          ### Layer 3: AWS KMS (Tertiary)
          GUIDE_EOF
          
          if [[ "$LAYER3" == "not_configured" ]]; then
            echo "- **Status**: Not Configured (optional)" >> /tmp/operator_guide.md
            echo "- **Action**: To enable, set AWS_KMS_KEY_ID secret" >> /tmp/operator_guide.md
          elif [[ "$LAYER3" == "healthy" ]]; then
            echo "- **Status**: ✅ Healthy" >> /tmp/operator_guide.md
            echo "- **Details**: AWS STS can verify caller identity, KMS accessible" >> /tmp/operator_guide.md
          else
            echo "- **Status**: ❌ $LAYER3" >> /tmp/operator_guide.md
            echo "- **Action**: Verify AWS credentials, check OIDC provider setup, verify KMS key permissions" >> /tmp/operator_guide.md
          fi
          
          cat >> /tmp/operator_guide.md << 'GUIDE_EOF'
          
          ## 📚 References & Tools
          
          - **Quick Start**: [QUICK_START_DEPLOYMENT.md](./QUICK_START_DEPLOYMENT.md)
          - **Full Operator Guide**: [OPERATOR_FINAL_GUIDE.md](./OPERATOR_FINAL_GUIDE.md)
          - **Troubleshooting**: [RCA_MULTI_LAYER_HEALTH_CHECK_FAILURES.md](./RCA_MULTI_LAYER_HEALTH_CHECK_FAILURES.md)
          - **Secrets Rotation**: [CROSS_CLOUD_CREDENTIAL_ROTATION.md](./CROSS_CLOUD_CREDENTIAL_ROTATION.md)
          
          ### Run Commands
          
          \`\`\`bash
          # Interactive remediation
          bash scripts/remediate-secrets-interactive.sh
          
          # View full workflow logs
          gh run view $RUN_ID -R ${{ github.repository }} --log
          
          # Monitor next health check
          gh run watch -R ${{ github.repository }}
          \`\`\`
          
          ---
          
          **Last Updated**: $TIMESTAMP  
          **Run ID**: $RUN_ID  
          **Auto-Generated**: Yes (immutable record)
          GUIDE_EOF
          
          echo "docs_generated=true" >> "$GITHUB_OUTPUT"

      - name: Post documentation to deployment issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.docs_gen.outputs.docs_generated == 'true'
        run: |
          set -euo pipefail
          
          HEALTH="${{ steps.summary.outputs.health_status }}"
          RUN_ID="${{ github.run_id }}"
          
          # Find or create deployment tracking issue
          ISSUE=$(gh issue list -R "${{ github.repository }}" --label "production" --label "deployment" --state open --limit 1 --json number --jq '.[0].number' 2>/dev/null || echo "")
          
          if [[ -z "$ISSUE" ]]; then
            # Create new deployment tracker if doesn't exist
            ISSUE=$(gh issue create \
              -R "${{ github.repository }}" \
              --title "📊 Deployment Health Tracking" \
              --body "Auto-generated deployment health tracker. Health checks post updates here." \
              --label "production" \
              --label "deployment" \
              --json number \
              --jq '.number' 2>/dev/null || echo "")
          fi
          
          if [[ -n "$ISSUE" ]]; then
            # Post health check results as comment
            gh issue comment "$ISSUE" \
              -R "${{ github.repository }}" \
              --body-file /tmp/operator_guide.md 2>/dev/null || true
          fi

      - name: Record health metric (immutable)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: github.event.inputs.verbose == 'true' || steps.summary.outputs.health_status != 'healthy'
        run: |
          HEALTH="${{ steps.summary.outputs.health_status }}"
          PRIMARY="${{ steps.summary.outputs.primary_layer }}"
          TIMESTAMP="${{ steps.init.outputs.timestamp }}"
          
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "📊 Health Metric: $HEALTH ($PRIMARY)" \
            --body "Timestamp: $TIMESTAMP\nStatus: $HEALTH\nPrimary: $PRIMARY\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "monitoring" \
            --label "health-check" 2>/dev/null || true
