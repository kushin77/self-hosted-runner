name: Store leaked Slack app credentials to GCP Secret Manager and remove file

on:
  workflow_dispatch:
  workflow_call: {}

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  store-and-remove:
    runs-on: ubuntu-latest
    env:
      FILE_PATH: .github/workflows/tmp
      GSM_SECRET_NAME: slack-app-credentials
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch Ephemeral Credentials
        uses: kushin77/get-ephemeral-credential@v1
        id: creds
        with:
          credential-names: |
            GCP_PROJECT_ID
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT_EMAIL
          retrieve-from: 'auto'
          audit-log: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.creds.outputs.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ steps.creds.outputs.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.creds.outputs.GCP_PROJECT_ID }}

      - name: Verify file exists
        run: |
          if [[ ! -f "$FILE_PATH" ]]; then
            echo "File $FILE_PATH does not exist; nothing to do.";
            exit 0;
          fi

      - name: Create or update GSM secret
        env:
          GCP_PROJECT_ID: ${{ steps.creds.outputs.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          if gcloud secrets describe "$GSM_SECRET_NAME" --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
            echo "Secret exists; adding new version"
            gcloud secrets versions add "$GSM_SECRET_NAME" --data-file="$FILE_PATH" --project="$GCP_PROJECT_ID"
          else
            echo "Creating secret $GSM_SECRET_NAME"
            gcloud secrets create "$GSM_SECRET_NAME" --replication-policy="automatic" --project="$GCP_PROJECT_ID"
            gcloud secrets versions add "$GSM_SECRET_NAME" --data-file="$FILE_PATH" --project="$GCP_PROJECT_ID"
          fi

      - name: Create branch and remove the leaked file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH=chore/remove-leaked-slack-creds-${{ github.run_id }}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git rm -f "$FILE_PATH" || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: remove leaked Slack app credentials and store in GSM"
            git push --set-upstream origin "$BRANCH"
            gh pr create --title "chore: remove leaked Slack app credentials" --body "Automated removal of leaked Slack app credentials stored in GSM." --base main --head "$BRANCH"
          fi
