name: E2E Validate & Hands-off Deploy

on:
  workflow_dispatch:
    inputs:
      run_deploy:
        description: 'If true, dispatch the hands-off deploy when validation passes'
        required: false
        default: 'true'
  workflow_run:
    workflows: ['Auto-Bootstrap Vault AppRole & Secrets']
    types: [completed]
  schedule:
    - cron: '0 3 * * *'

jobs:
  runner-discovery:
    name: Runner Discovery
    runs-on: ubuntu-latest
    outputs:
      use_hosted: ${{ steps.set.outputs.use_hosted }}
    steps:
      - name: Determine self-hosted runner availability
        id: set
        run: |
          echo "Checking repo runners..."
          ONLINE=$(gh api repos/${{ github.repository }}/actions/runners --jq '.runners[] | select(.status=="online") | select(.labels[]?.name=="self-hosted") | .name' || true)
          if [ -n "$ONLINE" ]; then
            echo "use_hosted=false" >> $GITHUB_OUTPUT
          else
            echo "use_hosted=true" >> $GITHUB_OUTPUT
          fi

  e2e-validate-selfhosted:
    name: End-to-End Validation (Self-hosted MinIO Smoke Test)
    needs: [runner-discovery]
    if: ${{ needs.runner-discovery.outputs.use_hosted == 'false' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') }}
    concurrency:
      group: e2e-validate-selfhosted-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
      actions: write
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure helper scripts are executable
        run: |
          chmod +x scripts/ci/check-secrets.sh || true
          chmod +x scripts/minio/install-mc.sh || true
          chmod +x scripts/minio/upload.sh || true
          chmod +x scripts/minio/download.sh || true

      - name: Validate required secrets (warn if missing)
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: |
          MISSING=""
          [ -z "$MINIO_ENDPOINT" ] && MISSING="MINIO_ENDPOINT"
          [ -z "$MINIO_ACCESS_KEY" ] && MISSING="$MISSING MINIO_ACCESS_KEY"
          [ -z "$MINIO_SECRET_KEY" ] && MISSING="$MISSING MINIO_SECRET_KEY"
          [ -z "$MINIO_BUCKET" ] && MISSING="$MISSING MINIO_BUCKET"
          if [ -n "$MISSING" ]; then
            echo "⚠️ Missing secrets: $MISSING"
            echo "Smoke test will skip MinIO validation. Configure secrets in Settings → Secrets → Actions"
            exit 0
          fi
          echo "✅ All MinIO secrets configured"

      - name: Install mc (MinIO client)
        run: scripts/minio/install-mc.sh || echo "mc install failed; will skip MinIO tests"

      - name: Upload test object to MinIO
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: |
          echo "smoke-test-content-${GITHUB_RUN_ID}" > e2e-smoke.txt
          scripts/minio/upload.sh --file e2e-smoke.txt --bucket ${{ secrets.MINIO_BUCKET }} --object smoke-${GITHUB_RUN_ID}.txt || echo "MinIO upload optional; continuing"

      - name: Download test object from MinIO
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: scripts/minio/download.sh --bucket ${{ secrets.MINIO_BUCKET }} --object smoke-${GITHUB_RUN_ID}.txt --out e2e-downloaded.txt || echo "MinIO download optional; continuing"

      - name: Dispatch hands-off deploy (if secrets configured)
        if: ${{ inputs.run_deploy == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
        run: |
          if [ -z "$MINIO_ENDPOINT" ]; then
            echo "⏭️  Skipping deploy dispatch (secrets not configured). Configure secrets in issue #845."
            exit 0
          fi
          echo "Dispatching deploy-rotation-staging with hands_off=true"
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/${REPO}/actions/workflows/deploy-rotation-staging.yml/dispatches \
            -d '{"ref":"main","inputs":{"hands_off":"true"}}'

  e2e-validate-hosted:
    name: End-to-End Validation (Hosted MinIO Smoke Test)
    needs: [runner-discovery]
    if: ${{ needs.runner-discovery.outputs.use_hosted == 'true' && (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') }}
    concurrency:
      group: e2e-validate-hosted-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure helper scripts are executable
        run: |
          chmod +x scripts/minio/install-mc.sh || true
          chmod +x scripts/minio/upload.sh || true
          chmod +x scripts/minio/download.sh || true

      - name: MinIO smoke test (hosted fallback)
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: |
          if [ -z "${MINIO_ENDPOINT:-}" ]; then
            echo "No MinIO secrets configured; hosted smoke test skipped"
            exit 0
          fi
          ./scripts/minio/install-mc.sh || true
          echo "smoke-test-content-${GITHUB_RUN_ID}" > e2e-smoke.txt
          ./scripts/minio/upload.sh --file e2e-smoke.txt --bucket "$MINIO_BUCKET" --object smoke-${GITHUB_RUN_ID}.txt || true
          ./scripts/minio/download.sh --bucket "$MINIO_BUCKET" --object smoke-${GITHUB_RUN_ID}.txt --out e2e-downloaded.txt || true
