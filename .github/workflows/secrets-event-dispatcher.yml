name: 🔔 Secrets Event Dispatcher (No Polling)

# This workflow replaces all polling-based secret operations
# Principles:
# - Event-driven only (no cron-based polling)
# - Triggered by: manual dispatch, external systems, health check failures
# - Prevents duplicate jobs via concurrency
# - Fully hands-off automation

on:
  workflow_dispatch:
    inputs:
      event_type:
        description: 'Event type'
        required: false
        default: 'manual-check'

permissions:
  actions: write
  repository-events: write
  issues: write

jobs:
  dispatch-secrets-orchestration:
    name: Dispatch Secrets Orchestration
    runs-on: ubuntu-latest

    steps:
      - name: Analyze event
        id: analyze
        run: |
          EVENT_TYPE="${{ github.event.inputs.event_type }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          echo "📢 Event: $EVENT_TYPE at $TIMESTAMP"
          echo "event_type=$EVENT_TYPE" >> "$GITHUB_OUTPUT"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"

      - name: Trigger multi-layer orchestration
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          EVENT_TYPE="${{ steps.analyze.outputs.event_type }}"

          echo "🚀 Dispatching secrets-orchestrator-multi-layer"

          # Use repository_dispatch to trigger orchestrator
          # This prevents duplicate concurrent runs via concurrency groups
          gh workflow run secrets-orchestrator-multi-layer.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f rotation_trigger="event-dispatch:$EVENT_TYPE" \
            2>&1 | tee /tmp/dispatch.log || {
            echo "⚠️  Dispatch failed, but workflow may still be queued"
            exit 0
          }

      - name: Log event (immutable audit)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EVENT_TYPE="${{ steps.analyze.outputs.event_type }}"

          # Create immutable record of dispatch
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "📢 Event Dispatch: Secrets Check ($EVENT_TYPE)" \
            --body "Secrets event dispatcher triggered orchestration. Event: $EVENT_TYPE" \
            --label "automation" \
            --label "dispatch" 2>/dev/null || true
