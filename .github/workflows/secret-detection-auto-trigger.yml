name: Secret Detection & Workflow Auto-Trigger

on:
  # Converted to event-driven: removed frequent polling
  workflow_dispatch:
  repository_dispatch:
    types: [secret-detected, secret-check]

concurrency:
  group: secret-detection
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    name: Detect new secrets & trigger workflows
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect AWS OIDC secret
        id: detect-oidc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh secret list --repo kushin77/self-hosted-runner | grep -q "AWS_OIDC_ROLE_ARN"; then
            echo "detected=true" >> $GITHUB_OUTPUT
            echo "✅ AWS OIDC secret detected"
          else
            echo "detected=false" >> $GITHUB_OUTPUT
            echo "⏳ AWS OIDC secret not found"
          fi

      - name: Detect AWS Spot secrets
        id: detect-spot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ROLE=$(gh secret list --repo kushin77/self-hosted-runner | grep -q "AWS_ROLE_TO_ASSUME" && echo "true" || echo "false")
          REGION=$(gh secret list --repo kushin77/self-hosted-runner | grep -q "AWS_REGION" && echo "true" || echo "false")
          
          if [[ "$ROLE" == "true" ]] && [[ "$REGION" == "true" ]]; then
            echo "detected=true" >> $GITHUB_OUTPUT
            echo "✅ AWS Spot secrets detected (role + region)"
          else
            echo "detected=false" >> $GITHUB_OUTPUT
            echo "⏳ AWS Spot secrets incomplete"
          fi

      - name: Detect STAGING_KUBECONFIG secret
        id: detect-kubeconfig
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh secret list --repo kushin77/self-hosted-runner | grep -q "STAGING_KUBECONFIG"; then
            echo "detected=true" >> $GITHUB_OUTPUT
            echo "✅ STAGING_KUBECONFIG detected"
          else
            echo "detected=false" >> $GITHUB_OUTPUT
            echo "⏳ STAGING_KUBECONFIG not found"
          fi

      - name: Trigger Terraform validation (if OIDC ready)
        if: steps.detect-oidc.outputs.detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Triggering Terraform validation workflow..."
          gh workflow run terraform-validate.yml --repo kushin77/self-hosted-runner \
            --ref main 2>/dev/null || echo "Terraform validate workflow may already be scheduled"

      - name: Trigger AWS Spot plan (if secrets ready)
        if: steps.detect-spot.outputs.detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Triggering AWS Spot plan workflow..."
          gh workflow run p4-aws-spot-deploy-plan.yml --repo kushin77/self-hosted-runner \
            --ref main 2>/dev/null || echo "Spot plan workflow may already be scheduled"

      - name: Trigger KEDA smoke test (if kubeconfig ready)
        if: steps.detect-kubeconfig.outputs.detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Triggering KEDA smoke test workflow (real mode)..."
          gh workflow run keda-smoke-test.yml --repo kushin77/self-hosted-runner \
            --ref main \
            -f use_real_cluster=true 2>/dev/null || echo "KEDA smoke test workflow may already be scheduled"

      - name: Post detection summary to issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > /tmp/secret_detection_summary.md
          ## 🔐 Secret Detection & Auto-Trigger Report
          
          **Timestamp:** $(date -Iseconds)
          
          ### Detected Secrets
          - AWS_OIDC_ROLE_ARN: ${{ steps.detect-oidc.outputs.detected }}
          - AWS SPOT_SECRETS: ${{ steps.detect-spot.outputs.detected }}
          - STAGING_KUBECONFIG: ${{ steps.detect-kubeconfig.outputs.detected }}
          
          ### Workflows Triggered
          - Terraform validation: ${{ steps.detect-oidc.outputs.detected == 'true' && '✅' || '⏳' }}
          - AWS Spot plan: ${{ steps.detect-spot.outputs.detected == 'true' && '✅' || '⏳' }}
          - KEDA validation: ${{ steps.detect-kubeconfig.outputs.detected == 'true' && '✅' || '⏳' }}
          
          **Next check:** In 3 minutes
          EOF
          
          # Optional: Post to issue if new secrets detected
          if [[ "${{ steps.detect-oidc.outputs.detected }}" == "true" ]] || \
             [[ "${{ steps.detect-spot.outputs.detected }}" == "true" ]] || \
             [[ "${{ steps.detect-kubeconfig.outputs.detected }}" == "true" ]]; then
            gh issue comment 343 --repo kushin77/self-hosted-runner \
              --body "$(cat /tmp/secret_detection_summary.md)" 2>/dev/null || true
          fi
