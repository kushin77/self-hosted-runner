name: Secrets Comprehensive Validation

# Run on schedule + manual trigger
on:
  schedule:
    - cron: '0 * * * *'  # Hourly validation
  workflow_dispatch:
  push:
    paths:
      - 'docs/SECRETS.md'
      - '.github/workflows/secrets-*.yml'
  workflow_call: {}

concurrency:
  group: secrets-comprehensive-validation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read
  actions: read
  id-token: write

jobs:
  comprehensive-secrets-validation:
    runs-on: ubuntu-latest
    outputs:
      validation_result: ${{ steps.validate.outputs.result }}
      missing_count: ${{ steps.validate.outputs.missing_count }}
    steps:
            - name: Load resilience helpers
              run: |
                set -euo pipefail
                source .github/scripts/resilience.sh || true
      - name: Checkout
        uses: actions/checkout@v4

      - name: Comprehensive Secrets Validation
        id: validate
        env:
          RUNNER_MGMT_TOKEN: ${{ secrets.RUNNER_MGMT_TOKEN }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
          TF_VAR_SERVICE_ACCOUNT_KEY: ${{ secrets.TF_VAR_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "==== Secrets Comprehensive Validation ===="
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          # Define required secrets for each tier
          RUNNER_SECRETS="RUNNER_MGMT_TOKEN DEPLOY_SSH_KEY"
          GCP_SECRETS="GCP_PROJECT_ID GCP_SERVICE_ACCOUNT_KEY GCP_WORKLOAD_IDENTITY_PROVIDER GCP_SERVICE_ACCOUNT_EMAIL"
          VAULT_SECRETS="VAULT_ADDR VAULT_NAMESPACE VAULT_ROLE_ID VAULT_SECRET_ID"
          MINIO_SECRETS="MINIO_ACCESS_KEY MINIO_SECRET_KEY MINIO_ENDPOINT MINIO_BUCKET"
          TERRAFORM_SECRETS="TF_VAR_SERVICE_ACCOUNT_KEY"

          ALL_SECRETS="$RUNNER_SECRETS $GCP_SECRETS $VAULT_SECRETS $MINIO_SECRETS $TERRAFORM_SECRETS"

          MISSING=()
          PRESENT=()

          echo ""
          echo "==== Tier 1: Runner Management Secrets ===="
          for secret in $RUNNER_SECRETS; do
            value=$(eval echo \$$secret)
            if [[ -z "$value" ]]; then
              echo "❌ $secret: MISSING"
              MISSING+=("$secret")
            else
              echo "✅ $secret: Present (${#value} chars)"
              PRESENT+=("$secret")
            fi
          done

          echo ""
          echo "==== Tier 2: GCP/Workload Identity Secrets ===="
          for secret in $GCP_SECRETS; do
            value=$(eval echo \$$secret)
            if [[ -z "$value" ]]; then
              echo "❌ $secret: MISSING"
              MISSING+=("$secret")
            else
              echo "✅ $secret: Present (${#value} chars)"
              PRESENT+=("$secret")
            fi
          done

          echo ""
          echo "==== Tier 3: Vault Secrets ===="
          for secret in $VAULT_SECRETS; do
            value=$(eval echo \$$secret)
            if [[ -z "$value" ]]; then
              echo "❌ $secret: MISSING"
              MISSING+=("$secret")
            else
              echo "✅ $secret: Present (${#value} chars)"
              PRESENT+=("$secret")
            fi
          done

          echo ""
          echo "==== Tier 4: MinIO Backup Secrets ===="
          for secret in $MINIO_SECRETS; do
            value=$(eval echo \$$secret)
            if [[ -z "$value" ]]; then
              echo "❌ $secret: MISSING"
              MISSING+=("$secret")
            else
              echo "✅ $secret: Present (${#value} chars)"
              PRESENT+=("$secret")
            fi
          done

          echo ""
          echo "==== Tier 5: Terraform Secrets ===="
          for secret in $TERRAFORM_SECRETS; do
            value=$(eval echo \$$secret)
            if [[ -z "$value" ]]; then
              echo "❌ $secret: MISSING"
              MISSING+=("$secret")
            else
              echo "✅ $secret: Present (${#value} chars)"
              PRESENT+=("$secret")
            fi
          done

          MISSING_COUNT=${#MISSING[@]}
          PRESENT_COUNT=${#PRESENT[@]}

          echo ""
          echo "==== Summary ===="
          echo "✅ Present: $PRESENT_COUNT secrets"
          echo "❌ Missing: $MISSING_COUNT secrets"

          if [[ $MISSING_COUNT -gt 0 ]]; then
            echo ""
            echo "Missing secrets:"
            for secret in "${MISSING[@]}"; do
              echo "  - $secret"
            done
          fi

          echo ""
          echo "result=$([ $MISSING_COUNT -eq 0 ] && echo 'SUCCESS' || echo 'PARTIAL')" >> $GITHUB_OUTPUT
          echo "missing_count=$MISSING_COUNT" >> $GITHUB_OUTPUT

          exit 0

      - name: Verify GCP Connectivity (if credentials present)
        if: env.GCP_SERVICE_ACCOUNT_KEY != ''
        run: |
          echo "==== GCP OIDC Validation ===="
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" > /tmp/gcp_sa.json
          gcloud auth activate-service-account --key-file=/tmp/gcp_sa.json --project="${{ secrets.GCP_PROJECT_ID }}" 2>&1 || {
            echo "⚠️  GCP auth failed - credentials may be malformed"
            rm -f /tmp/gcp_sa.json
            exit 0
          }

          # Try to list secrets to verify access
          gcloud secrets list --project="${{ secrets.GCP_PROJECT_ID }}" --limit=5 2>&1 | head -10 || {
            echo "⚠️  GCP secret listing failed - check IAM permissions"
            rm -f /tmp/gcp_sa.json
            exit 0
          }

          echo "✅ GCP connectivity verified"
          rm -f /tmp/gcp_sa.json

      - name: Verify Vault Connectivity (if credentials present)
        if: env.VAULT_ADDR != ''
        run: |
          echo "==== Vault Connectivity Validation ===="

          if [[ -z "${{ secrets.VAULT_ROLE_ID }}" ]] || [[ -z "${{ secrets.VAULT_SECRET_ID }}" ]]; then
            echo "⚠️  Vault credentials incomplete - skipping connectivity test"
            exit 0
          fi

          VAULT_TOKEN=$(curl -s -X POST \
            "${{ secrets.VAULT_ADDR }}/v1/auth/approle/login" \
            -H "Content-Type: application/json" \
            -d "{\"role_id\":\"${{ secrets.VAULT_ROLE_ID }}\",\"secret_id\":\"${{ secrets.VAULT_SECRET_ID }}\"}" \
            | jq -r '.auth.client_token' 2>/dev/null) || {
            echo "⚠️  Vault AppRole auth failed"
            exit 0
          }

          if [[ -z "$VAULT_TOKEN" ]] || [[ "$VAULT_TOKEN" == "null" ]]; then
            echo "⚠️  Vault token invalid"
            exit 0
          fi

          echo "✅ Vault connectivity verified"

      - name: Create Validation Summary Issue
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const result = '${{ steps.validate.outputs.validation_result }}';
            const missingCount = parseInt('${{ steps.validate.outputs.missing_count }}');

            const timestamp = new Date().toISOString();
            const status = missingCount === 0 ? '✅ PASS' : '⚠️  INCOMPLETE';

            const body = `## Secrets Validation Report

**Timestamp**: ${timestamp}
**Status**: ${status}
**Missing Secrets**: ${missingCount}

### Validation Details
- Runner Management Secrets: RUNNER_MGMT_TOKEN, DEPLOY_SSH_KEY
- GCP Integration: GCP_PROJECT_ID, GCP_SERVICE_ACCOUNT_KEY, GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT_EMAIL
- Vault Integration: VAULT_ADDR, VAULT_NAMESPACE, VAULT_ROLE_ID, VAULT_SECRET_ID
- MinIO Backup: MINIO_ACCESS_KEY, MINIO_SECRET_KEY, MINIO_ENDPOINT, MINIO_BUCKET
- Terraform: TF_VAR_SERVICE_ACCOUNT_KEY

### Next Steps
${missingCount === 0
  ? '✅ All secrets are configured. System is ready for hands-off operation.\n- Monitor workflows: https://github.com/${{ github.repository }}/actions\n- Review audit logs: https://github.com/${{ github.repository }}/issues?q=label%3Aautomation'
  : `⚠️  ${missingCount} secret(s) still missing. See docs/SECRETS.md for provisioning steps.`
}

---
*This report was automatically generated by the secrets validation workflow.*`;

            const { owner, repo } = context.repo;

            // Find or create validation summary issue
            const issues = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
            const summaryIssue = issues.data.find(i => i.title === '📊 Secrets Validation Summary');

            if (summaryIssue) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: summaryIssue.number,
                body
              });
            } else if (missingCount > 0) {
              await github.rest.issues.create({
                owner, repo,
                title: '📊 Secrets Validation Summary',
                body,
                labels: ['automation', 'monitoring', 'secrets']
              });
            }
