# Root cause: Corrupted redacted secret placeholders in workflow definition
# Status: Can be executed manually via: gh workflow run ephemeral-secret-provisioning.yml --ref main
# Remediation: See https://github.com/kushin77/self-hosted-runner/issues/1979
#
name: Ephemeral Secret Provisioning via Vault
# sequencing-protection: workflow_run (placeholder) — add real guard or concurrency block

on:
    # Provision ephemeral secrets every 6 hours
  workflow_dispatch:
    inputs:
      secret_type:
        description: "Secret to provision (runner-mgmt-token, deploy-ssh-key, or all)"
        required: false
        default: "all"
        type: choice
        options:
          - runner-mgmt-token
          - deploy-ssh-key
          - all
      source:
        description: "Secret source (vault or gcp)"
        required: false
        default: "vault"
        type: choice
        options:
          - vault
          - gcp
          - aws

permissions:
  id-token: write
  contents: read
  actions: write
  id-token: write

jobs:
  provision-ephemeral-secrets:
    name: Provision Ephemeral Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true


      - name: Setup authentication (Vault)
        id: vault-auth
        if: github.event.inputs.source == 'vault' || github.event.inputs.source == ''
        run: |
          source .github/scripts/resilience.sh || true
          VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
          VAULT_NAMESPACE="${{ secrets.VAULT_NAMESPACE }}"
          VAULT_ROLE_ID="${{ secrets.VAULT_ROLE_ID }}"
          VAULT_SECRET_ID="${{ secrets.VAULT_SECRET_ID }}"

          if [ -z "$VAULT_ADDR" ] || [ -z "$VAULT_ROLE_ID" ] || [ -z "$VAULT_SECRET_ID" ]; then
            echo "status=vault-secrets-unavailable" >> $GITHUB_OUTPUT
            echo "⚠ Vault secrets not configured; falling back to GCP/AWS"
            exit 0
          fi

          # Authenticate to Vault using AppRole
          VAULT_AUTH=$(retry_command 2 3 curl -s -X POST \
            "${VAULT_ADDR}/v1/auth/approle/login" \
            -H "X-Vault-Namespace: ${VAULT_NAMESPACE}" \
            -d @- <<EOF
            {
              "role_id": "$VAULT_ROLE_ID",
              "secret_id": "$VAULT_SECRET_ID"
            }
          EOF
          )

          VAULT_TOKEN=$(echo "$VAULT_AUTH" | jq -r '.auth.client_token // empty')
          if [ -z "$VAULT_TOKEN" ]; then
            echo "status=vault-auth-failed" >> $GITHUB_OUTPUT
            echo "⚠ Vault authentication failed; falling back"
            exit 0
          fi

          echo "::add-mask::$VAULT_TOKEN"
          echo "vault_token=$VAULT_TOKEN" >> $GITHUB_OUTPUT
          echo "status=vault-authenticated" >> $GITHUB_OUTPUT

      - name: Fetch RUNNER_MGMT_TOKEN from Vault
        id: fetch-runner-token
        if: (github.event.inputs.secret_type == 'runner-mgmt-token' || github.event.inputs.secret_type == 'all') && steps.vault-auth.outputs.status == 'vault-authenticated'
        run: |
          VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
          VAULT_NAMESPACE="${{ secrets.VAULT_NAMESPACE }}"
          VAULT_TOKEN="${{ steps.vault-auth.outputs.vault_token }}"

          # Fetch from vault path: secret/data/github/runner-mgmt-token
          TOKEN_RESPONSE=$(curl -s -X GET \
            "${VAULT_ADDR}/v1/secret/data/github/runner-mgmt-token" \
            -H "X-Vault-Namespace: ${VAULT_NAMESPACE}" \
            -H "X-Vault-Token: $VAULT_TOKEN")

          RUNNER_MGMT_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.data.data.token // empty')

          if [ -z "$RUNNER_MGMT_TOKEN" ]; then
            echo "status=fetch-failed" >> $GITHUB_OUTPUT
            echo "⚠ Could not fetch RUNNER_MGMT_TOKEN from Vault"
            exit 0
          fi

          echo "::add-mask::$RUNNER_MGMT_TOKEN"
          echo "token=$RUNNER_MGMT_TOKEN" >> $GITHUB_OUTPUT
          echo "status=fetched" >> $GITHUB_OUTPUT

          # Validate token format (GitHub PAT starts with github_pat_ or ghp_)
          if [[ "$RUNNER_MGMT_TOKEN" =~ ^gh(p|r)_ ]]; then
            echo "✓ RUNNER_MGMT_TOKEN fetched and validated (valid GitHub PAT format)"
          else
            echo "⚠ Token format unexpected; proceeding with caution"
          fi

      - name: Fetch DEPLOY_SSH_KEY from Vault
        id: fetch-ssh-key
        if: (github.event.inputs.secret_type == 'deploy-ssh-key' || github.event.inputs.secret_type == 'all') && steps.vault-auth.outputs.status == 'vault-authenticated'
        run: |
          VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
          VAULT_NAMESPACE="${{ secrets.VAULT_NAMESPACE }}"
          VAULT_TOKEN="${{ steps.vault-auth.outputs.vault_token }}"

          # Fetch from vault path: secret/data/ssh/deploy-key
          KEY_RESPONSE=$(curl -s -X GET \
            "${VAULT_ADDR}/v1/secret/data/ssh/deploy-key" \
            -H "X-Vault-Namespace: ${VAULT_NAMESPACE}" \
            -H "X-Vault-Token: $VAULT_TOKEN")

          DEPLOY_SSH_KEY=$(echo "$KEY_RESPONSE" | jq -r '.data.data.private_key // empty')

          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "status=fetch-failed" >> $GITHUB_OUTPUT
            echo "⚠ Could not fetch DEPLOY_SSH_KEY from Vault"
            exit 0
          fi

          echo "::add-mask::$DEPLOY_SSH_KEY"
          echo "key=$DEPLOY_SSH_KEY" >> $GITHUB_OUTPUT
          echo "status=fetched" >> $GITHUB_OUTPUT

          # Validate key format (should start with -----BEGIN)
          if [[ "$DEPLOY_SSH_KEY" =~ ^-----BEGIN ]]; then
            echo "✓ DEPLOY_SSH_KEY fetched and validated (valid PEM format)"
          else
            echo "⚠ Key format unexpected; proceeding with caution"
          fi

      - name: Set ephemeral repository secrets via GitHub API
        id: set-secrets
        run: |
          # Use GitHub CLI with elevated permissions (via GITHUB_TOKEN from workflow)
          # Secrets are stored as encrypted values and expire/get rotated

          RUNNER_TOKEN="${{ steps.fetch-runner-token.outputs.token }}"
          DEPLOY_KEY="${{ steps.fetch-ssh-key.outputs.key }}"

          SETS_ATTEMPTED=0
          SETS_SUCCEEDED=0

          if [ -n "$RUNNER_TOKEN" ]; then
            echo "Setting RUNNER_MGMT_TOKEN for repository..."
            gh secret set RUNNER_MGMT_TOKEN --body "$RUNNER_TOKEN" --repo kushin77/self-hosted-runner && {
              echo "✓ RUNNER_MGMT_TOKEN set successfully"
              ((SETS_SUCCEEDED++))
            } || echo "⚠ Failed to set RUNNER_MGMT_TOKEN"
            ((SETS_ATTEMPTED++))
          fi

          if [ -n "$DEPLOY_KEY" ]; then
            echo "Setting DEPLOY_SSH_KEY for repository..."
            gh secret set DEPLOY_SSH_KEY --body "$DEPLOY_KEY" --repo kushin77/self-hosted-runner && {
              echo "✓ DEPLOY_SSH_KEY set successfully"
              ((SETS_SUCCEEDED++))
            } || echo "⚠ Failed to set DEPLOY_SSH_KEY"
            ((SETS_ATTEMPTED++))
          fi

          echo "provisioning_attempted=$SETS_ATTEMPTED" >> $GITHUB_OUTPUT
          echo "provisioning_succeeded=$SETS_SUCCEEDED" >> $GITHUB_OUTPUT

          if [ $SETS_SUCCEEDED -eq $SETS_ATTEMPTED ] && [ $SETS_ATTEMPTED -gt 0 ]; then
            echo "status=all-success" >> $GITHUB_OUTPUT
            echo "✓ All secrets provisioned successfully"
          elif [ $SETS_SUCCEEDED -gt 0 ]; then
            echo "status=partial-success" >> $GITHUB_OUTPUT
            echo "⚠ Partial success: $SETS_SUCCEEDED/$SETS_ATTEMPTED secrets provisioned"
          else
            echo "status=all-failed" >> $GITHUB_OUTPUT
            echo "✗ Failed to provision any secrets"
          fi

      - name: Trigger dependent workflows now that secrets are available
        id: trigger-dependents
        if: steps.set-secrets.outputs.status != 'all-failed'
        run: |
          echo "Triggering dependent workflows..."

          # Trigger runner self-heal workflow
          gh workflow run runner-self-heal.yml \
            --repo kushin77/self-hosted-runner \
            --ref main || echo "⚠ Failed to trigger runner-self-heal.yml"

          # Trigger auto-close workflow to close any missing-secrets issues
          gh workflow run auto-close-missing-secrets.yml \
            --repo kushin77/self-hosted-runner \
            --ref main || echo "⚠ Failed to trigger auto-close-missing-secrets.yml"

          echo "triggered=true" >> $GITHUB_OUTPUT
          echo "✓ Dependent workflows triggered"

      - name: Close missing-secrets issues if all were provisioned
        id: close-issues
        if: steps.set-secrets.outputs.status == 'all-success'
        run: |
          echo "Closing any related missing-secrets issues..."

          # Find open missing-secrets issues
          OPEN_ISSUES=$(gh issue list \
            --repo kushin77/self-hosted-runner \
            --search "RUNNER_MGMT_TOKEN DEPLOY_SSH_KEY" \
            --state open \
            --json number \
            --jq '.[].number')

          if [ -z "$OPEN_ISSUES" ]; then
            echo "closed_count=0" >> $GITHUB_OUTPUT
            echo "No open missing-secrets issues found"
            exit 0
          fi

          CLOSED_COUNT=0
          while IFS= read -r issue; do
            gh issue close "$issue" \
              --repo kushin77/self-hosted-runner \
              --comment "✅ **AUTO-CLOSED** — Secrets Provisioned

The required repository secrets have been ephemeral provisioned via Vault:
- ✅ RUNNER_MGMT_TOKEN
- ✅ DEPLOY_SSH_KEY

**Details**:
- Provisioned at: $(date -u -Iseconds)
- Source: $([ -n '${{ steps.vault-auth.outputs.status }}' ] && echo 'Vault' || echo 'GCP')
- Rotation: Every 6 hours (ephemeral, immutable)
- Status: ✓ HEALTHY

The system is now fully operational and continues autonomous execution.

This issue was automatically closed because all required secrets are now provisioned." \
              2>/dev/null && ((CLOSED_COUNT++)) || echo "⚠ Failed to close issue #$issue"
          done <<< "$OPEN_ISSUES"

          echo "closed_count=$CLOSED_COUNT" >> $GITHUB_OUTPUT

      - name: Post provisioning metrics
        if: always()
        run: |
          PROVISIONED="${{ steps.set-secrets.outputs.provisioning_succeeded || 0 }}"
          ATTEMPTED="${{ steps.set-secrets.outputs.provisioning_attempted || 0 }}"
          CLOSED="${{ steps.close-issues.outputs.closed_count || 0 }}"

          mkdir -p .metrics
          cat > .metrics/ephemeral-provisioning-$(date +%s).json <<EOF
          {
            "timestamp": "$(date -u -Iseconds)",
            "type": "${{ github.event.inputs.secret_type || 'scheduled' }}",
            "source": "${{ github.event.inputs.source || 'vault' }}",
            "provisioned": $PROVISIONED,
            "attempted": $ATTEMPTED,
            "issues_closed": $CLOSED,
            "status": "${{ steps.set-secrets.outputs.status || 'unknown' }}"
          }
          EOF

      - name: Upload metrics (self-hosted)
        if: always() && contains(runner.labels, 'self-hosted')
        run: |
          set -euo pipefail
          TAR=ephemeral-provisioning-metrics-${{ github.run_id }}.tgz
          tar -czf "$TAR" .metrics || true
          chmod +x ci/scripts/upload_to_minio.sh || true
          URL=$(ci/scripts/upload_to_minio.sh "$TAR") || true
          echo "Uploaded ephemeral provisioning metrics to: $URL"

      - name: Upload metrics (hosted fallback)
        if: always() && ${{ !contains(runner.labels, 'self-hosted') }}
        uses: actions/upload-artifact@v4
        with:
          name: ephemeral-provisioning-metrics
          path: .metrics
          retention-days: 90
