name: Validate Infra Modules
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_dispatch:
  push:
    paths:
      - 'infra/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.6.0'
      - name: Validate Terraform modules
        run: |
          set -e
          for d in infra/*; do
            if [ -d "$d" ]; then
              echo "Checking $d"
              (cd "$d" || exit 1; terraform init -backend=false >/dev/null || true; terraform fmt -check || true; terraform validate || true)
            fi
          done
      - name: Install tflint
        run: |
          curl -sSL -o /tmp/tflint.zip https://github.com/terraform-linters/tflint/releases/download/v0.42.0/tflint_linux_amd64.zip && unzip -o /tmp/tflint.zip -d /usr/local/bin && tflint --version || true
      - name: Run tflint on infra modules
        run: |
          for d in infra/*; do
            if [ -d "$d" ]; then
              echo "tflint $d"
              (cd "$d" || exit 1; tflint || true)
            fi
          done
      - name: Install tfsec
        run: |
          curl -sSL https://tfsec.dev/install.sh | bash -s -- -b /usr/local/bin || true
      - name: Run tfsec on infra modules
        run: |
          for d in infra/*; do
            if [ -d "$d" ]; then
              echo "tfsec $d"
              (cd "$d" || exit 1; tfsec . || true)
            fi
          done