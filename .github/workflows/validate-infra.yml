name: Validate Infra Modules
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_dispatch:
  push:
    paths:
      - 'infra/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.6.0'
      - name: Validate Terraform modules
        run: |
          set -e
          for d in infra/*; do
            if [ -d "$d" ]; then
              echo "Checking $d"
              (cd "$d" || exit 1; terraform init -backend=false >/dev/null || true; terraform fmt -check || true; terraform validate || true)
            fi
          done