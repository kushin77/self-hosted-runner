name: "Ephemeral Runner Lifecycle Management"

# Support both scheduled and manual dispatch
on:
  schedule:
    # Check every 5 minutes for runners to reap
    - cron: '*/5 * * * *'
    # Hourly comprehensive check and metrics collection
    - cron: '0 * * * *'
    # Daily maintenance and audit log rotation
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - check-all
          - drain-all
          - reap-expired
          - cleanup-audit-logs
          - generate-report
        default: "check-all"
      filter_label:
        description: "Filter runners by label (optional)"
        required: false
        type: string
      force:
        description: "Force action even if safety checks fail"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  actions: read
  checks: write

env:
  RUNNER_TEMP: /tmp/runner-lifecycle

jobs:
  # =========================================================================
  # Check Runner Health & TTL Status
  # =========================================================================
  
  check-runner-health:
    name: "Check Runner Health"
    runs-on: ubuntu-latest
    if: contains(github.event.schedule, '*/5') || contains(github.event.inputs.action, 'check')
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pyyaml psutil requests

      - name: Get all self-hosted runners
        id: get-runners
        run: |
          RUNNERS=$(gh runner list --json name,status,labels --jq .)
          echo "runners<<EOF" >> $GITHUB_OUTPUT
          echo "$RUNNERS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check health of each runner
        id: health-check
        run: |
          python3 scripts/ephemeral-lifecycle-controller.py info
          
          # Collect metrics
          echo "=== Runner Lifecycle Summary ===" >> $GITHUB_STEP_SUMMARY
          
          # Count runners by TTL status
          RUNNING=$(python3 -c "
          import json, os
          from pathlib import Path
          runner_dirs = list(Path('/tmp/runner-lifecycle').glob('*/'))
          print(f'Total runners tracked: {len(runner_dirs)}')
          ")
          
          echo "$RUNNING" >> $GITHUB_STEP_SUMMARY

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runner-health-report-${{ github.run_id }}
          path: |
            /tmp/runner-lifecycle/
          retention-days: 7

  # =========================================================================
  # Reap Expired Runners
  # =========================================================================
  
  reap-expired-runners:
    name: "Reap Expired Runners"
    runs-on: ubuntu-latest
    needs: check-runner-health
    if: contains(github.event.schedule, '*/5') || contains(github.event.inputs.action, 'reap')
    timeout-minutes: 15
    continue-on-error: true
    
    strategy:
      matrix:
        runner_group:
          - ubuntu
          - macos
          - windows
          - custom
      max-parallel: 4

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pyyaml psutil requests

      - name: Identify expired runners
        id: find-expired
        run: |
          python3 << 'EOF'
          import json
          import subprocess
          from pathlib import Path
          
          # Get all runners
          result = subprocess.run(
              ["gh", "runner", "list", "--json", "name,status,labels"],
              capture_output=True,
              text=True
          )
          
          if result.returncode != 0:
              print("Failed to get runners")
              exit(1)
          
          runners = json.loads(result.stdout) if result.stdout else []
          
          expired_runners = []
          for runner in runners:
              # Check if runner state file indicates TTL expired
              state_file = Path(f"/tmp/runner-lifecycle/{runner['name']}/state.json")
              if state_file.exists():
                  with open(state_file) as f:
                      state = json.load(f)
                      # Check if TTL expired
                      if is_ttl_expired(state):
                          expired_runners.append(runner['name'])
          
          print(f"::set-output name=expired::{json.dumps(expired_runners)}")
          
          def is_ttl_expired(state):
              from datetime import datetime, timedelta
              assigned = datetime.fromisoformat(state.get('assigned_at', ''))
              ttl = state.get('ttl_assigned', 0)
              expiry = assigned + timedelta(seconds=ttl)
              return datetime.utcnow() > expiry
          
          for runner in expired_runners:
              print(f"Found expired runner: {runner}")
          EOF

      - name: Execute reap on expired runners
        run: |
          python3 scripts/ephemeral-lifecycle-controller.py reap \
            ${{ github.event.inputs.force == 'true' && '--force' || '' }}

  # =========================================================================
  # Drain Runners Before Shutdown
  # =========================================================================
  
  drain-runners-gracefully:
    name: "Drain Runners Gracefully"
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.action, 'drain')
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pyyaml psutil

      - name: Initiate graceful drain
        run: |
          echo "Initiating graceful drain of all ephemeral runners..."
          
          python3 scripts/ephemeral-lifecycle-controller.py drain \
            --strategy graceful \
            --timeout 300
        continue-on-error: true

      - name: Monitor drain progress
        run: |
          python3 << 'EOF'
          import subprocess
          import time
          import json
          from pathlib import Path
          from datetime import datetime
          
          print("\n=== Drain Progress Monitor ===\n")
          
          start_time = datetime.utcnow()
          max_duration = 300  # 5 minutes
          check_interval = 10
          
          while (datetime.utcnow() - start_time).seconds < max_duration:
              # Check status of each runner
              result = subprocess.run(
                  ["python3", "scripts/ephemeral-lifecycle-controller.py", "check-reap"],
                  capture_output=True,
                  text=True
              )
              
              elapsed = (datetime.utcnow() - start_time).seconds
              print(f"[{elapsed}s] {result.stdout}")
              
              if result.returncode == 0:  # Safe to reap
                  print("\n✓ Drain complete")
                  break
              
              time.sleep(check_interval)
          else:
              print("\n⚠ Drain timeout - forcing shutdown")
              subprocess.run([
                  "python3", "scripts/ephemeral-lifecycle-controller.py", "drain",
                  "--strategy", "forceful"
              ])
          EOF

  # =========================================================================
  # Collect Lifecycle Metrics
  # =========================================================================
  
  collect-metrics:
    name: "Collect Lifecycle Metrics"
    runs-on: ubuntu-latest
    if: contains(github.event.schedule, '0 *')  # Hourly
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pyyaml psutil

      - name: Generate metrics report
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path
          from datetime import datetime
          import glob
          
          metrics = {
              "timestamp": datetime.utcnow().isoformat() + "Z",
              "runners": {
                  "total_tracked": 0,
                  "ttl_assigned": 0,
                  "expired": 0,
                  "safe_to_reap": 0,
                  "in_progress": 0
              },
              "audit_trail": {
                  "total_events": 0,
                  "events_by_type": {}
              }
          }
          
          # Count state files and analyze
          state_files = glob.glob("/tmp/runner-lifecycle/*/state.json")
          metrics["runners"]["total_tracked"] = len(state_files)
          
          for state_file in state_files:
              try:
                  with open(state_file) as f:
                      state = json.load(f)
                      if "ttl_assigned" in state:
                          metrics["runners"]["ttl_assigned"] += 1
              except:
                  pass
          
          # Count audit log entries
          audit_logs = glob.glob("/tmp/runner-lifecycle/audit-logs/*.jsonl")
          for log_file in audit_logs:
              try:
                  with open(log_file) as f:
                      for line in f:
                          if line.strip():
                              entry = json.loads(line)
                              event_type = entry.get("event", "unknown")
                              count = metrics["audit_trail"]["events_by_type"].get(event_type, 0)
                              metrics["audit_trail"]["events_by_type"][event_type] = count + 1
                              metrics["audit_trail"]["total_events"] += 1
              except:
                  pass
          
          # Write metrics
          with open("/tmp/metrics.json", "w") as f:
              json.dump(metrics, f, indent=2)
          
          print("Metrics collected:")
          print(json.dumps(metrics, indent=2))
          EOF

      - name: Upload metrics
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-metrics-${{ github.run_id }}
          path: /tmp/metrics.json
          retention-days: 30

      - name: Push metrics to monitoring system
        run: |
          # This would push metrics to Prometheus, CloudWatch, DataDog, etc.
          echo "Metrics ready for push to monitoring system"
        continue-on-error: true

  # =========================================================================
  # Audit Log Maintenance
  # =========================================================================
  
  maintain-audit-logs:
    name: "Maintain Audit Logs"
    runs-on: ubuntu-latest
    if: contains(github.event.schedule, '0 2')  # Daily at 2 AM UTC
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Archive old audit logs
        run: |
          CUTOFF_DATE=$(date -d '30 days ago' +%Y%m%d)
          
          echo "Archiving audit logs older than $CUTOFF_DATE..."
          
          # Archive logs
          tar -czf /tmp/audit-logs-archived-$CUTOFF_DATE.tar.gz \
            /tmp/runner-lifecycle/audit-logs/ \
            --exclude "audit-2[0]2[6]-*" \
            2>/dev/null || true
          
          echo "Audit logs archived"

      - name: Upload archived logs
        uses: actions/upload-artifact@v4
        with:
          name: archived-audit-logs-${{ github.run_id }}
          path: /tmp/audit-logs-archived-*.tar.gz
          retention-days: 365

      - name: Cleanup old archives
        run: |
          find /tmp/runner-lifecycle/audit-logs -name "audit-*.jsonl" -mtime +365 -delete
          echo "Old audit logs cleaned up"

  # =========================================================================
  # Summary Report
  # =========================================================================
  
  summary-report:
    name: "Lifecycle Management Summary"
    runs-on: ubuntu-latest
    needs: [check-runner-health, reap-expired-runners, collect-metrics]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Ephemeral Runner Lifecycle Management Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status" >> $GITHUB_STEP_SUMMARY
          echo "- Health Check: ✓" >> $GITHUB_STEP_SUMMARY
          echo "- Reap Operations: ✓" >> $GITHUB_STEP_SUMMARY
          echo "- Metrics Collection: ✓" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Run" >> $GITHUB_STEP_SUMMARY
          echo "- Scheduled: In 5 minutes (next cron trigger)" >> $GITHUB_STEP_SUMMARY
          echo "- Manual Trigger: Use workflow_dispatch input" >> $GITHUB_STEP_SUMMARY

      - name: Check workflow results
        run: |
          echo "Workflow completed successfully"
          
          if [[ "${{ needs.check-runner-health.result }}" != "success" ]]; then
            echo "⚠ Runner health check had issues"
          fi
          
          if [[ "${{ needs.reap-expired-runners.result }}" != "success" ]]; then
            echo "⚠ Reap operation had issues"
          fi
