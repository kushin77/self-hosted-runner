name: Health Check - Secret Detection

on:
  schedule:
    # Run every 30 minutes to detect when operator adds secrets
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  detect-secrets:
    name: Detect Repository Secrets
    runs-on: ubuntu-latest
    outputs:
      secrets_ready: ${{ steps.check.outputs.secrets_ready }}
      missing_secrets: ${{ steps.check.outputs.missing_secrets }}

    steps:
      - uses: actions/checkout@v4

      - name: Check for Required Secrets
        id: check
        run: |
          REQUIRED_SECRETS=(
            "AWS_ROLE_TO_ASSUME"
            "AWS_REGION"
            "PROD_TFVARS"
            "GOOGLE_CREDENTIALS"
          )
          
          MISSING=()
          ALL_PRESENT=true
          
          for secret in "${REQUIRED_SECRETS[@]}"; do
            # Use GitHub API to check if secret exists
            response=$(gh api repos/${{ github.repository }}/actions/secrets/"$secret" 2>/dev/null | jq -r '.name' 2>/dev/null || echo "NOT_FOUND")
            
            if [[ "$response" == "NOT_FOUND" ]]; then
              MISSING+=("$secret")
              ALL_PRESENT=false
            fi
          done
          
          echo "secrets_ready=$ALL_PRESENT" >> $GITHUB_OUTPUT
          echo "missing_secrets=$(IFS=,; echo "${MISSING[*]}")" >> $GITHUB_OUTPUT
          
          if [ "$ALL_PRESENT" = true ]; then
            echo "✅ All required secrets detected!"
          else
            echo "⚠️  Missing secrets: ${MISSING[*]}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report Status
        run: |
          echo "## 🔐 Secrets Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**All Required Secrets Present:** ${{ steps.check.outputs.secrets_ready }}" >> $GITHUB_STEP_SUMMARY
          echo "**Missing Secrets:** ${{ steps.check.outputs.missing_secrets || 'None' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check.outputs.secrets_ready }}" = "true" ]; then
            echo "✅ Ready for terraform workflows" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏳ Waiting for operator to complete issue #1384 provisioning" >> $GITHUB_STEP_SUMMARY
          fi

  create-incident-if-missing:
    name: Create Issue if Secrets Missing
    needs: detect-secrets
    runs-on: ubuntu-latest
    if: needs.detect-secrets.outputs.secrets_ready == 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Check if incident exists
        id: check-incident
        run: |
          # Search for open issue about missing secrets
          EXISTING_ISSUE=$(gh issue list --repo ${{ github.repository }} \
            --search "state:open label:ops-blocked title:\"Secrets Status\"" \
            --json number --jq '.[0].number' 2>/dev/null || echo "")
          
          echo "existing_issue=$EXISTING_ISSUE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or Update Incident Issue
        if: steps.check-incident.outputs.existing_issue == ''
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Secrets Status - Missing Configuration" \
            --label "ops-blocked,autogenerated" \
            --body "## ⚠️ Terraform Workflows Blocked - Missing Secrets

### Missing Secrets
\`\`\`
${{ needs.detect-secrets.outputs.missing_secrets }}
\`\`\`

### Required Action
Complete the 5-step provisioning process in GitHub issue #1384:
1. Create GitHub environment with protection
2. Add required secrets
3. Customize terraform.tfvars
4. Provide webhook secret (optional)
5. Configure GCP Secret Manager

### Auto-Detection
This issue will auto-close once all secrets are detected (checked every 30 minutes).

**See:** [Issue #1384 - Operator Provisioning](https://github.com/${{ github.repository }}/issues/1384)
" || echo "Failed to create issue"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-terraform-plan:
    name: Trigger Terraform Plan
    needs: detect-secrets
    runs-on: ubuntu-latest
    if: needs.detect-secrets.outputs.secrets_ready == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Trigger terraform-plan Workflow
        run: |
          gh workflow run terraform-plan.yml \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref }}
          echo "✅ Triggered terraform-plan workflow"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report Success
        run: |
          echo "## ✅ Terraform Auto-Deployment Started" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All secrets detected and verified." >> $GITHUB_STEP_SUMMARY
          echo "Terraform plan workflow triggered automatically." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Terraform plan executes" >> $GITHUB_STEP_SUMMARY
          echo "2. Plan results posted to #1384" >> $GITHUB_STEP_SUMMARY
          echo "3. Awaiting approval comment: \`⏳ Plan approved\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Terraform apply auto-executes on approval" >> $GITHUB_STEP_SUMMARY
