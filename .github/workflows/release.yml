---
name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run release-please
        uses: google-github-actions/release-please-action@v3
        with:
          release-type: node
          package-name: self-hosted-runner
          monorepo-tags: false
          auto-merge: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
