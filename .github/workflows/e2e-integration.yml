name: E2E: Scanâ†’Rebuildâ†’Promote Integration Test

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simulate the flow without external secrets'
        required: false
        default: 'true'

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  run-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          python3 -m pip install --upgrade pip
          pip install requests

      - name: Run E2E trigger and assert
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python3 .github/scripts/e2e_trigger_and_assert.py --dry-run
          else
            python3 .github/scripts/e2e_trigger_and_assert.py
          fi
