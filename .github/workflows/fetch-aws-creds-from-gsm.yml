name: Fetch AWS Credentials from GSM (OIDC)

on:
  workflow_call:
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        required: true
      GCP_SERVICE_ACCOUNT_EMAIL:
        required: true
      GCP_PROJECT_ID:
        required: true
    outputs:
      aws_access_key_id:
        description: AWS Access Key ID
        value: ${{ jobs.fetch-credentials.outputs.aws_access_key_id }}
      aws_secret_access_key:
        description: AWS Secret Access Key
        value: ${{ jobs.fetch-credentials.outputs.aws_secret_access_key }}
      aws_region:
        description: AWS Region
        value: ${{ jobs.fetch-credentials.outputs.aws_region }}

jobs:
  fetch-credentials:
    name: Fetch AWS Credentials from GSM
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      aws_access_key_id: ${{ steps.fetch.outputs.aws_access_key_id }}
      aws_secret_access_key: ${{ steps.fetch.outputs.aws_secret_access_key }}
      aws_region: ${{ steps.fetch.outputs.aws_region }}
      sbom_storage_bucket: ${{ steps.fetch.outputs.sbom_storage_bucket }}
      artifact_s3_bucket: ${{ steps.fetch.outputs.artifact_s3_bucket }}
      minio_endpoint: ${{ steps.fetch.outputs.minio_endpoint }}
      minio_access_key_id: ${{ steps.fetch.outputs.minio_access_key_id }}
      minio_secret_access_key: ${{ steps.fetch.outputs.minio_secret_access_key }}
      registry_host: ${{ steps.fetch.outputs.registry_host }}
      registry_username: ${{ steps.fetch.outputs.registry_username }}
      registry_password: ${{ steps.fetch.outputs.registry_password }}
    steps:
      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: 'access_token'
          access_token_lifetime: '600s'

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch AWS Credentials from GSM
        id: fetch
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          
          echo "🔐 Fetching AWS credentials from GCP Secret Manager..."
          
          # Function to fetch secret with fallback
          fetch_secret() {
            local secret_name="$1"
            local default_value="${2:-}"
            
            gcloud secrets versions access latest \
              --secret="$secret_name" \
              --project="$GCP_PROJECT_ID" \
              2>/dev/null || echo "$default_value"
          }
          
          # Fetch AWS credentials
          AWS_ACCESS_KEY=$(fetch_secret "terraform-aws-prod" "")
          AWS_SECRET=$(fetch_secret "terraform-aws-secret" "")
          AWS_REGION=$(fetch_secret "terraform-aws-region" "us-east-1")
          SBOM_BUCKET=$(fetch_secret "sbom-storage-bucket" "")
          ARTIFACT_S3=$(fetch_secret "artifact-storage-s3-bucket" "")
          MINIO_ENDPOINT=$(fetch_secret "minio-endpoint" "")
          MINIO_KEY=$(fetch_secret "minio-access-key-id" "")
          MINIO_SECRET=$(fetch_secret "minio-secret-access-key" "")
          REGISTRY_HOST=$(fetch_secret "registry-host" "")
          REGISTRY_USER=$(fetch_secret "registry-username" "")
          REGISTRY_PASS=$(fetch_secret "registry-password" "")
          
          # Validate credentials exist
          if [ -z "$AWS_ACCESS_KEY" ]; then
            echo "❌ ERROR: AWS Access Key not found in GSM (terraform-aws-prod)"
            exit 1
          fi
          
          if [ -z "$AWS_SECRET" ]; then
            echo "❌ ERROR: AWS Secret Key not found in GSM (terraform-aws-secret)"
            exit 1
          fi
          
          # Mask sensitive values
          echo "::add-mask::$AWS_ACCESS_KEY"
          echo "::add-mask::$AWS_SECRET"
          
          # Set outputs (automatically masked by GitHub)
          echo "aws_access_key_id=$AWS_ACCESS_KEY" >> "$GITHUB_OUTPUT"
          echo "aws_secret_access_key=$AWS_SECRET" >> "$GITHUB_OUTPUT"
          echo "aws_region=$AWS_REGION" >> "$GITHUB_OUTPUT"
          echo "sbom_storage_bucket=$SBOM_BUCKET" >> "$GITHUB_OUTPUT"
          echo "artifact_s3_bucket=$ARTIFACT_S3" >> "$GITHUB_OUTPUT"
          echo "minio_endpoint=$MINIO_ENDPOINT" >> "$GITHUB_OUTPUT"
          echo "minio_access_key_id=$MINIO_KEY" >> "$GITHUB_OUTPUT"
          echo "minio_secret_access_key=$MINIO_SECRET" >> "$GITHUB_OUTPUT"
          echo "registry_host=$REGISTRY_HOST" >> "$GITHUB_OUTPUT"
          echo "registry_username=$REGISTRY_USER" >> "$GITHUB_OUTPUT"
          echo "registry_password=$REGISTRY_PASS" >> "$GITHUB_OUTPUT"
          
          echo "✅ Successfully fetched AWS credentials from GSM"
          echo "   Region: $AWS_REGION"
          if [ -n "$REGISTRY_USER" ]; then
            echo "   Registry host: ${REGISTRY_HOST:-ghcr.io} (user supplied)"
          fi

      - name: Verify Credentials Access
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.fetch.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.fetch.outputs.aws_secret_access_key }}
          AWS_REGION: ${{ steps.fetch.outputs.aws_region }}
        run: |
          set -euo pipefail
          
          echo "🔍 Verifying AWS credentials..."
          
          # Test STS access
          aws sts get-caller-identity --region "$AWS_REGION" > /dev/null 2>&1 && \
            echo "✅ AWS credentials validated (STS accessible)" || \
            echo "⚠️ AWS credentials validation skipped (STS may not be accessible in this context)"
