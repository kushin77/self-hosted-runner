name: Fetch AWS Credentials from GSM (OIDC)

on:
  workflow_call:
    outputs:
      aws_access_key_id:
        description: AWS Access Key ID
        value: ${{ steps.fetch.outputs.aws_access_key_id }}
      aws_secret_access_key:
        description: AWS Secret Access Key
        value: ${{ steps.fetch.outputs.aws_secret_access_key }}
      aws_region:
        description: AWS Region
        value: ${{ steps.fetch.outputs.aws_region }}

jobs:
  fetch-credentials:
    name: Fetch AWS Credentials from GSM
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      aws_access_key_id: ${{ steps.fetch.outputs.aws_access_key_id }}
      aws_secret_access_key: ${{ steps.fetch.outputs.aws_secret_access_key }}
      aws_region: ${{ steps.fetch.outputs.aws_region }}
    steps:
      - name: Authenticate to Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          token-format: 'access_token'
          access_token_lifetime: '600s'

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch AWS Credentials from GSM
        id: fetch
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          
          echo "🔐 Fetching AWS credentials from GCP Secret Manager..."
          
          # Function to fetch secret with fallback
          fetch_secret() {
            local secret_name="$1"
            local default_value="${2:-}"
            
            gcloud secrets versions access latest \
              --secret="$secret_name" \
              --project="$GCP_PROJECT_ID" \
              2>/dev/null || echo "$default_value"
          }
          
          # Fetch AWS credentials
          AWS_ACCESS_KEY=$(fetch_secret "terraform-aws-prod" "")
          AWS_SECRET=$(fetch_secret "terraform-aws-secret" "")
          AWS_REGION=$(fetch_secret "terraform-aws-region" "us-east-1")
          
          # Validate credentials exist
          if [ -z "$AWS_ACCESS_KEY" ]; then
            echo "❌ ERROR: AWS Access Key not found in GSM (terraform-aws-prod)"
            exit 1
          fi
          
          if [ -z "$AWS_SECRET" ]; then
            echo "❌ ERROR: AWS Secret Key not found in GSM (terraform-aws-secret)"
            exit 1
          fi
          
          # Mask sensitive values
          echo "::add-mask::$AWS_ACCESS_KEY"
          echo "::add-mask::$AWS_SECRET"
          
          # Set outputs (automatically masked by GitHub)
          echo "aws_access_key_id=$AWS_ACCESS_KEY" >> "$GITHUB_OUTPUT"
          echo "aws_secret_access_key=$AWS_SECRET" >> "$GITHUB_OUTPUT"
          echo "aws_region=$AWS_REGION" >> "$GITHUB_OUTPUT"
          
          echo "✅ Successfully fetched AWS credentials from GSM"
          echo "   Region: $AWS_REGION"

      - name: Verify Credentials Access
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.fetch.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.fetch.outputs.aws_secret_access_key }}
          AWS_REGION: ${{ steps.fetch.outputs.aws_region }}
        run: |
          set -euo pipefail
          
          echo "🔍 Verifying AWS credentials..."
          
          # Test STS access
          aws sts get-caller-identity --region "$AWS_REGION" > /dev/null 2>&1 && \
            echo "✅ AWS credentials validated (STS accessible)" || \
            echo "⚠️ AWS credentials validation skipped (STS may not be accessible in this context)"
