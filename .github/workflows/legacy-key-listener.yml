name: Legacy Key Listener

on:
  issue_comment:
    types: [created]

  workflow_call: {}

concurrency:
  group: legacy-key-listener-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write

jobs:
  trigger-legacy-cleanup:
    if: ${{ github.event.issue.number == 787 && github.event.comment.body == 'key-installed' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Dispatch legacy-node-cleanup workflow
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = 'legacy-node-cleanup.yml';
            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id,
              ref: 'main',
              inputs: { confirm: 'CLEANUP_LEGACY_NODE' }
            });

      - name: Comment that dispatch was requested (idempotent)
        env:
          REPO: ${{ github.repository }}
          ISSUE_NUM: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RESPONSE='Detected `key-installed` confirmation — requested dispatch of legacy-node-cleanup and will monitor progress.'

          # Check if we already posted this response to this issue
          EXISTING=$(gh api "/repos/${REPO}/issues/${ISSUE_NUM}/comments" --jq ".[] | select(.body | contains(\"key-installed confirmation\")) | .id" 2>/dev/null | head -1 || true)
          if [ -z "$EXISTING" ]; then
            gh issue comment ${ISSUE_NUM} --repo ${REPO} --body "$RESPONSE" || true
          fi
