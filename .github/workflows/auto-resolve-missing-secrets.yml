name: Auto-Resolve Missing Secrets Issue

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes - matches self-heal schedule
  workflow_dispatch:

  workflow_call: {}

concurrency:
  group: auto-resolve-missing-secrets-${{ github.ref }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  auto-resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Check if critical secrets are now present
        uses: actions/github-script@v6
        env:
          RUNNER_MGMT_TOKEN: ${{ secrets.RUNNER_MGMT_TOKEN }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        with:
          script: |
            const missing = [];

            // Check critical secrets for runner self-heal
            if (!process.env.RUNNER_MGMT_TOKEN) {
              missing.push('RUNNER_MGMT_TOKEN');
            }
            if (!process.env.DEPLOY_SSH_KEY) {
              missing.push('DEPLOY_SSH_KEY');
            }

            const { owner, repo } = context.repo;

            if (missing.length === 0) {
              core.info('✅ Critical secrets are present. Looking for missing-secrets issues to resolve...');

              // Find and close the automated missing secrets issue
              const issues = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: 'open',
                per_page: 100,
                labels: 'automation,ops,runners'
              });

              const issueTitle = 'Automated: Missing secrets for self-heal: RUNNER_MGMT_TOKEN, DEPLOY_SSH_KEY';
              const issue = issues.data.find(i => i.title === issueTitle);

              if (issue) {
                core.info(`Found issue #${issue.number}. All required secrets are now present.`);

                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: issue.number,
                  body: `✅ **Automated Resolution**\n\nAll required secrets are now present:\n- ✅ RUNNER_MGMT_TOKEN\n- ✅ DEPLOY_SSH_KEY\n\nThis issue is being automatically closed. The runner self-heal workflow will execute within the next 5 minutes to verify runners are operational.\n\nIf secrets need to be refreshed or issues persist, please comment on this issue or create a new one.\n\n**Automation**: ${new Date().toISOString()}`
                });

                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed'
                });

                core.info(`✅ Closed issue #${issue.number} - all required secrets are configured`);
              } else {
                core.info('No missing-secrets issue found - system is in healthy state');
              }

              return;
            }

            core.info(`ℹ️  Still missing secrets: ${missing.join(', ')}`);
            core.info('Will check again on next scheduled run (5 minutes)');
