name: Phase 3 - Revoke Exposed Keys

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual revocation)'
        required: true
        default: 'true'
      audit_only:
        description: 'Audit-only (identify keys but do not revoke)'
        required: false
        default: 'false'
  schedule:
    # Run daily at 7 AM UTC (after credential rotation at 6 AM)
    - cron: '0 7 * * *'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  revoke-keys:
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure credentials
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR || 'http://127.0.0.1:8200' }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GCP_SA_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # Validate credentials available
          if [ -z "$VAULT_ADDR" ]; then
            echo "ERROR: VAULT_ADDR not set"
            exit 1
          fi
          echo "✅ Credentials configured"

      - name: Run key revocation (audit mode)
        if: github.event.inputs.audit_only == 'true' || github.event_name == 'schedule'
        run: ./scripts/revoke-exposed-keys.sh --dry-run --audit-only
        continue-on-error: true

      - name: Run key revocation (execution mode)
        if: github.event.inputs.dry_run == 'false' && github.event.inputs.audit_only != 'true'
        run: ./scripts/revoke-exposed-keys.sh
        continue-on-error: true

      - name: Generate audit report
        if: always()
        run: |
          echo "## Key Revocation Audit Report"
          echo "- Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "- Audit log:"
          if [ -f logs/revocation-audit.jsonl ]; then
            echo '```json'
            tail -20 logs/revocation-audit.jsonl | jq .
            echo '```'
          fi

      - name: Commit audit logs
        if: always()
        run: |
          git config user.name "automation"
          git config user.email "automation@example.com"
          git add logs/revocation-audit.jsonl || true
          git commit -m "audit: key revocation cycle $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            --author="automation <automation@example.com>" || true
          git push origin main || true

      - name: Send PagerDuty alert (on success)
        if: success() && github.event_name == 'schedule'
        run: |
          if [ -x scripts/pagerduty-integration.sh ]; then
            ./scripts/pagerduty-integration.sh revocation-complete \
              "$(jq -r '.details.keys_processed // 0' logs/revocation-audit.jsonl 2>/dev/null || echo 0)" \
              "GSM/Vault/AWS" || true
          fi

      - name: Send PagerDuty alert (on failure)
        if: failure() && github.event_name == 'schedule'
        run: |
          if [ -x scripts/pagerduty-integration.sh ]; then
            ./scripts/pagerduty-integration.sh rotation-failure \
              "Key revocation failed; see audit trail" || true
          fi

      - name: Close GitHub issue #1950 (if complete)
        if: success() && github.event.inputs.dry_run == 'false'
        run: |
          gh issue close 1950 \
            --repo kushin77/self-hosted-runner \
            -c "Phase 3: Key revocation automation complete. All exposed keys successfully revoked across GSM/Vault/AWS. Audit trail: logs/revocation-audit.jsonl" \
            || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
