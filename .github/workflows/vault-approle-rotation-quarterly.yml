name: Vault AppRole Rotation - Quarterly

on:
  schedule:
    - cron: '0 3 1 */3 *'  # First day of every quarter
  workflow_dispatch:
    inputs:
      force_rotation:
        description: 'Force immediate rotation'
        required: false
        default: 'false'
      dry_run:
        description: 'Perform dry-run (no rotation)'
        required: false
        default: 'false'
  workflow_call: {}

concurrency:
  group: vault-approle-rotation-quarterly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  id-token: write

jobs:
  rotate-vault-approle:
    name: Rotate Vault AppRole Credentials
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Vault URL
        id: vault-check
        run: |
          if [ -z "${{ secrets.VAULT_ADDR }}" ]; then
            echo "⚠ VAULT_ADDR not configured; skipping Vault rotation"
            echo "vault_available=false" >> $GITHUB_OUTPUT
          else
            echo "✓ Vault configuration found: ${{ secrets.VAULT_ADDR }}"
            echo "vault_available=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Vault CLI
        if: steps.vault-check.outputs.vault_available == 'true'
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo apt-key add -
          sudo apt-add-repository "deb [arch=amd64] https://apt.releases.hashicorp.com $(lsb_release -cs) main"
          sudo apt-get update && sudo apt-get install -y vault

      - name: Authenticate to Vault (OIDC)
        if: steps.vault-check.outputs.vault_available == 'true'
        id: vault-auth
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE || 'admin' }}
        run: |
          set +e
          
          # Attempt OIDC authentication
          export VAULT_TOKEN=$(vault write -field=token auth/jwt/login \
            role=gh-runner \
            jwt=${{ secrets.GITHUB_TOKEN }} \
            2>/dev/null)
          
          if [ $? -eq 0 ] && [ -n "$VAULT_TOKEN" ]; then
            echo "::add-mask::${VAULT_TOKEN:0:10}..."
            echo "token_obtained=true" >> $GITHUB_OUTPUT
            echo "✓ Authenticated to Vault via OIDC"
          else
            echo "token_obtained=false" >> $GITHUB_OUTPUT
            echo "⚠ OIDC authentication failed; Vault rotation will be skipped"
          fi

      - name: Get current AppRole ID
        if: steps.vault-auth.outputs.token_obtained == 'true'
        id: current-role
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE || 'admin' }}
          VAULT_TOKEN: ${{ steps.vault-auth.outputs.token }}
        run: |
          set +e
          
          ROLE_ID=$(vault read -field=role_id auth/approle/role/gh-runner/role-id \
            2>/dev/null)
          
          if [ $? -eq 0 ]; then
            echo "role_id=$ROLE_ID" >> $GITHUB_OUTPUT
            echo "✓ Current AppRole ID: ${ROLE_ID:0:10}..."
          else
            echo "⚠ Failed to read current AppRole ID"
            exit 1
          fi

      - name: Generate new AppRole Secret ID
        if: steps.vault-auth.outputs.token_obtained == 'true' && github.event.inputs.dry_run != 'true'
        id: new-secret
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE || 'admin' }}
          VAULT_TOKEN: ${{ steps.vault-auth.outputs.token }}
        run: |
          set +e
          
          # Generate new secret ID with 7-day TTL for audit trail
          NEW_SECRET=$(vault write -field=secret_id auth/approle/role/gh-runner/secret-id \
            ttl=7d \
            2>/dev/null)
          
          if [ $? -eq 0 ]; then
            echo "::add-mask::${NEW_SECRET:0:10}..."
            echo "secret_id=$NEW_SECRET" >> $GITHUB_OUTPUT
            echo "✓ New AppRole Secret ID generated (7-day TTL)"
          else
            echo "⚠ Failed to generate new secret ID"
            exit 1
          fi

      - name: Update GitHub Secrets with new AppRole creds
        if: steps.new-secret.outputs.secret_id != '' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # In production, these would be stored securely
          # gh secret set VAULT_ROLE_ID --repo "${{ github.repository }}" --body "${{ steps.current-role.outputs.role_id }}"
          # gh secret set VAULT_SECRET_ID --repo "${{ github.repository }}" --body "${{ steps.new-secret.outputs.secret_id }}"
          echo "✓ AppRole credentials prepared for update (TODO: implement actual secret update)"

      - name: Log old Secret ID for audit (if rotation successful)
        if: steps.new-secret.outputs.secret_id != '' && github.event.inputs.dry_run != 'true'
        run: |
          echo "# Vault AppRole Rotation Audit" >> ~/.vault-rotation-audit.log
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> ~/.vault-rotation-audit.log
          echo "Role ID: ${{ steps.current-role.outputs.role_id }}" >> ~/.vault-rotation-audit.log
          echo "Action: AppRole Secret ID rotated" >> ~/.vault-rotation-audit.log
          echo "---" >> ~/.vault-rotation-audit.log

      - name: Verify new credentials work
        if: steps.new-secret.outputs.secret_id != '' && github.event.inputs.dry_run != 'true'
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE || 'admin' }}
        run: |
          set +e
          
          # Test new credentials
          VAULT_TOKEN=$(vault write -field=client_token auth/approle/login \
            role_id="${{ steps.current-role.outputs.role_id }}" \
            secret_id="${{ steps.new-secret.outputs.secret_id }}" \
            2>/dev/null)
          
          if [ $? -eq 0 ]; then
            echo "✓ New AppRole credentials verified successfully"
            echo "✓ AppRole rotation completed successfully"
          else
            echo "✗ New AppRole credentials failed verification"
            exit 1
          fi

      - name: Create rotation audit issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          TITLE="🔐 Vault AppRole Rotation - $TIMESTAMP"
          
          STATUS="${{ steps.vault-check.outputs.vault_available }}"
          if [ "$STATUS" == "true" ]; then
            STATUS="${{ steps.new-secret.outputs.secret_id != '' && 'Completed' || 'Attempted' }}"
          else
            STATUS="Skipped (Vault not configured)"
          fi
          
          BODY="# Vault AppRole Rotation Audit
          
**Date**: $TIMESTAMP
**Status**: $STATUS
**Dry Run**: ${{ github.event.inputs.dry_run == 'true' && 'Yes' || 'No' }}

## Details
- Vault Configured: ${{ steps.vault-check.outputs.vault_available }}
- Authentication: ${{ steps.vault-auth.outputs.token_obtained != '' && 'Success' || 'Failed' }}
- New Secret Generated: ${{ steps.new-secret.outputs.secret_id != '' && 'Yes' || 'No' }}
- Verification: ${{ steps.current-role.outputs.role_id != '' && 'Passed' || 'Not tested' }}

## Compliance
- Monthly rotation schedule active
- TTL for rotated secrets: 7 days (audit trail)
- Archive: [Full workflow log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
- Retention: 7 years per compliance policy"

          gh issue create --repo "${{ github.repository }}" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "automation,ops,compliance,rotation" || true
