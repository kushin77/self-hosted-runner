name: Validate Kubernetes manifests

on:
  pull_request:
    paths:
      - 'deploy/**'
      - 'charts/**'

jobs:
  validate:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: validate-manifests-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: self-hosted
    name: Kubeconform validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Install kubeconform
        run: |
          set -euo pipefail
          KC_VER=0.8.8
          retry_command 5 10 sh -c "curl -fsSL \"https://github.com/yannh/kubeconform/releases/download/v${KC_VER}/kubeconform_linux_amd64.tar.gz\" -o /tmp/kc.tgz && tar -xzf /tmp/kc.tgz -C /tmp && mv /tmp/kubeconform /usr/local/bin/kubeconform"

      - name: Validate manifests
        run: |
          set -euo pipefail
          kubeconform -schema-location default -summary deploy/ || true

      - name: Upload report (self-hosted)
        if: contains(runner.labels, 'self-hosted')
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true
          chmod +x ci/scripts/upload_to_minio.sh
          tar -czf kubeconform-report.tar.gz .
