name: Validate Kubernetes manifests

on:
  pull_request:
    paths:
      - 'deploy/**'
      - 'charts/**'

jobs:
  validate:
    runs-on: self-hosted
    name: Kubeconform validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          set -euo pipefail
          KC_VER=0.8.8
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KC_VER}/kubeconform_linux_amd64.tar.gz" -o /tmp/kc.tgz
          tar -xzf /tmp/kc.tgz -C /tmp
          mv /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Validate manifests
        run: |
          set -euo pipefail
          kubeconform -schema-location default -summary deploy/ || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: kubeconform-report
          path: .
