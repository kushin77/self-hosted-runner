name: Validate Kubernetes manifests

on:
  pull_request:
    paths:
      - 'deploy/**'
      - 'charts/**'

jobs:
  validate:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: validate-manifests-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: self-hosted
    name: Kubeconform validation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          set -euo pipefail
          KC_VER=0.8.8
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KC_VER}/kubeconform_linux_amd64.tar.gz" -o /tmp/kc.tgz
          tar -xzf /tmp/kc.tgz -C /tmp
          mv /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Validate manifests
        run: |
          set -euo pipefail
          kubeconform -schema-location default -summary deploy/ || true

      - name: Upload report (self-hosted)
        if: contains(runner.labels, 'self-hosted')
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: |
          set -euo pipefail
          chmod +x ci/scripts/upload_to_minio.sh
          tar -czf kubeconform-report.tar.gz .
          URL=$(./ci/scripts/upload_to_minio.sh kubeconform-report.tar.gz)
          echo "Kubeconform report uploaded to: $URL"

      - name: Upload report (hosted fallback)
        if: "!contains(runner.labels, 'self-hosted')"
        uses: actions/upload-artifact@v4
        with:
          name: kubeconform-report
          path: .
