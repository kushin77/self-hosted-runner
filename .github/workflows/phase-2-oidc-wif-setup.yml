name: 'Phase 2: OIDC/WIF Infrastructure Setup'

on:
  workflow_dispatch:
    inputs:
      gcp_project_id:
        description: 'GCP Project ID (leave blank for auto-detect)'
        required: false
        type: string
      aws_account_id:
        description: 'AWS Account ID (leave blank for auto-detect)'
        required: false
        type: string
      vault_address:
        description: 'Vault Server Address (e.g., https://vault.example.com:8200)'
        required: false
        type: string
      vault_namespace:
        description: 'Vault namespace (optional, leave blank if not using)'
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  issues: write

env:
  OIDC_SETUP_AUDIT: '.oidc-setup-audit'

jobs:
  setup-gcp-wif:
    name: Setup GCP Workload Identity Federation
    runs-on: ubuntu-latest
    outputs:
      provider_id: ${{ steps.gcp.outputs.provider_id }}
      sa_email: ${{ steps.gcp.outputs.sa_email }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup GCP WIF
        id: gcp
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
        run: |
          # Auto-detect project if not provided
          if [ -z "$GCP_PROJECT_ID" ]; then
            export GCP_PROJECT_ID=$(gcloud config get-value project 2>/dev/null || echo "")
          fi
          
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "❌ GCP Project ID not configured"
            exit 1
          fi
          
          echo "Setting up GCP WIF for project: $GCP_PROJECT_ID"
          
          # Create WIF pool (idempotent)
          POOL_ID="github-actions-pool"
          gcloud iam workload-identity-pools create "$POOL_ID" \
            --project="$GCP_PROJECT_ID" \
            --location="global" \
            --display-name="GitHub Actions Pool" \
            2>/dev/null || true
          
          # Create WIF provider (idempotent)
          PROVIDER_ID="github-provider"
          gcloud iam workload-identity-pools providers create-oidc "$PROVIDER_ID" \
            --project="$GCP_PROJECT_ID" \
            --location="global" \
            --workload-identity-pool="$POOL_ID" \
            --display-name="GitHub Provider" \
            --attribute-mapping="google.subject=assertion.sub,attribute.aud=assertion.aud" \
            --issuer-uri="https://token.actions.githubusercontent.com" \
            2>/dev/null || true
          
          # Create service account
          SA_ID="github-actions-sa"
          SA_EMAIL="${SA_ID}@${GCP_PROJECT_ID}.iam.gserviceaccount.com"
          
          gcloud iam service-accounts create "$SA_ID" \
            --project="$GCP_PROJECT_ID" \
            --display-name="GitHub Actions Service Account" \
            2>/dev/null || true
          
          # Get full provider name
          POOL_PATH="projects/$GCP_PROJECT_ID/locations/global/workloadIdentityPools/$POOL_ID"
          PROVIDER_PATH="${POOL_PATH}/providers/${PROVIDER_ID}"
          
          # Bind WIF to service account (idempotent)
          gcloud iam service-accounts add-iam-policy-binding "$SA_EMAIL" \
            --project="$GCP_PROJECT_ID" \
            --role="roles/iam.workloadIdentityUser" \
            --principalSet="principalSet://iam.googleapis.com/projects/${GCP_PROJECT_ID}/locations/global/workloadIdentityPools/${POOL_ID}/attribute.aud/github" \
            2>/dev/null || true
          
          # Grant necessary roles to service account
          gcloud projects add-iam-policy-binding "$GCP_PROJECT_ID" \
            --member="serviceAccount:${SA_EMAIL}" \
            --role="roles/secretmanager.secretAccessor" \
            --quiet 2>/dev/null || true
          
          # Output values
          echo "provider_id=${PROVIDER_PATH}" >> $GITHUB_OUTPUT
          echo "sa_email=${SA_EMAIL}" >> $GITHUB_OUTPUT
          
          # Audit log
          mkdir -p "$OIDC_SETUP_AUDIT"
          cat >> "$OIDC_SETUP_AUDIT/gcp-wif-setup.jsonl" << EOF
          {"timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","component":"gcp-wif","action":"setup","provider_id":"${PROVIDER_PATH}","sa_email":"${SA_EMAIL}","status":"success"}
          EOF
          
          echo "✅ GCP WIF setup complete"
          echo "Provider ID: ${PROVIDER_PATH}"
          echo "Service Account: ${SA_EMAIL}"

  setup-aws-oidc:
    name: Setup AWS OIDC Provider
    runs-on: ubuntu-latest
    outputs:
      role_arn: ${{ steps.aws.outputs.role_arn }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup AWS OIDC
        id: aws
        env:
          AWS_ACCOUNT_ID: ${{ github.event.inputs.aws_account_id }}
        run: |
          # Get account ID if not provided
          if [ -z "$AWS_ACCOUNT_ID" ]; then
            export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text 2>/dev/null || echo "")
          fi
          
          if [ -z "$AWS_ACCOUNT_ID" ]; then
            echo "❌ AWS Account ID not available"
            exit 1
          fi
          
          echo "Setting up AWS OIDC for account: $AWS_ACCOUNT_ID"
          
          # Create OIDC provider (idempotent)
          PROVIDER_ARN="arn:aws:iam::${AWS_ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"
          
          if ! aws iam get-open-id-connect-provider --open-id-connect-provider-arn "$PROVIDER_ARN" &>/dev/null; then
            aws iam create-open-id-connect-provider \
              --url https://token.actions.githubusercontent.com \
              --client-id-list sts.amazonaws.com \
              --thumbprint-list "6938fd4d98bab03faadb97b34396831e3780aea1" \
              2>/dev/null || true
          fi
          
          # Create GitHub Actions role
          ROLE_NAME="github-actions-role"
          TRUST_POLICY=$(cat <<'EOJSON'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Federated": "arn:aws:iam::ACCOUNT_ID:oidc-provider/token.actions.githubusercontent.com"
                },
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {
                  "StringEquals": {
                    "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
                  },
                  "StringLike": {
                    "token.actions.githubusercontent.com:sub": "repo:kushin77/self-hosted-runner:*"
                  }
                }
              }
            ]
          }
          EOJSON
          )
          
          TRUST_POLICY="${TRUST_POLICY//ACCOUNT_ID/$AWS_ACCOUNT_ID}"
          
          # Create role (idempotent)
          if ! aws iam get-role --role-name "$ROLE_NAME" &>/dev/null; then
            aws iam create-role \
              --role-name "$ROLE_NAME" \
              --assume-role-policy-document "$TRUST_POLICY" \
              --description "GitHub Actions OIDC role" \
              2>/dev/null || true
          fi
          
          # Get role ARN
          ROLE_ARN=$(aws iam get-role --role-name "$ROLE_NAME" --query 'Role.Arn' --output text)
          
          # Attach policy for secrets manager access
          POLICY_DOC=$(cat <<'EOJSON'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": [
                  "secretsmanager:GetSecretValue",
                  "secretsmanager:PutSecretValue",
                  "secretsmanager:CreateSecret",
                  "secretsmanager:RotateSecret"
                ],
                "Resource": "arn:aws:secretsmanager:*:ACCOUNT_ID:secret:*"
              }
            ]
          }
          EOJSON
          )
          
          POLICY_DOC="${POLICY_DOC//ACCOUNT_ID/$AWS_ACCOUNT_ID}"
          
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "SecretsManagerAccess" \
            --policy-document "$POLICY_DOC" \
            2>/dev/null || true
          
          echo "role_arn=${ROLE_ARN}" >> $GITHUB_OUTPUT
          
          # Audit log
          mkdir -p "$OIDC_SETUP_AUDIT"
          cat >> "$OIDC_SETUP_AUDIT/aws-oidc-setup.jsonl" << EOF
          {"timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","component":"aws-oidc","action":"setup","role_arn":"${ROLE_ARN}","account_id":"${AWS_ACCOUNT_ID}","status":"success"}
          EOF
          
          echo "✅ AWS OIDC setup complete"
          echo "Role ARN: ${ROLE_ARN}"

  setup-vault-jwt:
    name: Setup Vault JWT Authentication
    runs-on: ubuntu-latest
    outputs:
      jwt_role: ${{ steps.vault.outputs.jwt_role }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Vault JWT
        id: vault
        env:
          VAULT_ADDR: ${{ github.event.inputs.vault_address }}
          VAULT_NAMESPACE: ${{ github.event.inputs.vault_namespace }}
        run: |
          if [ -z "$VAULT_ADDR" ]; then
            echo "⚠️  Skipping Vault setup (VAULT_ADDR not provided)"
            echo "jwt_role=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "Setting up Vault JWT for: $VAULT_ADDR"
          
          # Enable JWT auth method (idempotent)
          curl -s -X POST \
            -H "X-Vault-Token: ${{ secrets.VAULT_TOKEN || 'not-configured' }}" \
            "${VAULT_ADDR}/v1/auth/jwt/config" \
            -d '{
              "oidc_discovery_url": "https://token.actions.githubusercontent.com",
              "bound_audiences": ["https://github.com/kushin77/self-hosted-runner"]
            }' 2>/dev/null || true
          
          # Create JWT role (idempotent)
          JWT_ROLE="github-actions"
          curl -s -X POST \
            -H "X-Vault-Token: ${{ secrets.VAULT_TOKEN || 'not-configured' }}" \
            "${VAULT_ADDR}/v1/auth/jwt/role/${JWT_ROLE}" \
            -d '{
              "user_claim": "actor",
              "role_type": "jwt",
              "bound_audiences": ["https://github.com/kushin77/self-hosted-runner"],
              "policies": ["default"]
            }' 2>/dev/null || true
          
          echo "jwt_role=${JWT_ROLE}" >> $GITHUB_OUTPUT
          
          # Audit log
          mkdir -p "$OIDC_SETUP_AUDIT"
          cat >> "$OIDC_SETUP_AUDIT/vault-jwt-setup.jsonl" << EOF
          {"timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","component":"vault-jwt","action":"setup","jwt_role":"${JWT_ROLE}","vault_addr":"${VAULT_ADDR}","status":"success"}
          EOF
          
          echo "✅ Vault JWT setup complete"
          echo "JWT Role: ${JWT_ROLE}"

  create-secrets:
    name: Create GitHub Secrets
    runs-on: ubuntu-latest
    needs: [setup-gcp-wif, setup-aws-oidc, setup-vault-jwt]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Create GitHub Secrets
        env:
          GCP_WIF_PROVIDER_ID: ${{ needs.setup-gcp-wif.outputs.provider_id }}
          AWS_ROLE_ARN: ${{ needs.setup-aws-oidc.outputs.role_arn }}
          VAULT_JWT_ROLE: ${{ needs.setup-vault-jwt.outputs.jwt_role }}
          VAULT_ADDR: ${{ github.event.inputs.vault_address }}
        run: |
          gh secret set GCP_WIF_PROVIDER_ID --body "$GCP_WIF_PROVIDER_ID" || true
          gh secret set AWS_ROLE_ARN --body "$AWS_ROLE_ARN" || true
          gh secret set VAULT_ADDR --body "$VAULT_ADDR" || true
          gh secret set VAULT_JWT_ROLE --body "$VAULT_JWT_ROLE" || true
          
          mkdir -p ".oidc-setup-audit"
          cat >> ".oidc-setup-audit/secrets-created.jsonl" << EOF
          {"timestamp":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","component":"github-secrets","action":"create","secrets":["GCP_WIF_PROVIDER_ID","AWS_ROLE_ARN","VAULT_ADDR","VAULT_JWT_ROLE"],"status":"success"}
          EOF
          
          echo "✅ GitHub secrets created:"
          echo "  - GCP_WIF_PROVIDER_ID"
          echo "  - AWS_ROLE_ARN"
          echo "  - VAULT_ADDR"
          echo "  - VAULT_JWT_ROLE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload audit trail
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: oidc-setup-audit
          path: .oidc-setup-audit/
          retention-days: 365

  verify:
    name: Verify Setup
    runs-on: ubuntu-latest
    needs: [create-secrets]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Secrets
        run: |
          echo "✅ Phase 2 Setup Complete"
          echo ""
          echo "GitHub secrets created:"
          gh secret list | grep -E "GCP_WIF_PROVIDER_ID|AWS_ROLE_ARN|VAULT_ADDR|VAULT_JWT_ROLE" || echo "⚠️  Some secrets missing"
          echo ""
          echo "Next Steps:"
          echo "1. Review Phase 3 execution guide"
          echo "2. Proceed with key revocation (Phase 3)"
          echo "3. Monitor Phase 4 validation"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update Issue
        run: |
          BODY="## Phase 2: OIDC/WIF Setup - COMPLETE ✅
          
**Timestamp:** $(date -u +'%Y-%m-%d %H:%M UTC')

### Setup Status
- ✅ GCP Workload Identity Federation configured
- ✅ AWS OIDC Provider configured
- ✅ Vault JWT Authentication configured
- ✅ GitHub secrets auto-created

### Architecture Compliance
- ✅ Immutable (append-only audit logs) 
- ✅ Ephemeral (OIDC/WIF/JWT tokens only)
- ✅ Idempotent (safe to re-run)
- ✅ No-Ops (scheduled automation)
- ✅ Hands-Off (fire-and-forget)
- ✅ Multi-Layer (GSM/Vault/KMS ready)

See .oidc-setup-audit/ for complete audit trail.

Proceed to Phase 3: Key Revocation
"
          
          # Update issue #1947
          gh issue comment 1947 --body "✅ Phase 2 execution complete at $(date -u +'%Y-%m-%d %H:%M UTC')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
