---
name: CI Template

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
    secrets: {}

jobs:
  build:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install deps
        run: |
          if [ -f package-lock.json ]; then npm ci; elif [ -f package.json ]; then npm install --no-audit --prefer-offline; fi

      - name: Run tests (with retry)
        run: |
          if [ -f package.json ]; then
            n=0
            until [ $n -ge 2 ]; do
              npm test --silent && break
              n=$((n+1))
              echo "Test run $n failed, retrying..."
            done
            if [ $n -ge 2 ]; then
              echo "Tests failed after retries"; exit 1
            fi
          else
            echo "No package.json, skipping tests"
          fi
