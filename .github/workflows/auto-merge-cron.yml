name: Auto Merge & CI Rerun
permissions:
  contents: read
  id-token: write
  actions: read

on:
  schedule:
    - cron: '*/30 * * * *' # every 30 minutes
  workflow_dispatch: {}

  workflow_call: {}

concurrency:
  group: auto-merge-cron-${{ github.ref }}
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true


      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq
          # gh CLI is available in GitHub runners; ensure it's authenticated via GH_TOKEN

      - name: Run auto-merge worker
        env:
          REPO_FULL: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name || github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/automation/auto_merge_worker.sh
          scripts/automation/auto_merge_worker.sh

      - name: Package auto-merge logs for MinIO
        if: always()
        run: |
          mkdir -p /tmp/minio-uploads
          tar czf /tmp/minio-uploads/auto-merge-log.tar.gz /tmp/auto_merge*.log 2>/dev/null || echo "No logs to package"

      - name: Upload auto-merge logs to MinIO
        if: always() && contains(runner.labels, 'self-hosted')
        run: |
          ci/scripts/upload_to_minio.sh /tmp/minio-uploads/auto-merge-log.tar.gz auto-merge-log.tar.gz || echo "MinIO upload failed; will use fallback"

      - name: Upload log (hosted fallback)
        if: always() && !contains(runner.labels, 'self-hosted')
        uses: actions/upload-artifact@v4
        with:
          name: auto-merge-log
          path: /tmp/auto_merge*.log
