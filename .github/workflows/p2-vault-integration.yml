name: P2 Vault Integration
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Preflight Checks"]
    types: [completed]

jobs:
  vault-integration:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: p2-vault-integration-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx (self-hosted)
        if: contains(runner.labels, 'self-hosted')
        run: |
          chmod +x ci/scripts/setup-buildx.sh
          ci/scripts/setup-buildx.sh
      - name: Set up Docker Buildx (hosted fallback)
        if: not(contains(runner.labels, 'self-hosted'))
        uses: docker/setup-buildx-action@v2
      - name: Run smoke tests (staging)
        run: |
          bash tests/smoke/run-smoke-tests.sh staging
