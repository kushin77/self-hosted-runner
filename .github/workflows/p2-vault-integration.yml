name: p2-managed-auth-vault-integration

on:
  workflow_dispatch: {}
  push:
    branches: [ feature/p2-managed-mode, main, feature/p2-vault-ci ]

jobs:
  vault-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use AppRole credentials (if present)
        if: ${{ secrets.VAULT_ADDR != '' && secrets.VAULT_ROLE_ID != '' && secrets.VAULT_SECRET_ID != '' }}
        run: |
          echo "Using AppRole credentials from GitHub Secrets"
          echo "VAULT_ADDR=${{ secrets.VAULT_ADDR }}" >> $GITHUB_ENV
          ROLE_ID="${{ secrets.VAULT_ROLE_ID }}"
          SECRET_ID="${{ secrets.VAULT_SECRET_ID }}"
          RESP=$(curl -s -X POST "${{ secrets.VAULT_ADDR }}/v1/auth/approle/login" -d "{\"role_id\":\"$ROLE_ID\",\"secret_id\":\"$SECRET_ID\"}")
          TOKEN=$(echo "$RESP" | python -c 'import sys, json; print(json.load(sys.stdin)["auth"]["client_token"])')
          echo "VAULT_TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "SECRETS_BACKEND=vault" >> $GITHUB_ENV

      - name: Use CI-provided Vault token (if present and AppRole absent)
        if: ${{ secrets.VAULT_ADDR != '' && secrets.VAULT_TOKEN != '' && (secrets.VAULT_ROLE_ID == '' || secrets.VAULT_SECRET_ID == '') }}
        run: |
          echo "Using provided Vault token from GitHub Secrets"
          echo "VAULT_ADDR=${{ secrets.VAULT_ADDR }}" >> $GITHUB_ENV
          echo "VAULT_TOKEN=${{ secrets.VAULT_TOKEN }}" >> $GITHUB_ENV
          echo "SECRETS_BACKEND=vault" >> $GITHUB_ENV

      - name: Start Vault dev server (fallback)
        if: ${{ env.VAULT_ADDR == '' && env.VAULT_TOKEN == '' && (secrets.VAULT_ADDR == '' || secrets.VAULT_TOKEN == '') }}
        run: |
          docker run --cap-add=IPC_LOCK -d --name vault -p 8200:8200 vault:1.13.0 server -dev -dev-root-token-id=root

      - name: Wait for Vault (when started locally)
        if: ${{ env.VAULT_ADDR == '' && env.VAULT_TOKEN == '' && (secrets.VAULT_ADDR == '' || secrets.VAULT_TOKEN == '') }}
        run: |
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:8200/v1/sys/health >/dev/null 2>&1; then
              echo "Vault is ready"; break
            fi
            sleep 1
          done

      - name: Setup Vault env (local fallback)
        if: ${{ env.VAULT_ADDR == '' && env.VAULT_TOKEN == '' && (secrets.VAULT_ADDR == '' || secrets.VAULT_TOKEN == '') }}
        run: |
          echo "VAULT_ADDR=http://127.0.0.1:8200" >> $GITHUB_ENV
          echo "VAULT_TOKEN=root" >> $GITHUB_ENV
          echo "SECRETS_BACKEND=vault" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install managed-auth deps
        run: |
          cd services/managed-auth
          npm ci --no-audit --no-fund || npm install

      - name: Run provision_flow smoke test (Vault)
        env:
          VAULT_ADDR: ${{ env.VAULT_ADDR }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
          SECRETS_BACKEND: ${{ env.SECRETS_BACKEND }}
        run: |
          cd services/managed-auth/tests
          bash provision_flow.sh

      - name: Tear down Vault
        if: always()
        run: |
          docker rm -f vault || true
