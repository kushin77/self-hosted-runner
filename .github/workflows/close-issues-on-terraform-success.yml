name: Close orchestration issues on Terraform success

on:
  workflow_run:
    workflows:
      - "Terraform Auto Apply (Automated, Credential-driven)"
      - "Terraform Manual Apply (manual, guarded)"
    types: [completed]

permissions:
  issues: write

jobs:
  close-issues:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close orchestration issues
        uses: actions/github-script@v7
        with:
          script: |
            const issuesToClose = [1286, 1309, 1328, 1293];
            for (const num of issuesToClose) {
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  body: '✅ Terraform apply completed successfully via `' + context.payload.workflow_run.name + '`. Closing orchestration task — reopen if follow-up is required.'
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  state: 'closed'
                });
              } catch (e) {
                console.log(`Issue #${num}: ${e.message}`);
              }
            }
