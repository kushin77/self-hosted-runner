name: Close orchestration issues on Terraform success

on:
  workflow_run:
    workflows:
      - "Terraform Auto Apply (ElastiCache)"
    types: [completed]

permissions:
  issues: write

jobs:
  close-issues:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Comment and close orchestration issues
        uses: actions/github-script@v6
        with:
          script: |
            const issuesToClose = [1286, 1309];
            for (const num of issuesToClose) {
              github.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                body: 'Terraform apply completed successfully. Closing orchestration task — reopen if follow-up is required.'
              });
              github.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                state: 'closed'
              });
            }
