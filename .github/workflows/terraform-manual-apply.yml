name: Terraform Manual Apply (manual, guarded)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm you want to run apply (safety)'
        required: true
      dry_run:
        description: 'If true, perform backend-free plan only'
        required: false
        default: 'false'

permissions:
  contents: read
  actions: write
  issues: write
  id-token: write

jobs:
  fetch-gsm-secrets:
    name: Fetch secrets from GCP GSM
    runs-on: ubuntu-latest
    outputs:
      aws_access_key_id: ${{ steps.fetch.outputs.aws_access_key_id }}
      aws_secret_access_key: ${{ steps.fetch.outputs.aws_secret_access_key }}
      aws_oidc_role_arn: ${{ steps.fetch.outputs.aws_oidc_role_arn }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        continue-on-error: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        continue-on-error: true

      - name: Fetch AWS credentials from GSM
        id: fetch
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'gcp-eiq' }}
        run: |
          set -euo pipefail
          gcloud services enable secretmanager.googleapis.com --project="$GCP_PROJECT_ID" || true
          
          aws_key=$(gcloud secrets versions access latest --secret="aws-access-key-id" --project="$GCP_PROJECT_ID" 2>/dev/null || echo "")
          aws_secret=$(gcloud secrets versions access latest --secret="aws-secret-access-key" --project="$GCP_PROJECT_ID" 2>/dev/null || echo "")
          aws_oidc=$(gcloud secrets versions access latest --secret="aws-oidc-role-arn" --project="$GCP_PROJECT_ID" 2>/dev/null || echo "")
          
          echo "aws_access_key_id=${aws_key}" >> $GITHUB_OUTPUT
          echo "aws_secret_access_key=${aws_secret}" >> $GITHUB_OUTPUT
          echo "aws_oidc_role_arn=${aws_oidc}" >> $GITHUB_OUTPUT
        continue-on-error: true

  manual-apply:
    name: Terraform Manual Apply
    runs-on: ubuntu-latest
    needs: fetch-gsm-secrets
    steps:
      - name: Guard - confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "YES" ]; then
            echo "Confirmation not provided; canceling run."; exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.4.0'

      - name: Preflight: backend-free init/plan
        run: |
          set -euo pipefail
          cd terraform
          terraform init -input=false -backend=false
          terraform plan -input=false -out=tfplan-dry || true

      - name: Configure AWS via OIDC (if enabled)
        if: ${{ secrets.USE_OIDC == 'true' && secrets.AWS_OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}

      - name: Configure AWS via OIDC from GSM
        if: ${{ secrets.USE_OIDC != 'true' && needs.fetch-gsm-secrets.outputs.aws_oidc_role_arn != '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ needs.fetch-gsm-secrets.outputs.aws_oidc_role_arn }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}

      - name: Configure static AWS creds (fallback)
        if: ${{ secrets.USE_OIDC != 'true' && secrets.AWS_ACCESS_KEY_ID != '' }}
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}" >> $GITHUB_ENV

      - name: Configure AWS creds from GSM (if available)
        if: ${{ secrets.USE_OIDC != 'true' && secrets.AWS_ACCESS_KEY_ID == '' && needs.fetch-gsm-secrets.outputs.aws_access_key_id != '' }}
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ needs.fetch-gsm-secrets.outputs.aws_access_key_id }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ needs.fetch-gsm-secrets.outputs.aws_secret_access_key }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}" >> $GITHUB_ENV

      - name: Decide apply vs dry-run
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run requested; skipping full apply."; exit 0
          fi

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan

      - name: Close orchestration issues on success
        if: ${{ success() }}
        run: |
          gh issue comment 1309 --body "Terraform apply completed successfully — automation will close related orchestration issues." --repo kushin77/self-hosted-runner || true
          gh issue comment 1286 --body "Orchestration apply succeeded; closing this orchestration issue." --repo kushin77/self-hosted-runner || true
          gh issue close 1286 --repo kushin77/self-hosted-runner || true
