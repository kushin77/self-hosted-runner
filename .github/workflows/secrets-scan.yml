name: Secrets scan (gitleaks)
permissions:
  contents: read
  id-token: write
  actions: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  gitleaks-scan:
    name: Run gitleaks secret scan
    concurrency:
      group: gitleaks-scan-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks scan
        uses: zricethezav/gitleaks-action@v1
        with:
          args: detect --source . --config .gitleaks.toml --report-format json --report-path gitleaks-report.json --verbose

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Check for high-severity leaks
        if: failure()
        run: |
          if [ -f gitleaks-report.json ]; then
            echo "Gitleaks found issues. Summary:"
            jq '[.[] | select(.severity=="HIGH" or .severity=="CRITICAL")] | length' gitleaks-report.json
          fi
