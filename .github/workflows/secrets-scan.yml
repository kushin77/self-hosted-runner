name: Secrets scan (gitleaks)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  gitleaks-scan:
    name: Run gitleaks secret scan
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GL_VER=8.18.2
          if [ ! -f /usr/local/bin/gitleaks ] || [ "$(gitleaks version | head -n 1)" != "$GL_VER" ]; then
            echo "Installing gitleaks $GL_VER..."
            curl -fsSL "https://github.com/zricethezav/gitleaks/releases/download/v${GL_VER}/gitleaks_${GL_VER}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
            tar -xzf /tmp/gitleaks.tgz -C /tmp
            sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
            sudo chmod +x /usr/local/bin/gitleaks
          else
            echo "gitleaks $GL_VER already installed"
          fi

      - name: Run gitleaks
        run: |
          set -euo pipefail
          gitleaks detect --source . --report-path gitleaks-report.json || true

      - name: Upload report to MinIO
        run: |
          set -euo pipefail
          if [ -z "${MINIO_ENDPOINT:-}" ]; then
            echo "MINIO_ENDPOINT not set; aborting upload"
            exit 1
          fi
          ./ci/scripts/upload_to_minio.sh \
            --endpoint "$MINIO_ENDPOINT" \
            --access-key "$MINIO_ACCESS_KEY" \
            --secret-key "$MINIO_SECRET_KEY" \
            --bucket "$MINIO_BUCKET" \
            --file "gitleaks-report.json" \
            --key "gitleaks/${{ github.sha }}/gitleaks-report.json"
