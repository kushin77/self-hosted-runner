name: Secrets scan (gitleaks)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  gitleaks-scan:
    name: Run gitleaks secret scan
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: gitleaks-scan-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: self-hosted
    env:
      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup gitleaks
        run: |
          set -euo pipefail
          GL_VER=8.18.2
          BIN_DIR="$HOME/.local/bin"
          mkdir -p "$BIN_DIR"
          
          if [ ! -f "$BIN_DIR/gitleaks" ] || [ "$("$BIN_DIR/gitleaks" version | head -n 1)" != "$GL_VER" ]; then
            echo "Installing gitleaks $GL_VER to $BIN_DIR..."
            curl -fsSL "https://github.com/zricethezav/gitleaks/releases/download/v${GL_VER}/gitleaks_${GL_VER}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
            tar -xzf /tmp/gitleaks.tgz -C /tmp
            mv /tmp/gitleaks "$BIN_DIR/gitleaks"
            chmod +x "$BIN_DIR/gitleaks"
          else
            echo "gitleaks $GL_VER already installed in $BIN_DIR"
          fi
          
          echo "$BIN_DIR" >> $GITHUB_PATH

      - name: Run gitleaks
        run: |
          set -euo pipefail
          gitleaks detect --source . --report-path gitleaks-report.json || true

      - name: Upload report to MinIO
        if: env.MINIO_ENDPOINT != ''
        run: |
          set -euo pipefail
          ./ci/scripts/upload_to_minio.sh \
            gitleaks-report.json \
            "gitleaks/${{ github.sha }}/gitleaks-report.json"

      - name: Upload report as artifact (fallback)
        if: env.MINIO_ENDPOINT == ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
