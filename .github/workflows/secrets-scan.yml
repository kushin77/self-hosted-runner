name: Secrets scan (gitleaks)
permissions:
  contents: read
  id-token: write
  actions: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  gitleaks-scan:
    name: Run gitleaks secret scan
    concurrency:
      group: gitleaks-scan-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup gitleaks with robust retry
        run: |
          set -eo pipefail
          GL_VER="8.18.2"
          BIN_DIR="$HOME/.local/bin"
          mkdir -p "$BIN_DIR"

          install_gitleaks() {
            local attempt=1
            local max_attempts=3
            local release_url="https://github.com/zricethezav/gitleaks/releases/download/v${GL_VER}/gitleaks_${GL_VER}_linux_x64.tar.gz"
            
            while [ $attempt -le $max_attempts ]; do
              echo "[Attempt $attempt/$max_attempts] Downloading gitleaks $GL_VER..."
              
              # Download with retry and status check
              if curl -fsSL -w "\n%{http_code}" "$release_url" -o /tmp/gitleaks.tgz.tmp > /tmp/curl_status.txt 2>&1; then
                http_code=$(tail -1 /tmp/curl_status.txt | tr -d '\r')
                if [ "$http_code" = "200" ]; then
                  mv /tmp/gitleaks.tgz.tmp /tmp/gitleaks.tgz
                  
                  # Extract and verify
                  if tar -tzf /tmp/gitleaks.tgz > /dev/null 2>&1; then
                    tar -xzf /tmp/gitleaks.tgz -C /tmp
                    if [ -f /tmp/gitleaks ]; then
                      mv /tmp/gitleaks "$BIN_DIR/gitleaks"
                      chmod +x "$BIN_DIR/gitleaks"
                      rm -f /tmp/gitleaks.tgz /tmp/curl_status.txt
                      echo "✓ Successfully installed gitleaks $GL_VER"
                      return 0
                    fi
                  else
                    echo "⚠ tar verification failed on attempt $attempt"
                  fi
                else
                  echo "⚠ HTTP $http_code on attempt $attempt"
                fi
              else
                echo "⚠ curl failed on attempt $attempt"
              fi
              
              attempt=$((attempt + 1))
              if [ $attempt -le $max_attempts ]; then
                sleep_time=$((attempt * 2))
                echo "Retrying in ${sleep_time}s..."
                sleep $sleep_time
              fi
            done
            
            return 1
          }

          # Check if already installed with correct version
          if [ -f "$BIN_DIR/gitleaks" ]; then
            current_version=$("$BIN_DIR/gitleaks" version 2>/dev/null | head -n 1 || echo "")
            if [ "$current_version" = "$GL_VER" ]; then
              echo "✓ gitleaks $GL_VER already cached"
            else
              echo "⚠ Version mismatch, reinstalling..."
              rm -f "$BIN_DIR/gitleaks"
              if ! install_gitleaks; then
                echo "✗ Failed to install gitleaks"
                exit 1
              fi
            fi
          else
            if ! install_gitleaks; then
              echo "✗ Failed to install gitleaks after $max_attempts attempts"
              exit 1
            fi
          fi

          echo "$BIN_DIR" >> $GITHUB_PATH
          gitleaks version

      - name: Run gitleaks scan
        run: |
          set -eo pipefail
          echo "Starting gitleaks scan..."
          gitleaks detect --source . --verbose --report-path gitleaks-report.json || exit_code=$?
          
          if [ -f gitleaks-report.json ]; then
            echo "Scan completed. Report:"
            wc -l gitleaks-report.json
          else
            echo "No report generated (exit code: ${exit_code:-0})"
          fi

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Check for critical leaks
        if: always()
        run: |
          if [ ! -f gitleaks-report.json ]; then
            echo "No report to check"
            exit 0
          fi
          
          critical_count=$(jq '[.[] | select(.severity=="CRITICAL")] | length' gitleaks-report.json 2>/dev/null || echo 0)
          if [ "$critical_count" -gt 0 ]; then
            echo "⚠ Found $critical_count CRITICAL leaks"
            jq '.[] | select(.severity=="CRITICAL") | {file:.file, line:.lineNumber, rule:.rule}' gitleaks-report.json
          fi
