name: Operator GCP Key Reminder

on:
  schedule:
    - cron: '0 9 * * *' # daily at 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  remind-operator:
    name: Remind Operator to Ingest GCP Key
    runs-on: ubuntu-latest
    steps:
      - name: Check issue #1239 and post reminder if needed
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = 1239;
            const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number });
            const ingested = comments.some(c => c.body && c.body.includes('ingested: true'));
            if (ingested) {
              console.log('Operator ingestion already recorded; skipping reminder.');
            } else {
              const body = `Friendly reminder from automation: please ingest the GCP service-account.json and set the repository secret GCP_SERVICE_ACCOUNT_KEY, then comment "ingested: true" on this issue to trigger the workflows. See SELF_HEALING_SYSTEM_100X.md for instructions.`;
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number, body });
              console.log('Posted reminder to issue #' + issue_number);
            }
