name: Auto-close Harbor smoke issue

# closes issue 620 once the harbor-integration-smoke workflow passes
on:
  workflow_run:
    workflows: ["Harbor Integration Smoke (kind)"]
    types: [completed]

jobs:
  close-issue:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Idempotently close Harbor smoke issues
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Close known issue 620 if open
          if gh issue list --repo ${REPO} --state open --json number --jq '.[] | select(.number==620) | .number' | grep -q .; then
            gh issue update 620 --repo ${REPO} --state closed --state_reason completed || true
          fi

          # Also close any open issues labeled 'harbor-smoke' or 'harbor-integration'
          for i in $(gh issue list --repo ${REPO} --label "harbor-smoke" --state open --json number --jq '.[].number' 2>/dev/null || true); do
            gh issue update ${i} --repo ${REPO} --state closed --state_reason completed || true
          done
          for i in $(gh issue list --repo ${REPO} --label "harbor-integration" --state open --json number --jq '.[].number' 2>/dev/null || true); do
            gh issue update ${i} --repo ${REPO} --state closed --state_reason completed || true
          done

          # Post a status comment to tracking issue 1064 for visibility (idempotent via edit)
          TRACK=1064
          REPORT="Harbor integration smoke workflow succeeded — auto-closed related issues."
          existing=$(gh api "/repos/${REPO}/issues/${TRACK}/comments" --jq ".[] | select(.body | contains(\"Harbor integration smoke workflow succeeded\")) | .id" 2>/dev/null | head -1 || true)
          if [ -n "$existing" ]; then
            gh api "/repos/${REPO}/issues/comments/${existing}" -X PATCH -f body="$REPORT" || true
          else
            gh issue comment ${TRACK} --repo ${REPO} --body "$REPORT" || true
          fi
