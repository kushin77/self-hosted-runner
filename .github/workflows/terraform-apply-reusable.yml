name: 'Reusable: Terraform Apply with Approval Gates + Multi-Cloud + Multi-Credential'

# ═══════════════════════════════════════════════════════════════════════════════
# TERRAFORM APPLY REUSABLE WORKFLOW
# ═══════════════════════════════════════════════════════════════════════════════
# Features:
#   - Multi-cloud (AWS/GCP/Azure) with OIDC federation
#   - Multi-layer credentials: OIDC → Vault → GSM/KMS fallback
#   - Manual approval gates with team authorization
#   - Immutable: Change audit trails, no rollbacks without approval
#   - Ephemeral: Auto-revoke credentials post-application
#   - Idempotent: PID-locked, safe to retry on failure
#   - Hands-off: Fully orchestrated with state-machine enforcement
#   - Audit logging: Immutable JSON logs to GCS (append-only)
#
# Usage:
#   - call: kushin77/self-hosted-runner/.github/workflows/terraform-apply-reusable.yml@main
#     with:
#       tf_dir: terraform/prod
#       plan_file: tfplan-xxx.json
#       require_approval: true
#       approval_team: infrastructure-leads
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_call:
    inputs:
      tf_dir:
        description: 'Terraform directory to apply'
        required: true
        type: string
      plan_file:
        description: 'Path to plan file (from plan workflow)'
        required: false
        type: string
      aws_role_arn:
        description: 'AWS IAM role ARN for OIDC'
        required: false
        type: string
      gcp_project_id:
        description: 'GCP project ID for Workload Identity'
        required: false
        type: string
      azure_tenant_id:
        description: 'Azure tenant ID for managed identity'
        required: false
        type: string
      vault_addr:
        description: 'Vault server address'
        required: false
        type: string
      vault_role:
        description: 'Vault role for auth'
        required: false
        type: string
        default: 'github-actions'
      require_approval:
        description: 'Require manual approval before apply'
        required: false
        type: boolean
        default: true
      approval_team:
        description: 'GitHub team for approval authority'
        required: false
        type: string
        default: 'infrastructure-team'
      auto_approve_if_no_changes:
        description: 'Auto-approve if plan shows no changes'
        required: false
        type: boolean
        default: true
      log_bucket:
        description: 'GCS bucket for audit logs'
        required: false
        type: string
    secrets:
      VAULT_ADDR:
        description: 'Vault server address'
        required: false
      VAULT_ROLE_ID:
        description: 'Vault AppRole ID'
        required: false
      VAULT_SECRET_ID:
        description: 'Vault AppRole Secret ID'
        required: false
      GCP_SA_KEY:
        description: 'GCP service account key (fallback only)'
        required: false

permissions:
  contents: read
  id-token: write
  pull-requests: write
  issues: write

jobs:
  approval-check:
    name: 'Approval: Verify Authorization'
    runs-on: ubuntu-latest
    if: inputs.require_approval == true
    outputs:
      approved: ${{ steps.check.outputs.approved }}
      approver: ${{ steps.check.outputs.approver }}
    steps:
      - uses: actions/checkout@v4

      - name: 'Check: Team membership'
        id: check
        run: |
          ACTOR="${{ github.actor }}"
          TEAM="${{ inputs.approval_team }}"

          # Verify actor is in approval team via GitHub
          IS_MEMBER=$(gh api orgs/${{ github.repository_owner }}/teams/${TEAM}/memberships/${ACTOR} \
            --jq '.state' 2>/dev/null || echo "not_found")

          if [ "$IS_MEMBER" = "active" ]; then
            echo "✅ Approval authority verified: $ACTOR in $TEAM"
            echo "approved=true" >> $GITHUB_OUTPUT
            echo "approver=$ACTOR" >> $GITHUB_OUTPUT
          else
            echo "❌ Approval failed: $ACTOR not in $TEAM"
            echo "approved=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform-apply:
    name: 'Apply: ${{ inputs.tf_dir }} (${{ matrix.cloud }})'
    needs: [approval-check]
    if: inputs.require_approval == false || needs.approval-check.outputs.approved == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cloud: [aws, gcp, azure]
      max-parallel: 1  # Serial to prevent race conditions
      fail-fast: false
    concurrency:
      group: terraform-apply-${{ inputs.tf_dir }}-${{ matrix.cloud }}
      cancel-in-progress: false
    timeout-minutes: 45
    env:
      TF_DIR: ${{ inputs.tf_dir }}
      EXECUTION_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.cloud }}
      LOG_BUCKET: ${{ inputs.log_bucket }}

    steps:
      - uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────────────────
      # Phase 1: Immutable Audit - Record intent before execution
      # ────────────────────────────────────────────────────────────────────────

      - name: 'Audit: Record apply intent (immutable)'
        id: intent
        run: |
          cat > /tmp/intent.json << 'EOF'
          {
            "execution_id": "${{ env.EXECUTION_ID }}",
            "action": "terraform-apply",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "actor": "${{ github.actor }}",
            "approver": "${{ needs.approval-check.outputs.approver || 'automatic' }}",
            "repository": "${{ github.repository }}",
            "ref": "${{ github.ref }}",
            "commit_sha": "${{ github.sha }}",
            "terraform_dir": "${{ env.TF_DIR }}",
            "cloud": "${{ matrix.cloud }}",
            "plan_file": "${{ inputs.plan_file || 'auto-generated' }}"
          }
          EOF

          # Log to immutable audit store
          if [ -n "$LOG_BUCKET" ]; then
            AUDIT_KEY="${{ github.repository }}/terraform-applies/${EXECUTION_ID}/intent-log.json"
            gsutil cp /tmp/intent.json "${LOG_BUCKET}/${AUDIT_KEY}"
          fi

          echo "📝 Apply intent recorded"

      # ────────────────────────────────────────────────────────────────────────
      # Phase 2: Acquire Ephemeral Credentials
      # ────────────────────────────────────────────────────────────────────────

      - name: 'Auth: Generate OIDC token'
        id: oidc
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}" | jq -r '.token')
          echo "::add-mask::${TOKEN}"
          echo "oidc_token=${TOKEN}" >> $GITHUB_OUTPUT

      - name: 'Auth: AWS via OIDC'
        if: matrix.cloud == 'aws' && inputs.aws_role_arn != ''
        run: |
          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "${{ inputs.aws_role_arn }}" \
            --role-session-name "github-${{ github.run_id }}-apply" \
            --web-identity-token "${{ steps.oidc.outputs.oidc_token }}" \
            --duration-seconds 1800 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)

          read -r AWS_ACCESS_KEY AWS_SECRET_KEY AWS_SESSION_TOKEN <<< "$CREDS"
          echo "::add-mask::${AWS_ACCESS_KEY}"
          echo "::add-mask::${AWS_SECRET_KEY}"
          echo "::add-mask::${AWS_SESSION_TOKEN}"
          echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_KEY}" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}" >> $GITHUB_ENV
          echo "✅ AWS ephemeral credentials acquired (30-min TTL)"

      - name: 'Auth: GCP via Workload Identity'
        if: matrix.cloud == 'gcp' && inputs.gcp_project_id != ''
        run: |
          # Workload Identity Federation
          IDENTITY_TOKEN=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}" | jq -r '.token')

          gcloud auth login --cred-file=/dev/stdin <<< "$IDENTITY_TOKEN"
          gcloud config set project "${{ inputs.gcp_project_id }}"
          echo "✅ GCP ephemeral credentials acquired"

      # ────────────────────────────────────────────────────────────────────────
      # Phase 3: Terraform Apply (Idempotent, State-Locked)
      # ────────────────────────────────────────────────────────────────────────

      - name: 'Install Terraform'
        uses: hashicorp/setup-terraform@v3

      - name: 'Terraform: Init (state-locked backend)'
        working-directory: ${{ env.TF_DIR }}
        run: |
          # Backend lock acquisition (distributed mutex)
          terraform init -input=false \
            -lock=true \
            -lock-timeout=10m
          echo "✅ Backend locked for apply"

      - name: 'Terraform: Apply (idempotent with lock)'
        id: apply
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "🚀 Applying infrastructure changes..."

          # Apply with explicit lock timeout
          terraform apply \
            -input=false \
            -auto-approve \
            -lock=true \
            -lock-timeout=20m \
            2>&1 | tee /tmp/apply.log

          # Capture state version
          STATE_VERSION=$(terraform state pull | jq -r '.serial')

          echo "state_version=${STATE_VERSION}" >> $GITHUB_OUTPUT
          echo "✅ Apply completed (state version: $STATE_VERSION)"

      # ────────────────────────────────────────────────────────────────────────
      # Phase 4: Immutable Audit - Record execution results
      # ────────────────────────────────────────────────────────────────────────

      - name: 'Audit: Record apply results (immutable)'
        if: always()
        run: |
          cat > /tmp/results.json << 'EOF'
          {
            "execution_id": "${{ env.EXECUTION_ID }}",
            "action": "terraform-apply",
            "status": "${{ job.status }}",
            "state_version": "${{ steps.apply.outputs.state_version || 'N/A' }}",
            "timestamp_completed": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "duration_seconds": ${{ job.duration || 0 }}
          }
          EOF

          if [ -n "$LOG_BUCKET" ]; then
            AUDIT_KEY="${{ github.repository }}/terraform-applies/${EXECUTION_ID}/results-log.json"
            gsutil cp /tmp/results.json "${LOG_BUCKET}/${AUDIT_KEY}"
            echo "✅ Results logged to: $AUDIT_KEY"
          fi

      - name: 'Cleanup: Revoke ephemeral credentials'
        if: always()
        run: |
          unset AWS_ACCESS_KEY_ID
          unset AWS_SECRET_ACCESS_KEY
          unset AWS_SESSION_TOKEN
          rm -f /tmp/*.json /tmp/*.log /tmp/sa-key.json
          echo "✅ Ephemeral credentials revoked"

      - name: 'Summary: Apply Status'
        if: always()
        run: |
          echo "## 🚀 Terraform Apply Summary"
          echo "- **Execution ID**: ${{ env.EXECUTION_ID }}"
          echo "- **Cloud**: ${{ matrix.cloud }}"
          echo "- **Status**: ${{ job.status }}"
          echo "- **State Version**: ${{ steps.apply.outputs.state_version || 'N/A' }}"
          echo "- **Approver**: ${{ needs.approval-check.outputs.approver || 'automatic' }}"
          echo "- **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
