name: Phase 3 Auto-Continuation (Blocker Monitor)

on:
  pull_request:
    types: [closed]
    paths:
      - '.github/workflows/minio-validate-github.yml'
  schedule:
    - cron: '*/5 * * * *'  # Check every 5 minutes for blocker resolution
  workflow_dispatch:
    inputs:
      force_continue:
        description: 'Force continuation bypassing blocker checks'
        required: false
        default: 'false'

  workflow_call: {}

concurrency:
  group: phase3-auto-continue-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitor-and-continue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Check blocker status
        id: check_blockers
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking Phase 3 blocker status..."

          # Check 1: Are MinIO secrets set?
          if [ -z "${{ secrets.MINIO_ENDPOINT }}" ]; then
            echo "❌ MINIO_ENDPOINT not set"
            SECRETS_SET=false
          else
            echo "✅ MINIO_ENDPOINT is set"
            SECRETS_SET=true
          fi
          echo "secrets_set=$SECRETS_SET" >> $GITHUB_OUTPUT

          # Check 2: Is PR #858 merged?
          PR_858=$(gh pr view 858 --repo kushin77/self-hosted-runner --json state,mergedAt -q '.state,.mergedAt' 2>/dev/null || echo "CLOSED|null")
          STATE=$(echo "$PR_858" | head -1)
          MERGED=$(echo "$PR_858" | tail -1)

          if [ "$STATE" = "MERGED" ] || [ "$MERGED" != "null" ] 2>/dev/null; then
            echo "✅ PR #858 is merged"
            PR_858_MERGED=true
          else
            echo "❌ PR #858 not yet merged"
            PR_858_MERGED=false
          fi
          echo "pr_858_merged=$PR_858_MERGED" >> $GITHUB_OUTPUT

          # Check 3: Is self-hosted runner online? (optional check)
          # Try to list recent runs; if any self-hosted runs succeeded, runner is online
          RUNNER_ONLINE=$(gh run list --repo kushin77/self-hosted-runner --status completed --limit 10 2>/dev/null | grep -i 'completed' | wc -l)
          if [ "$RUNNER_ONLINE" -gt 0 ]; then
            echo "✅ Self-hosted runner appears to be online"
            RUNNER_ONLINE=true
          else
            echo "⚠️  Self-hosted runner status unclear (may still be offline, but non-critical)"
            RUNNER_ONLINE=false
          fi
          echo "runner_online=$RUNNER_ONLINE" >> $GITHUB_OUTPUT

          # Summary
          echo ""
          echo "Blocker Summary:"
          echo "  - MinIO Secrets: $SECRETS_SET"
          echo "  - PR #858 Merged: $PR_858_MERGED"
          echo "  - Runner Online: $RUNNER_ONLINE"

      - name: Dispatch MinIO E2E workflow (if secrets set + PR merged)
        if: steps.check_blockers.outputs.secrets_set == 'true' && steps.check_blockers.outputs.pr_858_merged == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🚀 Blockers resolved! Dispatching MinIO E2E workflow..."
          gh workflow run minio-validate-github.yml \
            --repo kushin77/self-hosted-runner \
            --ref main || true
          echo "✅ Workflow dispatch initiated"

      - name: Monitor dispatched run
        if: steps.check_blockers.outputs.secrets_set == 'true' && steps.check_blockers.outputs.pr_858_merged == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Waiting for MinIO E2E workflow to complete..."
          for i in {1..120}; do
            RUN=$(gh run list --repo kushin77/self-hosted-runner \
              --workflow=minio-validate-github.yml \
              --status completed \
              --limit 1 -q '.[] | {conclusion, status}' 2>/dev/null || echo "")

            if [ -n "$RUN" ]; then
              echo "✅ MinIO E2E run completed"
              echo "$RUN"
              break
            fi

            echo "$(( i * 5 )) seconds elapsed, checking again..."
            sleep 5
          done

      - name: Post status to escalation issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STATUS="${{ job.status }}"
          SECRETS_SET="${{ steps.check_blockers.outputs.secrets_set }}"
          PR_MERGED="${{ steps.check_blockers.outputs.pr_858_merged }}"

          echo "## Phase 3 Auto-Continuation Status"
          echo ""
          echo "**Latest Check:** $(date)"
          echo "**Automation Status:** $STATUS"
          echo "**MinIO Secrets:** $SECRETS_SET"
          echo "**PR #858:** $PR_MERGED"
          echo ""

          if [ "$SECRETS_SET" = "true" ] && [ "$PR_MERGED" = "true" ]; then
            echo "✅ All blockers resolved! MinIO E2E workflow dispatched."
          else
            echo "⏳ Waiting for blockers to be resolved:"
            [ "$SECRETS_SET" = "false" ] && echo "  - Set MINIO_* secrets in #864"
            [ "$PR_MERGED" = "false" ] && echo "  - Merge PR #858"
            echo ""
            echo "This workflow runs every 5 minutes and will auto-continue when blockers are resolved."
          fi | \
          gh issue comment 864 --repo kushin77/self-hosted-runner --body "$(cat)" || true

      - name: If blockers resolved, continue Phase 3 completion
        if: steps.check_blockers.outputs.secrets_set == 'true' && steps.check_blockers.outputs.pr_858_merged == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🎯 Phase 3 continuation: All blockers resolved!"
          echo "Next: Download E2E artifacts, execute branch cleanup, close issues"
          echo ""
          
          # Placeholder for continuation logic
          # In a real scenario, this would:
          # 1. Download MinIO E2E artifacts
          # 2. Parse results and create summary
          # 3. Commit summary to repo
          # 4. Execute branch cleanup
          # 5. Close all Phase 3 issues
          echo "TODO: Implement full Phase 3 completion workflow"
