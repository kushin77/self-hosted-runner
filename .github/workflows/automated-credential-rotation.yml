name: Automated Credential Rotation — Hands-Off

on:
  schedule:
    # Daily rotation at 3 AM UTC
    - cron: '0 3 * * *'
    # Cleanup expired credentials at 4 AM UTC
    - cron: '0 4 * * *'
    # Verify rotations at 5 AM UTC
    - cron: '0 5 * * *'
  workflow_dispatch:  # Allow manual trigger for testing
    inputs:
      rotate:
        description: 'Execute rotation'
        required: false
        default: 'true'
      cleanup:
        description: 'Cleanup expired credentials'
        required: false
        default: 'false'
      verify:
        description: 'Verify rotations'
        required: false
        default: 'false'

permissions:
  id-token: write
  contents: read
  issues: write

env:
  PYTHONUNBUFFERED: '1'
  LOG_RETENTION_DAYS: 30

jobs:
  rotation:
    name: Automated Credential Rotation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.ref, 'rotation'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'
      
      # OIDC authentication — no hardcoded credentials
      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      
      - name: Authenticate to AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1
      
      # No hardcoded Vault token — use OIDC
      - name: Authenticate to HashiCorp Vault
        run: |
          set -euo pipefail
          
          # Get JWT from GitHub
          JWT="${ACTIONS_ID_TOKEN_REQUEST_TOKEN}"
          
          # Exchange JWT for Vault token
          VAULT_TOKEN=$(curl -s -X POST \
            "${VAULT_ADDR}/v1/auth/jwt/login" \
            -H "Content-Type: application/json" \
            -d "{\"role\":\"github-actions\",\"jwt\":\"${JWT}\"}" \
            | jq -r '.auth.client_token')
          
          echo "::add-mask::${VAULT_TOKEN}"
          echo "VAULT_TOKEN=${VAULT_TOKEN}" >> "$GITHUB_ENV"
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r security/requirements-rotation.txt
      
      - name: Create audit log directory
        run: mkdir -p .audit
      
      - name: Determine which rotation step to run
        id: step
        run: |
          set -euo pipefail
          
          # Determine which job to run based on schedule/input
          HOUR=$(date -u +%H)
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ROTATE="${{ github.event.inputs.rotate }}"
            CLEANUP="${{ github.event.inputs.cleanup }}"
            VERIFY="${{ github.event.inputs.verify }}"
          else
            # Scheduled: different jobs at different hours
            case "$HOUR" in
              3) ROTATE="true"; CLEANUP="false"; VERIFY="false" ;;
              4) ROTATE="false"; CLEANUP="true"; VERIFY="false" ;;
              5) ROTATE="false"; CLEANUP="false"; VERIFY="true" ;;
              *) ROTATE="false"; CLEANUP="false"; VERIFY="false" ;;
            esac
          fi
          
          echo "rotate=${ROTATE:-false}" >> "$GITHUB_OUTPUT"
          echo "cleanup=${CLEANUP:-false}" >> "$GITHUB_OUTPUT"
          echo "verify=${VERIFY:-false}" >> "$GITHUB_OUTPUT"
      
      - name: Execute credential rotation
        id: rotation
        if: steps.step.outputs.rotate == 'true'
        run: |
          set -euo pipefail
          python3 security/rotate_all_credentials.py \
            --config security/rotation_config.json \
            --rotate 2>&1 | tee rotation.log
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
      
      - name: Cleanup expired credentials
        id: cleanup
        if: steps.step.outputs.cleanup == 'true'
        run: |
          set -euo pipefail
          python3 security/rotate_all_credentials.py \
            --config security/rotation_config.json \
            --cleanup \
            --ttl-days 30 2>&1 | tee cleanup.log
      
      - name: Verify rotations
        id: verify
        if: steps.step.outputs.verify == 'true'
        run: |
          set -euo pipefail
          python3 security/rotate_all_credentials.py \
            --config security/rotation_config.json \
            --verify 2>&1 | tee verify.log
      
      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: rotation-audit-logs
          path: .audit/
          retention-days: ${{ env.LOG_RETENTION_DAYS }}
      
      - name: Upload rotation logs
        if: always() && steps.rotation.outcome != 'skipped'
        uses: actions/upload-artifact@v3
        with:
          name: rotation-execution-log
          path: rotation.log
          retention-days: ${{ env.LOG_RETENTION_DAYS }}
      
      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ Credential Rotation Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "🚨 *Credential Rotation Failed*\n\n*Workflow:* ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n*Timestamp:* $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  }
                }
              ]
            }
      
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Automated Credential Rotation Failed',
              labels: ['security', 'remediation', 'incident'],
              body: `⚠️ Automated credential rotation failed at ${new Date().toISOString()}

**Run:** ${context.server_url}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

**Step:** ${{ job.status }}

Please review logs and investigate.

*Enable remediation:*
1. Review audit logs in rotation artifacts
2. Check authentication (GCP/AWS/Vault OIDC)
3. Verify credentials in secret managers exist
4. Re-run workflow once resolved`
            })
  
  cleanup_old_logs:
    name: Cleanup Old Logs
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Remove old artifacts
        uses: geekyeggo/delete-artifact@v2
        with:
          name: rotation-*
          failOnError: false
