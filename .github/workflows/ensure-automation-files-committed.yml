name: Ensure Automation Files Committed
on:
  workflow_dispatch: {}

jobs:
  verify-and-announce:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List essential automation files
        run: |
          echo "Checking for scripts/provision-staging-kubeconfig-gsm.sh and scripts/apply-branch-protection.sh"
          test -f scripts/provision-staging-kubeconfig-gsm.sh || (echo "Missing provision script" && exit 2)
          test -f scripts/apply-branch-protection.sh || (echo "Missing branch protection script" && exit 2)

      - name: Success
        run: echo "Required automation files present."
