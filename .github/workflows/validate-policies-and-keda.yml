name: Validate Policies & KEDA Manifests

on:
  pull_request:
    paths:
      - 'deploy/policies/**'
      - 'deploy/autoscaling/**'

jobs:
  validate-manifests:
    name: Lint and dry-run manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Find changed manifests
        id: changed
        run: |
          files=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E '^deploy/(policies|autoscaling)/' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate manifests (kubectl dry-run client)
        if: steps.changed.outputs.files != ''
        run: |
          echo "Validating changed files..."
          echo "${{ steps.changed.outputs.files }}" | while read f; do
            if [[ -z "$f" ]]; then continue; fi
            echo "Validating: $f"
            kubectl apply --dry-run=client --validate=true -f "$f"
          done

      - name: No changes detected
        if: steps.changed.outputs.files == ''
        run: echo "No deploy/policies or deploy/autoscaling changes in this PR."
