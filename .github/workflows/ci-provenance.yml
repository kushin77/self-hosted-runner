---
name: CI - Generate Provenance & Optional Attestations
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  release:
    types: [created]

jobs:
  provenance:
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate manifest
        run: |
          ./scripts/airgap/generate_image_manifest.sh > /tmp/airgap-manifest.yml
          cat /tmp/airgap-manifest.yml

      - name: Ensure SBOMs exist
        run: |
          if [ ! -d build/sboms ]; then
            mkdir -p build/sboms
            echo "No SBOMs found; run ci-supply-chain or provide SBOMs";
          fi

      - name: Install cosign
        run: |
          curl -sSfL https://github.com/sigstore/cosign/releases/download/v2.14.0/cosign-linux-amd64 -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign || true
          cosign version || true

      - name: Generate provenance
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY || '' }}
        run: |
          mkdir -p build/provenance
          ./scripts/supplychain/generate_provenance.sh /tmp/airgap-manifest.yml build/sboms build/provenance --sign || true

      - name: Upload provenance artifacts
        uses: actions/upload-artifact@v4
        with:
          name: provenance
          path: build/provenance/
