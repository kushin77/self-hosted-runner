name: Credential System Health Check (Hourly)
description: Hourly validation of credential providers with auto-escalation on failure
on:
  schedule:
    # Every hour
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: credential-health-check
  cancel-in-progress: false

jobs:
  health-check:
    name: Check Credential System Health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
      issues: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Health Check
        id: health
        continue-on-error: true
        run: |
          chmod +x scripts/auto-credential-rotation.sh
          
          export GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          export VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
          export AWS_ROLE_TO_ASSUME="${{ secrets.AWS_ROLE_TO_ASSUME }}"
          export AUDIT_SESSION_ID="health-check-$(date +%s)"
          
          if ./scripts/auto-credential-rotation.sh health; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Verify Audit Integrity
        if: always()
        run: |
          python3 scripts/immutable-audit.py verify
      
      - name: Upload Health Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-check-${{ github.run_id }}
          path: .audit-logs/
          retention-days: 30
      
      - name: Create Escalation Issue (On Failure)
        if: failure() && steps.health.outputs.status == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 ESCALATION: Credential System Health Check Failed',
              body: `
            **Time:** ${new Date().toISOString()}
            **Workflow:** Credential System Health Check (Hourly)
            **Status:** FAILURE
            
            **Action Required:**
            - Check credential provider status (GSM, Vault, KMS)
            - Verify operator has added repository secrets
            - Review audit logs: .audit-logs/
            
            **Automated Mitigation:**
            - Rotation will retry in 15 minutes
            - Health check will retry in 1 hour
            
            This issue was auto-created. Resolve by fixing the underlying credential provider issue.
              `,
              labels: ['escalation', 'credentials', 'p0'],
              assignees: []
            }).then(issue => {
              console.log('Created escalation issue:', issue.data.html_url);
            });
      
      - name: Update Issue (On Success)
        if: success() && steps.health.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['escalation', 'credentials'],
              state: 'open',
              per_page: 1
            });
            
            if (issues.data.length > 0) {
              const issue = issues.data[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
              console.log('Closed escalation issue:', issue.number);
            }
