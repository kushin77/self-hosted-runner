name: Continuous Secrets Scan

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC

permissions:
  contents: read
  issues: write

jobs:
  secrets-scan:
    name: Run repository secrets scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run sanitization script (quick check)
        run: |
          chmod +x ./scripts/security/sanitize-repo-security.sh || true
          ./scripts/security/sanitize-repo-security.sh check

      - name: Run gitleaks scan
        uses: zricethezav/gitleaks-action@v8
        with:
          args: detect -s ${{ github.workspace }} --no-git --report-format=json --redact

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-report
          path: |
            /tmp/security_audit_*.json
            gitleaks-report.json

      - name: Fail on findings
        if: failure()
        run: |
          echo "Secrets scan failed — please review artifacts for details"
          exit 1
