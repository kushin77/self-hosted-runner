name: Self-hosted Heavy Runner Verification

on:
  workflow_dispatch: {}

jobs:
  verify:
    name: Verify self-hosted-heavy runner tooling
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: self-hosted-heavy-verify-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: [self-hosted, linux, self-hosted-heavy]
    timeout-minutes: 15
    steps:
            - name: Load resilience helpers
              run: |
                set -euo pipefail
                source .github/scripts/resilience.sh || true
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print runner labels
        run: |
          echo "Runner labels:"
          jq -r '. | to_entries[] | "\(.key)=\(.value)"' <<< "${{ toJson(runner) }}" || true

      - name: Docker version
        run: |
          echo "Docker:" && docker --version || echo "docker not available"

      - name: Kind version
        run: |
          kind --version || echo "kind not installed"

      - name: Terraform version
        run: |
          terraform version || echo "terraform not available"

      - name: Helm version
        run: |
          helm version --short || echo "helm not available"

      - name: kubectl version
        run: |
          kubectl version --client --short || echo "kubectl not available"
