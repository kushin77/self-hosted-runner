name: SLA Monitoring & Escalation

on:
  schedule:
    # Run every 4 hours to check SLAs
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  check-sla-violations:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    concurrency:
      group: sla-monitoring
      cancel-in-progress: true

    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Monitor SLA metrics
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import subprocess
          import json
          from datetime import datetime, timedelta

          # SLA definitions (in days)
          sla_config = {
              "type:bug": {
                  "critical": 1,
                  "high": 3,
                  "medium": 7,
                  "low": 14
              },
              "type:security": {"critical": 0.5},
              "type:compliance": {"critical": 1},
              "type:feature": {"p0": 30, "p1": 60, "p2": 90},
          }

          # Get all open high-priority issues
          result = subprocess.run(
              ["gh", "issue", "list",
               "--state", "open",
               "--json", "number,title,createdAt,labels,milestone",
               "--repo", "${{ github.repository }}",
               "-L", "1000"],
              capture_output=True,
              text=True
          )

          issues = json.loads(result.stdout)
          violations = []

          for issue in issues:
              labels = [l["name"] for l in issue.get("labels", [])]
              created_at = datetime.fromisoformat(issue["createdAt"].replace('Z', '+00:00'))
              age_days = (datetime.now(created_at.tzinfo) - created_at).days

              # Check SLA
              sla_exceeded = False
              sla_type = None

              if "type:security" in labels:
                  sla_limit = 0.5  # 12 hours
                  if age_days > sla_limit:
                      sla_exceeded = True
                      sla_type = "security"
              elif "type:bug" in labels:
                  severity = next((l.split(":")[1] for l in labels if l.startswith("severity:")), "medium")
                  sla_limit = sla_config["type:bug"].get(severity, 7)
                  if age_days > sla_limit:
                      sla_exceeded = True
                      sla_type = f"bug({severity})"
              elif "type:compliance" in labels:
                  sla_limit = 1
                  if age_days > sla_limit:
                      sla_exceeded = True
                      sla_type = "compliance"

              if sla_exceeded:
                  violations.append({
                      "number": issue["number"],
                      "title": issue["title"],
                      "age_days": age_days,
                      "sla_type": sla_type,
                      "labels": labels
                  })

          # Apply escalation labels
          for violation in violations:
              print(f"🚨 SLA Violation: #{violation['number']} ({violation['sla_type']}) - {violation['age_days']}d old")
              
              # Add escalation label
              subprocess.run(
                  ["gh", "issue", "edit", str(violation["number"]),
                   "--repo", "${{ github.repository }}",
                   "--add-label", "sla:breached"],
                  check=False
              )

              # Add urgent priority
              subprocess.run(
                  ["gh", "issue", "edit", str(violation["number"]),
                   "--repo", "${{ github.repository }}",
                   "--add-label", "priority:urgent"],
                  check=False
              )

          print(f"Total violations: {len(violations)}")

          if violations:
              # Create summary comment on org dashboard issue (if exists)
              summary = f"**SLA Violations Report** ({len(violations)} issues)\n\n"
              for v in violations[:20]:  # Top 20
                  summary += f"- #{v['number']}: {v['title'][:50]}... ({v['age_days']}d, {v['sla_type']})\n"
              
              print(summary)
          EOF

  close-stale-issues:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      issues: write
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Close stale issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import subprocess
          import json
          from datetime import datetime, timedelta

          # Find issues with no activity for 60+ days
          created_before = (datetime.now() - timedelta(days=60)).isoformat()

          result = subprocess.run(
              ["gh", "issue", "list",
               "--state", "open",
               "--json", "number,title,updatedAt,labels",
               "--repo", "${{ github.repository }}",
               "-L", "1000"],
              capture_output=True,
              text=True
          )

          issues = json.loads(result.stdout)

          for issue in issues:
              updated_at = datetime.fromisoformat(issue["updatedAt"].replace('Z', '+00:00'))
              age = (datetime.now(updated_at.tzinfo) - updated_at).days

              labels = [l["name"] for l in issue.get("labels", [])]

              # Don't close: blocked, in-progress, or security issues
              if age > 60 and "state:backlog" in labels and not any(
                  l in labels for l in ["blocked-by-issues", "type:security", "type:compliance", "priority:p0", "priority:p1"]
              ):
                  print(f"⏰ Closing stale issue #{issue['number']}: {issue['title'][:50]}...")
                  
                  subprocess.run(
                      ["gh", "issue", "close", str(issue["number"]),
                       "--repo", "${{ github.repository }}",
                       "--reason", "not planned"],
                      check=False
                  )

                  subprocess.run(
                      ["gh", "issue", "comment", str(issue["number"]),
                       "--repo", "${{ github.repository }}",
                       "--body", "⏰ Auto-closed due to inactivity (60+ days no updates). Feel free to reopen if still relevant."],
                      check=False
                  )
          EOF
