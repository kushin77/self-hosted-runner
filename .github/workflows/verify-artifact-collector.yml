name: Collect Verify Artifacts

on:
  workflow_run:
    workflows: ["Verify Repository Secrets & Diagnose Issues"]
    types: [completed]

permissions:
  issues: write
  actions: read
  contents: read

jobs:
  collect-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Comment with artifacts (if any)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const run_id = run.id;
            const run_number = run.run_number;

            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({ owner, repo, run_id });

            if (artifacts.data.total_count && artifacts.data.total_count > 0) {
              const names = artifacts.data.artifacts.map(a => `- ${a.name} (size: ${a.size_in_bytes} bytes)`).join('\n');
              const body = 'Automated: artifacts available for verify run ' + run_number + ':\n' + names + '\n\nUse `gh run download ' + run_number + ' --repo ' + owner + '/' + repo + '` to fetch.';
              await github.rest.issues.createComment({ owner, repo, issue_number: 1239, body });
            } else {
              const body = `Automated: verify run ${run_number} completed with conclusion: ${run.conclusion}. No artifacts available.`;
              await github.rest.issues.createComment({ owner, repo, issue_number: 1239, body });
            }
