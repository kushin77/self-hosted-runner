name: Self-hosted Runner Smoke Test
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_dispatch: {}

jobs:
  smoke:
    name: Smoke test on self-hosted-heavy
    runs-on: [self-hosted, linux, self-hosted-heavy]
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker and Buildx
        run: |
          set -euo pipefail
          echo "-- docker --"
          docker version
          echo "-- buildx --"
          if ! docker buildx version >/dev/null 2>&1; then
            echo "buildx missing, attempting to create builder"
            docker buildx create --use || true
          fi
          docker buildx version

      - name: Verify Terraform
        run: |
          set -euo pipefail
          if command -v terraform >/dev/null 2>&1; then
            terraform version
          else
            echo "terraform not found" >&2
            exit 2
          fi

      - name: Verify kubectl and helm
        run: |
          set -euo pipefail
          kubectl version --client
          helm version

      - name: Verify kind create/delete
        run: |
          set -euo pipefail
          CLUSTER=smoke-$(date +%s)
          if command -v kind >/dev/null 2>&1; then
            kind create cluster --name "$CLUSTER"
            kubectl --context "kind-$CLUSTER" get nodes
            kind delete cluster --name "$CLUSTER"
          else
            echo "kind not installed" >&2
            exit 2
          fi
