name: Security Audit Polling & Remediation Trigger
# Polls for completed security-audit runs and triggers remediation workflow
# Ensures hands-off, continuous security automation loop

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: read

jobs:
  poll-and-trigger:
    name: Poll Audit Runs & Trigger Remediation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest completed security-audit run
        id: get-run
        run: |
          set -euo pipefail
          
          # Find the most recent completed security-audit run
          RUN_ID=$(gh run list \
            --workflow security-audit.yml \
            --repo ${{ github.repository }} \
            --status completed \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId' 2>/dev/null || echo "")
          
          if [[ -z "$RUN_ID" ]]; then
            echo "⚠️  No completed security-audit runs found"
            echo "run_id=" >> $GITHUB_OUTPUT
            echo "found=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "✅ Found completed security-audit run: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "found=true" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check if remediation workflow has already been triggered for this run
        id: check-triggered
        if: steps.get-run.outputs.found == 'true'
        run: |
          set -euo pipefail
          RUN_ID="${{ steps.get-run.outputs.run_id }}"
          
          # Check if security-findings-remediation has recent runs (within last 5 mins) that would be from this audit
          RECENT_REMEDIATION=$(gh run list \
            --workflow security-findings-remediation.yml \
            --repo ${{ github.repository }} \
            --status completed \
            --limit 10 \
            --json createdAt,databaseId,status \
            --jq ".[] | select(.createdAt > \"$(date -u -d '5 minutes ago' +'%Y-%m-%dT%H:%M:%SZ')\") | .databaseId" 2>/dev/null | head -1 || echo "")
          
          if [[ -n "$RECENT_REMEDIATION" ]]; then
            echo "✅ Remediation workflow already triggered for this audit run"
            echo "already_triggered=true" >> $GITHUB_OUTPUT
          else
            echo "Remediation workflow not yet triggered; will trigger now"
            echo "already_triggered=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger security-findings-remediation workflow
        if: steps.get-run.outputs.found == 'true' && steps.check-triggered.outputs.already_triggered == 'false'
        run: |
          set -euo pipefail
          
          echo "🔧 Triggering security-findings-remediation workflow..."
          gh workflow run security-findings-remediation.yml \
            --repo ${{ github.repository }} \
            --ref main
          
          echo "✅ Remediation workflow triggered"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Check remediation PR status
        if: steps.get-run.outputs.found == 'true'
        id: pr-status
        run: |
          set -euo pipefail
          
          echo "Checking remediation PRs..."
          PR_COUNT=$(gh pr list \
            --repo ${{ github.repository }} \
            --label "security,remediation-auto" \
            --state all \
            --json number,state \
            --jq 'length' 2>/dev/null || echo 0)
          
          echo "Found $PR_COUNT remediation PRs"
          echo "pr_count=$PR_COUNT" >> $GITHUB_OUTPUT
          
          if [ "$PR_COUNT" -gt 0 ]; then
            echo "PR details:"
            gh pr list \
              --repo ${{ github.repository }} \
              --label "security,remediation-auto" \
              --state all \
              --json number,title,state,url \
              --jq '.[] | "  #\(.number): \(.title) (\(.state)) — \(.url)"'
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Report status to issue tracker
        if: always()
        run: |
          set -euo pipefail
          
          FOUND="${{ steps.get-run.outputs.found }}"
          RUN_ID="${{ steps.get-run.outputs.run_id }}"
          ALR_TRIG="${{ steps.check-triggered.outputs.already_triggered }}"
          PR_COUNT="${{ steps.pr-status.outputs.pr_count || '0' }}"
          
          # Create or update a summary issue (if one exists with a specific label)
          SUMMARY_ISSUE=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "security-polling-summary" \
            --state open \
            --limit 1 \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")
          
          BODY="## Security Automation Poll Status

**Time**: $(date -u +'%Y-%m-%dT%H:%M:%SZ')

**Audit Run Status**:
- Found completed run: \`$FOUND\`
- Latest run ID: \`$RUN_ID\`
- Remediation already triggered: \`$ALR_TRIG\`

**Remediation PRs**: $PR_COUNT active

**Next Steps**:
- Polling will continue every 30 minutes
- Once remediation PRs are merged, issues will auto-close
- For manual intervention, see issue #1184 or #969"
          
          if [ -n "$SUMMARY_ISSUE" ]; then
            gh issue comment "$SUMMARY_ISSUE" \
              --repo ${{ github.repository }} \
              --body "$BODY" || true
          else
            gh issue create \
              --repo ${{ github.repository }} \
              --title "[AUTOMATED] Security Automation Polling Summary" \
              --body "$BODY" \
              --label "security-polling-summary,automation,internal" || true
          fi
        env:
          GH_TOKEN: ${{ github.token }}
