name: TLS Socket Integration Test
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
on:
  pull_request:
  workflow_dispatch:

jobs:
  tls-integration:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install provisioner-worker deps
        run: |
          cd services/provisioner-worker
          npm ci --no-audit --no-fund

      - name: Run vault helper unit test
        run: |
          npm --prefix services/provisioner-worker run test:unit:vault

      - name: Run TLS socket integration test
        run: |
          npm --prefix services/provisioner-worker run test:integration:tls