name: "P4 — AWS Spot Runner Plan"

on:
  workflow_dispatch: {}

jobs:
  terraform-plan:
    name: Terraform Plan (aws-spot)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform/examples/aws-spot
        run: |
          terraform init -input=false

      - name: Terraform Fmt
        working-directory: terraform/examples/aws-spot
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: terraform/examples/aws-spot
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/examples/aws-spot
        run: |
          terraform plan -input=false -out=plan.out || true
          terraform show -no-color plan.out > plan.txt || true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: aws-spot-plan
          path: terraform/examples/aws-spot/plan.out

      - name: Upload plan text
        uses: actions/upload-artifact@v4
        with:
          name: aws-spot-plan-txt
          path: terraform/examples/aws-spot/plan.txt
