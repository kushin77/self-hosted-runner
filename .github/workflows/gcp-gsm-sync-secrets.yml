name: GCP GSM Secrets Sync

on:
  workflow_dispatch:
  workflow_call: {}

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  sync-secrets:
    name: Sync GitHub secrets to GCP Secret Manager
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch Ephemeral Credentials
        uses: kushin77/get-ephemeral-credential@v1
        id: creds
        with:
          credential-names: |
            GCP_PROJECT_ID
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT_EMAIL
            GCP_SERVICE_ACCOUNT_KEY
            AWS_OIDC_ROLE_ARN
            AWS_ROLE_TO_ASSUME
            SLACK_BOT_TOKEN
            VAULT_ADDR
            VAULT_TOKEN
          retrieve-from: 'auto'
          audit-log: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.creds.outputs.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ steps.creds.outputs.GCP_SERVICE_ACCOUNT_EMAIL }}
          credentials_json: ${{ steps.creds.outputs.GCP_SERVICE_ACCOUNT_KEY }}
          create_credentials_file: true

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.creds.outputs.GCP_PROJECT_ID }}

      - name: Make sync script executable
        run: chmod +x scripts/automation/gcp-gsm-sync.sh

      - name: Run GSM sync (GitHub → GCP)
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ steps.creds.outputs.GCP_SERVICE_ACCOUNT_KEY }}
          GCP_PROJECT_ID: ${{ steps.creds.outputs.GCP_PROJECT_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ steps.creds.outputs.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ steps.creds.outputs.GCP_SERVICE_ACCOUNT_EMAIL }}
          AWS_OIDC_ROLE_ARN: ${{ steps.creds.outputs.AWS_OIDC_ROLE_ARN }}
          AWS_ROLE_TO_ASSUME: ${{ steps.creds.outputs.AWS_ROLE_TO_ASSUME }}
          SLACK_BOT_TOKEN: ${{ steps.creds.outputs.SLACK_BOT_TOKEN }}
          VAULT_ADDR: ${{ steps.creds.outputs.VAULT_ADDR }}
          VAULT_TOKEN: ${{ steps.creds.outputs.VAULT_TOKEN }}
        run: |
          scripts/automation/gcp-gsm-sync.sh || {
            echo "⚠️ Sync encountered warnings (non-fatal)"
          }

      - name: Generate sync report
        if: always()
        run: |
          if [[ -f ".github/workflows/logs/gcp-gsm-sync-"* ]]; then
            echo "### GSM Sync Summary"
            tail -20 .github/workflows/logs/gcp-gsm-sync-* | grep -E "✓|ERROR|sync complete" || true
          fi
        continue-on-error: true

      - name: Detect status for issue update
        id: detect-status
        run: |
          if ls .github/workflows/logs/gcp-gsm-sync-* 1> /dev/null 2>&1; then
            if tail -20 .github/workflows/logs/gcp-gsm-sync-* | grep -q "ERROR"; then
              echo "status=⚠️ PARTIAL" >> $GITHUB_OUTPUT
            else
              echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
            fi
          else
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Update issue #1381 with sync status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
              const fs = require('fs');
              const status = "${{ steps.detect-status.outputs.status || '✅ SUCCESS' }}";

              let logData = "";
              try {
                const logsDir = '.github/workflows/logs/';
                if (fs.existsSync(logsDir)) {
                  const logFile = fs.readdirSync(logsDir)
                    .filter(f => f.startsWith('gcp-gsm-sync-'))
                    .sort().pop();
                  if (logFile) {
                    logData = fs.readFileSync(logsDir + logFile, 'utf8');
                  }
                }
              } catch (e) {
                console.error('Failed to read logs', e);
              }

              const body = `### GSM Sync Status: ${status}
              **Time**: ${new Date().toISOString()}
              **Run**: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

              <details>
              <summary>Sync Logs (Last 50 lines)</summary>

              \`\`\`
              ${logData.split('\n').slice(-50).join('\n')}
              \`\`\`
              </details>`;

              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: 1381,
                  body: body
                });
              } catch (e) {
                console.error(`Failed to update issue: ${e.message}`);
              }
