name: GCP GSM Secrets Sync

on:
  workflow_dispatch:
  workflow_call: {}

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  sync-secrets:
    name: Sync GitHub secrets to GCP Secret Manager
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC-first)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account_email: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Make sync script executable
        run: chmod +x scripts/automation/gcp-gsm-sync.sh

      - name: Run GSM sync (GitHub → GCP)
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          scripts/automation/gcp-gsm-sync.sh || {
            echo "⚠️ Sync encountered warnings (non-fatal)"
          }

      - name: Generate sync report
        if: always()
        run: |
          if [[ -f ".github/workflows/logs/gcp-gsm-sync-"* ]]; then
            echo "### GSM Sync Summary"
            tail -20 .github/workflows/logs/gcp-gsm-sync-* | grep -E "✓|ERROR|sync complete" || true
          fi
        continue-on-error: true

      - name: Detect status for issue update
        id: detect-status
        run: |
          if tail -20 .github/workflows/logs/gcp-gsm-sync-* 2>/dev/null | grep -q "ERROR"; then
            echo "status=⚠️ PARTIAL" >> $GITHUB_OUTPUT
          else
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Update issue #1381 with sync status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const status = "${{ steps.detect-status.outputs.status || '✅ SUCCESS' }}";

            const logFile = fs.readdirSync('.github/workflows/logs/')
              .filter(f => f.startsWith('gcp-gsm-sync-'))
              .sort()
              .reverse()[0];

            const logContent = logFile ? fs.readFileSync(`.github/workflows/logs/${logFile}`, 'utf8').split('\n').slice(-15).join('\n') : 'No logs found';

            const comment = `**[${new Date().toISOString()}]** GSM Sync

Status: ${status}

\`\`\`
${logContent}
\`\`\`

**Next Sync**: In 15 minutes`;

            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 1381,
                body: comment
              });
            } catch(e) {
              console.log('Issue #1381 not yet created or unaccessible');
            }
        continue-on-error: true

      - name: Cleanup old logs (keep last 10)
        run: |
          ls -t .github/workflows/logs/gcp-gsm-sync-* 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true
        continue-on-error: true

      - name: Guard: Verify sync consistency
        run: |
          if ! gcloud secrets list --project="${GCP_PROJECT_ID}" --filter="labels.gh-saas-sync:true" --format="value(name)" >/dev/null 2>&1; then
            echo "⚠️ GSM consistency check encountered issues"
          else
            echo "✓ GSM consistency verified"
          fi
        continue-on-error: true
