name: Auto-close Missing Secrets Issue

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  check-and-close:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check and close missing-secrets issue
        uses: actions/github-script@v6
        with:
          script: |
            const required = [
              'VAULT_ROLE_ID',
              'VAULT_SECRET_ID',
              'MINIO_ACCESS_KEY',
              'MINIO_SECRET_KEY',
              'TF_VAR_SERVICE_ACCOUNT_KEY'
            ];

            const { owner, repo } = context.repo;

            // List repo secrets
            const res = await github.rest.actions.listRepoSecrets({ owner, repo });
            const present = res.data.secrets.map(s => s.name);
            const missing = required.filter(r => !present.includes(r));

            if (missing.length === 0) {
              core.info('All required secrets present. Looking for open issue to close.');
              // Find existing open issue
              const issues = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
              const title = 'Missing required GitHub Secrets (automated)';
              const existing = issues.data.find(i => i.title === title);
              if (existing) {
                await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body: 'All required repository secrets are present. Closing this automated issue. If remediation is needed, please re-open or create a new issue.' });
                await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: 'closed' });
                core.info(`Closed issue #${existing.number}`);
              } else {
                core.info('No matching open issue found to close.');
              }

              // Optionally dispatch self-heal workflow if present
              try {
                await github.rest.actions.createWorkflowDispatch({ owner, repo, workflow_id: 'runner-self-heal.yml', ref: 'main' });
                core.info('Dispatched runner-self-heal workflow.');
              } catch (err) {
                core.info('runner-self-heal workflow not present or dispatch failed: ' + err.message);
              }
            } else {
              core.info('Missing secrets detected: ' + missing.join(', '));
              // Create or update an issue to notify ops (idempotent)
              const issueTitle = 'Missing required GitHub Secrets (automated)';
              const body = `Automated check detected missing repository secrets:\n\n- ${missing.join('\n- ')}\n\nPlease set these secrets as repository secrets or coordinate secure provisioning. This issue will be re-checked daily.`;
              const openIssues = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
              const exists = openIssues.data.find(i => i.title === issueTitle);
              if (exists) {
                await github.rest.issues.createComment({ owner, repo, issue_number: exists.number, body: `Reminder: missing secrets detected again: ${missing.join(', ')}` });
                core.info(`Updated issue #${exists.number}`);
              } else {
                await github.rest.issues.create({ owner, repo, title: issueTitle, body, labels: ['automation','ops','runners'] });
                core.info('Created missing-secrets issue');
              }
            }