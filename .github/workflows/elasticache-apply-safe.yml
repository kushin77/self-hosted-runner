name: Terraform ElastiCache Apply (safe)

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'If "true", perform terraform apply when credentials are available'
        required: false
        default: 'false'
  push:
    paths:
      - 'terraform/elasticache-params.tfvars'

permissions:
  contents: read

concurrency:
  group: elasticache-apply-safe-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  plan-or-apply:
    name: Plan or Apply ElastiCache (safe)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.6.8'

      - name: Check elasticache params validity
        id: tfvars
        run: |
          set -euo pipefail
          if grep -q 'REPLACE_WITH' terraform/elasticache-params.tfvars; then
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "⚠ terraform/elasticache-params.tfvars still contains placeholders"
          else
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "✅ elasticache params look valid"
          fi

      - name: Determine credential path
        id: creds
        env:
          AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          echo "checking for AWS_OIDC_ROLE or AWS_ACCESS_KEY_ID..."
          if [ -n "${AWS_OIDC_ROLE:-}" ] || [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=dry-run" >> $GITHUB_OUTPUT
          fi

      - name: Full plan+apply (OIDC or keys present)
        if: steps.creds.outputs.mode == 'full' && \
            (github.event.inputs.apply == 'true' || (github.event_name == 'push' && steps.tfvars.outputs.valid == 'true'))
        run: |
          echo "Full plan+apply path detected. This workflow performs a dry-run when credentials are not present."
          echo "Note: invoking a reusable workflow as a step is unsupported; full applies are handled by the dedicated terraform apply job when credentials are available."

      - name: Dry-run plan (no backend) and upload artifact
        if: steps.creds.outputs.mode == 'dry-run' || \
           (steps.creds.outputs.mode == 'full' && github.event.inputs.apply != 'true' && !(github.event_name == 'push' && steps.tfvars.outputs.valid == 'true'))
        run: |
          set -euo pipefail
          cd terraform
          terraform init -backend=false
          terraform validate || true
          terraform plan -var-file=elasticache-params.tfvars -out=elastiCache-dryrun.tfplan || true
          mkdir -p ../workflow_artifacts/${{ github.run_id }}
          tar -czf ../workflow_artifacts/${{ github.run_id }}/elastiCache-dryrun.tgz elastiCache-dryrun.tfplan || true
        env:
          TF_IN_AUTOMATION: true

      - name: Upload dry-run artifact
        if: steps.creds.outputs.mode == 'dry-run' || (steps.creds.outputs.mode == 'full' && github.event.inputs.apply != 'true')
        uses: actions/upload-artifact@v4
        with:
          name: elastiCache-dryrun-${{ github.run_id }}
          path: workflow_artifacts/${{ github.run_id }}/elastiCache-dryrun.tgz

      - name: Notify
        if: steps.creds.outputs.mode == 'dry-run' || (steps.creds.outputs.mode == 'full' && github.event.inputs.apply != 'true')
        run: |
          echo "Dry-run completed. No backend credentials available or apply not requested. Artifact uploaded: elastiCache-dryrun-${{ github.run_id }}"

      - name: Comment on issue #1324
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MODE=${{ steps.creds.outputs.mode }}
          TFVARS_VALID=${{ steps.tfvars.outputs.valid || 'unknown' }}
          EVENT=${{ github.event_name }}
          APPLY_INPUT=${{ github.event.inputs.apply || 'false' }}
          BODY="ElastiCache workflow run triggered (event: $EVENT). mode=$MODE, tfvars_valid=$TFVARS_VALID, apply_requested=$APPLY_INPUT, run_id=${{ github.run_id }}."
          gh issue comment 1324 --repo ${{ github.repository }} --body "$BODY" || true
      
      - name: Close issue #1324 on success
        if: steps.creds.outputs.mode == 'full' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment 1324 --repo ${{ github.repository }} --body "✅ ElastiCache apply completed successfully (run ${{ github.run_id }}). Closing issue." || true
          gh issue close 1324 --repo ${{ github.repository }} || true
