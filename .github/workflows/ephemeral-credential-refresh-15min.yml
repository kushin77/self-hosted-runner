name: Ephemeral Credential Refresh (15-min)

# Refresh all credentials every 15 minutes to maintain sub-1-hour lifetime
on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read
  actions: read
  issues: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  AWS_KMS_KEY_ID: ${{ secrets.AWS_KMS_KEY_ID }}

jobs:
  refresh-credentials:
    name: Refresh Ephemeral Credentials
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get OIDC Token
        id: oidc
        run: |
          OIDC_TOKEN=${{ secrets.GITHUB_TOKEN }}
          echo "oidc_available=true" >> $GITHUB_OUTPUT

      - name: Authenticate to GCP
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Refresh GSM Credentials
        id: gsm-refresh
        run: |
          set -euo pipefail
          echo "Refreshing credentials from GSM..."

          # List all secrets in GSM
          SECRETS=$(gcloud secrets list --project="$GCP_PROJECT_ID" \
            --filter='labels.ephemeral_managed=true' \
            --format='value(name)')

          REFRESH_COUNT=0
          FAILED_COUNT=0

          for SECRET in $SECRETS; do
            echo "Refreshing $SECRET..."
            
            # Rotate to new version
            if gcloud secrets versions add "$SECRET" \
              --data-file=/dev/stdin \
              --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
              ((REFRESH_COUNT++))
            else
              ((FAILED_COUNT++))
            fi
          done

          echo "gsm_refreshed=$REFRESH_COUNT" >> $GITHUB_OUTPUT
          echo "gsm_failed=$FAILED_COUNT" >> $GITHUB_OUTPUT
          echo "✅ Refreshed $REFRESH_COUNT credentials, $FAILED_COUNT failures"

      - name: Validate Credential Accessibility
        id: validate
        run: |
          set -euo pipefail
          echo "Validating credential accessibility..."

          # Test fetching from each layer
          ACCESSIBLE_GSM=0
          ACCESSIBLE_VAULT=0
          ACCESSIBLE_KMS=0

          # Test GSM
          if [ -n "$GCP_PROJECT_ID" ]; then
            if gcloud secrets list --project="$GCP_PROJECT_ID" --limit=1 >/dev/null 2>&1; then
              ACCESSIBLE_GSM=1
              echo "✅ GSM accessible"
            fi
          fi

          # Test Vault
          if [ -n "$VAULT_ADDR" ]; then
            if curl -sf "$VAULT_ADDR/v1/sys/health" >/dev/null 2>&1; then
              ACCESSIBLE_VAULT=1
              echo "✅ Vault accessible"
            fi
          fi

          # Test KMS
          if [ -n "$AWS_KMS_KEY_ID" ]; then
            if aws sts get-caller-identity >/dev/null 2>&1; then
              ACCESSIBLE_KMS=1
              echo "✅ KMS accessible"
            fi
          fi

          echo "gsm_available=$ACCESSIBLE_GSM" >> $GITHUB_OUTPUT
          echo "vault_available=$ACCESSIBLE_VAULT" >> $GITHUB_OUTPUT
          echo "kms_available=$ACCESSIBLE_KMS" >> $GITHUB_OUTPUT

      - name: Log Refresh Event
        if: always()
        run: |
          set +e
          
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          echo "{
            \"timestamp\": \"$TIMESTAMP\",
            \"event_type\": \"credential_refresh\",
            \"refreshed\": ${{ steps.gsm-refresh.outputs.gsm_refreshed || 0 }},
            \"failed\": ${{ steps.gsm-refresh.outputs.gsm_failed || 0 }},
            \"gsm_available\": ${{ steps.validate.outputs.gsm_available || 0 }},
            \"vault_available\": ${{ steps.validate.outputs.vault_available || 0 }},
            \"kms_available\": ${{ steps.validate.outputs.kms_available || 0 }},
            \"status\": \"complete\"
          }" >> credential-refresh-log-$TIMESTAMP.json

      - name: Report Refresh Status
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: 1974,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Credential refresh partially failed\n\n' +
                    '- GSM: ${{ steps.validate.outputs.gsm_available }}\n' +
                    '- Vault: ${{ steps.validate.outputs.vault_available }}\n' +
                    '- KMS: ${{ steps.validate.outputs.kms_available }}'
            })

      - name: Success Summary
        run: |
          echo "✅ Credential refresh cycle complete"
          echo "  - Refreshed: ${{ steps.gsm-refresh.outputs.gsm_refreshed || 0 }} credentials"
          echo "  - Failed: ${{ steps.gsm-refresh.outputs.gsm_failed || 0 }}"
          echo "  - GSM: ${{ steps.validate.outputs.gsm_available }}"
          echo "  - Vault: ${{ steps.validate.outputs.vault_available }}"
          echo "  - KMS: ${{ steps.validate.outputs.kms_available }}"
