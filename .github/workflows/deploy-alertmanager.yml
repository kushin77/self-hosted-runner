name: Deploy Alertmanager

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["sync-slack-webhook.yml"]
    types: [completed]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  deploy:
    if: >-
      ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    env:
      ALERTMANAGER_CONFIG_PATH: ./alertmanager.yml
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/automation/pmo/prometheus/generate-alertmanager-config.sh || true
          chmod +x scripts/automated_test_alert.sh || true

      - name: Check for SLACK_WEBHOOK_URL secret
        uses: actions/github-script@v7
        with:
          script: |
            const has = !!process.env.SLACK_WEBHOOK_URL;
            if (!has) {
              const issueNumber = 480;
              const body = `Alertmanager deployment blocked: missing \`SLACK_WEBHOOK_URL\` repo secret. Automated sync may still be running. Please ensure the secret is provisioned in GSM or GitHub Secrets.`;
              await github.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, body});
              core.setFailed('Missing SLACK_WEBHOOK_URL');
            }

      - name: Set up Python (for Ansible)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible==8.7.0

      - name: Set up SSH key for deployment
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key || (echo "Attempting base64 decode fallback..." && base64 -d "$(printf "${{ secrets.DEPLOY_SSH_KEY }}")" > ~/.ssh/deploy_key_decoded && chmod 600 ~/.ssh/deploy_key_decoded && ssh-add ~/.ssh/deploy_key_decoded)
          ssh-keyscan -H staging.example.com >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Generate Alertmanager config
        run: |
          ./scripts/automation/pmo/prometheus/generate-alertmanager-config.sh > ${ALERTMANAGER_CONFIG_PATH}
          ls -l ${ALERTMANAGER_CONFIG_PATH}

      - name: Deploy Alertmanager via Ansible
        run: |
          ansible-playbook -i ansible/inventory/staging ansible/playbooks/deploy-alertmanager-config.yml --extra-vars "alertmanager_config_path=${ALERTMANAGER_CONFIG_PATH}"

      - name: Run synthetic alert test
        run: |
          ./scripts/automated_test_alert.sh || (echo 'Synthetic alert test failed' && exit 2)

      - name: Comment and close Issue #480 on success
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = 480;
            await github.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, body: 'Automated Alertmanager deployment to staging completed and synthetic alert test passed. Closing this issue.'});
            await github.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, state: 'closed'});
