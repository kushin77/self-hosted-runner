name: "Setup Infrastructure: OIDC/WIF + Secrets Managers"

on:
  workflow_dispatch:
    inputs:
      setup_gcp:
        description: "Setup GCP WIF"
        required: false
        default: "true"
        type: boolean
      setup_aws:
        description: "Setup AWS OIDC"
        required: false
        default: "true"
        type: boolean
      setup_vault:
        description: "Setup Vault JWT"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  setup-gcp-wif:
    name: "Setup GCP Workload Identity Federation"
    runs-on: ubuntu-latest
    if: inputs.setup_gcp == true
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.cred_gcp_workload_identity_provider.outputs.credential }}
          service_account: ${{ steps.cred_gcp_service_account.outputs.credential }}
          create_credentials_file: false
        if: secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != ''

      - uses: google-github-actions/setup-gcloud@v2

      - name: "Run GCP WIF setup script"
        shell: bash
        env:
          GCP_PROJECT_ID: ${{ steps.cred_gcp_project_id.outputs.credential }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
      - name: Get Credential [AWS_ACCOUNT_ID]
        id: cred_aws_account_id
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: AWS_ACCOUNT_ID
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [AWS_ROLE_TO_ASSUME]
        id: cred_aws_role_to_assume
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: AWS_ROLE_TO_ASSUME
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_PROJECT_ID]
        id: cred_gcp_project_id
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_PROJECT_ID
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_SERVICE_ACCOUNT]
        id: cred_gcp_service_account
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_SERVICE_ACCOUNT
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_WORKLOAD_IDENTITY_PROVIDER]
        id: cred_gcp_workload_identity_provider
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_WORKLOAD_IDENTITY_PROVIDER
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [VAULT_ADDR]
        id: cred_vault_addr
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: VAULT_ADDR
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [VAULT_TOKEN]
        id: cred_vault_token
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: VAULT_TOKEN
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

        run: |
          chmod +x .github/scripts/setup-oidc-wif.sh
          .github/scripts/setup-oidc-wif.sh

      - name: "Upload setup log"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gcp-wif-setup-log
          path: .github/scripts/.oidc-setup-*.log
          retention-days: 30

  setup-aws-oidc:
    name: "Setup AWS OIDC + IAM Role"
    runs-on: ubuntu-latest
    if: inputs.setup_aws == true
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.cred_aws_role_to_assume.outputs.credential }}
          aws-region: us-east-1
        if: secrets.AWS_ROLE_TO_ASSUME != ''

      - name: "Run AWS setup script"
        shell: bash
        env:
          AWS_ACCOUNT_ID: ${{ steps.cred_aws_account_id.outputs.credential }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          chmod +x .github/scripts/setup-oidc-wif.sh
          .github/scripts/setup-oidc-wif.sh

      - name: "Upload setup log"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aws-oidc-setup-log
          path: .github/scripts/.oidc-setup-*.log
          retention-days: 30

  setup-vault-jwt:
    name: "Setup Vault JWT Auth"
    runs-on: ubuntu-latest
    if: inputs.setup_vault == true
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "Run Vault JWT setup script"
        shell: bash
        env:
          VAULT_ADDR: ${{ steps.cred_vault_addr.outputs.credential }}
          VAULT_TOKEN: ${{ steps.cred_vault_token.outputs.credential }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          chmod +x .github/scripts/setup-vault-jwt.sh
          .github/scripts/setup-vault-jwt.sh

      - name: "Upload setup log"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vault-jwt-setup-log
          path: .github/scripts/.vault-setup-*.log
          retention-days: 30

  report:
    name: "Setup Summary Report"
    runs-on: ubuntu-latest
    if: always()
    needs: [setup-gcp-wif, setup-aws-oidc, setup-vault-jwt]

    steps:
      - name: "Post setup summary"
        shell: bash
        run: |
          echo "## Infrastructure Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ GCP Workload Identity Federation" >> $GITHUB_STEP_SUMMARY
          echo "✓ AWS OIDC Provider + IAM Role" >> $GITHUB_STEP_SUMMARY
          echo "✓ Vault JWT Auth Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next**: Update GitHub repository secrets with identifiers from setup logs." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Required secrets:" >> $GITHUB_STEP_SUMMARY
          echo "- GCP_WORKLOAD_IDENTITY_PROVIDER" >> $GITHUB_STEP_SUMMARY
          echo "- GCP_SERVICE_ACCOUNT" >> $GITHUB_STEP_SUMMARY
          echo "- GCP_PROJECT_ID" >> $GITHUB_STEP_SUMMARY
          echo "- AWS_ROLE_TO_ASSUME" >> $GITHUB_STEP_SUMMARY
          echo "- AWS_ACCOUNT_ID" >> $GITHUB_STEP_SUMMARY
          echo "- VAULT_ADDR" >> $GITHUB_STEP_SUMMARY
          echo "- VAULT_TOKEN (short-lived, rotate after setup)" >> $GITHUB_STEP_SUMMARY
