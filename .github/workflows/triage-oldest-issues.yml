name: Oldest Issue Triage

on:
  schedule:
    - cron: '0 * * * *'     # hourly
  workflow_dispatch:

permissions:
  id-token: write
  issues: write
  contents: read

jobs:
  list-and-flag:
    name: List oldest open issues and flag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log oldest open issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO=${{ github.repository }}
          echo "## 🔍 Oldest open issues for $REPO (created first)"
          gh issue list --repo "$REPO" \
            --state open --search "sort:created-asc" --json number,title,createdAt \
            --limit 50 --jq '.[] | "- #\(.number) \(.title) (\(.createdAt|split("T")[0]))"' || true

          # optionally post a comment on the very oldest issue to prompt triage
          OLDEST=$(gh issue list --repo "$REPO" --state open --search "sort:created-asc" --limit 1 --json number --jq '.[0].number')
          if [-n "$OLDEST"]; then
            echo "📝 Adding triage reminder to oldest issue #$OLDEST"
            gh issue comment "$OLDEST" --repo "$REPO" --body "🔁 This is currently the oldest open issue; please review and triage (automated ping)." || true
          fi
