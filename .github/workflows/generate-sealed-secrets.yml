name: Generate SealedSecret

on:
  workflow_dispatch:
    inputs:
      secret_value:
        description: 'Secret value (sensitive)'
        required: true
      secret_name:
        description: 'K8s secret name'
        required: false
        default: 'vault-approle-secret'
      namespace:
        description: 'K8s namespace'
        required: false
        default: 'gitops'
      controller_namespace:
        description: 'SealedSecrets controller namespace'
        required: false
        default: 'kube-system'

jobs:
  generate:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: generate-sealed-secrets-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: [self-hosted, linux]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ensure kubectl
        run: |
          if ! command -v kubectl >/dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" && chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          fi

      - name: Ensure kubeseal
        run: |
          if ! command -v kubeseal >/dev/null; then
            KUBESEAL_VER=$(curl -s https://api.github.com/repos/bitnami-labs/sealed-secrets/releases/latest | jq -r .tag_name)
            curl -L "https://github.com/bitnami-labs/sealed-secrets/releases/download/${KUBESEAL_VER}/kubeseal-${KUBESEAL_VER}-linux-amd64.tar.gz" | tar xz -C /tmp && sudo mv /tmp/kubeseal /usr/local/bin/
          fi

      - name: Generate sealed secret
        env:
          SECRET_VALUE: ${{ inputs.secret_value }}
        run: |
          set -euo pipefail
          mkdir -p .sealed
          OUTPUT=.sealed/sealed-$(date +%s).yaml
          ./ci/scripts/generate_sealed_secret.sh --name "${{ inputs.secret_name }}" --namespace "${{ inputs.namespace }}" --key secretId --value "$SECRET_VALUE" --out "$OUTPUT" --controller-namespace "${{ inputs.controller_namespace }}"
          echo "Generated sealed secret: $OUTPUT"

      - name: Commit sealed secret and create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH=sealed/bootstrap/$(date +%s)
          git config user.name "sov-bot"
          git config user.email "sov-bot@example.local"
          git checkout -b "$BRANCH"
          git add .sealed/*.yaml
          git commit -m "chore(sealed): add sealed secret bootstrap artifact"
          git push -u origin "$BRANCH"
          PR_DATA=$(jq -n --arg head "$BRANCH" --arg base "main" --arg title "chore(sealed): add sealed secret bootstrap" --arg body "Automated sealed secret generated by workflow. Review before merging." '{head:$head,base:$base,title:$title,body:$body}')
          curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/repos/${{ github.repository }}/pulls -d "$PR_DATA" | jq -r .html_url
