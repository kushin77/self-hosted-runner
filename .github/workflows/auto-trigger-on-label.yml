name: Auto-run when OIDC Ready Label Applied

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  actions: write
  id-token: write

jobs:
  fetch-gsm-creds:
    name: Fetch credentials from GCP GSM
    runs-on: ubuntu-latest
    if: github.event.label.name == 'oidc-ready'
    outputs:
      aws_access_key_id: ${{ steps.fetch.outputs.aws_access_key_id }}
      aws_secret_access_key: ${{ steps.fetch.outputs.aws_secret_access_key }}
      aws_oidc_role_arn: ${{ steps.fetch.outputs.aws_oidc_role_arn }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        continue-on-error: true

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        continue-on-error: true

      - name: Fetch AWS credentials from GSM
        id: fetch
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'gcp-eiq' }}
        run: |
          set -euo pipefail
          gcloud services enable secretmanager.googleapis.com --project="$GCP_PROJECT_ID" || true
          
          aws_key=$(gcloud secrets versions access latest --secret="aws-access-key-id" --project="$GCP_PROJECT_ID" 2>/dev/null || echo "")
          aws_secret=$(gcloud secrets versions access latest --secret="aws-secret-access-key" --project="$GCP_PROJECT_ID" 2>/dev/null || echo "")
          aws_oidc=$(gcloud secrets versions access latest --secret="aws-oidc-role-arn" --project="$GCP_PROJECT_ID" 2>/dev/null || echo "")
          
          echo "aws_access_key_id=${aws_key}" >> $GITHUB_OUTPUT
          echo "aws_secret_access_key=${aws_secret}" >> $GITHUB_OUTPUT
          echo "aws_oidc_role_arn=${aws_oidc}" >> $GITHUB_OUTPUT
          
          [ -n "$aws_key" ] && echo "✓ AWS Access Key fetched from GSM"
          [ -n "$aws_secret" ] && echo "✓ AWS Secret Key fetched from GSM"
          [ -n "$aws_oidc" ] && echo "✓ AWS OIDC Role ARN fetched from GSM"
        continue-on-error: true

  dispatch-on-oidc-ready:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'oidc-ready'
    steps:
      - name: Notify start (best-effort)
        run: |
          set -euo pipefail
          echo "Posting start comment (best-effort)"
          curl -s -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
            -d '{"body":"Label `oidc-ready` detected — dispatching preflight and terraform apply workflows now."}' || true

      - name: Dispatch OIDC preflight workflow (with retries)
        run: |
          set -euo pipefail
          url="https://api.github.com/repos/${{ github.repository }}/actions/workflows/oidc-auth-template.yml/dispatches"
          data='{"ref":"main"}'
          attempt=0
          max=6
          until [ $attempt -ge $max ]
          do
            attempt=$((attempt+1))
            resp=$(curl -s -o /dev/stderr -w "%{http_code}" -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "$url" -d "$data" 2>&1) || true
            code=$(echo "$resp" | tr -d '\n' | tail -c 3)
            if [ "$code" = "204" ] || [ "$code" = "201" ] || [ "$code" = "200" ]; then
              echo "Dispatched OIDC preflight workflow (attempt $attempt): HTTP $code"
              break
            fi
            echo "Dispatch attempt $attempt returned HTTP $code; retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done || true

      - name: Dispatch Terraform Auto-Apply workflow (with retries)
        run: |
          set -euo pipefail
          url="https://api.github.com/repos/${{ github.repository }}/actions/workflows/terraform-auto-apply.yml/dispatches"
          data='{"ref":"main"}'
          attempt=0
          max=6
          until [ $attempt -ge $max ]
          do
            attempt=$((attempt+1))
            resp=$(curl -s -o /dev/stderr -w "%{http_code}" -X POST -H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "$url" -d "$data" 2>&1) || true
            code=$(echo "$resp" | tr -d '\n' | tail -c 3)
            if [ "$code" = "204" ] || [ "$code" = "201" ] || [ "$code" = "200" ]; then
              echo "Dispatched Terraform Auto-Apply workflow (attempt $attempt): HTTP $code"
              break
            fi
            echo "Dispatch attempt $attempt returned HTTP $code; retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done || true

      - name: Comment completion
        uses: actions/github-script@v6
        with:
          script: |
            github.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Workflows dispatched. Monitor actions/runs and report back here if any failures occur.'
            })

  run-terraform-on-label:
    name: Run Terraform (on oidc-ready)
    runs-on: ubuntu-latest
    if: github.event.label.name == 'oidc-ready'
    needs: [dispatch-on-oidc-ready, preflight-validate, fetch-gsm-creds]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.4.0"

      - name: Configure AWS via OIDC (if enabled)
        if: ${{ secrets.USE_OIDC == 'true' && secrets.AWS_OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}

      - name: Configure AWS via OIDC from GSM
        if: ${{ secrets.USE_OIDC != 'true' && needs.fetch-gsm-creds.outputs.aws_oidc_role_arn != '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ needs.fetch-gsm-creds.outputs.aws_oidc_role_arn }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}

      - name: Configure static AWS creds (fallback)
        if: ${{ secrets.USE_OIDC != 'true' && secrets.AWS_ACCESS_KEY_ID != '' }}
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}" >> $GITHUB_ENV

      - name: Configure AWS creds from GSM (if available)
        if: ${{ secrets.USE_OIDC != 'true' && secrets.AWS_ACCESS_KEY_ID == '' && needs.fetch-gsm-creds.outputs.aws_access_key_id != '' }}
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ needs.fetch-gsm-creds.outputs.aws_access_key_id }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ needs.fetch-gsm-creds.outputs.aws_secret_access_key }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}" >> $GITHUB_ENV

      - name: Configure GCP creds (if provided)
        if: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY != '' }}
        run: |
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Check preflight result
        run: |
          echo "Preflight indicates creds_available=${{ needs.preflight-validate.outputs.creds }}"

      - name: Proceed only if credentials available
        if: ${{ needs.preflight-validate.outputs.creds == 'true' }}
        run: echo "Credentials available — proceeding to init/plan/apply"

      - name: Skip apply when no credentials
        if: ${{ needs.preflight-validate.outputs.creds != 'true' }}
        run: |
          echo "No cloud credentials available; preflight dry-run passed. Skipping full apply until OIDC/creds are provisioned."
          exit 0

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: ${{ needs.preflight-validate.outputs.creds == 'true' }}
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan

  preflight-validate:
    name: Preflight: Terraform validation (no backend)
    runs-on: ubuntu-latest
    needs: [dispatch-on-oidc-ready, fetch-gsm-creds]
    outputs:
      creds: ${{ steps.check_creds.outputs.creds }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.4.0"

      - name: Safe backend-free terraform init/plan
        id: tf_plan
        run: |
          set -euo pipefail
          cd terraform
          terraform init -input=false -backend=false
          terraform plan -input=false -out=tfplan-dry || true
          echo "preflight=passed" > preflight.out

      - name: Check for cloud credentials
        id: check_creds
        run: |
          set -euo pipefail
          creds_available=false
          
          # Check GSM-fetched credentials first (preferred)
          if [ -n "${{ needs.fetch-gsm-creds.outputs.aws_oidc_role_arn }}" ]; then
            creds_available=true
          elif [ -n "${{ needs.fetch-gsm-creds.outputs.aws_access_key_id }}" ]; then
            creds_available=true
          # Fall back to repo secrets
          elif [ "${{ secrets.USE_OIDC }}" = "true" ] && [ -n "${{ secrets.AWS_OIDC_ROLE_ARN }}" ]; then
            creds_available=true
          elif [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            creds_available=true
          elif [ -n "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]; then
            creds_available=true
          fi
          echo "creds=${creds_available}" >> $GITHUB_OUTPUT

      - name: Post preflight comment (issue)
        run: |
          owner=${{ github.repository_owner }}
          repo=${{ github.event.repository.name }}
          issue=${{ github.event.issue.number }}
          body="Preflight Terraform validation completed (backend-free). Credentials available=${{ steps.check_creds.outputs.creds }}. Credentials source: GSM or repo secrets."
          curl -s -X POST -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${owner}/${repo}/issues/${issue}/comments" -d "{\"body\":\"${body}\"}" || true
