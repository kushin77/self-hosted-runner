      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: AWS_REGION
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [GCP_BUCKET_PREFIX]
      id: cred_gcp_bucket_prefix
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: GCP_BUCKET_PREFIX
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [GCP_PROJECT_ID]
      id: cred_gcp_project_id
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: GCP_PROJECT_ID
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [GCP_REGION]
      id: cred_gcp_region
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: GCP_REGION
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [GCP_SA_KEY]
      id: cred_gcp_sa_key
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: GCP_SA_KEY
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [GOOGLE_APPLICATION_CREDENTIALS]
      id: cred_google_application_credentials
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: GOOGLE_APPLICATION_CREDENTIALS
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [TERRAFORM_ENVIRONMENT]
      id: cred_terraform_environment
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: TERRAFORM_ENVIRONMENT
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [TERRAFORM_GITHUB_OWNER]
      id: cred_terraform_github_owner
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: TERRAFORM_GITHUB_OWNER
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [TERRAFORM_GITHUB_REPO]
      id: cred_terraform_github_repo
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: TERRAFORM_GITHUB_REPO
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [TERRAFORM_PROJECT_NAME]
      id: cred_terraform_project_name
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: TERRAFORM_PROJECT_NAME
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
      run: 'set -euo pipefail

        echo "::group::Setup Terraform"

        TF_VERSION=1.5.7

        mkdir -p /tmp/terraform-drift

        curl -fsSL https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip
        -o /tmp/terraform-drift/terraform.zip

        unzip -o /tmp/terraform-drift/terraform.zip -d /usr/local/bin/

        terraform version

        echo "::endgroup::"

        '
    - name: Configure GCP credentials
      env:
        GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY || secrets.GOOGLE_APPLICATION_CREDENTIALS
          }}
      run: "set -euo pipefail\nif [-z \"$GOOGLE_APPLICATION_CREDENTIALS_JSON\"]; then\n\
        \  echo \"::warning::GCP credentials not available\"\nelse\n  echo \"$GOOGLE_APPLICATION_CREDENTIALS_JSON\"\
        \ > /tmp/gcp-sa.json\n  export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json\n\
        \  echo \"GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json\" >> $GITHUB_ENV\n\
        fi\n"
    - name: Prepare terraform variables
      env:
        AWS_REGION: ${{ secrets.AWS_REGION || needs.fetch-aws-creds.outputs.aws_region
          }}
        VPC_ID: ${{ steps.cred_terraform_vpc_id.outputs.credential }}
        SUBNET_IDS: ${{ steps.cred_terraform_subnet_ids.outputs.credential }}
        RUNNER_TOKEN: ${{ steps.cred_terraform_runner_token.outputs.credential }}
        GITHUB_OWNER: ${{ secrets.TERRAFORM_GITHUB_OWNER || github.repository_owner
          }}
        GITHUB_REPO: ${{ secrets.TERRAFORM_GITHUB_REPO || github.event.repository.name
          }}
        PROJECT_NAME: ${{ secrets.TERRAFORM_PROJECT_NAME || 'elevatediq-runners' }}
        ENVIRONMENT: ${{ secrets.TERRAFORM_ENVIRONMENT || 'prod' }}
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'gcp-eiq' }}
        GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
        BUCKET_PREFIX: ${{ secrets.GCP_BUCKET_PREFIX || 'vault-data-gcp' }}
      run: 'set -euo pipefail

        cat > terraform/terraform.tfvars <<''TFVARS''

        aws_region = "$AWS_REGION"

        vpc_id = "$VPC_ID"

        subnet_ids = $SUBNET_IDS

        runner_token = "$RUNNER_TOKEN"

        github_owner = "$GITHUB_OWNER"

        github_repo = "$GITHUB_REPO"

        project_name = "$PROJECT_NAME"

        environment = "$ENVIRONMENT"

        project_id = "$GCP_PROJECT_ID"

        region = "$GCP_REGION"

        bucket_prefix = "$BUCKET_PREFIX"

        TFVARS

        '
    - name: Terraform Init
      working-directory: terraform
      env:
        AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key
          }}
        AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
        GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
      run: 'set -euo pipefail

        source ../.github/scripts/resilience.sh || true

        retry_command 3 5 terraform init -input=false

        '
    - name: Detect Terraform Drift
      working-directory: terraform
      env:
        AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key
          }}
        AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
        GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
      run: "set -euo pipefail\necho \"::group::Terraform Plan (Drift Detection)\"\n\
        \nterraform plan \\\n  -input=false \\\n  -var-file=terraform.tfvars \\\n\
        \  -out=drift-check.tfplan > /tmp/drift-plan.txt 2>&1 || true\n\n# Check for\
        \ drift\nif grep -q \"No changes\\|nothing to do\" /tmp/drift-plan.txt; then\n\
        \  echo \"::notice::✓ No drift detected - infrastructure matches desired state\"\
        \n  echo \"DRIFT_STATUS=clean\" >> $GITHUB_ENV\nelse\n  echo \"::warning::Drift\
        \ detected in infrastructure - review plan\"\n  terraform show -no-color drift-check.tfplan\
        \ | tee /tmp/drift-details.txt\n  echo \"DRIFT_STATUS=dirty\" >> $GITHUB_ENV\n\
        fi\n\ncat /tmp/drift-plan.txt\necho \"::endgroup::\"\n"
    - name: Upload drift report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: terraform-drift-report-${{ github.run_id }}
        path: 'terraform/drift-check.tfplan

          /tmp/drift-plan.txt

          /tmp/drift-details.txt

          '
        retention-days: 30
        if-no-files-found: ignore
    - name: Report drift status
      if: always()
      run: "if [\"$DRIFT_STATUS\" == \"dirty\"]; then\n  echo \"::error::Terraform\
        \ drift detected. An automated remediation workflow can be triggered.\"\n\
        else\n  echo \"::notice::Infrastructure state is clean\"\nfi\n"
    timeout-minutes: 30
  health-check-runners:
    name: Runner Health Check
    if: github.event.inputs.check_type == 'full' || github.event.inputs.check_type
      == 'health-only' || github.event.inputs.check_type == ''
    runs-on: ubuntu-latest
    needs:
    - fetch-aws-creds
    steps:
    - uses: actions/checkout@v4
    - name: Check EC2 Runner Instances
      env:
        AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key
          }}
        AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
      run: "set -euo pipefail\necho \"::group::EC2 Runner Instances Health\"\n\n#\
        \ Get runner instances by tag\naws ec2 describe-instances \\\n  --filters\
        \ \"Name=tag:Project,Values=elevatediq-runners\" \\\n            \"Name=instance-state-name,Values=running\"\
        \ \\\n            \"Name=tag:ManagedBy,Values=Terraform\" \\\n  --query 'Reservations[*].Instances[*].[InstanceId,InstanceType,State.Name,LaunchTime]'\
        \ \\\n  --output table\n\nRUNNING=$(aws ec2 describe-instances \\\n  --filters\
        \ \"Name=tag:Project,Values=elevatediq-runners\" \"Name=instance-state-name,Values=running\"\
        \ \\\n  --query 'length(Reservations[*].Instances[*][])'  2>/dev/null || echo\
        \ 0)\n\necho \"::notice::Total running runner instances: $RUNNING\"\necho\
        \ \"::endgroup::\"\n"
    - name: Check GitHub Runner Registration
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: "set -euo pipefail\necho \"::group::GitHub Runner Registration Status\"\
        \n\nOWNER=\"${{ github.repository_owner }}\"\nREPO=\"${{ github.event.repository.name\
        \ }}\"\n\n# List self-hosted runners\ngh api \"/repos/$OWNER/$REPO/actions/runners?per_page=100\"\
        \ \\\n  --jq '.runners[] | select(.os==\"Linux\") | {name: .name, status:\
        \ .status, busy: .busy}'\n\nTOTAL=$(gh api \"/repos/$OWNER/$REPO/actions/runners?per_page=100\"\
        \ \\\n  --jq '.runners | length')\n\nONLINE=$(gh api \"/repos/$OWNER/$REPO/actions/runners?per_page=100\"\
        \ \\\n  --jq '[.runners[] | select(.status==\"online\")] | length')\n\necho\
        \ \"::notice::Total runners: $TOTAL | Online: $ONLINE\"\necho \"::endgroup::\"\
        \n"
    - name: Create or update health dashboard
      run: 'cat > /tmp/phase2-health-report.md <<''EOF''

        # Terraform Phase 2 Infrastructure Health Report


        **Generated:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")

        **Workflow:** ${{ github.workflow }}

        **Run ID:** ${{ github.run_id }}


        ## Status Summary

        - Drift Detection: ${{ job.status }}

        - Runner Health: ${{ job.status }}


        ## Checks Performed

        1. Terraform state drift detection

        2. EC2 instance health

        3. GitHub runner registration status

        4. Security group configuration


        ## Recommendations

        - Review drift report if discrepancies found

        - Ensure all runners are registered with GitHub

        - Monitor instance uptime and performance


        **For details,** see GitHub Actions artifacts.

        EOF

        cat /tmp/phase2-health-report.md

        '
    - name: Upload health report
      uses: actions/upload-artifact@v4
      with:
        name: phase2-health-report-${{ github.run_id }}
        path: /tmp/phase2-health-report.md
        retention-days: 30
    timeout-minutes: 30
  notify-status:
    name: Notify Drift/Health Status
    if: always()
    runs-on: ubuntu-latest
    needs:
    - terraform-drift-detection
    - health-check-runners
    steps:
    - name: Check drift detection result
      run: "DRIFT_RESULT=\"${{ needs.terraform-drift-detection.result }}\"\nHEALTH_RESULT=\"\
        ${{ needs.health-check-runners.result }}\"\n\nif [\"$DRIFT_RESULT\" == \"\
        failure\"] || [\"$HEALTH_RESULT\" == \"failure\"]; then\n  echo \"::error::Drift\
        \ or health check failed - review artifacts\"\n  exit 1\nelse\n  echo \"::notice::✓\
        \ All checks passed - infrastructure healthy\"\nfi\n"
    - name: Optional Slack notification
      if: failure()
      run: "if [-n \"${{ steps.cred_slack_webhook_url.outputs.credential }}\"]; then\n\
        \  echo \"::notice::Slack notification can be sent via webhook (optional)\"\
        \nfi\n"
    timeout-minutes: 30
