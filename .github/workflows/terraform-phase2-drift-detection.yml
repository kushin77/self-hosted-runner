        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [TERRAFORM_PROJECT_NAME]
      id: cred_terraform_project_name
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: TERRAFORM_PROJECT_NAME
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - id: fetch
      uses: ./.github/workflows/fetch-aws-creds-from-gsm.yml
      with:
        GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ steps.cred_gcp_workload_identity_provider.outputs.credential
          }}
        GCP_SERVICE_ACCOUNT_EMAIL: ${{ steps.cred_gcp_service_account_email.outputs.credential
          }}
        GCP_PROJECT_ID: ${{ steps.cred_gcp_project_id.outputs.credential }}
    timeout-minutes: 30
  terraform-drift-detection:
    name: Terraform Drift Detection
    needs:
    - fetch-aws-creds
    if: github.event.inputs.check_type == 'full' || github.event.inputs.check_type
      == 'plan-only' || github.event.inputs.check_type == ''
    runs-on:
    - self-hosted
    - linux
    - self-hosted-heavy
    concurrency:
      group: terraform-drift-${{ github.ref }}
      cancel-in-progress: false
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Terraform
    - name: Get Credential [GCP_PROJECT_ID]
      id: cred_gcp_project_id
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: GCP_PROJECT_ID
        retrieve-from: auto
