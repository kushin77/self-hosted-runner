name: "[SCHEDULED] Multi-Layer Orchestrator Deployment — 6 AM UTC Daily"

on:
  schedule:
    # Daily at 6 AM UTC — production orchestration run
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no infrastructure changes)'
        required: false
        default: 'false'

env:
  DEPLOYMENT_TAG: v2026.03.09-orchestrator-staged

jobs:
  orchestrator_deploy:
    name: Multi-Layer Orchestrator
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: "Credential Discovery"
        id: discover
        run: |
          echo "=== Credential Discovery ==="
          aws_ready=false
          gcp_ready=false
          vault_ready=false
          
          if [[ -n "$AWS_ACCESS_KEY_ID" && -n "$AWS_SECRET_ACCESS_KEY" ]]; then
            echo "✓ AWS credentials available"
            aws_ready=true
          fi
          
          if [[ -n "$GCP_SERVICE_ACCOUNT_KEY" ]]; then
            echo "✓ GCP Service Account available"
            gcp_ready=true
          fi
          
          if [[ -n "$VAULT_ADDR" && -n "$VAULT_ROLE" ]]; then
            echo "✓ Vault credentials available"
            vault_ready=true
          fi
          
          echo "aws_ready=$aws_ready" >> $GITHUB_OUTPUT
          echo "gcp_ready=$gcp_ready" >> $GITHUB_OUTPUT
          echo "vault_ready=$vault_ready" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE: ${{ secrets.VAULT_ROLE }}
      
      - name: "Terraform Validation"
        id: validate
        run: |
          cd terraform
          terraform init -no-color || true
          terraform validate -no-color
          cd ..
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      
      - name: "Terraform Plan"
        id: plan
        run: |
          cd terraform
          terraform plan -no-color -out=/tmp/terraform.plan || true
          cd ..
      
      - name: "Terraform Apply"
        id: apply
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          cd terraform
          terraform apply -no-color -auto-approve /tmp/terraform.plan || true
          cd ..
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      
      - name: "Smoke Tests"
        id: smoke
        run: |
          if [[ -x scripts/phase-p4-smoke-tests.sh ]]; then
            bash scripts/phase-p4-smoke-tests.sh || true
          fi
      
      - name: "Post Results to Issue #1702"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toISOString();
            const body = `## 🤖 Automated Deployment Run — ${now}
            
**Status:** ${{ steps.apply.outcome == 'success' ? '✅ Apply Success' : '⏭️ Dry-Run or Skipped' }}

### Credentials Discovered
- AWS: ${{ steps.discover.outputs.aws_ready == 'true' ? '✅' : '❌' }}
- GCP: ${{ steps.discover.outputs.gcp_ready == 'true' ? '✅' : '❌' }}
- Vault: ${{ steps.discover.outputs.vault_ready == 'true' ? '✅' : '❌' }}

### Terraform
- Validate: ${{ steps.validate.outcome }}
- Plan: ${{ steps.plan.outcome }}
- Apply: ${{ steps.apply.outcome }}

### Smoke Tests
- Result: ${{ steps.smoke.outcome }}

**Workflow Run:** [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
`;
            
            github.rest.issues.createComment({
              issue_number: 1702,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_KMS_KEY_ID: ${{ secrets.AWS_KMS_KEY_ID }}
  AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
  GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  VAULT_ROLE: ${{ secrets.VAULT_ROLE }}
  VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
  VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
