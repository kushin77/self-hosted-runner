name: Runner Self-Heal

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: runner-self-heal
  cancel-in-progress: true

jobs:
  check-and-heal:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check repository runners
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_MGMT_TOKEN || github.token }}
        run: |
          set +e
          # Detect if we are using the fallback token
          if [[ -z "${{ secrets.RUNNER_MGMT_TOKEN }}" ]]; then
            echo "::warning ::RUNNER_MGMT_TOKEN not found. Using github.token fallback (may result in 403 Forbidden for runner management)."
          fi

          # Use PAT if available for administration access, otherwise fallback to GITHUB_TOKEN
          runners_json=$(gh api /repos/${{ github.repository }}/actions/runners)
          RETVAL=$?

          # If initial query fails, attempt to fetch RUNNER_MGMT_TOKEN from GCP Secret Manager and retry
          if [ $RETVAL -ne 0 ]; then
            echo "::warning::Initial runner list query failed (Exit Code $RETVAL). Attempting GSM fallback."
            if [[ -n "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]] && [[ -n "${{ secrets.GCP_PROJECT_ID }}" ]]; then
              echo "::group::GSM Fallback: attempt to access runner-mgmt-token"
              echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" > /tmp/gcp_sa.json
              gcloud auth activate-service-account --key-file=/tmp/gcp_sa.json --project="${{ secrets.GCP_PROJECT_ID }}" || true
              NEW_TOKEN=$(gcloud secrets versions access latest --secret="runner-mgmt-token" --project="${{ secrets.GCP_PROJECT_ID }}" 2>/dev/null) || true
              if [[ -n "$NEW_TOKEN" ]]; then
                echo "::add-mask::$NEW_TOKEN"
                export GH_TOKEN="$NEW_TOKEN"
                runners_json=$(gh api /repos/${{ github.repository }}/actions/runners)
                RETVAL=$?
              else
                echo "::warning::GSM did not return a runner-mgmt-token"
              fi
              rm -f /tmp/gcp_sa.json
              echo "::endgroup::"
            else
              echo "::warning::GCP_SERVICE_ACCOUNT_KEY or GCP_PROJECT_ID not configured; skipping GSM fallback"
            fi
          fi

          if [ $RETVAL -ne 0 ]; then
            echo "::error ::Failed to retrieve runners list via API (Exit Code $RETVAL). Ensure RUNNER_MGMT_TOKEN is configured with 'administration:read' scope or GSM fallback is available."
            echo "offline_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          offline_count=$(echo "$runners_json" | jq '.runners | map(select(.status != "online")) | length')
          offline_names=$(echo "$runners_json" | jq -r '.runners | map(select(.status != "online")) | map(.name) | join(",")')
          
          echo "offline_count=$offline_count" >> $GITHUB_OUTPUT
          echo "offline_names=$offline_names" >> $GITHUB_OUTPUT
          set -e

      - name: Report offline runners
        if: steps.check.outputs.offline_count != '0' && steps.check.outputs.offline_count != ''
        run: |
          echo "Offline runners: ${{ steps.check.outputs.offline_names }}"

      - name: Install Python & Ansible
        if: steps.check.outputs.offline_count != '0' && steps.check.outputs.offline_count != ''
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible (if SSH key present)
        if: steps.check.outputs.offline_count != '0' && steps.check.outputs.offline_count != ''
        run: |
          if [[ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]]; then
            echo "No DEPLOY_SSH_KEY configured; skipping Ansible install"
            exit 0
          fi
          python -m pip install --upgrade pip
          pip install ansible-core ansible

      - name: Prepare SSH key (if present)
        if: steps.check.outputs.offline_count != '0' && steps.check.outputs.offline_count != ''
        run: |
          if [[ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]]; then
            echo "No DEPLOY_SSH_KEY configured; skipping key preparation"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Attempt Ansible runner restart (if SSH key present)
        if: steps.check.outputs.offline_count != '0' && steps.check.outputs.offline_count != ''
        run: |
          if [[ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]]; then
            echo "No DEPLOY_SSH_KEY configured; skipping automated restart"
            exit 0
          fi
          ansible-playbook -i ansible/inventory/staging ansible/playbooks/provision-self-hosted-runner-noninteractive.yml --limit all || true

      - name: Create issue if runners offline and no SSH key
        if: steps.check.outputs.offline_count != '0' && steps.check.outputs.offline_count != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -n "${{ secrets.DEPLOY_SSH_KEY }}" ]]; then
            echo "DEPLOY_SSH_KEY present; automated restart attempted or will be attempted"
            exit 0
          fi
          offline_names="${{ steps.check.outputs.offline_names }}"
          gh issue create --repo "${{ github.repository }}" --title "Self-hosted runners offline — manual restore required" --body "Detected offline runners: ${offline_names}\n\nNo DEPLOY_SSH_KEY configured; automated restart skipped. Please start runners on hosts or add secret DEPLOY_SSH_KEY to enable automated self-heal." --label runners,ops || true

      - name: Close RUNNER_MGMT_TOKEN request issue when runners healthy
        if: steps.check.outputs.offline_count == '0' && steps.check.outputs.offline_count != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find open automation/urgent runner issues requesting RUNNER_MGMT_TOKEN and close them.
          set -e
          repo="${{ github.repository }}"
          matches=$(gh issue list --repo "$repo" --label automation,urgent,runners --state open --limit 100 --json number,title | jq -r '.[] | select(.title | test("RUNNER_MGMT_TOKEN")) | .number' || true)
          if [ -z "$matches" ]; then
            echo "No matching RUNNER_MGMT_TOKEN request issue found"
            exit 0
          fi
          for n in $matches; do
            echo "Closing issue #$n"
            gh issue close "$n" --repo "$repo" || true
          done
