name: Runner Self-Heal

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-and-heal:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check repository runners
        id: check
        uses: actions/github-script@v6
        with:
          script: |
            const resp = await github.rest.actions.listSelfHostedRunnersForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })
            const offline = resp.data.runners.filter(r => r.status !== 'online')
            core.setOutput('offline_count', offline.length)
            core.setOutput('offline_names', offline.map(r=>r.name).join(','))

      - name: Report offline runners
        if: steps.check.outputs.offline_count != '0'
        run: |
          echo "Offline runners: ${{ steps.check.outputs.offline_names }}"

      - name: Install Python & Ansible
        if: steps.check.outputs.offline_count != '0' && secrets.DEPLOY_SSH_KEY != ''
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        if: steps.check.outputs.offline_count != '0' && secrets.DEPLOY_SSH_KEY != ''
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible

      - name: Prepare SSH key
        if: steps.check.outputs.offline_count != '0' && secrets.DEPLOY_SSH_KEY != ''
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Attempt Ansible runner restart
        if: steps.check.outputs.offline_count != '0' && secrets.DEPLOY_SSH_KEY != ''
        run: |
          ansible-playbook -i ansible/inventory/staging ansible/playbooks/provision-self-hosted-runner-noninteractive.yml --limit all || true

      - name: Open issue if runners offline and no SSH key
        if: steps.check.outputs.offline_count != '0' && secrets.DEPLOY_SSH_KEY == ''
        uses: actions/github-script@v6
        with:
          script: |
            const offline = '${{ steps.check.outputs.offline_names }}'
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Self-hosted runners offline — manual restore required',
              body: `Detected offline runners: ${offline}\n\nNo DEPLOY_SSH_KEY configured; automated restart skipped. Please start runners on hosts or add secret DEPLOY_SSH_KEY to enable automated self-heal.`,
              labels: ['runners','ops']
            })
