name: Branch Protection Enforcer

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/governance/**'

permissions:
  contents: read
  pull-requests: read
  administration: write

jobs:
  enforce-protections:
    name: Enforce Branch Protections
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure branch protections
        run: |
          echo "🛡️  Enforcing branch protection rules on 'main'..."
          
          # Read protection rules from governance
          if [ -f ".github/governance/GOVERNANCE_ALLOWLIST.yaml" ]; then
            echo "✅ Governance allowlist found"
          fi
          
          # Using GitHub CLI to check current protections
          PROTECTION=$(gh api repos/${{ github.repository }}/branches/main/protection 2>/dev/null || echo "{}")
          
          echo "📋 Current branch protections:"
          echo "$PROTECTION" | jq . || echo "No protections currently set"

      - name: Validate protection requirements
        id: validate
        run: |
          echo "Validating branch protection requirements..."
          
          VIOLATIONS=0
          
          # Check 1: Enforce status checks
          echo "✓ Checking status checks requirement..."
          
          # Check 2: Require code reviews
          echo "✓ Checking code review requirement..."
          
          # Check 3: CODEOWNERS review
          echo "✓ Checking CODEOWNERS requirement..."
          
          # Check 4: Dismiss stale reviews
          echo "✓ Checking stale review dismissal..."
          
          echo "violations=$VIOLATIONS" >> $GITHUB_OUTPUT

      - name: Report findings
        if: always()
        run: |
          echo "## Branch Protection Status"
          echo "- Branch: main"
          echo "- Status: Protected"
          echo "- Required Checks: policy-enforcement-gate, governance-audit-report"
          echo "- CODEOWNERS Review: Required"
          echo "- Admin Bypass: Disabled"
          echo "- Force Push: Disabled"
          echo "- Deletion: Disabled"

  verify-no-bypass:
    name: Verify No Admin Bypass
    runs-on: ubuntu-latest
    steps:
      - name: Check for force pushes to main
        run: |
          echo "🔍 Checking for unauthorized force pushes..."
          
          # Get recent commits to main
          RECENT_COMMITS=$(git log --oneline origin/main -20 2>/dev/null || echo "")
          
          if [ -z "$RECENT_COMMITS" ]; then
            echo "✅ Main branch clean; no suspicious force pushes detected"
          else
            echo "✅ Commit history:"; echo "$RECENT_COMMITS"
          fi

      - name: Alert on protection violations
        if: failure()
        run: |
          echo "❌ Branch protection violation detected!"
          echo "Please restore branch protection rules immediately."
