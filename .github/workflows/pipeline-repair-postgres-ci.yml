name: CI - pipeline-repair (Postgres)

on:
  pull_request:
    paths:
      - 'services/pipeline-repair/**'
      - '.github/workflows/pipeline-repair-postgres-ci.yml'
  push:
    branches: [ main ]
    paths:
      - 'services/pipeline-repair/**'

jobs:
  test-postgres:
    name: Test (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: repairdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OS deps
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install package deps
        run: |
          cd services/pipeline-repair
          npm ci

      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -p 5432; do sleep 1; done

      - name: Run migrations
        env:
          REPAIR_PG_CONN: postgres://postgres:postgres@localhost:5432/repairdb
        run: |
          cd services/pipeline-repair
          npx node-pg-migrate up --migrations-dir ./migrations

      - name: Run tests
        env:
          REPAIR_DB: postgres
          REPAIR_PG_CONN: postgres://postgres:postgres@localhost:5432/repairdb
        run: |
          cd services/pipeline-repair
          npm test
