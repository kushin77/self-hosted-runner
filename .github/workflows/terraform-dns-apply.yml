name: Terraform DNS Apply
# sequencing-protection: workflow_run (placeholder) — add real guard or concurrency block

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'terraform action: plan or apply'
        required: true
        default: 'plan'
  workflow_call: {}

jobs:
  terraform:
    name: Terraform Route53 DNS
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-dns-apply-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS credentials
        if: ${{ secrets.AWS_ACCESS_KEY_ID && secrets.AWS_SECRET_ACCESS_KEY }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Terraform Init
        working-directory: terraform/modules/dns/gitlab
        run: terraform init -input=false

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'plan' }}
        working-directory: terraform/modules/dns/gitlab
        run: |
          terraform plan -var="zone_id=${{ secrets.ROUTE53_ZONE_ID }}" -var="dns_value=192.168.168.42" -input=false

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: terraform/modules/dns/gitlab
        run: |
          terraform apply -auto-approve -var="zone_id=${{ secrets.ROUTE53_ZONE_ID }}" -var="dns_value=192.168.168.42"
