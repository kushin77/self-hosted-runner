name: Terraform DNS Apply
# sequencing-protection: workflow_run (placeholder) — add real guard or concurrency block

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'terraform action: plan or apply'
        required: true
        default: 'plan'
  workflow_call: {}

jobs:
  fetch-aws-creds:
    name: Fetch AWS Credentials from GSM
    uses: ./.github/workflows/fetch-aws-creds-from-gsm.yml
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  terraform:
    name: Terraform Route53 DNS
    needs: [fetch-aws-creds]
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-dns-apply-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS credentials
        if: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id != '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
          aws-secret-access-key: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
          aws-region: ${{ needs.fetch-aws-creds.outputs.aws_region || 'us-east-1' }}

      - name: Terraform Init
        working-directory: terraform/modules/dns/gitlab
        run: |
          source .github/scripts/resilience.sh || true
          retry_command 3 5 terraform init -input=false

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'plan' }}
        working-directory: terraform/modules/dns/gitlab
        run: |
          source .github/scripts/resilience.sh || true
          retry_command 3 10 terraform plan -var="zone_id=${{ secrets.ROUTE53_ZONE_ID }}" -var="dns_value=192.168.168.42" -input=false

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: terraform/modules/dns/gitlab
        run: |
          source .github/scripts/resilience.sh || true
          retry_command 3 10 terraform apply -auto-approve -var="zone_id=${{ secrets.ROUTE53_ZONE_ID }}" -var="dns_value=192.168.168.42"
