name: Auto-Provision Deployment Fields

# When to run this workflow
on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Credential provider (gsm, vault, kms)'
        required: false
        default: 'gsm'
      dry_run:
        description: 'Run in dry-run mode (no changes)'
        required: false
        type: boolean
        default: false
  schedule:
    # Run daily at 4 AM UTC (before main deployments)
    - cron: '0 4 * * *'

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  provision:
    runs-on: self-hosted
    name: Auto-Provision Deployment Fields
    
    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Set up credentials via OIDC (GitHub → GSM/Vault/AWS/GCP)
      - name: Authenticate with credential providers
        run: |
          echo "Setting up credential provider authentication..."
          
          # GitHub OIDC Token (auto-available in Actions)
          if [ -n "${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}" ]; then
            echo "✅ GitHub OIDC token available"
          fi
          
          # Vault authentication (if configured)
          if [ -n "${{ secrets.VAULT_ADDR }}" ]; then
            echo "✅ Vault endpoint configured"
          fi
          
          # AWS OIDC (if configured)
          if [ -n "${{ secrets.AWS_ROLE_TO_ASSUME }}" ]; then
            echo "✅ AWS OIDC role configured"
          fi
          
          # GCP OIDC (if configured)
          if [ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "✅ GCP Workload Identity configured"
          fi

      # Discover current field state
      - name: Discover deployment fields
        run: |
          echo "🔍 Discovering deployment field sources..."
          ./scripts/discover-deployment-fields.sh markdown >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      # Auto-provision deployment fields
      - name: Auto-provision deployment fields
        env:
          PREFERRED_PROVIDER: ${{ github.event.inputs.provider || 'gsm' }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE: ${{ secrets.VAULT_ROLE }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        run: |
          echo "🔄 Auto-provisioning deployment fields..."
          echo "   Provider: $PREFERRED_PROVIDER"
          
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "   Mode: DRY-RUN (no changes)"
            bash ./scripts/auto-provision-deployment-fields.sh --dry-run
          else
            bash ./scripts/auto-provision-deployment-fields.sh
          fi

      # Verify provisioning
      - name: Verify provisioning
        run: |
          echo "✔️ Verifying deployment field provisioning..."
          bash ./scripts/verify-deployment-provisioning.sh --verbose

      # Upload audit trail
      - name: Upload audit trail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-provisioning-audit
          path: logs/deployment-provisioning-audit.jsonl
          retention-days: 90
          if-no-files-found: ignore

      # Update job summary
      - name: Add summary to workflow
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          ## 🚀 Deployment Field Provisioning
          
          **Provider:** ${{ github.event.inputs.provider || 'gsm' }}
          **Mode:** ${{ github.event.inputs.dry_run && 'Dry-Run' || 'Production' }}
          **Status:** Complete
          
          ### Fields Provisioned
          - VAULT_ADDR
          - VAULT_ROLE
          - AWS_ROLE_TO_ASSUME
          - GCP_WORKLOAD_IDENTITY_PROVIDER
          
          ### Audit Trail
          See uploaded artifact: deployment-provisioning-audit
          EOF

      # Notify on failure
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment field provisioning failed"
          echo ""
          echo "Debug info:"
          ls -lah logs/
          if [ -f logs/deployment-provisioning-audit.jsonl ]; then
            echo ""
            echo "Recent audit entries:"
            tail -10 logs/deployment-provisioning-audit.jsonl
          fi
        continue-on-error: true
