name: Terraform Auto Apply (Automated, Credential-driven)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  fetch-aws-creds:
    name: Fetch AWS Credentials from GSM
    uses: ./.github/workflows/fetch-aws-creds-from-gsm.yml
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  terraform-dry-run-no-backend:
    name: Terraform Dry-Run (no backend)
    needs: [fetch-aws-creds]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    env:
      AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
      AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
      AWS_DEFAULT_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.4.0"

      - name: Detect available credential sources
        id: detect-creds
        env:
          USE_OIDC: ${{ secrets.USE_OIDC }}
          AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          if [ "${USE_OIDC:-}" = "true" ] && [ -n "${AWS_OIDC_ROLE_ARN:-}" ]; then
            echo "oidc=true" >> $GITHUB_OUTPUT
          else
            echo "oidc=false" >> $GITHUB_OUTPUT
          fi
          if [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
            echo "static=true" >> $GITHUB_OUTPUT
          else
            echo "static=false" >> $GITHUB_OUTPUT
          fi

      - name: Decide and run dry-run (no backend)
        working-directory: terraform
        run: |
          set -euo pipefail
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            echo "Backend credentials present; skipping backend-free dry-run"
            exit 0
          fi
          echo "No backend credentials detected — running safe terraform init/plan without S3 backend"
          terraform init -input=false -backend=false
          terraform plan -input=false -out=tfplan-dry || true

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [fetch-aws-creds]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.4.0"

      - name: Configure AWS via OIDC (if enabled)
        if: ${{ steps.detect-creds.outputs.oidc == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}

      - name: Configure fetched AWS creds from GSM
        if: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id != '' }}
        run: |
          echo "::add-mask::${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}"
          echo "::add-mask::${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}"
          echo "AWS_ACCESS_KEY_ID=${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ needs.fetch-aws-creds.outputs.aws_region }}" >> $GITHUB_ENV

      - name: Configure static AWS creds (fallback)
        if: ${{ steps.detect-creds.outputs.static == 'true' && needs.fetch-aws-creds.outputs.aws_access_key_id == '' }}
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}" >> $GITHUB_ENV

      - name: Detect credential availability
        id: creds
        run: |
          if [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
            echo "✓ AWS credentials configured"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "⚠ No AWS credentials — will run backend-free dry-run"
          fi

      - name: Backend-free dry-run (no credentials)
        if: steps.creds.outputs.available != 'true'
        working-directory: terraform
        run: |
          set -euo pipefail
          echo "Running safe backend-free terraform validation (no-op)"
          terraform init -input=false -backend=false
          terraform plan -input=false || true
          echo "✓ Dry-run complete — no changes applied"

      - name: Terraform Init
        if: steps.creds.outputs.available == 'true'
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Plan
        if: steps.creds.outputs.available == 'true'
        working-directory: terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: steps.creds.outputs.available == 'true'
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan

      - name: Post success to issues
        if: steps.creds.outputs.available == 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment 1286 --body "✅ Terraform auto-apply completed successfully. Infrastructure is live." --repo "${{ github.repository }}" || true
          gh issue comment 1309 --body "✅ Terraform auto-apply completed successfully." --repo "${{ github.repository }}" || true
