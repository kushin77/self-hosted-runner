name: Terraform Auto Apply (Automated, Credential-driven)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fetch-aws-creds:
    name: Fetch AWS Credentials from GSM
    uses: ./.github/workflows/fetch-aws-creds-from-gsm.yml
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  terraform-dry-run-no-backend:
    name: Terraform Dry-Run (no backend)
    needs: [fetch-aws-creds]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    env:
      AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
      AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
      AWS_DEFAULT_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.4.0"

      - name: Decide and run dry-run (no backend)
        working-directory: terraform
        run: |
          set -euo pipefail
          # Skip if backend credentials are present (we prefer real backend runs)
          if [ "${{ secrets.USE_OIDC }}" = "true" ] || [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "Backend credentials present; skipping backend-free dry-run"
            exit 0
          fi

          echo "No backend credentials detected — running safe terraform init/plan without S3 backend"
          terraform init -input=false -backend=false
          terraform plan -input=false -out=tfplan-dry || true

  terraform-apply:
    name: Terraform Apply (ElastiCache)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.4.0"

      - name: Configure AWS via OIDC (if enabled)
        if: ${{ secrets.USE_OIDC == 'true' && secrets.AWS_OIDC_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}

      - name: Configure fetched AWS creds
        if: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id != '' }}
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ needs.fetch-aws-creds.outputs.aws_region }}" >> $GITHUB_ENV

      - name: Configure static AWS creds (fallback)
        if: ${{ secrets.USE_OIDC != 'true' && secrets.AWS_ACCESS_KEY_ID != '' && needs.fetch-aws-creds.outputs.aws_access_key_id == '' }}
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}" >> $GITHUB_ENV

      - name: Configure GCP creds (if provided)
        if: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY != '' }}
        run: |
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Safe fallback: no credentials -> backend-free dry-run
        if: ${{ (secrets.USE_OIDC != 'true' && secrets.AWS_ACCESS_KEY_ID == '') && secrets.GCP_SERVICE_ACCOUNT_KEY == '' }}
        run: |
          set -euo pipefail
          echo "No cloud credentials available; running backend-free terraform init/plan for safe validation (no-op)"
          cd terraform
          terraform init -input=false -backend=false
          terraform plan -input=false -out=tfplan-dry || true
          echo "Dry-run complete; skipping apply"
          exit 0

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan
