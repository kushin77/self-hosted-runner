name: Terraform Auto Apply (Automated, Credential-driven)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  terraform-dry-run-no-backend:
    name: Terraform Dry-Run (no backend)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.4.0"

      - name: Decide and run dry-run (no backend)
        working-directory: terraform
        run: |
          set -euo pipefail
          # Skip if backend credentials are present (we prefer real backend runs)
          if [ "${{ secrets.USE_OIDC }}" = "true" ] || [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "Backend credentials present; skipping backend-free dry-run"
            exit 0
          fi

          echo "No backend credentials detected — running safe terraform init/plan without S3 backend"
          terraform init -input=false -backend=false
          terraform plan -input=false -out=tfplan-dry || true

  terraform-apply:
    name: Terraform Apply (ElastiCache)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.4.0"

      - name: Configure cloud credentials (AWS/GCP)
        run: |
          set -euo pipefail
          if [ "${{ secrets.USE_OIDC }}" = "true" ]; then
            echo "Using OIDC for cloud authentication"
            # AWS OIDC
            if [ -n "${{ secrets.AWS_OIDC_ROLE_ARN }}" ]; then
              echo "Configured AWS OIDC role: ${AWS_OIDC_ROLE_ARN}"
            fi
            # GCP OIDC handled by google-github-actions/auth in other workflows
          else
            echo "Using static secrets for cloud auth"
            if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
              echo "export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
              echo "export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
              echo "export AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}" >> $GITHUB_ENV
            fi
            if [ -n "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]; then
              echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" > /tmp/gcp-key.json
              echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV
            fi
          fi

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: ${{ github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' }}
        working-directory: terraform
        run: terraform apply -input=false -auto-approve tfplan
