name: Test Suite
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup environment
        run: |
          echo "✓ Ubuntu $(lsb_release -rs)"
          echo "✓ Docker $(docker --version)"
          echo "✓ Node.js $(node --version)"
          echo "✓ npm $(npm --version)"

      - name: Run smoke tests
        run: bash tests/smoke/run-smoke-tests.sh
        env:
          STAGE: staging

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results
          path: /tmp/smoke-test-*.log
          retention-days: 30

  integration-tests:
    name: Integration Tests
    runs-on: [self-hosted, linux]
    timeout-minutes: 15
    needs: smoke-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          npm install -g jq
          which jq || echo "jq not in path"

      - name: Run integration tests
        run: bash tests/integration/provisioner-integration-tests.sh
        timeout-minutes: 12

      - name: Run OTEL init sanity checks
        run: |
          bash services/provisioner-worker/tests/otel_init.sh || true
          bash services/managed-auth/tests/otel_init.sh || true
          bash services/vault-shim/tests/otel_init.sh || true
        # scripts log warnings if OTEL packages are absent; don't fail pipeline

      - name: Send sample OTLP span (no-op if no collector)
        run: |
          set -euo pipefail
          OTEL_EXPORTER_OTLP_ENDPOINT="${{ env.OTEL_EXPORTER_OTLP_ENDPOINT || 'http://localhost:4318/v1/traces' }}"

          # OTLP test (non-fatal)
          echo "Sending OTLP test span to $OTEL_EXPORTER_OTLP_ENDPOINT"
          OTEL_EXPORTER_OTLP_ENDPOINT="$OTEL_EXPORTER_OTLP_ENDPOINT" bash services/provisioner-worker/tests/send_otlp.sh || true

          # Run Datadog send if API key is configured
          if [ -n "${{ secrets.DATADOG_API_KEY }}" ]; then
            echo "Datadog API key configured; running Datadog send test"
            DATADOG_API_KEY="${{ secrets.DATADOG_API_KEY }}" OTEL_EXPORTER_OTLP_ENDPOINT="$OTEL_EXPORTER_OTLP_ENDPOINT" bash services/provisioner-worker/tests/send_datadog.sh || true
          else
            echo "DATADOG_API_KEY not set; skipping Datadog send"
          fi

          # Run Splunk send if credentials configured
          if [ -n "${{ secrets.SPLUNK_HEC_TOKEN }}" ] && [ -n "${{ secrets.SPLUNK_HEC_ENDPOINT }}" ]; then
            echo "Splunk HEC configured; running Splunk send test"
            SPLUNK_HEC_TOKEN="${{ secrets.SPLUNK_HEC_TOKEN }}" SPLUNK_HEC_ENDPOINT="${{ secrets.SPLUNK_HEC_ENDPOINT }}" OTEL_EXPORTER_OTLP_ENDPOINT="$OTEL_EXPORTER_OTLP_ENDPOINT" bash services/provisioner-worker/tests/send_splunk.sh || true
          else
            echo "Splunk HEC not configured; skipping Splunk send"
          fi

          # Audit test
          bash services/provisioner-worker/tests/audit_test.sh || true

      - name: Archive test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-artifacts
          path: /tmp/provisioner-worker-test-*
          retention-days: 30

  vault-security-tests:
    name: Vault Security Tests
    runs-on: [self-hosted, linux]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup tools
        run: |
          # Install Vault CLI
          VAULT_VERSION="1.15.0"
          wget -q "https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_linux_amd64.zip"
          unzip -q "vault_${VAULT_VERSION}_linux_amd64.zip"
          sudo mv vault /usr/local/bin/
          rm "vault_${VAULT_VERSION}_linux_amd64.zip"
          echo "✓ Vault $(vault version)"

      - name: Run Vault security tests
        run: bash tests/vault-security/run-vault-security-tests.sh
        timeout-minutes: 8
        env:
          VAULT_ADDR: http://127.0.0.1:8200

      - name: Archive Vault test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vault-security-test-results
          path: ~/.vault-log
          retention-days: 30

  lint-and-format:
    name: Code Quality
    runs-on: [self-hosted, linux]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck

      - name: Check shell scripts
        run: |
          echo "Checking bash scripts..."
          find . -name "*.sh" -type f -exec shellcheck {} + || true

      - name: Verify Node.js syntax
        run: |
          echo "Checking Node.js syntax..."
          for f in services/*/index.js services/*/lib/*.js; do
            if [[ -f "$f" ]]; then
              node -c "$f" && echo "✓ $f" || echo "✗ $f"
            fi
          done

  test-results:
    name: Test Results Summary
    runs-on: [self-hosted, linux]
    if: always()
    needs: [smoke-tests, integration-tests, vault-security-tests, lint-and-format]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Check test status
        run: |
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  Test Execution Summary                                ║"
          echo "╚════════════════════════════════════════════════════════╝"
          echo ""
          echo "✓ Smoke Tests: ${{ needs.smoke-tests.result }}"
          echo "✓ Integration Tests: ${{ needs.integration-tests.result }}"
          echo "✓ Vault Security Tests: ${{ needs.vault-security-tests.result }}"
          echo "✓ Code Quality: ${{ needs.lint-and-format.result }}"
          echo ""
          
          # Check overall status
          if [[ "${{ needs.smoke-tests.result }}" == "success" ]] && \
             [[ "${{ needs.integration-tests.result }}" == "success" ]] && \
             [[ "${{ needs.vault-security-tests.result }}" == "success" ]] && \
             [[ "${{ needs.lint-and-format.result }}" == "success" ]]; then
            echo "✅ All tests passed!"
            exit 0
          else
            echo "❌ Some tests failed or were skipped"
            exit 1
          fi

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const smokeTests = '${{ needs.smoke-tests.result }}';
            const integrationTests = '${{ needs.integration-tests.result }}';
            const vaultTests = '${{ needs.vault-security-tests.result }}';
            const codeQuality = '${{ needs.lint-and-format.result }}';
            
            const allPassed = [smokeTests, integrationTests, vaultTests, codeQuality].every(r => r === 'success');
            
            const comment = `
## Test Results

| Test Suite | Status |
|-----------|--------|
| 🟢 Smoke Tests | ${smokeTests === 'success' ? '✅ PASSED' : '❌ ' + smokeTests.toUpperCase()} |
| 🟢 Integration Tests | ${integrationTests === 'success' ? '✅ PASSED' : '❌ ' + integrationTests.toUpperCase()} |
| 🔐 Vault Security | ${vaultTests === 'success' ? '✅ PASSED' : '❌ ' + vaultTests.toUpperCase()} |
| 📋 Code Quality | ${codeQuality === 'success' ? '✅ PASSED' : '❌ ' + codeQuality.toUpperCase()} |

${allPassed ? '✅ All production tests passed! Ready for merge.' : '❌ Some tests failed. Please review and fix.'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
