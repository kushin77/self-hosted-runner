name: Audit Validation - PR
permissions:
  contents: read
  id-token: write
  actions: read

# Runs on every PR to validate indices are up-to-date
on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/**'
      - 'SECRETS_INDEX.md'
      - 'WORKFLOWS_INDEX.md'
      - 'SCRIPTS_REGISTRY.md'
      - 'ERROR_CODES_GUIDE.md'
      - 'CONFIGURATION_GUIDE.md'
    branches:
      - main
      - develop

jobs:
  validate-secrets:
    name: Validate Secrets Index
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Secrets Audit
        id: audit
        run: |
          bash scripts/audit-secrets.sh --validate > /tmp/secrets-audit.log 2>&1
          echo "✅ Secrets audit completed"
        
      - name: Report Results
        if: always()
        run: |
          echo "## Secrets Audit Report" >> $GITHUB_STEP_SUMMARY
          cat /tmp/secrets-audit.log >> $GITHUB_STEP_SUMMARY

  validate-workflows:
    name: Validate Workflows Index
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Workflows Audit
        id: audit
        run: |
          bash scripts/audit-workflows.sh --validate > /tmp/workflows-audit.log 2>&1
          echo "✅ Workflows audit completed"
        
      - name: Report Results
        if: always()
        run: |
          echo "## Workflows Audit Report" >> $GITHUB_STEP_SUMMARY
          cat /tmp/workflows-audit.log >> $GITHUB_STEP_SUMMARY

  validate-scripts:
    name: Validate Scripts Registry
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Scripts Audit
        id: audit
        run: |
          bash scripts/audit-scripts.sh --validate > /tmp/scripts-audit.log 2>&1
          echo "✅ Scripts audit completed"
        
      - name: Report Results
        if: always()
        run: |
          echo "## Scripts Audit Report" >> $GITHUB_STEP_SUMMARY
          cat /tmp/scripts-audit.log >> $GITHUB_STEP_SUMMARY

  audit-script-syntax:
    name: Validate All Scripts Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check All Script Syntax
        run: |
          echo "Checking audit scripts..."
          bash -n scripts/audit-secrets.sh && echo "✅ audit-secrets.sh"
          bash -n scripts/audit-workflows.sh && echo "✅ audit-workflows.sh"
          bash -n scripts/audit-scripts.sh && echo "✅ audit-scripts.sh"
          
          echo "Checking automation scripts..."
          find scripts -name "*.sh" -type f -executable | while read script; do
            if bash -n "$script" 2>/dev/null; then
              echo "✅ $script"
            else
              echo "❌ SYNTAX ERROR: $script"
              exit 1
            fi
          done

  check-indices-consistency:
    name: Check Cross-Index Consistency
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Current Inventory
        run: |
          echo "=== Current System Inventory ===" > /tmp/inventory.txt
          echo "Workflows: $(find .github/workflows -name '*.yml' | wc -l)" >> /tmp/inventory.txt
          echo "Scripts: $(find scripts -type f -executable | wc -l)" >> /tmp/inventory.txt
          bash scripts/audit-secrets.sh --full 2>/dev/null | grep "Total Secrets Found" >> /tmp/inventory.txt
        
      - name: Report Inventory
        if: always()
        run: |
          echo "## System Inventory Check" >> $GITHUB_STEP_SUMMARY
          cat /tmp/inventory.txt >> $GITHUB_STEP_SUMMARY