      - name: Get Credential [TERRAFORM_ENVIRONMENT]
        id: cred_terraform_environment
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_ENVIRONMENT
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

      - name: Get Credential [TERRAFORM_GITHUB_OWNER]
        id: cred_terraform_github_owner
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_GITHUB_OWNER
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

      - name: Get Credential [TERRAFORM_GITHUB_REPO]
        id: cred_terraform_github_repo
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_GITHUB_REPO
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

      - name: Get Credential [TERRAFORM_PROJECT_NAME]
        id: cred_terraform_project_name
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_PROJECT_NAME
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

      - id: fetch
        uses: ./.github/workflows/fetch-aws-creds-from-gsm.yml
        with:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ steps.cred_gcp_workload_identity_provider.outputs.credential }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ steps.cred_gcp_service_account_email.outputs.credential }}
          GCP_PROJECT_ID: ${{ steps.cred_gcp_project_id.outputs.credential }}

  validate-terraform-output:
    name: Validate Terraform Outputs
    needs: [fetch-aws-creds]
    runs-on: [self-hosted, linux, self-hosted-heavy]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
      - name: Get Credential [GCP_PROJECT_ID]
        id: cred_gcp_project_id
