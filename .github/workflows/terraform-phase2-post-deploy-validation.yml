      - name: Get Credential [TERRAFORM_SUBNET_IDS]
        id: cred_terraform_subnet_ids
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_SUBNET_IDS
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [TERRAFORM_VPC_ID]
        id: cred_terraform_vpc_id
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_VPC_ID
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [AWS_REGION]
        id: cred_aws_region
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: AWS_REGION
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_BUCKET_PREFIX]
        id: cred_gcp_bucket_prefix
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_BUCKET_PREFIX
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_PROJECT_ID]
        id: cred_gcp_project_id
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_PROJECT_ID
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_REGION]
        id: cred_gcp_region
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_REGION
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_SA_KEY]
        id: cred_gcp_sa_key
