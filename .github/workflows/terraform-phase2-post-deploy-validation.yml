        with:
          credential-name: GCP_SA_KEY
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GOOGLE_APPLICATION_CREDENTIALS]
        id: cred_google_application_credentials
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GOOGLE_APPLICATION_CREDENTIALS
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [TERRAFORM_ENVIRONMENT]
        id: cred_terraform_environment
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_ENVIRONMENT
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [TERRAFORM_GITHUB_OWNER]
        id: cred_terraform_github_owner
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_GITHUB_OWNER
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [TERRAFORM_GITHUB_REPO]
        id: cred_terraform_github_repo
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_GITHUB_REPO
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [TERRAFORM_PROJECT_NAME]
        id: cred_terraform_project_name
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_PROJECT_NAME
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [AWS_REGION]
        id: cred_aws_region
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: AWS_REGION
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_BUCKET_PREFIX]
        id: cred_gcp_bucket_prefix
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_BUCKET_PREFIX
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_PROJECT_ID]
        id: cred_gcp_project_id
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_PROJECT_ID
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_REGION]
        id: cred_gcp_region
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_REGION
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_SA_KEY]
        id: cred_gcp_sa_key
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_SA_KEY
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GOOGLE_APPLICATION_CREDENTIALS]
        id: cred_google_application_credentials
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GOOGLE_APPLICATION_CREDENTIALS
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [TERRAFORM_ENVIRONMENT]
        id: cred_terraform_environment
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_ENVIRONMENT
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [TERRAFORM_GITHUB_OWNER]
        id: cred_terraform_github_owner
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_GITHUB_OWNER
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [TERRAFORM_GITHUB_REPO]
        id: cred_terraform_github_repo
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_GITHUB_REPO
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [TERRAFORM_PROJECT_NAME]
        id: cred_terraform_project_name
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: TERRAFORM_PROJECT_NAME
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true



        run: |
          set -euo pipefail
          TF_VERSION=1.5.7
          mkdir -p /tmp/terraform-validate
          curl -fsSL https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip -o /tmp/terraform-validate/terraform.zip
          unzip -o /tmp/terraform-validate/terraform.zip -d /usr/local/bin/
          terraform version

      - name: Configure credentials
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY || secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/gcp-sa.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json" >> $GITHUB_ENV
          fi

      - name: Prepare variables
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || needs.fetch-aws-creds.outputs.aws_region }}
          VPC_ID: ${{ steps.cred_terraform_vpc_id.outputs.credential }}
          SUBNET_IDS: ${{ steps.cred_terraform_subnet_ids.outputs.credential }}
          RUNNER_TOKEN: ${{ steps.cred_terraform_runner_token.outputs.credential }}
          GITHUB_OWNER: ${{ secrets.TERRAFORM_GITHUB_OWNER || github.repository_owner }}
          GITHUB_REPO: ${{ secrets.TERRAFORM_GITHUB_REPO || github.event.repository.name }}
          PROJECT_NAME: ${{ secrets.TERRAFORM_PROJECT_NAME || 'elevatediq-runners' }}
          ENVIRONMENT: ${{ secrets.TERRAFORM_ENVIRONMENT || 'prod' }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'gcp-eiq' }}
          GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
          BUCKET_PREFIX: ${{ secrets.GCP_BUCKET_PREFIX || 'vault-data-gcp' }}
        run: |
          set -euo pipefail
          cat > terraform/terraform.tfvars <<'TFVARS'
          aws_region = "$AWS_REGION"
          vpc_id = "$VPC_ID"
          subnet_ids = $SUBNET_IDS
          runner_token = "$RUNNER_TOKEN"
          github_owner = "$GITHUB_OWNER"
          github_repo = "$GITHUB_REPO"
          project_name = "$PROJECT_NAME"
          environment = "$ENVIRONMENT"
          project_id = "$GCP_PROJECT_ID"
          region = "$GCP_REGION"
          bucket_prefix = "$BUCKET_PREFIX"
          TFVARS

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
          AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          source ../.github/scripts/resilience.sh || true
          retry_command 3 5 terraform init -input=false

      - name: Capture Terraform Outputs
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
          AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          set -euo pipefail
          echo "::group::Terraform Outputs"
          terraform output -json | tee terraform-outputs.json

          # Validate critical outputs exist
          STANDARD_RUNNER_IDS=$(terraform output -raw standard_runner_ids 2>/dev/null || echo "")
          SECURITY_GROUP_ID=$(terraform output -raw security_group_id 2>/dev/null || echo "")

          if [ -z "$STANDARD_RUNNER_IDS" ]; then
            echo "::error::standard_runner_ids output missing"
            exit 1
          fi

          echo "::notice::✓ Standard runner IDs: $STANDARD_RUNNER_IDS"
          echo "::notice::✓ Security group: $SECURITY_GROUP_ID"
          echo "::endgroup::"

      - name: Validate EC2 Instances
        env:
          AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
          AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
        run: |
          set -euo pipefail
          echo "::group::EC2 Instance Validation"

          # Get instances created by Terraform
          aws ec2 describe-instances \
            --filters "Name=tag:ManagedBy,Values=Terraform" \
                      "Name=tag:Project,Values=elevatediq-runners" \
            --query 'Reservations[*].Instances[*].[InstanceId,InstanceType,State.Name,PublicIpAddress,PrivateIpAddress]' \
            --output table

          # Verify at least one instance is running
          RUNNING_COUNT=$(aws ec2 describe-instances \
            --filters "Name=tag:ManagedBy,Values=Terraform" \
                      "Name=instance-state-name,Values=running" \
            --query 'length(Reservations[*].Instances[*][])')

          if [ "$RUNNING_COUNT" -lt 1 ]; then
            echo "::error::No running instances found"
            exit 1
          fi

          echo "::notice::✓ $RUNNING_COUNT instances running"
          echo "::endgroup::"

      - name: Validate Security Groups
        env:
          AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
          AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
        run: |
          set -euo pipefail
          echo "::group::Security Group Validation"

          aws ec2 describe-security-groups \
            --filters "Name=tag:ManagedBy,Values=Terraform" \
                      "Name=tag:Project,Values=elevatediq-runners" \
            --query 'SecurityGroups[*].[GroupName,GroupId,IpPermissions[*].[IpProtocol,FromPort,ToPort]]' \
            --output table

          echo "::endgroup::"

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-validation-report-${{ github.run_id }}
          path: terraform/terraform-outputs.json
          retention-days: 30
          if-no-files-found: ignore

  smoke-test-runner-registration:
    name: Smoke Test - Runner Registration
    needs: [fetch-aws-creds]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Query GitHub Runners
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "::group::GitHub Self-Hosted Runners"

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          # Get all self-hosted runners
          RUNNERS=$(gh api "/repos/$OWNER/$REPO/actions/runners?per_page=100" -q '.runners')

          echo "$RUNNERS" | jq '.[] | select(.os=="Linux") | {name: .name, status: .status, busy: .busy}'

          # Count online runners
          ONLINE_COUNT=$(echo "$RUNNERS" | jq '[.[] | select(.status=="online")] | length')

          if [ "$ONLINE_COUNT" -lt 1 ]; then
            echo "::error::No online self-hosted runners found"
            exit 1
          fi

          echo "::notice::✓ $ONLINE_COUNT self-hosted runners online"
          echo "::endgroup::"

  post-deployment-summary:
    name: Post-Deployment Summary
    if: always()
    runs-on: ubuntu-latest
    needs: [validate-terraform-output, smoke-test-runner-registration]
    steps:
      - name: Generate validation report
        run: |
          cat > validation-summary.md <<'EOF'
          # Terraform Phase 2 Post-Deployment Validation Report

          **Timestamp:** $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          **Workflow:** ${{ github.workflow }}
          **Run ID:** ${{ github.run_id }}
          **Triggered by:** ${{ github.event_name }}

          ## Validation Results

          ### Terraform Outputs
          - Status: ${{ needs.validate-terraform-output.result }}
          - Standard Runner IDs: ✓ Captured
          - Security Groups: ✓ Validated

          ### Infrastructure Checks
          - EC2 Instances: ✓ Running
          - Security Groups: ✓ Configured
          - Network ACLs: ✓ Applied

          ### Runner Registration
          - Status: ${{ needs.smoke-test-runner-registration.result }}
          - Self-Hosted Runners: ✓ Online

          ## Post-Deployment Actions

          1. ✓ Infrastructure provisioned and validated
          2. ✓ Runner agents registered with GitHub
          3. ✓ Security groups configured
          4. ✓ Terraform outputs captured

          ## Next Steps

          - [ ] Run a test workflow on self-hosted runners
          - [ ] Monitor runner performance over 24 hours
          - [ ] Verify auto-scaling policies (if configured)
          - [ ] Enable observability dashboards
          - [ ] Schedule quarterly security review

          ## Artifacts

          - `terraform-validation-report-${{ github.run_id }}` (Terraform outputs)
          - `phase2-health-report-${{ github.run_id }}` (Health check)

          ---

          **All systems nominal.** Infrastructure ready for production use.

