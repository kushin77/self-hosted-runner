name: Credential Monitor (auto-heal trigger)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  check-and-trigger:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      issues: write
      contents: read
    steps:
      - name: Check for RUNNER_MGMT_TOKEN
        env:
          GITHUB_API: https://api.github.com
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Checking repository secrets for RUNNER_MGMT_TOKEN"
          secrets=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" "$GITHUB_API/repos/$REPO/actions/secrets")
          echo "$secrets" | jq -r '.secrets[].name' | grep -xq RUNNER_MGMT_TOKEN || { echo "RUNNER_MGMT_TOKEN not present; exiting"; exit 0; }

          # Check whether the self-heal workflow ran successfully recently
          echo "RUNNER_MGMT_TOKEN present — checking recent self-heal runs"
          runs=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" "$GITHUB_API/repos/$REPO/actions/workflows/runner-self-heal.yml/runs?per_page=10")
          recently_successful=$(echo "$runs" | jq -r '.workflow_runs[] | select(.conclusion=="success") | .updated_at' | head -n1 || true)
          if [[ -n "$recently_successful" ]]; then
            echo "Found a recent successful self-heal run at $recently_successful — nothing to do"; exit 0
          fi

          # Dispatch the self-heal workflow
          echo "Dispatching runner-self-heal workflow"
          curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "$GITHUB_API/repos/$REPO/actions/workflows/runner-self-heal.yml/dispatches" -d '{"ref":"main"}'

          # Post an issue comment to inform admins
          body="Automated monitor detected RUNNER_MGMT_TOKEN and dispatched the self-heal workflow. I will watch and report results." 
          curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "$GITHUB_API/repos/$REPO/issues/969/comments" -d "{\"body\": \"$body\"}"
