name: Pre-Deployment Readiness Check

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:
    inputs:
      auto_fix:
        description: 'Attempt auto-fixes for common issues'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  readiness-check:
    name: Pre-Deployment Readiness Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run deployment readiness validator
        run: |
          chmod +x scripts/automation/deployment-readiness-validator.sh
          ./scripts/automation/deployment-readiness-validator.sh || true

      - name: Check readiness status
        id: readiness
        run: |
          CLUSTER_CHECK=0
          SECRET_CHECK=0
          
          if timeout 5 bash -c "echo >/dev/tcp/192.168.168.42/6443" 2>/dev/null; then
            echo "cluster_ready=true" >> $GITHUB_OUTPUT
            CLUSTER_CHECK=1
          fi
          
          if gh secret list 2>/dev/null | grep -q "AWS_OIDC_ROLE_ARN"; then
            echo "oidc_ready=true" >> $GITHUB_OUTPUT
            SECRET_CHECK=1
          fi
          
          READINESS=$((CLUSTER_CHECK + SECRET_CHECK))
          echo "readiness_score=$READINESS" >> $GITHUB_OUTPUT

      - name: Post readiness status
        if: always()
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CLUSTER_STATUS="${{ steps.readiness.outputs.cluster_ready }}"
          OIDC_STATUS="${{ steps.readiness.outputs.oidc_ready }}"
          
          BODY="## 🔍 Pre-Deployment Readiness Check ($TIMESTAMP)

**Cluster Status**: $([ "$CLUSTER_STATUS" = "true" ] && echo "✅ Online" || echo "🔴 Offline")
**OIDC Secrets**: $([ "$OIDC_STATUS" = "true" ] && echo "✅ Configured" || echo "⏳ Pending")

### Required for Deployment:
- $([ "$CLUSTER_STATUS" = "true" ] && echo "✅" || echo "❌") Staging cluster online
- $([ "$OIDC_STATUS" = "true" ] && echo "✅" || echo "❌") AWS OIDC secrets set

### To Get Started:
1. Run: \`./scripts/automation/operator-provisioning-helper.sh\`
2. Follow the interactive prompts
3. This check will auto-detect when ready

---
*Automated readiness check via pre-deployment-readiness-check.yml*"
          
          gh issue comment 231 \
            --repo ${{ github.repository }} \
            --body "$BODY" || echo "Note: Could not post comment"

      - name: Auto-trigger deployment if ready
        if: steps.readiness.outputs.readiness_score == '2'
        run: |
          echo "✅ All deployment prerequisites detected!"
          echo "Would trigger Phase P4 deployment here"
          # In production: gh workflow run phase-p4-terraform-apply-orchestrator.yml
