name: Bootstrap Vault Secrets

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform: init (create), update, or verify'
        required: true
        default: 'verify'
        type: choice
        options:
          - init
          - update
          - verify

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Credential [VAULT_ADDR]
        id: cred_vault_addr
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: VAULT_ADDR
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

      - name: Get Credential [VAULT_ROLE]
        id: cred_vault_role
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: VAULT_ROLE
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

      - name: Request Vault OIDC token
        env:
          VAULT_ADDR: ${{ steps.cred_vault_addr.outputs.credential }}
          VAULT_ROLE: ${{ steps.cred_vault_role.outputs.credential }}
          AUDIENCE: vault
        run: |
          set -e
          if [ -z "$VAULT_ADDR" ]; then
            echo "ERROR: VAULT_ADDR required"
            exit 1
          fi

          # If VAULT_ROLE is provided, prefer OIDC login flow
          if [ -n "$VAULT_ROLE" ]; then
            echo "Using OIDC login for Vault (role: $VAULT_ROLE)"
            bash scripts/vault_oidc_login.sh >> "$GITHUB_ENV"
          else
            # Fallback to AppRole if role not provided and AppRole secrets exist
            if [ -n "${{ secrets.VAULT_ROLE_ID }}" ] && [ -n "${{ secrets.VAULT_SECRET_ID }}" ]; then
              echo "VAULT_ROLE not provided; attempting AppRole login using VAULT_ROLE_ID/VAULT_SECRET_ID secrets"
              ROLE_ID='${{ secrets.VAULT_ROLE_ID }}'
              SECRET_ID='${{ secrets.VAULT_SECRET_ID }}'
              VAULT_TOKEN=$(curl -sS -X POST -H "Content-Type: application/json" -d "{\"role_id\":\"$ROLE_ID\",\"secret_id\":\"$SECRET_ID\"}" "$VAULT_ADDR/v1/auth/approle/login" | jq -r .auth.client_token)
              if [ -z "$VAULT_TOKEN" ] || [ "$VAULT_TOKEN" = "null" ]; then
                echo "ERROR: AppRole login failed to obtain token"
                exit 1
              fi
              echo "VAULT_TOKEN=$VAULT_TOKEN" >> "$GITHUB_ENV"
            else
              echo "ERROR: VAULT_ROLE not set and AppRole secrets VAULT_ROLE_ID/VAULT_SECRET_ID not available"
              exit 1
            fi
          fi

      - name: Initialize Vault secrets (if init action)
        if: github.event.inputs.action == 'init'
        env:
          VAULT_ADDR: ${{ steps.cred_vault_addr.outputs.credential }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
        run: |
          set -e

          echo "Initializing Vault secrets..."

          # Create trivy-webhook config secret (use defaults)
          echo "Creating trivy-webhook secret..."
          curl -X POST \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "data": {
                "webhook_secret": "'"$(openssl rand -hex 32)"'",
                "image_ref": "ghcr.io/kushin77/trivy-webhook:latest"
              }
            }' \
            "$VAULT_ADDR/v1/secret/data/trivy-webhook/config" || echo "Secret may already exist"

          # Create GitHub tokens secret (requires manual input or from secrets)
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "Storing GitHub token in Vault..."
            curl -X POST \
              -H "X-Vault-Token: $VAULT_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "data": {
                  "actions_token": "'"${{ secrets.GITHUB_TOKEN }}"'"
                }
              }' \
              "$VAULT_ADDR/v1/secret/data/github/tokens" || echo "GitHub token secret may already exist"
          fi

          echo "Vault secrets initialized successfully"

      - name: Update Vault secrets (if update action)
        if: github.event.inputs.action == 'update'
        env:
          VAULT_ADDR: ${{ steps.cred_vault_addr.outputs.credential }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
        run: |
          set -e
          echo "Updating Vault secrets..."

          # Rotate trivy-webhook secret
          NEW_SECRET=$(openssl rand -hex 32)
          curl -X POST \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "data": {
                "webhook_secret": "'"$NEW_SECRET"'",
                "image_ref": "ghcr.io/kushin77/trivy-webhook:latest"
              }
            }' \
            "$VAULT_ADDR/v1/secret/data/trivy-webhook/config"

          echo "Vault secrets updated successfully"
          echo "New webhook secret (store securely): $NEW_SECRET"

      - name: Verify Vault secrets (if verify action)
        if: github.event.inputs.action == 'verify'
        env:
          VAULT_ADDR: ${{ steps.cred_vault_addr.outputs.credential }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
        run: |
          set -e
          echo "Verifying Vault secrets..."

          # Verify trivy-webhook secret exists
          curl -sS -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/secret/data/trivy-webhook/config" | jq '.data.data | keys' || echo "trivy-webhook secret not found"

          # Verify GitHub token secret exists
          curl -sS -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/secret/data/github/tokens" | jq '.data.data | keys' || echo "GitHub token secret not found"

          # Verify cosign keys exist (optional)
          curl -sS -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/secret/data/cosign/keys" | jq '.data.data | keys' || echo "Cosign secret not found (optional)"

          echo "Secret verification complete"

      - name: Post summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            core.info('Bootstrap action: ${{ github.event.inputs.action }}')
            core.info('For manual secret initialization, run: gh workflow run bootstrap-vault-secrets.yml -f action=init --repo kushin77/self-hosted-runner')
