name: KMS Artifact Signing & Encryption (SLSA Provenance)

on:
  workflow_call:
    inputs:
      artifact_path:
        description: 'Path to artifact to sign/encrypt'
        required: true
        type: string
      kms_key_id:
        description: 'AWS KMS key ID or ARN'
        required: true
        type: string
      operation:
        description: 'Operation: sign (SLSA), encrypt, verify'
        required: false
        type: string
        default: 'sign'
      retention_days:
        description: 'Artifact retention (immutable after creation)'
        required: false
        type: number
        default: 365
    outputs:
      signature_file:
        description: 'Path to SLSA provenance/signature file'
        value: ${{ jobs.kms-sign.outputs.signature_file }}
      artifact_hash:
        description: 'SHA256 hash of artifact'
        value: ${{ jobs.kms-sign.outputs.artifact_hash }}
      verified:
        description: 'Verification result (true/false)'
        value: ${{ jobs.kms-verify.outputs.verified }}

permissions:
  contents: read
  id-token: write

jobs:
  kms-sign:
    name: Sign Artifact with AWS KMS (SLSA Provenance)
    runs-on: ubuntu-latest
    outputs:
      signature_file: ${{ steps.sign.outputs.signature_file }}
      artifact_hash: ${{ steps.sign.outputs.artifact_hash }}
    steps:
      - uses: actions/checkout@v4

      - name: Assume AWS role via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Audit signing start
        run: |
          echo '{
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
            "action": "artifact_signing_start",
            "artifact": "${{ inputs.artifact_path }}",
            "operation": "${{ inputs.operation }}",
            "run_id": "${{ github.run_id }}"
          }' | jq .

      - name: Compute artifact hash (immutable)
        id: hash
        run: |
          set -euo pipefail
          
          if [ ! -f "${{ inputs.artifact_path }}" ]; then
            echo "❌ Artifact not found: ${{ inputs.artifact_path }}"
            exit 1
          fi
          
          HASH=$(sha256sum "${{ inputs.artifact_path }}" | awk '{print $1}')
          echo "artifact_hash=$HASH" >> $GITHUB_OUTPUT
          echo "Artifact SHA256: $HASH"

      - name: Create SLSA provenance (immutable record)
        id: provenance
        run: |
          set -euo pipefail
          
          PROVENANCE_FILE="${{ inputs.artifact_path }}.slsa.json"
          
          cat > "$PROVENANCE_FILE" << EOF
          {
            "version": 1,
            "kind": "slsaprovenance",
            "metadata": {
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            },
            "subject": [
              {
                "name": "${{ inputs.artifact_path }}",
                "digest": {
                  "sha256": "${{ steps.hash.outputs.artifact_hash }}"
                }
              }
            ],
            "signature": {
              "keyid": "${{ inputs.kms_key_id }}",
              "sig": "PLACEHOLDER_WILL_BE_REPLACED_BY_KMS"
            },
            "builders": [
              {
                "id": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
            ],
            "config": {
              "sourceURI": "git+https://github.com/${{ github.repository }}@${{ github.ref }}",
              "digest": {
                "sha1": "${{ github.sha }}"
              }
            }
          }
          EOF
          
          echo "✅ SLSA provenance created: $PROVENANCE_FILE"
          echo "provenance_file=$PROVENANCE_FILE" >> $GITHUB_OUTPUT

      - name: Sign artifact with AWS KMS
        id: sign
        run: |
          set -euo pipefail
          
          ARTIFACT_FILE="${{ inputs.artifact_path }}"
          SIGNATURE_FILE="${ARTIFACT_FILE}.sig"
          PROVENANCE_FILE="${{ steps.provenance.outputs.provenance_file }}"
          
          echo "🔐 Signing artifact with AWS KMS..."
          echo "  Key ID: ${{ inputs.kms_key_id }}"
          echo "  Algorithm: RSASSA_PSS_SHA_256"
          
          # Sign the artifact
          aws kms sign \
            --key-id "${{ inputs.kms_key_id }}" \
            --message "fileb://$(pwd)/$ARTIFACT_FILE" \
            --message-algorithm RSASSA_PSS_SHA_256 \
            --signing-algorithm RSASSA_PSS_SHA_256 \
            --output text \
            --query 'Signature' > "$SIGNATURE_FILE"
          
          # Also sign the provenance file
          PROVENANCE_SIG_FILE="${PROVENANCE_FILE}.sig"
          aws kms sign \
            --key-id "${{ inputs.kms_key_id }}" \
            --message "fileb://$(pwd)/$PROVENANCE_FILE" \
            --message-algorithm RSASSA_PSS_SHA_256 \
            --signing-algorithm RSASSA_PSS_SHA_256 \
            --output text \
            --query 'Signature' > "$PROVENANCE_SIG_FILE"
          
          echo "✅ Artifact signed: $SIGNATURE_FILE"
          echo "✅ Provenance signed: $PROVENANCE_SIG_FILE"
          
          echo "signature_file=$SIGNATURE_FILE" >> $GITHUB_OUTPUT
          echo "artifact_hash=${{ steps.hash.outputs.artifact_hash }}" >> $GITHUB_OUTPUT

      - name: Upload signed artifact & provenance (immutable archive)
        run: |
          set -euo pipefail
          
          ARTIFACT_FILE="${{ inputs.artifact_path }}"
          SIGNATURE_FILE="${ARTIFACT_FILE}.sig"
          PROVENANCE_FILE="${{ steps.provenance.outputs.provenance_file }}"
          PROVENANCE_SIG="${PROVENANCE_FILE}.sig"
          
          # Upload to S3 (versioned, immutable)
          S3_BUCKET="${{ secrets.ARTIFACT_BUCKET }}"
          
          aws s3 cp "$ARTIFACT_FILE" "s3://${S3_BUCKET}/artifacts/$(basename $ARTIFACT_FILE)" \
            --sse aws:kms --sse-kms-key-id ${{ inputs.kms_key_id }} \
            --metadata "immutable=true,created=$(date -u +%Y-%m-%dT%H:%M:%SZ),run-id=${{ github.run_id }}" \
            || echo "⚠️  S3 upload skipped (optional)"
          
          aws s3 cp "$SIGNATURE_FILE" "s3://${S3_BUCKET}/signatures/$(basename $SIGNATURE_FILE)" \
            --sse aws:kms --sse-kms-key-id ${{ inputs.kms_key_id }} \
            || echo "⚠️  Signature upload skipped (optional)"
          
          aws s3 cp "$PROVENANCE_FILE" "s3://${S3_BUCKET}/provenance/$(basename $PROVENANCE_FILE)" \
            --sse aws:kms --sse-kms-key-id ${{ inputs.kms_key_id }} \
            || echo "⚠️  Provenance upload skipped (optional)"
          
          echo "✅ Artifacts uploaded to S3 (KMS-encrypted, immutable, versioned)"

      - name: Audit signing completion
        if: always()
        run: |
          echo '{
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
            "action": "artifact_signing_complete",
            "artifact": "${{ inputs.artifact_path }}",
            "hash": "${{ steps.hash.outputs.artifact_hash }}",
            "signed": true,
            "kms_key": "${{ inputs.kms_key_id }}",
            "status": "${{ job.status }}",
            "run_id": "${{ github.run_id }}"
          }' | jq .

  kms-verify:
    name: Verify Artifact Signature (KMS Public Key)
    needs: kms-sign
    if: inputs.operation == 'verify'
    runs-on: ubuntu-latest
    outputs:
      verified: ${{ steps.verify.outputs.verified }}
    steps:
      - uses: actions/checkout@v4

      - name: Assume AWS role via OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Verify signature with KMS public key
        id: verify
        run: |
          set -euo pipefail
          
          ARTIFACT_FILE="${{ inputs.artifact_path }}"
          SIGNATURE_FILE="${ARTIFACT_FILE}.sig"
          
          if [ ! -f "$SIGNATURE_FILE" ]; then
            echo "❌ Signature file not found: $SIGNATURE_FILE"
            echo "verified=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          echo "🔍 Verifying signature with AWS KMS public key..."
          
          # Get public key from KMS
          PUBLIC_KEY=$(aws kms get-public-key \
            --key-id "${{ inputs.kms_key_id }}" \
            --query 'PublicKey' \
            --output text | base64 -d)
          
          # Verify using KMS (or openssl with extracted public key)
          aws kms verify \
            --key-id "${{ inputs.kms_key_id }}" \
            --message "fileb://$(pwd)/$ARTIFACT_FILE" \
            --message-algorithm RSASSA_PSS_SHA_256 \
            --signature "fileb://$(pwd)/$SIGNATURE_FILE" \
            --signing-algorithm RSASSA_PSS_SHA_256 \
            --output text \
            --query 'SignatureValid' > /tmp/verify_result.txt
          
          RESULT=$(cat /tmp/verify_result.txt)
          
          if [ "$RESULT" = "True" ]; then
            echo "✅ Signature verification PASSED"
            echo "verified=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Signature verification FAILED"
            echo "verified=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Audit verification
        if: always()
        run: |
          echo '{
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
            "action": "artifact_verification",
            "verified": ${{ steps.verify.outputs.verified }},
            "artifact": "${{ inputs.artifact_path }}",
            "run_id": "${{ github.run_id }}"
          }' | jq .
