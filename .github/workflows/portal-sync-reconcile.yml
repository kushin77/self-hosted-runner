name: Portal Sync Reconcile (nightly)

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Portal Metadata Validate"]
    types: [completed]

jobs:
  reconcile:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: portal-sync-reconcile-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: [self-hosted, linux]
    env:
      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: python -m pip install --upgrade pip && pip install pyyaml requests
      - name: Generate metadata artifact
        run: python3 scripts/generate_function_metadata.py --output portal-artifact.json
      - name: Reconcile and create issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/reconcile_and_create_issues.py --create-issues --owner ${{ github.repository_owner }} --repo ${{ github.event.repository.name || github.repository }}
      - name: Upload portal artifact to MinIO
        if: ${{ env.MINIO_ENDPOINT != '' }}
        run: |
          set -euo pipefail
          chmod +x scripts/minio/upload.sh scripts/minio/install-mc.sh
          scripts/minio/upload.sh --file portal-artifact.json --bucket "$MINIO_BUCKET" --object "portal-artifact-${{ github.run_id }}.json"
      - name: Upload portal artifact (hosted fallback)
        if: ${{ env.MINIO_ENDPOINT == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: portal-artifact-${{ github.run_id }}
          path: portal-artifact.json
