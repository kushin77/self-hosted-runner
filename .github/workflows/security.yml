name: Security (SAST + dependency scan)

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  sast:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install SAST tools
      run: |
        pip install semgrep bandit

    - name: Run Semgrep
      run: |
        semgrep --config=p/security-audit --config=p/python --json -o semgrep-report.json \
          self_healing_orchestrator/ || true

    - name: Run Bandit
      run: |
        bandit -r self_healing_orchestrator/ -f json -o bandit-report.json || true

    - name: Upload SAST reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: sast-reports
        path: |
          semgrep-report.json
          bandit-report.json

  depend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependency check tools
      run: |
        pip install safety pip-audit

    - name: Run Safety check
      run: |
        safety check --json -o safety-report.json || true

    - name: Run pip-audit
      run: |
        pip-audit --desc --format json || true

  secret-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Scan full history

    - name: Run TruffleHog secret scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --json
