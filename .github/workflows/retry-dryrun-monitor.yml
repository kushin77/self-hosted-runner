name: Retry — Vault Dry-Run Monitor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      run_once:
        description: 'If true, run once immediately (no-op for schedule)'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write

jobs:
  check-vault:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install tools
        run: |
          sudo apt-get update -y && sudo apt-get install -y jq curl

      - name: Verify VAULT_ADDR secret
        id: check_secret
        run: |
          if [[ -z "${{ secrets.VAULT_ADDR }}" ]]; then
            echo "vault_addr_set=false" >> $GITHUB_OUTPUT
            echo "VAULT_ADDR not configured; skipping"; exit 0
          else
            echo "vault_addr_set=true" >> $GITHUB_OUTPUT
          fi

      - name: Vault health check
        if: steps.check_secret.outputs.vault_addr_set == 'true'
        id: vault_health
        run: |
          set -o pipefail
          VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
          if timeout 8 curl -sS "$VAULT_ADDR/v1/sys/health" >/dev/null 2>&1; then
            echo "vault_reachable=true" >> $GITHUB_OUTPUT
            echo "Vault reachable"
          else
            echo "vault_reachable=false" >> $GITHUB_OUTPUT
            echo "Vault unreachable"
          fi

      - name: Attempt AppRole login (non-destructive)
        if: steps.vault_health.outputs.vault_reachable == 'true'
        id: auth
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
        run: |
          if [[ -z "$VAULT_ROLE_ID" ]] || [[ -z "$VAULT_SECRET_ID" ]]; then
            echo "auth_ok=false" >> $GITHUB_OUTPUT
            echo "Vault credentials not set"
            exit 0
          fi
          TOKEN=$(curl -s -X POST -d "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$VAULT_SECRET_ID\"}" "$VAULT_ADDR/v1/auth/approle/login" | jq -r '.auth.client_token' 2>/dev/null)
          if [[ -n "$TOKEN" && "$TOKEN" != "null" ]]; then
            echo "auth_ok=true" >> $GITHUB_OUTPUT
            echo "Authenticated to Vault"
          else
            echo "auth_ok=false" >> $GITHUB_OUTPUT
            echo "Failed to authenticate to Vault"
          fi

      - name: Close investigation issue on success
        if: steps.auth.outputs.auth_ok == 'true'
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "Vault reachable and AppRole auth succeeded; updating issue #1048"
          gh issue comment 1048 --repo "$REPO" --body "Automated monitor: Vault connectivity and AppRole auth succeeded. Closing investigation issue. Diagnostics run: ${{ github.run_id }} (${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" || true
          gh issue close 1048 --repo "$REPO" || true
          gh issue comment 1026 --repo "$REPO" --body "Runtime validation: Vault dry-run monitor succeeded in run ${{ github.run_id }}. Consider this phase validated for Vault connectivity." || true

      - name: Create audit issue if still failing (one-line audit)
        if: steps.auth.outputs.auth_ok != 'true'
        env:
          REPO: ${{ github.repository }}
        run: |
          echo "Vault still failing; creating/update audit issue";
          gh issue create --repo "$REPO" --title "Vault dry-run monitor: connectivity failing" --body "Automated monitor: Vault unreachable or AppRole auth failed on run ${{ github.run_id }}. Please inspect runner DNS/network and `VAULT_ADDR` secret. Diagnostics run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" --label "action-required,automation" || true
