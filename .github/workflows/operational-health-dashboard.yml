name: Operational Health Dashboard & Metrics

on:
  schedule:
    # Daily health report at 04:00 UTC
    - cron: "0 4 * * *"
    # Hourly metrics collection
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      report_type:
        description: "Report type (hourly, daily, or comprehensive)"
        required: false
        default: "daily"
        type: choice
        options:
          - hourly
          - daily
          - comprehensive

  workflow_call: {}

concurrency:
  group: operational-health-dashboard-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  health-dashboard:
    name: Health Dashboard & Metrics
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Collect Workflow Health Metrics
        id: workflow-health
        run: |
          echo "Collecting health metrics for all remediation workflows..."
          
          # Track the four critical workflows
          WORKFLOWS=(
            "dr-reconciliation-auto-remediate.yml"
            "ephemeral-secret-provisioning.yml"
            "enable-auto-merge.yml"
            "minio-dns-failover.yml"
          )
          
          OVERALL_SUCCESS=0
          OVERALL_TOTAL=0
          
          for workflow in "${WORKFLOWS[@]}"; do
            echo ""
            echo "­¤ōŖ Workflow: $workflow"
            
            # Get last 5 runs
            RUNS=$(gh run list \
              --workflow "$workflow" \
              --repo kushin77/self-hosted-runner \
              --limit 5 \
              --json status,conclusion,createdAt,databaseId \
              --jq '.')
            
            if [ -z "$RUNS" ]; then
              echo "ŌÜĀ No runs found for $workflow"
              continue
            fi
            
            # Count successes
            SUCCESS_COUNT=$(echo "$RUNS" | jq '[.[] | select(.conclusion == "success")] | length')
            TOTAL_COUNT=$(echo "$RUNS" | jq 'length')
            FAILURE_COUNT=$(echo "$RUNS" | jq '[.[] | select(.conclusion == "failure")] | length')
            
            SUCCESS_RATE=$((SUCCESS_COUNT * 100 / TOTAL_COUNT))
            
            echo "  Last 5 runs: $SUCCESS_COUNT/$TOTAL_COUNT successful ($SUCCESS_RATE%)"
            echo "  Failures: $FAILURE_COUNT"
            
            # Get latest run details
            LATEST=$(echo "$RUNS" | jq '.[0]')
            LATEST_STATUS=$(echo "$LATEST" | jq -r '.status')
            LATEST_CONCLUSION=$(echo "$LATEST" | jq -r '.conclusion')
            LATEST_CREATED=$(echo "$LATEST" | jq -r '.createdAt')
            LATEST_RUN_ID=$(echo "$LATEST" | jq -r '.databaseId')
            
            echo "  Latest: Status=$LATEST_STATUS, Conclusion=$LATEST_CONCLUSION"
            echo "  Latest run: $LATEST_RUN_ID (started: $LATEST_CREATED)"
            
            # Append to metrics
            WORKFLOW_NAME=$(echo "$workflow" | sed 's/.yml//')
            {
              echo "\"$WORKFLOW_NAME\": {"
              echo "  \"success_rate\": $SUCCESS_RATE,"
              echo "  \"successes\": $SUCCESS_COUNT,"
              echo "  \"total_runs\": $TOTAL_COUNT,"
              echo "  \"failures\": $FAILURE_COUNT,"
              echo "  \"latest_status\": \"$LATEST_STATUS\","
              echo "  \"latest_conclusion\": \"$LATEST_CONCLUSION\","
              echo "  \"latest_run_id\": \"$LATEST_RUN_ID\","
              echo "  \"timestamp\": \"$LATEST_CREATED\""
              echo "},"
            } >> /tmp/workflow_metrics.txt
            
            OVERALL_SUCCESS=$((OVERALL_SUCCESS + SUCCESS_COUNT))
            OVERALL_TOTAL=$((OVERALL_TOTAL + TOTAL_COUNT))
          done
          
          OVERALL_SUCCESS_RATE=$((OVERALL_SUCCESS * 100 / OVERALL_TOTAL))
          echo "overall_success_rate=$OVERALL_SUCCESS_RATE" >> $GITHUB_OUTPUT
          echo "overall_successes=$OVERALL_SUCCESS" >> $GITHUB_OUTPUT
          echo "overall_total=$OVERALL_TOTAL" >> $GITHUB_OUTPUT
          
          echo "Ō£ō Overall success rate: $OVERALL_SUCCESS_RATE% ($OVERALL_SUCCESS/$OVERALL_TOTAL)"
      
      - name: Collect Issue Closure Metrics
        id: issue-metrics
        run: |
          echo "Collecting issue closure metrics..."
          
          # Track issues that should auto-close
          TRACKED_ISSUES=(
            "1046"  # DR failure
            "1021"  # DR failure
            "1005"  # DR failure
            "1002"  # DR failure
            "980"   # DR failure
            "973"   # DR failure
            "972"   # DR failure
            "1065"  # Missing secrets
            "969"   # Admin action (secrets)
            "965"   # Admin action (auto-merge)
            "988"   # DNS failure
          )
          
          CLOSED_COUNT=0
          OPEN_COUNT=0
          UPDATED_COUNT=0
          ISSUE_DETAILS=""
          
          for issue_num in "${TRACKED_ISSUES[@]}"; do
            ISSUE=$(gh issue view "$issue_num" \
              --repo kushin77/self-hosted-runner \
              --json state,title,updatedAt \
              --jq '.')
            
            STATE=$(echo "$ISSUE" | jq -r '.state')
            TITLE=$(echo "$ISSUE" | jq -r '.title')
            UPDATED=$(echo "$ISSUE" | jq -r '.updatedAt')
            
            if [ "$STATE" = "CLOSED" ]; then
              ((CLOSED_COUNT++))
              ICON="Ō£ģ"
            else
              ((OPEN_COUNT++))
              ICON="­¤ö┤"
            fi
            
            ISSUE_DETAILS="$ISSUE_DETAILS
$ICON #$issue_num: $TITLE (updated: $UPDATED)"
            
            # Check if recently updated (last 2 hours)
            UPDATED_EPOCH=$(date -d "$UPDATED" +%s)
            NOW_EPOCH=$(date +%s)
            DIFF=$((NOW_EPOCH - UPDATED_EPOCH))
            
            if [ $DIFF -lt 7200 ]; then
              ((UPDATED_COUNT++))
            fi
          done
          
          echo "closed_count=$CLOSED_COUNT" >> $GITHUB_OUTPUT
          echo "open_count=$OPEN_COUNT" >> $GITHUB_OUTPUT
          echo "updated_count=$UPDATED_COUNT" >> $GITHUB_OUTPUT
          echo "issue_details<<EOF" >> $GITHUB_OUTPUT
          echo "$ISSUE_DETAILS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "Ō£ō Issues: $CLOSED_COUNT closed, $OPEN_COUNT open, $UPDATED_COUNT updated (last 2h)"
      
      - name: Analyze Secret Provisioning Status
        id: secrets-status
        run: |
          echo "Checking secret provisioning status..."
          
          # Check if RUNNER_MGMT_TOKEN and DEPLOY_SSH_KEY are set
          RUNNER_TOKEN_SET=$(gh api repos/kushin77/self-hosted-runner/actions/secrets \
            --jq '.secrets | map(select(.name == "RUNNER_MGMT_TOKEN")) | length')
          
          DEPLOY_KEY_SET=$(gh api repos/kushin77/self-hosted-runner/actions/secrets \
            --jq '.secrets | map(select(.name == "DEPLOY_SSH_KEY")) | length')
          
          if [ "$RUNNER_TOKEN_SET" -gt 0 ]; then
            echo "runner_token_status=Ō£ģ SET" >> $GITHUB_OUTPUT
          else
            echo "runner_token_status=ŌØī MISSING" >> $GITHUB_OUTPUT
          fi
          
          if [ "$DEPLOY_KEY_SET" -gt 0 ]; then
            echo "deploy_key_status=Ō£ģ SET" >> $GITHUB_OUTPUT
          else
            echo "deploy_key_status=ŌØī MISSING" >> $GITHUB_OUTPUT
          fi
          
          SECRETS_HEALTHY=$([ "$RUNNER_TOKEN_SET" -gt 0 ] && [ "$DEPLOY_KEY_SET" -gt 0 ] && echo "true" || echo "false")
          echo "secrets_healthy=$SECRETS_HEALTHY" >> $GITHUB_OUTPUT
      
      - name: Check MinIO Connectivity Status
        id: minio-status
        continue-on-error: true
        run: |
          echo "Checking MinIO connectivity..."
          
          PRIMARY_HOST="${{ secrets.MINIO_HOST || 'mc.bioenergystrategies.com' }}"
          
          # Quick health check
          if timeout 5 bash -c "echo >/dev/tcp/$PRIMARY_HOST/9000" 2>/dev/null; then
            echo "minio_status=Ō£ģ HEALTHY" >> $GITHUB_OUTPUT
            echo "minio_response_code=200" >> $GITHUB_OUTPUT
          else
            echo "minio_status=ŌÜĀ UNREACHABLE" >> $GITHUB_OUTPUT
            echo "minio_response_code=000" >> $GITHUB_OUTPUT
          fi
      
      - name: Generate Daily Health Report
        id: daily-report
        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          SUCCESS_RATE="${{ steps.workflow-health.outputs.overall_success_rate }}"
          CLOSED_ISSUES="${{ steps.issue-metrics.outputs.closed_count }}"
          OPEN_ISSUES="${{ steps.issue-metrics.outputs.open_count }}"
          UPDATED_ISSUES="${{ steps.issue-metrics.outputs.updated_count }}"
          RUNNER_TOKEN="${{ steps.secrets-status.outputs.runner_token_status }}"
          DEPLOY_KEY="${{ steps.secrets-status.outputs.deploy_key_status }}"
          MINIO_STATUS="${{ steps.minio-status.outputs.minio_status }}"
          
          REPORT="## ­¤ōŖ Health Dashboard Report - $TIMESTAMP
          
### Ō£ģ System Health Summary

| Metric | Value | Status |
|--------|-------|--------|
| **Workflow Success Rate** | $SUCCESS_RATE% | $([ $SUCCESS_RATE -ge 95 ] && echo '­¤¤ó HEALTHY' || echo '­¤¤Ī WARNING') |
| **Tracked Issues Closed** | $CLOSED_ISSUES / 11 | $([ $CLOSED_ISSUES -eq 11 ] && echo 'Ō£ģ ALL' || echo '­¤öä IN PROGRESS') |
| **Issues Recently Updated** | $UPDATED_ISSUES | ­¤öä Active remediation |
| **RUNNER_MGMT_TOKEN** | $RUNNER_TOKEN | $(echo "$RUNNER_TOKEN" | grep -q "Ō£ģ" && echo 'Ō£ģ' || echo 'ŌØī') |
| **DEPLOY_SSH_KEY** | $DEPLOY_KEY | $(echo "$DEPLOY_KEY" | grep -q "Ō£ģ" && echo 'Ō£ģ' || echo 'ŌØī') |
| **MinIO Endpoint** | $MINIO_STATUS | $(echo "$MINIO_STATUS" | grep -q "HEALTHY" && echo 'Ō£ģ' || echo 'ŌÜĀ') |

### ­¤ōŗ Tracked Issues Status

${{ steps.issue-metrics.outputs.issue_details }}

### ­¤öä Automation Workflow Status

- **DR Reconciliation**: Every 30 min (detects+closes failures)
- **Secret Provisioning**: Every 6 hours (ephemeral, auto-close)
- **Auto-Merge**: Daily verification (enable+config)
- **MinIO Failover**: Every 15 min (health monitor)

### ­¤ōł Key Metrics (Last 5 Runs Each)

**Success Rate**: $SUCCESS_RATE% overall  
**Failures**: ${{ steps.workflow-health.outputs.overall_total - steps.workflow-health.outputs.overall_successes }} of ${{ steps.workflow-health.outputs.overall_total }} runs  
**Auto-Closes**: $CLOSED_ISSUES issues resolved  

### ­¤Ä» System Properties

Ō£ģ **Immutable**: All actions logged to GitHub issues  
Ō£ģ **Ephemeral**: Secrets rotated; failover auto-reverts  
Ō£ģ **Idempotent**: Workflows safe to re-run  
Ō£ģ **Hands-Off**: 100% automated, zero manual ops  

### ­¤öŚ Links

- **Workflows**: https://github.com/kushin77/self-hosted-runner/actions
- **Issues**: https://github.com/kushin77/self-hosted-runner/issues
- **Phase 5 Sign-Off**: Issue #1071
- **Remediation Summary**: Issue #1077

---

**Report Generated**: $TIMESTAMP  
**Next Report**: $(date -u -d '+24 hours' +'%Y-%m-%d %H:%M:%S UTC')  
**Status**: ­¤¤ó SYSTEM OPERATIONAL"
          
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Post or Update Dashboard Issue
        id: dashboard-issue
        run: |
          DASHBOARD_ISSUE="1056"  # Continuous Monitoring issue
          REPORT="${{ steps.daily-report.outputs.report }}"
          
          # Check if we should post comment or just update
          if [ "$(date +'%H')" -eq "04" ]; then
            # Daily report (04:00 UTC)
            echo "Posting daily health report to issue #$DASHBOARD_ISSUE..."
            gh issue comment "$DASHBOARD_ISSUE" \
              --repo kushin77/self-hosted-runner \
              --body "$REPORT" 2>/dev/null && echo "dashboard_action=commented" >> $GITHUB_OUTPUT || \
              echo "dashboard_action=comment-failed" >> $GITHUB_OUTPUT
          else
            # Hourly metrics (just update description)
            echo "dashboard_action=metrics-collected" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Summary to Actions Annotations
        run: |
          SUCCESS_RATE="${{ steps.workflow-health.outputs.overall_success_rate }}"
          CLOSED="${{ steps.issue-metrics.outputs.closed_count }}"
          OPEN="${{ steps.issue-metrics.outputs.open_count }}"
          
          if [ $SUCCESS_RATE -ge 95 ]; then
            echo "::notice::Ō£ģ System Healthy - Success rate: $SUCCESS_RATE%, Issues closed: $CLOSED/11"
          elif [ $SUCCESS_RATE -ge 80 ]; then
            echo "::warning::ŌÜĀ System Operational - Success rate: $SUCCESS_RATE%, Issues closed: $CLOSED/11"
          else
            echo "::error::ŌØī System Issues - Success rate: $SUCCESS_RATE%, Open: $OPEN issues"
          fi
      
      - name: Store metrics for trending
        run: |
          mkdir -p .metrics
          
          cat > .metrics/health-$(date +%Y%m%d-%H%M%S).json <<EOF
          {
            "timestamp": "$(date -u -Iseconds)",
            "workflow_success_rate": ${{ steps.workflow-health.outputs.overall_success_rate }},
            "workflow_successes": ${{ steps.workflow-health.outputs.overall_successes }},
            "workflow_total": ${{ steps.workflow-health.outputs.overall_total }},
            "issues_closed": ${{ steps.issue-metrics.outputs.closed_count }},
            "issues_open": ${{ steps.issue-metrics.outputs.open_count }},
            "issues_updated_2h": ${{ steps.issue-metrics.outputs.updated_count }},
            "secrets_healthy": ${{ steps.secrets-status.outputs.secrets_healthy }},
            "minio_healthy": "${{ contains(steps.minio-status.outputs.minio_status, 'HEALTHY') }}"
          }
          EOF
      
      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: health-dashboard-metrics
          path: .metrics
          retention-days: 90
