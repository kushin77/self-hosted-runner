name: Reusable: Terraform Apply (callable)

on:
  workflow_call:
    inputs:
      plan-object:
        required: true
        type: string
      aws_access_key_id:
        required: false
        type: string
      aws_secret_access_key:
        required: false
        type: string
      aws_region:
        required: false
        type: string
    secrets:
      MINIO_BUCKET:
        required: true

jobs:
  apply:
    runs-on: [self-hosted, linux, self-hosted-heavy]
    steps:
      - name: Download terraform plan artifact from MinIO (with retry)
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true
          chmod +x scripts/minio/download.sh scripts/minio/install-mc.sh scripts/automation/ci_retry.sh
          retry_command 3 5 ./scripts/minio/download.sh --bucket "${{ secrets.MINIO_BUCKET }}" --object "${{ inputs.plan-object }}" --out ci-runners-plan.out

      - name: Download terraform plan checksum from MinIO (with retry)
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true
          chmod +x scripts/minio/download.sh scripts/minio/install-mc.sh scripts/automation/ci_retry.sh
          retry_command 2 3 ./scripts/minio/download.sh --bucket "${{ secrets.MINIO_BUCKET }}" --object "${{ inputs.plan-object }}.sha" --out ci-runners-plan.out.sha || true

      - name: Verify terraform plan checksum
        run: |
          set -euo pipefail
          if [ -f ci-runners-plan.out.sha ]; then
            sha256sum -c ci-runners-plan.out.sha
          else
            echo "Checksum missing; aborting apply" >&2
            exit 2
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true
          TF_VER=1.5.7
          retry_command 3 5 curl -fsSL https://releases.hashicorp.com/terraform/${TF_VER}/terraform_${TF_VER}_linux_amd64.zip -o /tmp/terraform.zip
          unzip -o /tmp/terraform.zip -d /usr/local/bin
          terraform version

      - name: Place ami.tfvars if present
        run: |
          if [ -f terraform/packer-ami/ami.tfvars ]; then
            cp terraform/packer-ami/ami.tfvars terraform/ami.tfvars || true
          fi

      - name: Terraform apply (using plan, with retry)
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ inputs.aws_access_key_id || secrets.AWS_ACCESS_KEY_ID || '' }}
          AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key || secrets.AWS_SECRET_ACCESS_KEY || '' }}
          AWS_REGION: ${{ inputs.aws_region || secrets.AWS_REGION || '' }}
        run: |
          set -euo pipefail
          source ../.github/scripts/resilience.sh || true
          chmod +x ../scripts/automation/ci_retry.sh
          if [ -f ../ci-runners-plan.out ]; then
            retry_command 2 10 terraform apply -input=false ../ci-runners-plan.out
          elif [ -f ci-runners-plan.out ]; then
            retry_command 2 10 terraform apply -input=false ci-runners-plan.out
          else
            echo "Plan artifact not found; aborting" >&2
            exit 2
          fi
