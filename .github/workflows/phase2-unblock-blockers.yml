name: '[Phase 2] Unblock Blockers — Automated Infrastructure Setup'
# Idempotent | Immutable | Ephemeral | No-Ops | Hands-Off
# Applies Terraform infrastructure for all Phase 2 blockers
# Runs when: GCP_PROJECT_ID, AWS_ACCOUNT_ID, VAULT_ADDR secrets are set

on:
  workflow_dispatch:
    inputs:
      apply_terraform:
        description: 'Apply Terraform changes (true=apply, false=plan-only)'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 1 * * *'  # Daily 1 AM UTC

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_VERSION: "1.6"
  TF_LOG: INFO

jobs:
  blockers-infrastructure:
    name: Apply Phase 2 Blocker Configurations
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Python (for API calls)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir requests pyyaml jq
          curl -fsSO https://apt.releases.hashicorp.com/gpg && sudo apt-key add gpg
          sudo apt-get update && sudo apt-get install -y vault jq

      - name: Check for required secrets
        id: check_secrets
        run: |
          echo "gcp_configured=false" >> $GITHUB_OUTPUT
          echo "aws_configured=false" >> $GITHUB_OUTPUT
          echo "vault_configured=false" >> $GITHUB_OUTPUT
          
          if [[ -n "${{ secrets.GCP_PROJECT_ID }}" ]]; then
            echo "gcp_configured=true" >> $GITHUB_OUTPUT
            echo "✓ GCP configured"
          else
            echo "⚠️  GCP_PROJECT_ID not set"
          fi
          
          if [[ -n "${{ secrets.AWS_ACCOUNT_ID }}" ]]; then
            echo "aws_configured=true" >> $GITHUB_OUTPUT
            echo "✓ AWS configured"
          else
            echo "⚠️  AWS_ACCOUNT_ID not set"
          fi
          
          if [[ -n "${{ secrets.VAULT_ADDR }}" ]]; then
            echo "vault_configured=true" >> $GITHUB_OUTPUT
            echo "✓ Vault configured"
          else
            echo "⚠️  VAULT_ADDR not set"
          fi

      - name: Configure AWS OIDC credentials
        if: steps.check_secrets.outputs.aws_configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: 'arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-oidc'
          role-session-name: 'phase2-blockers-setup'

      - name: Authenticate to Google Cloud
        if: steps.check_secrets.outputs.gcp_configured == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-actions@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        if: steps.check_secrets.outputs.gcp_configured == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform fmt
        run: |
          cd terraform
          terraform fmt -check

      - name: Terraform init
        run: |
          cd terraform
          terraform init \
            -backend=false

      - name: Terraform plan (GCP)
        if: steps.check_secrets.outputs.gcp_configured == 'true'
        run: |
          cd terraform
          terraform plan \
            -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="aws_account_id=" \
            -var="vault_addr=" \
            -var="github_owner=kushin77" \
            -var="github_repo=self-hosted-runner" \
            -out=tfplan-gcp.tfplan
          
          echo "## GCP Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan-gcp.tfplan | head -50 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Terraform plan (AWS)
        if: steps.check_secrets.outputs.aws_configured == 'true'
        run: |
          cd terraform
          terraform plan \
            -var="gcp_project_id=" \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="vault_addr=" \
            -var="github_owner=kushin77" \
            -var="github_repo=self-hosted-runner" \
            -out=tfplan-aws.tfplan
          
          echo "## AWS Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan-aws.tfplan | head -50 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Terraform plan (Vault)
        if: steps.check_secrets.outputs.vault_configured == 'true'
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          cd terraform
          terraform plan \
            -var="gcp_project_id=" \
            -var="aws_account_id=" \
            -var="vault_addr=${{ secrets.VAULT_ADDR }}" \
            -var="github_owner=kushin77" \
            -var="github_repo=self-hosted-runner" \
            -out=tfplan-vault.tfplan
          
          echo "## Vault Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan-vault.tfplan | head -50 >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Terraform apply (if approved)
        if: github.event.inputs.apply_terraform == 'true'
        run: |
          cd terraform
          
          if [[ -f tfplan-gcp.tfplan ]]; then
            echo "Applying GCP configuration..."
            terraform apply -auto-approve tfplan-gcp.tfplan
          fi
          
          if [[ -f tfplan-aws.tfplan ]]; then
            echo "Applying AWS configuration..."
            terraform apply -auto-approve tfplan-aws.tfplan
          fi
          
          if [[ -f tfplan-vault.tfplan ]]; then
            echo "Applying Vault configuration..."
            terraform apply -auto-approve tfplan-vault.tfplan
          fi
          
          echo "✓ Infrastructure applied"

      - name: Extract outputs
        if: success()
        id: tf_outputs
        run: |
          cd terraform
          
          GCP_POOL=$(terraform output -raw gcp_workload_identity_pool 2>/dev/null || echo "Not configured")
          AWS_ROLE=$(terraform output -raw aws_iam_role_arn 2>/dev/null || echo "Not configured")
          VAULT_PATH=$(terraform output -raw vault_approle_backend_path 2>/dev/null || echo "Not configured")
          
          echo "gcp_pool=$GCP_POOL" >> $GITHUB_OUTPUT
          echo "aws_role=$AWS_ROLE" >> $GITHUB_OUTPUT
          echo "vault_path=$VAULT_PATH" >> $GITHUB_OUTPUT

      - name: Update GitHub secrets (if Terraform applied)
        if: github.event.inputs.apply_terraform == 'true' && success()
        run: |
          GCP_POOL="${{ steps.tf_outputs.outputs.gcp_pool }}"
          AWS_ROLE="${{ steps.tf_outputs.outputs.aws_role }}"
          VAULT_PATH="${{ steps.tf_outputs.outputs.vault_path }}"
          
          if [[ "$GCP_POOL" != "Not configured" ]]; then
            gh secret set GCP_WORKLOAD_IDENTITY_POOL_ID --body "$GCP_POOL" || true
            echo "✓ GCP_WORKLOAD_IDENTITY_POOL_ID secret set"
          fi
          
          if [[ "$AWS_ROLE" != "Not configured" ]]; then
            gh secret set AWS_OIDC_ROLE_ARN --body "$AWS_ROLE" || true
            echo "✓ AWS_OIDC_ROLE_ARN secret set"
          fi

      - name: Create summary and update issues
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const gcp_configured = "${{ steps.check_secrets.outputs.gcp_configured }}" === "true";
            const aws_configured = "${{ steps.check_secrets.outputs.aws_configured }}" === "true";
            const vault_configured = "${{ steps.check_secrets.outputs.vault_configured }}" === "true";
            const apply_requested = "${{ github.event.inputs.apply_terraform }}" === "true";
            
            const status = `
            ## Phase 2 Blockers — Setup Status
            
            **Timestamp:** ${new Date().toISOString()}
            **Workflow:** Unblock Blockers
            
            ### Configuration Status
            - GCP: ${gcp_configured ? "✅ Configured" : "⚠️ Not configured"}
            - AWS: ${aws_configured ? "✅ Configured" : "⚠️ Not configured"}
            - Vault: ${vault_configured ? "✅ Configured" : "⚠️ Not configured"}
            
            ### Infrastructure Status
            - GCP WIF Pool: ${gcp_configured ? "Ready to apply" : "Blocked - set GCP_PROJECT_ID secret"}
            - AWS OIDC Provider: ${aws_configured ? "Ready to apply" : "Blocked - set AWS_ACCOUNT_ID secret"}
            - Vault AppRole: ${vault_configured ? "Ready to apply" : "Blocked - set VAULT_ADDR + VAULT_TOKEN secrets"}
            
            ### Next Steps
            ${!gcp_configured && !aws_configured && !vault_configured ? "1. Set required GitHub secrets (see docs)\n2. Re-run this workflow" : "✓ Ready to apply infrastructure"}
            
            **Architecture:** Immutable | Ephemeral | Idempotent | No-Ops | Hands-Off
            `;
            
            // Update issue #2158 (GCP)
            if (gcp_configured) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 2158,
                body: "✅ Phase 2 Blocker Resolution: GCP WIF infrastructure ready to apply\n\nTerraform plan completed successfully. Run workflow with `apply_terraform=true` to deploy."
              });
            }
            
            // Update issue #2159 (AWS)
            if (aws_configured) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 2159,
                body: "✅ Phase 2 Blocker Resolution: AWS OIDC infrastructure ready to apply\n\nTerraform plan completed successfully. Run workflow with `apply_terraform=true` to deploy."
              });
            }
            
            // Update issue #2160 (Vault)
            if (vault_configured) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: 2160,
                body: "✅ Phase 2 Blocker Resolution: Vault AppRole infrastructure ready to apply\n\nTerraform plan completed successfully. Run workflow with `apply_terraform=true` to deploy."
              });
            }

      - name: Post workflow summary
        if: always()
        run: |
          echo "## ✅ Phase 2 Blockers — Automated Setup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Configuration Status:**" >> $GITHUB_STEP_SUMMARY
          echo "- GCP: ${{ steps.check_secrets.outputs.gcp_configured }}" >> $GITHUB_STEP_SUMMARY
          echo "- AWS: ${{ steps.check_secrets.outputs.aws_configured }}" >> $GITHUB_STEP_SUMMARY
          echo "- Vault: ${{ steps.check_secrets.outputs.vault_configured }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture:** Immutable | Ephemeral | Idempotent | No-Ops | Hands-Off" >> $GITHUB_STEP_SUMMARY
