---
name: DR Smoke Test

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: dr-smoke-test-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  dr-readiness-check:
    name: Verify DR Readiness
    runs-on: ubuntu-latest
    outputs:
      dr_status: ${{ steps.check.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Check GCP secret availability
        id: gcp-check
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]; then
            echo "status=missing_gcp_key" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "status=gcp_key_present" >> $GITHUB_OUTPUT
          fi

      - name: Validate GCP key structure (Enhanced)
        id: gcp-validate
        continue-on-error: true
        env:
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          set +e
          bash scripts/validate-gcp-key.sh /tmp/gcp_validation_output.txt
          VALIDATION_EXIT=$?

          if [ $VALIDATION_EXIT -eq 0 ]; then
            echo "status=valid" >> $GITHUB_OUTPUT
            echo "✅ GCP key validation PASSED"
          else
            echo "status=invalid_structure" >> $GITHUB_OUTPUT
            echo "❌ GCP key validation FAILED"
            echo ""
            echo "=== Validation Output Log ==="
            cat /tmp/gcp_validation_output.txt || true
            exit 1
          fi

      - name: Check docker image access
        id: docker-check
        continue-on-error: true
        run: |
          # Attempt to pull a test image
          if docker pull alpine:latest > /dev/null 2>&1; then
            echo "✅ Docker registry access working"
            echo "status=docker_ok" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Docker registry access limited"
            echo "status=docker_limited" >> $GITHUB_OUTPUT
          fi

      - name: Compile DR readiness summary
        id: check
        run: |
          GCP_STATUS="${{ steps.gcp-validate.outputs.status }}"
          DOCKER_STATUS="${{ steps.docker-check.outputs.status }}"

          if [ "$GCP_STATUS" = "valid" ] && [ -n "$DOCKER_STATUS" ]; then
            echo "status=ready" >> $GITHUB_OUTPUT
            echo "✅ DR Readiness: READY"
            exit 0
          else
            echo "status=not_ready" >> $GITHUB_OUTPUT
            echo "⚠️ DR Readiness: CHECKS NEEDED"
            exit 1
          fi

      - name: Upload diagnostic artifacts (self-hosted)
        if: always() && contains(runner.labels, 'self-hosted')
        run: |
          set -euo pipefail
          FILE=/tmp/gcp_validation_output.txt
          if [ -f "$FILE" ]; then
            TAR=dr-diagnostics-${{ github.run_id }}.tgz
            tar -czf "$TAR" "$FILE" || true
            chmod +x ci/scripts/upload_to_minio.sh || true
            URL=$(ci/scripts/upload_to_minio.sh "$TAR") || true
            echo "Uploaded DR diagnostics to: $URL"
          else
            echo "No diagnostic output to upload"
          fi

      - name: Package diagnostics for MinIO
        if: always()
        run: |
          mkdir -p /tmp/minio-uploads
          tar czf /tmp/minio-uploads/dr-diagnostics-${{ github.run_id }}.tar.gz /tmp/gcp_validation_output.txt 2>/dev/null || echo "Packaged"

      - name: Upload diagnostics to MinIO
        if: always() && contains(runner.labels, 'self-hosted')
        run: |
          ci/scripts/upload_to_minio.sh /tmp/minio-uploads/dr-diagnostics-${{ github.run_id }}.tar.gz dr-diagnostics-${{ github.run_id }}.tar.gz || echo "MinIO upload failed; will use fallback"

      - name: Upload diagnostic artifacts (hosted fallback)
        if: always() && !contains(runner.labels, 'self-hosted')
        uses: actions/upload-artifact@v4
        with:
          name: dr-diagnostics-${{ github.run_id }}
          path: /tmp/gcp_validation_output.txt
          retention-days: 7
          if-no-files-found: ignore

  post-results:
    name: Post Results to Issue
    runs-on: ubuntu-latest
    needs: dr-readiness-check
    if: always()
    steps:
      - name: Post results
        uses: actions/github-script@v7
        with:
          script: |
            const drStatus = "${{ needs.dr-readiness-check.outputs.dr_status }}";
            const emoji = drStatus === 'ready' ? '✅' : '⚠️';

            console.log(`DR Smoke Test Result: ${emoji} ${drStatus.toUpperCase()}`);
