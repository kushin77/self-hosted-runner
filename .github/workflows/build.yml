name: Build (package + SBOM + sign)
true:
  push:
    branches:
    - main
    - develop
    tags:
    - v*
  workflow_run:
    workflows:
    - Test
    types:
    - completed
    branches:
    - main
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref,
      'refs/tags/'))
    steps:
    - uses: actions/checkout@v4
    - name: Get Credential [GPG_PRIVATE_KEY]
      id: cred_gpg_private_key
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: GPG_PRIVATE_KEY
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [GPG_KEY_ID]
      id: cred_gpg_key_id
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: GPG_KEY_ID
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: pip
    - name: Install build tools
      run: 'pip install build twine cyclonedx-bom

        '
    - name: Create distribution
      run: 'python -m build

        '
    - name: Generate SBOM (CycloneDX)
      run: 'cyclonedx-bom -path . -o sbom.xml -format xml || true

        '
    - name: Generate SBOM (SPDX)
      run: 'pip install spdx-tools

        spdx-tools create --name "self-hosted-runner" --spdx sbom.spdx.json || true

        '
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: distributions
        path: 'dist/

          sbom.*

          '
    - name: Check distributions
      run: 'twine check dist/* || true

        '
    - name: Sign distributions (if secrets available)
      if: secrets.GPG_PRIVATE_KEY != null
      run: 'echo "${{ steps.cred_gpg_private_key.outputs.credential }}" | gpg --import

        for f in dist/*; do gpg --detach-sign -u ${{ steps.cred_gpg_key_id.outputs.credential
        }} "$f"; done

        '
      continue-on-error: true
    timeout-minutes: 30
    name: Build
permissions:
  contents: read
  pull-requests: read
  issues: read
  secrets: none
