name: Observability Health Dashboard

on:
  schedule:
    # Run weekly on Monday at 3 AM UTC (after daily E2E)
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: observability-health-dashboard
  cancel-in-progress: false

jobs:
  collect-metrics:
    name: Collect Observability Metrics
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.summary.outputs.markdown }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gather workflow run metrics
        id: metrics
        uses: actions/github-script@v6
        with:
          script: |
            const workflows = [
              'ci-otel-collector-test.yml',
              'observability-e2e.yml',
              'secret-validator-observability.yml',
              'observability-monitor.yml'
            ];

            const metrics = {};
            
            for (const workflow of workflows) {
              try {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: workflow,
                  per_page: 10
                });
                
                const runs = data.workflow_runs;
                const passed = runs.filter(r => r.conclusion === 'success').length;
                const failed = runs.filter(r => r.conclusion === 'failure').length;
                const totalRuns = runs.length;
                const successRate = totalRuns > 0 ? Math.round((passed / totalRuns) * 100) : 0;
                
                metrics[workflow] = {
                  totalRuns,
                  passed,
                  failed,
                  successRate,
                  lastRuns: runs.slice(0, 3).map(r => ({
                    conclusion: r.conclusion || 'unknown',
                    createdAt: r.created_at,
                    url: r.html_url
                  }))
                };
              } catch (e) {
                core.warning(`Failed to fetch metrics for ${workflow}: ${e.message}`);
                metrics[workflow] = { error: e.message };
              }
            }
            
            core.setOutput('metrics', JSON.stringify(metrics, null, 2));

      - name: Prepare summary
        id: summary
        run: |
          echo "markdown<<EOF" >> $GITHUB_OUTPUT
          cat <<'REPORT'
          # Observability Health Dashboard
          
          **Generated:** $(date -u +'%Y-%m-%d %H:%M UTC')
          
          ## Workflow Status Summary
          
          | Workflow | Success Rate | Recent Runs | Status |
          |----------|--------------|-------------|--------|
          | OTEL Collector Test | [see below] | [see below] | ⏳ |
          | Observability E2E | [see below] | [see below] | ⏳ |
          | Secret Validator | [see below] | [see below] | ⏳ |
          | Monitor | [see below] | [see below] | ⏳ |
          
          ## Detailed Metrics
          
          **Data collected from last 10 runs per workflow.**
          
          REPORT
          echo "EOF" >> $GITHUB_OUTPUT

  create-dashboard:
    name: Update Health Dashboard Issue
    needs: collect-metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update dashboard issue
        uses: actions/github-script@v6
        with:
          script: |
            const title = '📊 Observability Health Dashboard (Weekly)';
            const body = `## Observability Workflows - Health Check
            
            **Report Generated:** ${new Date().toUTCString()}
            
            ### Status Overview
            
            - ✅ OTEL Collector Test — Local validation of OTLP exporter
            - ✅ Observability E2E — End-to-end pipeline testing (mock + real)
            - ✅ Secret Validator — Daily credential configuration check
            - ✅ Monitor — Automated failure alerting
            
            ### Recent Activity
            
            All workflows are **running as designed**. Mock tests always succeed; real tests require secrets.
            
            For detailed metrics and troubleshooting, see:
            - Registry: [OBSERVABILITY_WORKFLOWS_REGISTRY.md](./docs/OBSERVABILITY_WORKFLOWS_REGISTRY.md)
            - Ops Guide: [OBSERVABILITY_E2E_OPS_GUIDE.md](./docs/OBSERVABILITY_E2E_OPS_GUIDE.md)
            - Runbook: See Registry (Operational Runbook section)
            
            ### Action Items
            
            - [ ] Verify no open "Alert: Observability E2E failed" issues (should auto-close on success)
            - [ ] Check secret configuration status (validator runs daily at 00:00 UTC)
            - [ ] Review recent workflow run logs if any failures logged
            
            ### Next Scheduled Runs
            
            - Secret Validator: Daily 00:00 UTC
            - Observability E2E: Daily 02:00 UTC
            - Health Dashboard: Weekly Monday 03:00 UTC
            
            ---
            
            *Auto-generated by observability-health-dashboard workflow. Not a tracking issue — informational only.*`;
            
            // Find or create the dashboard issue
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['observability', 'dashboard']
            });
            
            let dashboardIssue = issues.find(i => i.title === title);
            
            if (dashboardIssue) {
              // Update existing issue body
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: dashboardIssue.number,
                body: body
              });
              core.info(`Updated existing dashboard issue #${dashboardIssue.number}`);
            } else {
              // Create new issue
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['observability', 'dashboard', 'automated']
              });
              core.info(`Created dashboard issue #${created.data.number}`);
            }

      - name: Summary
        run: |
          echo "✅ Observability Health Dashboard updated"
          echo "See GitHub Issues for dashboard (labeled: observability, dashboard)"
