name: verify-required-secrets

on:
  schedule:
    - cron: '0 8 * * *'  # daily at 08:00 UTC
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: verify-required-secrets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      actions: read

    steps:
      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Check required secrets
        uses: actions/github-script@v6
        with:
          script: |
            const required = [
              'VAULT_ROLE_ID',
              'VAULT_SECRET_ID',
              'MINIO_ACCESS_KEY',
              'MINIO_SECRET_KEY',
              'TF_VAR_SERVICE_ACCOUNT_KEY'
            ];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const res = await github.actions.listRepoSecrets({ owner, repo });
            const present = res.data.secrets.map(s => s.name);
            const missing = required.filter(r => !present.includes(r));
            if (missing.length === 0) {
              core.info('All required secrets present.');
              return;
            }
            const body = 'Missing required repo secrets: ' + missing.join(', ');
            core.info(body);
            // Create or update issue to notify Ops
            const issueTitle = 'Missing required GitHub Secrets (automated)';
            const issues = await github.issues.listForRepo({ owner, repo, state: 'open' });
            const existing = issues.data.find(i => i.title === issueTitle);
            if (existing) {
              await github.issues.createComment({ owner, repo, issue_number: existing.number, body });
            } else {
              await github.issues.create({ owner, repo, title: issueTitle, body });
            }
