name: verify-required-secrets

on:
  schedule:
    - cron: '0 8 * * *'  # daily at 08:00 UTC
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: verify-required-secrets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      actions: read

    steps:
      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Check required secrets
        uses: actions/github-script@v6
        with:
          script: |
            const required = [
              'VAULT_ROLE_ID',
              'VAULT_SECRET_ID',
              'MINIO_ACCESS_KEY',
              'MINIO_SECRET_KEY',
              'TF_VAR_SERVICE_ACCOUNT_KEY'
            ];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // examine environment for secrets (GitHub injects defined secrets as env vars)
            const present = [];
            for (const name of required) {
              if (process.env[name]) {
                present.push(name);
              }
            }
            // also register optional secrets for automation
            if (process.env.DEPLOY_SSH_KEY) present.push('DEPLOY_SSH_KEY');
            if (process.env.PAGERDUTY_TOKEN) present.push('PAGERDUTY_TOKEN');
            const missing = required.filter(r => !present.includes(r));
            // always handle deploy key / pagerduty even if other required secrets are missing
            if (present.includes('DEPLOY_SSH_KEY')) {
              core.info('DEPLOY_SSH_KEY detected; dispatching canary-simulate-dispatch workflow.');
              await github.actions.createWorkflowDispatch({ owner, repo, workflow_id: 'canary-simulate-dispatch.yml', ref: context.ref || 'main', inputs: {} }).catch(e => core.warning('Failed to dispatch simulation: ' + e));
              try {
                const issue = await github.rest.issues.get({ owner, repo, issue_number: 1318 });
                if (issue.data.state === 'open') {
                  await github.rest.issues.createComment({ owner, repo, issue_number: 1318, body: '**✅ AUTOMATED** Deploy SSH key available; workflow can now execute.' });
                  await github.rest.issues.update({ owner, repo, issue_number: 1318, state: 'closed', state_reason: 'completed' });
                  core.info('Closed issue #1318');
                }
              } catch (err) {
                core.warning('Issue #1318 not found or could not close: ' + err);
              }
            }
            if (present.includes('PAGERDUTY_TOKEN')) {
              try {
                const issue2 = await github.rest.issues.get({ owner, repo, issue_number: 1319 });
                if (issue2.data.state === 'open') {
                  await github.rest.issues.createComment({ owner, repo, issue_number: 1319, body: '**✅ AUTOMATED** PagerDuty token available; incident flows can now escalate.' });
                  await github.rest.issues.update({ owner, repo, issue_number: 1319, state: 'closed', state_reason: 'completed' });
                  core.info('Closed issue #1319');
                }
              } catch (err) {
                core.warning('Issue #1319 not found or could not close: ' + err);
              }
            }
            if (missing.length === 0) {
              core.info('All required secrets present.');
              // if deploy key is now available, trigger simulation workflow
              if (present.includes('DEPLOY_SSH_KEY')) {
                core.info('DEPLOY_SSH_KEY detected; dispatching canary-simulate-dispatch workflow.');
                await github.actions.createWorkflowDispatch({
                  owner, repo,
                  workflow_id: 'canary-simulate-dispatch.yml',
                  ref: context.ref || 'main',
                  inputs: {}
                }).catch(e => core.warning('Failed to dispatch simulation: ' + e));
                // close issue #1318
                try {
                  const issue = await github.rest.issues.get({ owner, repo, issue_number: 1318 });
                  if (issue.data.state === 'open') {
                    await github.rest.issues.createComment({ owner, repo, issue_number: 1318, body: '**✅ AUTOMATED** Deploy SSH key available; workflow can now execute.' });
                    await github.rest.issues.update({ owner, repo, issue_number: 1318, state: 'closed', state_reason: 'completed' });
                    core.info('Closed issue #1318');
                  }
                } catch (err) {
                  core.warning('Issue #1318 not found or could not close: ' + err);
                }
              }
              // if pagerduty token appears, close issue #1319
              if (present.includes('PAGERDUTY_TOKEN')) {
                try {
                  const issue2 = await github.rest.issues.get({ owner, repo, issue_number: 1319 });
                  if (issue2.data.state === 'open') {
                    await github.rest.issues.createComment({ owner, repo, issue_number: 1319, body: '**✅ AUTOMATED** PagerDuty token available; incident flows can now escalate.' });
                    await github.rest.issues.update({ owner, repo, issue_number: 1319, state: 'closed', state_reason: 'completed' });
                    core.info('Closed issue #1319');
                  }
                } catch (err) {
                  core.warning('Issue #1319 not found or could not close: ' + err);
                }
                // also close ops issue #1318 if open
                try {
                  const issue = await github.rest.issues.get({ owner, repo, issue_number: 1318 });
                  if (issue.data.state === 'open') {
                    await github.rest.issues.createComment({ owner, repo, issue_number: 1318, body: '**✅ AUTOMATED** Deploy SSH key available; workflow can now execute.' });
                    await github.rest.issues.update({ owner, repo, issue_number: 1318, state: 'closed', state_reason: 'completed' });
                    core.info('Closed issue #1318');
                  }
                } catch (err) {
                  core.warning('Issue #1318 not found or could not close: ' + err);
                }
              }
              return;
            }
            const body = 'Missing required repo secrets: ' + missing.join(', ');
            core.info(body);
            // create a new issue (duplicates possible but harmless)
            await github.rest.issues.create({ owner, repo, title: 'Missing required GitHub Secrets (automated)', body });
