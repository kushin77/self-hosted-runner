name: Verify Required GitHub Secrets

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  verify-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const required = [
              'VAULT_ADDR',
              'VAULT_BOOTSTRAP_TOKEN',
              'VAULT_ROLE_ID',
              'MINIO_ROOT_USER',
              'MINIO_ROOT_PASSWORD',
              'MINIO_ENDPOINT'
            ];

            const secrets = await github.request('GET /repos/{owner}/{repo}/actions/secrets', {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const names = (secrets.data.secrets || []).map(s => s.name);
            const missing = required.filter(r => !names.includes(r));

            if (missing.length === 0) {
              core = require('@actions/core');
              console.log('All required secrets present.');
            } else {
              const body = `⚠️ Missing required repository secrets: ${missing.join(', ')}\n\nPlease set these in Settings → Secrets → Actions before running production workflows.`;
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Security: Missing Required Repository Secrets',
                body: body
              });
              core = require('@actions/core');
              core.setFailed('Missing required secrets: ' + missing.join(', '));
            }
