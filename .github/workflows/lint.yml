name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff pylint flake8 || true

      - name: Run Ruff
        run: ruff check . || true

      - name: Run Flake8
        run: flake8 . --max-line-length=120 || true

      - name: Lint summary
        if: always()
        run: echo "Lint checks complete"
