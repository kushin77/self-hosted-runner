name: Instant Deploy (Static AWS)
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      run_plan_only:
        description: 'If true, run plan only'
        required: false
        default: 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    permissions:
      contents: read
      id-token: write
      actions: read
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Write GCP keyfile and set GOOGLE_APPLICATION_CREDENTIALS
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          set -uo pipefail
          echo "Validating and writing GCP credentials..."
          if [ -z "${GOOGLE_CREDENTIALS:-}" ]; then
            echo "GOOGLE_CREDENTIALS not set; skipping GCP setup"
            echo "SKIP_GCP=true" >> $GITHUB_ENV
          else
            # Try raw JSON first
            if printf '%s' "$GOOGLE_CREDENTIALS" | jq -e . >/dev/null 2>&1; then
              printf '%s' "$GOOGLE_CREDENTIALS" > /tmp/gcloud_key.json
              echo "detected: raw JSON"
            else
              # Try escaped newlines (\n -> newline)
              if printf '%b' "$GOOGLE_CREDENTIALS" | jq -e . >/dev/null 2>&1; then
                printf '%b' "$GOOGLE_CREDENTIALS" > /tmp/gcloud_key.json
                echo "detected: escaped-newlines"
              else
                # Try base64 decode
                if printf '%s' "$GOOGLE_CREDENTIALS" | base64 --decode >/tmp/gcloud_key.json 2>/dev/null && jq -e . /tmp/gcloud_key.json >/dev/null 2>&1; then
                  echo "detected: base64"
                else
                  echo "WARNING: GOOGLE_CREDENTIALS secret is not valid JSON, escaped JSON, or base64-encoded JSON — skipping GCP setup" >&2
                  echo "SKIP_GCP=true" >> $GITHUB_ENV
                fi
              fi
            fi
            if [ -z "${SKIP_GCP:-}" ]; then
              jq -e . /tmp/gcloud_key.json >/dev/null && echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcloud_key.json" >> $GITHUB_ENV || true
            fi
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION || 'us-east-1' }}

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -input=false

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -out=tfplan -input=false

      - name: Terraform Apply
        if: ${{ inputs.run_plan_only != 'true' }}
        run: |
          cd terraform
          terraform apply -auto-approve tfplan
