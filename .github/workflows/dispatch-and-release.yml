---
name: Manual Dispatch & Release — Self-hosted

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (dev/staging/prod)
        required: true
        default: staging

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run deploy script if present
        run: |
          if [ -x ./scripts/deploy.sh ]; then
            ./scripts/deploy.sh ${{ github.event.inputs.environment }}
          else
            echo "No scripts/deploy.sh found or not executable. Skipping."
