name: Runner Echo Diagnostic

on:
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: 'true'
  workflow_call: {}

concurrency:
  group: runner-echo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  echo:
    name: Runner Echo Diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Print hello
        run: |
          echo "hello from runner"
          echo "RUNNER_NAME=${RUNNER_NAME:-(unset)}"
          echo "RUNNER_OS=${RUNNER_OS:-(unset)}"
          echo "GITHUB_RUN_ID=${GITHUB_RUN_ID}"
          echo "PATH=$PATH"
          which docker || true
          docker --version || true
          which gcloud || true
          gcloud --version || true
