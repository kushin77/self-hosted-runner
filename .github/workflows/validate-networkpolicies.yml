name: Validate NetworkPolicy Manifests
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'deploy/policies/**'

jobs:
  validate:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ca-certificates curl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

      - name: Validate manifests with kubectl (client-side)
        run: |
          set -e
          echo "Validating YAML files in deploy/policies..."
          find deploy/policies -name '*.yaml' -print0 | xargs -0 -n1 kubectl apply --dry-run=client --validate=true -f