name: Observability E2E

on:
  workflow_dispatch:
    inputs:
      test_real:
        description: 'Set to true to test real receivers using repo secrets'
        required: false
        default: 'false'

jobs:
  e2e:
    name: Ephemeral E2E
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make runner executable
        run: |
          chmod +x scripts/automation/pmo/prometheus/run_e2e_ephemeral_test.sh

      - name: Run ephemeral E2E (mock or real)
        id: run
        run: |
          if [ "${{ github.event.inputs.test_real }}" = 'true' ]; then
            if [ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ] && [ -z "${{ secrets.PAGERDUTY_SERVICE_KEY }}" ]; then
              echo "No receiver secrets configured; aborting" >&2
              exit 1
            fi
            ./scripts/automation/pmo/prometheus/run_e2e_ephemeral_test.sh --slack-url "${{ secrets.SLACK_WEBHOOK_URL }}" --pagerduty-key "${{ secrets.PAGERDUTY_SERVICE_KEY }}"
          else
            ./scripts/automation/pmo/prometheus/run_e2e_ephemeral_test.sh
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observability-e2e-logs
          path: |
            /tmp/observability-e2e.*/**
