name: Credential System Health Check (Hourly)

# Validate all credential layers are operational and accessible
on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  AWS_KMS_KEY_ID: ${{ secrets.AWS_KMS_KEY_ID }}

jobs:
  health-check:
    name: Credential System Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Initialize
        id: init
        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "🏥 Health check: $TIMESTAMP"

      - name: Check GCP GSM Layer
        id: gsm-health
        continue-on-error: true
        run: |
          set +e
          
          echo "Checking GCP Secret Manager..."
          
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "status=not_configured" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Attempt to list secrets (validating access)
          if gcloud secrets list --project="$GCP_PROJECT_ID" --limit=1 >/dev/null 2>&1; then
            echo "status=healthy" >> $GITHUB_OUTPUT
            echo "✅ GSM healthy and accessible"
          else
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "❌ GSM is not accessible"
          fi

      - name: Check Vault Layer
        id: vault-health
        continue-on-error: true
        run: |
          set +e
          
          echo "Checking Vault..."
          
          if [ -z "$VAULT_ADDR" ]; then
            echo "status=not_configured" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check health endpoint
          HEALTH=$(curl -sf "$VAULT_ADDR/v1/sys/health" 2>/dev/null)
          
          if [ $? -eq 0 ]; then
            SEALED=$(echo "$HEALTH" | jq -r '.sealed // true')
            if [ "$SEALED" = "false" ]; then
              echo "status=healthy" >> $GITHUB_OUTPUT
              echo "✅ Vault healthy and unsealed"
            else
              echo "status=sealed" >> $GITHUB_OUTPUT
              echo "⚠️  Vault is sealed (requires unlock)"
            fi
          else
            echo "status=unavailable" >> $GITHUB_OUTPUT
            echo "❌ Vault is unavailable"
          fi

      - name: Check AWS KMS Layer
        id: kms-health
        continue-on-error: true
        run: |
          set +e
          
          echo "Checking AWS KMS..."
          
          if [ -z "$AWS_KMS_KEY_ID" ]; then
            echo "status=not_configured" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check AWS access
          if aws sts get-caller-identity >/dev/null 2>&1; then
            echo "status=healthy" >> $GITHUB_OUTPUT
            echo "✅ KMS healthy and accessible"
          else
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "❌ AWS KMS not accessible"
          fi

      - name: Analyze Health Status
        id: analysis
        run: |
          set +e
          
          GSM_HEALTH="${{ steps.gsm-health.outputs.status || 'not_configured' }}"
          VAULT_HEALTH="${{ steps.vault-health.outputs.status || 'not_configured' }}"
          KMS_HEALTH="${{ steps.kms-health.outputs.status || 'not_configured' }}"

          echo "📊 Health Summary:"
          echo "  GSM: $GSM_HEALTH"
          echo "  Vault: $VAULT_HEALTH"
          echo "  KMS: $KMS_HEALTH"

          # Determine overall health
          CONFIGURED=0
          HEALTHY=0
          
          [ "$GSM_HEALTH" != "not_configured" ] && ((CONFIGURED++)) && [ "$GSM_HEALTH" = "healthy" ] && ((HEALTHY++))
          [ "$VAULT_HEALTH" != "not_configured" ] && ((CONFIGURED++)) && [ "$VAULT_HEALTH" = "healthy" ] && ((HEALTHY++))
          [ "$KMS_HEALTH" != "not_configured" ] && ((CONFIGURED++)) && [ "$KMS_HEALTH" = "healthy" ] && ((HEALTHY++))

          if [ $CONFIGURED -eq 0 ]; then
            OVERALL="no_op"
          elif [ $HEALTHY -eq $CONFIGURED ]; then
            OVERALL="healthy"
          elif [ $HEALTHY -gt 0 ]; then
            OVERALL="degraded"
          else
            OVERALL="critical"
          fi

          echo "overall_health=$OVERALL" >> $GITHUB_OUTPUT
          echo "configured_layers=$CONFIGURED" >> $GITHUB_OUTPUT
          echo "healthy_layers=$HEALTHY" >> $GITHUB_OUTPUT

      - name: Alert on Critical Health
        if: steps.analysis.outputs.overall_health == 'critical'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 CRITICAL: Credential System Unhealthy',
              body: 'All credential layers are unhealthy or inaccessible.\n\n' +
                    '**Action Required**:\n' +
                    '1. Check layer connectivity\n' +
                    '2. Verify OIDC tokens are working\n' +
                    '3. Check service account permissions\n\n' +
                    'See: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
              labels: ['critical', 'credentials', 'incident']
            })

      - name: Upload Health Metrics
        if: always()
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          echo "{
            \"timestamp\": \"${{ steps.init.outputs.timestamp }}\",
            \"overall_health\": \"${{ steps.analysis.outputs.overall_health }}\",
            \"configured_layers\": ${{ steps.analysis.outputs.configured_layers }},
            \"healthy_layers\": ${{ steps.analysis.outputs.healthy_layers }},
            \"gsm_status\": \"${{ steps.gsm-health.outputs.status }}\",
            \"vault_status\": \"${{ steps.vault-health.outputs.status }}\",
            \"kms_status\": \"${{ steps.kms-health.outputs.status }}\"
          }" > health-check-$TIMESTAMP.json

      - name: Summary
        if: always()
        run: |
          echo "✅ Health check complete"
          echo "  Overall: ${{ steps.analysis.outputs.overall_health }}"
          echo "  Healthy: ${{ steps.analysis.outputs.healthy_layers }}/${{ steps.analysis.outputs.configured_layers }}"
