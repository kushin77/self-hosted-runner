name: Credential System Health Check (Hourly)

# Validate all credential layers are operational and accessible
on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  health-check:
    name: Credential System Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Ephemeral Credentials
        uses: kushin77/get-ephemeral-credential@v1
        id: creds
        with:
          credential-names: |
            GCP_PROJECT_ID
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
            VAULT_ADDR
            AWS_KMS_KEY_ID
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.creds.outputs.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ steps.creds.outputs.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Initialize
        id: init
        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "🏥 Health check: $TIMESTAMP"

      - name: Check GCP GSM Layer
        id: gsm-health
        env:
          GCP_PROJECT_ID: ${{ steps.creds.outputs.GCP_PROJECT_ID }}
        continue-on-error: true
        run: |
          set +e
          echo "Checking GCP Secret Manager..."
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "status=not_configured" >> $GITHUB_OUTPUT
            exit 0
          fi
          if gcloud secrets list --project="$GCP_PROJECT_ID" --limit=1 >/dev/null 2>&1; then
            echo "status=healthy" >> $GITHUB_OUTPUT
            echo "✅ GSM healthy and accessible"
          else
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "❌ GSM is not accessible"
          fi

      - name: Check Vault Layer
        id: vault-health
        env:
          VAULT_ADDR: ${{ steps.creds.outputs.VAULT_ADDR }}
        continue-on-error: true
        run: |
          set +e
          echo "Checking HashiCorp Vault..."
          if [ -z "$VAULT_ADDR" ]; then
            echo "status=not_configured" >> $GITHUB_OUTPUT
            exit 0
          fi
          if curl -s -f "$VAULT_ADDR/v1/sys/health" >/dev/null; then
            echo "status=healthy" >> $GITHUB_OUTPUT
            echo "✅ Vault healthy and accessible"
          else
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "❌ Vault is not accessible"
          fi

      - name: Check AWS KMS Layer
        id: kms-health
        env:
          AWS_KMS_KEY_ID: ${{ steps.creds.outputs.AWS_KMS_KEY_ID }}
        continue-on-error: true
        run: |
          set +e
          echo "Checking AWS KMS..."
          if [ -z "$AWS_KMS_KEY_ID" ]; then
            echo "status=not_configured" >> $GITHUB_OUTPUT
            exit 0
          fi
          if aws kms describe-key --key-id "$AWS_KMS_KEY_ID" >/dev/null 2>&1; then
            echo "status=healthy" >> $GITHUB_OUTPUT
            echo "✅ AWS KMS healthy and accessible"
          else
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "❌ AWS KMS is not accessible"
          fi

      - name: Reporting
        if: always()
        env:
          GSM_STATUS: ${{ steps.gsm-health.outputs.status }}
          VAULT_STATUS: ${{ steps.vault-health.outputs.status }}
          KMS_STATUS: ${{ steps.kms-health.outputs.status }}
        run: |
          echo "Final Health Report:"
          echo "GSM: $GSM_STATUS"
          echo "Vault: $VAULT_STATUS"
          echo "KMS: $KMS_STATUS"
