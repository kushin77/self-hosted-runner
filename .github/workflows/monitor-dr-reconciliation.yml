name: Monitor DR Master Reconciliation Run

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID to monitor (e.g., 22790583296)'
        required: true
  schedule:
    - '*/15 * * * *' # every 15 minutes

  workflow_call: {}

concurrency:
  group: monitor-dr-reconciliation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  monitor-dr-run:
    name: Monitor DR reconciliation and auto-close issues
    runs-on: ubuntu-latest
    steps:
      - name: Load resilience helpers
      run: |
        set -euo pipefail
        source .github/scripts/resilience.sh || true
      - name: Fetch latest DR cluster test run
        id: get-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: kushin77/self-hosted-runner
        run: |
          set -euo pipefail
          # Get the run ID from input or find the latest DR master reconciliation run
          run_id="${{ inputs.run_id }}"
          if [ -z "$run_id" ]; then
            run_id=$(gh run list --repo $REPO --workflow=docker-hub-weekly-dr-testing.yml --limit 1 --json databaseId --jq '.[0].databaseId // empty' || echo "")
          fi
          if [ -z "$run_id" ]; then
            echo "No DR run found; skipping."
            exit 0
          fi
          echo "run_id=$run_id" >> $GITHUB_OUTPUT
          # Get run details
          conclusion=$(gh run view "$run_id" --repo $REPO --json conclusion --jq '.conclusion // empty' || true)
          status=$(gh run view "$run_id" --repo $REPO --json status --jq '.status // empty' || true)
          echo "status=$status" >> $GITHUB_OUTPUT
          echo "conclusion=$conclusion" >> $GITHUB_OUTPUT

      - name: Check if DR run succeeded
        if: steps.get-run.outputs.conclusion == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: kushin77/self-hosted-runner
        run: |
          set -euo pipefail
          echo "✓ DR master reconciliation succeeded. Auto-closing dependent DR failure issues."
          
          # Close the dependent issues
          for issue_num in 1046 1021 1005 1002 980 973 972; do
            echo "Closing issue #$issue_num..."
            gh issue close "$issue_num" --repo $REPO --comment "Closed by DR master reconciliation run #${{ steps.get-run.outputs.run_id }} (SUCCESS). All checks passed." || echo "Issue #$issue_num not found or already closed."
          done
          
          # Also close the investigation/triage issue (1064)
          echo "Closing triage issue #1064..."
          gh issue close 1064 --repo $REPO --comment "Master reconciliation run #${{ steps.get-run.outputs.run_id }} completed successfully. All dependent DR issues have been closed. See run logs for details: https://github.com/$REPO/actions/runs/${{ steps.get-run.outputs.run_id }}" || true

      - name: Post status update if run is still in progress
        if: steps.get-run.outputs.status == 'in_progress' || steps.get-run.outputs.status == 'queued'
        uses: actions/github-script@v7
        with:
          script: |
            const runId = "${{ steps.get-run.outputs.run_id }}";
            const status = "${{ steps.get-run.outputs.status }}";
            console.log(`DR run ${runId} is still ${status}. Will monitor and auto-close issues when complete.`);

      - name: Notify if run failed
        if: steps.get-run.outputs.conclusion == 'failure' || steps.get-run.outputs.conclusion == 'cancelled'
        uses: actions/github-script@v7
        with:
          script: |
            const runId = "${{ steps.get-run.outputs.run_id }}";
            const conclusion = "${{ steps.get-run.outputs.conclusion }}";
            github.rest.issues.createComment({
              issue_number: 1064,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `DR master reconciliation run #${runId} ended with status: **${conclusion}**. Please review logs and remediate blockers manually.`
            }).catch(() => console.log('Comment skipped'));
