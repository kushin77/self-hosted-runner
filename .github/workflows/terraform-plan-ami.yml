name: Terraform Plan (consume Packer AMI)
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_run:
    workflows: ["Packer AMI Build"]
    types: [completed]

jobs:
  call-plan:
    name: Call reusable Terraform plan (AMI)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/reusable/terraform-plan-callable.yml
    secrets:
      MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
    with:
      ami-tfvars-object: ami-tfvars
      plan-object: terraform-plan

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true