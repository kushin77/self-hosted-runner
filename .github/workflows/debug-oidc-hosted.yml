name: 'Debug: OIDC / WIF Token Check (Force Hosted)'

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  debug-oidc-hosted:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print minimal context
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL=${ACTIONS_ID_TOKEN_REQUEST_URL:-<missing>}"
          echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN=${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+present}"
          env | grep -E 'GCP_PROJECT_ID|GCP_WORKLOAD_IDENTITY_PROVIDER|VAULT_ADDR|AWS_KMS_KEY_ID' || true

      - name: Request OIDC id-token (defensive)
        id: oidc
        run: |
          set -euo pipefail
          RESP=""
          TOK=""
          for i in 1 2 3; do
            RESP=$(curl -sS "${ACTIONS_ID_TOKEN_REQUEST_URL}?audience=https://iamcredentials.googleapis.com" -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" 2>/dev/null || true)
            echo "curl_resp_len=$(echo -n \"${RESP}\" | wc -c)" > /tmp/oidc_curl_len.txt || true
            if [[ -n "${RESP:-}" ]]; then
              # save a sanitized copy of the response (remove token field) for safe debugging
              echo "$RESP" | jq 'del(.token) // .' > /tmp/oidc_raw_resp.json 2>/dev/null || echo "{}" > /tmp/oidc_raw_resp.json || true
              echo "$RESP" > /tmp/oidc_resp.txt || true
              TOK=$(echo "$RESP" | jq -r '.token // empty' 2>/dev/null || echo "")
              if [[ -n "$TOK" ]]; then
                echo "token_present=true" > /tmp/oidc_token_present.txt || true
                echo "token_len=$(echo -n "$TOK" | wc -c)" > /tmp/oidc_token_len.txt || true
                break
              fi
            fi
            sleep $((i*2))
          done
          if [[ -z "${TOK:-}" ]]; then
            echo "No token obtained after retries" > /tmp/oidc_error.txt || true
            # preserve raw response but indicate no token
            jq '. + {status: "no_token"}' /tmp/oidc_raw_resp.json > /tmp/oidc_resp.txt 2>/dev/null || echo '{"status":"no_token"}' > /tmp/oidc_resp.txt || true
          fi

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: oidc-hosted-debug
          path: |
            /tmp/oidc_raw_resp.json
            /tmp/oidc_resp.txt
            /tmp/oidc_token_present.txt
            /tmp/oidc_token_len.txt
            /tmp/oidc_curl_len.txt
            /tmp/oidc_error.txt

      - name: Output summary
        run: |
          echo "--- Debug Summary ---"
          if [[ -f /tmp/oidc_token_present.txt ]]; then echo "OIDC token issued on this runner"; else echo "OIDC token NOT issued"; fi
          [[ -f /tmp/oidc_token_len.txt ]] && cat /tmp/oidc_token_len.txt || true
          [[ -f /tmp/oidc_curl_len.txt ]] && cat /tmp/oidc_curl_len.txt || true
          echo "Artifact 'oidc-hosted-debug' uploaded."
