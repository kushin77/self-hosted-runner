name: Example: Get secret from Vault via OIDC

on: [workflow_dispatch]

permissions:
  id-token: write
  contents: read

jobs:
  get-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Request OIDC and login to Vault
        env:
          VAULT_ADDR: https://vault.example
          VAULT_ROLE: github-actions-role
          AUDIENCE: vault
        run: |
          # This uses the provided script in the repo
          bash scripts/vault_oidc_login.sh

      - name: Use secret (example)
        if: success()
        run: |
          curl -sS -H "X-Vault-Token: $VAULT_TOKEN" "$VAULT_ADDR/v1/secret/data/myapp" | jq '.'
