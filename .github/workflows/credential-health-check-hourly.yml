name: Credential Health Check (Hourly)
# Purpose: Validate credential system health every hour
# Triggered: Scheduled at 0 * * * * (every hour on the hour)

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:  # Allow manual trigger for testing

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Bash Environment
        run: |
          echo "SCRIPT_DIR=$PWD/scripts/rotation" >> $GITHUB_ENV
      
      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_lifetime: '600s'
          create_credentials_file: true
      
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      
      - name: Run Hourly Health Check
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          bash "${SCRIPT_DIR}/health-check-credential-system.sh"
      
      - name: Upload Health Check Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-check-logs-${{ github.run_id }}
          path: scripts/audit/health-check-*.log
          retention-days: 30
          if-no-files-found: ignore
      
      - name: Parse and Report Health Status
        if: always()
        run: |
          if [ -f scripts/audit/health-check-$(date +%Y%m%d).log ]; then
            echo "### Credential System Health ✅" >> $GITHUB_STEP_SUMMARY
            tail -20 scripts/audit/health-check-$(date +%Y%m%d).log >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Create Critical Alert Issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Credential Health Check Failed - ${new Date().toISOString()}`,
              body: `
            Automated health check failed. All credential layers may be down.
            
            - Run ID: ${{ github.run_id }}
            - Workflow: credential-health-check-hourly.yml
            - Time: ${new Date().toISOString()}
            
            **Action Required**: Check audit logs and investigate GSM/Vault/KMS connectivity.
            
            See workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
              `,
              labels: ['critical', 'credential-system', 'automation']
            })
