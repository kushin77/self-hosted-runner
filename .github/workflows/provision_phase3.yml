name: Provision Phase 3 (GCP WIF + Vault)

on:
  workflow_dispatch:
    inputs:
      deploy_vault:
        description: 'Deploy Vault (helm)'
        required: false
        default: 'false'
      cred_source:
        description: 'Credential source (vault|gsm|github)'
        required: false
        default: 'vault'

jobs:
  provision:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch GCP credentials from secret backend  
        id: fetch_creds
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          CRED_SOURCE: ${{ github.event.inputs.cred_source }}
        run: |
          #!/bin/bash
          set -eo pipefail
          
          CRED_SOURCE="${CRED_SOURCE:-github}"  # Default to github (more reliable)
          echo "🔍 Credential source: $CRED_SOURCE"
          
          # Strategy 1: Try Google Credentials secret first (may already be correctly formatted)
          if [[ -n "${{ secrets.GOOGLE_CREDENTIALS }}" ]]; then
            echo "📦 Attempting GOOGLE_CREDENTIALS secret..."
            SECRET_VALUE="${{ secrets.GOOGLE_CREDENTIALS }}"
            
            # Try raw JSON first
            if echo "$SECRET_VALUE" | jq -e '.type=="service_account"' >/dev/null 2>&1; then
              echo "$SECRET_VALUE" > /tmp/gcp-sa-key.json
              echo "✅ GOOGLE_CREDENTIALS validated (raw JSON)"
              echo "creds_source=google_creds" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            
            # Try base64 decode
            if echo "$SECRET_VALUE" | base64 -d | jq -e '.type=="service_account"' >/dev/null 2>&1; then
              echo "$SECRET_VALUE" | base64 -d > /tmp/gcp-sa-key.json
              echo "✅ GOOGLE_CREDENTIALS validated (base64-decoded)"
              echo "creds_source=google_creds_b64" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          
          # Strategy 2: Try GitHub GCP_SERVICE_ACCOUNT_KEY secret
          if [[ -n "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]]; then
            echo "📦 Attempting GCP_SERVICE_ACCOUNT_KEY secret..."
            SECRET_VALUE="${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}"
            
            # Try raw JSON
            if echo "$SECRET_VALUE" | jq -e '.type=="service_account"' >/dev/null 2>&1; then
              echo "$SECRET_VALUE" > /tmp/gcp-sa-key.json
              echo "✅ GCP_SERVICE_ACCOUNT_KEY validated (raw JSON)"
              echo "creds_source=gcp_secret_raw" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            
            # Try base64 decode
            if echo "$SECRET_VALUE" | base64 -d 2>/dev/null | jq -e '.type=="service_account"' >/dev/null 2>&1; then
              echo "$SECRET_VALUE" | base64 -d > /tmp/gcp-sa-key.json
              echo "✅ GCP_SERVICE_ACCOUNT_KEY validated (base64-decoded)"
              echo "creds_source=gcp_secret_b64" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          
          # Strategy 3: Try TF_VAR_SERVICE_ACCOUNT_KEY (Terraform variable secret)
          if [[ -n "${{ secrets.TF_VAR_SERVICE_ACCOUNT_KEY }}" ]]; then
            echo "📦 Attempting TF_VAR_SERVICE_ACCOUNT_KEY secret..."
            SECRET_VALUE="${{ secrets.TF_VAR_SERVICE_ACCOUNT_KEY }}"
            
            # Try raw JSON
            if echo "$SECRET_VALUE" | jq -e '.type=="service_account"' >/dev/null 2>&1; then
              echo "$SECRET_VALUE" > /tmp/gcp-sa-key.json
              echo "✅ TF_VAR_SERVICE_ACCOUNT_KEY validated (raw JSON)"
              echo "creds_source=tf_var" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            
            # Try base64 decode
            if echo "$SECRET_VALUE" | base64 -d 2>/dev/null | jq -e '.type=="service_account"' >/dev/null 2>&1; then
              echo "$SECRET_VALUE" | base64 -d > /tmp/gcp-sa-key.json
              echo "✅ TF_VAR_SERVICE_ACCOUNT_KEY validated (base64-decoded)"
              echo "creds_source=tf_var_b64" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          
          echo ""
          echo "❌ FAILURE: No valid GCP service account credentials found"
          echo ""
          echo "📋 Tried:"
          echo "  1. GOOGLE_CREDENTIALS (raw or base64)"
          echo "  2. GCP_SERVICE_ACCOUNT_KEY (raw or base64)"
          echo "  3. TF_VAR_SERVICE_ACCOUNT_KEY (raw or base64)"
          echo ""
          echo "✅ Available secrets:"
          echo "  - GOOGLE_CREDENTIALS: $([[ -n '${{ secrets.GOOGLE_CREDENTIALS }}' ]] && echo 'SET' || echo 'NOT SET')"
          echo "  - GCP_SERVICE_ACCOUNT_KEY: $([[ -n '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' ]] && echo 'SET' || echo 'NOT SET')"
          echo "  - TF_VAR_SERVICE_ACCOUNT_KEY: $([[ -n '${{ secrets.TF_VAR_SERVICE_ACCOUNT_KEY }}' ]] && echo 'SET' || echo 'NOT SET')"
          echo ""
          echo "🔧 To fix: Ensure one of the above secrets contains valid GCP service account JSON (raw or base64-encoded)"
          exit 1

      - name: Validate GCP credentials
        run: |
          #!/bin/bash
          if [[ ! -f /tmp/gcp-sa-key.json ]]; then
            echo "❌ Credentials file not found"
            exit 1
          fi
          
          # Validate JSON format
          jq -e '.type=="service_account"' /tmp/gcp-sa-key.json > /dev/null || {
            echo "❌ Invalid service account JSON"
            exit 1
          }
          
          echo "✅ Credentials validated successfully"
          jq -r '.client_email' /tmp/gcp-sa-key.json

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ steps.fetch_creds.outputs.creds_file || '/tmp/gcp-sa-key.json' }}
          cleanup_credentials: true

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'

      - name: Terraform Init & Apply (GCP WIF)
        working-directory: infra
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-sa-key.json
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          terraform init
          terraform apply -auto-approve -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}" -var="github_repo_owner=${{ github.repository_owner }}" -var="github_repo_name=${{ github.event.repository.name }}"

      - name: Capture Terraform outputs
        working-directory: infra
        id: tfout
        run: |
          terraform output -json > /tmp/terraform_outputs.json
          cat /tmp/terraform_outputs.json

      - name: Update Phase 3 issue with outputs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          jq -r 'to_entries|map("- " + .key + ": " + (.value.value|tostring))|.[]' /tmp/terraform_outputs.json > /tmp/tf_summary.txt || true
          echo "\nTerraform outputs:\n" >> /tmp/PHASE3_READY_SUMMARY.txt || true
          cat /tmp/tf_summary.txt >> /tmp/PHASE3_READY_SUMMARY.txt || true
          chmod +x ./scripts/phase3_generate_issue.sh
          CLOSE_INCIDENTS=true GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} REPO=${{ github.repository }} ./scripts/phase3_generate_issue.sh

      - name: Optionally deploy Vault (Helm)
        if: ${{ github.event.inputs.deploy_vault == 'true' }}
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          helm repo add hashicorp https://helm.releases.hashicorp.com
          helm repo update
          kubectl create namespace vault || true
          helm upgrade --install vault hashicorp/vault --namespace vault --create-namespace

      - name: Trigger orchestrator & health workflows
        if: ${{ github.event.inputs.deploy_vault == 'true' }}
        run: |
          gh workflow run secrets-orchestrator-multi-layer.yml --ref main || true
          sleep 180
          gh workflow run secrets-health-multi-layer.yml --ref main || true
