name: ElastiCache Apply (Safe) - Using GSM AWS Credentials
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Execute apply (true) or plan only (false)'
        required: false
        default: 'false'
        type: boolean
      environment:
        description: 'Environment to apply to'
        required: false
        default: 'prod'
        type: choice
        options:
          - prod
          - staging
          - dev

concurrency:
  group: elasticache-apply-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Step 1: Fetch AWS credentials from GSM
  fetch-aws-creds:
    name: Fetch AWS Credentials from GSM
    uses: ./.github/workflows/fetch-aws-creds-from-gsm.yml
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ steps.cred_gcp_workload_identity_provider.outputs.credential }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ steps.cred_gcp_service_account_email.outputs.credential }}
      GCP_PROJECT_ID: ${{ steps.cred_gcp_project_id.outputs.credential }}

  # Step 2: Plan ElastiCache changes
  plan:
    name: Plan ElastiCache Changes
    runs-on: ubuntu-latest
    needs: [fetch-aws-creds]
    env:
      AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
      AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
      AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
      TERRAFORM_VERSION: 1.5.0
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ./terraform/elasticache
      - name: Get Credential [GCP_PROJECT_ID]
        id: cred_gcp_project_id
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_PROJECT_ID
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_SERVICE_ACCOUNT_EMAIL]
        id: cred_gcp_service_account_email
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_SERVICE_ACCOUNT_EMAIL
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_WORKLOAD_IDENTITY_PROVIDER]
        id: cred_gcp_workload_identity_provider
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_WORKLOAD_IDENTITY_PROVIDER
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

        run: |
          echo "🔧 Initializing Terraform..."
          terraform init \
            -input=false \
            -upgrade

      - name: Terraform Validate
        working-directory: ./terraform/elasticache
        run: |
          echo "✅ Validating Terraform configuration..."
          terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ./terraform/elasticache
        env:
          TF_IN_AUTOMATION: true
        run: |
          set -euo pipefail

          echo "📋 Planning ElastiCache changes..."

          terraform plan \
            -var-file="elasticache-params.tfvars" \
            -var="environment=${{ github.event.inputs.environment || 'prod' }}" \
            -no-color \
            -input=false \
            -out=tfplan.binary

          echo "✅ Plan completed"

      - name: Package terraform plan for MinIO
        working-directory: ./terraform/elasticache
        run: |
          mkdir -p /tmp/minio-uploads
          cp tfplan.binary /tmp/minio-uploads/

      - name: Upload terraform plan to MinIO
        if: contains(runner.labels, 'self-hosted')
        run: |
          ci/scripts/upload_to_minio.sh /tmp/minio-uploads/tfplan.binary terraform-plan-elasticache.binary || echo "MinIO upload failed; will use fallback"

      - name: Save Plan Artifact (hosted fallback)
        if: '!contains(runner.labels, ''self-hosted'')'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-elasticache
          path: ./terraform/elasticache/tfplan.binary
          retention-days: 1

  # Step 3: Apply (conditional)
  apply:
    name: Apply ElastiCache Changes (if requested)
    runs-on: ubuntu-latest
    needs: [fetch-aws-creds, plan]
    if: ${{ github.event.inputs.apply == 'true' }}
    env:
      AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
      AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
      AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
      TERRAFORM_VERSION: 1.5.0
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-elasticache
          path: ./terraform/elasticache

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        working-directory: ./terraform/elasticache
        run: |
          terraform init \
            -input=false \
            -upgrade

      - name: Terraform Apply
        id: apply
        working-directory: ./terraform/elasticache
        env:
          TF_IN_AUTOMATION: true
        run: |
          set -euo pipefail

          echo "⚙️ Applying Terraform changes..."

          terraform apply \
            -no-color \
            -input=false \
            tfplan.binary

          echo "✅ Apply completed"

      - name: Capture Outputs
        id: outputs
        working-directory: ./terraform/elasticache
        run: |
          set -euo pipefail

          echo "📊 ElastiCache Outputs:"
          terraform output -no-color -json > outputs.json

          # Display key outputs
          echo ""
          echo "Cluster Endpoint: $(terraform output -no-color primary_endpoint_address 2>/dev/null || echo 'N/A')"

      - name: Post Apply Status
        if: always()
        run: |
          if [ "${{ steps.apply.outcome }}" == "success" ]; then
            echo "✅ ElastiCache apply completed successfully"
          else
            echo "❌ ElastiCache apply failed"
            exit 1
          fi

  # Step 4: Validation
  validate:
    name: Validate ElastiCache Deployment
    runs-on: ubuntu-latest
    needs: [fetch-aws-creds, apply]
    if: ${{ always() && (needs.apply.result == 'success' || needs.apply.result == 'skipped') }}
    env:
      AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
      AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
      AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install AWS CLI
        uses: unfor19/install-aws-cli-action@v1

      - name: Validate ElastiCache Cluster
        id: validate
        run: |
          set -euo pipefail

          echo "🔍 Validating ElastiCache deployment..."

          # Get cluster information
          CLUSTERS=$(aws elasticache describe-cache-clusters \
            --region "$AWS_REGION" \
            --query 'CacheClusters[?Engine==`redis`].{Name:CacheClusterId,Status:CacheClusterStatus,Node:CacheNodeType}' \
            --output table)

          echo "ElastiCache Clusters:"
          echo "$CLUSTERS"

          # Check cluster status
          CLUSTER_COUNT=$(aws elasticache describe-cache-clusters \
            --region "$AWS_REGION" \
            --query 'length(CacheClusters)' \
            --output text)

          if [ "$CLUSTER_COUNT" -gt 0 ]; then
            echo "✅ Validation successful: $CLUSTER_COUNT cluster(s) found"
          else
            echo "⚠️ No ElastiCache clusters found (may be expected)"
          fi

  # Step 5: Summary
  summary:
    name: Workflow Summary
    runs-on: ubuntu-latest
    needs: [fetch-aws-creds, plan, apply, validate]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          cat <<EOF
          ═══════════════════════════════════════════════════════════════
                    ElastiCache Apply Workflow Summary
          ═══════════════════════════════════════════════════════════════

          📅 Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          🔐 Credentials Source: GCP Secret Manager (OIDC)
          🏗️  Environment: ${{ github.event.inputs.environment || 'prod' }}
          ⚙️  Apply Requested: ${{ github.event.inputs.apply == 'true' && 'YES' || 'NO (Plan only)' }}

          Job Status:
            ✅ Fetch AWS Credentials: ${{ needs.fetch-aws-creds.result }}
            ✅ Plan: ${{ needs.plan.result }}
            ⚙️  Apply: ${{ needs.apply.result }}
            ✅ Validate: ${{ needs.validate.result }}

          📋 Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ═══════════════════════════════════════════════════════════════
          EOF
