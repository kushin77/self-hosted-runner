name: CI - Build & Push Images

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to registry
        if: ${{ secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_PASSWORD != '' }}
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Skip push notice
        if: ${{ !(secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_PASSWORD != '') }}
        run: |
          echo "Registry credentials missing; skipping image push steps (temporary fallback)."

      - name: Build and push provisioner-worker
        uses: docker/build-push-action@v4
        with:
          context: ./services/provisioner-worker
          push: ${{ secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_PASSWORD != '' }}
          tags: ${{ secrets.REGISTRY_HOST }}/provisioner-worker:${{ github.sha }}

      - name: Build and push managed-auth
        uses: docker/build-push-action@v4
        with:
          context: ./services/managed-auth
          push: ${{ secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_PASSWORD != '' }}
          tags: ${{ secrets.REGISTRY_HOST }}/managed-auth:${{ github.sha }}

      - name: Build and push vault-shim
        uses: docker/build-push-action@v4
        with:
          context: ./services/vault-shim
          push: ${{ secrets.REGISTRY_USERNAME != '' && secrets.REGISTRY_PASSWORD != '' }}
          tags: ${{ secrets.REGISTRY_HOST }}/vault-shim:${{ github.sha }}

      - name: Generate SBOMs (cycloneDX)
        run: |
          mkdir -p sboms
          if command -v syft >/dev/null 2>&1; then
            syft packages dir:services/provisioner-worker -o cyclonedx-json > sboms/provisioner-worker.cdx.json || true
            syft packages dir:services/managed-auth -o cyclonedx-json > sboms/managed-auth.cdx.json || true
            syft packages dir:services/vault-shim -o cyclonedx-json > sboms/vault-shim.cdx.json || true
          else
            echo 'syft not installed; skipping SBOM generation'
          fi
