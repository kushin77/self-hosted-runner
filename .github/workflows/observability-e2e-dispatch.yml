name: Observability E2E Run (Real Receivers)

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type: slack, pagerduty, or all'
        required: false
        default: 'all'
      debug_mode:
        description: 'Enable debug output'
        required: false
        default: 'false'

permissions:
  contents: read
  id-token: write

jobs:
  secret-check:
    name: Check Secret Availability
    runs-on: ubuntu-latest
    outputs:
      slack_available: ${{ steps.check.outputs.slack_available }}
      pagerduty_available: ${{ steps.check.outputs.pagerduty_available }}
    steps:
      - name: Check for required secrets
        id: check
        run: |
          SLACK_AVAILABLE="false"
          PAGERDUTY_AVAILABLE="false"
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL || '' }}" ]; then
            SLACK_AVAILABLE="true"
            echo "✓ SLACK_WEBHOOK_URL is available"
          else
            echo "⚠ SLACK_WEBHOOK_URL is not set (will skip real Slack)"
          fi
          if [ -n "${{ secrets.PAGERDUTY_SERVICE_KEY || '' }}" ]; then
            PAGERDUTY_AVAILABLE="true"
            echo "✓ PAGERDUTY_SERVICE_KEY is available"
          else
            echo "⚠ PAGERDUTY_SERVICE_KEY is not set (will skip real PagerDuty)"
          fi
          echo "slack_available=$SLACK_AVAILABLE" >> "$GITHUB_OUTPUT"
          echo "pagerduty_available=$PAGERDUTY_AVAILABLE" >> "$GITHUB_OUTPUT"

  run-real-e2e:
    name: Run Real Observability E2E
    needs: secret-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare test environment
        id: prep
        run: |
          set -euo pipefail
          TEST_TYPE="${{ github.event.inputs.test_type || 'all' }}"
          DEBUG_MODE="${{ github.event.inputs.debug_mode || 'false' }}"
          echo "test_type=$TEST_TYPE" >> "$GITHUB_OUTPUT"
          echo "debug_mode=$DEBUG_MODE" >> "$GITHUB_OUTPUT"
          echo "Test Type: $TEST_TYPE"

      - name: Run real endpoint test (Slack)
        if: needs.secret-check.outputs.slack_available == 'true' && (github.event.inputs.test_type == 'slack' || github.event.inputs.test_type == 'all')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEBUG_MODE: ${{ steps.prep.outputs.debug_mode }}
        run: |
          set -euo pipefail
          # Write secret to temp file to avoid shell variable expansion issues
          SLACK_FILE=$(mktemp)
          echo -n "$SLACK_WEBHOOK_URL" > "$SLACK_FILE"
          SLACK_URL=$(cat "$SLACK_FILE")
          rm "$SLACK_FILE"
          echo "DEBUG: SLACK_URL from file, length: ${#SLACK_URL}"
          [ -z "$SLACK_URL" ] && { echo "ERROR: SLACK_URL is empty after file read"; exit 1; }
          cd scripts/automation/pmo/prometheus
          chmod +x run_e2e_ephemeral_test.sh
          ./run_e2e_ephemeral_test.sh --slack-url "$SLACK_URL"

      - name: Run real endpoint test (PagerDuty)
        if: needs.secret-check.outputs.pagerduty_available == 'true' && (github.event.inputs.test_type == 'pagerduty' || github.event.inputs.test_type == 'all')
        env:
          PAGERDUTY_SERVICE_KEY: ${{ secrets.PAGERDUTY_SERVICE_KEY }}
          DEBUG_MODE: ${{ steps.prep.outputs.debug_mode }}
        run: |
          set -euo pipefail
          echo "DEBUG: PAGERDUTY_SERVICE_KEY length: ${#PAGERDUTY_SERVICE_KEY}"
          [ -z "$PAGERDUTY_SERVICE_KEY" ] && { echo "ERROR: PAGERDUTY_SERVICE_KEY is empty!"; exit 1; }
          cd scripts/automation/pmo/prometheus
          chmod +x run_e2e_ephemeral_test.sh
          ./run_e2e_ephemeral_test.sh --pagerduty-key "$PAGERDUTY_SERVICE_KEY"

      - name: Collect mock logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observability-e2e-logs
          path: |
            scripts/automation/pmo/prometheus/*.log

      - name: Summary
        if: always()
        run: |
          echo "Observability E2E dispatch complete. Check artifacts: observability-e2e-logs"
