name: Observability E2E Run (Real Receivers)

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type: slack, pagerduty, or all'
        required: false
        default: 'all'
      debug_mode:
        description: 'Enable debug output'
        required: false
        default: 'false'

permissions:
  contents: read
  id-token: write

jobs:
  secret-check:
    name: Check Secret Availability
    runs-on: ubuntu-latest
    outputs:
      slack_available: ${{ steps.check.outputs.slack_available }}
      pagerduty_available: ${{ steps.check.outputs.pagerduty_available }}
    steps:
      - name: Check for required secrets
        id: check
        run: |
          SLACK_AVAILABLE="false"
          PAGERDUTY_AVAILABLE="false"
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL || '' }}" ]; then
            SLACK_AVAILABLE="true"
            echo "✓ SLACK_WEBHOOK_URL is available"
          else
            echo "⚠ SLACK_WEBHOOK_URL is not set (will skip real Slack)"
          fi
          if [ -n "${{ secrets.PAGERDUTY_SERVICE_KEY || '' }}" ]; then
            PAGERDUTY_AVAILABLE="true"
            echo "✓ PAGERDUTY_SERVICE_KEY is available"
          else
            echo "⚠ PAGERDUTY_SERVICE_KEY is not set (will skip real PagerDuty)"
          fi
          echo "slack_available=$SLACK_AVAILABLE" >> "$GITHUB_OUTPUT"
          echo "pagerduty_available=$PAGERDUTY_AVAILABLE" >> "$GITHUB_OUTPUT"

  run-real-e2e:
    name: Run Real Observability E2E
    needs: secret-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare test environment
        id: prep
        run: |
          set -euo pipefail
          TEST_TYPE="${{ github.event.inputs.test_type || 'all' }}"
          DEBUG_MODE="${{ github.event.inputs.debug_mode || 'false' }}"
          echo "test_type=$TEST_TYPE" >> "$GITHUB_OUTPUT"
          echo "debug_mode=$DEBUG_MODE" >> "$GITHUB_OUTPUT"
          echo "Test Type: $TEST_TYPE"

      - name: Run real endpoint test (Slack)
        if: needs.secret-check.outputs.slack_available == 'true' && (github.event.inputs.test_type == 'slack' || github.event.inputs.test_type == 'all')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEBUG_MODE: ${{ steps.prep.outputs.debug_mode }}
        run: |
          set -euo pipefail
          # Debug the secret value
          echo "Direct env var length: ${#SLACK_WEBHOOK_URL}"
          echo "First 20 chars (masked): ${SLACK_WEBHOOK_URL:0:20}"
          # Try reading from stdin to avoid shell expansion
          SLACK_URL=$(printf '%s' "$SLACK_WEBHOOK_URL")
          echo "After printf length: ${#SLACK_URL}"
          [ -z "$SLACK_URL" ] && { echo "ERROR: SLACK_URL is empty after printf"; exit 1; }
          cd scripts/automation/pmo/prometheus
          chmod +x run_e2e_ephemeral_test.sh
          ./run_e2e_ephemeral_test.sh --slack-url "$SLACK_URL"

      - name: Run real endpoint test (PagerDuty)
        if: needs.secret-check.outputs.pagerduty_available == 'true' && (github.event.inputs.test_type == 'pagerduty' || github.event.inputs.test_type == 'all')
        env:
          PAGERDUTY_SERVICE_KEY: ${{ secrets.PAGERDUTY_SERVICE_KEY }}
          PAGERDUTY_API_TOKEN: ${{ secrets.PAGERDUTY_API_TOKEN }}
          DEBUG_MODE: ${{ steps.prep.outputs.debug_mode }}
        run: |
          set -euo pipefail
          # Write PagerDuty secret to temp file to avoid shell expansion issues
          PD_FILE=$(mktemp)
          echo -n "$PAGERDUTY_SERVICE_KEY" > "$PD_FILE"
          PD_KEY=$(cat "$PD_FILE")
          rm "$PD_FILE"
          echo "DEBUG: PAGERDUTY key length after read: ${#PD_KEY}"
          [ -z "$PD_KEY" ] && { echo "ERROR: PAGERDUTY key is empty after read"; exit 1; }
          # Read PagerDuty API token into a temp file and export for script
          if [ -n "${PAGERDUTY_API_TOKEN:-}" ]; then
            PD_API_FILE=$(mktemp)
            echo -n "$PAGERDUTY_API_TOKEN" > "$PD_API_FILE"
            PD_API_KEY=$(cat "$PD_API_FILE")
            rm "$PD_API_FILE"
            export PAGERDUTY_API_TOKEN="$PD_API_KEY"
          fi
          cd scripts/automation/pmo/prometheus
          chmod +x run_e2e_ephemeral_test.sh
          PAGERDUTY_SERVICE_KEY="$PD_KEY" ./run_e2e_ephemeral_test.sh --pagerduty-key "$PD_KEY"

      - name: Collect mock logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observability-e2e-logs
          path: |
            scripts/automation/pmo/prometheus/*.log

      - name: Debug: list workspace for metrics
        if: always()
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Listing workflow_artifacts (root)"
          ls -la "$GITHUB_WORKSPACE" | sed -n '1,120p' || true
          echo "Searching for metrics.json files (root..4)"
          find "$GITHUB_WORKSPACE" -maxdepth 4 -type f -name metrics.json -print || true

      - name: Collect metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observability-e2e-metrics
            path: |
              **/workflow_artifacts/metrics.json
              /tmp/observability-e2e.*/metrics.json

      - name: Summary
        if: always()
        run: |
          echo "Observability E2E dispatch complete. Check artifacts: observability-e2e-logs, observability-e2e-metrics"
