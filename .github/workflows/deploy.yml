name: Deploy (orchestration on main merge)
on:
  push:
    branches:
    - main
    paths:
    - self_healing_orchestrator/**
    - .github/workflows/deploy.yml
env:
  DEPLOYMENT_ID: deploy-${{ github.run_id }}-${{ github.run_attempt }}
jobs:
  orchestrate:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
    - uses: actions/checkout@v4
    - name: Get Credential [AWS_REGION]
      id: cred_aws_region
      uses: ./.github/actions/get-ephemeral-credential
      with:
        credential-name: AWS_REGION
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [GCP_PROJECT_ID]
      id: cred_gcp_project_id
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: GCP_PROJECT_ID
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [VAULT_ADDR]
      id: cred_vault_addr
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: VAULT_ADDR
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Get Credential [VAULT_TOKEN]
      id: cred_vault_token
      uses: kushin77/get-ephemeral-credential@v1
      with:
        credential-name: VAULT_TOKEN
        retrieve-from: auto
        cache-ttl: 600
        audit-log: true
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: pip
    - name: Install dependencies
      run: 'pip install requests  # For Vault HTTP client

        '
    - name: Run self-healing orchestration
      env:
        VAULT_ADDR: ${{ secrets.VAULT_ADDR || 'http://localhost:8200' }}
        VAULT_TOKEN: ${{ steps.cred_vault_token.outputs.credential }}
        GCP_PROJECT_ID: ${{ steps.cred_gcp_project_id.outputs.credential }}
        AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      run: "python3 << 'DEPLOY'\nimport json\nimport logging\nfrom self_healing_orchestrator.adapters.wire_modules\
        \ import wire_default_sequences\nfrom self_healing_orchestrator.integration\
        \ import SelfHealingOrchestrationIntegration\n\nlogging.basicConfig(level=logging.INFO)\n\
        logger = logging.getLogger(__name__)\n\nlogger.info(\"Starting orchestration\
        \ deployment: ${{ env.DEPLOYMENT_ID }}\")\n\n# Create integration with deployment\
        \ metadata\nintegration = SelfHealingOrchestrationIntegration(\n    deployment_id=\"\
        ${{ env.DEPLOYMENT_ID }}\",\n    environment=\"production\"\n)\n\n# Wire default\
        \ sequences (adapters for existing modules)\nwire_default_sequences(integration)\n\
        \n# Execute full orchestration: gap analysis → remediation → validation →\
        \ reporting\nresult = integration.execute_full_orchestration()\n\n# Generate\
        \ deployment report\nintegration.generate_deployment_report(f\"deployment-report-${{\
        \ env.DEPLOYMENT_ID }}.json\")\n\n# Print summary\nlogger.info(\"Orchestration\
        \ result: %s\", json.dumps(result, indent=2))\n\n# Exit non-zero if orchestration\
        \ failed\nif result.get(\"status\") != \"success\":\n    logger.error(\"Orchestration\
        \ failed: %s\", result.get(\"reason\"))\n    exit(1)\n\nlogger.info(\"Orchestration\
        \ succeeded\")\nDEPLOY\n"
    - name: Upload deployment report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: deployment-reports
        path: deployment-report-*.json
    - name: Post deployment status
      if: always()
      run: '# Optional: Post status to Slack, GitHub issues, etc.

        echo "Deployment ${{ env.DEPLOYMENT_ID }} completed with status: ${{ job.status
        }}"

        '
    timeout-minutes: 30
    name: Orchestrate
permissions:
  contents: read
  pull-requests: read
  issues: read
  secrets: none
