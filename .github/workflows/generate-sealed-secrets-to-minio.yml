name: Generate SealedSecret and store in MinIO

on:
  workflow_dispatch:
    inputs:
      secret_value:
        description: 'Secret value (sensitive)'
        required: true
      secret_name:
        description: 'K8s secret name'
        required: false
        default: 'vault-approle-secret'
      namespace:
        description: 'K8s namespace'
        required: false
        default: 'gitops'

jobs:
  generate_and_upload:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: generate-sealed-secrets-to-minio-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: [self-hosted, linux]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure tools
        run: |
          if ! command -v kubectl >/dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl" && chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          fi
          if ! command -v kubeseal >/dev/null; then
            KUBESEAL_VER=$(curl -s https://api.github.com/repos/bitnami-labs/sealed-secrets/releases/latest | jq -r .tag_name)
            curl -L "https://github.com/bitnami-labs/sealed-secrets/releases/download/${KUBESEAL_VER}/kubeseal-${KUBESEAL_VER}-linux-amd64.tar.gz" | tar xz -C /tmp && sudo mv /tmp/kubeseal /usr/local/bin/
          fi

      - name: Generate sealed secret
        env:
          SECRET_VALUE: ${{ inputs.secret_value }}
        run: |
          set -euo pipefail
          mkdir -p .sealed
          OUTPUT=.sealed/sealed-$(date +%s).yaml
          ./ci/scripts/generate_sealed_secret.sh --name "${{ inputs.secret_name }}" --namespace "${{ inputs.namespace }}" --key secretId --value "$SECRET_VALUE" --out "$OUTPUT"
          echo "sealed=$OUTPUT" >> $GITHUB_OUTPUT

      - name: Upload sealed secret to MinIO
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: |
          set -euo pipefail
          FILE=$(ls .sealed/*.yaml | head -n1)
          URL=$(./ci/scripts/upload_to_minio.sh "$FILE")
          echo "artifact_url=$URL" >> $GITHUB_OUTPUT

      - name: Create PR referencing artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH=sealed/minio/$(date +%s)
          git config user.name "sov-bot"
          git config user.email "sov-bot@example.local"
          git checkout -b "$BRANCH"
          git commit --allow-empty -m "chore(sealed): add sealed secret artifact placeholder"
          git push -u origin "$BRANCH"
          ART_URL=$(jq -r '.artifact_url' <<< "$(cat $GITHUB_OUTPUT | jq -Rn 'inputs')" 2>/dev/null || true)
          BODY="A sealed secret artifact was generated and uploaded: ${ART_URL:-(see workflow run artifacts)}\n\nPlease review before importing into cluster."
          PR_DATA=$(jq -n --arg head "$BRANCH" --arg base "main" --arg title "chore(sealed): sealed secret artifact (MinIO)" --arg body "$BODY" '{head:$head,base:$base,title:$title,body:$body}')
          # GitHub Actions automatically injects secrets.GITHUB_TOKEN via GITHUB_TOKEN env variable
          curl -s -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" https://api.github.com/repos/${{ github.repository }}/pulls -d "$PR_DATA" | jq -r .html_url
