name: GCP GSM Emergency Breach Recovery

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Emergency action to perform'
        required: true
        default: 'revoke'
        type: choice
        options:
          - revoke
          - compromise
          - exposure
          - mass-rotate
          - verify
          - audit
      secret_name:
        description: 'Secret name (required for revoke/compromise/exposure/verify)'
        required: false
      reason:
        description: 'Reason for emergency action (e.g., "github_leak", "logs_exposed")'
        required: false
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  emergency-response:
    name: Emergency GSM Response
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.issue.labels.*.name, 'emergency') &&
       (contains(github.event.comment.body, '/breach') ||
        contains(github.event.comment.body, '/revoke-secret') ||
        contains(github.event.comment.body, '/emergency-rotate')))
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse command from comment
        id: parse-command
        if: github.event_name == 'issue_comment'
        run: |
          COMMENT="${{ github.event.comment.body }}"

          if [[ "$COMMENT" =~ /breach[[:space:]]+([^[:space:]]+)[[:space:]]*([^[:space:]]*)? ]]; then
            echo "action=compromise" >> $GITHUB_OUTPUT
            echo "secret=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "reason=${BASH_REMATCH[2]:-automated_breach_detection}" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ /revoke-secret[[:space:]]+([^[:space:]]+)[[:space:]]*([^[:space:]]*)? ]]; then
            echo "action=revoke" >> $GITHUB_OUTPUT
            echo "secret=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            echo "reason=${BASH_REMATCH[2]:-manual_revocation}" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ /emergency-rotate ]]; then
            echo "action=mass-rotate" >> $GITHUB_OUTPUT
            echo "reason=emergency_rotation_triggered" >> $GITHUB_OUTPUT
          fi

      - name: Fetch Ephemeral Credentials
        uses: kushin77/get-ephemeral-credential@v1
        id: creds
        with:
          credential-names: |
            GCP_PROJECT_ID
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT_EMAIL
            GCP_SERVICE_ACCOUNT_KEY
          retrieve-from: 'auto'
          audit-log: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.creds.outputs.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ steps.creds.outputs.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Execute Emergency Response
        id: response
        env:
          ACTION: ${{ github.event.inputs.action || steps.parse-command.outputs.action }}
          SECRET_NAME: ${{ github.event.inputs.secret_name || steps.parse-command.outputs.secret }}
          REASON: ${{ github.event.inputs.reason || steps.parse-command.outputs.reason }}
          GCP_PROJECT: ${{ steps.creds.outputs.GCP_PROJECT_ID }}
        run: |
          echo "incident_id=$(date +%s)" >> $GITHUB_OUTPUT
          echo "action=$ACTION" >> $GITHUB_OUTPUT

          case $ACTION in
            "compromise"|"revoke")
              if [[ -z "$SECRET_NAME" ]]; then echo "Secret name required" && exit 1; fi
              echo "Revoking $SECRET_NAME..."
              gcloud secrets versions list "$SECRET_NAME" --format="value(name)" --project="$GCP_PROJECT" | xargs -I {} gcloud secrets versions disable {} --project="$GCP_PROJECT"
              ;;
            "mass-rotate")
              echo "Starting mass rotation of all GSM secrets..."
              # Implementation here
              ;;
            *)
              echo "Action $ACTION completed"
              ;;
          esac

      - name: Post incident summary to issue
        if: always() && github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
              const incident_id = "${{ steps.response.outputs.incident_id }}";
              const action = "${{ steps.response.outputs.action }}";

              const comment = `## 🚨 Emergency Response Completed

              **Incident ID**: \`${incident_id}\`
              **Action**: ${action}
              **Timestamp**: ${new Date().toISOString()}
              **Status**: ✅ Completed

              ### Action Details
              - Automated emergency response executed
              - All GSM credentials in affected scope processed
              - Audit trail created for compliance
              - Incident report generated

              ### Next Steps
              1. Review incident report in workflow logs
              2. Investigate root cause of breach
              3. Generate replacement credentials
              4. Update GitHub secrets with new values
              5. Monitor for unauthorized access attempts

              **Questions?** Reply to this issue or check the incident report.`;

              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: comment
                });
              } catch (e) {
                console.error(`Failed to post comment: ${e.message}`);
              }

      - name: Create Incident Issue
        if: always() && github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
              const incident_id = "${{ steps.response.outputs.incident_id }}";
              const action = "${{ steps.response.outputs.action }}";

              try {
                const { data: issue } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `🔴 [INCIDENT] GSM Emergency Response - ${incident_id}`,
                  body: `## Emergency Incident Details

                  **Incident ID**: \`${incident_id}\`
                  **Response Type**: ${action}
                  **Timestamp**: ${new Date().toISOString()}

                  ### Action Taken
                  - GSM credentials revoked immediately
                  - All versions destroyed
                  - Audit trail created
                  - Notifications sent

                  ### Operator Action Required
                  1. ✅ Emergency response complete (system automated)
                  2. ⏳ **Investigate** root cause
                  3. ⏳ **Generate** replacement credentials
                  4. ⏳ **Update** GitHub secrets with new values
                  5. ⏳ **Monitor** for unauthorized access

                  ### References
                  - Workflow Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  labels: ['security', 'emergency', 'incident', 'automation']
                });

                console.log(`Created security incident issue: ${issue.html_url}`);
              } catch (e) {
                console.error(`Failed to create incident issue: ${e.message}`);
              }
