name: Post-Deploy — Phase P4 Smoke Tests

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Container Security Scan
      - E2E — Envoy mTLS + Rotation (Kind)
    types:
      - completed

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    name: Run post-deployment validation suite
    steps:
      - uses: actions/checkout@v4

      - name: Run Phase P4 smoke tests
        run: |
          chmod +x ./scripts/phase-p4-smoke-tests.sh
          ./scripts/phase-p4-smoke-tests.sh
        env:
          LOG_FILE: /tmp/phase-p4-smoke-test.log

      - name: Capture smoke test results
        if: always()
        run: |
          echo "=== Smoke Test Results ===" >> $GITHUB_STEP_SUMMARY
          cat /tmp/phase-p4-smoke-test.log >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR with smoke test results
        if: github.event_name == 'workflow_run' && github.event.workflow_run.pull_requests
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const log = fs.readFileSync('/tmp/phase-p4-smoke-test.log', 'utf8');
            const pullRequests = context.payload.workflow_run.pull_requests;
            
            if (pullRequests.length > 0) {
              const pr = pullRequests[0];
              const comment = `### 🧪 Phase P4 Smoke Tests Results\n\n\`\`\`\n${log}\n\`\`\``;
              
              github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

      - name: Verify deployment readiness
        run: |
          # Extract test summary
          if grep -q "✓ ALL TESTS PASSED" /tmp/phase-p4-smoke-test.log; then
            echo "✓ Phase P4 deployment is ready for production"
            exit 0
          else
            echo "✗ Some smoke tests failed; blocking deployment"
            exit 1
          fi

  # Optional: Run extended integration tests if full K8s cluster is available
  k8s-integration-test:
    if: contains(github.event.workflow_run.conclusion, 'success')
    runs-on: ubuntu-latest
    name: Optional K8s integration tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Kind cluster (optional)
        uses: helm/kind-action@v1.7.0
        with:
          cluster_name: smoke-test
          wait: 30s
        continue-on-error: true

      - name: Deploy test manifests (optional)
        run: |
          if kubectl cluster-info 2>/dev/null; then
            kubectl create namespace control-plane || true
            kubectl apply -n control-plane -f control-plane/envoy/deploy/ || true
          else
            echo "K8s cluster not available; skipping integration tests"
          fi
        continue-on-error: true

      - name: Verify deployments (optional)
        run: |
          if kubectl cluster-info 2>/dev/null; then
            kubectl get deployment -n control-plane -o wide || true
            kubectl get pods -n control-plane -o wide || true
          fi
        continue-on-error: true
