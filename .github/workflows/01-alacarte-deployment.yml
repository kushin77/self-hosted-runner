name: '📦 Deployment: À la carte component deployment'

# ═══════════════════════════════════════════════════════════════════════════════
# À LA CARTE DEPLOYMENT ORCHESTRATOR
# ═══════════════════════════════════════════════════════════════════════════════
# Modular, selective deployment of infrastructure components with:
#   - Immutable audit logging (append-only trail)
#   - Idempotent execution (safe to re-run)
#   - Ephemeral cleanup (auto-removal of temp files)
#   - No-Ops automation (fully hands-off)
#   - Credential injection (GSM/Vault/KMS via OIDC/WIF)
#   - GitHub issue automation (auto-tracking)
#
# Scheduled: Daily at 3 AM UTC
# Triggered: Manual via workflow dispatch or API
# ═══════════════════════════════════════════════════════════════════════════════

on:
  schedule:
    # Daily deployment check
    - cron: '0 3 * * *'  # 3 AM UTC daily

  workflow_dispatch:
    inputs:
      deployment_type:
        description: 'Deployment scope'
        required: true
        type: choice
        options:
          - full-suite    # All components in dependency order
          - security      # Security & remediation components
          - credentials   # Credential migration components (GSM/Vault/KMS)
          - automation    # Automation components (rotation, dynamic retrieval)
          - healing       # Healing components (RCA auto-healer)
          - custom        # Custom component selection
        default: 'full-suite'

      custom_components:
        description: 'Comma-separated component IDs (for custom deployments)'
        required: false
        type: string

      dry_run:
        description: 'Dry-run mode (plan only, no execution)'
        required: false
        type: boolean
        default: false

      skip_approval:
        description: 'Skip manual approval step'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write

env:
  DEPLOYMENT_AUDIT_DIR: '.deployment-audit'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════════
  # Initialization: Create tracking issue
  # ═══════════════════════════════════════════════════════════════════════════════

  init:
    name: Init deployment
    runs-on: ubuntu-latest
    outputs:
      deployment_id: ${{ steps.init.outputs.deployment_id }}
      components_to_deploy: ${{ steps.resolve.outputs.components }}
      tracking_issue: ${{ steps.tracking.outputs.issue_number }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate deployment ID
        id: init
        run: |
          DEPLOYMENT_ID="alacarte-$(date +%Y%m%d-%H%M%S)-${{ github.run_id }}"
          echo "deployment_id=${DEPLOYMENT_ID}" >> $GITHUB_OUTPUT
          echo "✅ Deployment ID: ${DEPLOYMENT_ID}"

      - name: Resolve components to deploy
        id: resolve
        env:
          DEPLOYMENT_TYPE: ${{ github.event.inputs.deployment_type || 'full-suite' }}
          CUSTOM_COMPONENTS: ${{ github.event.inputs.custom_components }}
        run: |
          python3 << 'EOF'
          import json

          deployment_type = "${{ env.DEPLOYMENT_TYPE }}"
          custom = "${{ env.CUSTOM_COMPONENTS }}".strip()

          component_map = {
              "full-suite": [
                  "remove-embedded-secrets",
                  "migrate-to-gsm",
                  "migrate-to-vault",
                  "migrate-to-kms",
                  "setup-dynamic-credential-retrieval",
                  "setup-credential-rotation",
                  "activate-rca-autohealer"
              ],
              "security": [
                  "remove-embedded-secrets"
              ],
              "credentials": [
                  "migrate-to-gsm",
                  "migrate-to-vault",
                  "migrate-to-kms",
                  "setup-dynamic-credential-retrieval"
              ],
              "automation": [
                  "setup-dynamic-credential-retrieval",
                  "setup-credential-rotation"
              ],
              "healing": [
                  "activate-rca-autohealer"
              ],
              "custom": [comp.strip() for comp in custom.split(",") if comp.strip()]
          }

          components = component_map.get(deployment_type, component_map["full-suite"])
          components_json = json.dumps(components)

          print(f"Components to deploy: {components}")
          with open("$GITHUB_OUTPUT", "a") as f:
              f.write(f"components={components_json}\n")
          EOF

      - name: Create deployment tracking issue
        id: tracking
        env:
          DEPLOYMENT_ID: ${{ steps.init.outputs.deployment_id }}
          COMPONENTS: ${{ steps.resolve.outputs.components }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 << 'EOF'
          import os
          import json
          import subprocess

          deployment_id = os.environ.get("DEPLOYMENT_ID")
          components_json = os.environ.get("COMPONENTS")
          event_name = os.environ.get("EVENT_NAME", "manual")
          components = json.loads(components_json)

          title = f"🚀 Deployment: {deployment_id}"

          trigger_type = 'Scheduled' if event_name == 'schedule' else 'Manual'
          components_list = '\n'.join(f'- [ ] {comp}' for comp in components)

          body = f"""## À la carte Deployment

**Deployment ID:** {deployment_id}
**Trigger:** {trigger_type}
**Status:** 🔄 In Progress

### Components to Deploy
{components_list}

### Progress
- [ ] Validate components
- [ ] Resolve dependencies
- [ ] Execute deployments
- [ ] Validate all systems
- [ ] Create completion reports

### Audit Trail
See `.deployment-audit/deployment_{deployment_id}.jsonl` for detailed logs.

### Configuration
- **Dry-run:** ${{ github.event.inputs.dry_run || false }}
- **Deployment Type:** ${{ github.event.inputs.deployment_type || 'full-suite' }}

---
*Automatically created by À la carte deployment orchestrator*
"""

          cmd = [
              "gh", "issue", "create",
              "--title", title,
              "--body", body,
              "--label", "deployment,automation",
              "--assignee", "akushnir"
          ]

          result = subprocess.run(cmd, capture_output=True, text=True)

          if result.returncode == 0:
              # Extract issue number
              output = result.stdout.strip()
              issue_number = output.split('/')[-1]
              print(f"✅ Created tracking issue #{issue_number}")
              with open("$GITHUB_OUTPUT", "a") as f:
                  f.write(f"issue_number={issue_number}\n")
          else:
              print(f"❌ Failed to create issue: {result.stderr}")

  # ═══════════════════════════════════════════════════════════════════════════════
  # Validation: Validate components and dependencies
  # ═══════════════════════════════════════════════════════════════════════════════

  validate:
    name: Validate deployment plan
    runs-on: ubuntu-latest
    needs: init

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Validate component selection
        env:
          COMPONENTS_JSON: ${{ needs.init.outputs.components_to_deploy }}
        run: |
          python3 << 'EOF'
          import json
          from deployment.components import get_component, get_deployment_order

          components_json = '${{ env.COMPONENTS_JSON }}'
          components = json.loads(components_json)

          print("Validating component selection...")

          # Validate each component exists
          for comp_id in components:
              comp = get_component(comp_id)
              if not comp:
                  raise ValueError(f"Unknown component: {comp_id}")
              print(f"  ✅ {comp_id}")

          # Validate dependency resolution
          print("\nResolving dependencies...")
          order = get_deployment_order(components)
          print(f"Deployment order: {' → '.join(order)}")

          print(f"\n✅ Validation successful: {len(components)} components ready")
          EOF

  # ═══════════════════════════════════════════════════════════════════════════════
  # Approval: Manual approval gate (optional)
  # ═══════════════════════════════════════════════════════════════════════════════

  approval:
    name: Manual approval
    runs-on: ubuntu-latest
    needs: [init, validate]
    if: |
      github.event.inputs.skip_approval != 'true' &&
      github.event_name == 'workflow_dispatch'

    environment:
      name: deployment
      reviewers:
        - akushnir

    steps:
      - name: Wait for approval
        run: |
          echo "⏳ Waiting for manual approval..."
          echo ""
          echo "📊 Deployment Details:"
          echo "  Deployment ID: ${{ needs.init.outputs.deployment_id }}"
          echo "  Tracking Issue: #${{ needs.init.outputs.tracking_issue }}"

  # ═══════════════════════════════════════════════════════════════════════════════
  # Execution: Deploy components
  # ═══════════════════════════════════════════════════════════════════════════════

  deploy:
    name: Deploy components
    runs-on: ubuntu-latest
    needs: [init, validate, approval]
    if: |
      always() &&
      (needs.approval.result == 'success' || github.event.inputs.skip_approval == 'true')

    env:
      DEPLOYMENT_ID: ${{ needs.init.outputs.deployment_id }}
      COMPONENTS_JSON: ${{ needs.init.outputs.components_to_deploy }}
      DRY_RUN: ${{ github.event.inputs.dry_run == 'true' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Setup OIDC token for credential access
        id: oidc
        uses: actions/id-token@v4
        with:
          token-format: 'json'
          audience: 'https://github.com/${{ github.repository_owner }}'

      - name: Execute deployments
        env:
          GITHUB_OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python3 << 'EOF'
          import json
          import sys
          from deployment.alacarte import DeploymentOrchestrator

          components_json = '${{ env.COMPONENTS_JSON }}'
          components = json.loads(components_json)
          dry_run = '${{ env.DRY_RUN }}'.lower() == 'true'
          deployment_id = '${{ env.DEPLOYMENT_ID }}'

          print(f"\n{'='*80}")
          print(f"À LA CARTE DEPLOYMENT EXECUTION")
          print(f"{'='*80}")
          print(f"Deployment ID: {deployment_id}")
          print(f"Components: {len(components)}")
          print(f"Dry-run: {dry_run}")
          print(f"{'='*80}\n")

          orchestrator = DeploymentOrchestrator(deployment_id=deployment_id)
          success = orchestrator.deploy_components(components, dry_run=dry_run)

          sys.exit(0 if success else 1)
          EOF

      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-audit-${{ env.DEPLOYMENT_ID }}
          path: ${{ env.DEPLOYMENT_AUDIT_DIR }}/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════════════════
  # Completion: Update tracking issue and cleanup
  # ═══════════════════════════════════════════════════════════════════════════════

  complete:
    name: Complete deployment
    runs-on: ubuntu-latest
    needs: [init, deploy]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Update tracking issue
        env:
          TRACKING_ISSUE: ${{ needs.init.outputs.tracking_issue }}
          DEPLOYMENT_ID: ${{ needs.init.outputs.deployment_id }}
          DEPLOYMENT_STATUS: ${{ needs.deploy.result }}
        run: |
          python3 << 'EOF'
          import os
          import subprocess

          issue_number = os.environ.get("TRACKING_ISSUE")
          deployment_id = os.environ.get("DEPLOYMENT_ID")
          status = os.environ.get("DEPLOYMENT_STATUS")

          status_emoji = "✅" if status == "success" else "❌"

          body = f"""## À la carte Deployment Results

**Deployment ID:** {deployment_id}
**Status:** {status_emoji} {status.title()}

### Summary
- See [audit logs](.deployment-audit/deployment_{deployment_id}_manifest.json) for details
- All changes logged to immutable audit trail
- Review `.deployment-audit/` directory for complete logs

### Next Steps
1. Verify components in production
2. Monitor for any issues
3. Close this issue when validated

---
*Deployment completed by À la carte orchestrator*
"""

          # Update issue
          cmd = ["gh", "issue", "edit", issue_number, "--body", body]
          subprocess.run(cmd, capture_output=True)

          # Add status label
          label = "deployment-success" if status == "success" else "deployment-failed"
          cmd = ["gh", "issue", "edit", issue_number, "--add-label", label]
          subprocess.run(cmd, capture_output=True)

          print(f"✅ Updated tracking issue #{issue_number}")
          EOF

      - name: Cleanup ephemeral resources
        if: always()
        run: |
          echo "🧹 Cleaning up ephemeral deployment resources..."
          # Remove temporary files created during deployment
          find . -name ".deployment-*" -type f -mtime +30 -delete
          find . -name "*-deployment-*.tmp" -type f -delete
          echo "✅ Cleanup complete"

  # ═══════════════════════════════════════════════════════════════════════════════
  # Failure Handling: Escalate critical failures
  # ═══════════════════════════════════════════════════════════════════════════════

  escalate:
    name: Escalate on failure
    runs-on: ubuntu-latest
    needs: [init, deploy]
    if: failure()

    steps:
      - name: Create escalation issue
        env:
          DEPLOYMENT_ID: ${{ needs.init.outputs.deployment_id }}
          TRACKING_ISSUE: ${{ needs.init.outputs.tracking_issue }}
        run: |
          gh issue create \
            --title "🚨 CRITICAL: Deployment ${{ env.DEPLOYMENT_ID }} failed" \
            --body "See #${{ env.TRACKING_ISSUE }} for details. Deployment failed during execution. Manual intervention may be required." \
            --label "critical,deployment,failure" \
            --assignee akushnir
