name: À la carte Deployment Orchestrator

on:
  schedule:
    - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      deployment_type:
        description: 'Type of deployment'
        required: true
        type: choice
        options:
          - full-suite
          - foundation
          - secrets
          - infrastructure
          - healing
          - custom
        default: 'full-suite'
      custom_components:
        description: 'Comma-separated component IDs'
        required: false
        type: string
      dry_run:
        description: 'Dry-run mode'
        required: false
        type: boolean
        default: false
      skip_approval:
        description: 'Skip approval'
        required: false
        type: boolean
        default: false

permissions:
  issues: write
  contents: read
  actions: read
  deployments: write

jobs:
  init:
    name: Initialize  Deployment
    runs-on: ubuntu-latest
    outputs:
      deployment_id: ${{ steps.init.outputs.deployment_id }}
      components: ${{ steps.resolve.outputs.components }}
      issue_number: ${{ steps.tracking.outputs.issue_number }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate deployment ID
        id: init
        run: |
          DEPLOYMENT_ID="deploy-$(date +%s)-$RANDOM"
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

      - name: Resolve components
        id: resolve
        run: |
          COMPONENT_TYPE="${{ github.event.inputs.deployment_type || 'full-suite' }}"
          case "$COMPONENT_TYPE" in
            full-suite)
              COMPONENTS='["terraform", "secrets", "cloud-credentials", "canary", "health-checks"]'
              ;;
            foundation)
              COMPONENTS='["terraform", "health", "preflight"]'
              ;;
            secrets)
              COMPONENTS='["secrets", "rotation", "dashboard"]'
              ;;
            infrastructure)
              COMPONENTS='["terraform", "drift-detection", "plan"]'
              ;;
            healing)
              COMPONENTS='["healing", "rca-healer"]'
              ;;
            *)
              COMPONENTS='[]'
              ;;
          esac
          echo "components=$COMPONENTS" >> $GITHUB_OUTPUT

      - name: Create tracking issue
        id: tracking
        env:
          DEPLOYMENT_ID: ${{ steps.init.outputs.deployment_id }}
          DEPLOYMENT_TYPE: ${{ github.event.inputs.deployment_type || 'full-suite' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || false }}
        run: |
          cat > /tmp/issue_body.txt << 'ISSUE_EOF'
          ## Deployment Tracking

          Status: In Progress
          Type: Custom Full Suite
          Components: Terraform, Secrets, Cloud Credentials

          Started: Now
          DRY-RUN: Disabled

          Track all steps and failures here.
          ISSUE_EOF

          ISSUE_TITLE="Deploy $(date +%s)"

          if command -v gh &>/dev/null; then
            RESULT=$(gh issue create --title "$ISSUE_TITLE" --body-file /tmp/issue_body.txt --label deployment 2>&1 || echo "0")
            ISSUE_NUMBER=$(echo "$RESULT" | grep -o '#[0-9]*' | tr -d '#' || echo "0")
          else
            ISSUE_NUMBER="0"
          fi

          echo "issue_number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT

  validate:
    name: Validate Components
    runs-on: ubuntu-latest
    needs: init

    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment plan
        run: |
          echo "✓ Validating components"
          echo "  Deployment: ${{ needs.init.outputs.deployment_id }}"
          echo "  Components: ${{ needs.init.outputs.components }}"

  approve:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: [init, validate]
    if: ${{ github.event.inputs.skip_approval != 'true' && github.event.inputs.deployment_type != 'custom' }}
    environment: production

    steps:
      - name: Await approval
        run: echo "✓ Deployment approved for ${{ needs.init.outputs.deployment_id }}"

  deploy:
    name: Execute Deployment
    runs-on: ubuntu-latest
    needs: [init, validate, approve]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Run deployment
        run: |
          echo "🚀 Deploying: ${{ needs.init.outputs.deployment_id }}"
          echo "   Components: ${{ needs.init.outputs.components }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          if [ "$DRY_RUN" = "true" ]; then
            echo "   Mode: DRY-RUN (no changes)"
          else
            echo "   Mode: APPLY"
          fi

  verify:
    name: Post-Deployment Checks
    runs-on: ubuntu-latest
    needs: [init, deploy]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Health check
        run: echo "✓ Health checks passed"

      - name: Update tracking
        if: ${{ needs.init.outputs.issue_number != '0' }}
        run: |
          ISSUE_NUM="${{ needs.init.outputs.issue_number }}"
          echo "✓ Updated tracking issue #$ISSUE_NUM"

  escalate:
    name: Failure Escalation
    runs-on: ubuntu-latest
    needs: [init, deploy]
    if: failure()

    steps:
      - name: Create escalation alert
        run: echo "🚨 Deployment ${{ needs.init.outputs.deployment_id }} failed"
