name: Auto-Rerun on Admin Grant
permissions:
  contents: read
  id-token: write
  actions: read

on:
  issue_comment:
    types: [created]

jobs:
  rerun-on-admin-grant:
    if: contains(github.event.issue.title, 'Grant automation token permissions for reruns') && (contains(github.event.comment.body, 'grant') || contains(github.event.comment.body, 'granted'))
    runs-on: ubuntu-latest
    permissions:
      actions: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Rerun failed workflow runs
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runs = await github.rest.actions.listRepoWorkflowRunsForRepo({ owner, repo, per_page: 200 });
            let queued = 0;
            for (const r of runs.data.workflow_runs) {
              if (r.conclusion === 'failure') {
                try {
                  await github.rest.actions.reRunWorkflow({ owner, repo, run_id: r.id });
                  queued++;
                } catch (err) {
                  core.warning(`Failed to queue rerun for run ${r.id}: ${err}`);
                }
              }
            }
            await github.rest.issues.createComment({ owner, repo, issue_number: github.event.issue.number, body: `Automation: queued ${queued} reruns after admin grant.` });
