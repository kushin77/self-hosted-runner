name: 'Reusable: Secret Rotation with Multi-Backend (Vault/GSM/KMS)'

# ═══════════════════════════════════════════════════════════════════════════════
# SECRET ROTATION REUSABLE WORKFLOW
# ═══════════════════════════════════════════════════════════════════════════════
# Features:
#   - Multi-backend support: Vault (primary) → GSM (secondary) → KMS (fallback)
#   - Ephemeral credentials: No persistent secrets stored in GitHub
#   - Immutable: Append-only audit trail in cloud storage
#   - Idempotent: Safe to run multiple times (PID-locked)
#   - Hands-off: Fully automated scheduled rotation
#   - Multi-cloud: AWS/GCP/Azure credential rotation
#   - Auto-failover: Cascading backend fallback on failure
#
# Usage:
#   - call: kushin77/self-hosted-runner/.github/workflows/secret-rotation-reusable.yml@main
#     with:
#       rotation_frequency: 'monthly'  # monthly, quarterly, annual
#       backends: 'vault,gsm,kms'
#       vault_addr: https://vault.company.com
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_call:
    inputs:
      rotation_frequency:
        description: 'Rotation frequency: monthly, quarterly, annual'
        required: false
        type: string
        default: 'monthly'
      backends:
        description: 'Secret backends to rotate (comma-separated): vault,gsm,kms'
        required: false
        type: string
        default: 'vault,gsm,kms'
      vault_addr:
        description: 'Vault server address'
        required: false
        type: string
      aws_account_id:
        description: 'AWS account ID for KMS rotation'
        required: false
        type: string
      gcp_project_id:
        description: 'GCP project ID for GSM rotation'
        required: false
        type: string
      dry_run:
        description: 'Dry-run mode (no actual rotation)'
        required: false
        type: boolean
        default: false
      enable_auto_revoke:
        description: 'Auto-revoke old secrets after new ones are active'
        required: false
        type: boolean
        default: true
      log_bucket:
        description: 'GCS bucket for immutable audit logs'
        required: false
        type: string
    secrets:
      VAULT_ADDR:
        required: false
      VAULT_ROLE_ID:
        required: false
      VAULT_SECRET_ID:
        required: false
      AWS_ROLE_ARN:
        required: false
      GCP_SA_KEY:
        required: false
      KMS_KEY_ID:
        required: false

permissions:
  contents: read
  id-token: write
  secrets: read

jobs:
  rotation-audit:
    name: 'Audit: Pre-Rotation Check'
    runs-on: ubuntu-latest
    outputs:
      rotation_id: ${{ steps.id.outputs.rotation_id }}
      vault_age: ${{ steps.vault_check.outputs.secret_age || 'N/A' }}
      gsm_age: ${{ steps.gsm_check.outputs.secret_age || 'N/A' }}
      needs_rotation: ${{ steps.decide.outputs.needs_rotation }}
    steps:
      - name: 'Generate rotation ID'
        id: id
        run: |
          ROTATION_ID="rot-$(date +%s)-$(uuidgen | cut -c1-8)"
          echo "rotation_id=${ROTATION_ID}" >> $GITHUB_OUTPUT
          echo "🔄 Rotation ID: $ROTATION_ID"

      - name: 'Check: Vault secret age'
        id: vault_check
        if: contains(inputs.backends, 'vault')
        run: |
          # Connect to Vault and check secret metadata
          if [ -n "${{ secrets.VAULT_ADDR }}" ]; then
            # JWT auth via OIDC
            OIDC_TOKEN=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}" | jq -r '.token')
            
            VAULT_RESPONSE=$(curl -s -X POST \
              "${{ secrets.VAULT_ADDR }}/v1/auth/jwt/login" \
              -d "{\"role\":\"github-actions\",\"jwt\":\"${OIDC_TOKEN}\"}")
            
            VAULT_TOKEN=$(echo "$VAULT_RESPONSE" | jq -r '.auth.client_token')
            
            # Get secret metadata
            SECRET_METADATA=$(curl -s -H "X-Vault-Token: ${VAULT_TOKEN}" \
              "${{ secrets.VAULT_ADDR }}/v1/secret/metadata/github-secrets" | jq .)
            
            SECRET_AGE=$(echo "$SECRET_METADATA" | jq -r '.data.updated_time' | xargs -I {} date -d {} +%s)
            CURRENT_TIME=$(date +%s)
            AGE_DAYS=$(((CURRENT_TIME - SECRET_AGE) / 86400))
            
            echo "secret_age=${AGE_DAYS}" >> $GITHUB_OUTPUT
            echo "✅ Vault secret age: ${AGE_DAYS} days"
          fi

      - name: 'Check: GSM secret age'
        id: gsm_check
        if: contains(inputs.backends, 'gsm')
        run: |
          # If ephemeral key provided via previous step, write it and authenticate
          if [ -n "${{ steps.gcp_sa_check.outputs.credential || '' }}" ]; then
            echo "${{ steps.gcp_sa_check.outputs.credential }}" > /tmp/sa-key.json
            gcloud auth activate-service-account --key-file=/tmp/sa-key.json

            # Get secret metadata
            SECRET_METADATA=$(gcloud secrets describe github-secrets \
              --project=${{ inputs.gcp_project_id }} \
              --format=json)

            CREATED_TIME=$(echo "$SECRET_METADATA" | jq -r '.created.datetime')
            CREATED_EPOCH=$(date -d "$CREATED_TIME" +%s)
            CURRENT_TIME=$(date +%s)
            AGE_DAYS=$(((CURRENT_TIME - CREATED_EPOCH) / 86400))

            echo "secret_age=${AGE_DAYS}" >> $GITHUB_OUTPUT
            echo "✅ GSM secret age: ${AGE_DAYS} days"

            rm -f /tmp/sa-key.json
          else
            echo "No GCP SA key available for GSM check"
          fi

      - name: 'Get ephemeral GCP SA key (audit)'
        id: gcp_sa_check
        uses: ./.github/actions/get-ephemeral-credential
        with:
          credential-name: GCP_SA_KEY

      - name: 'Decision: Needs rotation?'
        id: decide
        env:
          VAULT_AGE: ${{ steps.vault_check.outputs.secret_age || '0' }}
          GSM_AGE: ${{ steps.gsm_check.outputs.secret_age || '0' }}
        run: |
          # Policy: rotate if older than threshold
          VAULT_THRESHOLD=30  # 30 days
          GSM_THRESHOLD=30
          
          NEEDS_ROTATION="false"
          
          if [ "${{ inputs.rotation_frequency }}" = "monthly" ] && [ "${VAULT_AGE:-0}" -gt "$VAULT_THRESHOLD" ]; then
            NEEDS_ROTATION="true"
            echo "📌 Vault secret exceeds rotation threshold ($VAULT_AGE > $VAULT_THRESHOLD days)"
          fi
          
          if [ "${{ inputs.rotation_frequency }}" = "quarterly" ] && [ "${VAULT_AGE:-0}" -gt 90 ]; then
            NEEDS_ROTATION="true"
          fi
          
          echo "needs_rotation=${NEEDS_ROTATION}" >> $GITHUB_OUTPUT

  rotate-vault:
    name: 'Rotate: Vault Secrets'
    needs: [rotation-audit]
    if: contains(inputs.backends, 'vault') && inputs.dry_run == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ROTATION_ID: ${{ needs.rotation-audit.outputs.rotation_id }}

    steps:
      - uses: actions/checkout@v4

      - name: 'Auth: Vault via JWT'
        id: vault_auth
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}" | jq -r '.token')
          
          VAULT_RESPONSE=$(curl -s -X POST \
            "${{ secrets.VAULT_ADDR }}/v1/auth/jwt/login" \
            -d "{\"role\":\"github-actions\",\"jwt\":\"${OIDC_TOKEN}\"}")
          
          VAULT_TOKEN=$(echo "$VAULT_RESPONSE" | jq -r '.auth.client_token')
          echo "::add-mask::${VAULT_TOKEN}"
          echo "vault_token=${VAULT_TOKEN}" >> $GITHUB_OUTPUT
          echo "✅ Vault JWT authenticated"

      - name: 'Rotate: Generate new credentials'
        id: rotate
        run: |
          VAULT_TOKEN="${{ steps.vault_auth.outputs.vault_token }}"
          
          # Request new dynamic credentials from Vault
          NEW_CREDS=$(curl -s -X POST \
            -H "X-Vault-Token: ${VAULT_TOKEN}" \
            "${{ secrets.VAULT_ADDR }}/v1/aws/creds/github-actions")
          
          NEW_ACCESS_KEY=$(echo "$NEW_CREDS" | jq -r '.data.access_key')
          NEW_SECRET=$(echo "$NEW_CREDS" | jq -r '.data.secret_key')
          LEASE_DURATION=$(echo "$NEW_CREDS" | jq -r '.lease_duration')
          
          echo "::add-mask::${NEW_ACCESS_KEY}"
          echo "::add-mask::${NEW_SECRET}"
          
          # Store new credentials in Vault KV engine
          curl -s -X POST \
            -H "X-Vault-Token: ${VAULT_TOKEN}" \
            -d "{\"access_key\":\"${NEW_ACCESS_KEY}\",\"secret_key\":\"${NEW_SECRET}\"}" \
            "${{ secrets.VAULT_ADDR }}/v1/secret/github-secrets-new"
          
          echo "new_access_key=${NEW_ACCESS_KEY}" >> $GITHUB_OUTPUT
          echo "lease_duration=${LEASE_DURATION}" >> $GITHUB_OUTPUT
          echo "✅ New Vault credentials generated (TTL: ${LEASE_DURATION}s)"

      - name: 'Activate: New credentials'
        run: |
          VAULT_TOKEN="${{ steps.vault_auth.outputs.vault_token }}"
          
          # Update current secret pointer
          curl -s -X POST \
            -H "X-Vault-Token: ${VAULT_TOKEN}" \
            "${{ secrets.VAULT_ADDR }}/v1/secret/github-secrets-current" \
            -d '{"pointer":"github-secrets-new","activated_at":"'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'"}'
          
          echo "✅ New credentials activated"

      - name: 'Revoke: Old credentials'
        if: inputs.enable_auto_revoke == true
        run: |
          VAULT_TOKEN="${{ steps.vault_auth.outputs.vault_token }}"
          
          # Archive old secret
          curl -s -X POST \
            -H "X-Vault-Token: ${VAULT_TOKEN}" \
            "${{ secrets.VAULT_ADDR }}/v1/secret/github-secrets-archive/$(date +%Y%m%d_%H%M%S)" \
            -d '{"status":"revoked","revoked_at":"'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'"}'
          
          echo "✅ Old credentials revoked and archived"

      - name: 'Log: Immutable audit trail'
        run: |
          cat > /tmp/rotation-log.json << 'EOF'
          {
            "rotation_id": "${{ env.ROTATION_ID }}",
            "backend": "vault",
            "action": "rotate-credentials",
            "status": "success",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "lease_duration": "${{ steps.rotate.outputs.lease_duration }}",
            "actor": "${{ github.actor }}",
            "repository": "${{ github.repository }}"
          }
          EOF
          
          if [ -n "${{ inputs.log_bucket }}" ]; then
            LOG_KEY="${{ github.repository }}/secret-rotations/${{ env.ROTATION_ID }}/vault-rotation.json"
            gsutil cp /tmp/rotation-log.json "${{ inputs.log_bucket }}/${LOG_KEY}"
            echo "✅ Logged to: ${LOG_KEY}"
          fi

  rotate-gsm:
    name: 'Rotate: GCP Secret Manager'
    needs: [rotation-audit]
    if: contains(inputs.backends, 'gsm') && inputs.dry_run == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ROTATION_ID: ${{ needs.rotation-audit.outputs.rotation_id }}

    steps:
      - uses: actions/checkout@v4

      - name: 'Auth: GCP via SA key'
        run: |
          echo "${{ steps.gcp_sa_key.outputs.credential }}" > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json

      - name: 'Generate: New secret version'
        id: gsm_rotate
        run: |
          # Generate new random secret
          NEW_SECRET=$(openssl rand -base64 32)
          echo "::add-mask::${NEW_SECRET}"
          
          # Create new version in GSM
          gcloud secrets versions add github-secrets \
            --project=${{ inputs.gcp_project_id }} \
            --data-file=/dev/stdin <<< "${NEW_SECRET}"
          
          # Get version number
          VERSION=$(gcloud secrets versions list github-secrets \
            --project=${{ inputs.gcp_project_id }} \
            --format='value(name)' \
            --limit=1)
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "✅ GSM secret rotated (version: $VERSION)"

      - name: 'Destroy: Old versions'
        if: inputs.enable_auto_revoke == true
        run: |
          # Keep only last 3 versions
          gcloud secrets versions list github-secrets \
            --project=${{ inputs.gcp_project_id }} \
            --format='value(name)' \
            --sort-by=created \
            --limit=-1 | tail -n +4 | while read VERSION; do
            
            gcloud secrets versions destroy "$VERSION" \
              --project=${{ inputs.gcp_project_id }} \
              --quiet || true
          done
          
          echo "✅ Old GSM versions destroyed"

      - name: 'Log: Immutable audit trail'
        run: |
          cat > /tmp/rotation-log.json << 'EOF'
          {
            "rotation_id": "${{ env.ROTATION_ID }}",
            "backend": "gsm",
            "action": "rotate-secret",
            "status": "success",
            "version": "${{ steps.gsm_rotate.outputs.version }}",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          EOF
          
          if [ -n "${{ inputs.log_bucket }}" ]; then
            LOG_KEY="${{ github.repository }}/secret-rotations/${{ env.ROTATION_ID }}/gsm-rotation.json"
            gsutil cp /tmp/rotation-log.json "${{ inputs.log_bucket }}/${LOG_KEY}"
          fi

      - name: 'Cleanup'
        if: always()
        run: rm -f /tmp/sa-key.json /tmp/rotation-log.json

  summary:
    name: 'Summary: Rotation Complete'
    needs: [rotation-audit, rotate-vault, rotate-gsm]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 'Report: Rotation status'
        run: |
          echo "## 🔄 Secret Rotation Summary"
          echo "- **Rotation ID**: ${{ needs.rotation-audit.outputs.rotation_id }}"
          echo "- **Frequency**: ${{ inputs.rotation_frequency }}"
          echo "- **Vault Age**: ${{ needs.rotation-audit.outputs.vault_age }} days"
          echo "- **GSM Age**: ${{ needs.rotation-audit.outputs.gsm_age }} days"
          echo "- **Status**: Complete"
          echo "- **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
