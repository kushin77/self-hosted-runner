---
name: Debug Actions Runner
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
on:
  workflow_dispatch:

jobs:
  debug:
    name: Debug Actions Runner
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print runner and environment info
        run: |
          set -euxo pipefail
          echo "Date: $(date -u)"
          echo "Runner: $RUNNER_NAME ($RUNNER_OS)"
          echo "Runner temp: $RUNNER_TEMP"
          echo "GITHUB_WORKFLOW: $GITHUB_WORKFLOW"
          echo "GITHUB_RUN_ID: $GITHUB_RUN_ID"
          echo "GITHUB_REPOSITORY: $GITHUB_REPOSITORY"
          echo '--- uname -a ---'
          uname -a || true
          echo '--- whoami & id ---'
          whoami || true
          id || true
          echo '--- df -h / ---'
          df -h / || true
          echo '--- env (selected) ---'
          env | grep -E 'RUNNER|GITHUB|ACTIONS' | sort || true

      - name: Run a tiny shell test
        run: |
          echo "Creating a temp file and listing it"
          mkdir -p $RUNNER_TEMP/debug || true
          echo "hello" > $RUNNER_TEMP/debug/test.txt
          ls -la $RUNNER_TEMP/debug || true

      - name: Done
        run: echo "debug-complete"
