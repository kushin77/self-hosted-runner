name: Phase3 MinIO Upload

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to download'
        required: true
      asset_name:
        description: 'Asset name to download from the release'
        required: true
      object_path:
        description: 'Object path to write into MinIO (bucket prefix/object)'
        required: true

  workflow_call: {}

concurrency:
  group: phase3-minio-upload-${{ github.ref }}
  cancel-in-progress: false

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading ${INPUTS_ASSET_NAME:-${{ inputs.asset_name }}} from release ${{ inputs.tag }}"
          gh release download "${{ inputs.tag }}" --pattern "${{ inputs.asset_name }}" --repo kushin77/self-hosted-runner

      - name: Install mc
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          sudo mv mc /usr/local/bin/mc

      - name: Upload to MinIO
        id: upload
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: |
          set -euo pipefail
          echo "Setting mc alias"
          mc alias set ci-minio "${MINIO_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}" --api S3v4
          mc mb --ignore-existing ci-minio/${MINIO_BUCKET}
          mc cp "${{ inputs.asset_name }}" ci-minio/${MINIO_BUCKET}/${{ inputs.object_path }}
          URL="${MINIO_ENDPOINT%/}/${MINIO_BUCKET}/${{ inputs.object_path }}"
          echo "MINIO_URL=${URL}" >> $GITHUB_OUTPUT

      - name: Post Issue comment with MinIO URL
        uses: actions/github-script@v6
        with:
          script: |
            const url = process.env.MINIO_URL
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 909,
              body: `Phase 3 artifact uploaded to MinIO: ${url}`
            })
        env:
          MINIO_URL: ${{ steps.upload.outputs.MINIO_URL }}
