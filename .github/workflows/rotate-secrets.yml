name: "Secrets Rotation (Scheduled)"

on:
  schedule:
    # Daily at 03:00 UTC (hands-off, fully automated)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry-run mode (no actual rotations)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  actions: read
  id-token: write  # Required for OIDC/WIF

env:
  AUDIT_RETENTION_DAYS: 180

jobs:
  rotate-credentials:
    name: "Rotate Multi-Layer Credentials"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "Configure OIDC for GCP (Workload Identity Federation)"
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: false
        if: secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != ''

      - name: "Setup GCP SDK (gcloud)"
        uses: google-github-actions/setup-gcloud@v2
        if: success()

      - name: "Configure AWS credentials via OIDC"
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1
        if: secrets.AWS_ROLE_TO_ASSUME != ''

      - name: "Fetch Vault credentials (from GitHub OIDC)"
        id: vault-auth
        shell: bash
        if: secrets.VAULT_ADDR != ''
        run: |
          # Exchange GitHub OIDC token for Vault JWT
          VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
          JWT_TOKEN="${{ secrets.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}"
          
          # Authenticate to Vault
          AUTH_RESP=$(curl -s -X POST \
            "$VAULT_ADDR/v1/auth/jwt/login" \
            -d "{\"role\":\"github-actions\",\"jwt\":\"$JWT_TOKEN\"}")
          
          VAULT_TOKEN=$(echo "$AUTH_RESP" | jq -r '.auth.client_token // empty')
          if [ -z "$VAULT_TOKEN" ]; then
            echo "[WARN] Vault authentication failed; continuing with GSM/AWS only"
            echo "vault_token=" >> $GITHUB_ENV
          else
            echo "::add-mask::$VAULT_TOKEN"
            echo "vault_token=$VAULT_TOKEN" >> $GITHUB_ENV
          fi

      - name: "Export credentials to rotation script environment"
        shell: bash
        run: |
          echo "[INFO] Preparing credentials for rotation script..."
          
          # These are injected dynamically via OIDC/WIF above
          # No credentials stored as environment variables
          
          export GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          export VAULT_ADDR="${{ secrets.VAULT_ADDR }}"
          export VAULT_TOKEN="${{ env.vault_token }}"
          export AWS_REGION="us-east-1"
          
          echo "[INFO] Credentials prepared (OIDC/WIF authenticated)"

      - name: "Execute rotation orchestration"
        shell: bash
        run: |
          chmod +x .github/scripts/rotate-secrets.sh
          .github/scripts/rotate-secrets.sh
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ env.vault_token }}
          AWS_REGION: us-east-1

      - name: "Commit audit trail (immutable append-only)"
        shell: bash
        if: always()
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -d ".credentials-audit" ] && [ -n "$(git status .credentials-audit --porcelain 2>/dev/null)" ]; then
            git add .credentials-audit/
            git commit -m "ci(secrets): immutable audit trail - credential rotation" --allow-empty
            git push origin HEAD:${{ github.ref }} || echo "[WARN] Push failed"
          fi

      - name: "Upload audit trail"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rotation-audit-${{ github.run_id }}
          path: .credentials-audit/
          retention-days: 90

      - name: "Report: Rotation Status"
        shell: bash
        if: always()
        run: |
          echo "## Secrets Rotation Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Schedule**: Daily 03:00 UTC" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: $([ $? -eq 0 ] && echo '✅ Success' || echo '⚠️ Partial/Failed')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See artifacts for full audit trail." >> $GITHUB_STEP_SUMMARY

  cleanup-stale-audit:
    name: "Cleanup Stale Audit Logs"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event.schedule != ''
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "Remove audit logs older than retention period"
        shell: bash
        env:
          RETENTION_DAYS: ${{ env.AUDIT_RETENTION_DAYS }}
        run: |
          echo "[INFO] Cleaning rotation audit logs older than $RETENTION_DAYS days"
          find .credentials-audit -type f -mtime +$RETENTION_DAYS -delete -print || true
          echo "[INFO] Cleanup completed"

      - name: "Commit cleanup (if needed)"
        shell: bash
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status .credentials-audit --porcelain 2>/dev/null)" ]; then
            git add -A .credentials-audit/
            git commit -m "ci(secrets): ephemeral cleanup of stale rotation audit logs" --allow-empty
            git push origin HEAD:${{ github.ref }} || echo "[WARN] Push failed"
          fi
