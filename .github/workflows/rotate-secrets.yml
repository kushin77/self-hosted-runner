name: Rotate Secrets (template)

on:
  schedule:
    - cron: '0 4 * * *' # daily at 04:00 UTC
  workflow_dispatch: {}

jobs:
  rotate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run rotation script (DRY-RUN by default)
      - name: Get Credential [AWS_REGION]
        id: cred_aws_region
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: AWS_REGION
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [AWS_ROLE_TO_ASSUME]
        id: cred_aws_role_to_assume
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: AWS_ROLE_TO_ASSUME
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_PROJECT_ID]
        id: cred_gcp_project_id
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_PROJECT_ID
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_SERVICE_ACCOUNT]
        id: cred_gcp_service_account
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_SERVICE_ACCOUNT
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_WORKLOAD_IDENTITY_PROVIDER]
        id: cred_gcp_workload_identity_provider
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_WORKLOAD_IDENTITY_PROVIDER
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [VAULT_ADDR]
        id: cred_vault_addr
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: VAULT_ADDR
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [VAULT_OIDC_TOKEN]
        id: cred_vault_oidc_token
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: VAULT_OIDC_TOKEN
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

        run: |
          bash scripts/migrate/rotate-secrets.sh --dry-run
        env:
          # Provide provider auth via OIDC / environment or secrets mapped in runner
          GCP_PROJECT_ID: ${{ steps.cred_gcp_project_id.outputs.credential }}
          VAULT_ADDR: ${{ steps.cred_vault_addr.outputs.credential }}
          AWS_REGION: ${{ steps.cred_aws_region.outputs.credential }}
name: Multi-Layer Secrets Rotation

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode'
        required: 'false'
        default: 'true'

permissions:
  contents: write
  id-token: write
  secrets: read

env:
  CREDENTIALS_AUDIT_DIR: .credentials-audit
  DRY_RUN: ${{ inputs.dry_run || true }}

jobs:
  rotate-gcp-gsm:
    name: "Rotate GCP Secret Manager"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          version: latest

      - name: Authenticate to GCP (OIDC/WIF)
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ steps.cred_gcp_workload_identity_provider.outputs.credential }}
          service_account: ${{ steps.cred_gcp_service_account.outputs.credential }}

      - name: Create audit directory
        run: mkdir -p "${{ env.CREDENTIALS_AUDIT_DIR }}"

      - name: Rotate GSM secrets
        run: |
          bash .github/scripts/rotate-secrets.sh \
            --provider gsm \
            --audit-dir "${{ env.CREDENTIALS_AUDIT_DIR }}" \
            --dry-run "${{ env.DRY_RUN }}"
        continue-on-error: true

      - name: Upload audit trail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gsm-rotation-audit-${{ github.run_id }}
          path: ${{ env.CREDENTIALS_AUDIT_DIR }}/
          retention-days: 365

  rotate-vault-approle:
    name: "Rotate Vault AppRole"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create audit directory
        run: mkdir -p "${{ env.CREDENTIALS_AUDIT_DIR }}"

      - name: Rotate Vault AppRole
        run: |
          bash .github/scripts/rotate-secrets.sh \
            --provider vault \
            --vault-addr "${{ steps.cred_vault_addr.outputs.credential }}" \
            --audit-dir "${{ env.CREDENTIALS_AUDIT_DIR }}" \
            --dry-run "${{ env.DRY_RUN }}"
        env:
          VAULT_TOKEN: ${{ steps.cred_vault_oidc_token.outputs.credential }}
        continue-on-error: true

      - name: Upload audit trail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vault-rotation-audit-${{ github.run_id }}
          path: ${{ env.CREDENTIALS_AUDIT_DIR }}/
          retention-days: 365

  rotate-aws-secrets:
    name: "Rotate AWS Secrets Manager"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.cred_aws_role_to_assume.outputs.credential }}
          aws-region: us-east-1

      - name: Create audit directory
        run: mkdir -p "${{ env.CREDENTIALS_AUDIT_DIR }}"

      - name: Rotate AWS secrets
        run: |
          bash .github/scripts/rotate-secrets.sh \
            --provider aws \
            --aws-region us-east-1 \
            --audit-dir "${{ env.CREDENTIALS_AUDIT_DIR }}" \
            --dry-run "${{ env.DRY_RUN }}"
        continue-on-error: true

      - name: Upload audit trail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aws-rotation-audit-${{ github.run_id }}
          path: ${{ env.CREDENTIALS_AUDIT_DIR }}/
          retention-days: 365

  consolidate-audit:
    name: "Consolidate Audit Trails"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [rotate-gcp-gsm, rotate-vault-approle, rotate-aws-secrets]
    if: always()

    steps:
      - name: Download all audit artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-rotation-audit-*'
          path: all-audits

      - name: Consolidate audit trail
        run: |
          mkdir -p consolidated-audit
          find all-audits -name "*.jsonl" -exec cat {} \; | sort > consolidated-audit/rotation-audit.jsonl
          echo "Total rotation events: $(wc -l < consolidated-audit/rotation-audit.jsonl)"

      - name: Upload consolidated
        uses: actions/upload-artifact@v4
        with:
          name: rotation-audit-consolidated-${{ github.run_id }}
          path: consolidated-audit/
          retention-days: 365

      - name: Create summary
        if: always()
        run: |
          echo "## Secrets Rotation Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_STEP_SUMMARY
          echo "- Dry Run: ${{ env.DRY_RUN }}" >> $GITHUB_STEP_SUMMARY
          echo "- Audit Trail: consolidated-audit/rotation-audit.jsonl" >> $GITHUB_STEP_SUMMARY
