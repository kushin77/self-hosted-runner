name: Advanced Issue Auto-Response & Prioritization

on:
  issues:
    types: [opened, reopened, labeled]
  pull_request:
    types: [opened, reopened, labeled, review_requested]
  schedule:
    # Daily triage run - 06:00 UTC
    - cron: "0 6 * * *"

  workflow_call: {}

concurrency:
  group: advanced-issue-response-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
  VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}

jobs:
  auto-response:
    name: Auto-Response & Prioritization
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'issues' || github.event_name == 'pull_request'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Classify issue type
        id: classify
        run: |
          echo "Classifying issue/PR type and urgency..."

          if [ "${{ github.event_name }}" = "issues" ]; then
            TITLE="${{ github.event.issue.title }}"
            LABELS="${{ github.event.issue.labels[*].name }}"
            BODY="${{ github.event.issue.body }}"
            ISSUE_NUM="${{ github.event.issue.number }}"
          else
            TITLE="${{ github.event.pull_request.title }}"
            LABELS="${{ github.event.pull_request.labels[*].name }}"
            BODY="${{ github.event.pull_request.body }}"
            PR_NUM="${{ github.event.pull_request.number }}"
          fi

          # Determine issue type and urgency
          if echo "$LABELS" | grep -q "disaster-recovery\|critical\|production-down"; then
            URGENCY="critical"
            ICON="🔴"
          elif echo "$LABELS" | grep -q "automation\|security-related"; then
            URGENCY="high"
            ICON="🟠"
          elif echo "$LABELS" | grep -q "bugfix\|enhancement"; then
            URGENCY="medium"
            ICON="🟡"
          else
            URGENCY="low"
            ICON="🟢"
          fi

          # Detect issue category
          if echo "$TITLE$BODY" | grep -qi "secret\|credential\|password\|token"; then
            CATEGORY="security"
          elif echo "$TITLE$BODY" | grep -qi "dr\|disaster\|recovery\|failover"; then
            CATEGORY="disaster-recovery"
          elif echo "$TITLE$BODY" | grep -qi "merge\|auto-merge\|branch"; then
            CATEGORY="automation"
          elif echo "$TITLE$BODY" | grep -qi "dns\|minio\|storage"; then
            CATEGORY="infrastructure"
          else
            CATEGORY="general"
          fi

          echo "urgency=$URGENCY" >> $GITHUB_OUTPUT
          echo "category=$CATEGORY" >> $GITHUB_OUTPUT
          echo "icon=$ICON" >> $GITHUB_OUTPUT

      - name: Generate auto-response
        id: response
        run: |
          URGENCY="${{ steps.classify.outputs.urgency }}"
          CATEGORY="${{ steps.classify.outputs.category }}"
          ICON="${{ steps.classify.outputs.icon }}"

          # Build response message based on category
          case "$CATEGORY" in
            "security")
              RESPONSE="$ICON **Security Alert Acknowledged**

This appears to be a security-related issue. Our automated systems are:
- ✅ Scanning Vault for related secrets
- ✅ Checking ephemeral-secret-provisioning status
- ✅ Validating credential rotation policies

**Auto-Actions in Progress**:
1. Ephemeral secret provisioning (runs every 6h)
2. Automatic remediation workflow monitoring
3. Security audit compliance check

If this is urgent, please comment with priority flag."
              ;;
            "disaster-recovery")
              RESPONSE="$ICON **Disaster Recovery Issue Detected**

Our automated DR monitoring system is active:
- ✅ Scanning recent test failures
- ✅ Checking recovery detection status
- ✅ Running auto-remediation workflows

**Active Workflows**:
- dr-reconciliation-auto-remediate (every 30 min)
- minio-dns-failover (every 15 min)

Issues will auto-close when recovery is confirmed."
              ;;
            "automation")
              RESPONSE="$ICON **Automation Issue Detected**

We have automated handlers for this:
- ✅ enable-auto-merge verification (daily)
- ✅ Branch protection auto-configuration
- ✅ Dependency update auto-merge

**Status**: Checking current settings and applying fixes if needed."
              ;;
            "infrastructure")
              RESPONSE="$ICON **Infrastructure Issue Detected**

Our infrastructure monitoring is active:
- ✅ MinIO health checks (every 15 min)
- ✅ DNS failover system operational
- ✅ 4-tier backup validation (Docker→AWS→GCP→Local)

**Status**: Automatic remediation available for failover scenarios."
              ;;
            *)
              RESPONSE="$ICON **Issue Received & Acknowledged**

Your issue has been received and classified. Our systems are:
- ✅ Analyzing the problem
- ✅ Checking for auto-remediation applicability
- ✅ Queuing for team review if needed

**Next Steps**: Automation will respond with status within 30 minutes."
              ;;
          esac

          echo "response<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post auto-response
        run: |
          RESPONSE='${{ steps.response.outputs.response }}'

          if [ "${{ github.event_name }}" = "issues" ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "$RESPONSE"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body "$RESPONSE"
          fi

      - name: Auto-apply labels
        if: github.event_name == 'issues' && github.event.action == 'opened'
        run: |
          CATEGORY="${{ steps.classify.outputs.category }}"
          URGENCY="${{ steps.classify.outputs.urgency }}"

          # Add category label
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label "$CATEGORY" 2>/dev/null || true

          # Add urgency label
          case "$URGENCY" in
            "critical")
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --add-label "priority/critical,status/automation-active" 2>/dev/null || true
              ;;
            "high")
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --add-label "priority/high" 2>/dev/null || true
              ;;
          esac

  daily-triage:
    name: Daily Issue Triage & Routing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Scan for stale issues
        id: stale
        run: |
          echo "Scanning for stale/stuck issues..."

          # Find issues open for >7 days without activity
          STALE_ISSUES=$(gh issue list \
            --repo ${{ github.repository }} \
            --state open \
            --search "updated:<$(date -d '7 days ago' +%Y-%m-%d)" \
            --json number,title,updatedAt \
            --jq '.[]')

          STALE_COUNT=$(echo "$STALE_ISSUES" | jq -s 'length')
          echo "stale_count=$STALE_COUNT" >> $GITHUB_OUTPUT

          if [ "$STALE_COUNT" -gt 0 ]; then
            echo "stale_list<<EOF" >> $GITHUB_OUTPUT
            echo "$STALE_ISSUES" | jq -r '.number' >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Check automation coverage
        id: coverage
        run: |
          echo "Checking automation coverage..."

          echo "Automation Workflows Status:"

          # Check each workflow status
          workflows=(
            "dr-reconciliation-auto-remediate.yml:dr-tests"
            "ephemeral-secret-provisioning.yml:secrets"
            "enable-auto-merge.yml:merging"
            "minio-dns-failover.yml:dns-failover"
            "operational-health-dashboard.yml:monitoring"
            "slack-alerts-automation.yml:notifications"
            "comprehensive-metrics-report.yml:analytics"
          )

          COVERAGE_REPORT=""
          for workflow_info in "${workflows[@]}"; do
            IFS=':' read -r workflow category <<< "$workflow_info"
            STATUS=$(gh run list \
              --workflow "$workflow" \
              --repo ${{ github.repository }} \
              --limit 1 \
              --json status,conclusion \
              --jq '.[0] | .status + ":" + .conclusion' 2>/dev/null)

            if [ -n "$STATUS" ]; then
              COVERAGE_REPORT="$COVERAGE_REPORT
✅ **$category**: $STATUS"
            else
              COVERAGE_REPORT="$COVERAGE_REPORT
⚠️ **$category**: Not yet executed"
            fi
          done

          echo "coverage_report<<EOF" >> $GITHUB_OUTPUT
          echo "$COVERAGE_REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate triage report
        id: triage
        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')

          REPORT="## 📋 Daily Triage & Issue Routing Report

**Report Date**: $TIMESTAMP

### 🔄 Stale Issues Status
- **Count**: ${{ steps.stale.outputs.stale_count || '0' }}
- **Action**: Stale issues flagged for team review

### ✅ Automation Coverage

${{ steps.coverage.outputs.coverage_report }}

### 📊 Today's Activity
- Issues opened: $(gh issue list --repo ${{ github.repository }} --state open --json createdAt --jq '[.[] | select(.createdAt | fromdateiso8601 > now - 86400)] | length')
- PRs merged: $(gh pr list --repo ${{ github.repository }} --state closed --json mergedAt --jq '[.[] | select(.mergedAt | fromdateiso8601 > now - 86400)] | length')
- Workflows executed: $(gh run list --repo ${{ github.repository }} --limit 20 --json createdAt --jq '[.[] | select(.createdAt | fromdateiso8601 > now - 86400)] | length')

### 🎯 Recommended Actions
1. Review stale issues and update/close as appropriate
2. Verify all automation workflows executed successfully
3. Check for any anomalies in metrics
4. Prepare operations summary for team

---

*Triage report generated automatically*"

          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo "$REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post triage summary
        run: |
          REPORT='${{ steps.triage.outputs.report }}'

          gh issue comment 1077 \
            --repo ${{ github.repository }} \
            --body "$REPORT" 2>/dev/null || echo "⚠ Could not post triage report"
