name: Vault-First Deploy

on:
  workflow_dispatch:
    inputs:
      plan_only:
        description: 'Run plan only (no apply)'
        required: false
        default: 'false'

jobs:
  vault_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
      checks: write
    env:
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Terraform Init
        run: |
          cd terraform
          terraform init -input=false

      - name: Terraform Plan
        id: plan
        run: |
          cd terraform
          terraform plan -out=tfplan -input=false 2>&1 | tee /tmp/tf_plan.log
          echo "plan_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Terraform Apply
        if: ${{ inputs.plan_only != 'true' }}
        run: |
          cd terraform
          terraform apply -auto-approve tfplan 2>&1 | tee /tmp/tf_apply.log
          echo "apply_exit_code=$?"

      - name: Upload plan and apply logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-logs
          path: |
            /tmp/tf_plan.log
            /tmp/tf_apply.log
          retention-days: 30
