name: Vault-First Deploy

on:
  workflow_dispatch:
    inputs:
      plan_only:
        description: 'Run plan only (no apply)'
        required: false
        default: 'false'

jobs:
  vault_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
      checks: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.4.0

      - name: Fetch credentials from Vault (AppRole)
        id: vault_creds
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
        run: |
          set -euo pipefail
          echo "::group::Vault AppRole authentication"
          
          # Validate inputs
          if [ -z "${VAULT_ADDR}" ] || [ -z "${VAULT_NAMESPACE}" ] || [ -z "${VAULT_ROLE_ID}" ] || [ -z "${VAULT_SECRET_ID}" ]; then
            echo "ERROR: Missing Vault configuration secrets" >&2
            exit 1
          fi
          
          echo "Vault Endpoint: ${VAULT_ADDR}"
          echo "Vault Namespace: ${VAULT_NAMESPACE}"
          
          # Authenticate with Vault using AppRole
          AUTH_RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "${VAULT_ADDR}/v1/auth/approle/login" \
            -H "X-Vault-Namespace: ${VAULT_NAMESPACE}" \
            -d "{\"role_id\": \"${VAULT_ROLE_ID}\", \"secret_id\": \"${VAULT_SECRET_ID}\"}")
          
          HTTP_CODE=$(echo "$AUTH_RESPONSE" | tail -1)
          RESPONSE_BODY=$(echo "$AUTH_RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Vault authentication failed with HTTP $HTTP_CODE" >&2
            echo "Response: $RESPONSE_BODY" >&2
            exit 1
          fi
          
          VAULT_TOKEN=$(echo "$RESPONSE_BODY" | jq -r '.auth.client_token // empty')
          
          if [ -z "$VAULT_TOKEN" ]; then
            echo "ERROR: Failed to extract Vault token from response" >&2
            echo "Response: $RESPONSE_BODY" >&2
            exit 1
          fi
          echo "✓ Vault AppRole authentication successful"
          echo "::endgroup::"
          
          # Fetch AWS credentials from Vault
          echo "::group::Fetching AWS credentials from Vault"
          CREDS_RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "${VAULT_ADDR}/v1/aws/creds/terraform-role" \
            -H "X-Vault-Namespace: ${VAULT_NAMESPACE}" \
            -H "X-Vault-Token: ${VAULT_TOKEN}")
          
          HTTP_CODE=$(echo "$CREDS_RESPONSE" | tail -1)
          RESPONSE_BODY=$(echo "$CREDS_RESPONSE" | sed '$d')
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Failed to fetch AWS credentials with HTTP $HTTP_CODE" >&2
            echo "Response: $RESPONSE_BODY" >&2
            exit 1
          fi
          
          AWS_ACCESS_KEY_ID=$(echo "$RESPONSE_BODY" | jq -r '.data.access_key // empty')
          AWS_SECRET_ACCESS_KEY=$(echo "$RESPONSE_BODY" | jq -r '.data.secret_key // empty')
          
          if [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "ERROR: Failed to extract AWS credentials from Vault response" >&2
            exit 1
          fi
          echo "✓ AWS credentials fetched from Vault"
          echo "::endgroup::"
          
          # Export credentials securely as GitHub Actions masked outputs
          echo "::add-mask::${AWS_ACCESS_KEY_ID}"
          echo "::add-mask::${AWS_SECRET_ACCESS_KEY}"
          echo "aws_access_key_id=${AWS_ACCESS_KEY_ID}" >> $GITHUB_OUTPUT
          echo "aws_secret_access_key=${AWS_SECRET_ACCESS_KEY}" >> $GITHUB_OUTPUT

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault_creds.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault_creds.outputs.aws_secret_access_key }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          cd terraform
          terraform init -input=false

      - name: Terraform Plan
        id: plan
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault_creds.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault_creds.outputs.aws_secret_access_key }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          cd terraform
          terraform plan -out=tfplan -input=false 2>&1 | tee /tmp/tf_plan.log
          echo "plan_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Terraform Apply
        if: ${{ inputs.plan_only != 'true' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ steps.vault_creds.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ steps.vault_creds.outputs.aws_secret_access_key }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          cd terraform
          terraform apply -auto-approve tfplan 2>&1 | tee /tmp/tf_apply.log
          echo "apply_exit_code=$?"

      - name: Upload plan and apply logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-logs
          path: |
            /tmp/tf_plan.log
            /tmp/tf_apply.log
          retention-days: 30
