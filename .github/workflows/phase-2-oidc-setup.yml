name: Phase 2 - Configure Zero-Trust OIDC/WIF

on:
  workflow_dispatch:
    inputs:
      gcp_project_id:
        description: 'GCP Project ID (optional - auto-detected if available)'
        required: false
        type: string
      aws_account_id:
        description: 'AWS Account ID (optional - auto-detected if available)'
        required: false
        type: string
      vault_addr:
        description: 'Vault server address (optional - auto-detected if available)'
        required: false
        type: string

permissions:
  contents: write
  id-token: write
  secrets: write

env:
  LOG_DIR: .setup-logs
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  discover-credentials:
    name: Discover Cloud Credentials
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      gcp_project_id: ${{ steps.discovery.outputs.gcp_project_id }}
      aws_account_id: ${{ steps.discovery.outputs.aws_account_id }}
      vault_addr: ${{ steps.discovery.outputs.vault_addr }}
      discovery_complete: ${{ steps.discovery.outputs.discovery_complete }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover Cloud Credentials
        id: discovery
        run: |
          mkdir -p "${{ env.LOG_DIR }}"
          
          # GCP Detection
          GCP_PROJECT_ID="${{ inputs.gcp_project_id }}"
          if [[ -z "$GCP_PROJECT_ID" ]]; then
            echo "🔍 Auto-detecting GCP Project ID..."
            if command -v gcloud &> /dev/null; then
              GCP_PROJECT_ID=$(gcloud config get-value project 2>/dev/null || echo "")
            fi
            if [[ -z "$GCP_PROJECT_ID" ]] && [[ -f "$GOOGLE_APPLICATION_CREDENTIALS" ]]; then
              GCP_PROJECT_ID=$(python3 -c "import json; print(json.load(open('$GOOGLE_APPLICATION_CREDENTIALS')).get('project_id', ''))" 2>/dev/null || echo "")
            fi
          fi
          
          # AWS Detection
          AWS_ACCOUNT_ID="${{ inputs.aws_account_id }}"
          if [[ -z "$AWS_ACCOUNT_ID" ]]; then
            echo "🔍 Auto-detecting AWS Account ID..."
            if command -v aws &> /dev/null; then
              AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text 2>/dev/null || echo "")
            fi
            if [[ -z "$AWS_ACCOUNT_ID" ]]; then
              if [[ -f ~/.aws/credentials ]] && [[ ! -z "$AWS_DEFAULT_REGION" ]]; then
                AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text 2>/dev/null || echo "")
              fi
            fi
          fi
          
          # Vault Detection
          VAULT_ADDR="${{ inputs.vault_addr }}"
          if [[ -z "$VAULT_ADDR" ]]; then
            echo "🔍 Auto-detecting Vault address..."
            VAULT_ADDR="${VAULT_ADDR:-https://vault.example.com}"
          fi
          
          # Output results
          echo "gcp_project_id=$GCP_PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "aws_account_id=$AWS_ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "vault_addr=$VAULT_ADDR" >> "$GITHUB_OUTPUT"
          
          # Check discovery status
          if [[ -n "$GCP_PROJECT_ID" ]] || [[ -n "$AWS_ACCOUNT_ID" ]] || [[ -n "$VAULT_ADDR" ]]; then
            echo "discovery_complete=true" >> "$GITHUB_OUTPUT"
            echo "✅ Discovered cloud credentials"
          else
            echo "discovery_complete=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No credentials auto-discovered; manual input will be required"
          fi
          
          # Log summary
          cat > "${{ env.LOG_DIR }}/discovery-report.txt" << 'REPORT'
          === Phase 2: Credential Discovery Report ===
          REPORT
          [[ -n "$GCP_PROJECT_ID" ]] && echo "GCP Project ID: $GCP_PROJECT_ID" >> "${{ env.LOG_DIR }}/discovery-report.txt"
          [[ -n "$AWS_ACCOUNT_ID" ]] && echo "AWS Account ID: $AWS_ACCOUNT_ID" >> "${{ env.LOG_DIR }}/discovery-report.txt"
          [[ -n "$VAULT_ADDR" ]] && echo "Vault Address: $VAULT_ADDR" >> "${{ env.LOG_DIR }}/discovery-report.txt"

      - name: Upload Discovery Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-discovery-report
          path: ${{ env.LOG_DIR }}/discovery-report.txt
          retention-days: 30

  validate-setup:
    name: Validate Credentials & Configuration
    needs: discover-credentials
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate Cloud Configuration
        run: |
          mkdir -p "${{ env.LOG_DIR }}"
          
          echo "=== Phase 2: Validation ===" | tee -a "${{ env.LOG_DIR }}/validation.log"
          
          GCP_PROJECT_ID="${{ needs.discover-credentials.outputs.gcp_project_id }}"
          AWS_ACCOUNT_ID="${{ needs.discover-credentials.outputs.aws_account_id }}"
          VAULT_ADDR="${{ needs.discover-credentials.outputs.vault_addr }}"
          
          echo "Checking discovered credentials:" | tee -a "${{ env.LOG_DIR }}/validation.log"
          [[ -n "$GCP_PROJECT_ID" ]] && echo "  ✓ GCP Project ID: $GCP_PROJECT_ID" || echo "  ⚠️  No GCP Project ID"
          [[ -n "$AWS_ACCOUNT_ID" ]] && echo "  ✓ AWS Account ID: $AWS_ACCOUNT_ID" || echo "  ⚠️  No AWS Account ID"
          [[ -n "$VAULT_ADDR" ]] && echo "  ✓ Vault Address: $VAULT_ADDR" || echo "  ⚠️  No Vault Address"
          
          echo ""
          echo "Next Steps:" | tee -a "${{ env.LOG_DIR }}/validation.log"
          echo "1. Add discovered credentials to GitHub repository secrets (if not already present)"
          echo "2. For GCP: gh secret set GCP_PROJECT_ID --body '$GCP_PROJECT_ID' (if needed)"
          echo "3. For AWS: gh secret set AWS_ACCOUNT_ID --body '$AWS_ACCOUNT_ID' (if needed)"
          echo "4. For Vault: gh secret set VAULT_ADDR --body '$VAULT_ADDR' (if needed)"
          echo "5. Configure OIDC/WIF in each cloud provider"
          echo "6. Run Phase 2 complete setup"

      - name: Upload Validation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase2-validation-report
          path: ${{ env.LOG_DIR }}/validation.log
          retention-days: 30

  setup-complete:
    name: Phase 2 Setup Complete
    needs: [discover-credentials, validate-setup]
    runs-on: ubuntu-latest
    steps:
      - name: Create Phase 2 Summary
        run: |
          echo "### Phase 2: OIDC/WIF Setup Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Ready for configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Discovered Credentials:**" >> $GITHUB_STEP_SUMMARY
          echo "- GCP Project ID: ${{ needs.discover-credentials.outputs.gcp_project_id || 'Not detected' }}" >> $GITHUB_STEP_SUMMARY
          echo "- AWS Account ID: ${{ needs.discover-credentials.outputs.aws_account_id || 'Not detected' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Vault Address: ${{ needs.discover-credentials.outputs.vault_addr || 'Not configured' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Download discovery artifacts to review detected credentials" >> $GITHUB_STEP_SUMMARY
          echo "2. Add any missing credentials as GitHub secrets" >> $GITHUB_STEP_SUMMARY
          echo "3. Run workflow: Phase 2 - Configure OIDC Providers" >> $GITHUB_STEP_SUMMARY
          echo "4. Execute revocation workflow (Phase 3) post Phase 2" >> $GITHUB_STEP_SUMMARY
