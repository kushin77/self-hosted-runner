name: Trivy Scan (detect and dispatch)

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  packages: write
  id-token: write
  actions: write

jobs:
  scan-and-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull image (example)
        run: |
          IMAGE=${{ inputs.image || 'ghcr.io/kushin77/runner:latest' }}
          echo "Image=$IMAGE" > image.env

      - name: Install Trivy
        uses: aquasecurity/trivy-action@v0.11.3
        with:
          scan-type: image
          image-ref: '${{ env.IMAGE }}'
          format: json
          output: trivy-report.json

      - name: Parse results and conditionally dispatch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          jq '.Results[].Vulnerabilities? // []' trivy-report.json > vulns.json || true
          CRITICAL=$(jq '[.[] | select(.Severity=="CRITICAL" or .Severity=="Critical")] | length' vulns.json)
          HIGH=$(jq '[.[] | select(.Severity=="HIGH" or .Severity=="High")] | length' vulns.json)
          echo "CRITICAL=$CRITICAL HIGH=$HIGH"
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 5 ]; then
            python3 .github/scripts/dispatch_trivy_alert.py --repo "$REPO" --token "$GITHUB_TOKEN" --file trivy-report.json
          else
            echo "No action needed"
          fi
