name: CI - Dashboard Import Validation

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  validate-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Grafana container
        run: |
          docker run -d --name grafana-test -p 3000:3000 grafana/grafana:9.5.6 || true

      - name: Wait for Grafana to be ready
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3000/login >/dev/null 2>&1; then
              echo "Grafana ready"
              break
            fi
            echo "Waiting for Grafana... ($i)"
            sleep 2
          done

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Import dashboard
        env:
          GRAFANA_URL: http://localhost:3000
        run: |
          ./scripts/dashboards/import_to_grafana.sh "$GRAFANA_URL" deploy/dashboards/grafana/otel-basic-dashboard.json || (docker logs grafana-test || true; exit 1)

      - name: Cleanup
        if: always()
        run: |
          docker rm -f grafana-test || true
