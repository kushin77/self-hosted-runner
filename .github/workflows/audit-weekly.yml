name: Audit Validation - Weekly

# Weekly validation of all systems - fully automated, hands-off
on:
  schedule:
    # Every Monday at 6 AM UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  audit-secrets:
    name: Weekly Secrets Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Full Secrets Audit
        id: audit
        run: |
          echo "=== Running Full Secrets Audit ===" | tee /tmp/secrets-report.txt
          bash scripts/audit-secrets.sh --full >> /tmp/secrets-report.txt 2>&1
          echo "✅ Secrets audit completed"
      
      - name: Export JSON
        run: |
          bash scripts/audit-secrets.sh --json > /tmp/secrets.json 2>/dev/null
          wc -l /tmp/secrets.json
      
      - name: Create Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-audit-report
          path: /tmp/secrets-report.txt
          retention-days: 30
      
      - name: Upload JSON Export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-export-json
          path: /tmp/secrets.json
          retention-days: 30
      
      - name: Report Summary
        if: always()
        run: |
          echo "## 📊 Weekly Secrets Audit Report" >> $GITHUB_STEP_SUMMARY
          head -30 /tmp/secrets-report.txt >> $GITHUB_STEP_SUMMARY

  audit-workflows:
    name: Weekly Workflows Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Full Workflows Audit
        id: audit
        run: |
          echo "=== Running Full Workflows Audit ===" | tee /tmp/workflows-report.txt
          bash scripts/audit-workflows.sh --summary >> /tmp/workflows-report.txt 2>&1
          bash scripts/audit-workflows.sh --full >> /tmp/workflows-report.txt 2>&1
          echo "✅ Workflows audit completed"
      
      - name: Export JSON
        run: |
          bash scripts/audit-workflows.sh --json > /tmp/workflows.json 2>/dev/null
          wc -l /tmp/workflows.json
      
      - name: Create Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflows-audit-report
          path: /tmp/workflows-report.txt
          retention-days: 30
      
      - name: Upload JSON Export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflows-export-json
          path: /tmp/workflows.json
          retention-days: 30
      
      - name: Report Summary
        if: always()
        run: |
          echo "## 🔧 Weekly Workflows Audit Report" >> $GITHUB_STEP_SUMMARY
          grep -E "^(Found:|Found:|Total|By)" /tmp/workflows-report.txt >> $GITHUB_STEP_SUMMARY || true

  audit-scripts:
    name: Weekly Scripts Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Full Scripts Audit
        id: audit
        run: |
          echo "=== Running Full Scripts Audit ===" | tee /tmp/scripts-report.txt
          bash scripts/audit-scripts.sh --summary >> /tmp/scripts-report.txt 2>&1
          bash scripts/audit-scripts.sh --critical >> /tmp/scripts-report.txt 2>&1
          echo "✅ Scripts audit completed"
      
      - name: Export JSON
        run: |
          bash scripts/audit-scripts.sh --json > /tmp/scripts.json 2>/dev/null
          wc -l /tmp/scripts.json
      
      - name: Create Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scripts-audit-report
          path: /tmp/scripts-report.txt
          retention-days: 30
      
      - name: Upload JSON Export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scripts-export-json
          path: /tmp/scripts.json
          retention-days: 30
      
      - name: Report Summary
        if: always()
        run: |
          echo "## 📋 Weekly Scripts Audit Report" >> $GITHUB_STEP_SUMMARY
          grep -E "^(Found:|Total|Critical|By)" /tmp/scripts-report.txt >> $GITHUB_STEP_SUMMARY || true

  system-health-check:
    name: System Health Check
    runs-on: ubuntu-latest
    needs: [audit-secrets, audit-workflows, audit-scripts]
    if: always()
    steps:
      - uses: actions/checkout@v4
      
      - name: Get Audit Results
        id: results
        run: |
          echo "Collecting audit results..."
          echo "AUDIT_TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
      
      - name: Generate Weekly Report
        run: |
          cat > /tmp/weekly-summary.md <<'EOF'
          # 📈 Weekly 5-System Health Report
          
          **Run Date**: ${{ steps.results.outputs.AUDIT_TIMESTAMP }}
          
          ## System Status
          
          ### Secrets System
          - Audit: ✅ Completed
          - Location: [SECRETS_INDEX.md](SECRETS_INDEX.md)
          
          ### Workflows System
          - Audit: ✅ Completed
          - Location: [WORKFLOWS_INDEX.md](WORKFLOWS_INDEX.md)
          
          ### Scripts System
          - Audit: ✅ Completed
          - Location: [SCRIPTS_REGISTRY.md](SCRIPTS_REGISTRY.md)
          
          ### Errors System
          - Reference: [ERROR_CODES_GUIDE.md](ERROR_CODES_GUIDE.md)
          
          ### Config System
          - Reference: [CONFIGURATION_GUIDE.md](CONFIGURATION_GUIDE.md)
          
          ---
          
          **All systems operational and up-to-date.**
          next scheduled audit: Next Monday 6 AM UTC
          EOF
          cat /tmp/weekly-summary.md
      
      - name: Create Issue if Out of Sync
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // Create issue if audits detect inconsistencies
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Audit Inconsistency Detected',
              body: `Scheduled audit detected inconsistencies in indices.\n\nReview the [audit workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}).`,
              labels: ['audit', 'automated']
            });
      
      - name: Summary Report
        if: always()
        run: |
          echo "## ✅ Weekly System Health Check" >> $GITHUB_STEP_SUMMARY
          echo "All audits completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts Generated:**" >> $GITHUB_STEP_SUMMARY
          echo "- secrets-audit-report (30-day retention)" >> $GITHUB_STEP_SUMMARY
          echo "- workflows-audit-report (30-day retention)" >> $GITHUB_STEP_SUMMARY
          echo "- scripts-audit-report (30-day retention)" >> $GITHUB_STEP_SUMMARY
