name: Security Audit (gitleaks + trivy)

on:
  schedule:
    - cron: '0 2 * * *' # daily @ 02:00 UTC
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Run Security Scanners (gitleaks + trivy)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Attempt gitleaks via action
        continue-on-error: true
        uses: zricethezav/gitleaks-action@v1
        with:
          args: '--path=. --report-format=json --report-path=./gitleaks-report.json || true'

      - name: Fallback: Docker gitleaks (best-effort)
        if: always()
        run: |
          set -euo pipefail
          if [ -f gitleaks-report.json ]; then
            echo "gitleaks report exists"
          else
            if command -v docker >/dev/null 2>&1; then
              docker run --rm -v "$PWD":/workspace zricethezav/gitleaks:v7.4.0 gitleaks detect --path=/workspace --report-format=json --report-path=/workspace/gitleaks-report.json || true
            else
              echo "docker not available — creating noop gitleaks report"
              echo '{"leaks": []}' > gitleaks-report.json || true
            fi
          fi

      - name: Attempt Trivy filesystem scan (action)
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0
        with:
          scan-type: 'filesystem'
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH'

      - name: Fallback: create noop trivy report
        if: always()
        run: |
          set -euo pipefail
          if [ -f trivy-report.json ]; then
            echo "trivy report exists"
          else
            echo '{"Results": []}' > trivy-report.json || true
          fi

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

      - name: Upload trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          if-no-files-found: warn

      - name: Create issues for findings (best-effort)
        if: always()
        run: |
          set -euo pipefail
          if [ -f gitleaks-report.json ]; then
            GCOUNT=$(jq '.leaks? | length // 0' gitleaks-report.json || echo 0)
          else
            GCOUNT=0
          fi

          if [ -f trivy-report.json ]; then
            TCOUNT=$(jq '[.Results[]?.Vulnerabilities[]?] | length // 0' trivy-report.json || echo 0)
          else
            TCOUNT=0
          fi

          if [ "$GCOUNT" -gt 0 ]; then
            gh issue create --repo ${{ github.repository }} --title "[SECURITY] Gitleaks findings detected" --body "Gitleaks findings: $GCOUNT — see artifact" --label "security,gitleaks" || true
          fi

          if [ "$TCOUNT" -gt 0 ]; then
            gh issue create --repo ${{ github.repository }} --title "[SECURITY] Trivy vulnerabilities detected" --body "Trivy high/critical findings: $TCOUNT — see artifact" --label "security,trivy,urgent" || true
          fi

      - name: Trigger remediation workflow (best-effort)
        if: always()
        run: |
          set -euo pipefail
          # Attempt to trigger remediation; ignore if dispatch unsupported
          gh workflow run security-findings-remediation.yml --repo ${{ github.repository }} --ref main || true
