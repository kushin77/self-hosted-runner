name: Security Audit (gitleaks + trivy)

on:
  schedule:
    - cron: '0 2 * * *' # daily @ 02:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    env:
      ACTIONS_STEP_DEBUG: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks (repository secrets scan)
        uses: zricethezav/gitleaks-action@v1
        with:
          args: --path=. --report-format=json --report-path=./gitleaks-report.json || true

      - name: Fallback: ensure gitleaks report exists
        if: always()
        run: |
          set -euo pipefail
          if [ -f gitleaks-report.json ]; then
            echo "gitleaks-report.json already present"
          else
            echo "Attempting to generate gitleaks-report.json via docker image fallback"
            docker run --rm -v "$PWD":/workspace zricethezav/gitleaks:v7.4.0 gitleaks detect --path=/workspace --report-format=json --report-path=/workspace/gitleaks-report.json || true
          fi

      - name: Debug gitleaks workspace
        if: always()
        run: |
          set -euo pipefail
          echo "DEBUG: PWD=$(pwd)"
          echo "DEBUG: listing workspace root"
          ls -la
          echo "DEBUG: checking for gitleaks-report.json"
          if [ -f gitleaks-report.json ]; then
            echo "gitleaks-report.json exists — showing summary"
            jq '. | {leaks: (.leaks | length), rules: (.rules | length) }' gitleaks-report.json || true
          else
            echo "gitleaks-report.json missing"
            echo "Printing container logs for troubleshooting (if available)"
            true
          fi

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: warn

      - name: Inspect gitleaks report and create issue if findings
        run: |
          set -euo pipefail
          REPO="kushin77/self-hosted-runner"
          TITLE="[SECURITY] Gitleaks findings detected"

          if [ -f gitleaks-report.json ]; then
            COUNT=$(jq '.leaks | length' gitleaks-report.json || echo 0)
            EXISTING=$(gh issue list --repo "$REPO" --state open --search "$TITLE" --json number --jq '.[0].number' 2>/dev/null || echo "")

            if [ "$COUNT" -gt 0 ]; then
              BODY="Automated gitleaks scan found $COUNT potential secrets. See artifact: gitleaks-report.json. Please review and rotate any exposed credentials."
              if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
                echo "Updating existing issue #$EXISTING with new findings..."
                gh issue comment "$EXISTING" --repo "$REPO" --body "Automated re-run found $COUNT leaks. See artifact: gitleaks-report.json." || true
              else
                echo "Creating new issue for gitleaks findings..."
                gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY" --label "security,automated-scan" || true
              fi
            else
              if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
                echo "No leaks found on re-run; closing issue #$EXISTING..."
                gh issue comment "$EXISTING" --repo "$REPO" --body "Automated gitleaks re-run found no leaks; closing." || true
                gh issue edit "$EXISTING" --repo "$REPO" --state closed || true
              else
                echo "No gitleaks findings."
              fi
            fi
          else
            echo "No gitleaks report present; skipping. See earlier debug steps for workspace listing."
          fi

  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    env:
      ACTIONS_STEP_DEBUG: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run trivy filesystem scan
        uses: aquasecurity/trivy-action@v0
        with:
          scan-type: 'filesystem'
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH'

      - name: Debug trivy workspace
        if: always()
        run: |
          set -euo pipefail
          echo "DEBUG: PWD=$(pwd)"
          echo "DEBUG: listing workspace root"
          ls -la
          if [ -f trivy-report.json ]; then
            echo "trivy-report.json exists — showing summary"
            jq '{results: (.Results | length), vulnerabilities: ([.Results[]?.Vulnerabilities[]?] | length)}' trivy-report.json || true
          else
            echo "trivy-report.json missing"
          fi

      - name: Upload trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
          if-no-files-found: warn

      - name: Inspect trivy report and create issue if findings
        run: |
          set -euo pipefail
          REPO="kushin77/self-hosted-runner"
          TITLE="[SECURITY] Trivy vulnerabilities detected"

          if [ -f trivy-report.json ]; then
            COUNT=$(jq '[.Results[]?.Vulnerabilities[]?] | length' trivy-report.json || echo 0)
            EXISTING=$(gh issue list --repo "$REPO" --state open --search "$TITLE" --json number --jq '.[0].number' 2>/dev/null || echo "")

            if [ "$COUNT" -gt 0 ]; then
              BODY="Automated Trivy scan found $COUNT high/critical vulnerabilities. See trivy-report.json artifact for details."
              if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
                gh issue comment "$EXISTING" --repo "$REPO" --body "Automated re-run found $COUNT vulnerabilities (high/critical). See artifact: trivy-report.json." || true
              else
                gh issue create --repo "$REPO" --title "$TITLE" --body "$BODY" --label "security,automated-scan" || true
              fi
            else
              if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
                gh issue comment "$EXISTING" --repo "$REPO" --body "Automated Trivy re-run found no high/critical vulnerabilities; closing." || true
                gh issue edit "$EXISTING" --repo "$REPO" --state closed || true
              else
                echo "No high/critical vulnerabilities found by Trivy."
              fi
            fi
          else
            echo "No trivy report present; skipping. See earlier debug steps for workspace listing."
          fi
