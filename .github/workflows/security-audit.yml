---
name: Security Audit (gitleaks + trivy)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Run Security Scanners (gitleaks + trivy)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Run gitleaks secret scan
        continue-on-error: true
        uses: zricethezav/gitleaks-action@v1
        with:
          args: --path=. --config=.gitleaks.toml --report-format=json --report-path=gitleaks-report.json

      - name: Run Trivy vulnerability scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: '.'
          format: json
          output: trivy-report.json

      - name: Package scan reports for MinIO
        if: always()
        run: |
          mkdir -p /tmp/minio-uploads
          tar czf /tmp/minio-uploads/security-scan-reports.tar.gz gitleaks-report.json trivy-report.json || echo "No reports to package"

      - name: Upload scan reports to MinIO
        if: always() && contains(runner.labels, 'self-hosted')
        run: |
          ci/scripts/upload_to_minio.sh /tmp/minio-uploads/security-scan-reports.tar.gz security-scan-reports.tar.gz || echo "MinIO upload failed; will use fallback"

      - name: Upload scan reports (hosted fallback)
        if: always() && !contains(runner.labels, 'self-hosted')
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-reports
          path: |
            gitleaks-report.json
            trivy-report.json
          retention-days: 7
