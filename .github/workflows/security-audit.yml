name: Security Audit (gitleaks + trivy)

on:
  schedule:
    - cron: '0 2 * * *' # daily @ 02:00 UTC
  workflow_dispatch: {}
  name: Security Audit (placeholder)

  on:
    workflow_dispatch: {}
    workflow_call: {}

  jobs:
    run-audit:
      name: Run placeholder security audit (creates placeholder reports)
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Create placeholder reports
          run: |
            echo '{}' > gitleaks-report.json
            echo '{}' > trivy-report.json

        - name: Upload gitleaks report
          uses: actions/upload-artifact@v4
          with:
            name: gitleaks-report
            path: gitleaks-report.json

        - name: Upload trivy report
          uses: actions/upload-artifact@v4
          with:
            name: trivy-report
            path: trivy-report.json
          gh workflow run security-findings-remediation.yml \
            --repo ${{ github.repository }} \
            --ref main || true
