name: CI - Release Gate Verification
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
on:
  release:
    types: [created]
  workflow_dispatch: {}

jobs:
  release-gate:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate manifest
        run: |
          ./scripts/airgap/generate_image_manifest.sh > /tmp/airgap-manifest.yml
          cat /tmp/airgap-manifest.yml

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft version || true

      - name: Generate SBOMs (if missing)
        run: |
          mkdir -p build/sboms
          ./scripts/supplychain/generate_sbom.sh /tmp/airgap-manifest.yml build/sboms || true

      - name: Ensure provenance exists (generate if missing)
        run: |
          mkdir -p build/provenance
          ./scripts/supplychain/generate_provenance.sh /tmp/airgap-manifest.yml build/sboms build/provenance || true

      - name: Install cosign
        run: |
          curl -sSfL https://github.com/sigstore/cosign/releases/download/v2.14.0/cosign-linux-amd64 -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign || true
          cosign version || true

      - name: Run release gate verification
        env:
          COSIGN_PUB_KEY: ${{ secrets.COSIGN_PUB_KEY || '' }}
        run: |
          chmod +x scripts/supplychain/verify_release_gate.sh
          ./scripts/supplychain/verify_release_gate.sh /tmp/airgap-manifest.yml build/sboms build/provenance

      - name: Upload provenance and SBOMs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: release-supplychain-artifacts
          path: |
            build/provenance/
            build/sboms/