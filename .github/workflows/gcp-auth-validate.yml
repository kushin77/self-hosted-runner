name: GCP Auth Validator

on:
  workflow_dispatch:
    inputs: {}

permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  validate:
    name: Validate GCP Workload Identity & Service Account
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (Workload Identity)
        id: gcp_auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Install gcloud CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y lsb-release apt-transport-https ca-certificates gnupg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] http://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -
          sudo apt-get update && sudo apt-get install -y google-cloud-sdk || true

      - name: Run GCP Auth Checks
        id: run_checks
        run: |
          set -euo pipefail
          LOG=/tmp/gcp_auth_validator.log
          echo "GCP Auth Validator Run: $(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$LOG"
          echo "--- gcloud version ---" >> "$LOG"
          gcloud --version >> "$LOG" 2>&1 || true
          echo "--- auth list ---" >> "$LOG"
          gcloud auth list --filter=status:ACTIVE --format="value(account)" >> "$LOG" 2>&1 || true
          echo "--- identity token (masked) ---" >> "$LOG"
          gcloud auth print-identity-token >> "$LOG" 2>&1 || true
          echo "--- secrets list (project=$GCP_PROJECT_ID) ---" >> "$LOG"
          gcloud secrets list --project="$GCP_PROJECT_ID" --format="value(name)" >> "$LOG" 2>&1 || true
          echo "--- service-account policy ---" >> "$LOG"
          gcloud iam service-accounts get-iam-policy "${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}" --project="$GCP_PROJECT_ID" >> "$LOG" 2>&1 || true
          echo "--- end ---" >> "$LOG"
          cat "$LOG"

      - name: Upload validator log
        uses: actions/upload-artifact@v4
        with:
          name: gcp-auth-validator-log
          path: /tmp/gcp_auth_validator.log
