name: Staging Cluster Health & Auto-Heal

on:
  # Converted to event-driven: removed frequent polling
  workflow_dispatch: {}
  repository_dispatch:
    types: [staging-health-check, staging-heal-trigger]

permissions:
  contents: read
  issues: write
  actions: write

permissions:
  contents: read
  issues: write

jobs:
  check-api:
    name: Check Kubernetes API
    runs-on: ubuntu-latest
    outputs:
      reachable: ${{ steps.c.api_reachable }}
    steps:
      - name: Test TCP connectivity to API server
        id: c
        run: |
          if nc -z 192.168.168.42 6443; then
            echo "api_reachable=true" >> $GITHUB_OUTPUT
            echo "API server reachable"
          else
            echo "api_reachable=false" >> $GITHUB_OUTPUT
            echo "API server unreachable"
            exit 1
          fi

  try-heal:
    name: Attempt Auto-Heal
    needs: [check-api]
    runs-on: ubuntu-latest
    if: needs.check-api.outputs.reachable == 'false'
    steps:
      - name: Report problem to issue #343
        run: |
          gh issue comment 343 --repo ${{ github.repository }} --body "🛠️ Staging API unreachable. Running auto-heal steps now." || true

      - name: Attempt SSH restart (if key present)
        if: ${{ secrets.DEPLOY_SSH_KEY != '' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/ssh
          echo "$DEPLOY_SSH_KEY" > /tmp/ssh/id_rsa
          chmod 600 /tmp/ssh/id_rsa
          ssh -o StrictHostKeyChecking=no -i /tmp/ssh/id_rsa admin@192.168.168.42 \
            'sudo systemctl restart k3s && sleep 10 && sudo systemctl status k3s' || true

      - name: Record attempt
        run: |
          gh issue comment 343 --repo ${{ github.repository }} --body "Auto-heal attempt complete. See run ${{ github.run_id }} for details." || true
