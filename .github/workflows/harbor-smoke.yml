name: Harbor Chart Smoke

on:
  pull_request:
    paths:
      - 'deploy/harbor/**'

jobs:
  helm-lint-template:
    name: Helm lint + template
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: harbor-smoke-helm-lint-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Helm lint
        run: |
          helm lint deploy/harbor

      - name: Helm template
        run: |
          helm template harbor deploy/harbor --values deploy/harbor/values.yaml
