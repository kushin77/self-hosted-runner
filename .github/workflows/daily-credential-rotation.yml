name: Daily Credential Rotation & Validation

# Full rotation of all credentials daily with comprehensive validation
on:
  schedule:
    - cron: '2 0 * * *'  # 2 AM UTC daily
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  issues: write
  secrets: write

env:
  GCP_PROJECT_ID: ${{ steps.cred_gcp_project_id.outputs.credential }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ steps.cred_gcp_workload_identity_provider.outputs.credential }}
  GCP_SERVICE_ACCOUNT: ${{ steps.cred_gcp_service_account.outputs.credential }}
  VAULT_ADDR: ${{ steps.cred_vault_addr.outputs.credential }}
  AWS_KMS_KEY_ID: ${{ steps.cred_aws_kms_key_id.outputs.credential }}

jobs:
  daily-rotation:
    name: Daily Credential Rotation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize Rotation
        id: init
      - name: Get Credential [AWS_KMS_KEY_ID]
        id: cred_aws_kms_key_id
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: AWS_KMS_KEY_ID
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_PROJECT_ID]
        id: cred_gcp_project_id
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_PROJECT_ID
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_SERVICE_ACCOUNT]
        id: cred_gcp_service_account
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_SERVICE_ACCOUNT
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_WORKLOAD_IDENTITY_PROVIDER]
        id: cred_gcp_workload_identity_provider
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_WORKLOAD_IDENTITY_PROVIDER
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [VAULT_ADDR]
        id: cred_vault_addr
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: VAULT_ADDR
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

        run: |
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          ROTATION_ID=$(uuidgen)
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "rotation_id=$ROTATION_ID" >> $GITHUB_OUTPUT
          echo "🔄 Daily Rotation ($ROTATION_ID) started"

      - name: Authenticate to GCP
        id: gcp-auth
        uses: google-github-actions/auth@v2
        continue-on-error: true
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Rotate GSM Credentials
        id: gsm-rotation
        continue-on-error: true
        run: |
          set +e
          echo "Rotating GSM credentials..."

          ROTATED=0
          FAILED=0

          # Get all ephemeral managed secrets
          SECRETS=$(gcloud secrets list \
            --project="$GCP_PROJECT_ID" \
            --filter='labels.ephemeral_managed=true AND labels.rotation_enabled=true' \
            --format='value(name)' 2>/dev/null)

          for SECRET in $SECRETS; do
            echo "  Rotating $SECRET..."

            # Generate new version
            NEW_VALUE=$(openssl rand -hex 32)

            if echo -n "$NEW_VALUE" | gcloud secrets versions add "$SECRET" \
              --data-file=/dev/stdin \
              --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
              ((ROTATED++))

              # Destroy old versions (keep only latest 3)
              VERSIONS=$(gcloud secrets versions list "$SECRET" \
                --project="$GCP_PROJECT_ID" \
                --sort-by=created \
                --format='value(name)' | tail -n +4)

              for VERSION in $VERSIONS; do
                gcloud secrets versions destroy "$VERSION" \
                  --secret="$SECRET" \
                  --project="$GCP_PROJECT_ID" \
                  --quiet 2>/dev/null || true
              done
            else
              ((FAILED++))
            fi
          done

          echo "gsm_rotated=$ROTATED" >> $GITHUB_OUTPUT
          echo "gsm_failed=$FAILED" >> $GITHUB_OUTPUT
          echo "✅ Rotated $ROTATED GSM secrets ($FAILED failures)"

      - name: Test Credential Retrieval
        id: test-retrieval
        continue-on-error: true
        run: |
          echo "Testing credential retrieval..."

          TEST_COUNT=0
          SUCCESS_COUNT=0

          # Test a few critical credentials
          for CRED in TERRAFORM_BACKEND_PASSWD GITHUB_DEPLOY_KEY AWS_ACCESS_KEY_ID; do
            ((TEST_COUNT++))

            if CRED_VALUE=$(gcloud secrets versions access latest --secret="$CRED" \
              --project="$GCP_PROJECT_ID" 2>/dev/null); then
              if [ -n "$CRED_VALUE" ]; then
                ((SUCCESS_COUNT++))
                echo "  ✅ $CRED retrieval successful"
              fi
            fi
          done

          echo "test_success_rate=$(( (SUCCESS_COUNT * 100) / TEST_COUNT ))%" >> $GITHUB_OUTPUT
          echo "✅ Retrieval tests: $SUCCESS_COUNT/$TEST_COUNT passed"

      - name: Validate Backup & Recovery
        id: backup-validation
        continue-on-error: true
        run: |
          echo "Validating backup and recovery procedures..."

          # Test that backup exists and is recent
          BACKUP_CHECK=$(find . -name "*backup*" -type f -mtime -1 2>/dev/null | wc -l)

          if [ $BACKUP_CHECK -gt 0 ]; then
            echo "backup_valid=true" >> $GITHUB_OUTPUT
            echo "✅ Recent backups found"
          else
            echo "backup_valid=false" >> $GITHUB_OUTPUT
            echo "⚠️  No recent backups detected"
          fi

      - name: Security Scanning
        id: security-scan
        continue-on-error: true
        run: |
          echo "Running security scans..."

          # Check for any hardcoded secrets in code
          SECRETS_FOUND=0

          if grep -r "password\s*=" . --include="*.sh" --include="*.yml" \
            | grep -v "^Binary" | grep -v ".git" | grep -v "example"; then
            ((SECRETS_FOUND++))
            echo "⚠️  Potential hardcoded secrets detected in scripts"
          fi

          echo "secrets_found=$SECRETS_FOUND" >> $GITHUB_OUTPUT

      - name: Generate Rotation Report
        id: report
        run: |
          TIMESTAMP="${{ steps.init.outputs.timestamp }}"
          ROTATION_ID="${{ steps.init.outputs.rotation_id }}"

          echo "{
            \"rotation_id\": \"$ROTATION_ID\",
            \"timestamp\": \"$TIMESTAMP\",
            \"gsm_rotated\": ${{ steps.gsm-rotation.outputs.gsm_rotated || 0 }},
            \"gsm_failed\": ${{ steps.gsm-rotation.outputs.gsm_failed || 0 }},
            \"retrieval_success_rate\": \"${{ steps.test-retrieval.outputs.test_success_rate }}\",
            \"backup_valid\": ${{ steps.backup-validation.outputs.backup_valid }},
            \"secrets_found\": ${{ steps.security-scan.outputs.secrets_found || 0 }},
            \"status\": \"complete\"
          }" > daily-rotation-report-$ROTATION_ID.json

      - name: Report Status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('daily-rotation-report-${{ steps.init.outputs.rotation_id }}.json', 'utf8'));

            github.rest.issues.createComment({
              issue_number: 1974,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📊 **Daily Credential Rotation Report**\n\n` +
                    `- Rotation ID: \`${{ steps.init.outputs.rotation_id }}\`\n` +
                    `- GSM Rotated: ${{ steps.gsm-rotation.outputs.gsm_rotated || 0 }}\n` +
                    `- Retrieval Success: ${{ steps.test-retrieval.outputs.test_success_rate }}\n` +
                    `- Backup Valid: ${{ steps.backup-validation.outputs.backup_valid }}\n` +
                    `- Secrets Detected: ${{ steps.security-scan.outputs.secrets_found || 0 }}\n`
            })

      - name: Success Summary
        run: |
          echo "✅ Daily rotation complete"
          echo "  Rotation ID: ${{ steps.init.outputs.rotation_id }}"
          echo "  Rotated: ${{ steps.gsm-rotation.outputs.gsm_rotated || 0 }} credentials"
          echo "  Retrieval: ${{ steps.test-retrieval.outputs.test_success_rate }}"
