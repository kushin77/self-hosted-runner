name: CI - Airgap Image Validation

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  validate-images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install docker
        uses: docker/setup-buildx-action@v2

      - name: Generate manifest
        run: |
          mkdir -p build
          ./scripts/airgap/generate_image_manifest.sh > /tmp/airgap-manifest.yml

      - name: Pull images (light check)
        run: |
          set -euo pipefail
          imgs=$(grep -E "^\s*image:\s*" -h /tmp/airgap-manifest.yml | sed -E 's/^[[:space:]]*image:[[:space:]]*//')
          for img in $imgs; do
            echo "Pulling $img"
            docker pull "$img" || (echo "Failed to pull $img"; exit 1)
          done

      - name: Save first image to tar (sanity)
        run: |
          first=$(grep -E "^\s*image:\s*" -h /tmp/airgap-manifest.yml | sed -E 's/^[[:space:]]*image:[[:space:]]*//' | head -n1)
          if [ -n "$first" ]; then
            docker save -o build/first_image.tar "$first"
            ls -lh build/first_image.tar
          fi
