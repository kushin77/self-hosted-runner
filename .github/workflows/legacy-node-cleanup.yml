name: Legacy Node Cleanup

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirmation token to run cleanup'
        required: false

  workflow_call: {}

concurrency:
  group: legacy-node-cleanup-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true


      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 192.168.168.31 >> ~/.ssh/known_hosts || true

      - name: Setup Python (for Ansible)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible

      - name: Run legacy cleanup playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
        run: |
          set -euo pipefail
          echo "Running cleanup playbook against legacy inventory"
          ansible-playbook ansible/playbooks/cleanup-legacy-node.yml -i ansible/inventory/legacy -u cloud --private-key ~/.ssh/id_ed25519 -v --diff || true

      - name: Collect logs
        if: always()
        run: |
          mkdir -p /tmp/legacy-cleanup-artifacts
          journalctl -n 200 > /tmp/legacy-cleanup-artifacts/journal.log || true
          tar -czf /tmp/legacy-cleanup-artifacts/legacy-cleanup-logs.tar.gz /tmp/legacy-cleanup-artifacts || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: legacy-cleanup-logs
          path: /tmp/legacy-cleanup-artifacts/legacy-cleanup-logs.tar.gz
