name: Legacy Node Cleanup Automation

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "CLEANUP_LEGACY_NODE" to confirm'
        required: true
  issue_comment:
    types: [created]

jobs:
  cleanup:
    name: Cleanup legacy node 192.168.168.31
    runs-on: [self-hosted, linux]
    concurrency:
      group: legacy-node-cleanup
      cancel-in-progress: false
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'CLEANUP_LEGACY_NODE') ||
      (github.event_name == 'issue_comment' && 
       github.issue.number == 787 && 
       contains(github.event.comment.body, 'cleanup:execute') &&
       github.event.comment.author_association == 'OWNER')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify authorization
        run: |
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            if [[ "${{ github.event.comment.author_association }}" != "OWNER" ]]; then
              echo \"❌ Only repository owners can trigger cleanup\"
              exit 1
            fi
          fi

      - name: Run legacy node cleanup
        run: |
          bash scripts/automation/cleanup-legacy-node.sh

      - name: Upload cleanup log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-node-cleanup-log
          path: legacy-node-cleanup-*.log

      - name: Comment on issue with results
        if: github.event_name == 'issue_comment' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const status = context.job.status === 'completed' ? '✅ Success' : '❌ Failed';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${status}: Legacy node cleanup completed. See workflow run for details.`
            });

      - name: Auto-close issue on success
        if: github.event_name == 'issue_comment' && success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              state_reason: 'completed'
            });
