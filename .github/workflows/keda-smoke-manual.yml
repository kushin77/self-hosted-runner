name: KEDA Smoke Test — Manual Dispatch

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging/prod)'
        required: true
        default: staging

jobs:
  keda-smoke:
    name: Run KEDA smoke-tests (manual)
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug: list scripts (diagnostic)
        run: |
          echo "PWD: $(pwd)"
          ls -la scripts || true

      - name: Run smoke-test script if present
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: bash -lc 'if [ -x ./scripts/keda-smoke.sh ]; then ./scripts/keda-smoke.sh "$ENVIRONMENT"; else echo "No scripts/keda-smoke.sh found; run smoke tests manually."; fi'
