---
name: CD - Release Promotion (gated)
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["CI - Release Gate Verification"]
    types:
      - completed

jobs:
  promote:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to target registry
        if: ${{ secrets.TARGET_REGISTRY_USERNAME && secrets.TARGET_REGISTRY_PASSWORD }}
        uses: docker/login-action@v2
        with:
          registry: ${{ env.TARGET_REGISTRY }}
          username: ${{ secrets.TARGET_REGISTRY_USERNAME }}
          password: ${{ secrets.TARGET_REGISTRY_PASSWORD }}

      - name: Promote images
        env:
          TARGET_REGISTRY: ${{ env.TARGET_REGISTRY }}
        run: |
          # Generate manifest
          ./scripts/airgap/generate_image_manifest.sh > /tmp/airgap-manifest.yml
          chmod +x scripts/supplychain/promote_release.sh
          ./scripts/supplychain/promote_release.sh /tmp/airgap-manifest.yml "${{ env.TARGET_REGISTRY }}"

      - name: Notify success
        run: echo "Release promotion completed"
