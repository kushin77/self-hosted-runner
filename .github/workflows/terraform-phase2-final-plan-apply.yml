name: "Terraform Phase 2: Final Plan/Apply"
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      auto_apply:
        description: 'Auto-apply after plan approval'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      varfile_source:
        description: 'Variable source (github-secrets or minio)'
        required: false
        default: 'github-secrets'
        type: choice
        options:
          - 'github-secrets'
          - 'minio'

jobs:
  setup:
    name: Setup Phase 2 Plan/Apply
    runs-on: ubuntu-latest
    outputs:
      plan_file: terraform-phase2-${{ github.run_id }}.tfplan
      plan_summary: terraform-phase2-summary-${{ github.run_id }}.txt
    steps:
      - name: Validate workflow dispatch inputs
        run: |
          echo "::notice::Terraform Phase 2 Final Plan/Apply"
          echo "::notice::Auto-apply: ${{ github.event.inputs.auto_apply }}"
          echo "::notice::Variable source: ${{ github.event.inputs.varfile_source }}"

  fetch-aws-creds:
    name: Fetch AWS Credentials from GSM
    needs: [setup]
    uses: ./.github/workflows/fetch-aws-creds-from-gsm.yml
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  terraform-plan:
    name: Terraform Plan (Full Repository)
    needs: [setup, fetch-aws-creds]
    runs-on: [self-hosted, linux, self-hosted-heavy]
    concurrency:
      group: terraform-phase2-plan-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Terraform
        run: |
          set -euo pipefail
          echo "::group::Install Terraform"
          TF_VERSION=1.5.7
          mkdir -p /tmp/terraform-setup
          curl -fsSL https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip -o /tmp/terraform-setup/terraform.zip
          unzip -o /tmp/terraform-setup/terraform.zip -d /usr/local/bin/
          terraform version
          echo "::endgroup::"

      - name: Configure GCP credentials for GCS backend
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY || secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          set -euo pipefail
          echo "::group::Configure GCP credentials"
          if [ -z "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "::warning::GCP SA key not available; backend may not authenticate"
          else
            echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/gcp-sa.json
            export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json" >> $GITHUB_ENV
          fi
          echo "::endgroup::"

      - name: Prepare terraform variables (GitHub Secrets)
        if: github.event.inputs.varfile_source == 'github-secrets' || github.event.inputs.varfile_source == ''
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || needs.fetch-aws-creds.outputs.aws_region }}
          VPC_ID: ${{ secrets.TERRAFORM_VPC_ID }}
          SUBNET_IDS: ${{ secrets.TERRAFORM_SUBNET_IDS }}
          RUNNER_TOKEN: ${{ secrets.TERRAFORM_RUNNER_TOKEN }}
          GITHUB_OWNER: ${{ secrets.TERRAFORM_GITHUB_OWNER || github.repository_owner }}
          GITHUB_REPO: ${{ secrets.TERRAFORM_GITHUB_REPO || github.event.repository.name }}
          PROJECT_NAME: ${{ secrets.TERRAFORM_PROJECT_NAME || 'elevatediq-runners' }}
          ENVIRONMENT: ${{ secrets.TERRAFORM_ENVIRONMENT || 'prod' }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'gcp-eiq' }}
          GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
          BUCKET_PREFIX: ${{ secrets.GCP_BUCKET_PREFIX || 'vault-data-gcp' }}
        run: |
          set -euo pipefail
          echo "::group::Generate terraform.tfvars from GitHub Secrets"
          cat > terraform/terraform.tfvars <<'EOF'
          # Auto-generated from GitHub Secrets for Phase 2 Terraform Plan/Apply
          # Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # AWS Variables
          aws_region = "${AWS_REGION}"
          vpc_id = "${VPC_ID}"
          subnet_ids = ${SUBNET_IDS}
          runner_token = "${RUNNER_TOKEN}"
          
          # GitHub Variables
          github_owner = "${GITHUB_OWNER}"
          github_repo = "${GITHUB_REPO}"
          
          # Project Variables
          project_name = "${PROJECT_NAME}"
          environment = "${ENVIRONMENT}"
          
          # GCP Variables (for gcp-vault module)
          project_id = "${GCP_PROJECT_ID}"
          region = "${GCP_REGION}"
          bucket_prefix = "${BUCKET_PREFIX}"
          EOF
          
          # Validate that critical variables are set
          if [ -z "$VPC_ID" ] || [ -z "$RUNNER_TOKEN" ]; then
            echo "::error::Critical variables missing (VPC_ID, RUNNER_TOKEN). Ensure GitHub Secrets are configured."
            exit 1
          fi
          
          echo "::notice::terraform.tfvars generated successfully"
          echo "::endgroup::"

      - name: Download terraform variables from MinIO
        if: github.event.inputs.varfile_source == 'minio'
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          set -euo pipefail
          echo "::group::Download terraform.tfvars from MinIO"
          chmod +x scripts/minio/download.sh scripts/minio/install-mc.sh
          source .github/scripts/resilience.sh || true
          retry_command 3 5 ./scripts/minio/download.sh --bucket "${{ secrets.MINIO_BUCKET }}" --object "terraform/terraform.tfvars" --out terraform/terraform.tfvars
          echo "::notice::terraform.tfvars downloaded from MinIO"
          echo "::endgroup::"

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
          AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          set -euo pipefail
          echo "::group::Terraform Init"
          source ../.github/scripts/resilience.sh || true
          retry_command 3 5 terraform init -input=false
          echo "::endgroup::"

      - name: Terraform Validate
        working-directory: terraform
        run: |
          set -euo pipefail
          echo "::group::Terraform Validate"
          terraform validate
          echo "::endgroup::"

      - name: Terraform Plan (Full Repository)
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
          AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          set -euo pipefail
          echo "::group::Terraform Plan"
          terraform plan \
            -input=false \
            -var-file=terraform.tfvars \
            -out=${{ needs.setup.outputs.plan_file }}
          
          # Generate plan summary
          terraform show -no-color ${{ needs.setup.outputs.plan_file }} > ${{ needs.setup.outputs.plan_summary }}
          
          # Count changes
          RESOURCE_CHANGES=$(terraform show -json ${{ needs.setup.outputs.plan_file }} | grep -o '"actions":\["create"\]\|"actions":\["update"\]\|"actions":\["delete"\]' | wc -l)
          echo "::notice::Resource changes detected: $RESOURCE_CHANGES"
          echo "TERRAFORM_CHANGES=$RESOURCE_CHANGES" >> $GITHUB_ENV
          echo "::endgroup::"

      - name: Display Plan Summary
        if: always()
        working-directory: terraform
        run: |
          echo "::group::Terraform Plan Summary"
          if [ -f "${{ needs.setup.outputs.plan_summary }}" ]; then
            head -100 "${{ needs.setup.outputs.plan_summary }}"
            echo ""
            echo "... (showing first 100 lines)"
          fi
          echo "::endgroup::"

      - name: Upload terraform plan artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-phase2-plan
          path: terraform/${{ needs.setup.outputs.plan_file }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload terraform plan summary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-phase2-summary
          path: terraform/${{ needs.setup.outputs.plan_summary }}
          retention-days: 30
          if-no-files-found: error

      - name: Upload plan to MinIO for audit
        if: success()
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          set -euo pipefail
          echo "::group::Upload plan to MinIO"
          chmod +x scripts/minio/upload.sh scripts/minio/install-mc.sh
          source .github/scripts/resilience.sh || true
          
          # Upload plan file
          retry_command 3 5 ./scripts/minio/upload.sh \
            --file terraform/${{ needs.setup.outputs.plan_file }} \
            --bucket "${{ secrets.MINIO_BUCKET }}" \
            --object "terraform/plans/${{ needs.setup.outputs.plan_file }}"
          
          # Upload summary
          retry_command 3 5 ./scripts/minio/upload.sh \
            --file terraform/${{ needs.setup.outputs.plan_summary }} \
            --bucket "${{ secrets.MINIO_BUCKET }}" \
            --object "terraform/plans/${{ needs.setup.outputs.plan_summary }}"
          
          echo "::notice::Plan uploaded to MinIO for audit"
          echo "::endgroup::"

      - name: Fail if plan contains errors
        if: failure()
        run: |
          echo "::error::Terraform plan failed. Review logs above for details."
          exit 1

  terraform-apply:
    name: Terraform Apply (Full Repository)
    needs: [setup, fetch-aws-creds, terraform-plan]
    if: |
      success() && 
      github.event.inputs.auto_apply == 'true' && 
      github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, self-hosted-heavy]
    concurrency:
      group: terraform-phase2-apply-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    environment: production  # Require approval via GitHub Environments
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download terraform plan artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-phase2-plan

      - name: Setup Terraform
        run: |
          set -euo pipefail
          echo "::group::Install Terraform"
          TF_VERSION=1.5.7
          mkdir -p /tmp/terraform-setup
          curl -fsSL https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip -o /tmp/terraform-setup/terraform.zip
          unzip -o /tmp/terraform-setup/terraform.zip -d /usr/local/bin/
          terraform version
          echo "::endgroup::"

      - name: Configure GCP credentials for GCS backend
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY || secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          set -euo pipefail
          if [ -n "$GOOGLE_APPLICATION_CREDENTIALS_JSON" ]; then
            echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/gcp-sa.json
            echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa.json" >> $GITHUB_ENV
          fi

      - name: Prepare terraform variables
        env:
          AWS_REGION: ${{ secrets.AWS_REGION || needs.fetch-aws-creds.outputs.aws_region }}
          VPC_ID: ${{ secrets.TERRAFORM_VPC_ID }}
          SUBNET_IDS: ${{ secrets.TERRAFORM_SUBNET_IDS }}
          RUNNER_TOKEN: ${{ secrets.TERRAFORM_RUNNER_TOKEN }}
          GITHUB_OWNER: ${{ secrets.TERRAFORM_GITHUB_OWNER || github.repository_owner }}
          GITHUB_REPO: ${{ secrets.TERRAFORM_GITHUB_REPO || github.event.repository.name }}
          PROJECT_NAME: ${{ secrets.TERRAFORM_PROJECT_NAME || 'elevatediq-runners' }}
          ENVIRONMENT: ${{ secrets.TERRAFORM_ENVIRONMENT || 'prod' }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID || 'gcp-eiq' }}
          GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
          BUCKET_PREFIX: ${{ secrets.GCP_BUCKET_PREFIX || 'vault-data-gcp' }}
        run: |
          set -euo pipefail
          cat > terraform/terraform.tfvars <<'EOF'
          # Auto-generated from GitHub Secrets for Phase 2 Terraform Apply
          # Generated: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          aws_region = "${AWS_REGION}"
          vpc_id = "${VPC_ID}"
          subnet_ids = ${SUBNET_IDS}
          runner_token = "${RUNNER_TOKEN}"
          github_owner = "${GITHUB_OWNER}"
          github_repo = "${GITHUB_REPO}"
          project_name = "${PROJECT_NAME}"
          environment = "${ENVIRONMENT}"
          project_id = "${GCP_PROJECT_ID}"
          region = "${GCP_REGION}"
          bucket_prefix = "${BUCKET_PREFIX}"
          EOF

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
          AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          set -euo pipefail
          source ../.github/scripts/resilience.sh || true
          retry_command 3 5 terraform init -input=false

      - name: Verify plan file integrity
        run: |
          if [ ! -f "${{ needs.setup.outputs.plan_file }}" ]; then
            echo "::error::Plan file not found. Aborting apply."
            exit 1
          fi
          echo "::notice::Plan file verified"

      - name: Terraform Apply (with saved plan)
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
          AWS_REGION: ${{ needs.fetch-aws-creds.outputs.aws_region }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          set -euo pipefail
          echo "::group::Terraform Apply"
          source ../.github/scripts/resilience.sh || true
          
          PLAN_FILE="../${{ needs.setup.outputs.plan_file }}"
          if [ ! -f "$PLAN_FILE" ]; then
            echo "::error::Plan file not found at $PLAN_FILE"
            exit 1
          fi
          
          retry_command 2 10 terraform apply -input=false -auto-approve "$PLAN_FILE"
          echo "::notice::Terraform apply completed successfully"
          echo "::endgroup::"

      - name: Capture apply output
        if: always()
        working-directory: terraform
        run: |
          set -euo pipefail
          terraform show -no-color > terraform-apply-output.txt || true
          echo "::group::Apply Output Summary"
          head -50 terraform-apply-output.txt || true
          echo "::endgroup::"

      - name: Upload apply output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-apply-output
          path: terraform/terraform-apply-output.txt
          retention-days: 30

  notify-on-completion:
    name: Notify Plan/Apply Completion
    needs: [setup, terraform-plan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write completion summary
        run: |
          cat > completion-summary.md <<'EOF'
          ## Terraform Phase 2 Plan/Apply Summary
          
          **Workflow ID:** ${{ github.run_id }}
          **Status:** ${{ job.status }}
          **Triggered by:** ${{ github.actor }}
          **Branch:** ${{ github.ref }}
          
          ### Plan Results
          - Plan Status: ${{ needs.terraform-plan.result }}
          - Artifacts Available: plan, summary
          
          ### Next Steps
          1. Review the uploaded plan artifacts
          2. If auto-apply is enabled and approved, apply will execute automatically
          3. Monitor infrastructure provisioning
          4. Verify in AWS and GCP consoles
          
          **Artifacts:** Check GitHub Actions artifacts for plan details.
          EOF
          cat completion-summary.md

      - name: Upload completion summary
        uses: actions/upload-artifact@v4
        with:
          name: phase2-completion-summary
          path: completion-summary.md
          retention-days: 30