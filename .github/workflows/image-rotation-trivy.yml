name: Image Build, Scan & Rotate on CVE Detection

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  build-scan-rotate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build runner image
        run: |
          IMAGE_TAG=$(date +%Y%m%d-%H%M%S)
          docker build -t runner-image:${IMAGE_TAG} -t runner-image:latest .
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV
          echo "IMAGE_NAME=ghcr.io/${{ github.repository }}-runner" >> $GITHUB_ENV
      
      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: runner-image:latest
          format: sarif
          output: trivy-results.sarif
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: 'trivy'
      
      - name: Parse Trivy results and check threshold
        id: check-cves
        run: |
          # Extract HIGH and CRITICAL CVE count from Trivy output
          HIGH=$(grep -o '"Severity": "HIGH"' trivy-results.sarif | wc -l || echo 0)
          CRITICAL=$(grep -o '"Severity": "CRITICAL"' trivy-results.sarif | wc -l || echo 0)
          TOTAL=$((HIGH + CRITICAL))
          
          echo "high_cves=${HIGH}" >> $GITHUB_OUTPUT
          echo "critical_cves=${CRITICAL}" >> $GITHUB_OUTPUT
          echo "total_cves=${TOTAL}" >> $GITHUB_OUTPUT
          
          if [ $TOTAL -gt 0 ]; then
            echo "trigger_rotation=true" >> $GITHUB_OUTPUT
          else
            echo "trigger_rotation=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Log CVE check
        run: |
          echo "HIGH: ${{ steps.check-cves.outputs.high_cves }}"
          echo "CRITICAL: ${{ steps.check-cves.outputs.critical_cves }}"
          echo "Total: ${{ steps.check-cves.outputs.total_cves }}"
          echo "Trigger Rotation: ${{ steps.check-cves.outputs.trigger_rotation }}"
      
      - name: Push image to registry (if rotation needed)
        if: steps.check-cves.outputs.trigger_rotation == 'true'
        run: |
          echo "Threshold exceeded. Image rotation triggered"
          echo "In production: push image to OCI registry and tag as latest"
          # docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          # docker push ${{ env.IMAGE_NAME }}:latest
      
      - name: Update Terraform infra to use new image
        if: steps.check-cves.outputs.trigger_rotation == 'true'
        run: |
          echo "Updating infra/aws/spot/variables.tf and infra/azure/azure_scale_set/variables.tf with new image"
          
          # Example: update AMI/image reference in Terraform vars
          # In production, this would fetch the latest image from registry and update Terraform variables
          # Then run `terraform plan` and if successful, apply
          
          echo "NEW_IMAGE=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" >> $GITHUB_ENV
      
      - name: Plan Terraform changes
        if: steps.check-cves.outputs.trigger_rotation == 'true'
        run: |
          echo "Running Terraform plan for updated images"
          # terraform -chdir=infra/aws/spot plan -var image_uri=${{ env.NEW_IMAGE }} -out=tfplan
          # terraform -chdir=infra/azure/azure_scale_set plan -var image_uri=${{ env.NEW_IMAGE }} -out=tfplan
      
      - name: Create PR if changes detected
        if: steps.check-cves.outputs.trigger_rotation == 'true'
        run: |
          echo "Creating PR for image rotation"
          BRANCH="image-rotation-$(date +%s)"
          # git switch -c "$BRANCH"
          # git add infra/
          # git commit -m "chore(image): rotate runner image due to CVE detection (HIGH: ${{ steps.check-cves.outputs.high_cves }}, CRITICAL: ${{ steps.check-cves.outputs.critical_cves }})"
          # git push -u origin "$BRANCH"
          # gh pr create --title "Image rotation: address CVEs" --body-file /tmp/rotation_pr.md
