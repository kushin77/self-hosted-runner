name: Portal Metadata Validate

on:
  pull_request:
    paths:
      - '**/metadata.yml'
      - '**/metadata.yaml'
      - '**/function-metadata.yaml'
      - 'portal-sync/**'
  push:
    paths:
      - '**/metadata.yml'
      - '**/metadata.yaml'
      - '**/function-metadata.yaml'
      - 'portal-sync/**'

jobs:
  validate:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: portal-sync-validate-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v6
      - name: Install Python (self-hosted)
        if: contains(runner.labels, 'self-hosted')
        run: |
          chmod +x ci/scripts/setup-python.sh
          ci/scripts/setup-python.sh 3.11
      - name: Set up Python (hosted fallback)
        if: not(contains(runner.labels, 'self-hosted'))
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install pyyaml jsonschema
      - name: Run metadata validator
        run: |
          python3 scripts/generate_function_metadata.py --validate --output portal-artifact.json
      - name: Upload portal artifact to MinIO
        run: |
          set -euo pipefail
          chmod +x scripts/minio/upload.sh scripts/minio/install-mc.sh
          scripts/minio/upload.sh --file portal-artifact.json --bucket "${{ secrets.MINIO_BUCKET }}" --object "portal-artifact-${{ github.run_id }}.json"
