name: Portal Metadata Validate

on:
  pull_request:
    paths:
      - '**/metadata.yml'
      - '**/metadata.yaml'
      - '**/function-metadata.yaml'
      - 'portal-sync/**'
  push:
    paths:
      - '**/metadata.yml'
      - '**/metadata.yaml'
      - '**/function-metadata.yaml'
      - 'portal-sync/**'

jobs:
  validate:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: portal-sync-validate-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: [self-hosted, linux]
    env:
      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
    steps:
      - uses: actions/checkout@v4
        - name: Load resilience utilities
          run: source .github/scripts/resilience.sh
      - name: Install Python (self-hosted)
        if: contains(runner.labels, 'self-hosted')
        run: |
          chmod +x ci/scripts/setup-python.sh
          ci/scripts/setup-python.sh 3.11
      - name: Set up Python (hosted fallback)
        if: ${{ !contains(runner.labels, 'self-hosted') }}
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install pyyaml jsonschema
      - name: Run metadata validator
        run: |
          python3 scripts/generate_function_metadata.py --validate --output portal-artifact.json
      - name: Upload portal artifact to MinIO (self-hosted)
        if: contains(runner.labels, 'self-hosted')
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true
          chmod +x ci/scripts/upload_to_minio.sh
          retry_command 3 5 ci/scripts/upload_to_minio.sh portal-artifact.json "portal-artifact-${{ github.run_id }}.json"
      - name: Upload portal artifact (hosted fallback)
        if: ${{ !contains(runner.labels, 'self-hosted') }}
        uses: actions/upload-artifact@v4
        with:
          name: portal-artifact-${{ github.run_id }}
          path: portal-artifact.json
