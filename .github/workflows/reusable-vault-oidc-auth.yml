name: Reusable Vault OIDC Auth

on:
  workflow_call:
    inputs:
      vault-addr:
        description: 'Vault Address'
        required: true
        type: string
    outputs:
      vault-token:
        description: 'Vault Token'
        value: ${{ jobs.auth.outputs.vault-token }}

permissions:
  id-token: write
  contents: read

jobs:
  auth:
    runs-on: ubuntu-latest
    outputs:
      vault-token: ${{ steps.vault-auth.outputs.vault-token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Ephemeral Credentials
        uses: kushin77/get-ephemeral-credential@v1
        id: creds
        with:
          credential-names: |
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_SERVICE_ACCOUNT
          retrieve-from: 'auto'

      - name: Authenticate to GCP
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.creds.outputs.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ steps.creds.outputs.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Vault Auth
        id: vault-auth
        run: |
          echo "vault-token=placeholder-token" >> $GITHUB_OUTPUT
