---
name: Self-hosted Runner Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run diagnostics
        run: |
          mkdir -p runner-diagnostics
          uptime > runner-diagnostics/uptime.txt || true
          df -h > runner-diagnostics/disk.txt || true
          free -m > runner-diagnostics/mem.txt || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: runner-diagnostics-${{ github.run_id }}
          path: runner-diagnostics
