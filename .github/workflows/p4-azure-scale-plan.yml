name: P4 - Azure Scale Set Plan (dry-run)

on:
  workflow_dispatch: {}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            terraform/examples/azure-scale/.terraform
          key: ${{ runner.os }}-terraform-azure-scale-${{ hashFiles('**/terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-azure-scale-

      - name: Terraform Init
        working-directory: terraform/examples/azure-scale
        run: |
          terraform init -input=false

      - name: Terraform fmt (check)
        working-directory: terraform/examples/azure-scale
        run: |
          terraform fmt -check -recursive || (terraform fmt -recursive && echo 'Ran terraform fmt')

      - name: Terraform Validate
        working-directory: terraform/examples/azure-scale
        run: |
          terraform validate || true

      - name: Terraform Plan
        working-directory: terraform/examples/azure-scale
        run: |
          terraform plan -out=azure-scale.tfplan -input=false

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: azure-scale-plan
          path: terraform/examples/azure-scale/azure-scale.tfplan
