name: Observability E2E On Completion
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_run:
    workflows:
      - Observability E2E Schedule
    types:
      - completed

jobs:
  on-success:
    name: Trigger postprocess on E2E completion
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger postprocess workflow
        run: |
          gh workflow run observability-e2e-postprocess.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref "$GITHUB_REF_NAME" \
            -f "run_id=${{ github.event.workflow_run.id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
