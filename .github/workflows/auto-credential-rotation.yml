name: Auto-Credential Rotation (No-Ops)
description: Fully automated, hands-off credential rotation every 15 minutes
on:
  schedule:
    # Every 15 minutes (ephemeral refresh cycle)
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation to perform'
        required: true
        default: 'rotate'
        type: choice
        options:
          - rotate
          - health

concurrency:
  group: auto-credential-rotation
  cancel-in-progress: false

jobs:
  credential-rotation:
    name: Rotate Credentials (No-Ops)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Import Environment Variables
        run: |
          # From GitHub repository secrets (operator-provided)
          echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> $GITHUB_ENV
          echo "VAULT_ADDR=${{ secrets.VAULT_ADDR }}" >> $GITHUB_ENV
          echo "AWS_ROLE_TO_ASSUME=${{ secrets.AWS_ROLE_TO_ASSUME }}" >> $GITHUB_ENV
          echo "GCP_WORKLOAD_IDENTITY_PROVIDER=${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" >> $GITHUB_ENV
          
          # Session ID for audit trail linkage
          echo "AUDIT_SESSION_ID=rotation-$(date +%s | cut -c6-)" >> $GITHUB_ENV
      
      - name: Rotate Credentials (Ephemeral)
        run: |
          chmod +x scripts/auto-credential-rotation.sh
          
          operation="${{ github.event.inputs.operation }}"
          if [ "$operation" == "health" ]; then
            ./scripts/auto-credential-rotation.sh health
          else
            ./scripts/auto-credential-rotation.sh rotate
          fi
        env:
          GCP_PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          VAULT_ADDR: ${{ env.VAULT_ADDR }}
          AWS_ROLE_TO_ASSUME: ${{ env.AWS_ROLE_TO_ASSUME }}
      
      - name: Verify Audit Trail Integrity
        if: success()
        run: |
          python3 scripts/immutable-audit.py verify
      
      - name: Upload Audit Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs-${{ env.AUDIT_SESSION_ID }}
          path: .audit-logs/
          retention-days: 30
      
      - name: Health Check (Every Hour)
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        run: |
          ./scripts/auto-credential-rotation.sh health
