name: Auto Credential Rotation (15-min Cycle)
on:
  schedule:
    # Every 15 minutes (4x per hour)
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  rotate-credentials:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      issues: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run credential rotation
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE: ${{ secrets.VAULT_ROLE }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "🔄 Starting credential rotation cycle..."
          
          # Run rotation orchestrator
          ./scripts/auto-credential-rotation.sh rotate || {
            echo "⚠️ Rotation cycle completed with warnings"
          }
          
          echo "✅ Credential rotation cycle complete"

      - name: Verify immutable audit trail
        run: |
          echo "🔐 Verifying audit trail integrity..."
          python3 scripts/immutable-audit.py verify || {
            echo "⚠️ Audit trail verification warnings"
          }

      - name: Upload audit logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: audit-logs-${{ github.run_id }}
          path: |
            .audit-logs/
          retention-days: 30

      - name: Publish rotation metrics
        if: always()
        run: |
          echo "📊 Rotation cycle metrics:"
          if [ -d ".credentials-cache" ]; then
            echo "  Cache entries: $(ls .credentials-cache | wc -l)"
            echo "  Cache size: $(du -sh .credentials-cache | cut -f1)"
          fi
          echo "  Audit entries: $(grep '"operation":"credential_rotation"' .audit-logs/*.jsonl 2>/dev/null | wc -l || echo '0')"
