name: Automation Health & Deployment Validator

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  actions: read
  checks: read

jobs:
  validate-automation-health:
    name: Validate All Automation & Signal Health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify all critical workflows exist
        id: workflow-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          # List of critical workflows that must exist
          CRITICAL_WORKFLOWS=(
            "terraform-auto-apply.yml"
            "elasticache-apply-safe.yml"
            "system-status-aggregator.yml"
            "issue-tracker-automation.yml"
            "fetch-aws-creds-from-gsm.yml"
          )

          MISSING_WORKFLOWS=()
          for wf in "${CRITICAL_WORKFLOWS[@]}"; do
            if ! gh workflow list --repo ${REPO} --json name --jq '.[] | select(.name | contains("'${wf%.*}'")) | .name' | grep -q .; then
              MISSING_WORKFLOWS+=("$wf")
            fi
          done

          if [ ${#MISSING_WORKFLOWS[@]} -gt 0 ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
            echo "missing_list=$(IFS=, ; echo \"${MISSING_WORKFLOWS[*]}\")" >> $GITHUB_OUTPUT
            echo "❌ Missing workflows: ${MISSING_WORKFLOWS[*]}"
          else
            echo "missing=false" >> $GITHUB_OUTPUT
            echo "✅ All critical workflows present"
          fi

      - name: Check key documentation exists
        id: doc-check
        run: |
          set -euo pipefail

          REQUIRED_DOCS=(
            "OPERATOR_REMEDIATION_AUTOMATION_RUNBOOK.md"
            "AUTOMATION_IMPLEMENTATION_COMPLETE.md"
            "HANDS_OFF_AUTOMATION_OPERATOR_SUMMARY.md"
          )

          MISSING_DOCS=()
          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ ! -f "$doc" ]; then
              MISSING_DOCS+=("$doc")
            fi
          done

          if [ ${#MISSING_DOCS[@]} -gt 0 ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
            echo "missing_list=$(IFS=, ; echo \"${MISSING_DOCS[*]}\")" >> $GITHUB_OUTPUT
            echo "❌ Missing documentation: ${MISSING_DOCS[*]}"
          else
            echo "missing=false" >> $GITHUB_OUTPUT
            echo "✅ All critical documentation present"
          fi

      - name: Validate automation secrets configuration
        id: secrets-check
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          USE_OIDC: ${{ secrets.USE_OIDC }}
        run: |
          echo "Checking automation secrets configuration..."

          SECRETS_OK=true

          # Check base secrets (must be present)
          if [ -z "${GCP_PROJECT_ID}" ]; then
            echo "⚠️  GCP_PROJECT_ID not configured"
            echo "secrets_ready=false" >> $GITHUB_OUTPUT
            SECRETS_OK=false
          else
            echo "✅ GCP_PROJECT_ID configured"
          fi

          if [ -z "${GCP_SERVICE_ACCOUNT_EMAIL}" ]; then
<REDACTED_SECRET_REMOVED_BY_AUTOMATION>
            echo "secrets_ready=false" >> $GITHUB_OUTPUT
            SECRETS_OK=false
          else
<REDACTED_SECRET_REMOVED_BY_AUTOMATION>
          fi

          # Check provisioning secrets (optional for dry-run, required for apply)
          if [ -n "${AWS_OIDC_ROLE_ARN}" ] && [ "${USE_OIDC}" = "true" ]; then
            echo "✅ AWS OIDC Role configured — apply phase unlocked"
            echo "apply_ready=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️  AWS OIDC Role not fully configured — dry-run mode active"
            echo "apply_ready=false" >> $GITHUB_OUTPUT
          fi

          if [ "$SECRETS_OK" = "true" ]; then
            echo "secrets_ready=true" >> $GITHUB_OUTPUT
          fi

      - name: Check recent workflow success rates
        id: health-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          # Check system-status-aggregator (should run every 15 min, so 4+ runs per hour)
          AGGREGATOR_RUNS=$(gh run list --repo ${REPO} --workflow system-status-aggregator.yml --limit 5 --json conclusion --jq '[.[] | select(.conclusion != null)] | length' 2>/dev/null || echo "0")
          AGGREGATOR_SUCCESS=$(gh run list --repo ${REPO} --workflow system-status-aggregator.yml --limit 5 --json conclusion --jq '[.[] | select(.conclusion == "success")] | length' 2>/dev/null || echo "0")

          if [ "$AGGREGATOR_RUNS" -gt 0 ]; then
            SUCCESS_RATE=$(( (AGGREGATOR_SUCCESS * 100) / AGGREGATOR_RUNS ))
            echo "aggregator_health=$(echo "scale=0; $SUCCESS_RATE" | bc)%" >> $GITHUB_OUTPUT
            echo "✅ System Aggregator: $SUCCESS_RATE% success rate (last 5 runs)"
          else
            echo "aggregator_health=unknown" >> $GITHUB_OUTPUT
            echo "ℹ️  System Aggregator: No recent runs"
          fi

          # Check issue-tracker-automation (should run every 4 hours)
          TRACKER_RUNS=$(gh run list --repo ${REPO} --workflow issue-tracker-automation.yml --limit 3 --json conclusion --jq '[.[] | select(.conclusion != null)] | length' 2>/dev/null || echo "0")
          TRACKER_SUCCESS=$(gh run list --repo ${REPO} --workflow issue-tracker-automation.yml --limit 3 --json conclusion --jq '[.[] | select(.conclusion == "success")] | length' 2>/dev/null || echo "0")

          if [ "$TRACKER_RUNS" -gt 0 ]; then
            TRACKER_RATE=$(( (TRACKER_SUCCESS * 100) / TRACKER_RUNS ))
            echo "tracker_health=$(echo "scale=0; $TRACKER_RATE" | bc)%" >> $GITHUB_OUTPUT
            echo "✅ Issue Tracker: $TRACKER_RATE% success rate (last 3 runs)"
          else
            echo "tracker_health=unknown" >> $GITHUB_OUTPUT
            echo "ℹ️  Issue Tracker: No recent runs"
          fi

      - name: Verify main branch protection and auto-merge readiness
        id: branch-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          # Check if main branch has protection rules
          BRANCH_PROTECTED=$(gh api repos/${REPO}/branches/main \
            --jq '.protected' 2>/dev/null || echo "false")

          if [ "$BRANCH_PROTECTED" = "true" ]; then
            echo "✅ Main branch is protected"
            echo "branch_protected=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Main branch is not protected (optional but recommended)"
            echo "branch_protected=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate comprehensive health report
        id: report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_MISSING: ${{ steps.workflow-check.outputs.missing }}
          DOC_MISSING: ${{ steps.doc-check.outputs.missing }}
          SECRETS_READY: ${{ steps.secrets-check.outputs.secrets_ready }}
          APPLY_READY: ${{ steps.secrets-check.outputs.apply_ready }}
          AGGREGATOR_HEALTH: ${{ steps.health-check.outputs.aggregator_health }}
          TRACKER_HEALTH: ${{ steps.health-check.outputs.tracker_health }}
          BRANCH_PROTECTED: ${{ steps.branch-check.outputs.branch_protected }}
        run: |
          NOW=$(date -u +'%Y-%m-%d %H:%M:%SZ')
          REPO="${{ github.repository }}"

          cat > /tmp/health_report.md << 'EOF'
          # 🏥 Automation Health Report — $NOW

          ## Overall Status

          EOF

          # Determine overall health
          if [ "$WORKFLOW_MISSING" = "false" ] && [ "$DOC_MISSING" = "false" ] && [ "$SECRETS_READY" = "true" ]; then
            HEALTH="🟢 HEALTHY"
            echo "| Status | 🟢 All Systems Operational |" >> /tmp/health_report.md
          elif [ "$WORKFLOW_MISSING" = "true" ] || [ "$DOC_MISSING" = "true" ]; then
            HEALTH="🔴 DEGRADED"
            echo "| Status | 🔴 Critical Components Missing |" >> /tmp/health_report.md
          else
            HEALTH="🟡 PARTIAL"
            echo "| Status | 🟡 Awaiting Provisioning |" >> /tmp/health_report.md
          fi

          cat >> /tmp/health_report.md << 'EOF'
          | Last Check | $NOW |

          ## Component Status

          | Component | Status | Details |
          |-----------|--------|---------|
          EOF

          # Workflow status
          if [ "$WORKFLOW_MISSING" = "true" ]; then
            echo "| Workflows | ❌ Missing | ${{ steps.workflow-check.outputs.missing_list }} |" >> /tmp/health_report.md
          else
            echo "| Workflows | ✅ All Present | terraform-auto-apply, elasticache-safe, aggregator, tracker, gsm-fetch |" >> /tmp/health_report.md
          fi

          # Documentation status
          if [ "$DOC_MISSING" = "true" ]; then
            echo "| Documentation | ❌ Missing | ${{ steps.doc-check.outputs.missing_list }} |" >> /tmp/health_report.md
          else
            echo "| Documentation | ✅ Complete | Runbook, implementation guide, operator quick-start |" >> /tmp/health_report.md
          fi

          # Secrets status
          if [ "$SECRETS_READY" = "true" ]; then
            echo "| Base Secrets | ✅ Configured | GCP_PROJECT_ID, GCP_SERVICE_ACCOUNT_EMAIL |" >> /tmp/health_report.md
          else
            echo "| Base Secrets | ⚠️  Incomplete | Check GCP_PROJECT_ID, GCP_SERVICE_ACCOUNT_EMAIL |" >> /tmp/health_report.md
          fi

          # Provisioning status
          if [ "$APPLY_READY" = "true" ]; then
            echo "| Provisioning | ✅ READY | AWS_OIDC_ROLE_ARN + USE_OIDC enabled |" >> /tmp/health_report.md
            echo "| Automation | 🟢 LIVE | terraform-auto-apply active |" >> /tmp/health_report.md
          else
            echo "| Provisioning | 🟡 PENDING | Awaiting AWS OIDC + GCP WI setup |" >> /tmp/health_report.md
            echo "| Automation | 🟡 DRY-RUN | Safe mode active (no-op) |" >> /tmp/health_report.md
          fi

          # Workflow health
          if [ "$AGGREGATOR_HEALTH" != "unknown" ]; then
            echo "| Aggregator | ✅ Healthy | Success rate: $AGGREGATOR_HEALTH |" >> /tmp/health_report.md
          else
            echo "| Aggregator | ℹ️  Initializing | First run pending |" >> /tmp/health_report.md
          fi

          if [ "$TRACKER_HEALTH" != "unknown" ]; then
            echo "| Issue Tracker | ✅ Healthy | Success rate: $TRACKER_HEALTH |" >> /tmp/health_report.md
          else
            echo "| Issue Tracker | ℹ️  Initializing | First run pending |" >> /tmp/health_report.md
          fi

          # Branch protection
          if [ "$BRANCH_PROTECTED" = "true" ]; then
            echo "| Branch Protection | ✅ Enabled | main branch protected |" >> /tmp/health_report.md
          else
            echo "| Branch Protection | ⚠️  Disabled | Recommended for safer deploys |" >> /tmp/health_report.md
          fi

          cat >> /tmp/health_report.md << 'EOF'

          ## Next Steps

          EOF

          if [ "$HEALTH" = "🟢 HEALTHY" ] && [ "$APPLY_READY" = "false" ]; then
            cat >> /tmp/health_report.md << 'EOF'
          ### Unlock Full Automation (Operator Action Required)

          1. Complete Phase 1 (GCP Workload Identity setup) → see OPERATOR_REMEDIATION_AUTOMATION_RUNBOOK.md
          2. Complete Phase 2 (AWS OIDC provisioning) → see same runbook
          3. Set repo secrets: AWS_OIDC_ROLE_ARN, USE_OIDC=true
          4. This health check will auto-update status when provisioning complete

          EOF
          elif [ "$HEALTH" = "🟢 HEALTHY" ] && [ "$APPLY_READY" = "true" ]; then
            cat >> /tmp/health_report.md << 'EOF'
          ### ✅ Fully Hands-Off Automation is LIVE

          - terraform-auto-apply: Auto-runs on terraform/** push
          - elasticache-apply-safe: Auto-runs on tfvars push
          - system-status-aggregator: Reports health every 15 min (issue #1064)
          - issue-tracker-automation: Manages tracking issues every 4 hours

          No manual intervention required. Monitor health via this report.

          EOF
          else
            cat >> /tmp/health_report.md << 'EOF'
          ### ⚠️  Action Required

          - Deploy missing components from AUTOMATION_IMPLEMENTATION_COMPLETE.md
          - Ensure all required documentation is present
          - Verify base secrets (GCP_PROJECT_ID, GCP_SERVICE_ACCOUNT_EMAIL)

          EOF
          fi

          # Save report to output
          REPORT=$(cat /tmp/health_report.md)
          echo "report<<DELIMITER" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "DELIMITER" >> $GITHUB_ENV

          # Save health status
          echo "health_status=$HEALTH" >> $GITHUB_OUTPUT

      - name: Post or update health report to issue #1064
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          # Ensure issue #1064 exists and is open
          ISSUE_STATE=$(gh issue view 1064 --repo ${REPO} --json state --jq '.state' 2>/dev/null || echo "")

          if [ -z "$ISSUE_STATE" ]; then
            # Create issue if missing
            gh issue create --repo ${REPO} \
              --title "🏥 Automation Health & Deployment Status" \
              --body "Central tracking for automation health and deployment readiness. Updated hourly by automation-health-validator.yml" \
              --label "automation,monitoring,status-tracking" || true
          elif [ "$ISSUE_STATE" = "CLOSED" ]; then
            # Reopen if closed
            gh issue reopen 1064 --repo ${REPO} || true
          fi

          # Post or update health report
          EXISTING=$(gh api "/repos/${REPO}/issues/1064/comments" --jq ".[] | select(.body | startswith(\"# 🏥 Automation Health Report\")) | .id" 2>/dev/null | head -1 || true)

          if [ -n "$EXISTING" ]; then
            # Update existing comment
            gh api "/repos/${REPO}/issues/comments/${EXISTING}" -X PATCH -f body="${{ env.report }}" 2>/dev/null || echo "Failed to update comment"
          else
            # Create new comment
            gh issue comment 1064 --repo ${REPO} --body "${{ env.report }}" 2>/dev/null || echo "Failed to create comment"
          fi

      - name: Alert on critical issues
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"

          ALERT_BODY="⚠️ **Automation Health Check Failed**

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Status: ${{ steps.report.outputs.health_status }}

          **Action Required**: Review workflow logs and complete any pending provisioning."

          # Post alert to issue #1064
          gh issue comment 1064 --repo ${REPO} --body "$ALERT_BODY" || true

      - name: Summary
        if: always()
        run: |
          echo "✅ Automation Health Validation Complete"
          echo "Health Status: ${{ steps.report.outputs.health_status }}"
          echo "Report posted to issue #1064"
          echo ""
          echo "Secrets Ready: ${{ steps.secrets-check.outputs.secrets_ready }}"
          echo "Apply Ready: ${{ steps.secrets-check.outputs.apply_ready }}"
          echo "Workflows Missing: ${{ steps.workflow-check.outputs.missing }}"
          echo "Docs Missing: ${{ steps.doc-check.outputs.missing }}"
