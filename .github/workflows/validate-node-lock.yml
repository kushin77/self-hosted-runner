name: Validate Node engines and lockfile
on: [push, pull_request]

jobs:
  validate-lockfile:
    name: Validate lockfile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        if: contains(runner.labels, 'self-hosted')
        run: |
          chmod +x ci/scripts/setup-node.sh
          NODE_VERSION=20 ci/scripts/setup-node.sh
      - name: Setup Node 20 (hosted fallback)
        if: not(contains(runner.labels, 'self-hosted'))
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate lockfiles
        shell: bash
        run: |
          set -euo pipefail
          # Paths to check; add other package folders as needed
          PATHS=". services/pipeline-repair"
          for p in $PATHS; do
            echo "--- Checking $p ---"
            if [ -f "$p/package.json" ]; then
              pushd "$p"
              npm ci --no-audit --no-fund
              npm install --package-lock-only --no-audit --no-fund
              git diff --exit-code package-lock.json || { echo "package-lock.json would change in $p"; exit 1; }
              popd
            else
              echo "No package.json in $p; skipping"
            fi
          done
