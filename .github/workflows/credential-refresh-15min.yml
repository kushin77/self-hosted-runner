name: Credential Refresh (15-min)
# Purpose: Refresh ephemeral credentials every 15 minutes
# Triggered: Scheduled at */15 * * * * (every 15 minutes)

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:  # Allow manual trigger for testing

permissions:
  id-token: write
  contents: read
  pull-requests: read

jobs:
  refresh-credentials:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Bash Environment
        run: |
          echo "SCRIPT_DIR=$PWD/scripts/rotation" >> $GITHUB_ENV
      
      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_lifetime: '900s'
          create_credentials_file: true
      
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin,kubectl'
      
      - name: Run 15-min Credential Refresh
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          bash "${SCRIPT_DIR}/refresh-ephemeral-creds.sh"
      
      - name: Upload Audit Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: credential-refresh-logs-${{ github.run_id }}
          path: scripts/audit/rotation-*.log
          retention-days: 90
          if-no-files-found: ignore
      
      - name: Alert on Failure
        if: failure()
        run: |
          echo "🚨 Credential refresh FAILED at $(date -u)"
          echo "Check audit logs in GitHub Actions artifacts"
          exit 1
