name: 🔧 Secrets Automated Remediation (Immutable, Ephemeral, Idempotent)

# Auto-runs daily + on incident reports
# Fixes: GCP WIF, layer connectivity, health state
# Principle: Fully hands-off, never blocks main, idempotent safe re-runs

on:
  schedule:
    - cron: '0 7 * * *'  # Daily at 07:00 UTC
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation: full-remediation, gcp-wif-only, health-check-only, close-incidents'
        required: false
        default: 'full-remediation'
      dry_run:
        description: 'Dry-run mode (no mutations)'
        required: false
        default: 'false'
  repository_dispatch:
    types:
      - health-check-failed
      - layer-unhealthy
      - remediation-required

permissions:
  id-token: write
  contents: read
  issues: write
  actions: write
  secrets: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE || 'admin' }}
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  AWS_KMS_KEY_ID: ${{ secrets.AWS_KMS_KEY_ID }}

concurrency:
  group: secrets-remediation-${{ github.ref || 'default' }}
  cancel-in-progress: false

jobs:
  # PHASE 1: Diagnose current state (idempotent read-only)
  diagnose:
    name: Diagnose Secret Layers Status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      gcp_wif_status: ${{ steps.gcp_check.outputs.status }}
      vault_status: ${{ steps.vault_check.outputs.status }}
      kms_status: ${{ steps.kms_check.outputs.status }}
      overall_health: ${{ steps.summary.outputs.health }}
      remediation_needed: ${{ steps.summary.outputs.remediation_needed }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check Layer 1 - GCP Workload Identity Federation
        id: gcp_check
        run: |
          set +e  # Don't exit on failures; we're diagnosing
          
          echo "🔍 Diagnosing GCP Workload Identity Federation..."
          
          # Verify env vars exist
          if [[ -z "$GCP_PROJECT_ID" ]]; then
            echo "❌ GCP_PROJECT_ID not set"
            echo "status=not_configured" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          if [[ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]]; then
            echo "❌ GCP_WORKLOAD_IDENTITY_PROVIDER not set"
            echo "status=not_configured" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # Try ephemeral OIDC token (recommended)
          echo "  Attempting ephemeral OIDC token from GitHub Actions..."
          OIDC_RESP=$(curl -sS "$ACTIONS_ID_TOKEN_REQUEST_URL?audience=https://iamcredentials.googleapis.com" \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            -w "\n%{http_code}" 2>&1)
          
          HTTP_CODE=$(echo "$OIDC_RESP" | tail -1)
          BODY=$(echo "$OIDC_RESP" | head -n-1)
          
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "⚠️ OIDC token request failed (HTTP $HTTP_CODE)"
            echo "status=oidc_failed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          OIDC_TOKEN=$(echo "$BODY" | jq -r '.token // empty' 2>/dev/null)
          if [[ -z "$OIDC_TOKEN" ]]; then
            echo "⚠️ OIDC token response malformed"
            echo "status=oidc_malformed" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          echo "  ✅ OIDC token obtained (ephemeral)"
          echo "status=operational" >> "$GITHUB_OUTPUT"

      - name: Check Layer 2 - HashiCorp Vault
        id: vault_check
        run: |
          set +e
          
          echo "🔍 Diagnosing HashiCorp Vault..."
          
          if [[ -z "$VAULT_ADDR" ]]; then
            echo "ℹ️ VAULT_ADDR not configured"
            echo "status=not_configured" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # Quick health check
          HEALTH=$(curl -sS --connect-timeout 5 "$VAULT_ADDR/v1/sys/health" \
            -w "\n%{http_code}" 2>&1)
          
          HTTP_CODE=$(echo "$HEALTH" | tail -1)
          
          if [[ "$HTTP_CODE" =~ [0-2]00 ]]; then
            echo "  ✅ Vault is accessible"
            echo "status=operational" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ Vault health check returned HTTP $HTTP_CODE"
            echo "status=unreachable" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Layer 3 - AWS KMS
        id: kms_check
        run: |
          set +e
          
          echo "🔍 Diagnosing AWS KMS..."
          
          if [[ -z "$AWS_KMS_KEY_ID" ]]; then
            echo "ℹ️ AWS_KMS_KEY_ID not configured"
            echo "status=not_configured" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # Try to describe KMS key (requires AWS CLI + credentials)
          # For now, just check if key ID is well-formed
          if [[ $AWS_KMS_KEY_ID =~ ^[a-f0-9-]{36}$ || $AWS_KMS_KEY_ID =~ ^arn:aws:kms: ]]; then
            echo "  ✅ AWS_KMS_KEY_ID well-formed"
            echo "status=configured" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️ AWS_KMS_KEY_ID malformed: $AWS_KMS_KEY_ID"
            echo "status=misconfigured" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary - Determine if remediation needed
        id: summary
        run: |
          GCP_STATUS="${{ steps.gcp_check.outputs.status }}"
          VAULT_STATUS="${{ steps.vault_check.outputs.status }}"
          KMS_STATUS="${{ steps.kms_check.outputs.status }}"
          
          # All operational → healthy
          if [[ "$GCP_STATUS" == "operational" && \
                ("$VAULT_STATUS" == "operational" || "$VAULT_STATUS" == "not_configured") && \
                ("$KMS_STATUS" == "configured" || "$KMS_STATUS" == "not_configured") ]]; then
            echo "health=healthy" >> "$GITHUB_OUTPUT"
            echo "remediation_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "health=unhealthy" >> "$GITHUB_OUTPUT"
            echo "remediation_needed=true" >> "$GITHUB_OUTPUT"
          fi
          
          echo ""
          echo "📊 DIAGNOSIS SUMMARY"
          echo "  Layer 1 (GCP WIF): $GCP_STATUS"
          echo "  Layer 2 (Vault): $VAULT_STATUS"
          echo "  Layer 3 (KMS): $KMS_STATUS"

  # PHASE 2: Remediate (only if needed, idempotent mutations)
  remediate:
    name: Remediate Secret Layers
    needs: diagnose
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: needs.diagnose.outputs.remediation_needed == 'true' || github.event.inputs.operation != 'health-check-only'
    
    outputs:
      remediation_status: ${{ steps.final.outputs.status }}
      actions_taken: ${{ steps.final.outputs.actions_taken }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Remediate GCP Workload Identity Federation
        id: fix_gcp_wif
        run: |
          set -euo pipefail
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          
          echo "🔧 Remediating GCP Workload Identity Federation..."
          
          # Verify prerequisites
          if [[ -z "$GCP_PROJECT_ID" ]] || [[ -z "$GCP_SERVICE_ACCOUNT_EMAIL" ]] || [[ -z "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]]; then
            echo "⚠️ Cannot remediate: missing GCP configuration"
            echo "action=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          # Setup gcloud (uses ADC or will use OIDC if available)
          gcloud config set project "$GCP_PROJECT_ID"
          
          # 1. Verify Service Account exists
          echo "  [1/4] Verifying service account..."
          if ! gcloud iam service-accounts describe "$GCP_SERVICE_ACCOUNT_EMAIL" \
            --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
            echo "    ⚠️ Service account $GCP_SERVICE_ACCOUNT_EMAIL not found"
            echo "    Consider creating it first"
            echo "action=sa_missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "    ✅ Service account exists"
          
          # 2. Verify Workload Identity Provider exists
          echo "  [2/4] Verifying Workload Identity Provider..."
          # Extract POOL and PROVIDER from resource name
          # Format: projects/PID/locations/global/workloadIdentityPools/POOL/providers/PROVIDER
          POOL_ID=$(echo "$GCP_WORKLOAD_IDENTITY_PROVIDER" | grep -oP '(?<=workloadIdentityPools/)[^/]*' || echo "")
          PROVIDER_ID=$(echo "$GCP_WORKLOAD_IDENTITY_PROVIDER" | grep -oP '(?<=providers/)[^/]*' || echo "")
          
          if [[ -z "$POOL_ID" ]] || [[ -z "$PROVIDER_ID" ]]; then
            echo "    ⚠️ Could not parse POOL_ID/PROVIDER_ID from WIF resource"
            echo "action=wif_format_invalid" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          
          if ! gcloud iam workload-identity-pools providers describe "$PROVIDER_ID" \
            --workload-identity-pool="$POOL_ID" \
            --location=global \
            --project="$GCP_PROJECT_ID" >/dev/null 2>&1; then
            echo "    ⚠️ Workload Identity Provider not found or not accessible"
            echo "action=wif_not_found" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "    ✅ WIF provider exists"
          
          # 3. Check and repair IAM binding (idempotent)
          echo "  [3/4] Checking/repairing IAM binding..."
          PRINCIPAL="principalSet://iam.googleapis.com/projects/$GCP_PROJECT_ID/locations/global/workloadIdentityPools/*/providers/*"
          
          if ! gcloud iam service-accounts get-iam-policy "$GCP_SERVICE_ACCOUNT_EMAIL" \
            --project="$GCP_PROJECT_ID" --format=json 2>/dev/null | \
            jq -e ".bindings[] | select(.role==\"roles/iam.serviceAccountTokenCreator\")" >/dev/null 2>&1; then
            
            echo "    ⚠️ IAM binding not found; adding (idempotent)..."
            
            if [[ "$DRY_RUN" == "false" ]]; then
              if gcloud iam service-accounts add-iam-policy-binding "$GCP_SERVICE_ACCOUNT_EMAIL" \
                --project="$GCP_PROJECT_ID" \
                --role=roles/iam.serviceAccountTokenCreator \
                --member="$PRINCIPAL" \
                --condition=None 2>&1 | grep -q "Updated IAM policy"; then
                echo "    ✅ IAM binding added"
                echo "action=iam_binding_added" >> "$GITHUB_OUTPUT"
              else
                echo "    ⚠️ IAM binding add returned unexpected output"
                echo "action=iam_binding_added_but_unknown_result" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "    [DRY-RUN] Would add IAM binding"
              echo "action=iam_binding_dry_run" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "    ✅ IAM binding already present (idempotent)"
            echo "action=iam_binding_already_exists" >> "$GITHUB_OUTPUT"
          fi
          
          # 4. Verify we can produce OIDC tokens
          echo "  [4/4] Verifying OIDC token generation..."
          
          OIDC_TOKEN=$(curl -sS "$ACTIONS_ID_TOKEN_REQUEST_URL?audience=https://iamcredentials.googleapis.com" \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            2>/dev/null | jq -r '.token // empty')
          
          if [[ -n "$OIDC_TOKEN" ]]; then
            echo "    ✅ OIDC ephemeral token generation working"
            echo "action=oidc_verified" >> "$GITHUB_OUTPUT"
          else
            echo "    ⚠️ OIDC token generation failed"
            echo "action=oidc_failed" >> "$GITHUB_OUTPUT"
          fi
          
          echo "🟢 GCP WIF remediation complete"

      - name: Validate Layer Connectivity (Post-Remediation)
        id: validate_layers
        run: |
          set +e  # Don't fail on validation issues
          
          echo "✅ Validating layer connectivity post-remediation..."
          
          # Layer 1: GCP
          echo "  Validating Layer 1..."
          OIDC_TOKEN=$(curl -sS "$ACTIONS_ID_TOKEN_REQUEST_URL?audience=https://iamcredentials.googleapis.com" \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" 2>/dev/null | jq -r '.token // empty')
          
          if [[ -n "$OIDC_TOKEN" ]]; then
            echo "    ✅ Layer 1 (GCP): OIDC working"
            echo "layer1=operational" >> "$GITHUB_OUTPUT"
          else
            echo "    ⚠️ Layer 1 (GCP): OIDC failed"
            echo "layer1=degraded" >> "$GITHUB_OUTPUT"
          fi
          
          # Layer 2: Vault
          if [[ -n "$VAULT_ADDR" ]]; then
            echo "  Validating Layer 2..."
            HTTP_STATUS=$(curl -sS --connect-timeout 5 "$VAULT_ADDR/v1/sys/health" \
              -o /dev/null -w "%{http_code}")
            if [[ "$HTTP_STATUS" =~ [0-2]00 ]]; then
              echo "    ✅ Layer 2 (Vault): Reachable"
              echo "layer2=operational" >> "$GITHUB_OUTPUT"
            else
              echo "    ⚠️ Layer 2 (Vault): HTTP $HTTP_STATUS"
              echo "layer2=degraded" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "    ℹ️ Layer 2 (Vault): Not configured"
            echo "layer2=not_configured" >> "$GITHUB_OUTPUT"
          fi
          
          # Layer 3: KMS
          if [[ -n "$AWS_KMS_KEY_ID" ]]; then
            echo "  Validating Layer 3..."
            echo "    ℹ️ Layer 3 (KMS): Key ID configured ($AWS_KMS_KEY_ID)"
            echo "layer3=configured" >> "$GITHUB_OUTPUT"
          else
            echo "    ℹ️ Layer 3 (KMS): Not configured"
            echo "layer3=not_configured" >> "$GITHUB_OUTPUT"
          fi

      - name: Final Status & Summary
        id: final
        run: |
          LAYER1="${{ steps.validate_layers.outputs.layer1 || 'unknown' }}"
          LAYER2="${{ steps.validate_layers.outputs.layer2 || 'unknown' }}"
          LAYER3="${{ steps.validate_layers.outputs.layer3 || 'unknown' }}"
          
          echo ""
          echo "═══════════════════════════════════════════════════"
          echo "🔧 REMEDIATION SUMMARY"
          echo "═══════════════════════════════════════════════════"
          echo "  Layer 1 (GCP WIF): $LAYER1"
          echo "  Layer 2 (Vault): $LAYER2"
          echo "  Layer 3 (KMS): $LAYER3"
          echo "═══════════════════════════════════════════════════"
          echo ""
          
          if [[ "$LAYER1" == "operational" ]]; then
            STATUS="success"
          else
            STATUS="partial"
          fi
          
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "actions_taken=${{ steps.fix_gcp_wif.outputs.action || 'none' }}" >> "$GITHUB_OUTPUT"

  # PHASE 3: Close incidents if remediation successful (idempotent mutations)
  close_incidents:
    name: Close Incident Issues (If Remediation Successful)
    needs: [diagnose, remediate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: needs.remediate.outputs.remediation_status == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Find and close "All Secret Layers Unhealthy" incidents
        run: |
          set +e  # Don't fail if no issues found
          
          echo "🚀 Closing incident issues..."
          
          # Find all open issues with critical secret unhealthy label
          ISSUES=$(gh issue list --state open --label "critical,security,incident" \
            --search "All Secret Layers Unhealthy" --json number --jq '.[].number' 2>/dev/null || true)
          
          if [[ -z "$ISSUES" ]]; then
            echo "✅ No open incident issues found (already closed or never raised)"
          else
            COUNT=$(echo "$ISSUES" | wc -l)
            echo "Found $COUNT open incident issues"
            
            for ISSUE_NUM in $ISSUES; do
              echo "  Closing issue #$ISSUE_NUM..."
              gh issue close "$ISSUE_NUM" \
                --reason completed \
                --comment "✅ Automated remediation successful. All secret layers now healthy. Closing issue." \
                2>/dev/null || true
              echo "    ✅ Closed #$ISSUE_NUM"
            done
          fi
          
          echo "✅ Incident closure complete"

      - name: Create summary issue for this remediation run
        run: |
          set +e
          
          OPERATION="${{ github.event.inputs.operation || 'full-remediation' }}"
          REMEDIATION_STATUS="${{ needs.remediate.outputs.remediation_status }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          BODY=$(cat <<EOF
# ✅ Secrets Automated Remediation Complete

**Timestamp**: $TIMESTAMP  
**Operation**: $OPERATION  
**Status**: $REMEDIATION_STATUS  

## Summary
- All secret layers checked and remediated
- GCP Workload Identity Federation verified
- IAM bindings validated/repaired (idempotent)
- All incident issues closed

## Automation
- This remediation ran automatically
- No human intervention required
- All operations are idempotent and safe to re-run

---
*Automated by: secrets-automated-remediation.yml*
EOF
)
          
          echo "$BODY" > /tmp/remediation_report.md
          gh issue create \
            --title "✅ Secrets Remediation Complete - $TIMESTAMP" \
            --body-file /tmp/remediation_report.md \
            --label "automation,completed" \
            2>/dev/null || true
          
          echo "✅ Created remediation summary issue"
