name: Monitor Actions — Report Failures to Issue

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  issues: write

jobs:
  report-failures:
    runs-on: ubuntu-latest
    steps:
      - name: Report recent workflow failures to Issue #1316
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = 1316;

            // Get last recorded run id from the issue comments (if present)
            const comments = await github.issues.listComments({ owner, repo, issue_number: issueNumber });
            let lastSeen = 0;
            for (const c of comments.data.reverse()) {
              const m = (c.body || '').match(/last_checked_run_id: (\d+)/);
              if (m) { lastSeen = parseInt(m[1], 10); break; }
            }

            // List recent runs (limit 100)
            const runsResp = await github.rest.actions.listRepoWorkflowRuns({ owner, repo, per_page: 100 });
            const runs = runsResp.data.workflow_runs || [];

            const newFailures = runs
              .filter(r => r.id > lastSeen && r.conclusion === 'failure')
              .map(r => ({ id: r.id, name: r.name, url: r.html_url, created_at: r.created_at }));

            if (newFailures.length === 0) {
              console.log('No new failures since', lastSeen);
              return;
            }

            const maxId = Math.max(...newFailures.map(r => r.id));
            let body = `Automated report: ${newFailures.length} new failing workflow run(s) detected\n\n`;
            for (const f of newFailures) {
              body += `- [${f.name}](${f.url}) — run id: ${f.id} — created: ${f.created_at}\n`;
            }
            body += `\nlast_checked_run_id: ${maxId}`;

            await github.issues.createComment({ owner, repo, issue_number: issueNumber, body });
            console.log('Posted', newFailures.length, 'failures to issue', issueNumber);
