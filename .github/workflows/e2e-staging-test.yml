name: E2E Staging Validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/e2e/**'
      - 'terraform/examples/**'

permissions:
  id-token: write
  contents: read

jobs:
  run-e2e-harness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          chmod +x scripts/e2e/run_staging_e2e.sh

      - name: Run E2E staging harness
        env:
          TF_VAR_run_mode: "ci"
        run: |
          ./scripts/e2e/run_staging_e2e.sh --auto-approve --capture-artifacts
