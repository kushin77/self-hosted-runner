name: Portal MVP - Backend Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'terraform/**'
      - '.github/workflows/portal-backend.yml'
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options:
          - staging
          - production

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  SERVICE_NAME: nexusshield-portal-api

jobs:
  build:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for immutable audit trail

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --prefer-offline

      - name: Lint code
        working-directory: backend
        run: npm run lint

      - name: Format check
        working-directory: backend
        run: npx prettier --check src

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
        run: |
          npm run test:cov
          # Archive coverage report
          mkdir -p coverage-reports
          cp -r coverage coverage-reports/backend-coverage-$(date +%s)

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/coverage-final.json
          flags: backend

      - name: Build TypeScript
        working-directory: backend
        run: npm run build

      - name: Check build artifacts
        run: |
          [ -d backend/dist ] && echo "✅ Build successful" || exit 1

  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & push Docker image
        working-directory: backend
        run: |
          gcloud builds submit \
            --project=$GCP_PROJECT_ID \
            --tag=$ARTIFACT_REGISTRY/$GCP_PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA \
            --tag=$ARTIFACT_REGISTRY/$GCP_PROJECT_ID/$SERVICE_NAME:latest-staging \
            --substitutions=_SERVICE_NAME=$SERVICE_NAME

      - name: Deploy to Cloud Run (Staging)
        run: |
          gcloud run deploy $SERVICE_NAME \
            --project=$GCP_PROJECT_ID \
            --region=$GCP_REGION \
            --image=$ARTIFACT_REGISTRY/$GCP_PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA \
            --platform=managed \
            --memory=512Mi \
            --cpu=1 \
            --timeout=3600 \
            --max-instances=10 \
            --set-env-vars="NODE_ENV=staging,LOG_LEVEL=info" \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --no-traffic  # Deploy but don't route traffic (blue-green deployment)

      - name: Run smoke tests
        run: |
          SERVICE_URL=$(gcloud run services describe $SERVICE_NAME --project=$GCP_PROJECT_ID --region=$GCP_REGION --format='value(status.url)')
          curl -f "$SERVICE_URL/health" || exit 1
          echo "✅ Staging deployment successful"

      - name: Audit trail entry
        run: |
          echo "{\"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"event\": \"portal_backend_deployed_staging\", \"commit\": \"$GITHUB_SHA\", \"status\": \"success\"}" | \
          gsutil cp - gs://${{ secrets.GCP_AUDIT_BUCKET }}/portal-deployments-$(date +%Y%m%d_%H%M%S).jsonl

  deploy-production:
    name: Deploy to Production
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (Production)
        run: |
          gcloud run deploy $SERVICE_NAME \
            --project=$GCP_PROJECT_ID \
            --region=$GCP_REGION \
            --image=$ARTIFACT_REGISTRY/$GCP_PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA \
            --platform=managed \
            --memory=1Gi \
            --cpu=2 \
            --timeout=3600 \
            --max-instances=20 \
            --min-instances=2 \
            --concurrency=100 \
            --set-env-vars="NODE_ENV=production,LOG_LEVEL=warn" \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Verify production deployment
        run: |
          SERVICE_URL=$(gcloud run services describe $SERVICE_NAME --project=$GCP_PROJECT_ID --region=$GCP_REGION --format='value(status.url)')
          for i in {1..5}; do
            curl -f "$SERVICE_URL/health" && break || sleep 10
          done
          echo "✅ Production deployment rolling out"

      - name: Record deployment
        run: |
          echo "{\"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"event\": \"portal_backend_deployed_production\", \"commit\": \"$GITHUB_SHA\", \"status\": \"success\", \"deployed_by\": \"$GITHUB_ACTOR\"}" | \
          gsutil cp - gs://${{ secrets.GCP_AUDIT_BUCKET }}/portal-deployments-$(date +%Y%m%d_%H%M%S).jsonl

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: portal-backend-v${{ github.run_number }}
          body: |
            🚀 Portal Backend Production Deployment
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref }}
            - Author: ${{ github.actor }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Notification
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Job status check
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Portal backend pipeline completed successfully"
            exit 0
          else
            echo "❌ Portal backend pipeline failed"
            exit 1
          fi
