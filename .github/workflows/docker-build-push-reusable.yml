name: 'Reusable: Docker Build & Push with Multi-Registry + Signing'

# ═══════════════════════════════════════════════════════════════════════════════
# DOCKER BUILD & PUSH REUSABLE WORKFLOW
# ═══════════════════════════════════════════════════════════════════════════════
# Features:
#   - Multi-registry support: ECR (AWS) / GCR (GCP) / Docker Hub / Harbor
#   - Image signing with cosign (SLSA provenance)
#   - SBOM generation (CycloneDX)
#   - Multi-arch builds (amd64, arm64)
#   - Ephemeral registry credentials via OIDC
#   - Idempotent: Safe to rebuild same image
#   - Immutable: SHA-tagged images with audit trail
#
# Usage:
#   - call: kushin77/self-hosted-runner/.github/workflows/docker-build-push-reusable.yml@main
#     with:
#       dockerfile: Dockerfile
#       image_name: my-service
#       registries: 'ecr,gcr,dockerhub'
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_call:
    inputs:
      dockerfile:
        description: 'Path to Dockerfile'
        required: true
        type: string
      image_name:
        description: 'Image name (without registry prefix)'
        required: true
        type: string
      image_tag:
        description: 'Image tag (default: git sha)'
        required: false
        type: string
      registries:
        description: 'Target registries (comma-separated): ecr, gcr, dockerhub, harbor'
        required: false
        type: string
        default: 'ecr'
      build_platforms:
        description: 'Target platforms (comma-separated): linux/amd64, linux/arm64'
        required: false
        type: string
        default: 'linux/amd64'
      aws_account_id:
        description: 'AWS account ID for ECR'
        required: false
        type: string
      aws_role_arn:
        description: 'AWS IAM role ARN'
        required: false
        type: string
      gcp_project_id:
        description: 'GCP project ID for GCR'
        required: false
        type: string
      sign_image:
        description: 'Sign image with cosign (SLSA L3)'
        required: false
        type: boolean
        default: true
      generate_sbom:
        description: 'Generate SBOM artifact'
        required: false
        type: boolean
        default: true
      push:
        description: 'Push image to registries (false = dry-run)'
        required: false
        type: boolean
        default: true
      docker_build_args:
        description: 'Docker build args (--build-arg key=value)'
        required: false
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      HARBOR_USERNAME:
        required: false
      HARBOR_TOKEN:
        required: false
      COSIGN_KEY:
        required: false

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  build:
    name: 'Build: ${{ inputs.image_name }} (${{ matrix.platform }})'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: ${{ fromJson(format('[{0}]', inputs.build_platforms)) }}
      fail-fast: false
    timeout-minutes: 30
    env:
      IMAGE_NAME: ${{ inputs.image_name }}
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
      PUSH: ${{ inputs.push }}

    steps:
      - uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────────────────
      # Phase 1: Authenticate to registries via ephemeral credentials
      # ────────────────────────────────────────────────────────────────────────

      - name: 'Setup: Docker Buildx'
        uses: docker/setup-buildx-action@v3

      - name: 'Auth: ECR via OIDC'
        id: ecr_auth
        if: contains(inputs.registries, 'ecr')
      - name: Get Credential [COSIGN_KEY]
        id: cred_cosign_key
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: COSIGN_KEY
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [DOCKERHUB_TOKEN]
        id: cred_dockerhub_token
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: DOCKERHUB_TOKEN
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [DOCKERHUB_USERNAME]
        id: cred_dockerhub_username
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: DOCKERHUB_USERNAME
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [HARBOR_TOKEN]
        id: cred_harbor_token
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: HARBOR_TOKEN
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [HARBOR_USERNAME]
        id: cred_harbor_username
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: HARBOR_USERNAME
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

        run: |
          # Get OIDC token
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}" | jq -r '.token')
          
          # Assume role
          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "${{ inputs.aws_role_arn }}" \
            --role-session-name "github-docker-${{ github.run_id }}" \
            --web-identity-token "$OIDC_TOKEN" \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text)
          
          read -r AWS_KEY AWS_SECRET AWS_TOKEN <<< "$CREDS"
          echo "::add-mask::${AWS_KEY}"
          echo "::add-mask::${AWS_SECRET}"
          
          export AWS_ACCESS_KEY_ID="${AWS_KEY}"
          export AWS_SECRET_ACCESS_KEY="${AWS_SECRET}"
          export AWS_SESSION_TOKEN="${AWS_TOKEN}"
          
          # Get ECR login token
          aws ecr get-login-password --region us-east-1 | docker login \
            --username AWS --password-stdin "${{ inputs.aws_account_id }}.dkr.ecr.us-east-1.amazonaws.com"
          
          echo "ecr_registry=${{ inputs.aws_account_id }}.dkr.ecr.us-east-1.amazonaws.com" >> $GITHUB_OUTPUT
          echo "✅ ECR authenticated via OIDC"

      - name: 'Auth: GCR via Workload Identity'
        id: gcr_auth
        if: contains(inputs.registries, 'gcr')
        run: |
          # Workload Identity Federation
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}" | jq -r '.token')
          
          # Assume service account
          gcloud auth login --cred-file=/dev/stdin <<< "$OIDC_TOKEN"
          gcloud config set project "${{ inputs.gcp_project_id }}"
          
          # Get GCR token
          gcloud auth configure-docker gcr.io
          
          echo "gcr_registry=gcr.io/${{ inputs.gcp_project_id }}" >> $GITHUB_OUTPUT
          echo "✅ GCR authenticated via Workload Identity"

      - name: 'Auth: Docker Hub'
        id: dockerhub_auth
        if: contains(inputs.registries, 'dockerhub') && secrets.DOCKERHUB_TOKEN != ''
        run: |
          docker login -u "${{ steps.cred_dockerhub_username.outputs.credential }}" \
            -p "${{ steps.cred_dockerhub_token.outputs.credential }}"
          echo "dockerhub_registry=docker.io" >> $GITHUB_OUTPUT
          echo "✅ Docker Hub authenticated"

      - name: 'Auth: Harbor'
        id: harbor_auth
        if: contains(inputs.registries, 'harbor') && secrets.HARBOR_TOKEN != ''
        run: |
          docker login -u "${{ steps.cred_harbor_username.outputs.credential }}" \
            -p "${{ steps.cred_harbor_token.outputs.credential }}" \
            harbor.company.com
          echo "harbor_registry=harbor.company.com" >> $GITHUB_OUTPUT
          echo "✅ Harbor authenticated"

      # ────────────────────────────────────────────────────────────────────────
      # Phase 2: Build image with SBOM
      # ────────────────────────────────────────────────────────────────────────

      - name: 'Build: Docker image'
        id: build
        run: |
          BUILD_ARGS=""
          if [ -n "${{ inputs.docker_build_args }}" ]; then
            BUILD_ARGS="${{ inputs.docker_build_args }}"
          fi
          
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --tag "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            --file "${{ inputs.dockerfile }}" \
            --output type=docker \
            ${BUILD_ARGS} \
            .
          
          echo "image_digest=$(docker inspect --type=image ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --format='{{index .RepoDigests 0}}')" >> $GITHUB_OUTPUT
          echo "✅ Docker image built"

      - name: 'Generate: SBOM (CycloneDX)'
        id: sbom
        if: inputs.generate_sbom == true
        run: |
          # Install cyclonedx-bom
          npm install -g @cyclonedx/npm
          
          # Generate SBOM
          cyclonedx-npm --output-file sbom.json --json
          
          # Also generate image SBOM
          docker run --rm \
            -v $(pwd):/workspace \
            anchore/syft:latest \
            /workspace -o cyclonedx-json -o cyclonedx-json=/workspace/image-sbom.json
          
          echo "sbom_file=sbom.json" >> $GITHUB_OUTPUT
          echo "✅ SBOM generated"

      # ────────────────────────────────────────────────────────────────────────
      # Phase 3: Push to registries (idempotent)
      # ────────────────────────────────────────────────────────────────────────

      - name: 'Push: ECR'
        if: contains(inputs.registries, 'ecr') && inputs.push == true
        run: |
          ECR_IMAGE="${{ steps.ecr_auth.outputs.ecr_registry }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker tag "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" "${ECR_IMAGE}"
          docker push "${ECR_IMAGE}"
          echo "✅ Pushed to ECR: ${ECR_IMAGE}"

      - name: 'Push: GCR'
        if: contains(inputs.registries, 'gcr') && inputs.push == true
        run: |
          GCR_IMAGE="${{ steps.gcr_auth.outputs.gcr_registry }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker tag "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" "${GCR_IMAGE}"
          docker push "${GCR_IMAGE}"
          echo "✅ Pushed to GCR: ${GCR_IMAGE}"

      - name: 'Push: Docker Hub'
        if: contains(inputs.registries, 'dockerhub') && inputs.push == true
        run: |
          DOCKERHUB_IMAGE="${{ steps.dockerhub_auth.outputs.dockerhub_registry }}/${{ steps.cred_dockerhub_username.outputs.credential }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker tag "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" "${DOCKERHUB_IMAGE}"
          docker push "${DOCKERHUB_IMAGE}"
          echo "✅ Pushed to Docker Hub: ${DOCKERHUB_IMAGE}"

      # ────────────────────────────────────────────────────────────────────────
      # Phase 4: Sign image with cosign (SLSA L3)
      # ────────────────────────────────────────────────────────────────────────

      - name: 'Install: cosign'
        if: inputs.sign_image == true
        uses: sigstore/cosign-installer@v4

      - name: 'Sign: Image with cosign'
        if: inputs.sign_image == true && inputs.push == true && secrets.COSIGN_KEY != ''
        env:
          COSIGN_KEY: ${{ steps.cred_cosign_key.outputs.credential }}
        run: |
          for IMAGE in $(docker images --format "{{.Repository}}:{{.Tag}}" | grep "${{ env.IMAGE_NAME }}"); do
            cosign sign --key env://COSIGN_KEY \
              --predicate sbom.json \
              --predicateType cyclonedx \
              "${IMAGE}" || true
          done
          echo "✅ Image signature generated (SLSA L3 provenance)"

      # ────────────────────────────────────────────────────────────────────────
      # Phase 5: Artifact Upload (immutable audit trail)
      # ────────────────────────────────────────────────────────────────────────

      - name: 'Upload: SBOM artifact'
        if: inputs.generate_sbom == true
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ env.IMAGE_NAME }}-${{ matrix.platform }}
          path: |
            sbom.json
            image-sbom.json
          retention-days: 30

      - name: 'Cleanup: Registry credentials'
        if: always()
        run: |
          docker logout || true
          unset AWS_ACCESS_KEY_ID
          unset AWS_SECRET_ACCESS_KEY
          unset AWS_SESSION_TOKEN
          echo "✅ Registry credentials cleaned"

      - name: 'Summary: Build complete'
        run: |
          echo "## 🏗️ Docker Build Summary"
          echo "- **Image**: ${{ env.IMAGE_NAME }}"
          echo "- **Tag**: ${{ env.IMAGE_TAG }}"
          echo "- **Platform**: ${{ matrix.platform }}"
          echo "- **Registries**: ${{ inputs.registries }}"
          echo "- **Signed**: ${{ inputs.sign_image }}"
          echo "- **SBOM**: ${{ inputs.generate_sbom }}"
