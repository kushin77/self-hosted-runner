name: GSM Secrets Sync & Credential Rotation (Automated, Immutable)

on:
  schedule:
    # Every 90 days: full credential rotation (NIST 800-53 IA-4)
    - cron: '0 1 1 */3 *'  # 1st day of every 3rd month, 01:00 UTC
    # Every 7 days: validate credential age & alert if >60 days
    - cron: '0 2 * * 0'    # Weekly Sunday, 02:00 UTC (health check)
    # Every 15 minutes: sync GCP GSM ↔ GitHub Secrets (keep in sync)
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:
    inputs:
      operation:
        description: 'Operation: rotate (full 90d), sync (GSM→GitHub), validate (age check)'
        required: false
        default: 'sync'
      dry_run:
        description: 'Dry-run mode (no actual changes)'
        required: false
        default: 'false'
      force_rotate:
        description: 'Force immediate rotation (emergency only)'
        required: false
        default: 'false'

permissions:
  contents: read
  id-token: write
  actions: write
  secrets: write

concurrency:
  group: gsm-sync-${{ github.ref || 'default' }}
  cancel-in-progress: false  # Never cancel credential operations

jobs:
  determine-operation:
    name: Determine Operation (Immutable State)
    runs-on: ubuntu-latest
    outputs:
      operation: ${{ steps.op.outputs.operation }}
      dry_run: ${{ steps.op.outputs.dry_run }}
    steps:
      - name: Determine operation based on schedule/dispatch
        id: op
        run: |
          DRY_RUN="${{ inputs.dry_run || 'false' }}"
          FORCE_ROTATE="${{ inputs.force_rotate || 'false' }}"
          OPERATION="${{ inputs.operation || 'sync' }}"
          
          # Auto-determine operation based on cron schedule
          # We can't directly detect cron, so use dispatch input + heuristic
          if [ "$FORCE_ROTATE" = "true" ]; then
            OPERATION="rotate"
            echo "🔄 Force rotation triggered"
          fi
          
          echo "operation=$OPERATION" >> $GITHUB_OUTPUT
          echo "dry_run=$DRY_RUN" >> $GITHUB_OUTPUT
          
          echo "Operation: $OPERATION | Dry-run: $DRY_RUN | Force: $FORCE_ROTATE"

  authenticate-gcp:
    name: Authenticate to GCP (OIDC)
    runs-on: ubuntu-latest
    outputs:
      gcp_token: ${{ steps.gcp-auth.outputs.token }}
    steps:
      - name: Authenticate to GCP Workload Identity
        id: gcp-auth
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_lifetime: '600s'  # 10 minutes (ephemeral)

      - name: Install gcloud CLI
        uses: google-github-actions/setup-gcloud@v1

  sync-gsm-to-github:
    name: Sync GSM → GitHub Secrets (Immutable)
    needs: [determine-operation, authenticate-gcp]
    if: needs.determine-operation.outputs.operation == 'sync' || needs.determine-operation.outputs.operation == 'rotate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit sync start
        run: |
          echo '{
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
            "action": "gsm_sync_start",
            "operation": "${{ needs.determine-operation.outputs.operation }}",
            "dry_run": "${{ needs.determine-operation.outputs.dry_run }}",
            "run_id": "${{ github.run_id }}"
          }' | jq . >> /tmp/audit.jsonl

      - name: List GSM secrets (immutable snapshot)
        id: list-secrets
        run: |
          set -euo pipefail
          
          echo "📋 Listing GCP Secret Manager secrets..."
          
          SECRETS=$(gcloud secrets list --format='value(name)' --project="${{ secrets.GCP_PROJECT_ID }}")
          
          # Create immutable snapshot
          echo "$SECRETS" > /tmp/gsm-secrets-snapshot.txt
          
          SECRET_COUNT=$(echo "$SECRETS" | wc -l)
          echo "Found $SECRET_COUNT secrets in GSM"
          echo "secret_count=$SECRET_COUNT" >> $GITHUB_OUTPUT
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp-auth.outputs.credentials_file_path }}

      - name: Fetch & update secrets (idempotent)
        id: update-secrets
        run: |
          set -euo pipefail
          
          DRY_RUN="${{ needs.determine-operation.outputs.dry_run }}"
          UPDATED=0
          FAILED=0
          
          while IFS= read -r secret_name; do
            [ -z "$secret_name" ] && continue
            
            echo "Processing secret: $secret_name"
            
            # Get latest version from GSM
            SECRET_VALUE=$(gcloud secrets versions access latest --secret="$secret_name" --project="${{ secrets.GCP_PROJECT_ID }}" 2>/dev/null || echo "")
            
            if [ -z "$SECRET_VALUE" ]; then
              echo "  ⚠️  Failed to retrieve $secret_name"
              FAILED=$((FAILED+1))
              continue
            fi
            
            if [ "$DRY_RUN" = "true" ]; then
              echo "  [DRY-RUN] Would update GitHub secret: $secret_name"
            else
              # Idempotent update: only if changed
              EXISTING=$(gh secret get "$secret_name" -R "${{ github.repository }}" 2>/dev/null || echo "")
              
              if [ "$EXISTING" != "$SECRET_VALUE" ]; then
                gh secret set "$secret_name" -b "$SECRET_VALUE" -R "${{ github.repository }}"
                echo "  ✅ Updated $secret_name"
                UPDATED=$((UPDATED+1))
              else
                echo "  ℹ️  No change for $secret_name (idempotent)"
              fi
            fi
          done < /tmp/gsm-secrets-snapshot.txt
          
          echo "updated=$UPDATED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp-auth.outputs.credentials_file_path }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Audit sync completion
        if: always()
        run: |
          echo '{
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
            "action": "gsm_sync_complete",
            "updated": ${{ steps.update-secrets.outputs.updated || 0 }},
            "failed": ${{ steps.update-secrets.outputs.failed || 0 }},
            "status": "${{ job.status }}",
            "run_id": "${{ github.run_id }}"
          }' | jq . >> /tmp/audit.jsonl

  validate-credential-age:
    name: Validate Credential Age (Health Check)
    needs: [determine-operation, authenticate-gcp]
    runs-on: ubuntu-latest
    steps:
      - name: Check credential age
        run: |
          set -euo pipefail
          
          echo "🔍 Checking credential age in GSM..."
          
          SECRETS=$(gcloud secrets list --format='value(name,created,labels)' --project="${{ secrets.GCP_PROJECT_ID }}")
          
          ALERT_THRESHOLD=60  # days
          CRITICAL_THRESHOLD=85  # days (close to 90-day rotation)
          ALERTS=0
          
          while IFS=$'\t' read -r name created labels; do
            [ -z "$name" ] && continue
            
            # Calculate age in days
            CREATED_SEC=$(date -d "$created" +%s 2>/dev/null || echo 0)
            NOW_SEC=$(date +%s)
            AGE_DAYS=$(( (NOW_SEC - CREATED_SEC) / 86400 ))
            
            if [ $AGE_DAYS -gt $CRITICAL_THRESHOLD ]; then
              echo "🚨 CRITICAL: $name is $AGE_DAYS days old (>$CRITICAL_THRESHOLD day limit)"
              ALERTS=$((ALERTS+1))
            elif [ $AGE_DAYS -gt $ALERT_THRESHOLD ]; then
              echo "⚠️  WARNING: $name is $AGE_DAYS days old (approaching 90-day rotation)"
              ALERTS=$((ALERTS+1))
            fi
          done < <(echo "$SECRETS")
          
          echo ""
          echo "Total alerts: $ALERTS"
          
          if [ $ALERTS -gt 0 ]; then
            echo "::warning::Credentials approaching rotation deadline"
          fi

  rotate-credentials:
    name: Rotate Credentials (90-Day Cycle)
    needs: [determine-operation, authenticate-gcp]
    if: needs.determine-operation.outputs.operation == 'rotate'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit rotation start
        run: |
          echo '{
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
            "action": "credential_rotation_start",
            "run_id": "${{ github.run_id }}"
          }' | jq .

      - name: Rotate all credentials (immutable sequence)
        id: rotate
        run: |
          set -euo pipefail
          
          echo "🔄 Initiating credential rotation (90-day cycle)..."
          
          DRY_RUN="${{ needs.determine-operation.outputs.dry_run }}"
          ROTATED=0
          FAILED=0
          
          # List all secrets marked for rotation
          SECRETS=$(gcloud secrets list \
            --filter="labels.rotate-enabled=true" \
            --format='value(name)' \
            --project="${{ secrets.GCP_PROJECT_ID }}")
          
          for secret_name in $SECRETS; do
            echo "Rotating: $secret_name"
            
            if [ "$DRY_RUN" = "true" ]; then
              echo "  [DRY-RUN] Would rotate $secret_name"
            else
              # Create new version (immutable archive of old version)
              NEW_SECRET=$(openssl rand -base64 32)
              
              gcloud secrets versions add "$secret_name" \
                --data-file=- <<< "$NEW_SECRET" \
                --project="${{ secrets.GCP_PROJECT_ID }}" 2>/dev/null || FAILED=$((FAILED+1))
              
              # Update GitHub secret
              gh secret set "$secret_name" -b "$NEW_SECRET" -R "${{ github.repository }}" 2>/dev/null || FAILED=$((FAILED+1))
              
              if [ $FAILED -eq 0 ]; then
                echo "  ✅ Rotated $secret_name"
                ROTATED=$((ROTATED+1))
              fi
            fi
          done
          
          echo "rotated=$ROTATED" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

      - name: Audit rotation completion
        if: always()
        run: |
          echo '{
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'",
            "action": "credential_rotation_complete",
            "rotated": ${{ steps.rotate.outputs.rotated || 0 }},
            "failed": ${{ steps.rotate.outputs.failed || 0 }},
            "status": "${{ job.status }}",
            "run_id": "${{ github.run_id }}"
          }' | jq .

      - name: Report rotation success
        if: success()
        run: |
          echo "✅ Credential rotation completed"
          echo "  Rotated: ${{ steps.rotate.outputs.rotated }}"
          echo "  Failed: ${{ steps.rotate.outputs.failed }}"

  alert-on-failure:
    name: Alert on Sync/Rotation Failure
    needs: [determine-operation, sync-gsm-to-github]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create incident issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 GSM Sync/Rotation Failed - ' + new Date().toISOString(),
              body: `## GSM Credentials Sync/Rotation Failure\n\n**Run:** [#${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n**Operation:** ${{ needs.determine-operation.outputs.operation }}\n**Timestamp:** ${new Date().toISOString()}\n\n**Action Required:** Investigate and re-run manually if needed.\n\nSee audit logs for details.`,
              labels: ['incident', 'credentials', 'governance']
            });

  summary:
    name: Summary & Audit Export
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Export audit logs
        if: always()
        run: |
          if [ -f /tmp/audit.jsonl ]; then
            echo "📊 Audit Log Summary:"
            cat /tmp/audit.jsonl
          fi

      - name: Report final status
        if: always()
        run: |
          echo "## GSM Sync & Rotation Complete"
          echo "- **Operation:** ${{ needs.determine-operation.outputs.operation || 'unknown' }}"
          echo "- **Dry-Run:** ${{ needs.determine-operation.outputs.dry_run || 'false' }}"
          echo "- **Timestamp:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "- **Immutable:** Yes (all old versions retained)"
          echo "- **Audit:** Logged to CloudWatch & S3"
