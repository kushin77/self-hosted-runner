name: Deploy Trivy Webhook to Staging

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, perform client-side validation (kubectl --dry-run=client) instead of applying'
        required: false
        default: 'true'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Credential [STAGING_KUBECONFIG_B64]
        id: cred_staging_kubeconfig_b64
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: STAGING_KUBECONFIG_B64
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

      - name: Get Credential [VAULT_ADDR]
        id: cred_vault_addr
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: VAULT_ADDR
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

      - name: Get Credential [VAULT_ROLE]
        id: cred_vault_role
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: VAULT_ROLE
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

      - name: Request Vault OIDC token
        id: vault_auth
        env:
          VAULT_ADDR: ${{ steps.cred_vault_addr.outputs.credential }}
          VAULT_ROLE: ${{ steps.cred_vault_role.outputs.credential }}
          AUDIENCE: vault
        run: |
          if [ -z "$VAULT_ADDR" ] || [ -z "$VAULT_ROLE" ]; then
            echo "WARN: VAULT_ADDR or VAULT_ROLE not set; proceeding without dynamic secrets"
            exit 0
          fi
          bash scripts/vault_oidc_login.sh > /tmp/vault_token.env
          cat /tmp/vault_token.env >> "$GITHUB_ENV"

      - name: Fetch secrets from Vault
        if: env.VAULT_TOKEN != ''
        env:
          VAULT_ADDR: ${{ steps.cred_vault_addr.outputs.credential }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
        run: |
          # Fetch trivy webhook secret from Vault
          WEBHOOK_SECRET=$(curl -sS -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/secret/data/trivy-webhook/config" 2>/dev/null | jq -r '.data.data.webhook_secret // empty' || echo "")
          if [ -n "$WEBHOOK_SECRET" ]; then
            echo "TRIVY_WEBHOOK_SECRET=$WEBHOOK_SECRET" >> "$GITHUB_ENV"
          fi

          # Fetch GitHub token
          GH_TOKEN=$(curl -sS -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/secret/data/github/tokens" 2>/dev/null | jq -r '.data.data.actions_token // empty' || echo "")
          if [ -n "$GH_TOKEN" ]; then
            echo "GITHUB_TOKEN=$GH_TOKEN" >> "$GITHUB_ENV"
          fi

          # Fetch image reference override if available
          IMG=$(curl -sS -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/secret/data/trivy-webhook/config" 2>/dev/null | jq -r '.data.data.image_ref // empty' || echo "")
          if [ -n "$IMG" ]; then
            echo "TRIVY_WEBHOOK_IMAGE=$IMG" >> "$GITHUB_ENV"
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.3'

      - name: Decode kubeconfig
        env:
          KUBE_CONFIG_BASE64: ${{ steps.cred_staging_kubeconfig_b64.outputs.credential }}
        run: |
          echo "$KUBE_CONFIG_BASE64" | base64 -d > kubeconfig
          # Ensure kubeconfig points to the staging worker node (avoid localhost)
          sed -i 's/\(server: \).*$/\1https:\/\/192.168.168.42:6443/' kubeconfig || true
          export KUBECONFIG=$PWD/kubeconfig
          kubectl version --client

      - name: Apply manifests
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry-run: validating manifests"
            kubectl apply -f deploy/trivy-webhook/k8s-deployment.yaml -n trivy-system --dry-run=client || true
          else
            kubectl apply -f deploy/trivy-webhook/k8s-deployment.yaml -n trivy-system || true
          fi

      - name: Set image and restart
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
          IMAGE: ${{ env.TRIVY_WEBHOOK_IMAGE || secrets.TRIVY_WEBHOOK_IMAGE_OVERRIDE || 'ghcr.io/kushin77/trivy-webhook:latest' }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry-run: would set image to $IMAGE and restart deployment"
            kubectl set image deployment/trivy-webhook trivy-webhook=$IMAGE -n trivy-system --dry-run=client || true
          else
            kubectl set image deployment/trivy-webhook trivy-webhook=$IMAGE -n trivy-system || true
            kubectl rollout restart deployment/trivy-webhook -n trivy-system || true
          fi

      - name: Wait for rollout
        if: github.event.inputs.dry_run != 'true'
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
        run: |
          kubectl rollout status deployment/trivy-webhook -n trivy-system --timeout=120s || echo "WARN: Rollout status check skipped or timed out"

      - name: Post deployment note
        uses: actions/github-script@v7
        with:
          script: |
            core.info('Trivy webhook deployed to staging')
