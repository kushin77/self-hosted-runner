name: Vault Sync Run
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_dispatch:

jobs:
  vault-sync:
    name: Run Vault -> GitHub Secrets Sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
      secrets: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Vault CLI
        run: |
          sudo apt-get update && sudo apt-get install -y jq vault

      - name: Run Vault sync script
        run: |
          chmod +x scripts/ops/vault_sync.sh
          # expect VAULT_ADDR and optionally VAULT_TOKEN to be set as repo secrets
          ./scripts/ops/vault_sync.sh --addr "$VAULT_ADDR" --token "$VAULT_TOKEN" kushin77/self-hosted-runner "$@"
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
