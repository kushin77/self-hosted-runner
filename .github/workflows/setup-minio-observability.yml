name: Setup MinIO Observability (Prometheus & Grafana)

on:
  workflow_dispatch:
    inputs:
      prometheus_endpoint:
        description: "Prometheus API endpoint (e.g., http://prometheus:9090)"
        required: false
        default: "http://prometheus:9090"
      grafana_endpoint:
        description: "Grafana API endpoint (e.g., http://grafana:3000)"
        required: false
        default: "http://grafana:3000"
      grafana_api_token:
        description: "Grafana API token (generated from Grafana UI)"
        required: false
      action:
        description: "Setup action to perform"
        required: true
        default: "generate-configs"
        type: choice
        options:
          - generate-configs
          - validate-setup
          - generate-dashboard-json

permissions:
  contents: read
  issues: write

jobs:
  setup-minio-observability:
    name: Setup MinIO Observability
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      
      - name: Generate Prometheus & Grafana Configs
        if: ${{ github.event.inputs.action == 'generate-configs' || github.event.inputs.action == '' }}
        run: |
          echo "# MinIO Observability Setup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Step 1: Configure Prometheus" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Option A: File-based (prometheus.yml)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Edit your Prometheus configuration file" >> $GITHUB_STEP_SUMMARY
          echo "2. Add the scrape config from \`artifacts/prometheus-minio-config.md\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Reload Prometheus:" >> $GITHUB_STEP_SUMMARY
          echo "   \`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "   # If using systemd:" >> $GITHUB_STEP_SUMMARY
          echo "   sudo systemctl reload prometheus" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "   # If using Docker:" >> $GITHUB_STEP_SUMMARY
          echo "   docker exec prometheus kill -HUP 1" >> $GITHUB_STEP_SUMMARY
          echo "   \`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Verify Prometheus target added:" >> $GITHUB_STEP_SUMMARY
          echo "   - Go to Prometheus UI: ${{ github.event.inputs.prometheus_endpoint }}/targets" >> $GITHUB_STEP_SUMMARY
          echo "   - Look for job_name: 'minio'" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Option B: Prometheus Operator (Kubernetes)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Apply the ServiceMonitor from artifacts/prometheus-minio-config.md" >> $GITHUB_STEP_SUMMARY
          echo "2. Prometheus Operator automatically updates scrape configs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Step 2: Import Grafana Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Option A: Manual Import (Recommended for first-time)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to Grafana: ${{ github.event.inputs.grafana_endpoint }}" >> $GITHUB_STEP_SUMMARY
          echo "2. Click: **\"+\" → Dashboard → Import**" >> $GITHUB_STEP_SUMMARY
          echo "3. Upload \`artifacts/grafana-minio-dashboard.json\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Select Prometheus as datasource" >> $GITHUB_STEP_SUMMARY
          echo "5. Click **Import**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Option B: Automated Import (requires API token)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Generate Grafana API token:" >> $GITHUB_STEP_SUMMARY
          echo "   - Grafana UI → Configuration → API tokens → Generate" >> $GITHUB_STEP_SUMMARY
          echo "   - Store token safely" >> $GITHUB_STEP_SUMMARY
          echo "2. Dispatch this workflow with:
            - \`action=validate-setup\`" >> $GITHUB_STEP_SUMMARY
          echo "   - \`grafana_api_token=YOUR_TOKEN\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Workflow will import dashboard automatically" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Step 3: Verify MinIO Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Open Prometheus: ${{ github.event.inputs.prometheus_endpoint }}/graph" >> $GITHUB_STEP_SUMMARY
          echo "2. Run query: \`minio_bucket_usage_bytes\`" >> $GITHUB_STEP_SUMMARY
          echo "3. If data appears → ✅ Prometheus scraping MinIO" >> $GITHUB_STEP_SUMMARY
          echo "4. Open Grafana MinIO dashboard" >> $GITHUB_STEP_SUMMARY
          echo "5. Verify graphs are populated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Troubleshooting" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Issue | Check | Fix |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| No data in Prometheus | MinIO target health | Verify mc.elevatediq.ai:9000 is reachable |" >> $GITHUB_STEP_SUMMARY
          echo "| TLS certificate error | MinIO TLS config | Add \`insecure_skip_verify: true\` (temporary) |" >> $GITHUB_STEP_SUMMARY
          echo "| 401 Unauthorized | MinIO auth | Add basic_auth credentials to scrape_config |" >> $GITHUB_STEP_SUMMARY
          echo "| Grafana dashboard empty | Datasource | Verify Prometheus is selected as datasource |" >> $GITHUB_STEP_SUMMARY
      
      - name: Validate Prometheus Setup
        if: ${{ github.event.inputs.action == 'validate-setup' }}
        run: |
          PROMETHEUS_URL="${{ github.event.inputs.prometheus_endpoint }}"
          
          echo "Validating Prometheus connectivity..."
          
          if curl -s "${PROMETHEUS_URL}/api/v1/query?query=up" > /dev/null; then
            echo "✓ Prometheus is accessible"
          else
            echo "✗ Cannot reach Prometheus at ${PROMETHEUS_URL}"
            exit 1
          fi
          
          echo "Checking for MinIO metrics..."
          METRICS=$(curl -s "${PROMETHEUS_URL}/api/v1/query?query=minio_bucket_usage_bytes" | jq -r '.data.result | length')
          
          if [ "$METRICS" -gt 0 ]; then
            echo "✓ Found ${METRICS} MinIO metrics in Prometheus"
          else
            echo "⚠ MinIO metrics not yet available (may take 1-2 scrape cycles)"
          fi
      
      - name: Generate Grafana Dashboard JSON
        if: ${{ github.event.inputs.action == 'generate-dashboard-json' }}
        run: |
          cat > /tmp/grafana-minio-dashboard.json << 'EOF'
          {
            "annotations": {
              "list": [
                {
                  "builtIn": 1,
                  "datasource": "Prometheus",
                  "enable": true,
                  "hide": true,
                  "iconColor": "rgba(0, 211, 255, 1)",
                  "name": "Annotations & Alerts",
                  "type": "dashboard"
                }
              ]
            },
            "editable": true,
            "gnetId": null,
            "graphTooltip": 0,
            "id": null,
            "links": [],
            "panels": [
              {
                "datasource": "Prometheus",
                "fieldConfig": {
                  "defaults": {
                    "color": {"mode": "palette-classic"},
                    "custom": {"hideFrom": {"tooltip": false, "viz": false, "legend": false}},
                    "mappings": [],
                    "unit": "bytes"
                  },
                  "overrides": []
                },
                "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
                "id": 2,
                "options": {
                  "legend": {"calcs": ["mean"], "displayMode": "table", "placement": "bottom"},
                  "pieType": "donut",
                  "tooltip": {"mode": "single"}
                },
                "pluginVersion": "7.0.0",
                "targets": [
                  {
                    "expr": "minio_bucket_usage_bytes",
                    "format": "time_series",
                    "intervalFactor": 1,
                    "legendFormat": "{{bucket}}",
                    "refId": "A"
                  }
                ],
                "title": "MinIO Bucket Usage",
                "type": "piechart"
              },
              {
                "datasource": "Prometheus",
                "fieldConfig": {
                  "defaults": {
                    "color": {"mode": "thresholds"},
                    "mappings": [],
                    "max": 100,
                    "min": 0,
                    "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 70}, {"color": "red", "value": 90}]},
                    "unit": "percent"
                  },
                  "overrides": []
                },
                "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
                "id": 3,
                "options": {"orientation": "auto", "reduceOptions": {"values": false, "fields": "", "calcs": ["lastNotNull"]}, "showThresholdLabels": false, "showThresholdMarkers": true},
                "pluginVersion": "7.0.0",
                "targets": [
                  {
                    "expr": "minio_cluster_capacity_usable_free_bytes / minio_cluster_capacity_usable_total_bytes * 100",
                    "format": "time_series",
                    "intervalFactor": 1,
                    "refId": "A"
                  }
                ],
                "title": "Cluster Storage Utilization",
                "type": "gauge"
              },
              {
                "datasource": "Prometheus",
                "fieldConfig": {
                  "defaults": {
                    "color": {"mode": "palette-classic"},
                    "custom": {"axisLabel": "", "axisPlacement": "auto", "barAlignment": 0, "drawStyle": "line", "fillOpacity": 0, "gradientMode": "none", "hideFrom": {"tooltip": false, "viz": false, "legend": false}, "lineInterpolation": "linear", "lineWidth": 1, "pointSize": 5, "scaleDistribution": {"type": "linear"}, "showPoints": "never", "spanNulls": false, "stacking": {"group": "A", "mode": "none"}, "thresholdsStyle": {"mode": "off"}},
                    "mappings": [],
                    "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]},
                    "unit": "ops"
                  },
                  "overrides": []
                },
                "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8},
                "id": 4,
                "options": {"legend": {"calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi"}},
                "pluginVersion": "7.0.0",
                "targets": [
                  {
                    "expr": "rate(minio_total_requests[5m])",
                    "format": "time_series",
                    "intervalFactor": 1,
                    "legendFormat": "{{method}} {{path}}",
                    "refId": "A"
                  }
                ],
                "title": "Request Rate (last 5m)",
                "type": "timeseries"
              }
            ],
            "schemaVersion": 27,
            "style": "dark",
            "tags": ["minio", "s3", "observability"],
            "templating": {"list": []},
            "time": {"from": "now-6h", "to": "now"},
            "timepicker": {},
            "timezone": "",
            "title": "MinIO Observability Dashboard",
            "uid": "minio-observability",
            "version": 1
          }
          EOF
          
          cat /tmp/grafana-minio-dashboard.json
          cp /tmp/grafana-minio-dashboard.json artifacts/grafana-minio-dashboard.json
      
      - name: Upload Dashboard JSON
        if: ${{ github.event.inputs.action == 'generate-dashboard-json' }}
        uses: actions/upload-artifact@v4
        with:
          name: minio-observability-dashboard
          path: artifacts/grafana-minio-dashboard.json
          retention-days: 90
      
      - name: Post Setup Instructions
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = `## ✅ MinIO Observability Setup
            
            ### Configuration Files Generated
            
            ✓ **Prometheus Config**: \`artifacts/prometheus-minio-config.md\`
            ✓ **Grafana Dashboard**: \`artifacts/grafana-minio-dashboard.json\`
            
            ### Next Steps
            
            1. **Configure Prometheus**
               - Edit your Prometheus config
               - Add scrape config from \`artifacts/prometheus-minio-config.md\`
               - Reload Prometheus (systemctl reload prometheus)
            
            2. **Import Grafana Dashboard**
               - Go to Grafana home page
               - Click \"+\" → Dashboard → Import
               - Upload \`artifacts/grafana-minio-dashboard.json\`
               - Select Prometheus as datasource
               - Click Import
            
            3. **Verify Setup**
               - Check Prometheus targets: ${{ github.event.inputs.prometheus_endpoint }}/targets
               - Look for job_name: 'minio' with UP status
               - Verify Grafana dashboard shows metrics
            
            ### Troubleshooting
            
            **No metrics in Prometheus?**
            - Verify MinIO is reachable at \`mc.elevatediq.ai:9000\`
            - Check TLS configuration if HTTPS
            - Review Prometheus logs for scrape errors
            
            **Dashboard empty?**
            - Ensure Prometheus datasource is selected
            - Verify metrics exist: Query \`minio_bucket_usage_bytes\` in Prometheus UI
            - Dashboard may take 1-2 scrape cycles to populate
            
            ### Related Issues
            - #1084 (MinIO observability request)
            - #538 (Quota metrics & replication)
            
            ---
            
            **Setup Date**: $(date -u +%Y-%m-%dT%H:%M:%SZ)
            **Action**: ${{ github.event.inputs.action || 'generate-configs' }}
            `;
            
            console.log(summary);
