name: Self-hosted Runner Smoke Test
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
on:
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke test on self-hosted runner
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner labels
        run: |
          echo "Runner: $RUNNER_NAME"
          echo "Labels:"
          echo "$RUNNER_LABELS"

      - name: Run simple script
        run: |
          echo "Self-hosted runner is active"
          uname -a
          echo "Done"