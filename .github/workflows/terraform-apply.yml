name: Terraform Apply (manual)

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Terraform Plan (consume Packer AMI)"]
    types: [completed]

jobs:
  call-apply:
    name: Call reusable Terraform apply
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: terraform-apply-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    uses: ./.github/workflows/reusable/terraform-apply-callable.yml
    secrets:
      MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
      MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    with:
      plan-object: terraform-plan
