name: Terraform Apply - Production

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  TF_WORKING_DIR: nexusshield/infrastructure/terraform/production

jobs:
  apply:
    name: Terraform Apply (requires environment approval)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.6

      - name: Authenticate to GCP via OIDC (preferred)
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Fallback: activate service account key (if provided)
        if: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" > /tmp/gcp-key.json
          pip install --quiet google-auth
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false
