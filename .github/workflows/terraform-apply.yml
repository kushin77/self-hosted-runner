name: Terraform Plan/Apply (safe)
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Set to true to run apply after plan (default: false)'
        required: false
        default: 'false'

jobs:
  terraform:
    name: Terraform plan/apply
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: '1.5.0'

      - name: Write prod var-file from secret
        if: ${{ secrets.PROD_TFVARS != '' }}
        run: |
          mkdir -p terraform
          echo "Writing terraform/prod.tfvars (masked)"
          echo "${{ secrets.PROD_TFVARS }}" > terraform/prod.tfvars

      - name: Configure Google credentials
        if: ${{ secrets.GOOGLE_CREDENTIALS != '' }}
        run: |
          # Use GH output to export path for subsequent steps
          echo "${{ secrets.GOOGLE_CREDENTIALS }}" > /tmp/gcloud-creds.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcloud-creds.json" >> $GITHUB_ENV
          # mask file contents
          echo '*** GOOGLE_CREDENTIALS written and masked ***'

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -input=false

      - name: Terraform plan
        id: plan
        working-directory: terraform
        run: |
          if [ -f prod.tfvars ]; then
            terraform plan -var-file=prod.tfvars -out=prod.tfplan -input=false
          else
            terraform plan -out=prod.tfplan -input=false
          fi

      - name: Upload plan artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/prod.tfplan

      - name: Apply plan (manual opt-in)
        if: ${{ github.event.inputs.apply == 'true' }}
        working-directory: terraform
        run: |
          terraform apply -input=false prod.tfplan