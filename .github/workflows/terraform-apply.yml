name: Terraform Apply (manual)
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Terraform Plan (consume Packer AMI)"]
    types: [completed]

jobs:
  fetch-aws-creds:
    name: Fetch AWS Credentials from GSM
    uses: ./.github/workflows/fetch-aws-creds-from-gsm.yml
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

  call-apply:
    name: Call reusable Terraform apply
    needs: [fetch-aws-creds]
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: terraform-apply-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    uses: ./.github/workflows/reusable/terraform-apply-callable.yml
    secrets:
      MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
    with:
      plan-object: terraform-plan
      aws_access_key_id: ${{ needs.fetch-aws-creds.outputs.aws_access_key_id }}
      aws_secret_access_key: ${{ needs.fetch-aws-creds.outputs.aws_secret_access_key }}
      aws_region: ${{ needs.fetch-aws-creds.outputs.aws_region }}

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true