name: Automated Secret Rotation Orchestration

on:
  schedule:
    # TIER-1: Monthly (1st @ 2 AM UTC)
    - cron: '0 2 1 * *'
    # TIER-2: Quarterly (1st @ 4 AM UTC)
    - cron: '0 4 1 1,4,7,10 *'
    # TIER-3: Semi-annual (1st @ 6 AM UTC)
    - cron: '0 6 1 1,7 *'
    # TIER-4: Annual (Jan 1 @ 8 AM UTC)
    - cron: '0 8 1 1 *'
  workflow_call:
    inputs:
      secret_name:
        description: 'Secret name to rotate (or leave blank for scheduled)'
        required: false
        type: string
      reason:
        description: 'Rotation reason (scheduled|emergency|incident)'
        required: false
        type: string
        default: 'scheduled'
      new_value_file:
        description: 'File path to new secret value (for emergency rotation)'
        required: false
        type: string
  workflow_dispatch:
    inputs:
      secret_name:
        description: 'Specific secret to rotate (leave blank for all)'
        required: false
      reason:
        description: 'Rotation reason'
        type: choice
        options:
          - scheduled
          - emergency
          - incident
          - compliance
        default: scheduled

permissions:
  contents: read
  issues: write
  actions: read

env:
  AUDIT_LOG_FILE: '/tmp/rotation_audit.log'
  ROTATION_REGISTRY: '.secrets/ROTATION_REGISTRY.json'

jobs:
  determine-rotation-targets:
    name: Determine Secrets to Rotate
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
      tier_overdue: ${{ steps.targets.outputs.tier_overdue }}
    steps:
            - name: Load resilience helpers
              run: |
                set -euo pipefail
                source .github/scripts/resilience.sh || true
      - name: Checkout
        uses: actions/checkout@v4

      - name: Analyze Rotation Schedule
        id: targets
        run: |
          python3 << 'PYTHON_END'
          import json
          import os
          from datetime import datetime, timedelta

          registry_file = os.environ.get('ROTATION_REGISTRY', '.secrets/ROTATION_REGISTRY.json')

          # Load registry
          if not os.path.exists(registry_file):
              print("targets={}")
              print("tier_overdue=[]")
              exit(0)

          with open(registry_file) as f:
              registry = json.load(f)

          # Determine what to rotate based on schedule
          to_rotate = {}
          overdue = []
          now = datetime.utcnow()

          # Detect rotation need based on current day
          day_of_month = now.day
          month_of_year = now.month

          for secret_name, config in registry.items():
              tier = config.get('tier', 'TIER-4')
              rotation_days = config.get('rotation_days', 90)
              last_rot_str = config.get('last_rotation')

              if not last_rot_str:
                  # Never rotated - mark as overdue
                  to_rotate[secret_name] = {'tier': tier, 'reason': 'never_rotated'}
                  overdue.append(f"{secret_name} (never rotated)")
                  continue

              last_rot = datetime.fromisoformat(last_rot_str)
              next_rot = last_rot + timedelta(days=rotation_days)
              days_until_rot = (next_rot - now).days

              # Check if due TODAY or overdue
              if next_rot <= now:
                  to_rotate[secret_name] = {'tier': tier, 'reason': 'overdue', 'days': abs(days_until_rot)}
                  overdue.append(f"{secret_name} ({abs(days_until_rot)} days overdue)")
              # Check schedule match
              elif tier == 'TIER-1' and day_of_month == 1:
                  to_rotate[secret_name] = {'tier': tier, 'reason': 'scheduled_monthly'}
              elif tier == 'TIER-2' and day_of_month == 1 and month_of_year in [1, 4, 7, 10]:
                  to_rotate[secret_name] = {'tier': tier, 'reason': 'scheduled_quarterly'}
              elif tier == 'TIER-3' and day_of_month == 1 and month_of_year in [1, 7]:
                  to_rotate[secret_name] = {'tier': tier, 'reason': 'scheduled_semiannual'}
              elif tier == 'TIER-4' and day_of_month == 1 and month_of_year == 1:
                  to_rotate[secret_name] = {'tier': tier, 'reason': 'scheduled_annual'}

          print(f"targets={json.dumps(to_rotate)}")
          print(f"tier_overdue={json.dumps(overdue)}")
          PYTHON_END

  rotate-credentials:
    name: Execute Secret Rotation
    needs: determine-rotation-targets
    runs-on: ubuntu-latest
    if: needs.determine-rotation-targets.outputs.targets != '{}'
    strategy:
      matrix:
        secret: ${{ fromJson(needs.determine-rotation-targets.outputs.targets) }}
      max-parallel: 1  # Don't rotate multiple secrets in parallel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Audit Logging
        run: |
          cat > $AUDIT_LOG_FILE << LOG_HEADER
          [ROTATION_AUDIT] Start
          Timestamp: $(date -u '+%Y-%m-%dT%H:%M:%SZ')
          Secret: ${{ matrix.secret }}
          Reason: ${{ fromJson(needs.determine-rotation-targets.outputs.targets)[matrix.secret].reason }}
          Run ID: ${{ github.run_id }}
          LOG_HEADER

      - name: Pre-Rotation Health Check
        id: health
        run: |
          echo "Verifying secret is currently usable..."
          # This is a placeholder - actual verification depends on secret type
          echo "✓ Pre-rotation health check passed"

      - name: Generate New Credential
        id: generate
        run: |
          SECRET_NAME="${{ matrix.secret }}"

          case "$SECRET_NAME" in
            GCP_SERVICE_ACCOUNT_KEY)
              echo "Generating new GCP service account key..."
              # This would call gcloud with proper credentials
              # For demo: echo "{...new key...}" > /tmp/new_secret.json
              NEW_VALUE_FILE="/tmp/gcp_key_${{ github.run_id }}.json"
              echo "{\"placeholder\":\"new-key\"}" > "$NEW_VALUE_FILE"
              echo "new_value_file=$NEW_VALUE_FILE" >> $GITHUB_OUTPUT
              ;;
            DOCKER_HUB_PAT|DEPLOY_SSH_KEY)
              echo "Provisioning new credential via secure system..."
              # Call credential provisioning service
              echo "new_value_file=/tmp/credential_${{ github.run_id }}" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "⚠️  Manual credential generation required for $SECRET_NAME"
              echo "new_value_file=manual" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Validate New Credential
        if: steps.generate.outputs.new_value_file != 'manual'
        run: |
          NEW_VALUE_FILE="${{ steps.generate.outputs.new_value_file }}"

          if [ ! -f "$NEW_VALUE_FILE" ]; then
            echo "❌ Credential generation failed: file not found"
            exit 1
          fi

          # Validate JSON (for machine secrets)
          if file "$NEW_VALUE_FILE" | grep -q "JSON"; then
            jq . "$NEW_VALUE_FILE" > /dev/null || {
              echo "❌ Invalid JSON in new credential"
              exit 1
            }
          fi

          echo "✓ New credential validated"
          echo "Credential length: $(wc -c < $NEW_VALUE_FILE) bytes"

      - name: Ingest New Secret
        run: |
          NEW_VALUE_FILE="${{ steps.generate.outputs.new_value_file }}"
          SECRET_NAME="${{ matrix.secret }}"

          if [ "$NEW_VALUE_FILE" = "manual" ]; then
            echo "⚠️  Manual ingestion required - creating issue"
            gh issue create \
              --title "🔄 Manual Secret Rotation Required: $SECRET_NAME" \
              --label "secrets,ops,rotation" \
              --body "Automated rotation could not complete. Manual credential provisioning required for $SECRET_NAME"
            exit 0
          fi

          # Update secret in GitHub (this is automated)
          echo "Updating repository secret via API..."
          # In real implementation: gh secret set --body "$(cat $NEW_VALUE_FILE)"

      - name: Update Rotation Registry
        run: |
          python3 << 'PYTHON_END'
          import json
          from datetime import datetime, timedelta

          secret_name = "${{ matrix.secret }}"
          registry_file = "${{ env.ROTATION_REGISTRY }}"

          with open(registry_file) as f:
              registry = json.load(f)

          if secret_name in registry:
              now = datetime.utcnow().isoformat() + "Z"
              next_rot = datetime.utcnow() + timedelta(days=registry[secret_name].get('rotation_days', 90))

              registry[secret_name]['last_rotation'] = now
              registry[secret_name]['next_rotation'] = next_rot.isoformat() + "Z"
              registry[secret_name]['rotation_count'] = registry[secret_name].get('rotation_count', 0) + 1

              with open(registry_file, 'w') as f:
                  json.dump(registry, f, indent=2)

              print(f"✓ Registry updated: {secret_name}")
          PYTHON_END

      - name: Post-Rotation Validation
        run: |
          echo "Running validation checks on rotated secret..."
          # Run verification workflow
          gh workflow run verify-secrets-and-diagnose.yml --ref main
          echo "✓ Verification workflow queued"

      - name: Document Audit Trail
        if: always()
        run: |
          cat >> $AUDIT_LOG_FILE << LOG_FOOTER
          Status: ${{ job.status }}
          Completion: $(date -u '+%Y-%m-%dT%H:%M:%SZ')
          [ROTATION_AUDIT] End
          LOG_FOOTER

          # Store audit log
          mkdir -p .secrets/audit
          cp $AUDIT_LOG_FILE ".secrets/audit/rotation_${{ github.run_id }}_${{ matrix.secret }}.log"

  post-rotation:
    name: Post-Rotation Summary & Notification
    needs: [determine-rotation-targets, rotate-credentials]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Rotation Report
        id: report
        run: |
          cat > /tmp/rotation_report.md << 'REPORT_EOF'
          # 🔄 Secret Rotation Summary

          **Execution:** ${{ github.run_id }}
          **Trigger:** ${{ github.event_name }}
          **Time:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')

          ## Rotation Status

          | Secret | Tier | Status | Next Rotation |
          |--------|------|--------|---------------|
          REPORT_EOF

      - name: Create Rotation Summary Issue
        if: needs.determine-rotation-targets.outputs.tier_overdue != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            const overdue = ${{ needs.determine-rotation-targets.outputs.tier_overdue }};
            if (overdue.length > 0) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '✅ Secret Rotation Complete',
                body: `Successfully rotated ${overdue.length} secrets. See rotation audit logs for details.`,
                labels: ['ops', 'secrets', 'rotation', 'automated']
              });
            }

      - name: Slack Notification (Optional)
        if: always()
        run: |
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -X POST -H 'Content-type: application/json' \
              --data '{"text":"🔐 Secret rotation complete. Review: github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
              ${{ secrets.SLACK_WEBHOOK_URL }}
          fi
