name: GSM Secrets Sync

on:
  schedule:
    # Run weekly on Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    name: Sync GSM → GitHub Secrets
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
        continue-on-error: true
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        if: steps.auth.outcome == 'success'
      
      - name: Sync GSM secrets to GitHub (idempotent)
        run: |
          #!/bin/bash
          set -e
          
          SECRETS=(
            "github-pat-automation"
            "gcp-service-account-json"
            "aws-access-key-id"
            "aws-secret-access-key"
            "docker-registry-token"
          )
          
          synced=0
          failed=0
          
          for secret_name in "${SECRETS[@]}"; do
            echo "Processing secret: $secret_name"
            
            if secret_value=$(gcloud secrets versions access latest --secret="$secret_name" 2>/dev/null); then
              if gh secret set "$secret_name" --body "$secret_value" 2>/dev/null; then
                echo "✓ Synced $secret_name"
                ((synced++))
              else
                echo "✗ Failed to sync $secret_name to GitHub"
                ((failed++))
              fi
            else
              echo "⚠ Secret $secret_name not found in GSM (skipping)"
            fi
          done
          
          echo ""
          echo "Summary: Synced=$synced, Failed=$failed, Skipped=$((${#SECRETS[@]} - synced - failed))"
          
          if [ $failed -gt 0 ]; then
            echo "⚠ Some secrets failed to sync. Check logs above."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: steps.auth.outcome == 'success'
      
      - name: Skip sync (auth or GSM unavailable)
        if: steps.auth.outcome != 'success'
        run: |
          echo "⚠ GCP authentication or GSM unavailable."
          echo "This is expected if:"
          echo "  - Workload Identity Federation is not configured"
          echo "  - Google Cloud project does not exist"
          echo "  - Service account lacks secretmanager.secretAccessor role"
          echo ""
          echo "For production, ensure GSM integration is fully configured."
          exit 0
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: process.env.ISSUE_NUMBER || 1396,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠ GSM secrets sync workflow failed. Check Actions run for details: ' + context.payload.pull_request?.html_url || context.ref
            })
        env:
          ISSUE_NUMBER: '1396'
        continue-on-error: true
