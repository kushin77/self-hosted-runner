# Example workflow demonstrating Vault OIDC authentication
# This is documentation/reference; not part of active CD pipeline
# For production, use deploy-rotation-staging.yml and deploy-immutable-ephemeral.yml
name: Publish Portal with Vault Secrets (example)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build-publish:
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: vault-secrets-example-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure OIDC
        id: oidc
        run: echo "Using OIDC to authenticate to Vault"

      - name: Authenticate to Vault via OIDC and fetch GHCR_PAT
        uses: hashicorp/vault-action@v2
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: oidc
          role: github-actions
          oidc_client_id: "github"
          export_env: true
          secrets: |
            secret/data/ci/ghcr#GHCR_PAT

      - name: Show secret env (masked)
        run: echo "GHCR_PAT length=${#GHCR_PAT}" || true

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ env.GHCR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: apps/portal
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/portal:latest

      - name: Notify (example)
        run: echo "Published portal image using Vault-sourced GHCR_PAT"
