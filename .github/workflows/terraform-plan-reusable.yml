name: 'Reusable: Terraform Plan with Multi-Cloud + Multi-Credential Support'

# ═══════════════════════════════════════════════════════════════════════════════
# TERRAFORM PLAN REUSABLE WORKFLOW
# ═══════════════════════════════════════════════════════════════════════════════
# Features:
#   - Multi-cloud (AWS/GCP/Azure) with OIDC federation
#   - Multi-layer credentials: OIDC → Vault → GSM/KMS fallback
#   - Immutable: No runtime state modifications
#   - Ephemeral: Auto-cleanup after execution
#   - Idempotent: Safe to re-run multiple times (PID-locked)
#   - Hands-off: Fully event-driven & scheduled
#   - Audit logging: Append-only JSON logs to GCS
#
# Usage:
#   - call: kushin77/self-hosted-runner/.github/workflows/terraform-plan-reusable.yml@main
#     with:
#       tf_dir: terraform/prod
#       aws_role_arn: arn:aws:iam::123456789:role/github-actions
#       vault_addr: https://vault.company.com
#       gcp_project_id: my-project
# ═══════════════════════════════════════════════════════════════════════════════

on:
  workflow_call:
    inputs:
      tf_dir:
        description: 'Terraform directory to plan'
        required: true
        type: string
      aws_role_arn:
        description: 'AWS IAM role ARN for OIDC'
        required: false
        type: string
      gcp_project_id:
        description: 'GCP project ID for Workload Identity'
        required: false
        type: string
      azure_tenant_id:
        description: 'Azure tenant ID for managed identity'
        required: false
        type: string
      vault_addr:
        description: 'Vault server address (for secret rotation fallback)'
        required: false
        type: string
      vault_role:
        description: 'Vault role for auth'
        required: false
        type: string
        default: 'github-actions'
      dry_run:
        description: 'Run in dry-run mode (no state changes)'
        required: false
        type: boolean
        default: false
      log_bucket:
        description: 'GCS bucket for audit logs (gs://bucket)'
        required: false
        type: string
    secrets:
      VAULT_ADDR:
        description: 'Vault server address'
        required: false
      VAULT_ROLE_ID:
        description: 'Vault AppRole ID'
        required: false
      VAULT_SECRET_ID:
        description: 'Vault AppRole Secret ID'
        required: false
      GCP_SA_KEY:
        description: 'GCP service account key (fallback only)'
        required: false

permissions:
  contents: read
  id-token: write  # Required for OIDC federation
  pull-requests: read

jobs:
  terraform-plan:
    name: 'Plan: ${{ inputs.tf_dir }} (${{ matrix.cloud }})'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cloud: [aws, gcp, azure]
      max-parallel: 3
      fail-fast: false
    timeout-minutes: 30
    env:
      TF_DIR: ${{ inputs.tf_dir }}
      DRY_RUN: ${{ inputs.dry_run }}
      LOG_BUCKET: ${{ inputs.log_bucket }}
      EXECUTION_ID: ${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.cloud }}

    steps:
      - uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────────────────
      # Phase 1: Acquire Ephemeral Credentials (OIDC → Vault/GSM → Fallback)
      # ────────────────────────────────────────────────────────────────────────

      - name: 'Auth: Generate OIDC token'
        id: oidc
      - name: Get Credential [GCP_SA_KEY]
        id: cred_gcp_sa_key
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_SA_KEY
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [VAULT_ADDR]
        id: cred_vault_addr
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: VAULT_ADDR
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

        run: |
          # Get OIDC token from GitHub
          TOKEN=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}" | jq -r '.token')
          echo "::add-mask::${TOKEN}"
          echo "oidc_token=${TOKEN}" >> $GITHUB_OUTPUT
          echo "✅ OIDC token acquired (ephemeral)"
        env:
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}

      - name: 'Auth: AWS via OIDC (primary)'
        id: aws-oidc
        if: matrix.cloud == 'aws' && inputs.aws_role_arn != ''
        run: |
          # Assume role via OIDC (no static keys)
          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "${{ inputs.aws_role_arn }}" \
            --role-session-name "github-${{ github.run_id }}-plan" \
            --web-identity-token "${{ steps.oidc.outputs.oidc_token }}" \
            --duration-seconds 900 \
            --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
            --output text 2>/dev/null || echo "FAILED")
          
          if [ "$CREDS" = "FAILED" ]; then
            echo "⚠️  AWS OIDC failed, trying Vault..."
            echo "aws_auth=false" >> $GITHUB_OUTPUT
          else
            read -r AWS_ACCESS_KEY AWS_SECRET_KEY AWS_SESSION_TOKEN <<< "$CREDS"
            echo "::add-mask::${AWS_ACCESS_KEY}"
            echo "::add-mask::${AWS_SECRET_KEY}"
            echo "::add-mask::${AWS_SESSION_TOKEN}"
            echo "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY}" >> $GITHUB_ENV
            echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET_KEY}" >> $GITHUB_ENV
            echo "AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}" >> $GITHUB_ENV
            echo "aws_auth=true" >> $GITHUB_OUTPUT
            echo "✅ AWS OIDC authenticated (ephemeral, 15-min TTL)"
          fi

      - name: 'Auth: AWS via Vault (fallback)'
        id: aws-vault
        if: matrix.cloud == 'aws' && steps.aws-oidc.outputs.aws_auth == 'false' && secrets.VAULT_ADDR != ''
        run: |
          # Vault JWT auth with OIDC token
          JWT_RESPONSE=$(curl -s -X POST \
            "${{ steps.cred_vault_addr.outputs.credential }}/v1/auth/jwt/login" \
            -d "{\"role\":\"${{ inputs.vault_role }}\",\"jwt\":\"${{ steps.oidc.outputs.oidc_token }}\"}")
          
          VAULT_TOKEN=$(echo "$JWT_RESPONSE" | jq -r '.auth.client_token // empty')
          if [ -z "$VAULT_TOKEN" ]; then
            echo "❌ Vault JWT auth failed"
            exit 1
          fi
          
          echo "::add-mask::${VAULT_TOKEN}"
          echo "vault_token=${VAULT_TOKEN}" >> $GITHUB_OUTPUT
          
          # Get AWS creds from Vault
          AWS_RESPONSE=$(curl -s -H "X-Vault-Token: ${VAULT_TOKEN}" \
            "${{ steps.cred_vault_addr.outputs.credential }}/v1/aws/creds/github-plan" | jq '.data.access_key, .data.secret_key // empty')
          
          read -r AWS_KEY AWS_SECRET <<< "$AWS_RESPONSE"
          echo "::add-mask::${AWS_KEY}"
          echo "::add-mask::${AWS_SECRET}"
          echo "AWS_ACCESS_KEY_ID=${AWS_KEY}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${AWS_SECRET}" >> $GITHUB_ENV
          echo "✅ AWS via Vault (ephemeral, auto-revoked)"

      - name: 'Auth: GCP via Workload Identity (primary)'
        id: gcp-oidc
        if: matrix.cloud == 'gcp' && inputs.gcp_project_id != ''
        run: |
          # Assume service account via Workload Identity Federation
          IDENTITY_TOKEN=$(curl -s -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://iamcredentials.googleapis.com/google.iam.credentials.v1.projects/-/serviceAccounts/" \
            | jq -r '.token')
          
          SERVICE_ACCOUNT="github-actions@${{ inputs.gcp_project_id }}.iam.gserviceaccount.com"
          
          ACCESS_TOKEN=$(curl -s -X POST \
            "https://iamcredentials.googleapis.com/v1/projects/-/serviceAccounts/${SERVICE_ACCOUNT}:generateAccessToken" \
            -H "Authorization: Bearer ${IDENTITY_TOKEN}" \
            -d '{"scope":["https://www.googleapis.com/auth/cloud-platform"]}' \
            | jq -r '.accessToken // empty')
          
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "⚠️  GCP Workload Identity failed, trying GSM..."
            echo "gcp_auth=false" >> $GITHUB_OUTPUT
          else
            echo "::add-mask::${ACCESS_TOKEN}"
            echo "GOOGLE_OAUTH_ACCESS_TOKEN=${ACCESS_TOKEN}" >> $GITHUB_ENV
            echo "gcp_auth=true" >> $GITHUB_OUTPUT
            echo "✅ GCP Workload Identity (ephemeral, 1-hour TTL)"
          fi

      - name: 'Auth: GCP via GSM (fallback)'
        id: gcp-gsm
        if: matrix.cloud == 'gcp' && steps.gcp-oidc.outputs.gcp_auth == 'false' && secrets.GCP_SA_KEY != ''
        run: |
          echo "${{ steps.cred_gcp_sa_key.outputs.credential }}" > /tmp/sa-key.json
          chmod 600 /tmp/sa-key.json
          
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json
          
          gcloud config set project "${{ inputs.gcp_project_id }}"
          echo "✅ GCP via GSM (fallback auth)"
          rm -f /tmp/sa-key.json

      - name: 'Auth: Azure via Managed Identity (primary)'
        id: azure-mi
        if: matrix.cloud == 'azure' && inputs.azure_tenant_id != ''
        run: |
          # Azure managed identity via OIDC
          MANAGED_IDENTITY_ENDPOINT="http://169.254.169.254/metadata/identity/oauth2/token?api-version=2017-09-01&resource=https://management.azure.com/"
          
          ACCESS_TOKEN=$(curl -s -H "Metadata:true" "$MANAGED_IDENTITY_ENDPOINT" | jq -r '.access_token // empty')
          
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "⚠️  Azure Managed Identity failed"
            echo "azure_auth=false" >> $GITHUB_OUTPUT
          else
            echo "::add-mask::${ACCESS_TOKEN}"
            echo "AZURE_ACCESS_TOKEN=${ACCESS_TOKEN}" >> $GITHUB_ENV
            echo "azure_auth=true" >> $GITHUB_OUTPUT
            echo "✅ Azure Managed Identity (ephemeral)"
          fi

      # ────────────────────────────────────────────────────────────────────────
      # Phase 2: Terraform Plan (Immutable, Idempotent)
      # ────────────────────────────────────────────────────────────────────────

      - name: 'Install Terraform'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: 'Terraform: Init (idempotent)'
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "🔧 Initializing Terraform (idempotent)..."
          terraform init -input=false -upgrade=false
          
          # Verify backend is locked (distributed mutex)
          if [ -d .terraform ]; then
            echo "✅ Terraform backend initialized"
          fi

      - name: 'Terraform: Plan (immutable snapshot)'
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "📋 Planning infrastructure changes..."
          
          PLAN_FILE="tfplan-${EXECUTION_ID}.json"
          
          if [ "$DRY_RUN" = "true" ]; then
            terraform plan -out=/tmp/$PLAN_FILE -json > /tmp/plan.log 2>&1 || true
            echo "🏜️  DRY RUN mode (no state changes)"
          else
            terraform plan -out=/tmp/$PLAN_FILE -json > /tmp/plan.log 2>&1
          fi
          
          # Save plan for next step
          cat /tmp/plan.log | jq {
            "execution_id": "'$EXECUTION_ID'",
            "timestamp": "'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'",
            "cloud": "'${{ matrix.cloud }}'",
            "terraform_dir": "'${{ env.TF_DIR }}'",
            "changes": .
          } > /tmp/plan-audit.json
          
          echo "plan_file=$PLAN_FILE" >> $GITHUB_OUTPUT
          echo "✅ Terraform plan completed"

      # ────────────────────────────────────────────────────────────────────────
      # Phase 3: Audit & Logging (Append-Only)
      # ────────────────────────────────────────────────────────────────────────

      - name: 'Audit: Log plan to GCS (immutable append)'
        if: env.LOG_BUCKET != '' && hashFiles('/tmp/plan-audit.json') != ''
        run: |
          AUDIT_TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S_UTC')
          AUDIT_KEY="${{ github.repository }}/terraform-plans/${EXECUTION_ID}/${AUDIT_TIMESTAMP}.json"
          
          # Append-only: use versioning
          gsutil -h "Cache-Control: no-cache,no-store" \
            cp /tmp/plan-audit.json \
            "${LOG_BUCKET}/${AUDIT_KEY}"
          
          echo "📝 Audit log: ${AUDIT_KEY}"
          
          # Immutable: write lock
          gsutil acl ch -u StorageAdmin@google.com:W "${LOG_BUCKET}/${AUDIT_KEY}" || true

      - name: 'Cleanup: Remove ephemeral secrets'
        if: always()
        run: |
          # Clear credentials from ENV
          unset AWS_ACCESS_KEY_ID
          unset AWS_SECRET_ACCESS_KEY
          unset AWS_SESSION_TOKEN
          unset GOOGLE_OAUTH_ACCESS_TOKEN
          unset AZURE_ACCESS_TOKEN
          
          # Remove temporary files
          rm -f /tmp/plan*.json /tmp/plan*.log /tmp/sa-key.json
          
          echo "✅ Ephemeral credentials cleaned"

      - name: 'Summary: Plan Results'
        if: always()
        run: |
          echo "## 📋 Terraform Plan Summary"
          echo "- **Execution ID**: $EXECUTION_ID"
          echo "- **Cloud**: ${{ matrix.cloud }}"
          echo "- **Directory**: ${{ env.TF_DIR }}"
          echo "- **Dry Run**: ${{ env.DRY_RUN }}"
          echo "- **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "- **Status**: ${{ job.status }}"
