name: Monitor Ingestion & Workflow Progress

on:
  # Converted to event-driven: removed frequent polling
  workflow_dispatch:
  repository_dispatch:
    types: [ingestion-detected, ingestion-check]

permissions:
  contents: read
  actions: write
  issues: write

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  monitor:
    name: Monitor Issue #1239 and track workflow runs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for ingestion comment
        id: check-ingestion
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ISSUE=1239
          REPO="${{ github.repository }}"

          # Fetch all comments on issue #1239
          COMMENTS=$(gh api "/repos/${REPO}/issues/${ISSUE}/comments" --jq '.[].body' 2>/dev/null || true)

          if echo "$COMMENTS" | grep -Fxq "ingested: true"; then
            echo "ingestion_detected=true" >> $GITHUB_OUTPUT
            echo "✅ Ingestion comment detected on issue #${ISSUE}"
          else
            echo "ingestion_detected=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No ingestion comment detected yet"
          fi

      - name: Check latest DR smoke-test run
        id: check-dr-smoke
        if: steps.check-ingestion.outputs.ingestion_detected == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          ISSUE=1239

          # Get the latest run for dr-smoke-test.yml
          RUN_JSON=$(gh run list --repo "${REPO}" --workflow dr-smoke-test.yml --limit 1 --json databaseId,status,conclusion,htmlUrl 2>/dev/null || echo '[]')

          if [ "$RUN_JSON" = "[]" ] || [ -z "$RUN_JSON" ]; then
            echo "dr_smoke_run_found=false" >> $GITHUB_OUTPUT
            echo "⏳ No DR smoke-test run found yet (may still be initializing)"
            exit 0
          fi

          RUN_ID=$(echo "$RUN_JSON" | jq -r '.[0].databaseId // empty')
          STATUS=$(echo "$RUN_JSON" | jq -r '.[0].status // empty')
          CONCL=$(echo "$RUN_JSON" | jq -r '.[0].conclusion // empty')
          URL=$(echo "$RUN_JSON" | jq -r '.[0].htmlUrl // empty')

          if [ -z "$RUN_ID" ]; then
            echo "dr_smoke_run_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "dr_smoke_run_found=true" >> $GITHUB_OUTPUT
          echo "dr_smoke_run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "dr_smoke_status=$STATUS" >> $GITHUB_OUTPUT
          echo "dr_smoke_conclusion=$CONCL" >> $GITHUB_OUTPUT
          echo "dr_smoke_url=$URL" >> $GITHUB_OUTPUT

          echo "🔍 DR smoke-test run #${RUN_ID}: status=${STATUS}, conclusion=${CONCL:-pending}"

      - name: Check latest weekly DR test run
        id: check-weekly-dr
        if: steps.check-ingestion.outputs.ingestion_detected == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          ISSUE=1239

          # Get the latest run for docker-hub-weekly-dr-testing.yml
          RUN_JSON=$(gh run list --repo "${REPO}" --workflow docker-hub-weekly-dr-testing.yml --limit 1 --json databaseId,status,conclusion,htmlUrl 2>/dev/null || echo '[]')

          if [ "$RUN_JSON" = "[]" ] || [ -z "$RUN_JSON" ]; then
            echo "weekly_run_found=false" >> $GITHUB_OUTPUT
            echo "⏳ No weekly DR test run found yet (may still be initializing)"
            exit 0
          fi

          RUN_ID=$(echo "$RUN_JSON" | jq -r '.[0].databaseId // empty')
          STATUS=$(echo "$RUN_JSON" | jq -r '.[0].status // empty')
          CONCL=$(echo "$RUN_JSON" | jq -r '.[0].conclusion // empty')
          URL=$(echo "$RUN_JSON" | jq -r '.[0].htmlUrl // empty')

          if [ -z "$RUN_ID" ]; then
            echo "weekly_run_found=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "weekly_run_found=true" >> $GITHUB_OUTPUT
          echo "weekly_run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "weekly_status=$STATUS" >> $GITHUB_OUTPUT
          echo "weekly_conclusion=$CONCL" >> $GITHUB_OUTPUT
          echo "weekly_url=$URL" >> $GITHUB_OUTPUT

          echo "🔍 Weekly DR test run #${RUN_ID}: status=${STATUS}, conclusion=${CONCL:-pending}"

      - name: Post monitoring update to issue #1239
        if: steps.check-ingestion.outputs.ingestion_detected == 'true' && (steps.check-dr-smoke.outputs.dr_smoke_run_found == 'true' || steps.check-weekly-dr.outputs.weekly_run_found == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          ISSUE=1239
          MONITOR_TIME=$(date -u +'%Y-%m-%d %H:%M:%SZ')

          DR_SMOKE_FOUND="${{ steps.check-dr-smoke.outputs.dr_smoke_run_found }}"
          DR_SMOKE_CONCL="${{ steps.check-dr-smoke.outputs.dr_smoke_conclusion }}"
          DR_SMOKE_URL="${{ steps.check-dr-smoke.outputs.dr_smoke_url }}"

          WEEKLY_FOUND="${{ steps.check-weekly-dr.outputs.weekly_run_found }}"
          WEEKLY_CONCL="${{ steps.check-weekly-dr.outputs.weekly_conclusion }}"
          WEEKLY_URL="${{ steps.check-weekly-dr.outputs.weekly_url }}"

          BODY="🔔 **Monitor Update** — ${MONITOR_TIME}

**Status:**
"

          if [ "$DR_SMOKE_FOUND" = "true" ]; then
            if [ -n "$DR_SMOKE_CONCL" ] && [ "$DR_SMOKE_CONCL" != "null" ]; then
              EMOJI="✅"
              [ "$DR_SMOKE_CONCL" != "success" ] && EMOJI="❌"
              BODY+="- DR Smoke Test: ${EMOJI} **${DR_SMOKE_CONCL}** → [Run](${DR_SMOKE_URL})
"
            else
              BODY+="- DR Smoke Test: ⏳ **In Progress** → [Run](${DR_SMOKE_URL})
"
            fi
          fi

          if [ "$WEEKLY_FOUND" = "true" ]; then
            if [ -n "$WEEKLY_CONCL" ] && [ "$WEEKLY_CONCL" != "null" ]; then
              EMOJI="✅"
              [ "$WEEKLY_CONCL" != "success" ] && EMOJI="❌"
              BODY+="- Weekly DR Test: ${EMOJI} **${WEEKLY_CONCL}** → [Run](${WEEKLY_URL})
"
            else
              BODY+="- Weekly DR Test: ⏳ **In Progress** → [Run](${WEEKLY_URL})
"
            fi
          fi

          BODY+="

_Monitor refresh: 5 minutes. Automated by monitor-ingestion.yml_"

          # Check if a monitor update comment already exists from this run
          EXISTING=$(gh api "/repos/${REPO}/issues/${ISSUE}/comments" --jq ".[] | select(.body | contains(\"Monitor Update\")) | .id" 2>/dev/null | head -1 || true)

          if [ -n "$EXISTING" ]; then
            # Update existing comment (idempotent)
            gh api "/repos/${REPO}/issues/comments/${EXISTING}" -X PATCH -f body="$BODY" || true
            echo "Updated existing monitor comment"
          else
            # Create new comment
            gh issue comment ${ISSUE} --repo ${REPO} --body "$BODY" || true
            echo "Posted new monitor comment"
          fi

      - name: Report no ingestion yet
        if: steps.check-ingestion.outputs.ingestion_detected == 'false'
        run: |
          echo "ℹ️  Ingestion not yet detected on issue #1239."
          echo "Operator must set GCP_SERVICE_ACCOUNT_KEY secret and comment 'ingested: true' to proceed."
          echo "Monitor will check again in 5 minutes."
