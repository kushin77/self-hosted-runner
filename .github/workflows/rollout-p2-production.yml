name: Rollout: Phase P2 Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to push (e.g. prod-p2-20260307)'
        required: true
      run_smoke_test:
        description: 'Run managed-auth smoke test (true/false)'
        required: false
        default: 'true'

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  build-and-push:
    name: Build, push image and run rollout helper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry (if credentials provided)
        if: secrets.REGISTRY_URL && (secrets.REGISTRY_USER || secrets.REGISTRY_TOKEN)
        run: |
          echo "Logging into registry"
          echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ secrets.REGISTRY_URL }} -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build and push production image
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail
          ./scripts/prod_rollout.sh

      - name: Post rollout summary to issue #147
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          gh issue comment 147 --body "✅ Production rollout requested and image pushed: ${IMAGE_TAG}\n- Time: ${TIMESTAMP}\n- Triggered by workflow run: ${{ github.run_url }}" || true
