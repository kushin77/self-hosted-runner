name: Container Security Scan

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read
  actions: write

jobs:
  build-and-scan:
    name: Build image and run Trivy scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: kushin77/self-hosted-runner:${{ github.sha }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kushin77/self-hosted-runner:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL'
          exit-code: '1'
