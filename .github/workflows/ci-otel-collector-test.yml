name: CI - OTEL Collector Test
permissions:
  contents: read
  id-token: write
  actions: read

on:
  push:
    branches: [ main, master ]
    paths:
      - 'deploy/otel/**'
      - 'services/provisioner-worker/tests/send_otlp.sh'
      - '.github/workflows/ci-otel-collector-test.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'deploy/otel/**'
      - 'services/provisioner-worker/tests/send_otlp.sh'
      - '.github/workflows/ci-otel-collector-test.yml'
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug mode'
        required: false
        default: 'false'

concurrency:
  group: otel-collector-test-${{ github.ref }}
  cancel-in-progress: false

jobs:
  otel-collector-test:
    name: Test OTLP Exporter with Local Collector
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 15
    env:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4318/v1/traces
      OTEL_COLLECTOR_HEALTH_CHECK_URL: http://localhost:8888/healthz
      DEBUG_MODE: ${{ github.event.inputs.debug_mode || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Clean up any stale OTEL containers (idempotent)
        run: |
          echo "Cleaning up stale OTEL containers..."
          docker ps -a --filter "name=otel-collector" --format "{{.ID}}" | xargs -r docker rm -f || true
          echo "✓ Cleanup complete"

      - name: Start OTEL Collector (with retry)
        working-directory: deploy/otel
        run: |
          set -euo pipefail
          source ../../.github/scripts/resilience.sh
          
          echo "Starting OTEL Collector with retry..."
          
          # Idempotent: ensure collector is not already running
          docker compose down 2>/dev/null || true
          sleep 2
          
          # Retry with exponential backoff
          retry_command 3 5 docker compose up -d || {
            echo "✗ Failed to start OTEL Collector after 3 attempts"
            docker compose logs || true
            exit 1
          }
          
          echo "OTEL Collector container started"
          
          # Wait for health check endpoint to respond (max 30s)
          echo "Waiting for OTEL Collector health check..."
          for attempt in {1..20}; do
            if curl -sf http://localhost:8888/healthz > /dev/null 2>&1; then
              echo "✓ OTEL Collector is healthy (attempt $attempt)"
              break
            fi
            if [ $attempt -eq 20 ]; then
              echo "✗ OTEL Collector health check failed after 20 attempts"
              docker compose logs || true
              exit 1
            fi
            sleep 1.5
          done

      - name: Verify collector is running
        run: |
          echo "Verifying OTEL Collector container status..."
          docker ps --filter "name=otel-collector" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          
          if docker ps | grep -q "otel-collector"; then
            echo "✓ OTEL Collector is running"
          else
            echo "✗ OTEL Collector is not running"
            exit 1
          fi

      - name: Run OTLP test (send_otlp.sh)
        run: |
          set -eo pipefail
          
          echo "Running OTLP test script..."
          chmod +x services/provisioner-worker/tests/send_otlp.sh
          
          # Execute test with error handling
          if services/provisioner-worker/tests/send_otlp.sh; then
            echo "✓ OTLP test completed successfully"
          else
            http_code=$?
            echo "⚠ OTLP test returned HTTP status code: $http_code"
            if [ "$http_code" -eq 200 ]; then
              echo "✓ HTTP 200 OK - test payload was accepted"
            else
              echo "⚠ Non-200 response (non-fatal)"
            fi
          fi

      - name: Validate OTEL Collector logs
        if: always()
        working-directory: deploy/otel
        run: |
          echo "=== OTEL Collector Logs ==="
          docker compose logs otel-collector 2>/dev/null || echo "(logs unavailable)"
          
          # Check for trace processing
          COLLECTOR_LOGS=$(docker compose logs otel-collector 2>&1 || echo "")
          
          if echo "$COLLECTOR_LOGS" | grep -qEi "(resourcespans|spanid|traceid|span)"; then
            echo "✓ Collector processed trace/span data"
          elif echo "$COLLECTOR_LOGS" | grep -qEi "(started|listening)"; then
            echo "⚠ Collector started but may not have received spans (non-fatal)"
          else
            echo "⚠ Unable to confirm collector activity from logs"
          fi

      - name: Check for external collector connectivity issues
        if: always()
        continue-on-error: true
        working-directory: deploy/otel
        run: |
          echo "Checking for external connectivity issues..."
          COLLECTOR_LOGS=$(docker compose logs otel-collector 2>&1 || echo "")
          
          if echo "$COLLECTOR_LOGS" | grep -qEi "(dial|connection refused|timeout|unreachable|connect: network is unreachable)"; then
            echo "⚠ Detected connectivity issues (non-fatal - external collector may be unavailable)"
          else
            echo "✓ No transient connectivity issues detected"
          fi

      - name: Collector metrics (if available)
        if: always()
        continue-on-error: true
        run: |
          echo "Attempting to fetch collector metrics..."
          curl -s http://localhost:8888/metrics 2>/dev/null | head -20 || echo "(Metrics endpoint not available)"

      - name: Cleanup OTEL Collector (idempotent)
        if: always()
        working-directory: deploy/otel
        run: |
          echo "Cleaning up OTEL Collector..."
          set +e
          
          # Graceful shutdown with timeout
          docker compose down -t 10 2>/dev/null || true
          sleep 2
          
          # Force remove if still running
          docker ps -a --filter "name=otel-collector" --format "{{.ID}}" | xargs -r docker rm -f || true
          
          echo "✓ Cleanup complete"
          set -e

      - name: Summary Report
        if: always()
        run: |
          cat <<'EOF'
          
          ╔════════════════════════════════════════════════════════════════════╗
          ║          OTEL Collector Test - Execution Summary                   ║
          ╚════════════════════════════════════════════════════════════════════╝
          
          Purpose:
            - Validate OTLP exporter functionality in isolated environment
            - Ensure collector can receive and process telemetry from services
            - Detect external collector connectivity issues without failing build
          
          Execution Mode:
            - Non-fatal: Failures do not block downstream CI jobs
            - Idempotent: Safe to re-run multiple times
            - Ephemeral: All resources cleaned up after execution
          
          Test Coverage:
            ✓ Docker Compose orchestration
            ✓ OTLP HTTP endpoint (port 4318)
            ✓ Health check endpoint (port 8888)
            ✓ Trace/span processing validation
            ✓ Connectivity issue detection
          
          Configuration:
            - Endpoint: http://localhost:4318/v1/traces
            - Test Script: services/provisioner-worker/tests/send_otlp.sh
            - Config: deploy/otel/otel-collector-config.yaml
          
          For troubleshooting:
            - Review collector logs above for detailed processing info
            - Check connectivity issues section for network problems
            - Run workflow_dispatch with debug_mode=true for extended output
          
          ╔════════════════════════════════════════════════════════════════════╗
          
          EOF
