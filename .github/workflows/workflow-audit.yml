name: Workflow Sequencing Audit

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'

jobs:
  audit:
    name: Audit workflows for sequencing protections
    runs-on: [self-hosted, linux]
    concurrency:
      group: workflow-audit-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run workflow sequencing audit
        run: |
          python3 .github/scripts/check_workflow_sequencing.py

      - name: Upload report (self-hosted)
        if: always() && contains(runner.labels, 'self-hosted')
        run: |
          set -euo pipefail
          FILE=workflow-audit-report.txt
          if [ -f "$FILE" ]; then
            TAR=workflow-audit-report-${{ github.run_id }}.tgz
            tar -czf "$TAR" "$FILE" || true
            chmod +x ci/scripts/upload_to_minio.sh || true
            URL=$(ci/scripts/upload_to_minio.sh "$TAR") || true
            echo "Uploaded workflow audit report to: $URL"
          else
            echo "No workflow audit report found"
          fi

      - name: Upload report (hosted fallback)
        if: ${{ !contains(runner.labels, 'self-hosted') }}
        uses: actions/upload-artifact@v4
        with:
          name: workflow-audit-report
          path: workflow-audit-report.txt
