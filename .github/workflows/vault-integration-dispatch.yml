---
name: Vault Integration Tests (manual dispatch)
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
on:
  workflow_dispatch: {}
  pull_request:
    branches: [ main ]

jobs:
  vault-integration:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: sudo apt-get update && sudo apt-get install -y jq python3 python3-venv python3-pip sqlite3

      - name: Run Vault integration tests
        working-directory: scripts/automation/pmo/tests
        run: |
          bash ./test-vault-integration.sh | tee test-vault-integration.log

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        with:
          name: vault-integration-logs
          path: |
            scripts/automation/pmo/tests/test-vault-integration.log
            /tmp/vault-integration-tests/mock-vault.log
            /tmp/vault-integration-tests/audit.log
