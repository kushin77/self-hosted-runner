name: Sync SLACK_WEBHOOK from GCP Secret Manager

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read
  actions: write
  id-token: write

jobs:
  sync-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account_email: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          cleanup_credentials: true
        continue-on-error: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'
        continue-on-error: true

      - name: Check GCP access
        id: gcp-check
        run: |
          if gcloud auth list --filter=status:ACTIVE --format="value(account)" &>/dev/null; then
            echo "gcp_available=true" >> $GITHUB_OUTPUT
          else
            echo "gcp_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Fetch slack-webhook from GSM
        if: steps.gcp-check.outputs.gcp_available == 'true'
        id: fetch
        run: |
          set +e
          WEBHOOK=$(gcloud secrets versions access latest --secret="slack-webhook" --project="${{ secrets.GCP_PROJECT_ID }}" 2>/dev/null || true)
          if [[ -n "$WEBHOOK" ]]; then
            echo "webhook_present=true" >> $GITHUB_OUTPUT
            echo "webhook=$WEBHOOK" >> $GITHUB_OUTPUT
          else
            echo "webhook_present=false" >> $GITHUB_OUTPUT
          fi

      - name: Install gh
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Set SLACK_WEBHOOK_URL secret
        if: steps.fetch.outputs.webhook_present == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WEBHOOK="${{ steps.fetch.outputs.webhook }}"
          gh secret set SLACK_WEBHOOK_URL --repo "${{ github.repository }}" --body "$WEBHOOK"
          echo "✅ SLACK_WEBHOOK_URL set in repo secrets"

      - name: Report
        run: |
          echo "GCP available: ${{ steps.gcp-check.outputs.gcp_available }}"
          echo "Webhook present: ${{ steps.fetch.outputs.webhook_present }}"
