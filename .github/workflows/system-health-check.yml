name: System Health Check

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  health-check:
    name: Check system health and report status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check critical workflows active
        id: workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          UNHEALTHY=0

          # Check if critical workflows are enabled and have recent runs
          CRITICAL_WFS=("self-healing-orchestrator.yml" "monitor-ingestion.yml" "dr-reconciliation-auto-remediate.yml" "operator-gcp-reminder.yml")

          for wf in "${CRITICAL_WFS[@]}"; do
            LATEST=$(gh run list --repo "${REPO}" --workflow "$wf" --limit 1 --json status,conclusion,createdAt --jq '.[0]' 2>/dev/null || echo '{}')
            STATUS=$(echo "$LATEST" | jq -r '.status // "unknown"')

            if [ "$STATUS" = "unknown" ] || [ -z "$LATEST" ]; then
              echo "⚠️  WARNING: No recent runs for $wf"
              UNHEALTHY=$((UNHEALTHY + 1))
            else
              echo "✅ $wf running"
            fi
          done

          echo "unhealthy_workflows=$UNHEALTHY" >> $GITHUB_OUTPUT

      - name: Check for open critical issues
        id: critical_issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"

          # Count critical issues
          CRITICAL=$(gh issue list --repo "${REPO}" --label "critical" --state open --json number --jq 'length')
          ESCALATION=$(gh issue list --repo "${REPO}" --label "auto-escalation" --state open --json number --jq 'length')
          DR_ISSUES=$(gh issue list --repo "${REPO}" --label "disaster-recovery" --state open --json number --jq 'length')

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "escalation=$ESCALATION" >> $GITHUB_OUTPUT
          echo "dr_issues=$DR_ISSUES" >> $GITHUB_OUTPUT

          if [ $((CRITICAL + ESCALATION + DR_ISSUES)) -gt 0 ]; then
            echo "⚠️  Open issues detected: critical=$CRITICAL escalation=$ESCALATION dr=$DR_ISSUES"
          else
            echo "✅ No critical issues"
          fi

      - name: Check ingestion status
        id: ingestion
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          ISSUE=1239

          # Check if "ingested: true" comment exists
          INGESTED=$(gh api "/repos/${REPO}/issues/${ISSUE}/comments" --jq '.[] | select(.body=="ingested: true") | .id' 2>/dev/null | wc -l)

          if [ $INGESTED -gt 0 ]; then
            echo "ingested=true" >> $GITHUB_OUTPUT
            echo "✅ Ingestion detected"
          else
            echo "ingested=false" >> $GITHUB_OUTPUT
            echo "⏳ Awaiting ingestion"
          fi

      - name: Generate health report
        id: report
        run: |
          set -euo pipefail

          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%SZ')
          UNHEALTHY_WF=${{ steps.workflows.outputs.unhealthy_workflows }}
          CRITICAL=${{ steps.critical_issues.outputs.critical }}
          ESCALATIONS=${{ steps.critical_issues.outputs.escalation }}
          DR_ISSUES=${{ steps.critical_issues.outputs.dr_issues }}
          INGESTED=${{ steps.ingestion.outputs.ingested }}

          # Determine overall health
          OVERALL_HEALTH="🟢 HEALTHY"
          if [ $UNHEALTHY_WF -gt 0 ] || [ $CRITICAL -gt 0 ] || [ $ESCALATIONS -gt 0 ]; then
            OVERALL_HEALTH="🟡 DEGRADED"
          fi
          if [ $DR_ISSUES -gt 2 ]; then
            OVERALL_HEALTH="🔴 CRITICAL"
          fi

          echo "overall=$OVERALL_HEALTH" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Post health status to tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          TRACKING_ISSUE=1064

          REPORT=$(cat << 'EOF'
          ## 🏥 System Health Check — ${{ steps.report.outputs.timestamp }}

          **Overall Status**: ${{ steps.report.outputs.overall }}

          ### Workflow Status
          - Unhealthy Workflows: ${{ steps.workflows.outputs.unhealthy_workflows }}
          - Self-Healing: Active
          - Monitor: Active (5-min polls)
          - Reconciliation: Active (30-min cycles)

          ### Issue Status
          - Critical Issues: ${{ steps.critical_issues.outputs.critical }}
          - Escalations: ${{ steps.critical_issues.outputs.escalation }}
          - DR Issues: ${{ steps.critical_issues.outputs.dr_issues }}

          ### Ingestion Status
          - Status: ${{ steps.ingestion.outputs.ingested == 'true' && '✅ INGESTED' || '⏳ PENDING' }}
          - Action: ${{ steps.ingestion.outputs.ingested == 'true' && 'Workflows active' || 'Awaiting operator comment on Issue #1239' }}

          ### Recommendations
          ${{ steps.report.outputs.overall == '🟢 HEALTHY' && '✅ System health nominal. All automation active and monitoring.' || '⚠️ Review open issues and take corrective action if needed.' }}

          _Health check automated by System Health Check (schedule: */10 min)_
          EOF
          )

          # Post or update health status
          EXISTING=$(gh api "/repos/${REPO}/issues/${TRACKING_ISSUE}/comments" --jq ".[] | select(.body | contains(\"System Health Check\")) | .id" 2>/dev/null | head -1 || true)

          if [ -n "$EXISTING" ]; then
            gh api "/repos/${REPO}/issues/comments/${EXISTING}" -X PATCH -f body="$REPORT" 2>/dev/null || true
          else
            gh issue comment ${TRACKING_ISSUE} --repo ${REPO} --body "$REPORT" 2>/dev/null || true
          fi

      - name: Alert if critical
        if: steps.report.outputs.overall == '🔴 CRITICAL'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🚨 CRITICAL HEALTH STATUS DETECTED"
          echo "Open critical/DR issues: ${{ steps.critical_issues.outputs.critical }} / ${{ steps.critical_issues.outputs.dr_issues }}"
          echo "Review Issue #1064 for details"
          exit 0
