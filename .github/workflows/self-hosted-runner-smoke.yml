---
name: Self-hosted Runner Smoke Test
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: [.github/workflows/self-hosted-runner-smoke.yml]

jobs:
  smoke:
    name: Smoke test on self-hosted runner
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Runner info
        run: |
          echo "--- Runner uname ---"
          uname -a || true
          echo "--- Node ---"
          node -v || echo "node missing"
          echo "--- npm ---"
          npm -v || echo "npm missing"
          echo "--- Docker ---"
          docker --version || echo "docker missing or not in PATH"

      - name: Quick environment check
        run: |
          echo "CI_RUNNER=$(hostname)"
          echo "Listing /etc/os-release:"
          cat /etc/os-release || true
          echo "Checking disk usage:"
          df -h .
      - name: Runner labels (debug)
        run: |
          echo "--- Runner labels ---"
          if command -v jq >/dev/null 2>&1; then
            echo "(gh runner labels not available inside job)"
          fi
      - name: Agent timestamp
        run: |
          echo "AGENT-TRIGGER: 2026-03-05T00:00:00Z"

      - name: Echo success
        run: |
          echo 'SELF-HOSTED RUNNER SMOKE: OK'
