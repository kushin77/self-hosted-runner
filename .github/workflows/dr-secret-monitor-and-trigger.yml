name: DR Secret Monitor & Auto-Trigger

on:
  schedule:
    # Run every 5 minutes to detect when GCP_SERVICE_ACCOUNT_KEY is provisioned
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force run DR test even if secret validation fails"
        required: false
        default: "false"

  workflow_call: {}

concurrency:
  group: dr-secret-monitor-and-trigger-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write
  issues: write

jobs:
  check-and-trigger:
    name: Monitor Secret & Trigger DR
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true


      - name: Validate GCP Service Account Key Secret
        id: validate-gcp-key
        env:
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -z "$GCP_KEY" ]; then
            echo "status=missing" >> $GITHUB_OUTPUT
            echo "GCP_SERVICE_ACCOUNT_KEY is not set"
            exit 0
          fi

          # Check if the key is valid JSON
          if echo "$GCP_KEY" | jq -e . >/dev/null 2>&1; then
            echo "status=valid" >> $GITHUB_OUTPUT
            echo "✓ GCP_SERVICE_ACCOUNT_KEY is valid JSON"
          else
            echo "status=invalid" >> $GITHUB_OUTPUT
            echo "✗ GCP_SERVICE_ACCOUNT_KEY is not valid JSON"
            exit 0
          fi

      - name: Check if DR test was recently successful
        id: check-recent-success
        run: |
          # Check last 3 successful runs of docker-hub-weekly-dr-testing
          RECENT_SUCCESS=$(gh run list \
            --workflow docker-hub-weekly-dr-testing.yml \
            --repo kushin77/self-hosted-runner \
            --status success \
            --limit 1 \
            --json databaseId,createdAt \
            --jq '.[0].createdAt // empty')

          if [ -n "$RECENT_SUCCESS" ]; then
            echo "last_success=$RECENT_SUCCESS" >> $GITHUB_OUTPUT
            echo "✓ Found recent successful DR run: $RECENT_SUCCESS"
          else
            echo "last_success=never" >> $GITHUB_OUTPUT
            echo "ℹ No previous successful DR runs found"
          fi

      - name: Trigger Live DR Test if Secret Valid
        id: trigger-dr
        if: steps.validate-gcp-key.outputs.status == 'valid'
        run: |
          echo "✓ Triggering live DR test (non-dry-run)..."
          gh workflow run docker-hub-weekly-dr-testing.yml \
            --repo kushin77/self-hosted-runner \
            -f dry_run=false \
            -f verbose=true

          echo "triggered=true" >> $GITHUB_OUTPUT
          sleep 3

          # Get the newly triggered run ID
          RUN_ID=$(gh run list \
            --workflow docker-hub-weekly-dr-testing.yml \
            --limit 1 \
            --repo kushin77/self-hosted-runner \
            --json databaseId \
            --jq '.[0].databaseId')

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Run ID: $RUN_ID"

      - name: Wait for DR Run to Complete
        if: steps.trigger-dr.outputs.triggered == 'true'
        id: wait-dr
        timeout-minutes: 35
        run: |
          RUN_ID="${{ steps.trigger-dr.outputs.run_id }}"
          echo "Waiting for run $RUN_ID to complete..."

          # Poll with exponential backoff
          for i in {1..60}; do
            STATUS=$(gh run view "$RUN_ID" \
              --repo kushin77/self-hosted-runner \
              --json status,conclusion \
              --jq '.status + " " + (.conclusion // "pending")')

            echo "Status: $STATUS"

            if [[ "$STATUS" == "completed"* ]]; then
              CONCLUSION=$(echo "$STATUS" | awk '{print $2}')
              echo "conclusion=$CONCLUSION" >> $GITHUB_OUTPUT

              if [ "$CONCLUSION" = "success" ]; then
                echo "✓ DR test PASSED"
                exit 0
              else
                echo "✗ DR test FAILED with conclusion: $CONCLUSION"
                exit 1
              fi
            fi

            # Wait before polling again (increase wait time after 10 attempts)
            if [ $i -lt 10 ]; then
              sleep 30
            else
              sleep 60
            fi
          done

          echo "✗ DR test did not complete within timeout (35 minutes)"
          exit 1

      - name: Close Issue #925 on Success
        if: steps.wait-dr.outputs.conclusion == 'success'
        run: |
          gh issue view 925 --repo kushin77/self-hosted-runner --json state | grep -q "OPEN"
          if [ $? -eq 0 ]; then
            gh issue comment 925 \
              --repo kushin77/self-hosted-runner \
              --body "✅ **Automated Disaster Recovery Validation PASSED**

The live DR test (${{ steps.trigger-dr.outputs.run_id }}) completed successfully!

**Summary:**
- GCP Service Account Key: ✅ Valid
- Preflight Checks: ✅ Passed
- Recovery Execution: ✅ Passed
- Verification: ✅ Passed
- RTO Compliance: ✅ Passed

**The Disaster Recovery workflow is now fully operational and validated.**

Closing this issue as the primary blocker (secret provisioning) has been resolved and the live validation succeeded."

            gh issue close 925 --repo kushin77/self-hosted-runner
            echo "✓ Closed issue #925"
          fi

      - name: Escalate if Secret Still Missing
        if: steps.validate-gcp-key.outputs.status == 'missing' && github.event_name == 'schedule'
        run: |
          # Check if there's already an open escalation comment
          EXISTING=$(gh issue view 995 \
            --repo kushin77/self-hosted-runner \
            --json comments \
            --jq '.comments | map(select(.body | contains("escalation") or contains("URGENT"))) | length')

          if [ "$EXISTING" -lt 3 ]; then
            gh issue comment 995 \
              --repo kushin77/self-hosted-runner \
              --body "⏰ **Automated Escalation: Awaiting GCP_SERVICE_ACCOUNT_KEY Secret**

The automated DR validation workflow has detected that \`GCP_SERVICE_ACCOUNT_KEY\` is still not provisioned.

**Status:** Waiting for admin to add the secret
**Last Check:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
**Next Check:** In ~5 minutes

**To unblock automation:**
Please upload the GCP service account JSON using one of these methods:

\`\`\`bash
# Method 1: Via file (recommended)
gh secret set GCP_SERVICE_ACCOUNT_KEY --repo kushin77/self-hosted-runner --body-file /path/to/service-account.json

# Method 2: Via stdin
cat /path/to/service-account.json | gh secret set GCP_SERVICE_ACCOUNT_KEY --repo kushin77/self-hosted-runner --body -
\`\`\`

Once provisioned, the automation will immediately trigger the live DR test and close issue #925 upon success."

            echo "✓ Posted escalation comment to #995"
          fi

      - name: Report Status
        if: always()
        run: |
          cat << EOF
          ================================================================================
          DR Secret Monitor & Auto-Trigger Summary
          ================================================================================
          Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')

          Secret Validation:
          - GCP_SERVICE_ACCOUNT_KEY: ${{ steps.validate-gcp-key.outputs.status }}

          DR Workflow Status:
          - Last Successful Run: ${{ steps.check-recent-success.outputs.last_success }}
          - Trigger Requested: ${{ steps.trigger-dr.outputs.triggered }}
          - Run ID: ${{ steps.trigger-dr.outputs.run_id }}
          - Final Conclusion: ${{ steps.wait-dr.outputs.conclusion }}

          Next Action:
          - If secret is missing: Will retry in ~5 minutes with escalation comment
          - If secret is valid & run passed: Issue #925 will be closed automatically
          - If secret is valid & run failed: Logs available for debugging

          ================================================================================
          EOF
