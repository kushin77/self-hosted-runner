name: Agent-run Vault AppRole provisioning

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  actions: write
  secrets: write

jobs:
  provision:
    if: contains(github.event.comment.body, 'agent:run-provision')
    concurrency:
      group: agent-provision-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run provisioning helper (captures role/secret)
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ADMIN_TOKEN: ${{ secrets.VAULT_ADMIN_TOKEN_FOR_AGENT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          ./scripts/ci/provision-approle-and-set-secrets.sh --role-name runner-deploy --policy-file ./policies/runner-deploy.hcl > /tmp/provision.out || true
          cat /tmp/provision.out

      - name: Extract role_id and secret_id
        id: extract
        run: |
          role=$(grep -Eo 'role_id: .*' /tmp/provision.out | awk '{print $2}' || true)
          secret=$(grep -Eo 'secret_id: .*' /tmp/provision.out | awk '{print $2}' || true)
          echo "role=$role" >> $GITHUB_OUTPUT
          echo "secret=$secret" >> $GITHUB_OUTPUT

      - name: Publish repo secrets and cleanup temp token
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          printf '%s' "$GH_TOKEN" | gh auth login --with-token
          echo "Setting VAULT_ROLE_ID"
          printf '%s' "${{ steps.extract.outputs.role }}" | gh secret set VAULT_ROLE_ID --repo "$GITHUB_REPOSITORY"
          echo "Setting VAULT_SECRET_ID"
          printf '%s' "${{ steps.extract.outputs.secret }}" | gh secret set VAULT_SECRET_ID --repo "$GITHUB_REPOSITORY"
          echo "Removing temporary admin token secret"
          gh secret remove VAULT_ADMIN_TOKEN_FOR_AGENT --repo "$GITHUB_REPOSITORY" || true

      - name: Comment and close request issue
        uses: actions/github-script@v6
        with:
          script: |
            const issue = github.event.issue || github.event.comment.issue;
            const body = `Agent-run provisioning completed. Repository secrets VAULT_ROLE_ID and VAULT_SECRET_ID have been set and the temporary admin token (if present) was removed.`;
            if (issue && issue.number) {
              await github.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, body});
              await github.issues.update({owner: context.repo.owner, repo: context.repo.repo, issue_number: issue.number, state: 'closed'});
            } else {
              core.info('No issue context to comment on.');
            }
