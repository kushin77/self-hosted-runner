name: Secret Validator - Observability Secrets

on:
  schedule:
    # Check daily for missing secrets
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/secret-validator-observability.yml'
      - '.github/workflows/observability-e2e.yml'

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: secret-validator-observability
  cancel-in-progress: false

jobs:
  validate-secrets:
    name: Validate Observability Secrets
    runs-on: ubuntu-latest
    outputs:
      slack_missing: ${{ steps.check.outputs.slack_missing }}
      pagerduty_missing: ${{ steps.check.outputs.pagerduty_missing }}
      issue_exists: ${{ steps.check.outputs.issue_exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check secret status
        id: check
      - name: Get Credential [PAGERDUTY_SERVICE_KEY]
        id: cred_pagerduty_service_key
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: PAGERDUTY_SERVICE_KEY
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [SLACK_WEBHOOK_URL]
        id: cred_slack_webhook_url
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: SLACK_WEBHOOK_URL
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [outputs]
        id: cred_outputs
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: outputs
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [PAGERDUTY_SERVICE_KEY]
        id: cred_pagerduty_service_key
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: PAGERDUTY_SERVICE_KEY
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [SLACK_WEBHOOK_URL]
        id: cred_slack_webhook_url
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: SLACK_WEBHOOK_URL
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [outputs]
        id: cred_outputs
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: outputs
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

        run: |
          SLACK_MISSING="true"
          PAGERDUTY_MISSING="true"

          if [-n "${{ secrets.SLACK_WEBHOOK_URL || '' }}"]; then
            SLACK_MISSING="false"
            echo "✓ SLACK_WEBHOOK_URL is configured"
          fi

          if [-n "${{ secrets.PAGERDUTY_SERVICE_KEY || '' }}"]; then
            PAGERDUTY_MISSING="false"
            echo "✓ PAGERDUTY_SERVICE_KEY is configured"
          fi

          echo "slack_missing=$SLACK_MISSING" >> "$GITHUB_OUTPUT"
          echo "pagerduty_missing=$PAGERDUTY_MISSING" >> "$GITHUB_OUTPUT"

      - name: Check for existing tracking issue
        id: find-issue
        if: steps.check.outputs.slack_missing == 'true' || steps.check.outputs.pagerduty_missing == 'true'
        run: |
          # Look for existing #226 tracker
          ISSUE_NUMBER=226
          if gh issue view $ISSUE_NUMBER --json state >/dev/null 2>&1; then
            echo "issue_exists=true" >> "$GITHUB_OUTPUT"
            echo "ℹ Tracking issue #$ISSUE_NUMBER already exists"
          else
            echo "issue_exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Report missing secrets
        if: steps.check.outputs.slack_missing == 'true' || steps.check.outputs.pagerduty_missing == 'true'
        run: |
          echo "⚠️  Missing Observability Secrets"
          echo ""
          ["${{ steps.check.outputs.slack_missing }}" = "true"] && echo "  Missing: SLACK_WEBHOOK_URL"
          ["${{ steps.check.outputs.pagerduty_missing }}" = "true"] && echo "  Missing: PAGERDUTY_SERVICE_KEY"
          echo ""
          echo "➜ See workflow: .github/workflows/observability-e2e.yml"
          echo "➜ Instructions: Follow job 'secret-guide' for setup"
          echo "➜ Issue: #226"

      - name: All secrets configured
        if: steps.check.outputs.slack_missing == 'false' && steps.check.outputs.pagerduty_missing == 'false'
        run: |
          echo "✅ All observability secrets configured!"
          echo "  • SLACK_WEBHOOK_URL: ✓"
          echo "  • PAGERDUTY_SERVICE_KEY: ✓"
          echo ""
          echo "✨ Observability E2E workflow is ready to run with real endpoints"
          echo "➜ Run: .github/workflows/observability-e2e.yml with test_real=true"

  notify-ops:
    name: Notify on Missing Secrets
    needs: validate-secrets
    runs-on: ubuntu-latest
    if: needs.validate-secrets.outputs.slack_missing == 'true' || needs.validate-secrets.outputs.pagerduty_missing == 'true'
    permissions:
      issues: write
    steps:
      - name: Create/update tracking comment
        run: |
          ISSUE=226
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')

          # Draft update
          cat > /tmp/comment.txt <<'COMMENT'
          ## 🔔 Automatic Secret Status Check

          **Timestamp:** TIMESTAMP_PLACEHOLDER

          ### Missing Secrets
          MISSING_LIST_PLACEHOLDER

          ### Status
          - [] SLACK_WEBHOOK_URL configured
          - [] PAGERDUTY_SERVICE_KEY configured

          ### What to Do
          1. Review the secret setup guide in workflow: `.github/workflows/observability-e2e.yml`
          2. Add missing secrets to repo settings: Settings → Secrets and variables → Actions
          3. Verify in next manual workflow run or scheduled check

          ### Instructions in Workflow
          Run `.github/workflows/observability-e2e.yml` → Check job `secret-guide` for detailed setup steps.

          ---
          *Auto-generated by secret-validator-observability workflow*
          COMMENT

          # Build missing list
          MISSING_LIST="Missing:"
          ["${{ needs.validate-secrets.outputs.slack_missing }}" = "true"] && MISSING_LIST="$MISSING_LIST"$'\n'"  - \`SLACK_WEBHOOK_URL\`"
          ["${{ needs.validate-secrets.outputs.pagerduty_missing }}" = "true"] && MISSING_LIST="$MISSING_LIST"$'\n'"  - \`PAGERDUTY_SERVICE_KEY\`"

          sed -i "s|TIMESTAMP_PLACEHOLDER|$TIMESTAMP|g" /tmp/comment.txt
          sed -i "s|MISSING_LIST_PLACEHOLDER|$MISSING_LIST|g" /tmp/comment.txt

          echo "ℹ️  Secret validation check complete"
          echo "Issue #$ISSUE - needs Ops attention"
          cat /tmp/comment.txt
