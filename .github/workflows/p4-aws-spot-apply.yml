    # Note: this workflow will attempt to fetch AWS credentials from Vault
    # on self-hosted runners if `VAULT_ADDR` and `VAULT_GITHUB_TOKEN` are set.
    steps:
      - name: Validate manual confirmation
        run: |
          if [ "${{ github.event.inputs.confirm_apply }}" != "yes" ]; then
            echo "To run apply, set 'confirm_apply' input to 'yes'. Aborting.";
            exit 1;
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Fetch AWS creds from Vault
        if: ${{ secrets.VAULT_ADDR && secrets.VAULT_GITHUB_TOKEN }}
        uses: hashicorp/vault-action@v2
        id: vault
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: github
          role: "ci-runner-role"
          secret: "secret/data/aws/ci"
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_GITHUB_TOKEN }}

      - name: Export AWS creds from Vault
        if: steps.vault.outputs.aws_access_key_id
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ steps.vault.outputs.aws_access_key_id }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ steps.vault.outputs.aws_secret_access_key }}" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=${{ steps.vault.outputs.aws_session_token }}" >> $GITHUB_ENV

      - name: Configure AWS Credentials (fallback to repo secrets)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform/examples/aws-spot
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: terraform/examples/aws-spot
        run: |
          terraform apply -input=false -auto-approve -var="webhook_secret_arn=${{ github.event.inputs.webhook_secret_arn }}"
