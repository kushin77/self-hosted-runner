name: Secrets Scan (CI)

on:
  pull_request:
  push:

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          set -euo pipefail
          GH_RELEASE=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest)
          VERSION=$(echo "$GH_RELEASE" | jq -r '.tag_name' | sed 's/^v//')
          URL=$(echo "$GH_RELEASE" | jq -r '.assets[] | select(.browser_download_url | contains("linux") and contains("x64")) | .browser_download_url' | head -1)
          curl -sL "$URL" -o /tmp/gitleaks
          chmod +x /tmp/gitleaks
          /tmp/gitleaks version

      - name: Run gitleaks scan
        id: gitleaks
        continue-on-error: true
        run: |
          set -euo pipefail
          /tmp/gitleaks detect --source . --report-format json --report-path gitleaks_report.json || true
          
          if [ -f gitleaks_report.json ]; then
            LEAKED_COUNT=$(jq '. | length' gitleaks_report.json 2>/dev/null || echo 0)
            echo "leaked_count=$LEAKED_COUNT" >> $GITHUB_OUTPUT
            echo "Gitleaks scan complete: found $LEAKED_COUNT potential secrets"
            if [ "$LEAKED_COUNT" -gt 0 ]; then
              jq . gitleaks_report.json || true
              echo "::warning::Potential secrets detected in code"
            fi
          else
            echo "leaked_count=0" >> $GITHUB_OUTPUT
            echo "No gitleaks report generated"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks_report.json
          retention-days: 7
