name: Secrets Scan (CI)

on:
  pull_request:
  push:

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gitleaks scan
        uses: aquasecurity/gitleaks-action@v1
        with:
          args: detect --source . --report-format json --report-path gitleaks_report.json --verbose

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks_report.json
