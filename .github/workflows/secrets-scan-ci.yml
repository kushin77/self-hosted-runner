name: Secrets Scan (CI)

on:
  pull_request:
  push:

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks-linux-x64 -o /tmp/gitleaks
          chmod +x /tmp/gitleaks
          /tmp/gitleaks version

      - name: Run gitleaks scan
        id: gitleaks
        continue-on-error: true
        run: |
          /tmp/gitleaks detect --source . --report-format json --report-path gitleaks_report.json --exit-code 0

      - name: Check gitleaks results
        run: |
          if [ -f gitleaks_report.json ]; then
            LEAKED_COUNT=$(jq '. | length' gitleaks_report.json || echo 0)
            echo "Gitleaks found $LEAKED_COUNT potential secrets"
            if [ "$LEAKED_COUNT" -gt 0 ]; then
              jq . gitleaks_report.json
              echo "⚠️ WARNING: Potential secrets detected in PR"
            fi
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks_report.json
