name: Secrets Scan (CI)

on:
  pull_request:
  push:

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          curl -sL https://api.github.com/repos/zricetheweb/gitleaks/releases/latest | \
          jq -r '.assets[] | select(.name | contains("linux_x64")) | .browser_download_url' | \
          xargs -I {} curl -sL {} -o /tmp/gitleaks.tgz && \
          tar -xzf /tmp/gitleaks.tgz -C /tmp && \
          mv /tmp/gitleaks /usr/local/bin/gitleaks && \
          chmod +x /usr/local/bin/gitleaks && \
          gitleaks version

      - name: Run gitleaks scan
        run: |
          gitleaks detect --source . --report-format json --report-path gitleaks_report.json || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks_report.json
