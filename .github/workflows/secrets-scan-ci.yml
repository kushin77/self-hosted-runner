name: Secrets Scan (CI)

on:
  pull_request:
  push:

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install gitleaks to $HOME/.local/bin
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          GL_VER="${GITLEAKS_VERSION:-v8.19.2}"
          curl -sSL "https://github.com/zricethezav/gitleaks/releases/download/${GL_VER}/gitleaks_${GL_VER#v}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp
          mv /tmp/gitleaks "$HOME/.local/bin/gitleaks"
          chmod +x "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          gitleaks version

      - name: Run gitleaks scan
        run: |
          set -euo pipefail
          gitleaks detect --source . --config .gitleaks.toml --report-format json --report-path gitleaks_report.json --verbose || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks_report.json
