name: Sync AWS Credentials from GSM to GitHub (Optional Fallback)
permissions:
  contents: read
  id-token: write
  actions: read

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update all secrets'
        required: false
        default: 'false'

jobs:
  sync-to-github:
    name: Sync GSM Secrets to GitHub Repo Secrets
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: 'access_token'
          access_token_lifetime: '600s'

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch and Sync AWS Credentials to GitHub
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_UPDATE: ${{ github.event.inputs.force_update }}
        run: |
          set -euo pipefail
          
          echo "🔄 Starting GSM → GitHub Secrets sync..."
          
          # Fetch secrets from GSM
          AWS_ACCESS_KEY=$(gcloud secrets versions access latest \
            --secret="terraform-aws-prod" \
            --project="$GCP_PROJECT_ID" 2>/dev/null || echo "")
          
          AWS_SECRET=$(gcloud secrets versions access latest \
            --secret="terraform-aws-secret" \
            --project="$GCP_PROJECT_ID" 2>/dev/null || echo "")
          
          AWS_REGION=$(gcloud secrets versions access latest \
            --secret="terraform-aws-region" \
            --project="$GCP_PROJECT_ID" 2>/dev/null || echo "us-east-1")
          
          if [ -z "$AWS_ACCESS_KEY" ] || [ -z "$AWS_SECRET" ]; then
            echo "❌ ERROR: Could not fetch credentials from GSM"
            exit 1
          fi
          
          # Check if secrets exist
          echo "🔍 Checking existing GitHub secrets..."
          
          check_secret_exists() {
            local secret_name="$1"
            gh secret list --repo "$GITHUB_REPOSITORY" | grep -q "^$secret_name" && echo "true" || echo "false"
          }
          
          # Set secrets (GitHub API will handle creation/update)
          echo "📝 Syncing secrets to GitHub..."
          
          echo -n "$AWS_ACCESS_KEY" | gh secret set AWS_ACCESS_KEY_ID \
            --repo "$GITHUB_REPOSITORY" \
            --body=-
          echo "  ✅ AWS_ACCESS_KEY_ID"
          
          echo -n "$AWS_SECRET" | gh secret set AWS_SECRET_ACCESS_KEY \
            --repo "$GITHUB_REPOSITORY" \
            --body=-
          echo "  ✅ AWS_SECRET_ACCESS_KEY"
          
          echo -n "$AWS_REGION" | gh secret set AWS_REGION \
            --repo "$GITHUB_REPOSITORY" \
            --body=-
          echo "  ✅ AWS_REGION"
          
          echo ""
          echo "✅ All credentials synced to GitHub (fallback backup)"

      - name: Log Sync Status
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          
          echo "📊 Sync Status Report:"
          echo "  GSM Project: $GCP_PROJECT_ID"
          echo "  Repository: $GITHUB_REPOSITORY"
          echo "  Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "  Secrets Updated: 3 (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION)"
          echo ""
          echo "📋 Next Steps:"
          echo "  1. Workflows will prioritize OIDC → GSM fetching"
          echo "  2. GitHub secrets are provided as fallback only"
          echo "  3. Update GSM secrets directly for future credential rotations"
