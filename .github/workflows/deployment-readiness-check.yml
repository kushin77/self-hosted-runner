name: Deployment Readiness Check

on:
  schedule:
    - cron: '0 8 * * MON'  # Weekly Monday morning
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Verbose output'
        required: false
        default: 'false'

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  readiness-check:
    name: Validate deployment readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all critical workflows exist
        id: workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          MISSING=0
          PRESENT=0

          REQUIRED_WFS=(
            "self-healing-orchestrator.yml"
            "monitor-ingestion.yml"
            "delivery-trigger.yml"
            "dr-smoke-test.yml"
            "docker-hub-weekly-dr-testing.yml"
            "recovery-completion-handler.yml"
            "system-status-aggregator.yml"
            "issue-escalation-notify.yml"
            "operator-gcp-reminder.yml"
            "dr-reconciliation-auto-remediate.yml"
            "system-health-check.yml"
            "deployment-readiness-check.yml"
          )

          for wf in "${REQUIRED_WFS[@]}"; do
            if git ls-files ".github/workflows/$wf" > /dev/null 2>&1; then
              echo "âś… $wf"
              PRESENT=$((PRESENT + 1))
            else
              echo "âťŚ $wf MISSING"
              MISSING=$((MISSING + 1))
            fi
          done

          echo "present=$PRESENT" >> $GITHUB_OUTPUT
          echo "missing=$MISSING" >> $GITHUB_OUTPUT

      - name: Check critical scripts exist
        id: scripts
        run: |
          set -euo pipefail

          REQUIRED_SCRIPTS=(
            ".github/scripts/fetch-gcp-secret.sh"
            "scripts/validate-gcp-key-local.sh"
          )

          MISSING=0
          PRESENT=0

          for script in "${REQUIRED_SCRIPTS[@]}"; do
            if [ -f "$script" ]; then
              echo "âś… $script"
              PRESENT=$((PRESENT + 1))
            else
              echo "âťŚ $script MISSING"
              MISSING=$((MISSING + 1))
            fi
          done

          echo "present=$PRESENT" >> $GITHUB_OUTPUT
          echo "missing=$MISSING" >> $GITHUB_OUTPUT

      - name: Verify workflow permissions
        id: permissions
        run: |
          set -euo pipefail

          ISSUES_OK=0
          ACTIONS_OK=0

          # Check that key workflows have correct permissions
          if grep -q "permissions:" .github/workflows/recovery-completion-handler.yml && \
             grep -q "issues: write" .github/workflows/recovery-completion-handler.yml; then
            echo "âś… Workflow permissions configured"
            ISSUES_OK=1
          else
            echo "âťŚ Workflow permissions may be incomplete"
          fi

          echo "issues_ok=$ISSUES_OK" >> $GITHUB_OUTPUT

      - name: Check GitHub Actions secrets configured
        id: secrets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"

          # List secret names (not values)
          SECRETS=$(gh secret list --repo "${REPO}" --json name --jq '.[] | .name' 2>/dev/null || echo "")

          REQUIRED_SECRETS=(
<REDACTED_SECRET_REMOVED_BY_AUTOMATION>
            "GCP_WORKLOAD_IDENTITY_PROVIDER"
<REDACTED_SECRET_REMOVED_BY_AUTOMATION>
            "GCP_PROJECT_ID"
          )

          PRESENT=0
          MISSING=0

          for secret in "${REQUIRED_SECRETS[@]}"; do
            if echo "$SECRETS" | grep -q "^${secret}$"; then
              echo "âś… Secret: $secret"
              PRESENT=$((PRESENT + 1))
            else
              echo "âŹł Secret not configured: $secret"
              MISSING=$((MISSING + 1))
            fi
          done

          echo "present=$PRESENT" >> $GITHUB_OUTPUT
          echo "missing=$MISSING" >> $GITHUB_OUTPUT

      - name: Validate key files
        id: files
        run: |
          set -euo pipefail

          VALID=0
          INVALID=0

          # Validate Dockerfile exists
          if [ -f "Dockerfile" ]; then
            echo "âś… Dockerfile present"
            VALID=$((VALID + 1))
          else
            echo "âťŚ Dockerfile missing"
            INVALID=$((INVALID + 1))
          fi

          # Validate Makefile exists
          if [ -f "Makefile" ]; then
            echo "âś… Makefile present"
            VALID=$((VALID + 1))
          else
            echo "âťŚ Makefile missing"
            INVALID=$((INVALID + 1))
          fi

          # Validate critical directories
          if [ -d ".github/workflows" ]; then
            echo "âś… Workflows directory"
            VALID=$((VALID + 1))
          fi

          if [ -d ".github/scripts" ]; then
            echo "âś… Scripts directory"
            VALID=$((VALID + 1))
          fi

          echo "valid=$VALID" >> $GITHUB_OUTPUT
          echo "invalid=$INVALID" >> $GITHUB_OUTPUT

      - name: Check documentation
        id: docs
        run: |
          set -euo pipefail

          DOCS_OK=0

          REQUIRED_DOCS=(
            "README.md"
            "CONTRIBUTING.md"
            "HANDS_OFF_OPERATOR_PLAYBOOK.md"
          )

          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ -f "$doc" ]; then
              echo "âś… $doc"
              DOCS_OK=$((DOCS_OK + 1))
            else
              echo "âš ď¸Ź  $doc missing"
            fi
          done

          echo "present=$DOCS_OK" >> $GITHUB_OUTPUT

      - name: Calculate readiness score
        id: score
        run: |
          set -euo pipefail

          TOTAL_CHECKS=0
          PASSED_CHECKS=0

          # Workflows check
          WF_SCORE=${{ steps.workflows.outputs.present }} - ${{ steps.workflows.outputs.missing }}
          PASSED_CHECKS=$((PASSED_CHECKS + ${{ steps.workflows.outputs.present }}))
          TOTAL_CHECKS=$((TOTAL_CHECKS + ${{ steps.workflows.outputs.present }} + ${{ steps.workflows.outputs.missing }}))

          # Scripts check
          PASSED_CHECKS=$((PASSED_CHECKS + ${{ steps.scripts.outputs.present }}))
          TOTAL_CHECKS=$((TOTAL_CHECKS + ${{ steps.scripts.outputs.present }} + ${{ steps.scripts.outputs.missing }}))

          # Secrets check
          PASSED_CHECKS=$((PASSED_CHECKS + ${{ steps.secrets.outputs.present }}))
          TOTAL_CHECKS=$((TOTAL_CHECKS + ${{ steps.secrets.outputs.present }} + ${{ steps.secrets.outputs.missing }}))

          # Files check
          PASSED_CHECKS=$((PASSED_CHECKS + ${{ steps.files.outputs.valid }}))
          TOTAL_CHECKS=$((TOTAL_CHECKS + ${{ steps.files.outputs.valid }} + ${{ steps.files.outputs.invalid }}))

          # Permissions check
          PASSED_CHECKS=$((PASSED_CHECKS + ${{ steps.permissions.outputs.issues_ok }}))
          TOTAL_CHECKS=$((TOTAL_CHECKS + 1))

          # Docs check
          PASSED_CHECKS=$((PASSED_CHECKS + ${{ steps.docs.outputs.present }}))
          TOTAL_CHECKS=$((TOTAL_CHECKS + ${{ steps.docs.outputs.present }} + 0))

          if [ $TOTAL_CHECKS -gt 0 ]; then
            PERCENTAGE=$((PASSED_CHECKS * 100 / TOTAL_CHECKS))
          else
            PERCENTAGE=0
          fi

          echo "passed=$PASSED_CHECKS" >> $GITHUB_OUTPUT
          echo "total=$TOTAL_CHECKS" >> $GITHUB_OUTPUT
          echo "percentage=$PERCENTAGE" >> $GITHUB_OUTPUT

      - name: Generate readiness report
        id: report
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%SZ')
          SCORE="${{ steps.score.outputs.percentage }}"
          PASSED="${{ steps.score.outputs.passed }}"
          TOTAL="${{ steps.score.outputs.total }}"

          STATUS="đźź˘ READY"
          if [ $SCORE -lt 80 ]; then
            STATUS="đźźˇ NEEDS ATTENTION"
          fi
          if [ $SCORE -lt 60 ]; then
            STATUS="đź”´ NOT READY"
          fi

          REPORT=$(cat << EOF
          ## đź“‹ Deployment Readiness Report â€” $TIMESTAMP

          **Overall Readiness**: $STATUS

          ### Readiness Score
          **$SCORE%** ($PASSED/$TOTAL checks passed)

          ### Component Status

          #### Workflows (${{ steps.workflows.outputs.present }}/12)
          - Present: ${{ steps.workflows.outputs.present }}
          - Missing: ${{ steps.workflows.outputs.missing }}

          #### Scripts (${{ steps.scripts.outputs.present }}/2)
          - Present: ${{ steps.scripts.outputs.present }}
          - Missing: ${{ steps.scripts.outputs.missing }}

          #### Secrets (${{ steps.secrets.outputs.present }}/4)
          - Configured: ${{ steps.secrets.outputs.present }}
          - Missing: ${{ steps.secrets.outputs.missing }}

          #### Core Files (${{ steps.files.outputs.valid }})
          - Valid: ${{ steps.files.outputs.valid }}
          - Invalid: ${{ steps.files.outputs.invalid }}

          #### Permissions & Configuration
          - Workflow Permissions: ${{ steps.permissions.outputs.issues_ok == '1' && 'âś…' || 'âťŚ' }}

          #### Documentation (${{ steps.docs.outputs.present }})
          - Operator Playbook: ${{ steps.docs.outputs.present >= 1 && 'âś…' || 'âš ď¸Ź ' }}

          ### Recommendations

          ${{ steps.score.outputs.percentage >= 80 && 'âś… System ready for production operations.' || 'âš ď¸Ź Address missing components before full deployment.' }}

          ${{ steps.scripts.outputs.missing > 0 && '- Missing scripts: Review scripts/ and .github/scripts/' || '' }}

          ${{ steps.secrets.outputs.missing > 0 && '- Missing secrets: Configure GitHub secrets and GSM integration' || '' }}

          ${{ steps.workflows.outputs.missing > 0 && '- Missing workflows: Verify all workflows are committed to main' || '' }}

          _Report generated by Deployment Readiness Check (weekly Monday 8 AM UTC)_
          EOF
          )

          # Post to tracking issue
          TRACKING_ISSUE=1064
          EXISTING=$(gh api "/repos/${REPO}/issues/${TRACKING_ISSUE}/comments" --jq ".[] | select(.body | contains(\"Deployment Readiness Report\")) | .id" 2>/dev/null | head -1 || true)

          if [ -n "$EXISTING" ]; then
            gh api "/repos/${REPO}/issues/comments/${EXISTING}" -X PATCH -f body="$REPORT" 2>/dev/null || true
          else
            gh issue comment ${TRACKING_ISSUE} --repo ${REPO} --body "$REPORT" 2>/dev/null || true
          fi

          # Set status
          if [ ${{ steps.score.outputs.percentage }} -ge 80 ]; then
            echo "âś… Deployment readiness acceptable"
          else
            echo "âš ď¸Ź Review readiness issues: $PASSED/$TOTAL checks passed"
          fi
