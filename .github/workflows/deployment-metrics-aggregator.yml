name: Deployment Metrics Aggregator

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID to collect metrics for (optional)'
        required: false
      environment:
        description: 'Environment (staging|production)'
        required: true
        default: 'production'

permissions:
  actions: read
  contents: read

jobs:
  collect:
    name: Collect deployment metrics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gather context
        id: ctx
        run: |
          echo "RUN_ID=${{ github.event.inputs.run_id || github.run_id }}" >> $GITHUB_OUTPUT
          echo "ENV=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT

      - name: Collect basic metrics
        run: |
          RUN_ID=${{ steps.ctx.outputs.RUN_ID }}
          ENV=${{ steps.ctx.outputs.ENV }}
          cat > deployment-metrics.json <<EOF
          {
            "repository": "${{ github.repository }}",
            "run_id": "$RUN_ID",
            "environment": "$ENV",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
EOF
          echo "Collected basic metrics"

      - name: Fetch run artifact if present
        run: |
          RUN_ID=${{ steps.ctx.outputs.RUN_ID }}
          mkdir -p artifacts
          gh run download $RUN_ID --repo $GITHUB_REPOSITORY --name artifact-metadata -D artifacts || echo "no artifact metadata"
          if [ -f artifacts/artifact-metadata.json ]; then
            jq -s '.[0] * .[1]' deployment-metrics.json artifacts/artifact-metadata.json > deployment-metrics-merged.json || cp deployment-metrics.json deployment-metrics-merged.json
          else
            cp deployment-metrics.json deployment-metrics-merged.json
          fi

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-metrics-${{ github.run_id }}
          path: deployment-metrics-merged.json

      - name: Post summary comment
        run: |
          gh issue comment --repo $GITHUB_REPOSITORY --issue 1313 --body "Deployment metrics collected for run ${{ steps.ctx.outputs.RUN_ID }} (env: ${{ steps.ctx.outputs.ENV }}). Artifact uploaded." || true
