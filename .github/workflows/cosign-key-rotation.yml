name: Cosign Key Rotation (Vault)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, generate keys locally but do not store to Vault'
        required: false
        default: 'true'
  schedule:
    - cron: '0 4 1 * *' # monthly rotation, adjust as needed

permissions:
  id-token: write
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Request Vault OIDC token (unless dry-run)
        if: github.event.inputs.dry_run != 'true'
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE: ${{ secrets.VAULT_ROLE }}
          AUDIENCE: vault
        run: |
          if [ -z "$VAULT_ADDR" ] || [ -z "$VAULT_ROLE" ]; then
            echo "ERROR: VAULT_ADDR and VAULT_ROLE required for live rotation"
            exit 1
          fi
          bash scripts/vault_oidc_login.sh >> "$GITHUB_ENV"

      - name: Rotate cosign keys and store in Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry-run: generating cosign keys locally (not stored in Vault)"
            cosign --version || echo "cosign not found; install via: sudo mv cosign-linux-amd64 /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign"
            echo "(dry-run) Full rotation would execute: bash scripts/rotate_cosign_keys.sh"
          else
            if [ -z "$VAULT_ADDR" ] || [ -z "$VAULT_TOKEN" ]; then
              echo "ERROR: VAULT_ADDR and VAULT_TOKEN required for storage"
              exit 1
            fi
            echo "Rotating cosign keys and storing in Vault..."
            bash scripts/rotate_cosign_keys.sh
          fi

      - name: Notify
        uses: actions/github-script@v7
        with:
          script: |
            core.info('Cosign key rotation completed and stored in Vault (if VAULT_TOKEN provided).')
