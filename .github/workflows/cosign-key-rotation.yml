name: Cosign Key Rotation (Vault)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'If true, generate keys locally but do not store to Vault'
        required: false
        default: 'true'
  schedule:
    - cron: '0 4 1 * *' # monthly rotation, adjust as needed

permissions:
  id-token: write
  contents: read

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Request Vault OIDC token
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE: ${{ secrets.VAULT_ROLE }}
          AUDIENCE: vault
        run: |
          bash scripts/vault_oidc_login.sh

      - name: Rotate cosign keys and store in Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ env.VAULT_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry-run: would generate cosign keys locally (not stored in Vault)"
            cosign --version || true
            echo "(dry-run) keys would be generated by scripts/rotate_cosign_keys.sh"
          else
            bash scripts/rotate_cosign_keys.sh
          fi

      - name: Notify
        uses: actions/github-script@v7
        with:
          script: |
            core.info('Cosign key rotation completed and stored in Vault (if VAULT_TOKEN provided).')
