name: Issue 231 Auto Apply

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  auto-apply:
    name: Auto Apply Terraform (Issue 231)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity
        id: auth
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account_email: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Install Terraform
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gnupg software-properties-common curl
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -y && sudo apt-get install -y terraform

      - name: Terraform Init & Apply
        id: tfapply
        env:
          TF_IN_AUTOMATION: 1
          GOOGLE_OAUTH_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          set -euo pipefail
          # Change directory to where terraform code lives (adjust if needed)
          if [ -d "infra" ]; then
            cd infra
          fi
          terraform init -input=false
          terraform apply -auto-approve

      - name: Post success comment and close issues
        if: ${{ success() }}
        uses: actions/github-script@v6
        with:
          script: |
            const ownerRepo = process.env.GITHUB_REPOSITORY.split('/')
            const owner = ownerRepo[0]
            const repo = ownerRepo[1]
            const issuesToClose = [231, 220, 228]
            const runUrl = process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID
            const body = `Auto-apply for Issue #231 completed successfully by workflow run: ${runUrl}`
            for (const num of issuesToClose) {
              await github.rest.issues.createComment({ owner, repo, issue_number: num, body })
              await github.rest.issues.update({ owner, repo, issue_number: num, state: 'closed' })
            }

      - name: Post failure comment
        if: ${{ failure() }}
        uses: actions/github-script@v6
        with:
          script: |
            const ownerRepo = process.env.GITHUB_REPOSITORY.split('/')
            const owner = ownerRepo[0]
            const repo = ownerRepo[1]
            const issuesToNotify = [231]
            const runUrl = process.env.GITHUB_SERVER_URL + '/' + process.env.GITHUB_REPOSITORY + '/actions/runs/' + process.env.GITHUB_RUN_ID
            const body = `Auto-apply for Issue #231 failed. See workflow run: ${runUrl}`
            for (const num of issuesToNotify) {
              await github.rest.issues.createComment({ owner, repo, issue_number: num, body })
            }
