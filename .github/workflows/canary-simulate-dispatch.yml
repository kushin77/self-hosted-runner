name: Canary Simulate Dispatch

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: 'Ansible playbook path (relative)'
        required: false
        default: 'ansible/playbooks/canary-noop.yml'
      inventory:
        description: 'Ansible inventory path'
        required: false
        default: 'ansible/inventory/canary'
      canary_limit:
        description: 'Canary hosts limit'
        required: false
        default: 'canary'

jobs:
  simulate:
    name: Run simulator
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run canary simulator
        run: |
          python -m pip install --upgrade pip || true
          python scripts/simulate_canary.py || true

      - name: Create simulation note (log)
        run: |
          gh issue create --title "Canary simulation run" --body "Simulated canary run executed via Canary Simulate Dispatch workflow. Inputs: playbook=${{ github.event.inputs.playbook }}, inventory=${{ github.event.inputs.inventory }}, limit=${{ github.event.inputs.canary_limit }}" --label automation || true
