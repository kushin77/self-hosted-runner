name: Progressive Rollout Simulate

on:
  workflow_dispatch:
    inputs:
      playbook:
        description: 'Ansible playbook path (relative)'
        required: false
        default: 'ansible/playbooks/deploy-rotation.yml'
      inventory:
        description: 'Ansible inventory path'
        required: false
        default: 'ansible/inventory/production'
      limit:
        description: 'Limit expression (e.g., "<host>")'
        required: false
        default: ''
  schedule:
    - cron: '0 4 * * *'  # daily 04:00 UTC

jobs:
  simulate:
    name: Run progressive rollout simulator
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run canary simulator in progressive mode
        run: |
          python -m pip install --upgrade pip || true
          python scripts/simulate_canary.py --mode progressive \
            --inventory "${{ github.event.inputs.inventory }}" \
            --playbook "${{ github.event.inputs.playbook }}" || true

      - name: Create simulation note (log)
        run: |
          gh issue create --title "Progressive rollout simulation run" --body "Simulated progressive rollout executed via Progressive Rollout Simulate workflow. Inputs: playbook=${{ github.event.inputs.playbook }}, inventory=${{ github.event.inputs.inventory }}, limit=${{ github.event.inputs.limit }}" --label automation || true
