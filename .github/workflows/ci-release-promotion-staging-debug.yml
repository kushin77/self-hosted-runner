name: CI - Release Promotion Staging (Debug)

on:
  workflow_dispatch: {}

jobs:
  simulate-promotion:
    name: Simulate Release Promotion (no-secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare dummy SBOM
        run: |
          mkdir -p sbom_artifacts
          echo '{}' > sbom_artifacts/sbom_dummy_image_latest.json

      - name: Run release gate verification (debug)
        run: |
          chmod +x scripts/supplychain/verify_release_gate.sh || true
          bash -x scripts/supplychain/verify_release_gate.sh dummy/image:latest

      - name: Success marker
        run: |
          echo "STAGING_SIMULATION=SUCCESS"
