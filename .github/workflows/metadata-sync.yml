name: Metadata Validation and Sync

on:
  push:
    paths:
      - 'metadata/**'
      - '.github/workflows/**'
      - 'scripts/**'
      - '.github/workflows/metadata-sync.yml'
  schedule:
    # Run daily metadata validation
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      validate_only:
        description: 'Only validate, do not sync'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  validate:
    name: Validate Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run metadata validation
        run: ./scripts/validate-metadata.sh
        continue-on-error: true

      - name: Verify compliance
        run: ./scripts/audit-metadata.sh verify-compliance
        continue-on-error: true

      - name: Detect anomalies
        run: ./scripts/audit-metadata.sh detect-anomalies
        continue-on-error: true

      - name: Generate reports
        run: ./scripts/visualize-dependencies.sh
        continue-on-error: true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metadata-reports
          path: dependency-reports/
          retention-days: 30

  sync:
    name: Sync Metadata
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Update metadata timestamps
        run: |
          jq '.last_updated = "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"' metadata/items.json > metadata/items.json.tmp
          mv metadata/items.json.tmp metadata/items.json
          
          jq '.last_updated = "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"' metadata/dependencies.json > metadata/dependencies.json.tmp
          mv metadata/dependencies.json.tmp metadata/dependencies.json

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add metadata/
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "chore: sync metadata timestamps and audit trail"
          )

      - name: Push changes
        run: git push origin HEAD:${{ github.ref }}
        if: github.ref == 'refs/heads/main'
        continue-on-error: true

  notify:
    name: Notify on Issues
    needs: [validate, sync]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Check compliance status
        run: |
          status=$(jq -r '.status' metadata/compliance.json || echo "unknown")
          if [[ "$status" != "compliant" ]]; then
            echo "::warning::Metadata compliance issues detected"
          fi

      - name: Create compliance issue if needed
        uses: actions/github-script@v6
        if: failure()
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Metadata validation failed',
              body: 'Automated metadata validation detected issues. Check workflow logs for details.',
              labels: ['metadata', 'automation']
            })

  schedule-validation:
    name: Daily Validation Report
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate daily report
        run: ./scripts/audit-metadata.sh generate-report daily

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: daily-metadata-report
          path: metadata/reports/
          retention-days: 30
