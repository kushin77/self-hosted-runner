name: Phase 6 CI - Build, Integration, Health

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    env:
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
      MQ_USER: ${{ secrets.MQ_USER }}
      MQ_PASSWORD: ${{ secrets.MQ_PASSWORD }}
      GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Ensure docker-compose is available
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin

      - name: Build images (no-cache)
        run: |
          docker compose -f docker-compose.phase6.yml build --no-cache

      - name: Start services
        run: |
          docker compose -f docker-compose.phase6.yml up -d

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 60); do
            docker compose exec -T database pg_isready -U portal_user -d portal_db && break || sleep 2
          done

      - name: Apply DB migrations (if present)
        run: |
          for f in backend/migrations/*.sql; do
            echo "Applying $f"
            docker compose exec -T database psql -U portal_user -d portal_db -f /docker-entrypoint-initdb.d/$(basename $f) || true
          done

      - name: Run integration verification script
        run: |
          bash scripts/phase6-integration-verify.sh

      - name: Run health check script
        run: |
          bash scripts/phase6-health-check.sh || true

      - name: Run backend integration tests
        run: |
          pip install -r backend/requirements.txt || true
          pytest backend/tests/integration/ -v || true

      - name: Collect logs
        run: |
          mkdir -p artifacts
          docker compose logs --no-color > artifacts/docker-compose.log || true
          cp logs/*.jsonl artifacts/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase6-artifacts
          path: artifacts

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.phase6.yml down -v || true
