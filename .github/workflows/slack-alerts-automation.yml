name: Slack Notifications - Hands-Off Automation Alerts

on:
  issues:
    types: [opened, closed, reopened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, closed, synchronize]
  workflow_call: {}

concurrency:
  group: slack-alerts-automation-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  notify-critical:
    name: Alert on Critical Issues
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Check if Slack webhook configured
        id: check-webhook
        run: |
          if [ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "status=no-webhook" >> $GITHUB_OUTPUT
            echo "⚠ Slack webhook not configured (optional)"
            exit 0
          fi
          echo "status=configured" >> $GITHUB_OUTPUT

      - name: Build notification message (Issue Event)
        id: build-message-issue
        if: github.event_name == 'issues'
        run: |
          ACTION="${{ github.event.action }}"
          ISSUE_NUM="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_LABELS="${{ join(github.event.issue.labels.*.name, ', ') }}"

          case "$ACTION" in
            opened)
              ICON="🆕"
              ;;
            closed)
              ICON="✅"
              ;;
            reopened)
              ICON="🔄"
              ;;
            *)
              ICON="📝"
              ;;
          esac

          # Only notify on automation/critical issues
          if [[ "$ISSUE_LABELS" == *"automation"* ]] || [[ "$ISSUE_LABELS" == *"critical"* ]]; then

            MESSAGE="{
              \"text\": \"$ICON Issue #$ISSUE_NUM $ACTION\",
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"$ICON GitHub Issue Notification\"
                  }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*Issue:*\n#$ISSUE_NUM\"
                    },
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*Action:*\n$ACTION\"
                    },
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*Title:*\n$ISSUE_TITLE\"
                    },
                    {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*Labels:*\n$ISSUE_LABELS\"
                    }
                  ]
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {
                      \"type\": \"button\",
                      \"text\": {
                        \"type\": \"plain_text\",
                        \"text\": \"View Issue\"
                      },
                      \"url\": \"https://github.com/kushin77/self-hosted-runner/issues/$ISSUE_NUM\",
                      \"style\": \"primary\"
                    }
                  ]
                }
              ]
            }"

            echo "message=$MESSAGE" >> $GITHUB_OUTPUT
            echo "should_notify=true" >> $GITHUB_OUTPUT
          else
            echo "should_notify=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        id: notify
        if: steps.check-webhook.outputs.status == 'configured' && steps.build-message-issue.outputs.should_notify == 'true'
        run: |
          WEBHOOK="${{ secrets.SLACK_WEBHOOK_URL }}"
          MESSAGE='${{ steps.build-message-issue.outputs.message }}'

          curl -X POST "$WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$MESSAGE" \
            --silent --show-error \
            -w "\n%{http_code}" | tail -1 > /tmp/slack_response_code.txt

          RESPONSE_CODE=$(cat /tmp/slack_response_code.txt)

          if [ "$RESPONSE_CODE" = "200" ]; then
            echo "status=sent" >> $GITHUB_OUTPUT
            echo "✓ Notification sent to Slack"
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "⚠ Failed to send Slack notification (code: $RESPONSE_CODE)"
          fi

  notify-workflow-failure:
    name: Alert on Workflow Failure
    runs-on: ubuntu-latest
    if: failure()
    timeout-minutes: 5

    steps:
      - name: Check webhook and build failure message
        run: |
          if [ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "Slack not configured (optional)"
            exit 0
          fi

          WORKFLOW="${{ github.workflow }}"
          RUN_ID="${{ github.run_id }}"
          CONCLUSION="${{ job.status }}"

          MESSAGE="{
            \"text\": \"⚠️ Workflow Failed: $WORKFLOW\",
            \"blocks\": [
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"🚨 *Workflow Failed*\n\n*Workflow:* $WORKFLOW\n*Status:* $CONCLUSION\n*Run:* <https://github.com/kushin77/self-hosted-runner/actions/runs/$RUN_ID|View Run>\"
                }
              }
            ]
          }"

          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-Type: application/json' \
            -d "$MESSAGE" \
            --silent || echo "⚠ Slack notification failed (offline)"
