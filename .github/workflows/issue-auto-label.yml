name: Issue Auto-Label & Triage

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created, edited]

jobs:
  auto-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    concurrency:
      group: issue-${{ github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyGithub

      - name: Auto-label issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import json
          import sys
          import os
          from pathlib import Path

          # Load issue lifecycle logic
          sys.path.insert(0, str(Path.cwd() / "libs" / "issue-lifecycle"))
          from lifecycle import IssueLifecycle, IssueState, Issue

          issue_number = ${{ github.event.issue.number }}
          title = "${{ github.event.issue.title }}"
          body = "${{ github.event.issue.body }}"
          labels = ${{ toJson(github.event.issue.labels) }}
          created_at = "${{ github.event.issue.created_at }}"
          updated_at = "${{ github.event.issue.updated_at }}"
          assignee = "${{ github.event.issue.assignee.login }}"
          milestone = "${{ github.event.issue.milestone.title }}"

          # Determine initial state
          if any(label.get('name', '').startswith('state:') for label in labels):
              current_state = next(label.get('name', '').split(':')[1] for label in labels if label.get('name', '').startswith('state:'))
          else:
              current_state = "backlog"

          label_names = set(label.get('name', '') for label in labels)

          # Create issue object
          issue = Issue(
              number=issue_number,
              title=title,
              state=IssueState(current_state),
              labels=label_names,
              milestone=milestone or None,
              assignee=assignee or None,
              created_at=created_at,
              updated_at=updated_at,
              dependencies=[],
              blocking=[],
          )

          # Process lifecycle
          lifecycle = IssueLifecycle()
          labels_to_add = lifecycle.apply_labels_for_state(issue)
          next_state = lifecycle.get_next_state(issue)

          # Output for next step
          result = {
              "labels_to_add": list(labels_to_add - label_names),
              "next_state": next_state.value if next_state else None,
          }
          print(json.dumps(result))
          with open("/tmp/issue_update.json", "w") as f:
              json.dump(result, f)
          EOF

      - name: Apply labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT=$(cat /tmp/issue_update.json)
          LABELS=$(echo "$RESULT" | jq -r '.labels_to_add | join(",")')

          if [ -n "$LABELS" ] && [ "$LABELS" != "null" ]; then
            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --add-label "$LABELS"
          fi

      - name: Transition state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT=$(cat /tmp/issue_update.json)
          NEXT_STATE=$(echo "$RESULT" | jq -r '.next_state')

          if [ -n "$NEXT_STATE" ] && [ "$NEXT_STATE" != "null" ]; then
            # Remove old state label and add new one
            CURRENT=$(gh issue view ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --json labels --jq '.labels[].name' | grep "^state:" || true)
            
            if [ -n "$CURRENT" ]; then
              gh issue edit ${{ github.event.issue.number }} \
                --repo ${{ github.repository }} \
                --remove-label "$CURRENT"
            fi

            gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --add-label "state:$NEXT_STATE"
          fi

      - name: Auto-assign security issues to @akushnir
        if: contains(github.event.issue.labels.*.name, 'type:security')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-assignee akushnir \
            --priority p0

      - name: Auto-assign compliance issues to ops team
        if: contains(github.event.issue.labels.*.name, 'type:compliance')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label "priority:p0"
