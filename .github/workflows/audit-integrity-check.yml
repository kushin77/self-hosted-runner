name: Audit Integrity Check
true:
  schedule:
  - cron: 0 */6 * * *
  workflow_dispatch: {}
jobs:
  check-audit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Run audit integrity check
      run: 'pip install --no-cache-dir --upgrade pip

        python3 scripts/check_audit_integrity.py

        '
    timeout-minutes: 30
    name: Check Audit
permissions:
  contents: read
  pull-requests: read
  issues: read
  secrets: none
