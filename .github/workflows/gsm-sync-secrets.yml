name: GSM -> GitHub Secrets Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  secrets: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare GCP credentials
        env:
          GCP_KEY: ${{ secrets.TF_VAR_SERVICE_ACCOUNT_KEY }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${GCP_KEY:-}" ] || [ -z "${GCP_PROJECT:-}" ]; then
            echo "GCP credentials missing; skipping GSM sync"
            exit 0
          fi
          echo "$GCP_KEY" > /tmp/gcp_key.json
          curl -sS https://sdk.cloud.google.com | bash >/dev/null 2>&1 || true
          export PATH="$HOME/google-cloud-sdk/bin:$PATH"
          gcloud --version || true
          gcloud auth activate-service-account --key-file=/tmp/gcp_key.json --project="$GCP_PROJECT"

      - name: Ensure GH CLI available
        run: |
          gh --version || true

      - name: Sync required secrets from GSM to GitHub (idempotent)
        env:
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          REQUIRED=("AWS_OIDC_ROLE_ARN" "AWS_ROLE_TO_ASSUME")
          for s in "${REQUIRED[@]}"; do
            # check if secret exists already
            exists=$(gh secret list --repo "$GH_REPO" --json name --jq '.[].name' | grep -x "$s" || true)
            if [ -n "$exists" ]; then
              echo "Secret $s already exists in repo; skipping"
              continue
            fi
            echo "Attempting to fetch secret $s from GCP Secret Manager"
            val=$(gcloud secrets versions access latest --secret="$s" --project="$GCP_PROJECT" 2>/dev/null || true)
            if [ -z "$val" ]; then
              echo "Secret $s not found in GSM for project $GCP_PROJECT"
              continue
            fi
            echo "Setting secret $s in repository"
            echo "$val" | gh secret set "$s" --repo "$GH_REPO" --visibility=repository
            gh issue comment 1404 --repo "$GH_REPO" --body "[Automated] Synced secret $s from GSM to repo secrets (idempotent)." || true
          done

      - name: Notify OPS hub when all prerequisites present
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Check prerequisites
          req=("AWS_OIDC_ROLE_ARN" "AWS_ROLE_TO_ASSUME" "STAGING_KUBECONFIG")
          missing=()
          for r in "${req[@]}"; do
            if ! gh secret list --repo "$GH_REPO" --json name --jq '.[].name' | grep -x "$r" >/dev/null 2>&1; then
              missing+=("$r")
            fi
          done
          if [ ${#missing[@]} -eq 0 ]; then
            gh issue comment 231 --repo "$GH_REPO" --body "[Automated] All prerequisites detected in repo secrets. Continuous monitor will proceed and Phase P4 may be auto-dispatched shortly." || true
          else
            echo "Missing secrets: ${missing[*]}"
          fi
