name: Check Repository Secrets

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 6 * * *' # daily @ 06:00 UTC

permissions:
  issues: write
  actions: read
  contents: read

jobs:
  check-secrets:
    name: Check required repository secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: 1083
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true
          required=(MINIO_ENDPOINT MINIO_ACCESS_KEY MINIO_SECRET_KEY)
          echo "Listing repository secrets for $REPO"
          names=$(retry_command 5 10 sh -c "curl -s -H \"Authorization: token $GITHUB_TOKEN\" -H \"Accept: application/vnd.github.v3+json\" \"https://api.github.com/repos/$REPO/actions/secrets\" | jq -r '.secrets[].name'" || true)
          missing=()
          for s in "${required[@]}"; do
            if ! echo "$names" | grep -q "^$s$"; then
              missing+=($s)
            fi
          done

          if [ ${#missing[@]} -eq 0 ]; then
            echo "All required secrets present: ${required[*]}"
            echo "Posting comment and closing issue $ISSUE_NUMBER"
            retry_command 5 10 sh -c "curl -s -X POST -H \"Authorization: token $GITHUB_TOKEN\" -H \"Accept: application/vnd.github.v3+json\" -d '{\"body\": \"All required repository secrets are present. Closing this provisioning issue.\"}' \"https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments\" || true"
            retry_command 5 10 sh -c "curl -s -X PATCH -H \"Authorization: token $GITHUB_TOKEN\" -H \"Accept: application/vnd.github.v3+json\" -d '{\"state\":\"closed\"}' \"https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER\" || true" || true
          else
            echo "Missing secrets: ${missing[*]}"
            body=$(printf 'Automated check detected missing repository secrets: %s\n\nPlease add these in Settings → Secrets → Actions.\n' "${missing[*]}")
            retry_command 5 10 sh -c "curl -s -X POST -H \"Authorization: token $GITHUB_TOKEN\" -H \"Accept: application/vnd.github.v3+json\" -d '{\"body\": \"$body\"}' \"https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments\" || true"
            echo "Wrote a comment to issue $ISSUE_NUMBER listing missing secrets."
            exit 1
          fi
