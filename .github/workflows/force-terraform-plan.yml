name: Force Terraform Plan (dispatchable)

on:
  workflow_dispatch:
    inputs:
      terraform_version:
        description: 'Terraform version to use'
        required: false
        default: '1.7.0'
        type: string

permissions:
  contents: read
  actions: read
  issues: write

env:
  TERRAFORM_VERSION: ${{ inputs.terraform_version || '1.7.0' }}
  TF_IN_AUTOMATION: 'true'
  TF_LOG: 'INFO'

jobs:
  terraform-plan:
    name: Generate Terraform Plan (force)
    runs-on: ubuntu-latest
    environment: prod-terraform-apply

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup GCP Credentials
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS }}" | base64 -d > /tmp/gcp-credentials.json || true
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-credentials.json" >> $GITHUB_ENV || true

      - name: Setup Terraform Variables
        run: |
          mkdir -p terraform/environments/production
          echo "${{ secrets.PROD_TFVARS }}" > terraform/environments/production/terraform.tfvars

      - name: Terraform Init
        run: |
          cd terraform/environments/production
          terraform init -upgrade

      - name: Terraform Validate
        run: |
          cd terraform
          terraform validate

      - name: Terraform Plan
        run: |
          cd terraform/environments/production
          terraform plan -out=tfplan -input=false -lock=true

      - name: Convert Plan to JSON
        run: |
          cd terraform/environments/production
          terraform show -json tfplan > tfplan.json || true

      - name: Save Plan Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: terraform-plan
          path: |
            terraform/environments/production/tfplan
            terraform/environments/production/tfplan.json
          retention-days: 1

      - name: Generate and Post Plan Summary
        run: |
          cd terraform/environments/production || exit 0
          if [ -f tfplan.json ]; then
            ADDITIONS=$(jq '[.resource_changes[] | select(.change.actions[] == "create")] | length' tfplan.json)
            MODIFICATIONS=$(jq '[.resource_changes[] | select(.change.actions[] == "update")] | length' tfplan.json)
            DELETIONS=$(jq '[.resource_changes[] | select(.change.actions[] == "delete")] | length' tfplan.json)
          else
            ADDITIONS=0; MODIFICATIONS=0; DELETIONS=0
          fi

          PLAN_COMMENT="## 📋 Terraform Plan Results (forced run)

### Summary
- **Created:** $ADDITIONS
- **Modified:** $MODIFICATIONS
- **Deleted:** $DELETIONS

### Next Steps
To approve and apply this plan:
1. Review the changes above
2. Comment with: \`⏳ Plan approved\`
3. Terraform apply will auto-execute

---
*Plan generated by GitHub Actions at $(date -u)*"

          gh issue comment 1384 --repo ${{ github.repository }} --body "$PLAN_COMMENT" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Secrets
        if: always()
        run: |
          rm -f /tmp/gcp-credentials.json || true
          rm -f terraform/environments/production/terraform.tfvars || true
