name: Verify Repository Secrets & Diagnose Issues

on:
  schedule:
    - cron: "0 0 * * *"  # Daily at midnight UTC
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  verify-secrets:
    name: Verify Secrets Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      
      - name: Check for Required GCP Secrets (DR & Self-Healing)
        id: gcp-check
        run: |
          echo "Checking for GCP_SERVICE_ACCOUNT_KEY..."
          if [ -z "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
            echo "::error::GCP_SERVICE_ACCOUNT_KEY not set (required for disaster recovery)"
          else
            echo "found=true" >> $GITHUB_OUTPUT
            echo "✓ GCP_SERVICE_ACCOUNT_KEY is configured"
          fi
          
          echo "Checking for GCP_PROJECT_ID..."
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "project-id-missing=true" >> $GITHUB_OUTPUT
            echo "::error::GCP_PROJECT_ID not set (required for disaster recovery)"
          else
            echo "project-id-found=true" >> $GITHUB_OUTPUT
            echo "✓ GCP_PROJECT_ID is configured"
          fi
      
      - name: Validate GCP Service Account JSON Format
        if: steps.gcp-check.outputs.found == 'true'
        id: validate-json
        run: |
          # Create temporary file with the secret
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > /tmp/gcp-key.json
          
          # Validate JSON
          if jq empty /tmp/gcp-key.json 2>/dev/null; then
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "✓ GCP_SERVICE_ACCOUNT_KEY is valid JSON"
            
            # Extract and verify key fields
            if jq -e '.type == "service_account"' /tmp/gcp-key.json > /dev/null 2>&1; then
              echo "::notice::Service account key type verified"
              PROJECT_ID=$(jq -r '.project_id' /tmp/gcp-key.json)
              echo "Key project_id: $PROJECT_ID"
            else
              echo "::warning::Service account 'type' field not found or incorrect"
            fi
          else
            echo "valid=false" >> $GITHUB_OUTPUT
            echo "::error::GCP_SERVICE_ACCOUNT_KEY is not valid JSON"
            head -c 100 /tmp/gcp-key.json
          fi
          
          # Clean up
          shred -vfz /tmp/gcp-key.json 2>/dev/null || rm -f /tmp/gcp-key.json
      
      - name: Check for Docker Hub Secrets
        id: dockerhub-check
        run: |
          if [ -z "${{ secrets.DOCKER_HUB_PAT }}" ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
            echo "::warning::DOCKER_HUB_PAT not set (recommended for registry fallback operations)"
          else
            echo "found=true" >> $GITHUB_OUTPUT
            echo "✓ DOCKER_HUB_PAT is configured"
          fi
      
      - name: Check for Runner Management Secrets
        id: runner-check
        run: |
          if [ -z "${{ secrets.RUNNER_MGMT_TOKEN }}" ]; then
            echo "mgmt-missing=true" >> $GITHUB_OUTPUT
            echo "::warning::RUNNER_MGMT_TOKEN not set (required for self-healing automation)"
          else
            echo "mgmt-found=true" >> $GITHUB_OUTPUT
            echo "✓ RUNNER_MGMT_TOKEN is configured"
          fi
          
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "ssh-missing=true" >> $GITHUB_OUTPUT
            echo "::warning::DEPLOY_SSH_KEY not set (required for direct runner remediation)"
          else
            echo "ssh-found=true" >> $GITHUB_OUTPUT
            echo "✓ DEPLOY_SSH_KEY is configured"
          fi
      
      - name: Generate Diagnostic Summary
        id: summary
        run: |
          echo "## 🔐 Repository Secrets Status Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.gcp-check.outputs.found }}" = "true" ]; then
            STATUS="✅ Found"
            if [ "${{ steps.validate-json.outputs.valid }}" = "true" ]; then
              STATUS="✅ Valid JSON"
            fi
          else
            STATUS="❌ Missing"
          fi
          echo "| GCP_SERVICE_ACCOUNT_KEY | $STATUS |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.gcp-check.outputs.project-id-found }}" = "true" ]; then
            echo "| GCP_PROJECT_ID | ✅ Found |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| GCP_PROJECT_ID | ❌ Missing |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.dockerhub-check.outputs.found }}" = "true" ]; then
            echo "| DOCKER_HUB_PAT | ✅ Found |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| DOCKER_HUB_PAT | ⚠️ Missing |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.runner-check.outputs.mgmt-found }}" = "true" ]; then
            echo "| RUNNER_MGMT_TOKEN | ✅ Found |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| RUNNER_MGMT_TOKEN | ⚠️ Missing |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.runner-check.outputs.ssh-found }}" = "true" ]; then
            echo "| DEPLOY_SSH_KEY | ✅ Found |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| DEPLOY_SSH_KEY | ⚠️ Missing |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Setup Instructions" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [SECRETS_SETUP_GUIDE.md](./SECRETS_SETUP_GUIDE.md) for detailed instructions" >> $GITHUB_STEP_SUMMARY
      
      - name: Create Issue if Critical Secrets Missing
        if: failure() && (steps.gcp-check.outputs.missing == 'true' || steps.gcp-check.outputs.project-id-missing == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## 🔴 Critical: Missing GCP Secrets for Disaster Recovery
            
            The following required secrets are not configured:
            
            ${context.payload.workflow_run?.conclusion === 'failure' ? '- [ ] GCP_SERVICE_ACCOUNT_KEY (invalid JSON or missing)' : ''}
            - [ ] GCP_PROJECT_ID (missing)
            
            ### Impact
            
            Without these secrets:
            - ❌ Disaster recovery tests cannot run
            - ❌ Multi-cloud orchestration unavailable
            - ❌ GCP-based infrastructure remediation blocked
            
            ### Setup Instructions
            
            1. See [SECRETS_SETUP_GUIDE.md](./SECRETS_SETUP_GUIDE.md) for detailed setup steps
            2. Generate GCP Service Account key with proper scopes
            3. Set both secrets using GitHub UI or CLI:
               \`\`\`bash
               gh secret set GCP_SERVICE_ACCOUNT_KEY < /path/to/key.json
               gh secret set GCP_PROJECT_ID --body "your-project-id"
               \`\`\`
            4. Trigger DR test verification: \`gh workflow run docker-hub-weekly-dr-testing.yml\`
            
            ### Related Issues
            - #1184 (Automation: Missing secrets)
            - #1178 (DR test failures)
            
            **Note**: This is an automated diagnostic message. Check the diagnostic workflow run for details.
            `;
            
            // Check if issue already exists to avoid duplicates
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['security', 'ops'],
              state: 'open'
            });
            
            const existingIssue = issues.data.find(i => i.title.includes('Critical: Missing GCP Secrets'));
            
            if (!existingIssue) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🔴 [AUTO] Critical: Missing GCP Secrets for Disaster Recovery',
                body: body,
                labels: ['security', 'ops', 'blocking'],
                assignees: []
              });
            }
