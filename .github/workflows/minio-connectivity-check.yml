name: MinIO Connectivity Diagnostic
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours

  workflow_call: {}

concurrency:
  group: minio-connectivity-check-${{ github.ref }}
  cancel-in-progress: false

jobs:
  diagnose-minio:
    name: MinIO Endpoint Diagnostics
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true


      - name: Check MinIO secrets configuration
        id: secrets
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: |
          echo "## MinIO Secrets Check" >> $GITHUB_STEP_SUMMARY

          CONFIGURED=0
          for secret in MINIO_ENDPOINT MINIO_ACCESS_KEY MINIO_SECRET_KEY MINIO_BUCKET; do
            if [ -n "${!secret}" ]; then
              echo "✅ $secret: configured" >> $GITHUB_STEP_SUMMARY
              CONFIGURED=$((CONFIGURED + 1))
            else
              echo "⚠️ $secret: **NOT CONFIGURED**" >> $GITHUB_STEP_SUMMARY
            fi
          done

          if [ $CONFIGURED -eq 4 ]; then
            echo "secrets_configured=true" >> $GITHUB_OUTPUT
          else
            echo "secrets_configured=false" >> $GITHUB_OUTPUT
            echo "⚠️ Some secrets are missing. Configure all 4 MinIO secrets in Settings → Secrets → Actions" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

      - name: Test MinIO connectivity (if secrets configured)
        if: ${{ steps.secrets.outputs.secrets_configured == 'true' }}
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: |
          echo "## MinIO Connectivity Test" >> $GITHUB_STEP_SUMMARY

          set -euo pipefail
          source .github/scripts/resilience.sh || true

          # Extract host and port from endpoint
          ENDPOINT="${MINIO_ENDPOINT#*://}"
          ENDPOINT="${ENDPOINT%/*}"
          HOST="${ENDPOINT%%:*}"
          PORT="${ENDPOINT##*:}"

          echo "Testing connectivity to MinIO endpoint: $ENDPOINT" >> $GITHUB_STEP_SUMMARY

          # Test TCP connectivity
          if timeout 5 bash -c "cat < /dev/null > /dev/tcp/$HOST/$PORT" 2>/dev/null; then
            echo "✅ TCP connectivity to $HOST:$PORT successful" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ TCP connectivity to $HOST:$PORT **FAILED** (timeout or refused)" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Install mc and test S3 API
          chmod +x scripts/minio/install-mc.sh 2>/dev/null || true
          retry_command 3 5 ./scripts/minio/install-mc.sh || true

          echo "Testing MinIO S3 API with mc..." >> $GITHUB_STEP_SUMMARY

          if retry_command 3 5 mc alias set ci-test "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY" 2>&1 | tee /tmp/mc-alias.log; then
            echo "✅ MinIO alias configured successfully" >> $GITHUB_STEP_SUMMARY

            if retry_command 3 5 mc ls ci-test 2>&1 | tee /tmp/mc-ls.log; then
              echo "✅ MinIO bucket listing successful" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ MinIO bucket listing **FAILED**" >> $GITHUB_STEP_SUMMARY
              cat /tmp/mc-ls.log >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          else
            echo "❌ MinIO alias configuration **FAILED**" >> $GITHUB_STEP_SUMMARY
            cat /tmp/mc-alias.log >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Test read/write
          echo "Testing read/write operations..." >> $GITHUB_STEP_SUMMARY
          TEST_FILE="/tmp/minio-test-$(date +%s).txt"
          echo "test-content-$(date)" > "$TEST_FILE"

          if retry_command 3 5 mc cp "$TEST_FILE" "ci-test/$MINIO_BUCKET/connectivity-test.txt" 2>&1 | tee /tmp/mc-cp.log; then
            echo "✅ Write operation successful" >> $GITHUB_STEP_SUMMARY

            if retry_command 3 5 mc cat "ci-test/$MINIO_BUCKET/connectivity-test.txt" > /tmp/mc-read.txt 2>&1; then
              echo "✅ Read operation successful" >> $GITHUB_STEP_SUMMARY
              echo "Test file content: $(cat /tmp/mc-read.txt)" >> $GITHUB_STEP_SUMMARY

              # Cleanup
              retry_command 3 5 mc rm "ci-test/$MINIO_BUCKET/connectivity-test.txt" || true
              echo "✅ Cleanup successful" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Read operation **FAILED**" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          else
            echo "❌ Write operation **FAILED**" >> $GITHUB_STEP_SUMMARY
            cat /tmp/mc-cp.log >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ All MinIO connectivity checks passed" >> $GITHUB_STEP_SUMMARY
