---
name: CI - Airgap Full Integration Test
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}
  schedule:
    - cron: '30 3 * * 0'

jobs:
  full-airgap-test:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install docker
        uses: docker/setup-buildx-action@v2

      - name: Generate image manifest
        run: |
          mkdir -p build/airgap-images
          ./scripts/airgap/generate_image_manifest.sh > /tmp/airgap-manifest.yml
          echo "Generated manifest:" && cat /tmp/airgap-manifest.yml

      - name: Preload images (step 1)
        run: |
          set -euo pipefail
          imgs=$(grep -E "^\s*image:\s*" -h /tmp/airgap-manifest.yml | sed -E 's/^[[:space:]]*image:[[:space:]]*//')
          for img in $imgs; do
            echo "Pulling $img"
            docker pull "$img"
          done
          echo "Preload complete; saving first image as sample tarball"
          first=$(echo "$imgs" | head -n1)
          if [ -n "$first" ]; then
            docker save -o build/airgap-images/sample.tar "$first"
          fi

      - name: Generate manifest with checksums
        run: |
          ./scripts/airgap/generate_manifest_checksums.sh /tmp/airgap-manifest.yml /tmp/airgap-checked.yml || true
          echo "Checksummed manifest:" && cat /tmp/airgap-checked.yml || echo "(Checksums may be partial due to test environment)"

      - name: Start local Docker registry
        run: |
          docker run -d --name local-registry -p 5000:5000 registry:2
          sleep 2
          # Wait for registry to be ready
          for i in {1..30}; do
            if curl -s http://localhost:5000/v2/ >/dev/null 2>&1; then
              echo "Local registry ready"
              break
            fi
            echo "Waiting for registry..."
            sleep 1
          done

      - name: Load and push images to local registry (step 2)
        run: |
          set -euo pipefail
          imgs=$(grep -E "^\s*image:\s*" -h /tmp/airgap-manifest.yml | sed -E 's/^[[:space:]]*image:[[:space:]]*//')
          for img in $imgs; do
            echo "Tagging $img for local registry"
            docker tag "$img" "localhost:5000/$img"
            echo "Pushing to local registry: localhost:5000/$img"
            docker push "localhost:5000/$img" || (echo "Push failed for $img"; exit 1)
          done

      - name: Verify images in local registry (step 3)
        run: |
          set -euo pipefail
          imgs=$(grep -E "^\s*image:\s*" -h /tmp/airgap-manifest.yml | sed -E 's/^[[:space:]]*image:[[:space:]]*//')
          failed=0
          for img in $imgs; do
            echo "Verifying localhost:5000/$img"
            if docker pull "localhost:5000/$img" >/dev/null 2>&1; then
              echo "OK: $img"
            else
              echo "FAIL: $img"
              failed=$((failed+1))
            fi
          done
          if [ $failed -ne 0 ]; then
            echo "$failed images failed to pull from local registry"
            exit 1
          fi
          echo "All images verified in local registry"

      - name: Archive sample tarballs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: airgap-sample-tarballs
          path: build/airgap-images/
          retention-days: 5

      - name: Cleanup registry
        if: always()
        run: docker rm -f local-registry || true
