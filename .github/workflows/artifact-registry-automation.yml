name: Artifact Registry Automation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Image name (e.g. alertmanager)'
        required: true
        default: 'alertmanager'
      image_tag:
        description: 'Image tag or digest'
        required: true
        default: 'latest'
      target_registry:
        description: 'Target registry (hostname, e.g. ghcr.io)'
        required: false
        default: 'ghcr.io'
      cleanup_keep_count:
        description: 'How many recent tags to keep during cleanup (GHCR only)'
        required: false
        default: '10'

concurrency:
  group: artifact-registry-automation
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  push-and-sign:
    name: Push artifact and sign (keyless)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU and Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Determine image variables
        id: vars
        run: |
          echo "IMAGE_NAME=${{ github.event.inputs.image_name || github.event.release.tag_name || 'alertmanager' }}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${{ github.event.inputs.image_tag || github.event.release.tag_name || 'latest' }}" >> $GITHUB_OUTPUT
          echo "TARGET_REGISTRY=${{ github.event.inputs.target_registry || 'ghcr.io' }}" >> $GITHUB_OUTPUT

      - name: Login to target registry (GHCR fallback)
        uses: docker/login-action@v2
        with:
          registry: ${{ steps.vars.outputs.TARGET_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || secrets.GITHUB_TOKEN }}

      - name: Pull source image (if hosted elsewhere)
        run: |
          SRC="${{ steps.vars.outputs.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}"
          echo "Pulling $SRC if available"
          docker pull "$SRC" || echo "source image not present or already available"

      - name: Tag for target registry
        run: |
          SRC="${{ steps.vars.outputs.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}"
          TARGET="${{ steps.vars.outputs.TARGET_REGISTRY }}/${{ github.repository_owner }}/${{ steps.vars.outputs.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}"
          echo "Tagging $SRC -> $TARGET"
          docker tag "$SRC" "$TARGET" || (echo "Tag failed; image may already be tagged" && true)
          echo "::set-output name=target_image::$TARGET"

      - name: Push image to target registry
        env:
          TARGET_REGISTRY: ${{ steps.vars.outputs.TARGET_REGISTRY }}
        run: |
          TARGET="${{ steps.vars.outputs.TARGET_REGISTRY }}/${{ github.repository_owner }}/${{ steps.vars.outputs.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}"
          echo "Pushing $TARGET"
          docker push "$TARGET"

      - name: Install cosign
        run: |
          COSIGN_VERSION="2.1.0"
          curl -sSL https://github.com/sigstore/cosign/releases/download/v${COSIGN_VERSION}/cosign-linux-amd64 -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign

      - name: Keyless sign pushed image (cosign)
        env:
          COSIGN_EXPERIMENTAL: 1
        run: |
          TARGET="${{ steps.vars.outputs.TARGET_REGISTRY }}/${{ github.repository_owner }}/${{ steps.vars.outputs.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}"
          echo "Signing $TARGET with keyless cosign"
          cosign sign --keyless "$TARGET"
          cosign verify --keyless "$TARGET"

      - name: Create metadata JSON artifact
        run: |
          TARGET="${{ steps.vars.outputs.TARGET_REGISTRY }}/${{ github.repository_owner }}/${{ steps.vars.outputs.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }}"
          cat > artifact-metadata.json <<EOF
          {
            "image": "$TARGET",
            "pushed_by": "${{ github.actor }}",
            "sha": "${{ github.sha }}",
            "repository": "${{ github.repository }}",
            "run_id": "${{ github.run_id }}"
          }
EOF
          echo "Created artifact-metadata.json"

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-metadata
          path: artifact-metadata.json

      - name: Cleanup old tags (GHCR only, best-effort)
        if: steps.vars.outputs.TARGET_REGISTRY == 'ghcr.io'
        env:
          KEEP_COUNT: ${{ github.event.inputs.cleanup_keep_count || '10' }}
        run: |
          pkg_name="${{ github.repository_owner }}/${{ steps.vars.outputs.IMAGE_NAME }}"
          echo "Listing package versions for $pkg_name"
          pkg_id=$(gh api -H "Accept: application/vnd.github+json" /orgs/${{ github.repository_owner }}/packages/container/${{ steps.vars.outputs.IMAGE_NAME }} -q '.id' 2>/dev/null || true)
          if [ -z "$pkg_id" ]; then
            echo "Package not found or not an org-level package; skipping cleanup"
            exit 0
          fi
          versions=$(gh api /orgs/${{ github.repository_owner }}/packages/container/${{ steps.vars.outputs.IMAGE_NAME }}/versions -q '.[].id' 2>/dev/null || true)
          echo "Found versions: $versions"
          # Keep the most recent $KEEP_COUNT versions; delete older ones
          to_delete=$(echo "$versions" | tr '\n' '\n' | tail -n +$(($KEEP_COUNT + 1)) || true)
          if [ -z "$to_delete" ]; then
            echo "Nothing to delete"
            exit 0
          fi
          echo "$to_delete" | while read id; do
            if [ -n "$id" ]; then
              echo "Deleting version $id"
              gh api --method DELETE /orgs/${{ github.repository_owner }}/packages/container/${{ steps.vars.outputs.IMAGE_NAME }}/versions/$id || echo "delete failed for $id"
            fi
          done
