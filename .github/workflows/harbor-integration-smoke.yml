name: Harbor Integration Smoke (kind)
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_dispatch:
  # manual trigger; heavy CI - not run on every PR by default

jobs:
  smoke-test:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: harbor-integration-smoke-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: [self-hosted, linux, self-hosted-heavy]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true


      - name: Set up Docker Buildx (self-hosted)
        if: contains(runner.labels, 'self-hosted')
        run: |
          chmod +x ci/scripts/setup-buildx.sh
          ci/scripts/setup-buildx.sh
      - name: Set up Docker Buildx (hosted fallback)
        if: ${{ !contains(runner.labels, 'self-hosted') }}
        uses: docker/setup-buildx-action@v2

      - name: Install kind (self-hosted)
        if: contains(runner.labels, 'self-hosted')
        run: |
          chmod +x ci/scripts/setup-kind.sh
          ci/scripts/setup-kind.sh v0.20.0
      - name: Install kind (hosted fallback)
        if: ${{ !contains(runner.labels, 'self-hosted') }}
        uses: engineerd/setup-kind@v0.5.0

      - name: Create kind cluster
        run: |
          kind create cluster --name harbor-smoke --wait 120s

      - name: Setup kubectl
        if: contains(runner.labels, 'self-hosted')
        run: |
          chmod +x ci/scripts/setup-kubectl.sh
          ci/scripts/setup-kubectl.sh 1.28.0
      - name: Setup kubectl (hosted fallback)
        if: ${{ !contains(runner.labels, 'self-hosted') }}
        uses: azure/setup-kubectl@v3

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Setup Terraform
        if: contains(runner.labels, 'self-hosted')
        run: |
          chmod +x ci/scripts/setup-terraform.sh
          ci/scripts/setup-terraform.sh 1.5.9
      - name: Setup Terraform (hosted fallback)
        if: ${{ !contains(runner.labels, 'self-hosted') }}
        uses: hashicorp/setup-terraform@v2

      - name: Run Terraform wrapper (provision Postgres+Redis and create Harbor secrets)
        working-directory: terraform/provision/harbor-integration
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true
          retry_command 3 10 terraform init -input=false
          retry_command 3 20 terraform apply -auto-approve -input=false -var "kubeconfig_path=$HOME/.kube/config" -var "harbor_namespace=harbor"

      - name: Install Harbor chart
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true
          retry_command 3 10 helm install harbor ./deploy/harbor -n harbor --create-namespace --wait --timeout 600s --values deploy/harbor/values.yaml

      - name: Wait for harbor-core rollout
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true
          retry_command 3 10 kubectl rollout status deployment/harbor-core -n harbor --timeout=6m

      - name: Smoke check - list pods
        run: |
          kubectl get pods -n harbor -o wide

      - name: Cleanup kind cluster
        if: always()
        run: |
          kind delete cluster --name harbor-smoke || true