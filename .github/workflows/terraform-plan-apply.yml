---
name: Terraform Plan & Apply
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      auto_apply:
        description: 'If true, run apply after successful plan'
        required: false
        default: 'false'
      force_no_secrets:
        description: 'If true, skip evaluating repository secrets and attempt plan without them (use carefully)'
        required: false
        default: 'false'

jobs:
  plan:
    runs-on: [self-hosted, linux, x64]
    env:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
      - name: Configure Google credentials
        if: ${{ github.event.inputs.force_no_secrets == 'true' || env.GCP_SA_KEY != '' }}
        run: |
          if [ "${{ github.event.inputs.force_no_secrets }}" = "true" ]; then
            echo "Force no-secrets mode enabled; skipping credential write"
          else
            echo "$GCP_SA_KEY" > sa.json
            export GOOGLE_APPLICATION_CREDENTIALS=sa.json
          fi
      - name: Terraform init
        run: terraform init -input=false
      - name: Terraform plan
        run: |
          terraform plan -input=false -var-file=terraform.tfvars -out=plan.out
      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: plan.out
  apply:
    if: github.event.inputs.auto_apply == 'true'
    runs-on: [self-hosted, linux, x64]
    needs: plan
    steps:
      - uses: actions/checkout@v4
      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
      - name: Terraform apply
        run: terraform apply -input=false -auto-approve plan.out
