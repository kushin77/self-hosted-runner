---
name: P2 CI skeleton
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
on:
  workflow_dispatch: {}
  push:
    branches:
      - 'feature/p2-*'
      - 'feature/instant-deploy'
      - 'feature/tco-calculator'

jobs:
  p2-check:
    name: P2 CI check
    runs-on: [self-hosted, linux]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print context
        run: |
          echo "P2 CI skeleton: branch=$GITHUB_REF"
          echo "Run real tests in feature branches by updating this workflow."

      - name: Run branch smoke test (if present)
        run: |
          if [ -x tests/smoke.sh ]; then
            echo "Found executable tests/smoke.sh — running"
            ./tests/smoke.sh
          elif [ -f tests/smoke.sh ]; then
            echo "Found tests/smoke.sh — running with bash"
            bash tests/smoke.sh
          else
            echo "No smoke test found in tests/smoke.sh — skipping"
          fi
