name: EIQ Nexus CI
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  schedule:
    # Run security scan daily
    - cron: '0 2 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: Validate & Lint
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Node lockfiles and Git LFS pointers
        run: |
          missing_lockfiles=()
          while IFS= read -r -d '' pkg; do
            dir=$(dirname "$pkg")
            if [ ! -f "$dir/package-lock.json" ] && [ ! -f "$dir/yarn.lock" ] && [ ! -f "$dir/pnpm-lock.yaml" ]; then
              missing_lockfiles+=("$dir")
            fi
          done < <(find . -name package.json -print0)
          if [ ${#missing_lockfiles[@]} -ne 0 ]; then
            echo "Missing lockfiles for the following package.json locations:" >&2
            for d in "${missing_lockfiles[@]}"; do echo " - $d" >&2; done
            echo "Please add appropriate lockfiles (package-lock.json / yarn.lock / pnpm-lock.yaml)." >&2
            exit 1
          fi
          if command -v git-lfs >/dev/null; then
            git lfs status || true
          else
            echo "git-lfs not installed on runner; skipping LFS pointer check" >&2
          fi

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint Go
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...

      - name: Lint TypeScript
        run: |
          npm ci
          npm run lint

      - name: Format Check
        run: |
          go fmt ./...
          npm run format:check

      - name: Security Audit
        run: |
          go list -json -m all | nancy sleuth

  test:
    name: Unit Tests
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Go Tests
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: Run TypeScript Tests
        run: |
          npm ci
          npm test -- --coverage

      - name: Upload Coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  security:
    name: Security Scanning
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
      security-events: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Secret Scanning
        run: |
          go install github.com/trufflesecurity/trufflehog/v3/cmd/trufflehog@latest
          trufflehog filesystem . --json || true

      - name: SBOM Generation
        run: |
          go install github.com/anchore/syft/cmd/syft@latest
          syft packages . -o spdx-json > sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom.spdx.json

  build:
    name: Build Docker Image
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
      packages: write
    needs: [validate, test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install docker-compose
        run: |
          if ! command -v docker-compose >/dev/null; then
            python3 -m pip install --upgrade pip setuptools wheel
            python3 -m pip install 'docker-compose==1.29.2'
          fi

      - name: Login to Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  performance:
    name: Performance Tests
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
    needs: [validate, test]
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run Benchmarks
        run: |
          go test -bench=. -benchmem ./... > benchmark-results.txt

      - name: Upload Benchmarks
        uses: actions/upload-artifact@v3
        with:
          name: benchmarks
          path: benchmark-results.txt

  integration:
    name: Integration Tests
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
    needs: [validate, test]
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Start Services
        run: docker-compose -f docker-compose.test.yml up -d

      - name: Wait for Services
        run: |
          timeout 60 bash -c 'until docker-compose -f docker-compose.test.yml exec -T nexus curl http://localhost:8080/health; do sleep 1; done'

      - name: Run Integration Tests
        run: |
          npm run test:integration

      - name: Collect Logs
        if: failure()
        run: |
          docker-compose -f docker-compose.test.yml logs > integration-test.log

      - name: Upload Logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: integration-logs
          path: integration-test.log

      - name: Stop Services
        if: always()
        run: docker-compose -f docker-compose.test.yml down

  notify:
    name: Notifications
    runs-on: [self-hosted, linux]
    needs: [validate, test, security, build, performance, integration]
    if: always()
    
    steps:
      - name: Check Status
        run: |
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "Validate failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Tests failed"
            exit 1
          fi
          if [ "${{ needs.security.result }}" != "success" ]; then
            echo "Security scan failed"
            exit 1
          fi

      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "EIQ Nexus CI Pipeline Failed",
              "channel": "#nexus-alerts",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "EIQ Nexus CI Pipeline Failed\n*Repo:* ${{ github.repository }}\n*Branch:* ${{ github.ref }}\n*Commit:* ${{ github.sha }}"
                  }
                }
              ]
            }
on:
  workflow_dispatch: {}