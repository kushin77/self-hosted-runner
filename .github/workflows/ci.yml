name: CI - NexusShield

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          shellcheck -x nexusshield/scripts/*.sh || true

  terraform-check:
    name: Terraform Format & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.6
      - name: Terraform fmt check
        working-directory: nexusshield/infrastructure/terraform/production
        run: |
          terraform fmt -check || true
      - name: Terraform validate
        working-directory: nexusshield/infrastructure/terraform/production
        run: |
          terraform init -backend=false || true
          terraform validate || true

  python-lint:
    name: Python Lint (GTM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install pylint
      - name: Run pylint
        run: |
          if [ -d "nexusshield/gtm" ]; then
            pylint nexusshield/gtm || true
          else
            echo "No GTM Python modules to lint"
          fi
