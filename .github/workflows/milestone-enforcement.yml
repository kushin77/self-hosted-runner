name: Milestone Enforcement & Automation

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  schedule:
    # Run daily to check for milestone completion
    - cron: '0 2 * * *'

jobs:
  enforce-milestone-policy:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Check milestone requirements
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import subprocess
          import json
          import sys

          pr_number = ${{ github.event.pull_request.number }} if "${{ github.event.pull_request.number }}" else None

          if pr_number:
              # Get PR milestone
              result = subprocess.run(
                  ["gh", "pr", "view", str(pr_number), "--json", "milestone,labels", "--repo", "${{ github.repository }}"],
                  capture_output=True,
                  text=True
              )
              pr_data = json.loads(result.stdout)
              
              if not pr_data.get("milestone"):
                  print("::warning::PR must have a milestone assigned")
                  subprocess.run(
                      ["gh", "pr", "comment", str(pr_number),
                       "--repo", "${{ github.repository }}",
                       "--body", "⚠️ **Milestone Required**: Please assign this PR to a milestone for tracking."],
                      check=False
                  )
              else:
                  print(f"✅ PR has milestone: {pr_data['milestone']['title']}")

              # Check for breaking changes
              body = "${{ github.event.pull_request.body }}"
              if "BREAKING" in body.upper():
                  subprocess.run(
                      ["gh", "pr", "edit", str(pr_number),
                       "--repo", "${{ github.repository }}",
                       "--add-label", "breaking-change"],
                      check=False
                  )
                  print("⚠️ Marked as breaking change")
          EOF

  auto-close-resolved-issues-in-milestone:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Close resolved issues in completed milestones
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import subprocess
          import json
          import sys

          # Get all milestones
          result = subprocess.run(
              ["gh", "api", "repos/${{ github.repository }}/milestones", "-X", "GET"],
              capture_output=True,
              text=True
          )
          milestones = json.loads(result.stdout)

          for milestone in milestones:
              if milestone.get("state") == "closed" or milestone.get("open_issues") == 0:
                  # Check for issues that are marked as done but still open
                  search_result = subprocess.run(
                      ["gh", "issue", "list",
                       "-m", milestone["title"],
                       "--state", "open",
                       "--label", "state:done",
                       "--json", "number,title",
                       "--repo", "${{ github.repository }}"],
                      capture_output=True,
                      text=True
                  )
                  
                  issues = json.loads(search_result.stdout)
                  for issue in issues:
                      print(f"Closing resolved issue #{issue['number']}: {issue['title']}")
                      subprocess.run(
                          ["gh", "issue", "close", str(issue["number"]),
                           "--repo", "${{ github.repository }}",
                           "--reason", "not planned"],
                          check=False
                      )
          EOF

  milestone-release-notes:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Generate release notes from milestones
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import subprocess
          import json
          from datetime import datetime

          # Get closed milestones from last 7 days
          result = subprocess.run(
              ["gh", "api", "repos/${{ github.repository }}/milestones", 
               "-X", "GET", "-f", "state=closed"],
              capture_output=True,
              text=True
          )
          milestones = json.loads(result.stdout)

          for milestone in milestones[:5]:  # Process last 5 closed
              title = milestone["title"]
              closed_at = milestone.get("updated_at", "")
              
              # Get issues in milestone
              issues_result = subprocess.run(
                  ["gh", "issue", "list", "-m", title, "--state", "closed",
                   "--json", "number,title,labels",
                   "--repo", "${{ github.repository }}"],
                  capture_output=True,
                  text=True
              )
              
              issues = json.loads(issues_result.stdout)
              
              # Group by type
              bugs = [i for i in issues if any(l["name"] == "type:bug" for l in i.get("labels", []))]
              features = [i for i in issues if any(l["name"] == "type:feature" for l in i.get("labels", []))]
              chores = [i for i in issues if any(l["name"] == "type:chore" for l in i.get("labels", []))]
              
              if issues:
                  note = f"## {title}\n\n"
                  if features:
                      note += f"### ✨ Features ({len(features)})\n"
                      for i in features:
                          note += f"- #{i['number']}: {i['title']}\n"
                  if bugs:
                      note += f"### 🐛 Bugs ({len(bugs)})\n"
                      for i in bugs:
                          note += f"- #{i['number']}: {i['title']}\n"
                  if chores:
                      note += f"### 🔧 Chores ({len(chores)})\n"
                      for i in chores:
                          note += f"- #{i['number']}: {i['title']}\n"
                  
                  print(note)
          EOF
