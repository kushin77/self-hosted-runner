name: Runner Diagnostic

on:
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose logging'
        required: false
        default: 'true'
  workflow_call: {}

concurrency:
  group: runner-diagnostic-${{ github.ref }}
  cancel-in-progress: false

jobs:
  diagnostic:
    name: Runner Diagnostic
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
            - name: Load resilience helpers
              run: |
                set -euo pipefail
                source .github/scripts/resilience.sh || true
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print GitHub context
        run: |
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "GITHUB_RUN_ID=${GITHUB_RUN_ID}"
          echo "GITHUB_RUN_NUMBER=${GITHUB_RUN_NUMBER}"
          echo "RUNNER_NAME=${RUNNER_NAME:-(unset)}"
          echo "RUNNER_OS=${RUNNER_OS:-(unset)}"
          echo "RUNNER_TEMP=${RUNNER_TEMP:-(unset)}"

      - name: Environment and tools
        run: |
          set -x
          echo "### PATH"
          echo $PATH
          echo "### which gcloud"
          which gcloud || true
          gcloud --version || true
          echo "### which docker"
          which docker || true
          docker --version || true
          echo "### which kubectl"
          which kubectl || true
          kubectl version --client || true

      - name: List repo files and scripts
        run: |
          ls -la
          ls -la scripts || true
          if [ -f scripts/recover-from-nuke.sh ]; then
            echo "--- recover-from-nuke.sh ---"; sed -n '1,200p' scripts/recover-from-nuke.sh || true
          fi
          if [ -f scripts/verify-recovery.sh ]; then
            echo "--- verify-recovery.sh ---"; sed -n '1,200p' scripts/verify-recovery.sh || true
          fi

      - name: Package diagnostic output for MinIO
        run: |
          mkdir -p /tmp/minio-uploads
          tar czf /tmp/minio-uploads/runner-diagnostic-${{ github.run_id }}.tar.gz . || echo "No diagnostics to package"

      - name: Upload diagnostics to MinIO
        if: contains(runner.labels, 'self-hosted')
        run: |
          ci/scripts/upload_to_minio.sh /tmp/minio-uploads/runner-diagnostic-${{ github.run_id }}.tar.gz runner-diagnostic-${{ github.run_id }}.tar.gz || echo "MinIO upload failed; will use fallback"

      - name: Upload diagnostic output (hosted fallback)
        if: '!contains(runner.labels, ''self-hosted'')'
        uses: actions/upload-artifact@v4
        with:
          name: runner-diagnostic-${{ github.run_id }}
          path: .
          retention-days: 7
