name: Automated Issue Lifecycle Management

on:
  schedule:
    - cron: '0 */1 * * *'  # Every hour - continuous tracking
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  issue-lifecycle:
    name: Automated Issue Management
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auto-close resolved blocking issues
        run: |
          # Check if #343 (cluster) is resolved
          if timeout 5 bash -c "echo >/dev/tcp/192.168.168.42/6443" 2>/dev/null; then
            if ! gh issue list --search "#343" --json state -q 2>/dev/null | grep -q "CLOSED"; then
              gh issue close 343 \
                --repo ${{ github.repository }} \
                --comment "✅ RESOLVED: Staging cluster is online and operational.

**Status**: Cluster recovery complete
**Detection**: Automated monitoring (ops-blocker-monitoring.yml)
**Action**: Auto-closing as resolved

Next: Dependent issues (#326, #311) now have resources available."
            fi
          fi

      - name: Auto-close OIDC provisioning issues
        run: |
          if gh secret list 2>/dev/null | grep -q "AWS_OIDC_ROLE_ARN"; then
            for ISSUE_NUM in 1346 1309; do
              if ! gh issue list --search "#$ISSUE_NUM" --json state -q 2>/dev/null | grep -q "CLOSED"; then
                gh issue close $ISSUE_NUM \
                  --repo ${{ github.repository }} \
                  --comment "✅ RESOLVED: AWS OIDC provisioning complete.

**Status**: All required secrets detected and configured
**Detection**: Automated monitoring (ops-blocker-monitoring.yml)
**Action**: terraform-auto-apply will trigger automatically

Next: Phase P4 infrastructure deployment in progress"
              fi
            done
          fi

      - name: Auto-close AWS credential issues
        run: |
          if gh secret list 2>/dev/null | grep -q "AWS_ROLE_TO_ASSUME"; then
            for ISSUE_NUM in 325 313; do
              if ! gh issue list --search "#$ISSUE_NUM" --json state -q 2>/dev/null | grep -q "CLOSED"; then
                gh issue close $ISSUE_NUM \
                  --repo ${{ github.repository }} \
                  --comment "✅ RESOLVED: AWS credentials provisioned.

**Status**: All required AWS secrets detected
**Detection**: Automated monitoring (ops-blocker-monitoring.yml)
**Action**: AWS Spot workflows will auto-enable

Next: Lambda lifecycle handlers deploying"
              fi
            done
          fi

      - name: Update major milestone issues
        run: |
          # Get deployment progress
          CLUSTER_STATUS=$(timeout 5 bash -c "echo >/dev/tcp/192.168.168.42/6443" 2>/dev/null && echo "online" || echo "offline")
          OIDC_STATUS=$(gh secret list 2>/dev/null | grep -q "AWS_OIDC_ROLE_ARN" && echo "ready" || echo "pending")
          AWS_STATUS=$(gh secret list 2>/dev/null | grep -q "AWS_ROLE_TO_ASSUME" && echo "ready" || echo "pending")
          
          BODY="## 📊 Infrastructure Deployment Progress

**Updated**: \`$(date -u +%Y-%m-%dT%H:%M:%SZ)\`

### Current Status
- Cluster: **$CLUSTER_STATUS**
- OIDC: **$OIDC_STATUS**
- AWS Credentials: **$AWS_STATUS**

### Readiness Checklist
- $([ \"$CLUSTER_STATUS\" = \"online\" ] && echo \"✅\" || echo \"⏳\") Staging cluster operational
- $([ \"$OIDC_STATUS\" = \"ready\" ] && echo \"✅\" || echo \"⏳\") AWS OIDC provisioned
- $([ \"$AWS_STATUS\" = \"ready\" ] && echo \"✅\" || echo \"⏳\") AWS credentials available

### Next Actions
$([ \"$CLUSTER_STATUS\" = \"online\" ] && echo \"✅ Cluster ready\" || echo \"⏳ [ACTION] Bring cluster online\")
$([ \"$OIDC_STATUS\" = \"ready\" ] && echo \"✅ OIDC ready\" || echo \"⏳ [ACTION] Provision OIDC\")
$([ \"$AWS_STATUS\" = \"ready\" ] && echo \"✅ AWS ready\" || echo \"⏳ [ACTION] Add AWS credentials\")

---
*Auto-updated via automated-issue-lifecycle.yml*"
          
          gh issue comment 231 \
            --repo ${{ github.repository }} \
            --body "$BODY" || echo "Could not post comment"

      - name: Create deployment milestone if all ready
        if: success()
        run: |
          CLUSTER_READY=$(timeout 5 bash -c "echo >/dev/tcp/192.168.168.42/6443" 2>/dev/null && echo "yes" || echo "no")
          OIDC_READY=$(gh secret list 2>/dev/null | grep -q "AWS_OIDC_ROLE_ARN" && echo "yes" || echo "no")
          AWS_READY=$(gh secret list 2>/dev/null | grep -q "AWS_ROLE_TO_ASSUME" && echo "yes" || echo "no")
          
          if [ "$CLUSTER_READY" = "yes" ] && [ "$OIDC_READY" = "yes" ] && [ "$AWS_READY" = "yes" ]; then
            echo "✅ All Prerequisites Met - Triggering Phase P4 Deployment"

            # Trigger Phase P4 workflow (dispatch)
            gh workflow run phase-p4-terraform-apply-orchestrator.yml --repo ${{ github.repository }} --ref main || echo "⚠ Failed to dispatch Phase P4 workflow"

            gh issue comment 231 \
              --repo ${{ github.repository }} \
              --body "🚀 **DEPLOYMENT READY**

All prerequisites detected:
✅ Cluster online
✅ OIDC provisioned
✅ AWS credentials available

**Phase P4 terraform-auto-apply:** Triggered (workflow dispatch requested)
**Phase P5 Validation:** Will run automatically
**Infrastructure Status:** Preparing for deployment"
          fi
          fi

      - name: Create incident for critical failures
        if: failure()
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "🚨 Automated lifecycle check failed" \
            --label "incident,automation" \
            --body "The automated issue lifecycle management detected a failure.

Check logs in GitHub Actions for details.

See issue #231 for ongoing status." || echo "Incident already exists"
