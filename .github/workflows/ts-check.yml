name: "TypeScript Compliance"

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/tsconfig.json"

jobs:
  type-check:
    name: Run `tsc --noEmit` across repo
    runs-on: [self-hosted, linux, x64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Find and run TypeScript compiler
        run: |
          set -e
          echo "Scanning for tsconfig.json files..."
          find . -name tsconfig.json -not -path "./node_modules/*" | while read cfg; do
            echo "Checking $cfg"
            npx tsc --noEmit -p "$cfg"
          done
