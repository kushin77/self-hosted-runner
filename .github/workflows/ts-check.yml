name: TypeScript Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  portal-typescript:
    name: Portal TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci --prefix ElevatedIQ-Mono-Repo/apps/portal
      - name: Run type check
        run: npm run type-check --prefix ElevatedIQ-Mono-Repo/apps/portal
