name: TypeScript Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  portal-typescript:
    name: Portal TypeScript Check
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    concurrency:
      group: portal-typescript-${{ github.ref || github.run_id }}
      cancel-in-progress: false
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v6
      - name: Install Node (self-hosted)
        if: contains(runner.labels, 'self-hosted')
        run: |
          chmod +x ci/scripts/setup-node.sh
          NODE_VERSION=20 ci/scripts/setup-node.sh
      - name: Use Node.js (hosted fallback)
        if: not(contains(runner.labels, 'self-hosted'))
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci --prefix ElevatedIQ-Mono-Repo/apps/portal
      - name: Run type check
        run: npm run type-check --prefix ElevatedIQ-Mono-Repo/apps/portal
