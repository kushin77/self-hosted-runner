name: TypeScript Type Check

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install portal dependencies
        run: |
          cd ElevatedIQ-Mono-Repo/apps/portal
          npm ci

      - name: Run TypeScript type check
        run: |
          cd ElevatedIQ-Mono-Repo/apps/portal
          npm run type-check
