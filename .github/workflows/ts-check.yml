name: TypeScript Check (self-hosted)

on:
  push:
    paths:
      - 'src/**'
      - 'ElevatedIQ-Mono-Repo/**'
  pull_request:
    paths:
      - 'src/**'
      - 'ElevatedIQ-Mono-Repo/**'
  workflow_dispatch:

jobs:
  ts-check:
    name: TypeScript lint & build
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then npm ci; else npm install --no-audit --prefer-offline; fi

      - name: Run TypeScript & lint
        run: |
          set -euo pipefail
          if [ -f tsconfig.json ]; then npx tsc --noEmit; fi
          if command -v eslint >/dev/null 2>&1; then npx eslint . || true; fi
