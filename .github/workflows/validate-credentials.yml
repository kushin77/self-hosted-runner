name: Validate Credential Providers

on:
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl jq || true

      - name: Run credential validation script
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          bash scripts/cred-setup/validate-credentials.sh

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validate-credentials-logs
          path: scripts/audit/validate-credentials-*.log
          retention-days: 7
