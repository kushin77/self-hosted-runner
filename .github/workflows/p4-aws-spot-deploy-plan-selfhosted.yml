name: "P4 — AWS Spot Runner Plan (Self-hosted)"
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'terraform/examples/aws-spot/**'

jobs:
  terraform-plan:
    name: Terraform Plan (aws-spot) on self-hosted runner
    # This workflow is identical to p4-aws-spot-deploy-plan.yml but targets
    # a self-hosted runner. Use it when GitHub-hosted Actions are unavailable or
    # when you need local AWS credentials. It is intended for manual dispatch.
    runs-on: [self-hosted, linux]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Configure AWS Credentials
        # secrets may be omitted if the runner already has credentials configured
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform/examples/aws-spot
        run: |
          terraform init -input=false

      - name: Terraform Fmt
        working-directory: terraform/examples/aws-spot
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: terraform/examples/aws-spot
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/examples/aws-spot
        run: |
          terraform plan -input=false -out=plan.out || true
          terraform show -no-color plan.out > plan.txt || true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: aws-spot-plan
          path: terraform/examples/aws-spot/plan.out

      - name: Upload plan text
        uses: actions/upload-artifact@v4
        with:
          name: aws-spot-plan-txt
          path: terraform/examples/aws-spot/plan.txt
on:
  workflow_dispatch: {}