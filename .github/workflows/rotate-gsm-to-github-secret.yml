name: Sync GSM Secret to GitHub Secret

on:
  schedule:
    - cron: '0 3 * * 0' # weekly on Sunday at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  sync-secret:
    runs-on: ubuntu-latest
    env:
      SECRET_NAME: slack-webhook
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout (needed for actions that use repo)
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          cleanup_credentials: true

      - name: Setup gcloud
        run: |
          sudo apt-get update
          sudo apt-get install -y google-cloud-sdk jq || true

      - name: Fetch secret from GCP Secret Manager
        id: fetch_gsm
        run: |
          set -euo pipefail
          TMPFILE=$(mktemp)
          echo "Fetching secret '${SECRET_NAME}' from GSM..."
          gcloud secrets versions access latest --secret="${SECRET_NAME}" --project="${{ secrets.GCP_PROJECT_ID }}" > "$TMPFILE" 2>/dev/null || (echo "Failed to fetch GSM secret" >&2; exit 2)
          echo "fetched_file=$TMPFILE" >> $GITHUB_OUTPUT

      - name: Sync to GitHub Actions repo secret
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TMPFILE="$(jq -r .fetched_file < $GITHUB_OUTPUT || true)"
          # fallback if output not present
          if [ -z "$TMPFILE" ]; then
            echo "No fetched file path; attempting default temp path" >&2
            TMPFILE=$(mktemp)
            gcloud secrets versions access latest --secret="${SECRET_NAME}" --project="${{ secrets.GCP_PROJECT_ID }}" > "$TMPFILE"
          fi
          # Use gh to set the repository secret from file
          gh secret set SLACK_WEBHOOK_URL --repo "${REPO}" < "$TMPFILE"
          echo "Updated SLACK_WEBHOOK_URL repo secret from GSM"

      - name: Cleanup
        run: |
          true
