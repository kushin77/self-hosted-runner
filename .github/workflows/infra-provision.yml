---
name: Infra Provision (bootstrap & apply)
permissions:
  contents: read
  id-token: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: bootstrap (use SA key) or apply (use Workload Identity)'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - bootstrap

jobs:
  bootstrap:
    if: "${{ github.event.inputs.mode == 'bootstrap' }}"
    runs-on: [self-hosted, linux]
    env:
      TF_ROOT: ./terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: '466.0.0'

      - name: Authenticate using provided SA key
        if: ${{ secrets.GCP_SA_KEY != '' }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json
          gcloud auth activate-service-account --key-file=$GOOGLE_APPLICATION_CREDENTIALS
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Terraform init & apply (bootstrap)
        working-directory: ${{ env.TF_ROOT }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -var="project_id=${{ secrets.GCP_PROJECT_ID }}"

      - name: 'Optional: create Workload Identity Pool & Provider'
        working-directory: ${{ env.TF_ROOT }}
        run: |
          # Use gcloud to create a Workload Identity Pool and Provider to allow OIDC from GitHub
          PROJECT=${{ secrets.GCP_PROJECT_ID }}
          POOL=github-actions-pool
          PROVIDER=github-actions-provider
          gcloud iam workload-identity-pools create $POOL --project=$PROJECT --location="global" --display-name="GitHub Actions Pool" || true
            MAPPING='google.subject=assertion.sub,attribute.repository=assertion.repository,attribute.actor=assertion.actor'
            gcloud iam workload-identity-pools providers create-oidc $PROVIDER --project=$PROJECT --location="global" --workload-identity-pool=$POOL --issuer-uri="https://token.actions.githubusercontent.com" --attribute-mapping="$MAPPING" || true

  apply:
    if: "${{ github.event.inputs.mode == 'apply' }}"
    runs-on: [self-hosted, linux]
    env:
      TF_ROOT: ./terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate via Workload Identity
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ inputs.workload_identity_provider || secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ inputs.service_account || secrets.WORKLOAD_ID_SA }}

      - name: Configure gcloud for subsequent commands
        run: gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Terraform init & apply
        working-directory: ${{ env.TF_ROOT }}
        run: |
          terraform init -input=false
          terraform apply -auto-approve -var="project_id=${{ secrets.GCP_PROJECT_ID }}"

      - name: Create GitHub issues (idempotent)
        if: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 scripts/manage_github_issues.py create
