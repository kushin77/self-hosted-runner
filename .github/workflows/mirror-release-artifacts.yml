name: Mirror Release Artifacts (optional)

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  mirror:
    name: Mirror release artifacts to external storage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (no-op, used for workspace)
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          set -euo pipefail
          mkdir -p artifacts/release

      - name: Download release assets (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag=${{ github.event.release.tag_name }}
          repo="${{ github.repository }}"
          echo "Downloading release assets for $repo@$tag"
          # Use gh if available, otherwise skip (no failure)
          if command -v gh >/dev/null 2>&1; then
            gh release download "$tag" --repo "$repo" --pattern "*" -D artifacts/release || true
          else
            echo "gh CLI not available; skipping direct download step. artifacts may be attached by other jobs."
          fi

      - name: Mirror to GCS (if configured)
        if: secrets.SBOM_STORAGE_BUCKET != ''
        continue-on-error: true
        env:
          SBOM_STORAGE_BUCKET: ${{ secrets.SBOM_STORAGE_BUCKET }}
        run: |
          echo "Attempting upload to GCS bucket: $SBOM_STORAGE_BUCKET"
          if command -v gsutil >/dev/null 2>&1; then
            gsutil -m cp -r artifacts/release/* "gs://$SBOM_STORAGE_BUCKET/${{ github.run_id }}/" || echo "GCS upload failed"
          else
            echo "gsutil not found; skipping GCS upload"
          fi

      - name: Mirror to S3 (if configured)
        if: secrets.ARTIFACT_STORAGE_S3_BUCKET != ''
        continue-on-error: true
        env:
          ARTIFACT_STORAGE_S3_BUCKET: ${{ secrets.ARTIFACT_STORAGE_S3_BUCKET }}
        run: |
          echo "Attempting upload to S3 bucket: $ARTIFACT_STORAGE_S3_BUCKET"
          if command -v aws >/dev/null 2>&1; then
            aws s3 cp artifacts/release/ "s3://$ARTIFACT_STORAGE_S3_BUCKET/${{ github.run_id }}/" --recursive || echo "S3 upload failed"
          else
            echo "aws CLI not found; skipping S3 upload"
          fi

      - name: Mirror to MinIO (S3-compatible) (if configured)
        if: secrets.MINIO_ENDPOINT != '' && secrets.MINIO_ACCESS_KEY_ID != '' && secrets.MINIO_SECRET_ACCESS_KEY != ''
        continue-on-error: true
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY_ID: ${{ secrets.MINIO_ACCESS_KEY_ID }}
          MINIO_SECRET_ACCESS_KEY: ${{ secrets.MINIO_SECRET_ACCESS_KEY }}
        run: |
          echo "Attempting upload to MinIO at $MINIO_ENDPOINT"
          if command -v mc >/dev/null 2>&1; then
            mc alias set target "$MINIO_ENDPOINT" "$MINIO_ACCESS_KEY_ID" "$MINIO_SECRET_ACCESS_KEY" --api S3v4 || true
            mc cp --recursive artifacts/release/ target/${{ secrets.MINIO_BUCKET || 'artifacts' }}/${{ github.run_id }}/ || echo "MinIO upload failed"
          else
            echo "mc (minio client) not found; skipping MinIO upload"
          fi

      - name: Summary
        run: |
          echo "Mirror job complete. Check logs for any upload attempts."
