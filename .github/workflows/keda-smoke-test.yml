name: KEDA Smoke Test

on:
  workflow_dispatch:
    inputs:
      use_real_cluster:
        description: 'Set to true to run against real cluster using STAGING_KUBECONFIG secret'
        required: false
        default: 'false'

jobs:
  smoke-test:
    name: Run KEDA smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare kubeconfig from secret
        if: ${{ github.event.inputs.use_real_cluster == 'true' }}
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.STAGING_KUBECONFIG }}" ]; then
            echo "STAGING_KUBECONFIG secret not set; aborting" >&2
            exit 1
          fi
          echo "Writing STAGING_KUBECONFIG to ./staging-kubeconfig"
          printf "%s" "${{ secrets.STAGING_KUBECONFIG }}" > ./staging-kubeconfig
          printf "Wrote kubeconfig (first 2 lines):\n" && head -n 2 ./staging-kubeconfig || true
          echo "STAGING_KUBECONFIG=$PWD/staging-kubeconfig" >> $GITHUB_ENV

      - name: Make smoke-test helper executable
        run: |
          chmod +x scripts/ci/run-keda-smoke-test.sh || true

      - name: Run smoke test (mock unless real cluster requested)
        run: |
          if [ "${{ github.event.inputs.use_real_cluster }}" = 'true' ]; then
            ./scripts/ci/run-keda-smoke-test.sh
          else
            echo "Running smoke test in mock mode (no cluster). Review artifacts locally." && exit 0
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keda-smoke-test-logs
          path: /tmp/**
