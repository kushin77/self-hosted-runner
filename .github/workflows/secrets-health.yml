name: Secrets Health Check

on:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC
  workflow_dispatch:
  push:
    branches: [ main ]
  workflow_call: {}

concurrency:
  group: secrets-health-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        uses: actions/github-script@v6
        env:
          RUNNER_MGMT_TOKEN: ${{ secrets.RUNNER_MGMT_TOKEN }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        with:
          script: |
            const missing = [];
            if (!process.env.RUNNER_MGMT_TOKEN) missing.push('RUNNER_MGMT_TOKEN');
            if (!process.env.DEPLOY_SSH_KEY) missing.push('DEPLOY_SSH_KEY');

            if (missing.length === 0) {
              core.info('All required secrets present: RUNNER_MGMT_TOKEN, DEPLOY_SSH_KEY');
              // Dispatch the self-heal workflow to perform remediation now that secrets exist
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'runner-self-heal.yml',
                ref: 'main'
              });

              // Notify existing issues about automatic dispatch
              const notifyTitles = [
                'Action Required: Configure RUNNER_MGMT_TOKEN secret for Automated Runner Self-Heal',
                'Action Required: Add DEPLOY_SSH_KEY secret for automated self-heal',
                'Bring self-hosted runners online and add self-healing'
              ];
              // Find open issues so we can post notifications
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
              });

              for (const t of notifyTitles) {
                const issue = issues.data.find(i => i.title && i.title.includes(t));
                if (issue) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: `Automation note: required secrets are present. Dispatched runner-self-heal workflow to attempt remediation. I will post results when available.`
                  });
                }
              }

              return;
            }

            const title = `Automated: Missing secrets for self-heal: ${missing.join(', ')}`;
            const body = `The repository is missing the following secrets required for automated runner self-heal and CI image pushes:\n\n- ${missing.join('\n- ')}\n\nSee docs/SECRETS.md for guidance. This workflow will re-check daily and on demand.`;

            // Find existing open issue with same title
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            const exists = issues.data.find(i => i.title === title);
            if (exists) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: exists.number,
                body: `Reminder: missing secrets detected again: ${missing.join(', ')}. This check runs daily and on demand.`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['automation','ops','runners']
              });
            }
