name: Self-Heal Retry

on:
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes
  workflow_dispatch:
  workflow_call: {}

concurrency:
  group: self-heal-retry-${{ github.ref }}
  cancel-in-progress: false

jobs:
  retry-dispatch:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load resilience helpers
        run: |
          set -euo pipefail
          source .github/scripts/resilience.sh || true

      - name: Check for required secrets and dispatch self-heal
        uses: actions/github-script@v6
        env:
          RUNNER_MGMT_TOKEN: ${{ secrets.RUNNER_MGMT_TOKEN }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        with:
          script: |
            const missing = [];
            if (!process.env.RUNNER_MGMT_TOKEN) missing.push('RUNNER_MGMT_TOKEN');
            if (!process.env.DEPLOY_SSH_KEY) missing.push('DEPLOY_SSH_KEY');

            if (missing.length === 0) {
              core.info('Secrets present — dispatching runner-self-heal workflow');
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'runner-self-heal.yml',
                ref: 'main'
              });
              return;
            }

            core.info(`Secrets missing: ${missing.join(', ')} — will retry next scheduled run.`);
