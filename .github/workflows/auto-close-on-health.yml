name: Auto-close deployment issues on health-check success

on:
  workflow_run:
    workflows: ["secrets-health-multi-layer.yml"]
    types: [completed]

jobs:
  close-if-success:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      checks: read
    steps:
      - name: Close deployment & incident issues
        uses: actions/github-script@v6
        with:
          script: |
            const issuesToClose = [1688, 1691, 1703];
            for (const num of issuesToClose) {
              await github.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                body: 'Automated: The multi-layer health-check completed successfully. Closing this issue as deployment has been validated.'
              });
              await github.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                state: 'closed'
              });
            }
