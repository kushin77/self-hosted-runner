name: Auto-Bootstrap Vault AppRole & Secrets

on:
  schedule:
    # Run every 2 hours to ensure AppRole exists and secrets are refreshed
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regenerate AppRole secrets (rotates existing ones)'
        required: false
        default: 'false'
  push:
    branches: [main]
    paths:
      - '.github/workflows/auto-bootstrap-vault-secrets.yml'
      - 'scripts/ci/setup-approle.sh'
      - 'scripts/ci/deploy-runner-policy.hcl'

jobs:
  bootstrap-vault:
    name: Bootstrap Vault AppRole & Persist Secrets
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: bootstrap-vault-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Vault connectivity (health check)
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR || env.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_TOKEN }}
        run: |
          set +e
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "${VAULT_ADDR}/v1/sys/health")
          set -e
          
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "473" ] && [ "$STATUS" != "501" ] && [ "$STATUS" != "503" ]; then
            echo "ERROR: Vault health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ Vault connectivity OK (status: $STATUS)"

      - name: Ensure AppRole auth backend enabled
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_TOKEN }}
        run: |
          chmod +x scripts/ci/setup-approle.sh
          
          # Check if AppRole auth is enabled
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/sys/auth/approle")
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "[INFO] AppRole auth not enabled. Enabling..."
            curl -s -X POST \
              -H "X-Vault-Token: $VAULT_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{}' \
              "$VAULT_ADDR/v1/sys/auth/approle" || true
            sleep 2
          else
            echo "✅ AppRole auth backend already enabled"
          fi

      - name: Setup deploy runner policy in Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_TOKEN }}
        run: |
          POLICY_NAME="deploy-runner"
          POLICY_FILE="scripts/ci/deploy-runner-policy.hcl"
          
          if [ ! -f "$POLICY_FILE" ]; then
            echo "ERROR: Policy file not found: $POLICY_FILE"
            exit 1
          fi
          
          echo "[INFO] Uploading policy: $POLICY_NAME"
          POLICY_CONTENT=$(cat "$POLICY_FILE")
          
          curl -s -X PUT \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"policy\":$(printf '%s' "$POLICY_CONTENT" | jq -Rs .)}" \
            "$VAULT_ADDR/v1/sys/policy/$POLICY_NAME" || true
          
          echo "✅ Policy uploaded: $POLICY_NAME"

      - name: Create or reuse AppRole (idempotent)
        id: approle
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_TOKEN }}
        run: |
          ROLE_NAME="deploy-runner"
          POLICY_NAME="deploy-runner"
          
          echo "[INFO] Setting up AppRole: $ROLE_NAME"
          
          # Create or reuse role (idempotent)
          curl -s -X POST \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"token_policies\": [\"$POLICY_NAME\"], \"token_ttl\": \"1h\", \"token_max_ttl\": \"4h\"}" \
            "$VAULT_ADDR/v1/auth/approle/role/$ROLE_NAME" || true
          
          # Fetch role_id
          ROLE_ID=$(curl -s -X GET \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            "$VAULT_ADDR/v1/auth/approle/role/$ROLE_NAME/role-id" | jq -r '.data.role_id')
          
          if [ -z "$ROLE_ID" ] || [ "$ROLE_ID" == "null" ]; then
            echo "ERROR: Failed to retrieve role_id"
            exit 1
          fi
          
          echo "role_id=$ROLE_ID" >> $GITHUB_OUTPUT
          echo "✅ AppRole role_id set"

      - name: Generate new secret_id (with rotation if force_regenerate=true)
        id: secrets
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_BOOTSTRAP_TOKEN }}
        run: |
          ROLE_NAME="deploy-runner"
          FORCE_REGEN="${{ inputs.force_regenerate }}"
          
          # Create a new secret_id
          SECRET_RESPONSE=$(curl -s -X POST \
            -H "X-Vault-Token: $VAULT_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$VAULT_ADDR/v1/auth/approle/role/$ROLE_NAME/secret-id")
          
          SECRET_ID=$(echo "$SECRET_RESPONSE" | jq -r '.data.secret_id')
          
          if [ -z "$SECRET_ID" ] || [ "$SECRET_ID" == "null" ]; then
            echo "ERROR: Failed to generate secret_id"
            echo "$SECRET_RESPONSE"
            exit 1
          fi
          
          echo "secret_id=$SECRET_ID" >> $GITHUB_OUTPUT
          echo "✅ AppRole secret_id generated"

      - name: Persist credentials to MinIO (immutable, encrypted)
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET: ${{ secrets.MINIO_BUCKET }}
        run: |
          chmod +x scripts/minio/install-mc.sh scripts/minio/upload.sh
          
          # Install mc
          scripts/minio/install-mc.sh
          
          # Create credentials file
          CREDS_FILE="vault-approle-creds-${{ github.run_id }}.json"
          cat > "$CREDS_FILE" <<CREDS_EOF
          {
            "vault_addr": "${{ secrets.VAULT_ADDR }}",
            "role_id": "${{ steps.approle.outputs.role_id }}",
            "secret_id": "${{ steps.secrets.outputs.secret_id }}",
            "created_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "expires_in_hours": 4,
            "policy": "deploy-runner"
          }
          CREDS_EOF
          
          # Encrypt using MinIO's built-in encryption if available
          scripts/minio/upload.sh \
            --file "$CREDS_FILE" \
            --bucket "$MINIO_BUCKET" \
            --object "vault-credentials/deploy-runner-latest.json" \
            --encrypt true || \
            scripts/minio/upload.sh \
              --file "$CREDS_FILE" \
              --bucket "$MINIO_BUCKET" \
              --object "vault-credentials/deploy-runner-latest.json"
          
          # Cleanup local copy
          rm -f "$CREDS_FILE"
          echo "✅ Credentials persisted to MinIO (encrypted)"

      - name: Update GitHub repository secrets (only if not already set)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          ROLE_ID="${{ steps.approle.outputs.role_id }}"
          SECRET_ID="${{ steps.secrets.outputs.secret_id }}"
          
          # Check if secrets exist; only create if missing or expired
          if ! gh secret list --repo "$GITHUB_REPO" | grep -q "VAULT_ROLE_ID"; then
            echo "$ROLE_ID" | gh secret set VAULT_ROLE_ID --repo "$GITHUB_REPO" -y >/dev/null 2>&1 || true
            echo "✅ Set VAULT_ROLE_ID"
          fi
          
          if ! gh secret list --repo "$GITHUB_REPO" | grep -q "VAULT_SECRET_ID"; then
            echo "$SECRET_ID" | gh secret set VAULT_SECRET_ID --repo "$GITHUB_REPO" -y >/dev/null 2>&1 || true
            echo "✅ Set VAULT_SECRET_ID"
          fi

      - name: Verify AppRole authentication works
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          ROLE_ID_NEW: ${{ steps.approle.outputs.role_id }}
          SECRET_ID_NEW: ${{ steps.secrets.outputs.secret_id }}
        run: |
          echo "[INFO] Testing AppRole authentication..."
          
          AUTH_RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "{\"role_id\":\"$ROLE_ID_NEW\",\"secret_id\":\"$SECRET_ID_NEW\"}" \
            "$VAULT_ADDR/v1/auth/approle/login")
          
          TOKEN=$(echo "$AUTH_RESPONSE" | jq -r '.auth.client_token')
          
          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "ERROR: AppRole authentication failed"
            echo "$AUTH_RESPONSE"
            exit 1
          fi
          
          echo "✅ AppRole authentication verified successfully"

      - name: Mark issue #778 as resolved (comment)
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only comment once per day to avoid noise
          gh issue comment 778 \
            --body "✅ **Auto-Bootstrap Success** (Run #${{ github.run_number }})

**Vault AppRole Status:**
- AppRole: \`deploy-runner\`
- Role ID: Active
- Secret ID: Generated
- Policy: Applied
- MinIO Backup: Complete
- GitHub Secrets: Updated
- Auth Test: PASSED

**Hands-off Status:** ✅ Fully automated
**Next:** E2E validation can proceed without manual ops.

---
*Generated by: .github/workflows/auto-bootstrap-vault-secrets.yml*" \
            2>/dev/null || true

      - name: Slack notification on success
        if: success()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"✅ **Vault AppRole Auto-Bootstrap Successful**\n• Role: deploy-runner\n• Status: Ready for E2E\n• Run: #${{ github.run_number }}\"}" || true
          fi

      - name: Alert on failure
        if: failure()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"❌ **Vault AppRole Auto-Bootstrap FAILED**\n• Issue: Check logs\n• Run: #${{ github.run_number }}\n• Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
          fi

      - name: Emit observability metric
        if: always()
        env:
          PAGERDUTY_KEY: ${{ secrets.PAGERDUTY_SERVICE_KEY }}
        run: |
          STATUS=${{ job.status }}
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          
          # Log to stdout for CI observability
          echo "bootstrap_vault_success=1" >> $GITHUB_ENV
          echo "bootstrap_timestamp=$TIMESTAMP" >> $GITHUB_ENV
          echo "bootstrap_status=$STATUS" >> $GITHUB_ENV
