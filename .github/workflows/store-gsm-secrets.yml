name: Store AWS Credentials in GCP Secret Manager
permissions:
  contents: read
  id-token: write
  actions: read

on:
  workflow_dispatch:
    inputs:
      gcp_project_id:
        description: 'GCP Project ID'
        required: 'true'
        default: 'gcp-eiq'
      aws_access_key_id:
        description: 'AWS Access Key ID (can also use OIDC role ARN)'
        required: 'false'
      aws_secret_access_key:
        description: 'AWS Secret Access Key (leave empty for OIDC-only)'
        required: 'false'
      aws_oidc_role_arn:
        description: 'AWS OIDC Role ARN (for credentialless auth; preferred)'
        required: 'false'
      sbom_storage_bucket:
        description: 'GCS bucket for SBOM storage (optional)'
        required: 'false'
      artifact_storage_s3_bucket:
        description: 'AWS S3 bucket for artifact mirroring (optional)'
        required: 'false'
      minio_endpoint:
        description: 'MinIO endpoint URL (optional)'
        required: 'false'
      minio_access_key_id:
        description: 'MinIO access key ID (optional)'
        required: 'false'
      minio_secret_access_key:
        description: 'MinIO secret access key (optional)'
        required: 'false'
      registry_host:
        description: 'Container registry host (e.g. ghcr.io)'
        required: 'false'
      registry_username:
        description: 'Registry username (optional, for auth)'
        required: 'false'
      registry_password:
        description: 'Registry password (optional)'
        required: 'false'
      dry_run:
        description: 'If true, only validate without creating secrets'
        required: 'false'
        default: 'false'

permissions:
  contents: read
  id-token: write

jobs:
  store-gsm-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.cred_gcp_workload_identity_provider.outputs.credential }}
          service_account: ${{ steps.cred_gcp_service_account.outputs.credential }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Store AWS credentials in GSM
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          AWS_ACCESS_KEY_ID: ${{ github.event.inputs.aws_access_key_id }}
          AWS_SECRET_ACCESS_KEY: ${{ github.event.inputs.aws_secret_access_key }}
          AWS_OIDC_ROLE_ARN: ${{ github.event.inputs.aws_oidc_role_arn }}
          SBOM_STORAGE_BUCKET: ${{ github.event.inputs.sbom_storage_bucket }}
          ARTIFACT_STORAGE_S3_BUCKET: ${{ github.event.inputs.artifact_storage_s3_bucket }}
          MINIO_ENDPOINT: ${{ github.event.inputs.minio_endpoint }}
          MINIO_ACCESS_KEY_ID: ${{ github.event.inputs.minio_access_key_id }}
          MINIO_SECRET_ACCESS_KEY: ${{ github.event.inputs.minio_secret_access_key }}
          REGISTRY_HOST: ${{ github.event.inputs.registry_host }}
          REGISTRY_USERNAME: ${{ github.event.inputs.registry_username }}
          REGISTRY_PASSWORD: ${{ github.event.inputs.registry_password }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
      - name: Get Credential [GCP_SERVICE_ACCOUNT]
        id: cred_gcp_service_account
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_SERVICE_ACCOUNT
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true
      - name: Get Credential [GCP_WORKLOAD_IDENTITY_PROVIDER]
        id: cred_gcp_workload_identity_provider
        uses: kushin77/get-ephemeral-credential@v1
        with:
          credential-name: GCP_WORKLOAD_IDENTITY_PROVIDER
          retrieve-from: 'auto'
          cache-ttl: 600
          audit-log: true

        run: |
          set -euo pipefail

          echo "=== GCP Secret Manager Bootstrap ==="
          echo "Project: $GCP_PROJECT_ID"
          echo "Dry-run: $DRY_RUN"

          # Enable Secret Manager API
          gcloud services enable secretmanager.googleapis.com --project="$GCP_PROJECT_ID"

          # Store AWS credentials
          if [-n "$AWS_ACCESS_KEY_ID"]; then
            echo "Storing aws-access-key-id..."
            if ["$DRY_RUN" = "false"]; then
              echo -n "$AWS_ACCESS_KEY_ID" | gcloud secrets create aws-access-key-id \
                --data-file=- --project="$GCP_PROJECT_ID" --replication-policy="automatic" || \
              echo -n "$AWS_ACCESS_KEY_ID" | gcloud secrets versions add aws-access-key-id \
                --data-file=- --project="$GCP_PROJECT_ID"
            fi
            echo "✓ aws-access-key-id"
          fi

          if [-n "$AWS_SECRET_ACCESS_KEY"]; then
            echo "Storing aws-secret-access-key..."
            if ["$DRY_RUN" = "false"]; then
              echo -n "$AWS_SECRET_ACCESS_KEY" | gcloud secrets create aws-secret-access-key \
                --data-file=- --project="$GCP_PROJECT_ID" --replication-policy="automatic" || \
              echo -n "$AWS_SECRET_ACCESS_KEY" | gcloud secrets versions add aws-secret-access-key \
                --data-file=- --project="$GCP_PROJECT_ID"
            fi
            echo "✓ aws-secret-access-key"
          fi

          if [-n "$AWS_OIDC_ROLE_ARN"]; then
            echo "Storing aws-oidc-role-arn..."
            if ["$DRY_RUN" = "false"]; then
              echo -n "$AWS_OIDC_ROLE_ARN" | gcloud secrets create aws-oidc-role-arn \
                --data-file=- --project="$GCP_PROJECT_ID" --replication-policy="automatic" || \
              echo -n "$AWS_OIDC_ROLE_ARN" | gcloud secrets versions add aws-oidc-role-arn \
                --data-file=- --project="$GCP_PROJECT_ID"
            fi
            echo "✓ aws-oidc-role-arn"
          fi

          if [-n "$SBOM_STORAGE_BUCKET"]; then
            echo "Storing sbom-storage-bucket..."
            if ["$DRY_RUN" = "false"]; then
              echo -n "$SBOM_STORAGE_BUCKET" | gcloud secrets create sbom-storage-bucket \
                --data-file=- --project="$GCP_PROJECT_ID" --replication-policy="automatic" || \
              echo -n "$SBOM_STORAGE_BUCKET" | gcloud secrets versions add sbom-storage-bucket \
                --data-file=- --project="$GCP_PROJECT_ID"
            fi
            echo "✓ sbom-storage-bucket"
          fi

          if [-n "$ARTIFACT_STORAGE_S3_BUCKET"]; then
            echo "Storing artifact-storage-s3-bucket..."
            if ["$DRY_RUN" = "false"]; then
              echo -n "$ARTIFACT_STORAGE_S3_BUCKET" | gcloud secrets create artifact-storage-s3-bucket \
                --data-file=- --project="$GCP_PROJECT_ID" --replication-policy="automatic" || \
              echo -n "$ARTIFACT_STORAGE_S3_BUCKET" | gcloud secrets versions add artifact-storage-s3-bucket \
                --data-file=- --project="$GCP_PROJECT_ID"
            fi
            echo "✓ artifact-storage-s3-bucket"
          fi

          if [-n "$MINIO_ENDPOINT"]; then
            echo "Storing minio-endpoint..."
            if ["$DRY_RUN" = "false"]; then
              echo -n "$MINIO_ENDPOINT" | gcloud secrets create minio-endpoint \
                --data-file=- --project="$GCP_PROJECT_ID" --replication-policy="automatic" || \
              echo -n "$MINIO_ENDPOINT" | gcloud secrets versions add minio-endpoint \
                --data-file=- --project="$GCP_PROJECT_ID"
            fi
            echo "✓ minio-endpoint"
          fi

          if [-n "$MINIO_ACCESS_KEY_ID"]; then
            echo "Storing minio-access-key-id..."
            if ["$DRY_RUN" = "false"]; then
              echo -n "$MINIO_ACCESS_KEY_ID" | gcloud secrets create minio-access-key-id \
                --data-file=- --project="$GCP_PROJECT_ID" --replication-policy="automatic" || \
              echo -n "$MINIO_ACCESS_KEY_ID" | gcloud secrets versions add minio-access-key-id \
                --data-file=- --project="$GCP_PROJECT_ID"
            fi
            echo "✓ minio-access-key-id"
          fi

          if [-n "$MINIO_SECRET_ACCESS_KEY"]; then
            echo "Storing minio-secret-access-key..."
            if ["$DRY_RUN" = "false"]; then
              echo -n "$MINIO_SECRET_ACCESS_KEY" | gcloud secrets create minio-secret-access-key \
                --data-file=- --project="$GCP_PROJECT_ID" --replication-policy="automatic" || \
              echo -n "$MINIO_SECRET_ACCESS_KEY" | gcloud secrets versions add minio-secret-access-key \
                --data-file=- --project="$GCP_PROJECT_ID"
            fi
            echo "✓ minio-secret-access-key"
          fi

          # Registry credentials (for GHCR or other container registries)
          if [-n "$REGISTRY_HOST"]; then
            echo "Storing registry-host..."
            if ["$DRY_RUN" = "false"]; then
              echo -n "$REGISTRY_HOST" | gcloud secrets create registry-host \
                --data-file=- --project="$GCP_PROJECT_ID" --replication-policy="automatic" || \
              echo -n "$REGISTRY_HOST" | gcloud secrets versions add registry-host \
                --data-file=- --project="$GCP_PROJECT_ID"
            fi
            echo "✓ registry-host"
          fi

          if [-n "$REGISTRY_USERNAME"]; then
            echo "Storing registry-username..."
            if ["$DRY_RUN" = "false"]; then
              echo -n "$REGISTRY_USERNAME" | gcloud secrets create registry-username \
                --data-file=- --project="$GCP_PROJECT_ID" --replication-policy="automatic" || \
              echo -n "$REGISTRY_USERNAME" | gcloud secrets versions add registry-username \
                --data-file=- --project="$GCP_PROJECT_ID"
            fi
            echo "✓ registry-username"
          fi

          if [-n "$REGISTRY_PASSWORD"]; then
            echo "Storing registry-password..."
            if ["$DRY_RUN" = "false"]; then
              echo -n "$REGISTRY_PASSWORD" | gcloud secrets create registry-password \
                --data-file=- --project="$GCP_PROJECT_ID" --replication-policy="automatic" || \
              echo -n "$REGISTRY_PASSWORD" | gcloud secrets versions add registry-password \
                --data-file=- --project="$GCP_PROJECT_ID"
            fi
            echo "✓ registry-password"
          fi

          echo "=== Secrets stored in GSM successfully ==="
          echo "Next steps:"
          echo "1. Run 'Fetch Secrets from GCP Secret Manager' workflow to sync to repo"
          echo "2. Add label 'oidc-ready' to Issue #1309 to trigger automation"

      - name: Post completion to issue
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          gh issue comment 1328 \
            --body "✓ AWS credentials stored in GCP Secret Manager (project: ${{ github.event.inputs.gcp_project_id }}). Run 'Fetch Secrets from GCP Secret Manager' workflow next to sync to repo." \
            --repo "${{ github.repository }}" || true
