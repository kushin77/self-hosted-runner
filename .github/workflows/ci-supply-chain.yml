name: CI - Supply Chain SBOM & Signature Verification

on:
  push:
    branches: [ main ]
  release:
    types: [created]
  workflow_dispatch: {}

jobs:
  sbom-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate manifest
        run: |
          ./scripts/airgap/generate_image_manifest.sh > /tmp/airgap-manifest.yml
          cat /tmp/airgap-manifest.yml

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate SBOMs
        run: |
          ./scripts/supplychain/generate_sbom.sh /tmp/airgap-manifest.yml build/sboms

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: build/sboms/

      - name: Verify cosign signatures (optional)
        if: ${{ secrets.COSIGN_PUB_KEY != '' }}
        env:
          COSIGN_PUB_KEY: ${{ secrets.COSIGN_PUB_KEY }}
        run: |
          echo "$COSIGN_PUB_KEY" | base64 -d > /tmp/cosign.pub
          chmod 644 /tmp/cosign.pub
          ./scripts/airgap/verify_signatures_cosign.sh /tmp/airgap-manifest.yml /tmp/cosign.pub
