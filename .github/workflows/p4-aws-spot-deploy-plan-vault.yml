name: "P4 — AWS Spot Runner Plan (Vault)"

on:
  workflow_dispatch: {}
  push:
    paths:
      - 'terraform/examples/aws-spot/**'

jobs:
  terraform-plan:
    name: Terraform Plan (aws-spot) via Vault
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Fetch AWS creds from Vault
        if: ${{ secrets.VAULT_ADDR && secrets.VAULT_GITHUB_TOKEN }}
        uses: hashicorp/vault-action@v2
        id: vault
        with:
          url: ${{ secrets.VAULT_ADDR }}
          method: github
          role: "ci-runner-role"
          secret: "secret/data/aws/ci"
        env:
          VAULT_TOKEN: ${{ secrets.VAULT_GITHUB_TOKEN }}

      - name: Export AWS creds from Vault
        if: steps.vault.outputs.aws_access_key_id
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ steps.vault.outputs.aws_access_key_id }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ steps.vault.outputs.aws_secret_access_key }}" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=${{ steps.vault.outputs.aws_session_token }}" >> $GITHUB_ENV

      - name: Configure AWS Credentials (fallback to repo secrets)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform/examples/aws-spot
        run: |
          terraform init -input=false

      - name: Terraform Fmt
        working-directory: terraform/examples/aws-spot
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: terraform/examples/aws-spot
        run: terraform validate

      - name: Terraform Plan
        working-directory: terraform/examples/aws-spot
        run: |
          terraform plan -input=false -out=plan.out || true
          terraform show -no-color plan.out > plan.txt || true

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: aws-spot-plan
          path: terraform/examples/aws-spot/plan.out

      - name: Upload plan text
        uses: actions/upload-artifact@v4
        with:
          name: aws-spot-plan-txt
          path: terraform/examples/aws-spot/plan.txt
