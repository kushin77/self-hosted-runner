name: Notify on Failure

on:
  workflow_run:
    workflows: ["Sync Slack Secret and Deploy Alertmanager"]
    types: [completed]

jobs:
  notify:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Post Slack notification (if webhook available)
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n --arg repo "${{ github.repository }}" --arg run_url "${{ github.event.workflow_run.html_url }}" --arg conclusion "${{ github.event.workflow_run.conclusion }}" '{text: ("Workflow failed: " + $repo + "\n" + $run_url + "\nConclusion: " + $conclusion)}')
          curl -sS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "${{ secrets.SLACK_WEBHOOK_URL }}" || true

      - name: Comment tracking issue (#1192)
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = 1192;
            const body = `Automated alert: workflow "+context.payload.workflow_run.name+" failed. Run: ${context.payload.workflow_run.html_url}`;
            await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber, body});

      - name: Create P1 issue for urgent attention
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[P1] Automation failure: ${context.payload.workflow_run.name} - ${context.payload.workflow_run.html_url}`;
            const body = `Automated failure on run ${context.payload.workflow_run.html_url}\n\nSee tracking issue #1192 for context.`;
            await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['priority/critical','automation/alertmanager']});
