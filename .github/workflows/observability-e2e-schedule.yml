name: Observability E2E Scheduled Run

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scheduled-e2e:
    name: Scheduled Observability E2E (real receivers)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        id: prep
        run: |
          set -euo pipefail
          echo "Running scheduled Observability E2E"

      - name: Check and run Slack test
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -n "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK secret present - running Slack E2E"
            SLACK_FILE=$(mktemp)
            echo -n "$SLACK_WEBHOOK_URL" > "$SLACK_FILE"
            SLACK_URL=$(cat "$SLACK_FILE")
            rm "$SLACK_FILE"
            cd scripts/automation/pmo/prometheus
            chmod +x run_e2e_ephemeral_test.sh
            ./run_e2e_ephemeral_test.sh --slack-url "$SLACK_URL"
          else
            echo "SLACK_WEBHOOK_URL not set - skipping Slack test"
          fi

      - name: Upload metrics artifact (guaranteed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observability-e2e-metrics
          path: |
            workflow_artifacts/metrics.json
            **/workflow_artifacts/metrics.json
            /tmp/observability-e2e.*/metrics.json
          
      - name: Check and run PagerDuty test
        env:
          PAGERDUTY_SERVICE_KEY: ${{ secrets.PAGERDUTY_SERVICE_KEY }}
          PAGERDUTY_API_TOKEN: ${{ secrets.PAGERDUTY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${PAGERDUTY_SERVICE_KEY:-}" ]; then
            echo "PagerDuty secret present - running PagerDuty E2E"
            PD_FILE=$(mktemp)
            echo -n "$PAGERDUTY_SERVICE_KEY" > "$PD_FILE"
            PD_KEY=$(cat "$PD_FILE")
            rm "$PD_FILE"
            # read PagerDuty API token if present
            if [ -n "${PAGERDUTY_API_TOKEN:-}" ]; then
              PD_API_FILE=$(mktemp)
              echo -n "$PAGERDUTY_API_TOKEN" > "$PD_API_FILE"
              PD_API_KEY=$(cat "$PD_API_FILE")
              rm "$PD_API_FILE"
              export PAGERDUTY_API_TOKEN="$PD_API_KEY"
            fi
            cd scripts/automation/pmo/prometheus
            chmod +x run_e2e_ephemeral_test.sh
            PAGERDUTY_SERVICE_KEY="$PD_KEY" ./run_e2e_ephemeral_test.sh --pagerduty-key "$PD_KEY"
          else
            echo "PAGERDUTY_SERVICE_KEY not set - skipping PagerDuty test"
          fi
      

      - name: Stage metrics for upload (ensure path exists)
        if: always()
        run: |
          set -euo pipefail
          echo "Staging metrics into repository-root workflow_artifacts for reliable upload"
          if [ -n "${GITHUB_WORKSPACE:-}" ] && [ -f "$GITHUB_WORKSPACE/workflow_artifacts/metrics.json" ]; then
            mkdir -p workflow_artifacts
            cp "$GITHUB_WORKSPACE/workflow_artifacts/metrics.json" workflow_artifacts/metrics.json || true
            echo "Staged metrics into $(pwd)/workflow_artifacts/metrics.json"
          else
            echo "No workspace-staged metrics file found to stage"
          fi

      - name: Collect metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: observability-e2e-metrics
          path: |
            **/workflow_artifacts/metrics.json
            /tmp/observability-e2e.*/metrics.json

      - name: Summary
        if: always()
        run: |
          echo "Scheduled Observability E2E run complete. Artifacts: observability-e2e-metrics"
      
      - name: "Debug: list workspace for metrics"
        if: always()
        run: |
          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Listing workflow_artifacts (root)"
          ls -la "$GITHUB_WORKSPACE" | sed -n '1,120p' || true
          echo "Searching for metrics.json files (root..4)"
          find "$GITHUB_WORKSPACE" -maxdepth 4 -type f -name metrics.json -print || true
