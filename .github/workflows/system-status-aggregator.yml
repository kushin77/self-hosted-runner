name: System Status Aggregator

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  actions: read

jobs:
  aggregate-status:
    name: Aggregate and report system status
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect workflow statuses
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"

          # Function to get latest run status for a workflow
          get_status() {
            local wf=$1
            gh run list --repo ${REPO} --workflow "$wf" --limit 1 --json status,conclusion,createdAt --jq '.[0] | "\(.status)|\(.conclusion)|\(.createdAt)"' 2>/dev/null || echo "unknown|unknown|unknown"
          }

          # Check key workflows
          DR_SMOKE=$(get_status "dr-smoke-test.yml")
          DR_WEEKLY=$(get_status "docker-hub-weekly-dr-testing.yml")
          SELF_HEAL=$(get_status "self-healing-orchestrator.yml")
          MONITOR=$(get_status "monitor-ingestion.yml")
          REMINDER=$(get_status "operator-gcp-reminder.yml")

          echo "dr_smoke=$DR_SMOKE" >> $GITHUB_OUTPUT
          echo "dr_weekly=$DR_WEEKLY" >> $GITHUB_OUTPUT
          echo "self_heal=$SELF_HEAL" >> $GITHUB_OUTPUT
          echo "monitor=$MONITOR" >> $GITHUB_OUTPUT
          echo "reminder=$REMINDER" >> $GITHUB_OUTPUT

      - name: Check critical issue status
        id: issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"

          # Count open critical issues
          CRITICAL=$(gh issue list --repo ${REPO} --label "disaster-recovery,critical" --state open --json number --jq '.[].number' 2>/dev/null | wc -l)
          AUTO_INVEST=$(gh issue list --repo ${REPO} --label "auto-investigation" --state open --json number --jq '.[].number' 2>/dev/null | wc -l)
          ESCALATION=$(gh issue list --repo ${REPO} --label "auto-escalation" --state open --json number --jq '.[].number' 2>/dev/null | wc -l)

          echo "critical_open=$CRITICAL" >> $GITHUB_OUTPUT
          echo "auto_investigations=$AUTO_INVEST" >> $GITHUB_OUTPUT
          echo "escalations=$ESCALATION" >> $GITHUB_OUTPUT

      - name: Generate status report
        id: report
        run: |
          set -euo pipefail

          REPORT=$(cat << 'EOF'
          ## đź“Š System Status Aggregator â€” $(date -u +'%Y-%m-%d %H:%M:%SZ')

          ### đź”„ Workflow Status

          | Workflow | Status | Conclusion | Last Run |
          |----------|--------|------------|----------|
          EOF
          )

          # Parse and add statuses
          IFS='|' read -r STATUS CONCL CREATED <<< "${{ steps.collect.outputs.dr_smoke }}"
          REPORT+="
          | DR Smoke Test | $STATUS | $CONCL | $(echo $CREATED | sed 's/T.*//' || echo 'â€”') |"

          IFS='|' read -r STATUS CONCL CREATED <<< "${{ steps.collect.outputs.dr_weekly }}"
          REPORT+="
          | Weekly DR Test | $STATUS | $CONCL | $(echo $CREATED | sed 's/T.*//' || echo 'â€”') |"

          IFS='|' read -r STATUS CONCL CREATED <<< "${{ steps.collect.outputs.self_heal }}"
          REPORT+="
          | Self-Healing | $STATUS | $CONCL | $(echo $CREATED | sed 's/T.*//' || echo 'â€”') |"

          IFS='|' read -r STATUS CONCL CREATED <<< "${{ steps.collect.outputs.monitor }}"
          REPORT+="
          | Ingestion Monitor | $STATUS | $CONCL | $(echo $CREATED | sed 's/T.*//' || echo 'â€”') |"

          IFS='|' read -r STATUS CONCL CREATED <<< "${{ steps.collect.outputs.reminder }}"
          REPORT+="
          | Daily Reminder | $STATUS | $CONCL | $(echo $CREATED | sed 's/T.*//' || echo 'â€”') |"

          REPORT+="

          ### đź“‹ Issue Summary

          - Critical Issues: **${{ steps.issues.outputs.critical_open }}**
          - Auto Investigations: **${{ steps.issues.outputs.auto_investigations }}**
          - Escalations: **${{ steps.issues.outputs.escalations }}**

          ### âš™ď¸Ź Key Metrics

          - **Monitoring**: Every 5 minutes (ingestion-trigger, monitor-ingestion, self-healing-orchestrator)
          - **Remediation**: Every 30 minutes (dr-reconciliation-auto-remediate)
          - **Reminders**: Daily 09:00 UTC (operator-gcp-reminder)
          - **Status Aggregation**: Every 15 minutes (this workflow)

          ### đźŽŻ Current State

          - **Automation Status**: âś… ACTIVE
          - **Ingestion Gate**: âŹł Awaiting operator comment on Issue #1239
          - **GCP Key**: đź”’ Awaiting configuration
          - **Escalation Secrets**: đź”’ Awaiting configuration (Issue #1322)
          - **Auto-Recovery**: âś… Armed and monitoring
          - **Self-Healing**: âś… Armed and monitoring

          _Report auto-generated by System Status Aggregator (schedule: */15 min)_
          "

          echo "report<<EOF" >> $GITHUB_ENV
          echo "$REPORT" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Post status to tracking issue
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          TRACKING_ISSUE=1064

          # Post or update status (idempotent via comment edit)
          EXISTING=$(gh api "/repos/${REPO}/issues/${TRACKING_ISSUE}/comments" --jq ".[] | select(.body | contains(\"System Status Aggregator\")) | .id" 2>/dev/null | head -1 || true)

          if [ -n "$EXISTING" ]; then
            gh api "/repos/${REPO}/issues/comments/${EXISTING}" -X PATCH -f body="${{ env.report }}" 2>/dev/null || true
            echo "Updated status comment"
          else
            gh issue comment ${TRACKING_ISSUE} --repo ${REPO} --body "${{ env.report }}" 2>/dev/null || true
            echo "Posted new status comment"
          fi

      - name: Summary
        run: |
          echo "âś… System status aggregated and posted"
          echo ""
          echo "Key Automation Workflows:"
          echo "  - Ingestion Monitor: Polls every 5 min"
          echo "  - Self-Healing: Runs every 5 min"
          echo "  - DR Reconciliation: Runs every 30 min"
          echo "  - Status Aggregator: Runs every 15 min"
          echo ""
          echo "Operator Actions Pending:"
          echo "  1. Set GCP_SERVICE_ACCOUNT_KEY secret"
          echo "  2. Comment 'ingested: true' on Issue #1239"
          echo "  3. Configure PagerDuty/Slack secrets (optional, for alerting)"
