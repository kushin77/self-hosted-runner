name: Retrieve Secret from Google Secret Manager
description: Dynamically retrieve secrets from GCP Secret Manager using OIDC/WIF

inputs:
  secret-name:
    description: Name of the secret in GSM
    required: true
  
  gcp-project-id:
    description: GCP Project ID
    required: true
  
  workload-identity-provider:
    description: Workload Identity Provider resource name
    required: true
  
  service-account:
    description: Service account email (must have secretmanager.secretAccessor role)
    required: true

outputs:
  secret-value:
    description: The secret value retrieved from GSM
    value: ${{ steps.retrieve.outputs.secret }}

runs:
  using: composite
  steps:
    - name: Authenticate to GCP via OIDC/WIF
      uses: google-github-actions/auth@v1
      with:
        workload_identity_provider: ${{ inputs.workload-identity-provider }}
        service_account: ${{ inputs.service-account }}
    
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        version: latest
    
    - name: Retrieve secret from GSM
      id: retrieve
      shell: bash
      run: |
        # Retrieve secret value from GSM
        SECRET_VALUE=$(gcloud secrets versions access latest \
          --secret="${{ inputs.secret-name }}" \
          --project="${{ inputs.gcp-project-id }}" \
          2>/dev/null)
        
        if [[ -z "$SECRET_VALUE" ]]; then
          echo "::error::Failed to retrieve secret: ${{ inputs.secret-name }}"
          exit 1
        fi
        
        # Output secret (masked in logs)
        echo "secret=${SECRET_VALUE}" >> $GITHUB_OUTPUT
        echo "::add-mask::${SECRET_VALUE}"
        
        # Log retrieval in audit trail (immutable)
        AUDIT_DIR=".gcp-audit"
        mkdir -p "$AUDIT_DIR"
        
        TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
        AUDIT_ENTRY=$(jq -n \
          --arg ts "$TIMESTAMP" \
          --arg secret "${{ inputs.secret-name }}" \
          --arg project "${{ inputs.gcp-project-id }}" \
          --arg actor "${GITHUB_ACTOR:-system}" \
          '{timestamp: $ts, action: "RETRIEVE", secret: $secret, project: $project, actor: $actor, run_id: env.GITHUB_RUN_ID}')
        
        echo "$AUDIT_ENTRY" >> "$AUDIT_DIR/gsm-retrieval-audit.jsonl"
    
    - name: Cleanup ephemeral data
      if: always()
      shell: bash
      run: |
        # Clear environment variables that might contain secrets
        unset SECRET_VALUE
        # GCP credentials are automatically cleaned up by google-github-actions/auth@v1
