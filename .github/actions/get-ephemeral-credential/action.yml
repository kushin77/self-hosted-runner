name: Get Ephemeral Credential
description: Composite action to retrieve ephemeral credentials from GSM/Vault/KMS via helper scripts

inputs:
  credential-name:
    description: Name of the credential to retrieve (from GSM, Vault, or both)
    required: true
  retrieve-from:
    description: Which layer to retrieve from: gsm, vault, kms, or auto
    required: false
    default: auto
  cache-ttl:
    description: Number of seconds to cache the credential (default: 300)
    required: false
    default: '300'
  audit-log:
    description: Whether to log this credential access to audit trail (default: true)
    required: false
    default: 'true'

outputs:
  credential:
    description: The actual credential value
  cached:
    description: Whether this credential was retrieved from cache
  expires-at:
    description: ISO8601 timestamp when credential expires
  source-layer:
    description: Which layer provided the credential (gsm, vault, or kms)
  audit-id:
    description: Reference ID for audit trail lookup

runs:
  using: composite
  steps:
    - name: Fetch credential
      id: retrieve
      shell: bash
      run: |
        set -euo pipefail
        CRED="${{ inputs.credential-name }}"
        RET="${{ inputs.retrieve-from }}"
        TTL="${{ inputs.cache-ttl }}"

        # Run the credential manager script (structured JSON expected on stdout)
        OUTPUT=$(bash scripts/credential-manager.sh "$CRED" "$RET" 2>&1) || { echo "Credential retrieval failed:\n$OUTPUT" >&2; exit 1; }

        # Write JSON to a temp file and parse with python to safely populate GITHUB_OUTPUT
        TMPFILE=$(mktemp -p /tmp ephemeral-cred.XXXXXX || mktemp)
        echo "$OUTPUT" > "$TMPFILE"

        python3 - <<PY
import json,os
with open("$TMPFILE") as f:
    out=json.load(f)
gof=os.environ.get('GITHUB_OUTPUT')
with open(gof,'a') as f:
    f.write('credential<<EOF\n')
    f.write(out.get('credential','') + '\n')
    f.write('EOF\n')
    f.write(f"cached={str(out.get('cached',False)).lower()}\n")
    f.write(f"expires-at={out.get('expires_at','')}\n")
    f.write(f"source-layer={out.get('source','')}\n")
    f.write(f"audit-id={out.get('audit_id','')}\n")
PY

        rm -f "$TMPFILE"

branding:
  icon: key
  color: blue
