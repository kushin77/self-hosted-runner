---
name: resilience-loader
description: Composite action to load resilience scripts and retry helpers

runs:
  using: composite
  steps:
    - name: Load resilience helpers
      shell: bash
      run: |
        set -e
        echo "Loading resilience helpers..."
        if [[ -f .github/scripts/resilience.sh ]]; then
          source .github/scripts/resilience.sh
          echo "Resilience helpers loaded successfully."
        else
          echo "Warning: resilience.sh not found. Setting up..."
          mkdir -p .github/scripts
          echo "#!/bin/bash" > .github/scripts/resilience.sh
          echo "export -f retry_command 2>/dev/null || true" \
            >> .github/scripts/resilience.sh
          chmod +x .github/scripts/resilience.sh
          source .github/scripts/resilience.sh
        fi
