name: "Retrieve Secret from AWS Secrets Manager"
description: "Dynamically retrieve secret from AWS Secrets Manager using OIDC"

inputs:
  secret-name:
    description: "Name of the secret in AWS Secrets Manager"
    required: true
  aws-region:
    description: "AWS region"
    required: true
    default: "us-east-1"
  role-to-assume:
    description: "IAM role ARN to assume for Secrets Manager access"
    required: true

outputs:
  secret-value:
    description: "The retrieved secret value"
    value: ${{ steps.retrieve.outputs.secret-value }}

runs:
  using: "composite"
  steps:
    - uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}
        role-session-name: github-actions-secret-retrieval

    - id: retrieve
      shell: bash
      env:
        SECRET_NAME: ${{ inputs.secret-name }}
        AWS_REGION: ${{ inputs.aws-region }}
      run: |
        # Retrieve secret from AWS Secrets Manager
        echo "[INFO] Retrieving secret: $SECRET_NAME from region: $AWS_REGION"
        
        SECRET_VALUE=$(aws secretsmanager get-secret-value \
          --secret-id "$SECRET_NAME" \
          --region "$AWS_REGION" \
          --query 'SecretString' \
          --output text 2>&1)
        
        if [ $? -ne 0 ]; then
          echo "[ERROR] Failed to retrieve secret: $SECRET_VALUE" >&2
          exit 1
        fi
        
        # Output as masked value
        echo "::add-mask::$SECRET_VALUE"
        echo "secret-value=$SECRET_VALUE" >> $GITHUB_OUTPUT
        echo "[INFO] Secret retrieved successfully (length: ${#SECRET_VALUE})"

    - shell: bash
      run: |
        # Ephemeral cleanup: unset sensitive variables
        unset SECRET_VALUE
        echo "[INFO] Ephemeral cleanup completed"
