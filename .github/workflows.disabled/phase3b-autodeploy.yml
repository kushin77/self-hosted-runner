name: Phase 3B Auto Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  id-token: write
  contents: read

jobs:
  phase3b:
    name: Phase 3B Provisioning (hands-off)
    runs-on: ubuntu-latest
    env:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SA_EMAIL: ${{ secrets.GCP_SA_EMAIL }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE }}
      GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (optional)
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER && env.GCP_SA_EMAIL }}
        continue-on-error: true
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SA_EMAIL }}

      - name: Configure AWS credentials via OIDC (optional)
        if: ${{ env.AWS_ROLE_TO_ASSUME }}
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Run Phase 3B provisioning (non-interactive)
        run: |
          set -euo pipefail
          bash scripts/phase3b-credentials-aws-vault.sh
