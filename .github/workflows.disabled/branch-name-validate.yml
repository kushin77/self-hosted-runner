name: Branch Name Validation

on:
  push:
    branches-ignore: [ 'main' ]
  pull_request:

permissions:
  checks: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Branch name lint
    steps:
      - name: Check branch name
        uses: actions/github-script@v7
        with:
          script: |
            const ref = process.env.GITHUB_REF || context.ref;
            const isPR = !!process.env.GITHUB_HEAD_REF;
            const branch = isPR ? process.env.GITHUB_HEAD_REF : (ref.replace('refs/heads/',''));

            const allowedPrefixes = [
              'release/', 'hotfix/', 'chore/', 'fix/', 'feat/', 'pr/', 'automation/', 'archive/', 'enhance/', 'migration/', 'ops/', 'test/', 'tmp_' ];

            const allowedExact = ['main'];

            function okName(b) {
              if (allowedExact.includes(b)) return true;
              for (const p of allowedPrefixes) if (b.startsWith(p)) return true;
              // deny spaces and uppercase
              if (/[A-Z\s]/.test(b)) return false;
              // must be <= 100 chars
              if (b.length > 100) return false;
              // allow numeric and punctuation
              return /^[a-z0-9._\-\/]+$/.test(b);
            }

            core.info(`Validating branch name: ${branch}`);
            if (!okName(branch)) {
              core.setFailed(`Invalid branch name: ${branch}. Allowed prefixes: ${allowedPrefixes.join(', ')} or 'main'. No uppercase or spaces.`);
            } else {
              core.info('Branch name valid.');
            }
