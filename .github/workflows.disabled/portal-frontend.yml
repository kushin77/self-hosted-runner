name: Portal MVP - Frontend Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/portal-frontend.yml'
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  BUCKET_STAGING: nexusshield-portal-staging
  BUCKET_PRODUCTION: nexusshield-portal-prod

jobs:
  build:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Lint code
        working-directory: frontend
        run: npm run lint

      - name: Format check
        working-directory: frontend
        run: npx prettier --check src

      - name: Unit tests
        working-directory: frontend
        run: npm run test:cov

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_URL: https://api.nexusshield.cloud
          VITE_ENV: production
        run: npm run build

      - name: Check build output
        run: |
          [ -d frontend/dist ] && echo "✅ Build successful" || exit 1
          ls -lah frontend/dist/ | head -20

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  deploy-staging:
    name: Deploy to Staging (Cloud Storage + CDN)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy staging (Cloud Storage)
        run: |
          # Create backup of previous version (immutable)
          gsutil -m cp -r gs://$BUCKET_STAGING/ gs://nexusshield-backups/portal-staging-backup-$(date +%Y%m%d_%H%M%S) || true

          # Upload new version
          gsutil -m -h "Cache-Control:public, max-age=3600" cp -r dist/* gs://$BUCKET_STAGING/

          # Invalidate CDN cache
          gcloud compute url-maps invalidate-cdn-cache nexusshield-cdn \
            --path "/*" \
            --async

          echo "✅ Staging deployment complete (backup saved)"

  deploy-production:
    name: Deploy to Production (Cloud Storage + CDN - Direct Deployment)
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Production safety checks
        run: |
          # Verify no secrets in build
          if grep -r "AKIA\|ghp_\|sk_live" dist/ 2>/dev/null; then
            echo "❌ Hardcoded secrets detected in build!"
            exit 1
          fi
          echo "✅ Security check passed"

      - name: Deploy production (Cloud Storage)
        run: |
          # Immutable backup
          gsutil -m cp -r gs://$BUCKET_PRODUCTION/ gs://nexusshield-backups/portal-prod-backup-$(date +%Y%m%d_%H%M%S-%N)

          # Upload with cache headers
          gsutil -m -h "Cache-Control:public, max-age=31536000" cp -r dist/* gs://$BUCKET_PRODUCTION/

          # CDN cache invalidation
          gcloud compute url-maps invalidate-cdn-cache nexusshield-cdn \
            --path "/*" \
            --async

          echo "✅ Production deployment complete"

      - name: Verify deployment
        run: |
          # Check health endpoint
          curl -f https://portal.nexusshield.cloud/health || sleep 5 && curl -f https://portal.nexusshield.cloud/health
          echo "✅ Production verification passed"

      - name: Record deployment
        run: |
          gcloud storage cp \
            <(echo "{\"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"component\": \"portal-frontend\", \"event\": \"deployed_production\", \"commit\": \"$GITHUB_SHA\", \"deployed_by\": \"$GITHUB_ACTOR\"}") \
            gs://${{ secrets.GCP_AUDIT_BUCKET }}/deployments/portal-frontend-$(date +%Y%m%d_%H%M%S).jsonl

  notify:
    name: Notification
    needs: [deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Frontend deployment status
        run: |
          if [ "${{ needs.deploy-production.result }}" = "success" ]; then
            echo "✅ Portal frontend pipeline succeeded"
            echo "📍 Staging: https://staging.portal.nexusshield.cloud"
            echo "📍 Production: https://portal.nexusshield.cloud"
          else
            echo "❌ Portal frontend pipeline failed"
            exit 1
          fi
