name: Portal MVP - Infrastructure (Terraform)

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/portal-infrastructure.yml'
  workflow_dispatch:
    inputs:
      action:
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: 1.5.0
  GCP_PROJECT_ID: p4-platform
  GCP_REGION: us-central1
  AUDIT_LOG_FILE: logs/github-actions-deployment-audit.jsonl

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=portal-mvp" \
            -upgrade

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive .

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="gcp_project_id=$GCP_PROJECT_ID" \
            -var="environment=staging" \
            -out=tfplan.staging

          terraform plan \
            -var="gcp_project_id=$GCP_PROJECT_ID" \
            -var="environment=production" \
            -out=tfplan.production

      - name: Save plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plans
          path: terraform/tfplan.*
          retention-days: 7

  apply:
    name: Terraform Apply (Direct Deployment)
    needs: plan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=portal-mvp"

      - name: Download plan artifacts
        uses: actions/download-artifact@v4
        with:
          name: terraform-plans
          path: terraform

      - name: Apply staging plan
        working-directory: terraform
        run: |
          terraform apply -auto-approve tfplan.staging
          terraform output -json > staging-outputs.json

      - name: Apply production plan
        working-directory: terraform
        run: |
          terraform apply -auto-approve tfplan.production
          terraform output -json > production-outputs.json

      - name: Save outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: terraform/*-outputs.json
          retention-days: 30

      - name: Record immutable audit entry
        run: |
          AUDIT_ENTRY=$(cat <<EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "event": "terraform_infrastructure_deployment",
            "component": "portal-infrastructure",
            "environment": "staging-production",
            "commit_sha": "$GITHUB_SHA",
            "commit_message": "$GITHUB_HEAD_REF",
            "action": "direct-deploy-main-push",
            "status": "success",
            "stages_completed": ["staging", "production"],
            "audit_requirement": "immutable_append_only"
          }
          EOF
          )
          echo "$AUDIT_ENTRY" >> logs/github-actions-deployment-audit.jsonl
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/github-actions-deployment-audit.jsonl
          git commit -m "audit: infrastructure deployment — terraform apply staging → production (commit $GITHUB_SHA)" --no-verify || true
          git push origin main || true

  validate-security:
    name: Security Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run TFLint
        uses: terraform-linters/tflint-load-config-action@v4

      - name: TFLint check
        working-directory: terraform
        run: |
          tflint --init
          tflint --format json > tflint-report.json || true
          cat tflint-report.json

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        with:
          source: terraform/

      - name: Check IAM security
        working-directory: terraform
        run: |
          # Verify no overly permissive roles
          if grep -r "roles/editor\|roles/owner" *.tf; then
            echo "⚠️  Editor/Owner roles detected - review required"
          fi
          echo "✅ Security validation complete"

  notify:
    name: Status Check
    needs: [plan, apply, validate-security]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Status summary
        run: |
          echo "Terraform plan: ${{ needs.plan.result }}"
          echo "Terraform apply: ${{ needs.apply.result }}"
          echo "Security validation: ${{ needs.validate-security.result }}"
          
          if [ "${{ needs.apply.result }}" = "success" ]; then
            echo "✅ Infrastructure deployment succeeded"
          else
            echo "⚠️  Pipeline status: Check logs above"
          fi
