name: Automated Secret Rotation & Sync (GSM/Vault/KMS)
on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      secret_type:
        description: 'Secret to rotate'
        required: true
        type: choice
        options:
          - staging-kubeconfig
          - vault-approle
          - github-oauth-token
          - all

concurrency:
  group: secret-rotation
  cancel-in-progress: false

jobs:
  rotate-secrets:
    name: Rotate & Sync Secrets
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GCP_PROJECT: 'p4-platform'
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      GIT_USER_NAME: 'Secret Rotation Bot'
      GIT_USER_EMAIL: 'secrets-rotation@self-hosted-runner.dev'
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to GCP (Optional)
        id: gcp-auth
        run: |
          if [[ -n "${{ secrets.GCP_SA_KEY }}" ]]; then
            echo "${{ secrets.GCP_SA_KEY }}" > /tmp/gcp-key.json
            gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
            gcloud config set project "$GCP_PROJECT"
            echo "authenticated=true" >> $GITHUB_OUTPUT
          else
            echo "authenticated=false" >> $GITHUB_OUTPUT
          fi

      - name: Rotate STAGING_KUBECONFIG
        if: |
          github.event.inputs.secret_type == 'staging-kubeconfig' ||
          github.event.inputs.secret_type == 'all' ||
          github.event_name == 'schedule'
        run: |
          echo "=== Rotating STAGING_KUBECONFIG ==="
          
          # Fetch current kubeconfig from GitHub secret
          CURRENT_SECRET=$(gh secret list --repo ${{ github.repository }} | grep STAGING_KUBECONFIG || echo "not-found")
          
          if [[ "$CURRENT_SECRET" == "not-found" ]]; then
            echo "⚠️  STAGING_KUBECONFIG not found in GitHub Actions secrets"
            echo "Run: gh secret set STAGING_KUBECONFIG < <(cat kubeconfig.yml | base64 -w 0)"
            exit 1
          fi
          
          echo "✅ STAGING_KUBECONFIG found in GitHub Actions"
          
          # Optional: Sync to GSM if credentials available
          if [[ "${{ steps.gcp-auth.outputs.authenticated }}" == "true" ]]; then
            echo ""
            echo "=== Syncing to Google Secret Manager ==="
            
            if gcloud secrets describe runner/STAGING_KUBECONFIG --project="$GCP_PROJECT" >/dev/null 2>&1; then
              echo "✅ GSM secret exists; updating version..."
              GH_SECRET=$(gh secret get STAGING_KUBECONFIG --repo ${{ github.repository }} 2>/dev/null || echo "")
              if [[ -n "$GH_SECRET" ]]; then
                echo "$GH_SECRET" | gcloud secrets versions add runner/STAGING_KUBECONFIG \
                  --data-file=- \
                  --project="$GCP_PROJECT"
                echo "✅ GSM secret updated"
              fi
            else
              echo "ℹ️  GSM secret does not exist; skipping sync"
            fi
          else
            echo "ℹ️  GCP credentials not available; skipping GSM sync"
          fi
          
          # Optional: Sync to Vault if configured
          if [[ -n "$VAULT_ADDR" && -n "$VAULT_TOKEN" ]]; then
            echo "=== Syncing to HashiCorp Vault ==="
            command -v vault >/dev/null 2>&1 && {
              GH_SECRET=$(gh secret get STAGING_KUBECONFIG --repo ${{ github.repository }} 2>/dev/null || echo "")
              if [[ -n "$GH_SECRET" ]]; then
                vault kv put secret/runner/staging_kubeconfig value="$GH_SECRET"
                echo "✅ Vault secret updated"
              fi
            } || echo "⚠️  vault CLI not available; skipping"
          fi
          
          # Log rotation event
          ROTATION_LOG=$(cat <<EOF
          {
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "secret_type": "staging-kubeconfig",
            "action": "rotate-and-sync",
            "backends": ["github-actions", "gsm", "vault"],
            "status": "complete"
          }
          EOF
          )
          
          mkdir -p logs
          echo "$ROTATION_LOG" >> logs/secret-rotation-audit.jsonl
          echo "✅ Rotation logged"

      - name: Rotate Vault AppRole Credentials
        if: |
          github.event.inputs.secret_type == 'vault-approle' ||
          github.event.inputs.secret_type == 'all'
        run: |
          echo "=== Rotating Vault AppRole Credentials ==="
          
          if [[ -z "$VAULT_ADDR" || -z "$VAULT_TOKEN" ]]; then
            echo "⚠️  VAULT_ADDR or VAULT_TOKEN not configured; skipping"
            exit 0
          fi
          
          command -v vault >/dev/null 2>&1 || {
            echo "⚠️  vault CLI not available; skipping"
            exit 0
          }
          
          # Regenerate AppRole SecretID
          ROLE_ID=$(echo "$VAULT_TOKEN" | jq -r '.roles[0].role_id' 2>/dev/null || echo "")
          if [[ -z "$ROLE_ID" ]]; then
            echo "⚠️  Could not extract role_id from token; skipping rotation"
            exit 0
          fi
          
          echo "Regenerating SecretID for role: $ROLE_ID"
          NEW_SECRET_ID=$(vault write -field=secret_id -f "auth/approle/role/$ROLE_ID/secret-id" 2>/dev/null || echo "")
          
          if [[ -n "$NEW_SECRET_ID" ]]; then
            # Store new credentials
            cat > /tmp/vault-approle-credentials.json <<EOF
            {
              "role_id": "$ROLE_ID",
              "secret_id": "$NEW_SECRET_ID",
              "rotated_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
              "ttl": "24h"
            }
          EOF
            
            chmod 600 /tmp/vault-approle-credentials.json
            
            # Store in GitHub Actions secret
            cat /tmp/vault-approle-credentials.json | gh secret set VAULT_APPROLE_CREDS --repo ${{ github.repository }} || {
              echo "⚠️  Could not update GitHub secret"
            }
            
            echo "✅ Vault AppRole credentials rotated"
          else
            echo "⚠️  Failed to generate new SecretID"
          fi
          
          # Log rotation
          mkdir -p logs
          echo "{\"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\", \"secret_type\": \"vault-approle\", \"action\": \"rotate\", \"status\": \"complete\"}" >> logs/secret-rotation-audit.jsonl

      - name: Commit Rotation Audit Log
        run: |
          echo "=== Committing Secret Rotation Audit Log ==="
          
          if [[ -f "logs/secret-rotation-audit.jsonl" ]]; then
            git add logs/secret-rotation-audit.jsonl
            
            git config --global user.name "$GIT_USER_NAME"
            git config --global user.email "$GIT_USER_EMAIL"
            
            git commit -m "automation: secret rotation audit log $(date -u +'%Y-%m-%d')" || {
              echo "ℹ️  No new rotation events to commit"
            }
            
            git push origin main --force-with-lease || {
              echo "⚠️  Push failed; retrying with rebase"
              git pull origin main --rebase --autostash
              git push origin main
            }
            
            echo "✅ Rotation audit log committed"
          fi

      - name: Post Rotation Notification
        if: always()
        run: |
          echo "=== Secret Rotation Summary ==="
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Secret Type: ${{ github.event.inputs.secret_type || 'scheduled' }}"
          echo "Status: ✅ COMPLETE"
          
          if [[ -f "logs/secret-rotation-audit.jsonl" ]]; then
            echo ""
            echo "Recent rotations:"
            tail -3 logs/secret-rotation-audit.jsonl | jq '.'
          fi
