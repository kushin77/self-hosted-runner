name: "🔐 CI: Credential Lint - Prevent Embedded Keys"

on:
  pull_request:
    paths:
      - "**.sh"
      - "**.yml"
      - "**.yaml"
      - "**.md"
      - "**.py"
  push:
    branches: [main]
    paths:
      - "**.sh"
      - "**.yml"
      - "**.yaml"
      - "**.md"
      - "**.py"

permissions:
  contents: read
  pull-requests: write

jobs:
  credential-lint:
    name: "🔍 Scan for embedded credentials"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Install gitleaks"
        run: |
          sudo apt-get update && sudo apt-get install -y gitleaks || {
            curl -LO https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks-linux-x64
            chmod +x gitleaks-linux-x64
            sudo mv gitleaks-linux-x64 /usr/local/bin/gitleaks
          }

      - name: "Scan for credentials"
        continue-on-error: true
        id: gitleaks
        run: |
          set +e
          gitleaks detect --source . --verbose --log-level info 2>&1 | tee /tmp/gitleaks.log
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Credential lint FAILED: Potential secrets detected"
            echo "RESULT=FAIL" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ No hardcoded credentials detected"
            echo "RESULT=PASS" >> $GITHUB_OUTPUT
          fi

      - name: "Pattern-based credential detection"
        run: |
          set +e
          
          # Check for literal AWS keys
          if grep -r "AKIA" . --include="*.sh" --include="*.yml" --include="*.yaml" 2>/dev/null | grep -v "# " | grep -v "REDACTED"; then
            echo "❌ Found potential AWS access key pattern (AKIA...)"
            exit 1
          fi
          
          # Check for GCP SA key references
          if grep -r "service_account_key.*=$(.*secrets\." . --include="*.yml" --include="*.yaml" 2>/dev/null; then
            echo "⚠️  Found GCP SA key secret reference (should use WIF instead)"
            # Non-blocking for now; issue is tracked (#2158)
          fi
          
          # Check for persistent VAULT_TOKEN
          if grep -r "VAULT_TOKEN.*secrets\." . --include="*.yml" --include="*.yaml" 2>/dev/null | grep -v "continue-on-error"; then
            echo "⚠️  Found VAULT_TOKEN in secrets (should use AppRole instead, tracked in #2159)"
            # Non-blocking for now; issue is tracked
          fi
          
          echo "✅ Pattern-based checks completed"

      - name: "Comment on PR if credentials detected"
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔐 Credential Lint FAILED\n\nPotential embedded credentials detected. Please:\n\n1. **Remove** any hardcoded keys/tokens\n2. **Use** GitHub secrets or environment-based injection\n3. **Prefer** OIDC (id-token) for authentication\n4. Reference issues:\n   - #2158 (GCP key migration)\n   - #2159 (AWS key migration)\n   - #2160 (Vault token hardening)\n\nRun \`gitleaks detect\` locally to scan.\n`
            });

      - name: "Upload gitleaks report"
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: gitleaks-report-${{ github.run_id }}
          path: /tmp/gitleaks.log
          retention-days: 30
