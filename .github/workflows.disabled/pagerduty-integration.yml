name: PagerDuty Integration - Alerts & Escalations

on:
  workflow_run:
    workflows:
      - "Automated Secret Rotation"
      - "Health Checks"
      - "Phase 3 - Revoke Exposed Keys"
    types:
      - completed

  workflow_dispatch:
    inputs:
      alert_type:
        description: 'Alert type'
        required: true
        type: choice
        options:
          - rotation-failure
          - terraform-failure
          - health-check-failure
          - revocation-complete
          - monitoring-started
      message:
        description: 'Alert message'
        required: true

permissions:
  contents: read
  issues: read

jobs:
  pagerduty-alert:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine alert type
        id: alert
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ALERT_TYPE="${{ github.event.inputs.alert_type }}"
            MESSAGE="${{ github.event.inputs.message }}"
          else
            # Parse workflow run that triggered this
            TRIGGER_WORKFLOW="${{ github.event.workflow_run.name }}"
            TRIGGER_CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            
            if [ "$TRIGGER_CONCLUSION" == "failure" ]; then
              case "$TRIGGER_WORKFLOW" in
                "Automated Secret Rotation")
                  ALERT_TYPE="rotation-failure"
                  MESSAGE="Credential rotation workflow failed"
                  ;;
                "Phase 3 - Revoke Exposed Keys")
                  ALERT_TYPE="rotation-failure"
                  MESSAGE="Key revocation workflow failed"
                  ;;
                *)
                  ALERT_TYPE="terraform-failure"
                  MESSAGE="Workflow $TRIGGER_WORKFLOW failed"
                  ;;
              esac
            else
              echo "Workflow succeeded; no alert needed"
              exit 0
            fi
          fi
          
          echo "alert_type=$ALERT_TYPE" >> $GITHUB_OUTPUT
          echo "message=$MESSAGE" >> $GITHUB_OUTPUT

      - name: Send PagerDuty alert
        if: steps.alert.outputs.alert_type
        run: |
          ./scripts/pagerduty-integration.sh \
            "${{ steps.alert.outputs.alert_type }}" \
            "${{ steps.alert.outputs.message }}" \
            "124" || true
        env:
          PAGERDUTY_API_KEY: ${{ secrets.PAGERDUTY_API_KEY }}
          PAGERDUTY_SERVICE_ID: ${{ secrets.PAGERDUTY_SERVICE_ID }}

      - name: Log alert to audit trail
        run: |
          mkdir -p logs
          TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "{\"timestamp\":\"$TIMESTAMP\",\"source\":\"workflow\",\"alert_type\":\"${{ steps.alert.outputs.alert_type }}\",\"message\":\"${{ steps.alert.outputs.message }}\",\"workflow_run_id\":\"${{ github.event.workflow_run.id || 'manual' }}\"}" >> logs/pagerduty-audit.jsonl
          
      - name: Commit audit trail
        if: always()
        run: |
          git config user.name "automation"
          git config user.email "automation@example.com"
          git add logs/pagerduty-audit.jsonl || true
          git commit -m "audit: pagerduty alert logged $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            --author="automation <automation@example.com>" || true
          git push origin main || true
