name: '[Phase 2B] AWS KMS Key Rotation & Credential Envelope Encryption'
# Immutable | Ephemeral | Idempotent | No-Ops | Hands-Off
# Rotates AWS KMS keys and manages credential envelope encryption

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly Sunday 3 AM UTC
  workflow_dispatch:
    inputs:
      force_rotation:
        description: 'Force KMS key rotation (even if not due)'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write
  issues: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  kms-key-rotation:
    name: Rotate KMS Keys & Encrypt Credentials
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python & AWS CLI
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir boto3 pyyaml requests jsonschema
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip && sudo ./aws/install 2>/dev/null || echo "AWS CLI already installed"

      - name: Configure AWS OIDC credentials (Phase 2B)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: 'arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/github-actions-kms'
          role-session-name: 'phase2-kms-rotation'

      - name: Generate KMS rotation & credential encryption script
        run: |
          cat > /tmp/kms_rotation.py << 'PYTHON_SCRIPT'
          import os
          import json
          import sys
          import base64
          from datetime import datetime, timedelta
          from pathlib import Path
          
          import boto3
          
          # Setup
          aws_region = os.environ.get('AWS_REGION', 'us-east-1')
          aws_account_id = os.environ.get('AWS_ACCOUNT_ID', '')
          force_rotation = os.environ.get('FORCE_KMS_ROTATION', 'false').lower() == 'true'
          
          kms_client = boto3.client('kms', region_name=aws_region)
          cloudtrail_client = boto3.client('cloudtrail', region_name=aws_region)
          
          timestamp = datetime.utcnow().isoformat()
          audit_log = []
          
          # KMS Master Key ID for this project
          KMS_KEY_ALIAS = 'alias/github-actions-credentials'
          
          try:
              print("🔐 AWS KMS Phase 2B: Key Rotation & Credential Encryption")
              print(f"   Region: {aws_region}")
              print(f"   Timestamp: {timestamp}")
              
              # Get KMS key
              try:
                  key_metadata = kms_client.describe_key(KeyId=KMS_KEY_ALIAS)
                  key_id = key_metadata['KeyMetadata']['KeyId']
                  print(f"\n   ✓ Found KMS key: {KMS_KEY_ALIAS}")
              except kms_client.exceptions.NotFoundException:
                  print(f"\n   ❌ KMS key not found: {KMS_KEY_ALIAS}")
                  print("      To configure: Set AWS_KMS_KEY_ID repo secret")
                  audit_log.append({
                      'timestamp': timestamp,
                      'action': 'kms_rotation',
                      'status': 'error',
                      'error': 'kms_key_not_found',
                      'expected_alias': KMS_KEY_ALIAS
                  })
                  raise
              
              # Check key rotation status
              key_rotation_resp = kms_client.get_key_rotation_status(KeyId=key_id)
              rotation_enabled = key_rotation_resp['KeyRotationEnabled']
              
              print(f"   Key rotation enabled: {rotation_enabled}")
              
              if not rotation_enabled:
                  print(f"   → Enabling automatic key rotation...")
                  kms_client.enable_key_rotation(KeyId=key_id)
                  rotation_enabled = True
              
              audit_log.append({
                  'timestamp': timestamp,
                  'action': 'kms_key_rotation_check',
                  'key_id': key_id,
                  'key_alias': KMS_KEY_ALIAS,
                  'rotation_enabled': rotation_enabled,
                  'status': 'success'
              })
              
              # Test credential encryption (idempotent)
              print(f"\n   Testing credential envelope encryption...")
              
              test_credential = json.dumps({
                  'service': 'github-actions',
                  'timestamp': timestamp
              })
              
              encrypt_resp = kms_client.encrypt(
                  KeyId=key_id,
                  Plaintext=test_credential,
                  EncryptionContext={
                      'purpose': 'credential-envelope',
                      'workflow': 'phase2-kms-rotation'
                  }
              )
              
              encrypted_blob = base64.b64encode(
                  encrypt_resp['CiphertextBlob']
              ).decode('utf-8')
              
              # Decrypt to verify
              decrypt_resp = kms_client.decrypt(
                  CiphertextBlob=encrypt_resp['CiphertextBlob'],
                  EncryptionContext={
                      'purpose': 'credential-envelope',
                      'workflow': 'phase2-kms-rotation'
                  }
              )
              
              decrypted_text = decrypt_resp['Plaintext'].decode('utf-8')
              
              if json.loads(decrypted_text) == json.loads(test_credential):
                  print(f"   ✓ Encryption/decryption successful")
                  audit_log.append({
                      'timestamp': timestamp,
                      'action': 'kms_encryption_test',
                      'status': 'success'
                  })
              else:
                  raise ValueError("Decrypted credential does not match plaintext")
              
              # Check CloudTrail for KMS API calls
              print(f"\n   Checking CloudTrail for KMS API activity...")
              
              one_week_ago = datetime.utcnow() - timedelta(days=7)
              
              try:
                  trail_events = cloudtrail_client.lookup_events(
                      LookupAttributes=[
                          {
                              'AttributeKey': 'ResourceType',
                              'AttributeValue': 'AWS::KMS::Key'
                          }
                      ],
                      StartTime=one_week_ago,
                      MaxResults=10
                  )
                  
                  kms_api_calls = len(trail_events.get('Events', []))
                  print(f"   ✓ Found {kms_api_calls} KMS API calls in past 7 days")
                  
                  audit_log.append({
                      'timestamp': timestamp,
                      'action': 'cloudtrail_check',
                      'kms_api_calls_7d': kms_api_calls,
                      'status': 'success'
                  })
              except Exception as e:
                  print(f"   ⚠️  Could not check CloudTrail: {e}")
              
              # Write immutable audit log
              audit_file = Path('logs/phase2-kms-rotation-audit.jsonl')
              audit_file.parent.mkdir(parents=True, exist_ok=True)
              
              with open(audit_file, 'a') as f:
                  for entry in audit_log:
                      f.write(json.dumps(entry) + '\n')
              
              print(f"\n✓ Phase 2B audit log written: {audit_file}")
              
          except Exception as e:
              print(f"\n❌ KMS rotation failed: {e}")
              
              audit_log.append({
                  'timestamp': timestamp,
                  'action': 'kms_rotation_batch',
                  'status': 'error',
                  'error': str(e)
              })
              
              # Write audit log for immutability
              audit_file = Path('logs/phase2-kms-rotation-audit.jsonl')
              audit_file.parent.mkdir(parents=True, exist_ok=True)
              with open(audit_file, 'a') as f:
                  f.write(json.dumps(audit_log[0]) + '\n')
              
              sys.exit(1)
          
          PYTHON_SCRIPT
          
          export FORCE_KMS_ROTATION="${{ github.event.inputs.force_rotation }}"
          python /tmp/kms_rotation.py

      - name: Commit audit log (immutable)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f logs/phase2-kms-rotation-audit.jsonl ]; then
            git add logs/phase2-kms-rotation-audit.jsonl
            git commit -m "audit: AWS KMS key rotation & credential encryption (phase 2B) - $(date -u +'%Y-%m-%d %H:%M:%S UTC')" --no-verify || echo "Nothing to commit"
            git push origin main --no-verify
            echo "✓ KMS audit log committed to main"
          fi

      - name: Post workflow summary
        if: always()
        run: |
          echo "## ✅ AWS KMS Rotation & Credential Encryption (Phase 2B)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** $([ ${{ job.status }} == 'success' ] && echo 'COMPLETE' || echo 'FAILED')" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Architecture:** Immutable | Ephemeral | Idempotent | No-Ops" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Operations:**" >> $GITHUB_STEP_SUMMARY
          echo "- Key rotation enabled" >> $GITHUB_STEP_SUMMARY
          echo "- Credential envelope encryption verified" >> $GITHUB_STEP_SUMMARY
          echo "- CloudTrail API activity logged" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f logs/phase2-kms-rotation-audit.jsonl ]; then
            echo "**Audit Log Sample:**" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            tail -3 logs/phase2-kms-rotation-audit.jsonl >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
