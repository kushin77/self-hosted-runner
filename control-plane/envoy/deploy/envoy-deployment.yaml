apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-envoy
  namespace: control-plane
  labels:
    app: control-plane-envoy
    phase: p4
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: control-plane-envoy
  template:
    metadata:
      labels:
        app: control-plane-envoy
        phase: p4
      annotations:
        vault.hashicorp.com/agent: "true"
    spec:
      serviceAccountName: control-plane-envoy
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.30-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8443
              name: https
              protocol: TCP
            - containerPort: 9901
              name: admin
              protocol: TCP
          volumeMounts:
            - name: tls
              mountPath: /etc/envoy/tls
              readOnly: true
            - name: reload-script
              mountPath: /usr/local/bin
              readOnly: true
          livenessProbe:
            httpGet:
              path: /ready
              port: 9901
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /stats
              port: 9901
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE

        - name: vault-agent
          image: hashicorp/vault:1.13.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/vault
            - agent
            - -config=/etc/vault/vault-agent.hcl
            - -exit-after-auth=false
          env:
            - name: VAULT_ADDR
              value: "https://vault.example.local"
            - name: VAULT_SKIP_VERIFY
              value: "true"
          volumeMounts:
            - name: tls
              mountPath: /etc/envoy/tls
            - name: vault-config
              mountPath: /etc/vault
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

        - name: envoy-reloader
          image: ubuntu:22.04
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -c
            - |
              apt-get update && apt-get install -y inotify-tools curl
              exec /usr/local/bin/envoy_reload_watcher.sh
          volumeMounts:
            - name: tls
              mountPath: /etc/envoy/tls
            - name: reload-script
              mountPath: /usr/local/bin
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      volumes:
        - name: tls
          emptyDir: {}
        - name: vault-config
          configMap:
            name: control-plane-envoy-vault-config
            items:
              - key: vault-agent.hcl
                path: vault-agent.hcl
        - name: reload-script
          configMap:
            name: control-plane-envoy-reload-script
            items:
              - key: envoy_reload_watcher.sh
                path: envoy_reload_watcher.sh
            defaultMode: 0755

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - control-plane-envoy
                topologyKey: kubernetes.io/hostname
