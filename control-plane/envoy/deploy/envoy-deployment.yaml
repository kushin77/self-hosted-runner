apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-envoy
  labels:
    app: control-plane-envoy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane-envoy
          livenessProbe:
            httpGet:
              host: 127.0.0.1
              path: /ready
              port: 9901
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
  template:
    metadata:
      labels:
        app: control-plane-envoy
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.30-latest
          ports:
            - containerPort: 8443
          volumeMounts:
        - name: envoy-reloader
          image: curlimages/curl:8.2.1
          command: ["/bin/sh","-c","/opt/envoy/reload/envoy_reload_watcher.sh"]
          volumeMounts:
            - name: tls
              mountPath: /etc/envoy/tls
            - name: reload-script
              mountPath: /opt/envoy/reload
      initContainers: []
            - name: tls
              mountPath: /etc/envoy/tls
              readOnly: true
          livenessProbe:
            httpGet:
              host: 127.0.0.1
              path: /ready
              port: 9901
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              host: 127.0.0.1
              path: /stats
              port: 9901
            initialDelaySeconds: 5
            periodSeconds: 5
        - name: vault-agent
          image: hashicorp/vault:1.13.0
          command: ["/bin/vault","agent","-config=/etc/vault/vault-agent.hcl"]
        - name: reload-script
          configMap:
            name: control-plane-envoy-reload-script
          env:
            - name: VAULT_ADDR
              value: "https://vault.example.local"
          volumeMounts:
            - name: tls
              mountPath: /etc/envoy/tls
            - name: vault-config
              mountPath: /etc/vault
        - name: envoy-reloader
          image: curlimages/curl:8.2.1
          command: ["/bin/sh","-c","/opt/envoy/reload/envoy_reload_watcher.sh"]
          volumeMounts:
            - name: tls
              mountPath: /etc/envoy/tls
            - name: reload-script
              mountPath: /opt/envoy/reload
      volumes:
        - name: tls
          emptyDir: {}
        - name: vault-config
          configMap:
            name: control-plane-envoy-vault-config
        - name: reload-script
          configMap:
            name: control-plane-envoy-reload-script
