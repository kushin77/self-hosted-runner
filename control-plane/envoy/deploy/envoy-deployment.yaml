apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane-envoy
  labels:
    app: control-plane-envoy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane-envoy
  template:
    metadata:
      labels:
        app: control-plane-envoy
    spec:
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.30-latest
          ports:
            - containerPort: 8443
          volumeMounts:
            - name: tls
              mountPath: /etc/envoy/tls
              readOnly: true
      initContainers:
        - name: fetch-cert
          image: hashicorp/vault:1.13.0
          command: ["/bin/sh","-c","/bin/get_cert.sh"]
          env:
            - name: VAULT_ADDR
              value: "https://vault.example.local"
            - name: ROLE
              value: "control-plane-role"
            - name: COMMON_NAME
              value: "control-plane.example.local"
          volumeMounts:
            - name: tls
              mountPath: /etc/envoy/tls
      volumes:
        - name: tls
          emptyDir: {}
