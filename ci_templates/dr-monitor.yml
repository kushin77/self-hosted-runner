---
# CI template: dr-monitor.yml
# Monitors the DR dry-run job and reports status to Slack via report_dr_status.sh

stages:
  - monitor

monitor:dr_report:
  stage: monitor
  image: docker:stable
  services:
    - docker:dind
  script:
    - chmod +x scripts/ci/report_dr_status.sh
    - |
      if [[ "$CI_JOB_STATUS" == "success" ]]; then
        ./scripts/ci/report_dr_status.sh --status=success --rto="$DR_RTO" --rpo="$DR_RPO" --log="$DR_LOGFILE"
      else
        ./scripts/ci/report_dr_status.sh --status=failure --rto="$DR_RTO" --rpo="$DR_RPO" --log="$DR_LOGFILE"
      fi
  rules:
    - if: $DR_DRYRUN == "true"
      when: always
  only:
    - schedules
