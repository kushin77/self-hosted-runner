# mirror-to-github.yml — optional protected job to push --mirror to GitHub
mirror-to-github:
  stage: deploy
  image: alpine:latest
  variables:
    GIT_STRATEGY: fetch
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  before_script:
    - apk add --no-cache git openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan github.com >> ~/.ssh/known_hosts || true
  script:
    - echo "Pushing mirror to GitHub target $GITHUB_TARGET_URL"
    - git remote add gh "$GITHUB_TARGET_URL" || true
    - git push --mirror gh
  only:
    - main
  tags:
    - sovereign
