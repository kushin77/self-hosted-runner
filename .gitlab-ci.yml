# GitLab CI configuration for ElevatedIQ Mono-Repo
# Role: Master Mono-Repo Architect / DevOps Excellence
# Compliance: NIST 800-53 Aligned (CM-3, PM-5, SC-7)
# FedRAMP Readiness Enabled

# ---------------------------------------------------------------------------
# Shared CI/CD Parity Templates (Sprint 3: GitLab ↔ GitHub portability)
# ---------------------------------------------------------------------------
include:
  - local: '.gitlab/ci-includes/aws-oidc.gitlab-ci.yml'        # GAP-001: OIDC auth
  - local: '.gitlab/ci-includes/terraform.gitlab-ci.yml'       # TF plan/apply/validate
  - local: '.gitlab/ci-includes/python-test.gitlab-ci.yml'     # pytest/ruff/mypy
  - local: '.gitlab/ci-includes/security-scan.gitlab-ci.yml'   # trivy/gitleaks/snyk

stages:
  - .pre
  - initialize
  - validate
  - security
  - build
  - test
  - governance
  - publish
  - mirror  # Push-mirror to GitHub after every successful pipeline on main

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.12"
  # SCM Abstraction — never hardcode GitLab or GitHub URLs directly
  # Set SCM_REPO_PATH in GitLab CI/CD variables (Settings > CI/CD > Variables)
  SCM_REPO_PATH: "${SCM_ABSTRACT_REPO_PATH}"
  SCM_BASE_URL: "${SCM_ABSTRACT_BASE_URL}"
  CI_BOT_EMAIL: "ci-bot@elevatediq.internal"
  # GitHub mirror target (used only by mirror job — not pipeline logic)
  GITHUB_MIRROR_REPO: "kushin77/ElevatedIQ-Mono-Repo"

cache:
  paths:
    - .cache/pip
    - venv/

default:
  image: python:3.12-slim
  before_script:
    - apt-get update -y && apt-get install -y --no-install-recommends
      curl git jq ca-certificates gnupg bash build-essential
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
    - chmod +x ./scripts/pmo/*.sh
    - chmod +x ./scripts/ci/*.sh

# --- .pre Stage ---
YAMLtest-sovereign-runner:
  stage: .pre
  image: alpine:latest
  script:
    - echo "Runner isolation test - sovereign, ephemeral, immutable"
    - echo "Pipeline ID: $CI_PIPELINE_ID"
    - echo "Runner: $CI_RUNNER_DESCRIPTION"
  tags:
    - "k8s-runner"

# --- Initialize Stage ---
prepare:env:
  stage: initialize
  script:
    - echo "Initializing CI Environment..."
    - if [ -f ./scripts/pmo/session_tracker.sh ]; then ./scripts/pmo/session_tracker.sh update issue "CI Pipeline Started: $CI_PIPELINE_URL" || true; fi
  artifacts:
    paths:
      - venv/

# --- Validate Stage ---
validate:commits:
  stage: validate
  script:
    - ./scripts/pmo/commit_validator.sh --check-all
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint:python:
  stage: validate
  script:
    - ruff check . --fix || true
    - mypy . || true

lint:shell:
  stage: validate
  script:
    - find scripts/ -name "*.sh" -exec shellcheck {} + || echo "shellcheck not installed"

lint:terraform:
  stage: validate
  script:
    - if command -v terraform >/dev/null; then terraform fmt -check -recursive; fi

# --- Security Stage ---
security:snyk:
  stage: security
  script:
    - if [ -n "$SNYK_TOKEN" ]; then snyk test; else echo "SNYK_TOKEN not set, skipping"; fi

security:secrets:
  stage: security
  script:
    - ./scripts/pmo/secret_scanner.sh || echo "Secret scanner failed"

# Added for NIST RA-5 Compliance
security:trivy_iac:
  extends: .trivy_iac_scan
  stage: security
  allow_failure: true

security:trivy_container:
  extends: .trivy_container_scan
  stage: security
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# --- Test Stage ---
test:unit:
  stage: test
  script:
    - pytest tests/unit/ || echo "No unit tests found"
  artifacts:
    reports:
      junit: report.xml

test:integration:
  stage: test
  script:
    - pytest tests/integration/ || echo "No integration tests found"
  allow_failure: true

# --- Governance Stage ---
pmo:assignee_enforcer:
  stage: governance
  script:
    - ./scripts/ci/gitlab_entrypoint.sh assignee_enforcer
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

pmo:milestone_enforcer:
  stage: governance
  script:
    - ./scripts/ci/gitlab_entrypoint.sh milestone_enforcer
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

pmo:compliance_audit:
  stage: governance
  script:
    - if [ -f ./scripts/pmo/compliance_checker.py ]; then python3 ./scripts/pmo/compliance_checker.py audit-all; fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

pmo:dashboard_gen:
  stage: governance
  script:
    - if [ -f ./scripts/pmo/generate_dashboard.sh ]; then ./scripts/pmo/generate_dashboard.sh; fi
  artifacts:
    paths:
      - docs/management/PMO_DASHBOARD.md
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# --- Automation / Post ---
pmo:auto_close:
  stage: publish
  script:
    - if [ -f ./scripts/pmo/auto_close_pr_issues.sh ]; then ./scripts/pmo/auto_close_pr_issues.sh; fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# =============================================================================
# SCM Mirror Stage — GitLab → GitHub (Unidirectional, runs after every push)
# =============================================================================
scm:mirror_to_github:
  stage: mirror
  image: alpine/git:latest
  variables:
    GIT_STRATEGY: none  # We manage the clone manually (bare mirror)
  before_script:
    - apk add --no-cache curl openssh-client bash python3
    - eval $(ssh-agent -s)
    - echo "$GITHUB_MIRROR_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - bash scripts/scm/gitlab-github-sync.sh
  after_script:
    - echo "Mirror sync completed at $(date -u)"
  rules:
    - if: $CI_COMMIT_BRANCH  # Run on every branch push
  allow_failure: true  # Mirror failure never blocks primary pipeline
  timeout: 5 minutes
  tags:
    - on-prem
  # Required GitLab CI/CD variables (set as protected+masked):
  #   GITHUB_MIRROR_SSH_KEY     — SSH private key for github-sync service account
  #   GITHUB_MIRROR_REPO        — Target: kushin77/ElevatedIQ-Mono-Repo
  #   SLACK_WEBHOOK_URL         — For mirror lag alerts
