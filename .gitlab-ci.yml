stages:
  - validate
  - triage
  - sla
  - bootstrap

variables:
  GITLAB_API_URL: "https://gitlab.com/api/v4"

validate:ci:
  stage: validate
  image: python:3.11
  script:
    - apt-get update && apt-get install -y curl jq || true
    - chmod +x scripts/gitlab-automation/validate-automation-gitlab.sh
    - SKIP_ISSUE_TEST=true PROJECT_ID=${CI_PROJECT_ID} GITLAB_API_URL=${GITLAB_API_URL} GITLAB_TOKEN=${GITLAB_TOKEN} bash scripts/gitlab-automation/validate-automation-gitlab.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

prohibit:github_actions:
  stage: validate
  image: alpine:3.18
  before_script:
    - apk add --no-cache git ca-certificates >/dev/null || true
  script:
    - |
      # Fail if any GitHub Actions workflow files are present in the repository.
      if [ -d ".github/workflows" ] && [ "$(ls -A .github/workflows 2>/dev/null)" ]; then
        echo "ERROR: .github/workflows detected. GitHub Actions are disallowed by policy. Remove these files and rely on GitLab CI for all automation." >&2
        ls -la .github/workflows || true
        exit 2
      fi
      # Also check for any files matching the pattern anywhere in the repo tree
      matches=$(git ls-files | grep -E "^\.github/workflows/" || true)
      if [ -n "$matches" ]; then
        echo "ERROR: Found committed GitHub Actions workflow files:" >&2
        echo "$matches" >&2
        exit 2
      fi
  rules:
    - when: always

triage:manual:
  stage: triage
  image: python:3.11
  script:
    - apt-get update && apt-get install -y curl jq || true
    - chmod +x scripts/gitlab-automation/triage-issues-gitlab.sh || true
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH

sla-monitor:
  stage: sla
  image: python:3.11
  script:
    - apt-get update && apt-get install -y curl jq || true
    - chmod +x scripts/gitlab-automation/sla-monitor-gitlab.sh || true
    - PROJECT_ID=${CI_PROJECT_ID} GITLAB_API_URL=${GITLAB_API_URL} GITLAB_TOKEN=${GITLAB_TOKEN} bash scripts/gitlab-automation/sla-monitor-gitlab.sh || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

bootstrap:provision:
  stage: bootstrap
  image: python:3.11
  variables:
    SKIP_ISSUE_TEST: "true"
  script:
    - apt-get update && apt-get install -y curl jq || true
    - chmod +x scripts/gitlab-automation/create-ci-variables-gitlab.sh
    - chmod +x scripts/gitlab-automation/create-required-labels-gitlab.sh || true
    - PROJECT_ID=${CI_PROJECT_ID} GITLAB_TOKEN=${GITLAB_TOKEN} bash scripts/gitlab-automation/create-ci-variables-gitlab.sh
    - PROJECT_ID=${CI_PROJECT_ID} GITLAB_TOKEN=${GITLAB_TOKEN} bash scripts/gitlab-automation/create-required-labels-gitlab.sh
  when: manual
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - when: never
