version: '3.8'

services:
  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusshield-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://api:8080
      VITE_ENV: development
    volumes:
      - ./frontend/src:/app/src
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api
    networks:
      - nexusshield
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ==================== BACKEND API ====================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusshield-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://portal_user:${DB_PASSWORD:-portalpass}@database:5432/portal_db
      ENVIRONMENT: development
      DEBUG: "true"
      PYTHONUNBUFFERED: "1"
      PROMETHEUS_PORT: 9090
    volumes:
      - ./backend/app:/app/app
      - ./backend/migrations:/app/migrations
      - api_logs:/var/log/api
    depends_on:
      database:
        condition: service_healthy
    networks:
      - nexusshield
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== DATABASE ====================
  database:
    image: postgres:15-alpine
    container_name: nexusshield-database
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: portal_db
      POSTGRES_USER: portal_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portalpass}
      POSTGRES_INITDB_ARGS: |
        -c max_connections=100
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c maintenance_work_mem=64MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=16MB
        -c default_statistics_target=100
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c work_mem=4MB
        -c min_wal_size=1GB
        -c max_wal_size=4GB
        -c max_worker_processes=4
        -c max_parallel_workers_per_gather=2
        -c max_parallel_workers=4
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
      - db_logs:/var/log/postgresql
    networks:
      - nexusshield
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U portal_user -d portal_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ==================== REDIS CACHE ====================
  cache:
    image: redis:7-alpine
    container_name: nexusshield-cache
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-cachepass}
    volumes:
      - redis_data:/data
    networks:
      - nexusshield
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== MESSAGE QUEUE ====================
  message-queue:
    image: rabbitmq:3.12-management-alpine
    container_name: nexusshield-mq
    ports:
      - "5672:5672"      # AMQP
      - "15672:15672"    # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${MQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${MQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - nexusshield
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== PROMETHEUS ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: nexusshield-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - nexusshield
    depends_on:
      - api
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9090/-/healthy" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== GRAFANA ====================
  grafana:
    image: grafana/grafana:latest
    container_name: nexusshield-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - nexusshield
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== LOKI (Log Aggregation) ====================
  loki:
    image: grafana/loki:latest
    container_name: nexusshield-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yml
    networks:
      - nexusshield
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3100/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== JAEGER (Distributed Tracing) ====================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: nexusshield-jaeger
    ports:
      - "6831:6831/udp"  # UDP receiver
      - "16686:16686"    # UI
      - "14268:14268"    # HTTP receiver
    environment:
      COLLECTOR_ZIPKIN_HTTP_PORT: 9411
    volumes:
      - jaeger_data:/badger
    networks:
      - nexusshield
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:14268/" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==================== ADMINER (Database UI) ====================
  adminer:
    image: adminer:latest
    container_name: nexusshield-adminer
    ports:
      - "8081:8080"
    depends_on:
      - database
    networks:
      - nexusshield
    environment:
      ADMINER_DEFAULT_SERVER: database

networks:
  nexusshield:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:
  jaeger_data:
  frontend_node_modules:
  api_logs:
  db_logs:
