repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.6.1
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.17.0
    hooks:
      - id: gitleaks
        name: gitleaks-scan
        entry: gitleaks --path . --report-path gitleaks-report.json --redact
        language: system
        types: [file]

  - repo: https://github.com/marketplace/actions/commitizen-action
    rev: v0.0.1
    hooks: []

default_language_version:
  python: python3
