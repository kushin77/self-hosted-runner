# Ephemeral Runner TTL Policy Configuration
# Purpose: Define TTL policies based on job complexity, type, and telemetry signals
# Format: YAML with policy definitions for different job classifications

version: "1.0"
description: "TTL Policy Configuration for Ephemeral Runners"

# Global TTL settings
global:
  min_ttl: 300          # Minimum TTL in seconds (5 minutes)
  max_ttl: 86400        # Maximum TTL in seconds (24 hours)
  default_ttl: 1800     # Default TTL if no policy matches (30 minutes)
  reap_grace_period: 60 # Grace period before forceful termination (seconds)
  drain_timeout: 300    # Timeout for graceful drain (seconds)
  heartbeat_interval: 30 # Heartbeat check interval (seconds)

# Policy definitions - matched in order
policies:
  # Quick tests - minimal resource usage
  - name: "quick-test"
    description: "Unit tests and quick checks (< 5 min expected runtime)"
    filters:
      job_type:
        - "test"
        - "lint"
        - "check"
      max_duration: 300
      max_artifacts_mb: 100
    ttl_config:
      base_ttl: 600               # 10 minutes
      max_ttl: 900                # 15 minutes max (don't let it exceed this)
      complexity_multiplier: 1.0
    drain_policy:
      allow_graceful_drain: true
      drain_grace_period: 30
      allow_in_progress_jobs: false

  # Build jobs - moderate resource usage
  - name: "build"
    description: "Build and compilation jobs"
    filters:
      job_type:
        - "build"
        - "compile"
      max_duration: 3600
      max_artifacts_mb: 1000
    ttl_config:
      base_ttl: 1800              # 30 minutes
      max_ttl: 3600               # 1 hour max
      complexity_multiplier: 1.5
    drain_policy:
      allow_graceful_drain: true
      drain_grace_period: 60
      allow_in_progress_jobs: true
      timeout: 300

  # Integration tests - longer running
  - name: "integration-test"
    description: "Integration and E2E tests"
    filters:
      job_type:
        - "integration"
        - "e2e"
        - "test:integration"
      max_duration: 7200
      max_artifacts_mb: 2000
    ttl_config:
      base_ttl: 3600              # 1 hour
      max_ttl: 7200               # 2 hours max
      complexity_multiplier: 2.0
    drain_policy:
      allow_graceful_drain: true
      drain_grace_period: 120
      allow_in_progress_jobs: true
      timeout: 600

  # Deployment jobs - critical, longer TTL
  - name: "deploy"
    description: "Production deployments"
    filters:
      job_type:
        - "deploy"
        - "deploy:prod"
      labels:
        - "production"
      max_duration: 28800
      max_artifacts_mb: 5000
    ttl_config:
      base_ttl: 7200              # 2 hours
      max_ttl: 28800              # 8 hours max
      complexity_multiplier: 3.0
    drain_policy:
      allow_graceful_drain: true
      drain_grace_period: 300
      allow_in_progress_jobs: true
      timeout: 1200
      preserve_logs: true

  # Infrastructure jobs - very long running allowed
  - name: "infrastructure"
    description: "Infrastructure provisioning and management"
    filters:
      job_type:
        - "infrastructure"
        - "terraform"
        - "provision"
      labels:
        - "infrastructure"
    ttl_config:
      base_ttl: 14400             # 4 hours
      max_ttl: 86400              # 24 hours max
      complexity_multiplier: 2.5
    drain_policy:
      allow_graceful_drain: true
      drain_grace_period: 600
      allow_in_progress_jobs: true
      timeout: 1800
      preserve_logs: true

# Telemetry-based TTL adjustments
telemetry_adjustments:
  cpu_utilization:
    high: 1.5                     # Jobs using >80% CPU get 1.5x TTL
    medium: 1.2                   # Jobs using 50-80% CPU get 1.2x TTL
    low: 0.8                      # Jobs using <50% CPU get 0.8x TTL

  memory_utilization:
    high: 1.3                     # High memory usage (>80%) gets 1.3x TTL
    medium: 1.0                   # Normal memory usage
    low: 0.9                      # Low memory usage (<50%) gets 0.9x TTL

  disk_io_operations:
    high: 1.4                     # High disk I/O gets 1.4x TTL
    medium: 1.0                   # Normal disk usage
    low: 0.9                      # Low disk I/O gets 0.9x TTL

  network_throughput:
    high: 1.2                     # High network transfer gets 1.2x TTL
    medium: 1.0
    low: 0.95

# Safeguards and limits
safeguards:
  # Don't allow TTL to be extended indefinitely
  max_extensions: 3               # Maximum number of TTL extensions allowed
  extension_multiplier: 1.2       # Each extension multiplies TTL by 1.2x
  
  # Prevent resource exhaustion
  max_concurrent_drains: 10       # Max concurrent drain operations
  drain_batch_size: 5             # Process drain requests in batches
  
  # Monitoring and alerts
  alert_on_failed_drain: true
  alert_threshold_seconds: 300    # Alert if drain takes >5 minutes

# AI-Oracle integration (optional, future expansion)
ai_oracle:
  enabled: false                  # Set to true to enable AI-Oracle integration
  webhook_url: ""                 # AI-Oracle webhook endpoint
  timeout_ms: 5000                # Timeout for AI-Oracle calls
  fallback_policy: "default"      # Policy to use if AI-Oracle fails
  cache_ttl_seconds: 300          # Cache AI-Oracle hints for 5 minutes
  
  # AI-Oracle hint usage
  hints:
    enabled: false
    confidence_threshold: 0.75     # Only use hints with >75% confidence
    adjustment_factor: 0.5         # AI hints adjust TTL by max 50%

# Drain and reap strategies
strategies:
  graceful_drain:
    name: "Graceful Drain"
    description: "Wait for in-progress jobs to complete within timeout"
    timeout: 300
    steps:
      - notify_workflow_context
      - set_runner_offline
      - wait_for_job_completion
      - upload_logs_and_artifacts
      - cleanup_ephemeral_state

  forceful_drain:
    name: "Forceful Drain"
    description: "Force terminate running jobs after grace period"
    timeout: 60
    steps:
      - signal_running_jobs
      - wait_grace_period
      - kill_remaining_processes
      - cleanup_ephemeral_state
      - terminate_instance

  safe_reap:
    name: "Safe Reap"
    description: "Identify and terminate idle/expired runners"
    timeout: 300
    checks:
      - verify_no_in_progress_jobs
      - verify_no_recent_heartbeat
      - verify_ttl_expired
    actions:
      - send_termination_signal
      - wait_for_graceful_shutdown
      - force_terminate_if_needed
      - cleanup_cloud_resources

# Monitoring and observability
monitoring:
  enabled: true
  metrics:
    - "ttl_assigned"        # TTL value assigned at startup
    - "ttl_remaining"       # Current remaining TTL
    - "ttl_extensions"      # Number of TTL extensions
    - "drain_duration"      # Time taken to drain
    - "drain_success_rate"  # % of successful graceful drains
    - "reap_latency"        # Time from expiry to reap
  
  logging:
    level: "INFO"
    destinations:
      - "stdout"
      - "audit_trail"       # Write to immutable audit trail
    include_metrics: true
    include_telemetry: true

# Audit trail configuration
audit:
  enabled: true
  immutable: true           # Append-only audit log
  retention_days: 365       # Keep audit logs for 1 year
  events:
    - "ttl_assigned"
    - "ttl_extended"
    - "ttl_expired"
    - "drain_started"
    - "drain_completed"
    - "drain_failed"
    - "reap_scheduled"
    - "reap_executed"
    - "instance_terminated"
