name: Mock-server Nightly Smoke Test

on:
  schedule:
    - cron: '0 2 * * *' # daily at 02:00 UTC
  workflow_dispatch: {}

concurrency:
  group: mock-server-nightly
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install mock-server dependencies
        run: npm ci --prefix apps/portal/mock-server

      - name: Start mock-server
        run: |
          nohup node apps/portal/mock-server/server.cjs > mock-server.log 2>&1 &
          echo $! > mock-server.pid

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl --silent --fail http://localhost:3001/api/events >/dev/null 2>&1; then
              echo "server up"; break
            fi
            sleep 2
          done

      - name: Validate event schema
        run: node apps/portal/mock-server/validate_event_schema.js || true

      - name: Run WS smoke load-test
        run: node apps/portal/mock-server/load_test.cjs ws://localhost:3001/ws/events 5 10

      - name: Capture mock-server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-server-log
          path: mock-server.log

      - name: Stop mock-server
        if: always()
        run: |
          if [ -f mock-server.pid ]; then
            kill $(cat mock-server.pid) || true
          fi
