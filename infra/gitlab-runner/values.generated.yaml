## GitLab Runner Helm chart values template
## Replace placeholders before installing (TOKEN, URL, NAMESPACE)

replicaCount: 1

rbac:
  create: true

serviceAccount:
  create: true
  name: gitlab-runner

runners:
  image: "gitlab/gitlab-runner:alpine"
  privileged: false
  config: |
    [[runners]]
      name = "local-k8s-runner"
      url = "https://gitlab.internal.elevatediq.com"
      executor = "kubernetes"
      [runners.kubernetes]
        namespace = "gitlab-runner"
        image = "docker:24.0.5" # use shared sidecar when DIND required
        privileged = false
        pull_policy = "IfNotPresent"
        cpu_request = "100m"
        memory_request = "128Mi"
        helper_image = "gitlab/gitlab-runner-helper:latest"
        poll_timeout = 3600

  # Use an externally managed secret for the registration token
  registrationToken: "REPLACE_ME"
  concurrent: 10
  checkInterval: 30

terminationGracePeriodSeconds: 30

podSecurityContext:
  fsGroup: 65534
  runAsUser: 65534

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Enable ephemeral runner behavior: use Kubernetes to create per-job pods
runnersFullNameOverride: "gitlab-runner"

# Example for Vault integration via GitLab's built-in Vault support
# This is an example; actual integration requires GitLab admin OIDC/Vault setup.
secrets:
  vault:
    enabled: false
    address: "https://vault.example.internal"
    role: "gitlab-ci-role"

# Tolerations/nodeSelector for isolating runners to specific nodes
nodeSelector: {}
tolerations: []

# Affinity example: keep runner control plane off worker pool if desired
affinity: {}
