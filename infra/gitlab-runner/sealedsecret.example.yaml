apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: gitlab-runner-regtoken
  namespace: gitlab-runner
spec:
  encryptedData:
    registrationToken: <SEALED_BASE64>
  template:
    metadata:
      name: gitlab-runner-regtoken
      namespace: gitlab-runner

# Notes:
# - Replace <SEALED_BASE64> with the output from `kubeseal --format yaml < secret.yaml`.
# - This example uses Bitnami SealedSecrets CRD. Adapt to your SealedSecrets provider if different.
