apiVersion: batch/v1
kind: Job
metadata:
  name: golden-image-smoke-poc
  namespace: default
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: golden-smoke
        image: ghcr.io/elevatediq-ai/golden-image:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: GIT_CLONE_URL
          value: "https://github.com/elevatediq-ai/ElevatedIQ-Mono-Repo.git"
        - name: GIT_CLONE_REF
          value: "main"
        command:
        - /bin/bash
        - -lc
        - |
          set -e
          apt-get update || true
          # minimal tooling for git in case image lacks it
          apt-get install -y git || true
          rm -rf /workspace || true
          git clone --depth 1 "$GIT_CLONE_URL" /workspace
          cd /workspace
          # Run smoke-fastpath commands from image
          python -m pip install --upgrade pip || true
          pip install ruff mypy || true
          echo "Running ruff"
          ruff check . --quiet || true
          echo "Running mypy"
          mypy --ignore-missing-imports || true
      # Optionally mount a secret for private repos (not required here)
