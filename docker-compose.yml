version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nexusshield-postgres
    environment:
      POSTGRES_DB: nexusshield
      POSTGRES_USER: portal
      # POSTGRES_PASSWORD should be provided at runtime via external secret manager (GSM/Vault/KMS) or .env (ignored)
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U portal" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nexusshield-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusshield-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      # DATABASE_URL and REDIS_URL should be injected at runtime by the secret provider (GSM/Vault/KMS)
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-nexusshield-prod}
      # Prefer Workload Identity Federation for GCP auth
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${GCP_WORKLOAD_IDENTITY_PROVIDER:-}
      GCP_SERVICE_ACCOUNT_EMAIL: ${GCP_SERVICE_ACCOUNT_EMAIL:-}
      LOG_LEVEL: info
    volumes:
      - ./logs:/app/logs
      # If you must mount a short-lived service account key for an operator run,
      # prefer storing it in GSM and fetching at runtime. Avoid permanent mounts.
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  # Frontend UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://backend:3000
    container_name: nexusshield-frontend
    environment:
      REACT_APP_API_URL: http://backend:3000
      NODE_ENV: production
    ports:
      - "3001:80"
    depends_on:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    driver: bridge
    name: nexusshield-network
