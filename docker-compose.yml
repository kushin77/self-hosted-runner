version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nexusshield-postgres
    environment:
      POSTGRES_DB: nexusshield
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_change_in_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U portal" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nexusshield-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-dev_password_change_in_prod}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: nexusshield-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://portal:${DB_PASSWORD:-dev_password_change_in_prod}@postgres:5432/nexusshield
      REDIS_URL: redis://:${REDIS_PASSWORD:-dev_password_change_in_prod}@redis:6379
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-nexusshield-prod}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp_key.json
      LOG_LEVEL: info
    volumes:
      - ./logs:/app/logs
      - /run/secrets/gcp_key.json:/run/secrets/gcp_key.json:ro
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  # Frontend UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://backend:3000
    container_name: nexusshield-frontend
    environment:
      REACT_APP_API_URL: http://backend:3000
      NODE_ENV: production
    ports:
      - "3001:80"
    depends_on:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    driver: bridge
    name: nexusshield-network
