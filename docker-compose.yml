version: '3.9'

services:
  # PostgreSQL (Development)
  postgres:
    image: postgres:15-alpine
    container_name: sso-postgres-dev
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak (Development)
  keycloak:
    image: quay.io/keycloak/keycloak:24
    container_name: sso-keycloak-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HTTP_RELATIVE_PATH: /auth
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - start-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/auth"]
      interval: 30s
      timeout: 10s
      retries: 3

  # OAuth2-Proxy (Development) - ENFORCES OAuth for entire monitoring stack
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.5
    container_name: sso-oauth2-proxy-dev
    environment:
      # OIDC Configuration (Keycloak)
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://keycloak:8080/auth/realms/master
      OAUTH2_PROXY_CLIENT_ID: oauth2-proxy
      OAUTH2_PROXY_CLIENT_SECRET: client-secret
      OAUTH2_PROXY_REDIRECT_URL: http://localhost:4180/oauth2/callback
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/auth/realms/master/protocol/openid-connect/certs
      OAUTH2_PROXY_SCOPE: openid profile email
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      # Cookie Security (HttpOnly, SameSite, Secure)
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "Lax"
      OAUTH2_PROXY_COOKIE_NAME: oauth2-proxy
      OAUTH2_PROXY_COOKIE_EXPIRE: "3600"
      # OAuth Validation (STRICT ENFORCEMENT)
      OAUTH2_PROXY_VALIDATE_URL: http://keycloak:8080/auth/realms/master/protocol/openid-connect/userinfo
      OAUTH2_PROXY_SKIP_JWT_BEARER_TOKEN: "false"
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "false"
      OAUTH2_PROXY_OIDC_VERIFY_NONCE: "true"
      OAUTH2_PROXY_OIDC_GROUPS_CLAIM: groups
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "true"
      # OAuth2-Proxy Settings
      OAUTH2_PROXY_UPSTREAMS: http://monitoring-router:80
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_METRICS_ADDRESS: 0.0.0.0:8080
      OAUTH2_PROXY_AUTH_LOGGING: "true"
      OAUTH2_PROXY_REQUEST_LOGGING: "true"
      # Skip auth ONLY for health checks (not for actual endpoints)
      OAUTH2_PROXY_SKIP_AUTH_PREFIXES: /health,/ping,/oauth2/
      # Enforce OAuth on all paths (CRITICAL: no bypass)
      OAUTH2_PROXY_WHITELIST_DOMAINS: keycloak,monitoring-router
      OAUTH2_PROXY_NO_FORWARDED_PROTO: "false"
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
    ports:
      - "4180:4180"
      - "8080:8080"
    depends_on:
      - keycloak
      - monitoring-router
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4180/oauth2/auth"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Echo Service (for testing OAuth2-Proxy)
  echo:
    image: kennethreitz/httpbin
    container_name: sso-echo-dev
    ports:
      - "8081:80"

  # Monitoring Router (Nginx) - Routes to monitoring services
  monitoring-router:
    image: nginx:alpine
    container_name: sso-monitoring-router-dev
    volumes:
      - ./docker/nginx/monitoring-router.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8888:80"
    depends_on:
      - prometheus
      - grafana
      - alertmanager
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus (Development)
  prometheus:
    image: prom/prometheus:latest
    container_name: sso-prometheus-dev
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=72h'

  # Grafana (Development) - OAuth EXCLUSIVE authentication (no local auth)
  grafana:
    image: grafana/grafana:latest
    container_name: sso-grafana-dev
    environment:
      # OAuth Configuration (EXCLUSIVE)
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: grafana-secret
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid profile email
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: http://keycloak:8080/auth/realms/master/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: http://keycloak:8080/auth/realms/master/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_API_URL: http://keycloak:8080/auth/realms/master/protocol/openid-connect/userinfo
      GF_AUTH_GENERIC_OAUTH_REDIRECT_URL: http://localhost:3000/login/generic_oauth
      GF_AUTH_GENERIC_OAUTH_TLS_SKIP_VERIFY_INSECURE: "true"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_AUTO_LOGIN: "false"
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBED_INITIATE_LOGIN: "true"
      # Disable local authentication (enforce OAuth ONLY)
      GF_AUTH_BASIC_ENABLED: "false"
      GF_AUTH_LOGIN_FORM_VISIBLE: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_OAUTH_AUTO_LOGIN: "true"
      # Security hardening
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "true"
      GF_SECURITY_ADMIN_USER: ""
      GF_SECURITY_ADMIN_PASSWORD: ""
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
      - keycloak
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (Development for caching)
  redis:
    image: redis:7-alpine
    container_name: sso-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # PostgreSQL Exporter (for Prometheus)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: sso-postgres-exporter-dev
    environment:
      DATA_SOURCE_NAME: "postgresql://keycloak:password@postgres:5432/keycloak?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres

  # Redis Exporter (for Prometheus)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: sso-redis-exporter-dev
    environment:
      REDIS_ADDR: redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  redis_data:

networks:
  default:
    name: sso-dev-network
