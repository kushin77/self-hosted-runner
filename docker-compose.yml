version: '3.9'

services:
  # PostgreSQL (Development)
  postgres:
    image: postgres:15-alpine
    container_name: sso-postgres-dev
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data-vol:/var/lib/postgresql/data
      - postgres-logs-vol:/var/log/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Keycloak (Development)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: sso-keycloak-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HTTP_RELATIVE_PATH: /auth
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - start-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/auth"]
      interval: 30s
      timeout: 10s
      retries: 3

  # OAuth2-Proxy - Google OAuth Gateway (enforces OAuth for entire monitoring stack)
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
    container_name: sso-oauth2-proxy-dev
    environment:
      # Google OAuth Configuration
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-your-client-id.apps.googleusercontent.com}"
      OAUTH2_PROXY_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET:-your-secret-key}"
      OAUTH2_PROXY_REDIRECT_URL: http://192.168.168.42:4180/oauth2/callback
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://accounts.google.com
      OAUTH2_PROXY_SCOPE: openid profile email
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      # Google-specific settings
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "Lax"
      OAUTH2_PROXY_COOKIE_NAME: oauth2-proxy-google
      OAUTH2_PROXY_COOKIE_EXPIRE: "3600"
      # OAuth Validation (STRICT ENFORCEMENT)
      OAUTH2_PROXY_VALIDATE_URL: https://www.googleapis.com/oauth2/v2/userinfo
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_PREFER_EMAIL_TO_USER: "true"
      # OAuth2-Proxy Settings
      OAUTH2_PROXY_UPSTREAMS: http://monitoring-router:80
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_METRICS_ADDRESS: 0.0.0.0:8080
      OAUTH2_PROXY_AUTH_LOGGING: "true"
      OAUTH2_PROXY_REQUEST_LOGGING: "true"
      # Skip auth ONLY for health checks
      OAUTH2_PROXY_SKIP_AUTH_PREFIXES: /health,/ping,/oauth2/
      # Enforce OAuth on all paths
      OAUTH2_PROXY_WHITELIST_DOMAINS: accounts.google.com,monitoring-router
      OAUTH2_PROXY_NO_FORWARDED_PROTO: "false"
    ports:
      - "4180:4180"
      - "8080:8080"
    depends_on:
      - keycloak
      - monitoring-router
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4180/oauth2/auth"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Echo Service (for testing OAuth2-Proxy)
  echo:
    image: kennethreitz/httpbin
    container_name: sso-echo-dev
    ports:
      - "8081:80"

  # Monitoring Router (Nginx) - Routes to monitoring services
  monitoring-router:
    image: nginx:alpine
    container_name: sso-monitoring-router-dev
    volumes:
      - ./docker/nginx/monitoring-router.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8888:80"
    depends_on:
      - prometheus
      - grafana
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus (Development)
  prometheus:
    image: prom/prometheus:latest
    container_name: sso-prometheus-dev
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data-vol:/prometheus
      - prometheus-logs-vol:/var/log/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=72h'

  # Grafana (Development) - Google OAuth EXCLUSIVE authentication
  grafana:
    image: grafana/grafana:latest
    container_name: sso-grafana-dev
    environment:
      # Google OAuth Configuration (EXCLUSIVE)
      GF_AUTH_GOOGLE_ENABLED: "true"
      GF_AUTH_GOOGLE_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-your-client-id.apps.googleusercontent.com}"
      GF_AUTH_GOOGLE_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET:-your-secret-key}"
      GF_AUTH_GOOGLE_SCOPES: openid profile email
      GF_AUTH_GOOGLE_AUTH_URL: https://accounts.google.com/o/oauth2/v2/auth
      GF_AUTH_GOOGLE_TOKEN_URL: https://oauth2.googleapis.com/token
      GF_AUTH_GOOGLE_API_URL: https://openidconnect.googleapis.com/v1/userinfo
      GF_AUTH_GOOGLE_REDIRECT_URL: http://192.168.168.42:3000/login/google
      GF_AUTH_GOOGLE_ALLOWED_DOMAINS: ""
      GF_AUTH_GOOGLE_ALLOW_SIGN_UP: "true"
      GF_AUTH_GOOGLE_AUTO_LOGIN: "true"
      # User provisioning from Google OAuth claims
      GF_USERS_AUTO_ASSIGN_ORG: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBED_INITIATE_LOGIN: "true"
      # Disable local authentication (enforce Google OAuth ONLY)
      GF_AUTH_BASIC_ENABLED: "false"
      GF_AUTH_LOGIN_FORM_VISIBLE: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_OAUTH_AUTO_LOGIN: "true"
      # Security hardening
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "true"
      GF_SECURITY_ADMIN_USER: ""
      GF_SECURITY_ADMIN_PASSWORD: ""
      GF_RENDERING_CALLBACK_URL: "http://192.168.168.42:3000/"
    ports:
      - "3000:3000"
    volumes:
      - grafana-data-vol:/var/lib/grafana
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
      - keycloak
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis (Development for caching)
  redis:
    image: redis:7-alpine
    container_name: sso-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data-vol:/data
    command: redis-server --appendonly yes

  # PostgreSQL Exporter (for Prometheus)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: sso-postgres-exporter-dev
    environment:
      DATA_SOURCE_NAME: "postgresql://keycloak:password@postgres:5432/keycloak?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres

  # Redis Exporter (for Prometheus)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: sso-redis-exporter-dev
    environment:
      REDIS_ADDR: redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis

# Docker NFS volumes pointing to /nas/kushin77/applications on NAS server
# This solution bypasses NFS root_squash limitation while maintaining centralized storage
volumes:
  postgres-data-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.168.39,vers=3,soft,timeo=180,retrans=2,rw
      device: :/nas/kushin77/applications/databases/postgresql/data
  
  postgres-logs-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.168.39,vers=3,soft,timeo=180,retrans=2,rw
      device: :/nas/kushin77/applications/databases/postgresql/logs
  
  prometheus-data-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.168.39,vers=3,soft,timeo=180,retrans=2,rw
      device: :/nas/kushin77/applications/databases/prometheus/data
  
  prometheus-logs-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.168.39,vers=3,soft,timeo=180,retrans=2,rw
      device: :/nas/kushin77/applications/databases/prometheus/logs
  
  grafana-data-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.168.39,vers=3,soft,timeo=180,retrans=2,rw
      device: :/nas/kushin77/applications/databases/grafana/data
  
  redis-data-vol:
    driver: local
    driver_opts:
      type: nfs
      o: addr=192.168.168.39,vers=3,soft,timeo=180,retrans=2,rw
      device: :/nas/kushin77/applications/databases/redis/data

networks:
  default:
    name: sso-dev-network
