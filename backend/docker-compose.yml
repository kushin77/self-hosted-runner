version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nexusshield-postgres
    environment:
      POSTGRES_USER: nexusshield
      POSTGRES_PASSWORD: nexusshield_secure_password_change_me
      POSTGRES_DB: nexusshield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusshield"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexusshield-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nexusshield-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nexusshield-network

  # NexusShield Portal Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusshield-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://nexusshield:nexusshield_secure_password_change_me@postgres:5432/nexusshield
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      CORS_ORIGINS: http://localhost:3000,http://localhost:8000,http://frontend:3001
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - nexusshield-network
    volumes:
      - ./logs:/app/logs
    security_opt:
      - no-new-privileges:true

  # Optional: Adminer for database management (dev only)
  adminer:
    image: adminer:latest
    container_name: nexusshield-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - nexusshield-network
    profiles:
      - dev

  # Optional: pgAdmin for database management (dev only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nexusshield-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nexusshield.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - nexusshield-network
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local

networks:
  nexusshield-network:
    driver: bridge
