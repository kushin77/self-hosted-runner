# CI include: runner-deploy.gitlab-ci.yml
# Provides a protected, manual job to deploy the sovereign k8s GitLab Runner
# Requires two protected CI variables to be set in GitLab group/project settings:
# - KUBECONFIG_BASE64: base64-encoded kubeconfig for target cluster
# - REG_TOKEN: short-lived GitLab Runner registration token

stages:
  - deploy

deploy:sovereign-runner:
  stage: deploy
  image: alpine:3.18
  variables:
    HELM_VERSION: "3.12.0"
  before_script:
    - apk add --no-cache curl bash ca-certificates openssl tar
    - # Install helm
    - curl -sSL https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz -o /tmp/helm.tgz
    - tar -xzf /tmp/helm.tgz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/helm
    - helm version --client
    - mkdir -p ~/.kube
    - if [ -n "$KUBECONFIG_BASE64" ]; then echo "$KUBECONFIG_BASE64" | base64 -d > ~/.kube/config; fi
  script:
    - if [ -z "$KUBECONFIG_BASE64" ] || [ -z "$REG_TOKEN" ]; then echo "Missing required CI variables: KUBECONFIG_BASE64 and REG_TOKEN"; exit 1; fi
    - export KUBECONFIG=$HOME/.kube/config
    - chmod +x ./scripts/ci/create_sealedsecret_from_token.sh ./scripts/ci/hands_off_runner_deploy.sh
    - ./scripts/ci/create_sealedsecret_from_token.sh "$REG_TOKEN" gitlab-runner
    - if [ -f infra/gitlab-runner/sealedsecret.generated.yaml ]; then kubectl apply -f infra/gitlab-runner/sealedsecret.generated.yaml; fi
    - if [ -f infra/gitlab-runner/secret.generated.yaml ]; then kubectl apply -f infra/gitlab-runner/secret.generated.yaml; fi
    - ./scripts/ci/hands_off_runner_deploy.sh
  when: manual
  only:
    - main
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "webide"'
  allow_failure: false
  tags: []
  environment:
    name: runner-deploy

deploy:sovereign-runner-gsm:
  stage: deploy
  image: google/cloud-sdk:419.0.0
  variables:
    HELM_VERSION: "3.12.0"
  before_script:
    - apt-get update && apt-get install -y curl bash ca-certificates openssl tar
    - curl -sSL https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz -o /tmp/helm.tgz
    - tar -xzf /tmp/helm.tgz -C /tmp
    - mv /tmp/linux-amd64/helm /usr/local/bin/helm
    - helm version --client || true
  script:
    - if [ -z "$GCP_PROJECT" ] || [ -z "$GCP_SA_KEY" ] || [ -z "$KUBECONFIG_SECRET_NAME" ] || [ -z "$REGTOKEN_SECRET_NAME" ]; then echo "Missing required CI variables for GSM flow: GCP_PROJECT, GCP_SA_KEY, KUBECONFIG_SECRET_NAME, REGTOKEN_SECRET_NAME"; exit 1; fi
    - chmod +x ./scripts/ci/gcp_fetch_secrets.sh ./scripts/ci/create_sealedsecret_from_token.sh ./scripts/ci/hands_off_runner_deploy.sh
    - ./scripts/ci/gcp_fetch_secrets.sh "$GCP_PROJECT" "$KUBECONFIG_SECRET_NAME" "$REGTOKEN_SECRET_NAME"
    - export KUBECONFIG_BASE64=$(cat kubeconfig.b64)
    - export REG_TOKEN=$(cat regtoken.txt)
    - if [ -z "$KUBECONFIG_BASE64" ] || [ -z "$REG_TOKEN" ]; then echo "Fetched secrets are empty"; exit 2; fi
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_BASE64" | base64 -d > ~/.kube/config
    - ./scripts/ci/create_sealedsecret_from_token.sh "$REG_TOKEN" gitlab-runner
    - if [ -f infra/gitlab-runner/sealedsecret.generated.yaml ]; then kubectl apply -f infra/gitlab-runner/sealedsecret.generated.yaml; fi
    - if [ -f infra/gitlab-runner/secret.generated.yaml ]; then kubectl apply -f infra/gitlab-runner/secret.generated.yaml; fi
    - ./scripts/ci/hands_off_runner_deploy.sh
  when: manual
  only:
    - main
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" || $CI_PIPELINE_SOURCE == "pipeline" || $CI_PIPELINE_SOURCE == "webide"'
  allow_failure: false
  tags: []
  environment:
    name: runner-deploy-gsm
