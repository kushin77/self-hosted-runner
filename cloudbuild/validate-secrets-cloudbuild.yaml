steps:
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
    - -lc
    - |
      set -euo pipefail
      PROJECT=$(gcloud config get-value project)
      echo "Validating GSM access for project: $PROJECT"
      gcloud secrets versions access latest --secret=aws-access-key-id --project="$PROJECT" || exit 2
      gcloud secrets versions access latest --secret=aws-secret-access-key --project="$PROJECT" || exit 2
      echo "GSM access OK"

timeout: '600s'
