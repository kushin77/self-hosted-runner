steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_IMAGE'
      - '-f'
      - 'nexus-engine/Dockerfile.normalizer'
      - 'nexus-engine'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_IMAGE'
images:
  - '$_IMAGE'
# Submit with: --substitutions=_IMAGE=us-central1-docker.pkg.dev/PROJECT/REPO/nexus-normalizer:sha-<short>