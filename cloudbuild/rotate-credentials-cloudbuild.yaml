steps:
  - name: 'gcr.io/cloud-builders/git'
    entrypoint: 'bash'
    args:
      - -lc
      - |
        git clone --depth=1 --branch=portal/immutable-deploy https://github.com/kushin77/self-hosted-runner.git /workspace/repo
        cd /workspace/repo
        git log -1 --oneline
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - -lc
      - |
        apt-get update && apt-get install -y jq curl
        cd /workspace/repo
        
        # Check what we have
        echo "=== Listing scripts/cloud/ ==="
        ls -la scripts/cloud/ || echo "scripts/cloud/ not found"
        
        # Make scripts executable
        find scripts/secrets scripts/cloud -type f -name "*.sh" -exec chmod +x {} \;
        
        # Get project ID
        PROJ=$$(gcloud config get-value project)
        
        # Fetch credentials from GSM
        export GITHUB_PAT=$$(gcloud secrets versions access latest --secret=github-token --project=$$PROJ)
        export VAULT_ADDR=$$(gcloud secrets versions access latest --secret=VAULT_ADDR --project=$$PROJ)
        export VAULT_TOKEN=$$(gcloud secrets versions access latest --secret=VAULT_TOKEN --project=$$PROJ)
        export AWS_KEYID=$$(gcloud secrets versions access latest --secret=aws-access-key-id --project=$$PROJ)
        export AWS_KEYSECRET=$$(gcloud secrets versions access latest --secret=aws-secret-access-key --project=$$PROJ)
        
        # Execute credential rotation
        echo "=== Running credential rotation ==="
        GSM_PROJECT=$$PROJ ./scripts/secrets/rotate-credentials.sh all --apply 2>&1 | head -50
        
        # Collect AWS inventory if credentials are real
        echo "=== Checking AWS credentials ==="
        if [[ ! "$$AWS_KEYID" =~ "EXAMPLE|placeholder|test" ]]; then
          export AWS_ACCESS_KEY_ID=$$AWS_KEYID
          export AWS_SECRET_ACCESS_KEY=$$AWS_KEYSECRET
          echo "Running AWS inventory collection..."
          ./scripts/cloud/aws-inventory-collect.sh cloud-inventory
        else
          echo "AWS credentials are placeholders; skipping inventory"
        fi

timeout: '1200s'
