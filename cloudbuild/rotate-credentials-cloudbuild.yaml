steps:
  - name: 'gcr.io/cloud-builders/git'
    entrypoint: 'bash'
    args:
      - -lc
      - |
        git clone --depth=1 https://github.com/kushin77/self-hosted-runner.git /workspace/repo
        cd /workspace/repo
        git checkout main
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - -lc
      - |
        cd /workspace/repo
        chmod +x scripts/secrets/rotate-credentials.sh
        # Secrets are injected as env via Cloud Build secret manager to keep them out of logs
        GSM_PROJECT=${PROJECT_ID} ./scripts/secrets/rotate-credentials.sh all --apply
    secretEnv:
      - 'GITHUB_PAT'
      - 'VAULT_TOKEN'
      - 'AWS_ACCESS_KEY_ID'
      - 'AWS_SECRET_ACCESS_KEY'
 # no top-level substitutions to avoid submission mismatch; branch is hard-coded to main
availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/github-token/versions/latest
      env: 'GITHUB_PAT'
    - versionName: projects/${PROJECT_ID}/secrets/vault-example-role-secret_id/versions/latest
      env: 'VAULT_TOKEN'
    - versionName: projects/${PROJECT_ID}/secrets/aws-access-key-id/versions/latest
      env: 'AWS_ACCESS_KEY_ID'
    - versionName: projects/${PROJECT_ID}/secrets/aws-secret-access-key/versions/latest
      env: 'AWS_SECRET_ACCESS_KEY'
timeout: '1200s'
