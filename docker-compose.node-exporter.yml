version: '3.8'

services:
  node_exporter:
    image: prom/node-exporter:latest
    container_name: nexusshield-node-exporter
    pid: "host"
    network_mode: "host"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:9100/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# node_exporter uses host network for system metrics; no compose network required
