<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Portal — Runners</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;margin:20px}button{margin:4px}</style>
</head>
<body>
  <h1>Runners</h1>
  <form id="registerForm">
    <input id="name" placeholder="runner name" required />
    <input id="labels" placeholder="labels comma-separated" />
    <button type="submit">Register</button>
  </form>
  <ul id="list"></ul>

  <script>
    const API = 'http://192.168.168.42:4000/api';
    async function fetchRunners(){
      const res = await fetch(API + '/runners');
      const data = await res.json();
      const list = document.getElementById('list');
      list.innerHTML = '';
      data.runners.forEach(r => {
        const li = document.createElement('li');
        li.textContent = `${r.name} — ${r.labels.join(', ')} `;
        const del = document.createElement('button');
        del.textContent = 'Remove';
        del.onclick = async () => { await fetch(`${API}/runners/${r.id}`, { method: 'DELETE' }); fetchRunners(); };
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const labels = document.getElementById('labels').value.split(',').map(s=>s.trim()).filter(Boolean);
      await fetch(API + '/runners', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, labels }) });
      document.getElementById('name').value = '';
      document.getElementById('labels').value = '';
      fetchRunners();
    };

    fetchRunners();
  </script>
</body>
</html>
