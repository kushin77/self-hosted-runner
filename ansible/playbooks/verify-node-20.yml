---
- name: Verify Node 20.x is installed on worker nodes
  hosts: workers
  become: true
  tasks:
    - name: Check node version
      command: node -v
      register: node_ver
      ignore_errors: yes

    - name: Fail if node is missing or < 20
      fail:
        msg: "Node.js not found or version is < 20: {{ node_ver.stdout | default('missing') }}"
      when: node_ver.rc != 0 or (node_ver.stdout is search('v(1[0-9]|[0-9])\.'))

    - name: Debug node version
      debug:
        msg: "Node verified: {{ node_ver.stdout }}"
