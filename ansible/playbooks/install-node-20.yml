---
- name: Install Node.js 20.x on worker nodes
  hosts: workers
  become: true
  vars:
    node_version: "20.x"
  tasks:
    - name: Ensure apt-transport-https and curl present
      apt:
        name: [apt-transport-https, ca-certificates, curl]
        state: present
        update_cache: yes

    - name: Add NodeSource Node 20.x repo
      shell: curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      args:
        warn: false

    - name: Install nodejs
      apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: Verify node version
      command: node -v
      register: node_ver

    - name: Debug node version
      debug:
        msg: "Installed Node version: {{ node_ver.stdout }}"
