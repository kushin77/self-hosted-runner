---
- name: Install Deploy Public Key
  hosts: all
  become: true
  vars:
    deploy_user: "{{ ansible_user | default('deploy') }}"
    public_key_file: /tmp/deploy_id_rsa.pub

  tasks:
    - name: Ensure deploy user exists
      ansible.builtin.user:
        name: "{{ deploy_user }}"
        state: present
        create_home: true

    - name: Check for public key file
      ansible.builtin.stat:
        path: "{{ public_key_file }}"
      register: pk_stat

    - name: Read public key from file when present
      ansible.builtin.slurp:
        src: "{{ public_key_file }}"
      register: pk_slurp
      when: pk_stat.stat.exists

    - name: Set deploy_public_key fact from file or existing variable
      ansible.builtin.set_fact:
        deploy_public_key: "{{ (pk_slurp.content | b64decode).strip() if (pk_slurp is defined and pk_slurp.content is defined) else (deploy_public_key | default('')) }}"

    - name: Fail when no public key is provided
      ansible.builtin.fail:
        msg: "No deploy public key found. Provide via variable 'deploy_public_key' or upload public key to {{ public_key_file }}"
      when: deploy_public_key == '' or deploy_public_key is not defined

    - name: Ensure .ssh directory exists for deploy user
      ansible.builtin.file:
        path: "/home/{{ deploy_user }}/.ssh"
        state: directory
        owner: "{{ deploy_user }}"
        group: "{{ deploy_user }}"
        mode: '0700'

    - name: Install public key into authorized_keys (idempotent)
      ansible.builtin.authorized_key:
        user: "{{ deploy_user }}"
        key: "{{ deploy_public_key }}"
        state: present
        manage_dir: false

    - name: Log installation result
      ansible.builtin.debug:
        msg: "Idempotent installation complete: deploy key for user '{{ deploy_user }}' installed"

