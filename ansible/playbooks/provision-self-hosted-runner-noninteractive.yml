---
- name: Provision self-hosted GitHub Actions runners (non-interactive)
  hosts: runners
  gather_facts: yes
  vars:
    workdir: "{{ workdir | default('/opt/actions-runner') }}"
    runner_repo_url: "{{ runner_repo_url | default('https://github.com/kushin77/self-hosted-runner') }}"
    runner_name_prefix: "{{ runner_name_prefix | default('eiq-runner') }}"
    reg_token: "{{ reg_token | default(omit) }}"
  tasks:
    - name: Fail if no registration token provided
      fail:
        msg: "Registration token (reg_token) is required for non-interactive provisioning. Generate via GH api and pass with --extra-vars 'reg_token=...'."
      when: reg_token is undefined

    - name: Ensure required packages are installed
      apt:
        name: [curl, jq, tar]
        state: present
        update_cache: yes

    - name: Create workdir
      file:
        path: "{{ workdir }}"
        state: directory
        owner: "{{ ansible_user | default('root') }}"
        mode: '0755'

    - name: Download GitHub Actions runner archive
      get_url:
        url: https://github.com/actions/runner/releases/latest/download/actions-runner-linux-x64.tar.gz
        dest: "{{ workdir }}/actions-runner.tar.gz"
        mode: '0644'

    - name: Extract runner
      unarchive:
        src: "{{ workdir }}/actions-runner.tar.gz"
        dest: "{{ workdir }}"
        remote_src: yes

    - name: Configure runner (unattended)
      command: ./config.sh --unattended --url "{{ runner_repo_url }}" --token "{{ reg_token }}" --name "{{ runner_name_prefix }}-{{ inventory_hostname }}"
      args:
        chdir: "{{ workdir }}"

    - name: Install runner service
      command: ./svc.sh install
      args:
        chdir: "{{ workdir }}"

    - name: Start runner service
      command: ./svc.sh start
      args:
        chdir: "{{ workdir }}"

    - name: Wait for runner to appear in GitHub (control node will poll)
      local_action: shell gh api --method GET /repos/:owner/:repo/actions/runners 2>/dev/null | jq -e '.runners[] | select(.name=="{{ runner_name_prefix }}-{{ inventory_hostname }}")' || true
      register: runner_check
      retries: 6
      delay: 10
      until: runner_check.rc == 0

    - name: Debug runner registration
      debug:
        msg: "Runner {{ runner_name_prefix }}-{{ inventory_hostname }} should be registered."
