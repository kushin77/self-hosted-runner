---
- name: Ensure apt cache is up to date
  apt:
    update_cache: yes
  become: true

- name: Install prerequisites
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - apt-transport-https
      - unzip
    state: present
  become: true

- name: Install Docker (official repository)
  block:
    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker apt repo
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present

    - name: Install docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes
  become: true

- name: Ensure docker service is started and enabled
  service:
    name: docker
    state: started
    enabled: yes
  become: true

- name: Add runner user to docker group
  user:
    name: "{{ runner_user }}"
    groups: docker
    append: yes
  become: true

- name: Install kind binary
  get_url:
    url: "https://kind.sigs.k8s.io/dl/{{ kind_version }}/kind-linux-amd64"
    dest: /usr/local/bin/kind
    mode: '0755'
  become: true

- name: Install kubectl
  get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_release }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: '0755'
  become: true

- name: Install helm
  get_url:
    url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
    dest: /tmp/helm.tar.gz
  become: true

- name: Extract helm
  unarchive:
    src: /tmp/helm.tar.gz
    dest: /tmp/
    remote_src: yes
  become: true

- name: Move helm binary
  copy:
    src: /tmp/linux-amd64/helm
    dest: /usr/local/bin/helm
    mode: '0755'
  become: true

- name: Install terraform
  get_url:
    url: "https://releases.hashicorp.com/terraform/{{ terraform_version }}/terraform_{{ terraform_version }}_linux_amd64.zip"
    dest: /tmp/terraform.zip
  become: true

- name: Unzip terraform
  unarchive:
    src: /tmp/terraform.zip
    dest: /usr/local/bin/
    remote_src: yes
    creates: /usr/local/bin/terraform
  become: true

- name: Install GitHub CLI (gh)
  apt:
    name: gh
    state: present
  become: true

- name: Ensure binaries are executable
  file:
    path: "{{ item }}"
    mode: '0755'
  loop:
    - /usr/local/bin/kind
    - /usr/local/bin/kubectl
    - /usr/local/bin/helm
    - /usr/local/bin/terraform
  become: true
