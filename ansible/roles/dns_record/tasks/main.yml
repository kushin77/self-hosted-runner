---
- name: Ensure artifacts directory exists
  file:
    path: artifacts/dns-intent
    state: directory
    mode: '0755'

- name: Provider is manual — write intended change to artifacts
  when: dns_provider == 'manual'
  copy:
    dest: "artifacts/dns-intent/{{ dns_name }}.json"
    content: |
      {
        "zone": "{{ dns_zone }}",
        "name": "{{ dns_name }}",
        "value": "{{ dns_value }}",
        "ttl": {{ dns_ttl }},
        "note": "Apply via DNS provider console or populate provider-specific credentials and re-run with dns_provider set."
      }

- name: Ensure Route53 record (placeholder)
  when: dns_provider == 'route53'
  debug:
    msg: "Route53 provider selected — ensure community.aws and AWS credentials are available. Implement actual module in environment."

- name: Ensure Cloudflare record (placeholder)
  when: dns_provider == 'cloudflare'
  debug:
    msg: "Cloudflare provider selected — ensure community.cloudflare and API token are available. Implement actual module in environment."
