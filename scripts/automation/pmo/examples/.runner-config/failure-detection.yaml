# ML-Based Failure Prediction Configuration (Phase P1)
# Configures anomaly detection and alerts

model:
  type: isolation-forest
  path: /opt/models/failure-detector.joblib
  version: "1.0.0"
  last-trained: "2026-03-01T00:00:00Z"
  retraining-frequency: weekly
  retraining-day: monday
  retraining-hour: 02

scoring:
  enabled: true
  interval-secs: 10
  min-observation-secs: 30  # Wait 30s before first score
  batch-size: 50  # Score in batches
  parallelism: 4

thresholds:
  low: 0.4      # Score < 0.4: Normal
  medium: 0.7   # 0.4-0.7: Caution
  high: 0.85    # >0.85: Critical
  action-threshold: 0.85  # Trigger action at this level

features:
  # CPU anomalies
  cpu-usage-spike:
    enabled: true
    weight: 1.0
    source: prometheus
    query: "rate(process_cpu_seconds_total[5m])"

  # Memory pressure
  memory-usage-spike:
    enabled: true
    weight: 1.0
    source: prometheus

  # Disk I/O
  disk-write-rate:
    enabled: true
    weight: 0.8
    source: prometheus

  # Network connections
  network-connections:
    enabled: true
    weight: 0.5
    source: prometheus

  # Process count
  process-count:
    enabled: true
    weight: 0.6
    source: prometheus

  # Error rate from logs
  error-rate:
    enabled: true
    weight: 1.5
    source: logs

  # Job duration variance
  duration-variance:
    enabled: true
    weight: 1.2
    source: job-history

  # Historical success rate
  exit-code-history:
    enabled: true
    weight: 0.9
    source: job-history

alerts:
  # Webhook notifications
  webhook:
    enabled: true
    url: "https://alerts.internal/failure-prediction"
    on-medium: true
    on-high: true

  # Slack integration
  slack:
    enabled: false
    webhook-url: "${SLACK_WEBHOOK_URL}"
    on-high: true
    on-critical: true
    channel: "#runner-alerts"

  # PagerDuty escalation
  pagerduty:
    enabled: false
    integration-key: "${PAGERDUTY_KEY}"
    on-critical: true

actions:
  # What to do when failure predicted
  medium-risk:
    - action: "log"
      level: "warning"
    - action: "notify"
    - action: "tag-for-review"

  high-risk:
    - action: "log"
      level: "error"
    - action: "notify"
    - action: "tag-for-review"
    - action: "optional-preemption"  # Don't kill, but flag operator

  critical-risk:
    - action: "log"
      level: "critical"
    - action: "notify"
    - action: "preempt-job"  # Graceful cancellation
    - action: "notify-owner"
    - action: "create-incident"

training:
  data-source: otel-traces
  min-training-samples: 1000
  contamination-rate: 0.1  # Expect ~10% failures
  feature-importance:
    top-n: 5  # Report top 5 important features
  cross-validation-folds: 5
  holdout-fraction: 0.2

monitoring:
  track-predictions: true
  log-file: /var/log/failure-predictions.jsonl
  metrics-export: true
  export-to: prometheus
  export-interval-secs: 60

metrics:
  - name: prediction_accuracy
    description: "Model accuracy on held-out test set"
  - name: false_positive_rate
    description: "Proportion of healthy jobs flagged as failing"
  - name: false_negative_rate
    description: "Proportion of failing jobs not detected"
  - name: prediction_latency_ms
    description: "Time to score a job"
  - name: predictions_per_hour
    description: "Number of predictions made per hour"
