apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: runner-image-cache-daemon
  namespace: actions-runner-system
  labels:
    app: runner-image-cache
    managed-by: elevatediq-pmo
spec:
  selector:
    matchLabels:
      app: runner-image-cache
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: runner-image-cache
      annotations:
        description: "Ensures GitHub Actions runner base images are pre-pulled on each node"
    spec:
      # Tolerations to run on all node types (including spot instances)
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute

      # Run on all nodes
      nodeSelector: {}

      # Init container pulls runner base images
      initContainers:
        - name: image-prefetch
          image: alpine:3.18
          command:
            - sh
            - -c
            - |
              set -e
              echo "Installing docker client..."
              apk add --no-cache docker-cli curl

              # Wait for docker daemon
              for i in $(seq 1 30); do
                if dockerd --version >/dev/null 2>&1 || docker ps >/dev/null 2>&1; then
                  echo "Docker ready"
                  break
                fi
                echo "Waiting for docker... ($i/30)"
                sleep 2
              done

              # Pre-pull runner images
              IMAGES=(
                "ghcr.io/actions/runner:latest"
                "ghcr.io/actions/runner:latest-ubuntu-22.04"
                "ghcr.io/actions/runner:latest-ubuntu-20.04"
                "ghcr.io/actions/runner-container-hooks:latest"
              )

              for image in "${IMAGES[@]}"; do
                echo "Pre-pulling image: $image"
                docker pull "$image" || echo "Warning: failed to pull $image"
              done

              echo "✓ Image pre-fetching complete"
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run/docker.sock
          securityContext:
            privileged: true

      # Keep container alive to ensure image persistence
      containers:
        - name: cache-monitor
          image: alpine:3.18
          command:
            - sh
            - -c
            - |
              echo "Image cache daemon active on $(hostname)"

              # Periodically check images still exist
              while true; do
                sleep 3600
                echo "$(date -u +'%Y-%m-%d %H:%M:%S UTC') Image cache check"
              done

          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"

          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534  # nobody

      volumes:
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket

      # Priority for pod scheduling
      priorityClassName: system-node-critical

      # Don't evict this pod early
      terminationGracePeriodSeconds: 60
