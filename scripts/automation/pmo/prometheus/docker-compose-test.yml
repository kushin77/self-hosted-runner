version: '3.8'

# Temporary override for E2E testing only. This file removes host port
# bindings for Alertmanager and points receivers at the in-network mock webhook.
services:
  alertmanager:
    ports: []
    environment:
      - SLACK_WEBHOOK_URL=http://mock-webhook:5001/hooks/slack
      - PAGERDUTY_SERVICE_KEY=TEST_PAGERDUTY_KEY
