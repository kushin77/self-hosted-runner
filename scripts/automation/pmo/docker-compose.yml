version: '3.8'
services:
  provisioner-worker:
    build: ../../services/provisioner-worker
    image: provisioner-worker:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=9090
    ports:
      - "9090:9090"
    volumes:
      - ../../services/provisioner-worker:/usr/src/app:ro

  portal:
    image: httpd:2.4
    volumes:
      - ../../ElevatedIQ-Mono-Repo/apps/portal/dist:/usr/local/apache2/htdocs:ro
    ports:
      - "3919:80"
    restart: unless-stopped
